名徇利耗氣傷形身謝之後受摙山負石苦今謹有黃籙大齋主某依按科格然懴神燈奉為亡靈某及一切罪魂落滅貪纍之根解釋形神之苦伏願大羅真帝浩劫元尊俯垂濟拔之慈下濟摙山負石地獄之難轉輪聖王天尊法師行持如前儀玄燈藹九真無極超上宫落落演文字玉音徹太空足躡天一階流盻觀十方金虎著命籍長居太帝房不可思議功德衆官旋至輪南面北立第四輪廽之道名為華競苦精門一切衆生貪競榮華耗散真氣身謝之後受填作江河地獄之苦伏願玄都上聖紫闕髙真俯垂大宥之慈下濟填作江河地獄之難轉輪聖王天尊法師行持如前儀玄燈期幽夜晃然發光容欣欣七祖釋長離人難中沐浴蘭香湯結友與喬松提擕十天真長與太帝同不可忌議功德衆官旋至輪東北面西南立第五輪廽之道名為身纍苦魂門一切衆生耽迷妄境勞役魂神身謝之後受吞火食炭鑊湯地獄苦今謹有黃籙大齋主其依挾科格然懴神燈奉為亡靈某及一切罪魂落滅身纍之根解釋魂神之苦伏願十方真聖三界慈尊俯垂超度之慈下濟火炭鑊湯地獄之難轉輪聖王天尊法師行持如前儀玄燈徹九天朗然九幽開靡靡九祖釋反胎生玉階𡨋心歸洞虛不渴亦不飢玄黃五色帳身生羽毛衣不可思議功德衆官旋歸本位紫聖垂慈著廽耀降光之格清真演化垂遷神拔罪之儀普為沉迷開明幽暗上照九天則三晨增耀下輝九地則庶獄停酸澤灑重泉恩霑六道北隂夜府受罪窮魂覩此燈光永離惡趣十方法界一切有情自一起五而輪廽生返六合無而煩惱息咸超自在長處光明為上因緣念大聖元如天尊太上大道君太上老君太一救苦天尊九幽拔罪天尊朱陵度命天尊不可思議功德右五呪出陸天師然燈禮祝儀名九幽五方燈頌無上黃籙大齋立成儀卷之二十四
