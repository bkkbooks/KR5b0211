front:
  text: 無上黃籙大齊立成儀卷之二十五竹五
  hash: sha256:5c097eb5aa6e8ec8aa11cb9a46f681450945fde0b96083afdded2e6b3de716cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_025-001a, image: hfl/0283/0283-130.png}
body:
  text: 太上執法仙士蔣叔輿修科儀門揚幡儀先於揚幡處故立香案一隻法師同齊官上香祝曰具法位臣某上啓太上無極大道至真無上三十六部尊經真文寶符太上三尊十方衆聖東極天宫長樂舍內大慈仁者尋聲赴感太一救苦天尊東方玉寶皇上天尊南方玄真萬福天尊西方太妙至極天尊北方玄上玉晨天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方無量太華天尊上方玉虛明皇天尊下方真皇洞神天尊朱陵度命天尊轉輪聖王天尊超度化界天尊大慈大悲救苦真人大慈大悲大惠真人大慈大悲拔罪真人大慈大悲拔度真人太陽鬱儀帝君太隂結璘皇君中央北斗九皇君玄中大法師三界官屬一切威靈臣聞元皇設教俯為一切之含生黃籙垂科普度九幽之苦趣建齊實修崇之本揚幡乃資悼之先將啓靈壇宜騰寶號今謹有某官某正薦亡故某靈普薦在㑹衆魂開建無上黃籙大齊用資超度肇崇寶剎祗揭華幡企真馭之遐臨乞恩光之降鑒願回景耀燭以靈輝稱號一開三塗隨聲而離苦垂斿所指八紘被䕃以遷升臣等修敬以時歸誠如在懼人寰之溷濁勤天步之逶遲仰賴至仁俯矜微素今有靈幡赦罪神呪謹為宣揚黃籙開度三界十方四生六道同到道場生神遷魄萬劫不忘幡之為體隨風飛揚風之所被各從其方重隂之府九夜之鄉地獄餓鬼旁生無鞅皆得解脫上升天堂急急如太上度生律令次揭幡舉靈幡赦罪天尊上來揭幡功德無量殊因並用回施十方三界六道四生共證玄功同成道果為上因緣念大聖元始天尊太上大道君太上老君太一救苦天尊十方救苦天尊不可思議功德開啓轉經儀道衆齊集經所面三寶上帝前序立舉啓堂頌法師上香啓白具法位臣某焚香上啓妙無上帝自然元始天尊無上道寶妙有上帝虛皇玉宸大道君無上經寶至真大帝萬變混沌玄元老君無上師寶昊天玉皇上帝紫微天皇大帝紫微北極大帝太微南極長生大帝東極太一救苦天尊十方尋聲救苦天尊玉京玄都紫微上宫十方大聖飛天上真九天上帝五老上帝三十二天帝君曰宫太陽帝君月宫太隂皇君五星五德真君南斗六司星君北斗七元星君二十人宿周天分度星君九天天曹諸司真宰三官大帝五師真君三十六部尊經三洞威神三寶官屬天真皇人妙行真人十方無極飛天神王長生大聖無量度人三洞四輔侍經真官玉童玉女北隂玄天酆都大帝十宫真人扶桑大帝暘谷神王三河四海九江水帝洞天福地治化仙官五嶽聖帝里社靈司虛空監察直符直事三界應感一切威靈普同供養香乃玉華散景九氣凝烟香雲密羅徑衝九天當願侍香金童傳言玉女傳臣啓奏上聞帝前令臣所啓咸乞如言臣聞玉字金書道闡重玄之化瓊章寶範丈生空洞之先保鎮邦家超淩品彚神功靡測奧義難窮以今奉為齊官某正薦亡親某乙普薦在㑹衆魂崇建無上黃籙大齊用祈升濟預取今辰轉誦太上諸部真經琅函睿號恭憑道力普濟幽沉仰冀恩光俯垂證鑒臣下情無任䖍懇皈依之至開經文疏謹用表宣宣開經疏宣畢就焚之衆官各就位舉三皈依讃舉道場衆等執簡當心平坐如法舉讃詠如法舉宿命讃行香水淨手敷經文唱靜念如法法師念玄蘊呪啓經雲篆太虛浩劫之初乍遐乍邇咸沉或浮五方徘徊一丈之餘天真皇人按筆乃書以演洞章次書靈符元始降下真丈誕敷昭昭具有𡨋𡨋其無沉痾能自痊塵勞溺可浮幽𡨋將有賴由是升仙都以今奉為鄉貫某處黃籙大齊主具官某伏為亡親正薦某至福佑晃存普薦隨齊意攺易巳於今月某曰預告三天關謄三界謹集見前清衆開啓轉誦太上洞玄靈寶諸品真經回獻三寶上帝十極髙真三元三界嶽地水府齊壇合㑹係醮威靈并資倬亡靈十方罪爽真經寶號功德圓滿别具表宣若乞聖鑒昭回帝慈孚佑斬地根於死户業對停間錬隂魄於生門形神升度八方清泰九夜煥明普今有識之含靈皆證無為之妙果為上因緣念大聖元始天尊太上大道君太上老君太一救苦天尊九幽拔罪天尊朱陵度命天尊法橋大度天尊火錬丹界天尊轉輪聖王天尊隨願往生天尊逍遙快樂天尊髙真妙果天尊十方靈寶天尊不可思議功德啓讃譛轉念如儀存思之法並見并壇轉經儀神虎告玉札儀先排辦淨茶酒果供養道衆依次序立法師存變如儀祝香精誠所感萬聖遐臨丹懇上通千真畢集仗神靈而達悃假寶炷以傳心恭焚寶香供養三清上聖十極髙真北斗七元星君北斗玄𡨋太一夫人天一北𧙓神虎大聖太一紫元玉札夫人雄左玉曹玄伯雌右武鸞主吏三部追魂使者直印三神七元玉女追魂攝魄官君吏兵五道大神土地里域真官虛空監察應感威靈仗此真香普同供養香乃玉華散景九氣凝烟香雲密羅徑衝九天侍香金童傳言玉女上聞帝前令臣所啓咸賜如言今據入齊意伏以陽生隂殺明善惡以無私地濁天清定升沉而有自北魁宜追攝之局南昌存錬度之司可謂至道大慈明真普度以今某人乞修齊直普福幽明謹按金科宣行玉札庶使九泉開度六道蒙恩一切有情咸臻妙果當職清衆淨壇如儀灑淨再祝死者不可復生故太上有返魂之法道者無為而化在元真垂普度之科欲使滯爽更生必先呼君魂識以我至定合彼有靈庶散積鬱隂氛弗忤冲和陽氣伏願神虎大聖追攝官君不忘元始教戒之言俯鑒齊主䖍誠之懇尋聲赴感應念垂慈道衆䖍誠一心奉請請神虎衆聖法師握訣召神臨目密呪玄天玉札神虎符文混元合氣太一玄𡨋追魂攝魄開陽啓隂萬神敬聽敢不奉迎神虎玉女神虎大聖追魂使者攝魄吏兵一召速至不得稽停稟受符命宣告寒庭追魂攝魄現影現形來臨法㑹功奏玉宸焚符存至上香獻茶酒三獻法事如儀祝白頒符度籙咸遵太上之科攝魄召魂並按元師之旨願飛雲馭遍達泉扄導引魂儀來臨法㑹具有壇檄謹用披宣宣玉札檄文向來壇檄巳具敷宣伏請神虎二大聖三部使者七玉女等齎持玄𡨋隱書混元玉札上入九清下入九壘以至十方三界北隂酆都九幽諸獄洞府仙宫開關啓路追取上件亡過某魂及九州分野六道四生孤魂滯魄等衆速離所部來赴玄壇參朝太上臨接陽眷無所不往無所不達依准玄科玉律奉行幸勿稽延有妨開度焚符檄如式法師步斗入斗口執水劒靣東南立呪曰太一紫元君天一北祚敕神虎㦸飛運招搖一統隨玉札所至處十方精光都一吸急急如律令法師取東南氣入水中噀水一口呪曰何喬二神將三部追魂使者速往生方死所追取亡過某人魂魄速赴法會領受靈寶升度功德存將吏前去追取亡魂念善散如儀無上黃籙大齊立成儀卷之二十五
