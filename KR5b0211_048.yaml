front:
  text: 无上黄籙大齋立成儀卷之四十八駒八
  hash: sha256:ea10cfa5ccdfef4f59615e4790d496b8dcbaac41eb78518e57da06bb6cdae788
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_048-001a, image: hfl/0288/0288-070.png}
body:
  text: 太上執法仙士蔣叔輿編集附壇追度門投壇附薦狀式郷貫某州某處居住姓某伏覩無上黄籙大齋普度三界一切有情功髙萬法惠覃十方竊念亡親某粤自淪亡俄歴歳月欲伸薦悼力乏修崇伏見某爲某亡靈開建黄籙大齋普度三界一切有情欲乞附薦魂儀遷升福境今開具生死年月下項亡親某命係某年某月某日某時生於某年某月某日某時在某處命過享年若干歳如所薦名數多逐一依前開具右謹具狀申靈寶大法司伏乞依科開度施行伏𠉀法旨太歳某年月日郷貫姓某狀可漏狀申三洞法師門下具郷貫某處姓某謹封如見大齋外人欲入㑹附薦者法難拒絶今依前式具投狀四紙携詣投壇法師受詞備奏三天申靈寶五師酆都大帝牒神虎直符追攝赴壇依科開度某投壇狀四紙一𥿄繳申三天門下一紙繳申地府一紙付三界直符神虎使者一𥿄留本司照應狀紙栽髙一尺四寸眞楷書之申發時連粘爲一合縫用印此爲正薦一人建齋者立文衆㑹不用三清玉帝奏狀具法位臣姓某右臣先具奏聞爲某人正薦亡親某乞取某月某日就某處開建黄籙大齋用資超度今據某處某人等狀稱伏覩无上黄籙大齋普度三界一切有情竊念某等各家先逺粤自淪亡無力修崇莫伸薦㧞乞於齋次附度魂儀懴謝宿愆遷升福境臣據詞難抑謹爲附壇依科開度除巳備申靈寶五師眞君北隂酆都大帝牒本處城隍司各乞照㑹今繳連某等所薦亡魂姓名生死年月帳狀申三天門下上清天樞院伺候敕旨乞與頒行外謹昧死具狀飛奏欲望天慈允臣所奏特降敕命下三界十方地水職司㝠曹幽獄一切去處照應赦㧞亡過某等魂宿對惡根深愆重罪俾出幽夜覩見光眀克詣靈壇普霑齋法冐犯天威臣誠惶誠恐稽首頓首死罪謹具奏聞伏候敕旨歳次某年月日具法位臣姓名狀奏貼黄奏爲某人等乞附壇薦按亡親某等超升乞降救命施行事倚黄乞降付三界十方眞司可漏三清玉帝至尊陛下具法位臣姓名狀奏謹封方函奏狀一函上詣三天門下上清天樞院請進具法位臣姓某謹封五師狀具法位姓某今據某郷貫某人狀稱伏覩同前狀式至遷升福境某據詞難抑謹爲附壇依科開度除巳備録事由飛奏上帝繳連某人等所薦亡魂姓名生死年月帳狀申三天門下上清天樞院伺候敕旨乞與施行及申北陰酆都大帝牒本處城隍主者外須至申聞者右謹具申靈寶經師眞君靈寳籍師眞君靈寳度師眞君玄中教王上清靈寶聖師眞君三天大法天師正一靜應眞君聖前伏望聖慈特降聖旨下三界十方地水𡨋曹一切去處照應根刷附薦亡過某等魂不以罪業輕重拘留執對特與赦除𡨚業解釋苦根俾離重冥普霑齋法干冐聖威某下情無任惶懼之至謹具狀申聞謹狀歳年月日具法位姓某狀天樞院狀如狀多各發靈寳大法司今據某郷貫某人狀稱同五師狀至備奏上帝請降敕命及申靈寳五師眞君北隂酆都大帝牒本屬城隍主者各乞照㑹外謹繳連某人等所薦亡魂姓名生死年月帳狀在前今發奏狀一函重封印全須至申聞者右謹具狀申三天門下上清天樞院伏乞徑爲通奏恭請敕旨早與頒降施行謹具申聞伏𠉀昭報謹狀歳年月日具法位姓某狀地府狀具法位姓某今據某郷貫某人狀稱同五師狀至乞與頒行申靈寳五師眞君牒本處城隍主者合乞照㑹及備牒三界直符神虎追攝亡魂使者前去十方三界地水幽隂根㝷所薦亡過某魂請領赴壇祗承功德外今繳連所薦亡魂姓名帳狀在前須至申聞者右謹具狀申北隂玄天酆都大帝聖前伏乞聖慈特降聖旨下十宫五嶽九地幽隂冥曹幽獄合屬去處根刷附薦亡過某等魂或有宿債深愆拘留執對之者並請指揮放釋交付三界直符神虎使者管領赴壇伺候依科開度施行冒犯聖威某下情無任惶懼之至謹具狀申聞謹狀歳年月日具位姓某狀城隍牒靈寳大法司牒上某處城隍主者某侯王今據郷貫某人狀稱同五師狀攺作當司至伺𠉀敕旨乞與施行及申靈寳五師眞君酆都大帝外須至專牒者牒請詳前項事理疾速移文關報某府州管下諸縣城隍管内祀典正神各令知委照應直符備去姓名及附壇所薦亡魂來詣靈壇伺𠉀開度一依盟眞科品施行謹牒歳年月日牒直符神虎牒靈寳大法司牒三界直符神虎追魂使者當司今據郷貫某人狀稱同城隍牒云云至申酆都大帝牒某處城隍主者外今來合要上件亡魂赴壇受度巳繳連所薦亡魂姓名生死年月帳狀在前所有申狀公牒開具通落去處下項一申狀一函詣地府北隂酆都大帝聖前申上一牒一道某處城隍主者通下牒請照㑹賫管前去根㝷所薦亡魂去處並要請領赴壇伺候開度如或隂關有阻冥路爲難示以公文庶爲照證一准玄科玉律施行故牒歳年月日牒功曹關靈寳大法司今月某日發緊急文字爲某處某人乞附黄籙齋壇追度亡魂事須至關者一奏狀一函申狀一函上詣三天門下上清天樞院一申狀一函上詣靈寳五位聖師門下巳上逐處請進申上右關某年年直功曹使者並同前正奏闗式錢馬單狀等格式並同正奏式行用右附壇所薦亡魂至建齋宿啓三禮後師爲總告救苦符一面如結局在拜酆都章前則併附王薦亡魂告去充妙師仍將齋意爲穿入神虎關中至錬度夜却爲總告長生符一面所有附薦亡位飲食各今附薦人自就家廟供養大道神化應變無方不分彼此至如經旛冥錢一項入㑹者多則易冗雜反累齋家各令附薦之人隨意自備經旛𥿄陌不拘多少具狀詣壇師爲粘於功德牒前至度魂夜自行焚化或携歸家廟焚化亦可立式如後附薦功德狀式郷貫孝孫某今於修奉大齋之次附薦魂儀超升福境所有功德品目具列如後一㸔誦某經若干逐一開列一備化某經旛若干錢財若干右謹獻上亡親某靈逐一開列伏乞大道證明清魂昭鑒謹狀歳年月日具位姓名狀功德壇牒无上黄籙大齋壇本壇先據郷貫某人狀稱伏覩某人開建无上黄籙大齋普度三界一切有情乞爲附薦亡親某靈超升福境本壇除巳備奏三天關謄三界頒宣符命召攝魂儀來赴靈壇普沾齋法今來功德圓滿及據某人别置到眞經錢財總伸資薦頭連狀子在前合行給付以爲遷升之據開具下項一告下元始符命救苦眞符巳付茭龍驛吏送訖一告下元始符命長生靈符巳付金龍驛吏送訖一給付太上洞玄靈寳九真妙戒長生度命金籙寳符一階牒玉符赦罪巳落滅於惡根黄籙度生復増𣸸於善果仗此薦修之力徑登快樂之郷永斷輪廻常依元妙故牒歳年月日牒无上黄籙大齋立成儀卷之四十八
