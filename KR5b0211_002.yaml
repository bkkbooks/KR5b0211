front:
  text: 無上黃籙大齋立成儀卷之二鳯二
  hash: sha256:f1bd95aa79eb8a623db3e61f440f1b0680fde8c602c065a892effd50665dd6e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_002-001a, image: hfl/0278/0278-040.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編次壇幕第五科曰禮天地通真靈當建壇以申至敬三洞齋儀規範不同各見本法靈寶黃籙齋壇具式如左內壇十門用長纂十八枚短纂十枚合二十八枚以絳繩或青繩三度欄之第一度自長纂花頭下連門通欄之第二度目短纂花頭下欄之第三度去第二度二尺來許欄之要與第一度絳繩髙低相似其第二度第三度絳繩止欄空處勿欄門也又於長纂頭十字交加綳繩懸挂小幡及弔枝花之屬十門之外各依方位挂三十二天幡三十二首每兩纂之間施一燈纂遇夜然燈中外級壇亦施燈纂長七尺並自壇面量起為則纂上花頭之屬不在數內壇三級各髙一尺五寸或一尺二寸或九寸為則中壇四門用長纂八枚短纂二十枚合二十八枚開四門餘悉用絳繩或青繩欄之幡花相間並如內壇法應登齋行道止自地户出入餘三門不可往來常叮嚀臨壇執事等輩六職之外或添副職參贊行事當次侍燈下立班今世知磬掌儀即古都講之職表白即古監齋之職點酌直壇即古侍經之職手爐即古侍香之職直燈燭即古侍燈之職壇官各不舉職而六職之外始多冗名矣外壇止於離宫開一門出入用長纂九枚短纂十六枚合二十五枚除離宫外餘悉欄之幡花燈纂相間如上法執威儀者每壇一面分定三人遇步虛旋繞依次而行常令一面有三人執威儀旋繞不可今踈密不均也壇外然燈總十有六合一百五十九燈太歲燈隨年建本命行年大小墓燈隨齋主生屬安之本命行年燈隨十二支轉大小墓燈以五姓納音推十方九宫二十八宿五嶽燈並於逐方然之七祖九幽燈本法然於中庭恐妨行事可於西南然七祖燈於鬼戶然九幽燈田先生齋壇圖又有六甲十直諸燈無所經據金籙簡文亦無禮祝之法今刪去壇席狹處不可鋪燈可於别處安之依儀禮祝此廣成先生之意也道戶燈二本命燈三隨生年行年燈七男一歲起寅女一歲起申太歲燈一隨本年大墓燈三宫羽辰商丑角未徵戌小墓燈五宫羽戌商未角丑徵辰七祖燈七東北九幽燈九分八方中央寄西南立脾云東方風當獄澄之類夾門燈二與道户燈相對列於門之左右二十四氣燈二十四東南八卦燈八分八方各各立牌子九宫燈九分八方安中宫寄神名立牌書某宫燈十方燈十立牌二十八宿燈二十八勻布四方起角之軫各立牌名云某宿燈三十六天燈三十六天門五嶽燈五分四方安中嶽寄西南各立牌右於各燈下立一牌書燈名云道户燈角宿燈之類內壇十門黃籙簡文靈仙品曰十門榜廣三寸三分長二寸四分隨方色東方青華元陽門朱書青榜卯地南方洞陽太光門黃書赤榜午地西方通隂金闕門黑書白榜酉地北方隂生廣靈門青書黑榜子地東北靈通禁上門白書黃榜寅地東南始陽生氣門白書黃榜辰地西南元黃髙晨門白書黃榜申地西北九仙𣑽行門白書黃榜戊地上方大羅飛𣑽門青書白榜亥地下方九靈皇真門黃書青榜巳地中壇四門張清都儀與此不同天門黑書黃地地戶赤書黃地日門赤書朱地月鬥白書黑地天門青書黑榜亥地地户黃書赤榜巳地日門黃書青榜寅地月門黃書白榜申地外壇八卦纂中開一門震宫洞青之氣青書黃榜正東卯地離宫洞陽之氣朱書曰榜正南午地兊宫少隂之氣白書青榜正西酉地坎宫洞隂之氣黑書赤榜正北子地巽宫𣑽行之氣黃書黑榜東南巽地坤宫𣑽隂之氣黃書黑榜西南坤地乾宫𣑽通之氣黃書黑榜西北乾地艮宫𣑽元之氣黃書黑榜東北艮地八卦纂之外周回依法然燈以花柱欄之壇纂八十一枚張萬福天師科法用六十四枚蓋壇止兩層外止列八卦纂耳長纂三十五枚枚長一丈九尺出土短纂四十六枚枚長七尺六寸六寸入土壇纂三重務在精好雕木漆畫作蓮花火珠之形上級中門用長纂十八枚短纂一十枚中級四門用長纂八枚短纂十六枚外級於離宫開一門出入用長纂九枚短纂二十枚以絳繩五百尺作三度欄之門兩旁各刻鏤日月瑞雲之形又於三級之外立花柱各髙三尺或五尺以青繩縻之護淨隔凡正中開一門出入而巳右按下元黃籙簡文靈仙品曰拔度罪根威儀當於中庭開壇四面四角上方下方合十門中央縱廣二丈四尺四面標纂榜題門位上下整飭又曰安中門畢於十門外開天門地户日門月門四角合作四門縱廣合長三丈二尺名四界都門安八卦標榜經中止云兩級蓋法天象地之義今依廣成先生儀範建壇三級如或地形窄狹不可依科營建立止上中二級外級就平地為之務在變通不可膠柱外級止闊三尺亦可但中級拜跪不可狹也如上級二丈四尺中級當三文二尺上級一丈八尺中級當二丈四尺杜廣成先生曰常情所見皆以露壇為宜殊不知誠之所感則九天非遙志所不通則跬步為隔若丹襟動於真聖注念合於神明豈屋宇之能蔽乎且敕壇之後尚不可壇內逆行及外人干犯忤真違禁科式甚嚴況風雨不常晴景難久苟或關奏之際雨澤驟來失雍容庠序之規有匆遽奔馳之亂首尾既紊誠敬全虧故儒家沾服失容不祭蓋虞於此耳以此論之則壇在宇下終始周旋固無失於禮容自可期於通感右立壇要取方位端正坐北面南如宫觀屋宇基址坐向不同當以方位東西南北定壇之坐向或背或偏却所不拘切可遷就壇位坐向取屋宇端正也玄師幕居壇之東一次壇之南靈寶玄師為三天化主乃闡教之師應宣行齋事當先關啓證盟齋功張帳幕設聖像凡案供養如法五帝幕居壇之西一次壇之南五老上帝主人天功過之録證質齋功古齋在五方案上杜儀令就三師位北别張帳幄設聖像几案供養如法天師幕居壇之東二次玄師募之南正一天師為三天法主乃出法之師應有齋修皆當關啓張帳幕設聖像几案供養如法杜儀無比三師幕居壇之西三次五帝幕之南經籍度三師為開度之宗師資存念之首各張帳幄於壇之西設聖像几案供養如法三官幕居壇之東三次天師幕之南三官大帝主三元考校之籍證録齋功張帳幕設聖像几案供養如法監齋法師幕居壇之西三次三師幕之南監齋大法師為靈寶齋法之主監臨齋事張帳幕設聖像几案供養如法右六幕立於壇序務在量地寬狹隨宜鋪設留沖靖立三師位於壇內却添正一三師之幕蓋自龍虎演教相沿用之今依杜儀置三師帳於壇之西如屋宇窄狹不可立六幕當就東西二向各設一幕每幕設三香花案仍以幕帟之屬就案分隔之遇有參謁並當中相通行事東一幕仍須移玄師居中天師左三官右西一幕五帝居中三師左監齋右蓋三幕併而為一則當以中為尊而左右相次也錬度堂列錬度帝真仙衆之位冶錬亡靈遷升幽爽設聖像几案供養如法屋宇窄處臨錬度夕隨宜設之神虎堂列神虎夫人將吏之位帳幄供養如法此堂常簾幕無令外人出入監臨所列城隍土地監壇正神承差神吏等在壇之西杜儀云關召敷奏傳感上玄凡建齋壇土地為首亦宜設位遙對壇前香花凡案供養如法受度堂杜廣成儀立于東南上遷拔九幽洗滌玄祖宜設位遙對壇所列係薦亡靈之位肴饌供養如法靜默堂中設髙座及大法師座衆官座列兩旁中列齋法祖師之位供養如法靖室髙功法師行持書篆符籙之所中列天真皇人黃籙院真宰符籙中典籙靈官等供養如法普度堂外設茭郭中安斛食立六道位肴饌供養如法近水際為之尤佳誦經堂中設三清三寶之位香花供養如法𦆵開啓畢即集道衆於此轉誦訖事具疏宣懴請師第六科曰開度天人救護群品非師不度非師不仙況建齋請福濟度存亡必得其人庶獲通感在於備受圖籙間練齋科知俯仰之儀明進退之格思神念真若面奉金闕關啓敷奏若躬朝玉皇庠序得宜間雅無失注心丹至精誠通感乃可謂之師矣若法師佩三洞衆官參洞玄者可著之闕人之處可洞玄為法師紫虛正一為衆官齋法出於靈寶屬洞玄以此行之理亦為當其他十戒白簡道士不可著職升壇此外竊預名號自貽𡨋譴登齋衆官要在契心協志共建齋功一或異同有傷和氣隳墮功果蓋以皇天厚土幽府重泉十方無極之鄉三界難量之際非得至人謄詞啓告依式關宣則何以和同天人蒙福幽顯如是末學下士泛泛之流道行既不素充齋法又非間習惟務財利冒昧宣行非惟徒役精神虛費財寶將見學法未備俯仰之格進止有犯太真之科擲埴𡨋行自速玄憲建齋之主豈免負纍乎結齋之士雖不厭多然德行難全恭勤者少大凡以七人已上至十四人為率如乏人之處無身佩真文上法者則不必廣延濫備名數今世道教陵夷互相宿習凡受籙者止就宗壇請籙詞及法服帖為據儼然自稱某籙弟子冠裳楚楚殊似可觀欺天罔道無甚於此所宜痛哉不使登壇縱壇官闕處亦須備受都功盟威籙者方可著之衆官法服品位第七科曰服者所以旌禮也登壇朝真不容紊亂經圖備職籙髙卑用以彰明各在法度始於正一終於講師髙下之儀一如定制正一法師玄冠絳褐黃裙絳帔二十四條丹火玉珮斬邪之劍長二尺四寸紫虛法師玄冠黃裙黃褐黃帔二十八條青玉珮紫虛陽光之劍二尺八寸又五帝召靈之劍明玉佩洞神法師玄冠黃裳青褐黃帔三十二條白玉珮太一三元之劍三尺又三皇太乙之劍青玉珮洞玄法師芙蓉冠黃裳紫褐紫帔三十二條明光玉珮八景揮靈之劍三尺六寸又五帝威靈禦邪劍素玉之佩洞真法師元始冠青裙紫褐紫帔青裏表三十九條珠玉繡履震靈之座玉簡瑶笏震靈之劍左右垂玉珮珠璫前後通真召靈之符或仙衲雲霞之帔大洞法師元始冠黃裙紫褐五色雲霞帔劍珮如洞真法三洞講師元始冠黃裙紫褐九色雲霞之帔無劍珮如上品職髙卑皆為朝真法服升壇以朝真交靈也寶海云劍者辟邪制非威神伏魔珮者進止動靜以中律度各有第級也夫天真上聖法式威儀萬品千名變化無極至於樓臺宫闕結氣凝雲恍愡有無不常厥所或飛臺行館空裏轉移或金闕玉樓虛空化出或大包宇宙或細入毫芒其於羽衣雲衫霞衣玉珮珠幢寶節飛印瓊冠瑶笏霓旌鳳輿龍轂日旗月斾鶴駕鸞𩥵雖資變化之神亦有等差之秩所以朝真法服劒珮冠衣取象上真垂儀下士若其清齋端默靜室凝神合氣虛無遊心淡漠密朝大帝隱叩玄關無煩服飾之殊自會感通之要尊卑品秩一切泯然其如行教表儀立規定體各循階序此可為常按而行之亦玄門之盛美也弘法之士其勉之焉齋饌第八凡營齋饌飯食隨時餅果蔬菜並須清淨安置如法勿使小兒禽畜汚犯其酥乳酪並不得登齋厨齋後茶湯方可通氣而巳正齋之日上三寶前及監齋法師監壇正神獻齋聊以表誠不在多品仍於三寶十方及諸幕前備時果供養獻細茶棗湯三寶三十方十六幕十四監臨量力獻之每朝發爐後茶大謝時獻湯諸幕參謁時即便獻茶湯也沐浴第九登齋入靜以潔為先內以法水洗心外以香湯洗垢心靜則塵念自息垢除則真氣流行學道之人常宜澄心定慮沐浴薰香可以通達神明感降真聖矣每修齋之前當煮五香之水以浴青木荆芥零陵蘭香真檀如無五香之處可依紫虛元君沐浴解穢法以竹葉十兩桃白皮十兩以水二斗煮一兩沸通寒溫先飲一盞以此沐浴諸穢自散凡入靖行香水漱口謂之除穢出靖亦如此謂之閉真氣日辰第十崇建大齋要揮節會開壇謂宿啓日及正齋第一日散日更傎艮日尤佳雖得吉辰仍避丙寅丁卯丙申丁酉戊辰戊戍及受死龍虎日為善惟三會無避忌若啓齋巳得吉日而以後日分或值當避之日則不須忌拜章却忌六戊日以天門不開故也關發文字避截路空亡時值大吉小吉傳送功曹為美三會日正月七日天曹舉遷賞會七月七日地府慶生中會十月五日水府慶生大會三元日正月十五日上元七月十五日中元十月十五日下元八節日立春春分立夏夏至立秋秋分立冬冬至出玉清經五臘日正月一日天臘五月五日地臘七月七日道德臘十月一日民歲臘十二月王侯臘逢臘日是王真人投趙真人小三會日庚申日尸神白人罪過甲子日方一蕳闕神祇本命日百神朝身四始日正月一日四月一日七月一日十月一日十天逐月下降日明真科拔度死魂罪對上品常以六陽月每月合十日及八節甲子庚申日依威儀具法開啓一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日節會日甲午天節甲申地節甲子人節甲辰四時會甲戌五行會丙午天會壬午地會壬子人會庚午日會庚申月會丁卯真仙會辛酉星辰會月三日辰會本命日萬神會出女青律受死日正月戌二月辰三月亥四月巳五月子六月午七月丑八月未九月寅十月申十一月卯十二月酉龍虎日正月巳二月亥三月午四月子五月未六月丑七月申八月寅九月酉十月卯十一月戌十二月辰聖忌日丙寅丁卯道父忌丙申丁酉道母忌壬辰壬戌北帝忌戊辰戊戌南帝忌帝酷殺日正月庚申日又初二日二月辛亥辛卯又初九日三月甲戌庚戌又初十日四月癸亥日又十一日五月壬子日又十一日六月癸丑日又初十日七月甲寅日又十二日八月乙卯日又十三日九月甲辰日之十三日十月丁巳日又初八日十一月丙午日又十五日十二月丁未乙未又十三日月將選時陽日起大吉順行隂日起小吉運行皆以本日支遁起天罡太乙勝先小吉傳送從魁河魁登明神后大吉功曹太街空亡時甲已日申酉時乙庚日午未時丙辛日辰巳時丁壬日寅卯時戊癸日子丑時天門開閉時陽日隂時開陽時閉子寅辰午申戍為陽日隂日陽時開隂時閉丑卯巳未酉亥為隂日無上黃籙大齋立成儀卷之二
