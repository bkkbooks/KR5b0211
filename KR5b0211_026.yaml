front:
  text: 無上黃籙大齋立成儀卷之二十六竹六
  hash: sha256:1b6e82e0339ee3c0eb0d0988f93a5206f1af294bbae018e1b399b2c788aeedce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_026-001a, image: hfl/0283/0283-148.png}
body:
  text: 太上執法仙士䉃叔輿修科儀門召靈儀先備香花案一隻於鬼門上以召魂幡置於案前請齋官上香道衆序立舉普獻頌法師上香啓白具法位臣某焚香上奏三清三境十極十華大道慈尊諸天大聖日官月府北斗南辰五星三台地水嶽瀆十方三界應感真靈仗此真香普同供養香乃玉華散景九氣凝煙香雲密羅徑衝九天當願侍香金童傳言玉女上聞帝前令臣所啓咸賜如言臣今伏為齋主某正薦亡親某乙普薦在會衆魂崇建無上黃籙大齋三日三夜除巳謄詞帝闕請命歸尊奏告十方關盟三界見今齋壇宿啓勝範宣流仰望慈悲俯垂開濟持頒敕命普告靈司召攝亡魂來臨法會領諸善果超化生方臣謹滌慮𡨋心仰祈真應法師存變步神虎罡召神謹召北魃玄範府神虎提魂攝魄倒生玄司玉女等雄左玉曹玄伯雌右武鸞主吏上部追魂使者中部追魂使者下部追魂使者霄輔助精大神七道功曹呼吸魂魄精光吏兵等社令城隍五道土地導善衆神仰聞今召火急到來本壇奉為齋主某官某開建黃籙大齋正普薦亡親某乙在會衆魂解除業纍超證生方除已奏告諸天關盟十極欲得所薦亡靈親魂正魄來詣壇所祗受齋功於今月某日時告行太一混元神虎玉札一道前去生方死所預行追攝外以今恭遵玉格修奉寶齋合要上件亡魂前赴靈壇依科開度伏請神虎二大聖三部追魂使者七玉女等火急遍詣三界十方千真萬靈效職之所追取某魂攝赴靈幡之上參真聽法受化更生無或稽違有妨開度如普薦於此宣單名甲狀焚召魂大將軍符師密呪曰靈寶符命拔度亡過某等出離地獄永辭長夜五苦三塗不得拘留逼合鬼群斷落死名急急如長生大帝律令再祝曰吾代天行化度死濟生藉汝靈通輔吾正法所是亡魂等或在人天或墮鬼趣或拘考對或繫幽隂並請依準上玄符命玉札天文追取魂神疾速赴壇昭顯儀形通接陽春用揚大教取信群生一準玄科玉律奉行不得違滯次令純陽小童執幡當職道士攝召如儀焚二大聖符師默祝曰雄左玉曹玄伯雌右武鸞主吏我今攝召亡過某乙等魂速赴靈幡不得稽延何昌喬荀輔我身神我令所下急速奉行急急攝召時法師變身為太一天尊自本師訣歷至二旨甲下歸上帝訣掐入亡人本命上取鬼門氣吹幡志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法會和受此黃籙開度功德歌斗章隂陽推運兮劫數更遷生死周流兮孰愚孰賢輪轉無窮兮上元造化未出三界兮拘於神變魁𩲃東斗兮𩳐魒西轉𩵄𩳐南斗兮䰢北面隂靈兮茫茫沒沒陽魂兮碌碌幽幽天地𡨋兮萬鬼潛天地動兮萬鬼爽隂陽運兮鬼神享太一召兮何遲遲先至後至律有常感此仿徨赴我壇賜汝靈書歸上清法師掐攝魂訣密呪曰訣見修用祕旨門興生獨𨽻可韓功都聚魂對魂攝再祝曰魂神澄正萬氣長存不經苦惱身有光明復聚本形復全本神急急如長生大帝律令三遍取北氣吹幡上營目存到法師平讀呪曰胎光幽精爽靈三魂歸空歸真天地正真氣再聚汝形神此是五行造化真無藏無避無逃形一呼速至變真靈急急如律令當職道士再召志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂和分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法會和受此黃籙開度功德歌斗章陽神返汝殘隂靈逐我幡北斗天蓬敕玄武開幽關三魂無散失七魄莫傾殘乘此金符力攝汝赴靈壇願承無上道賜汝歸飛升法師默誦五帝真諱呪曰襪臘墨黑靈寶紅杏磨真急急如長生大帝勑奉行取五嶽氣吹之再默誦度魂真諱呪曰興生獨𨽻可韓功都聚魂對魂攝急急如長生大帝勑奉行取三塗氣吹之法師平讀曰一氣生萬物萬物分一氣吾復統一氣再使萬物生故知一氣中不復失吾意攝召汝亡靈諦聽慈悲旨次當職道士三召志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂和分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法會和受此黃籙開度功德歌廽黃章太微廽簧旗無英命靈幡攝召長夜府開度受生魂和不可思議功德師行持平讀曰三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清師焚治病功曹符召五神混合符祝曰焚香上啓青帝護魂君白帝侍魄君赤帝養氣君黑帝通血君黃帝中主君天醫大聖六職治官尚藥仙靈二官神吏生形博士治病功曹收毒將軍敷藥靈官砭石小吏扁鵲官吏仙藥童子拘魂制魄生化大將軍一切靈司並請慈悲降臨壇所奉為見前受度衆魂攝降真氣醫治病苦返生魂魄整具形神一如太上律令師行五府事默誦五帝真諱行持法師祝曰吾今奉為齋主某正普薦亡親某人在會衆魂開建無上黃籙大齋今故召攝齋主合家所薦亡魂暨九祖七玄父母妻子若兄弟若姊妹若姪孫近屬旁親內宗外戚凡名眷屬以及姻蘿負命負財負恩負德生前殁後一切𡨚讎俱屆道場普受開度我以道力能令汝等歡喜自在來赴道場汝宜靜念在心勿生恐怖我此齋法名曰平等若不除三毒尚蔽六情人我𡨚親妄生分别則於平等無有是處應以男子身來者分列于左應以女子身來者分列於右各相擕率隨幡而來入浴更衣朝壇聽法清衆虔誠隱語迎導靈書引亡魂至沐浴所一人以楊栁枝淨水沿路灑穢沐浴亡靈儀先於浴室內嚴潔辦香水浴室二所浴具所需之物一一備足仍以乾淨水桶貯淨水置在大道前法師引道衆詣於香案前上香道衆依班序立法師啓白請水具法位臣某焚香上啓三寶師尊十方大聖五老上帝三十二天帝君日月五星君東井星君黃籙合會應感威靈臣聞死魂受錬開明必假於真筌穢氣紛葩蕩滌須資於法水將期濟度合具奏陳臣今奉為齋主某崇建無上黃籙大齋正薦亡親某人普薦在會衆魂謹遵科式召集靈儀先與蕩滌形神然後參朝壇陛懴雪罪垢超證生方願賜慈悲俯垂開度降流真氣昭錫天光普今受度之衆魂俱沐重玄之睿澤臣無任虔禱之至次以杓攪水自月建起大衆同聲誦隱語隨聲攪三十二轉畢師回向巍巍道德尊功行巳圓齊降身來接引師寶自相擕慈悲惠法水用以洗愚迷永度三塗岸長辭五濁泥即將向來請水無量殊因並用蕩滌亡過某靈一切罪根普令清淨為如上緣念大聖元始天尊太上大道君太上老君十方救苦天尊不可思議功德天河灌沐天尊引至浴室分所請水入男女浴室仍煎玉香湯相雜令溫和得所當職道士行科三塗熱惱慿法澤以清涼五纍牽纏仗靈津而澡雪故我天尊哀愍大道慈仁潦漉衆生濟度諸苦啓熏修之妙典垂灌錬之明科俾沐浴於華池獲逍遙於道岸然後形神俱妙福慶自生奉請亡靈虔誠就浴舉東井頌衆和法師存五色雲氣滿室三十二天日月五星之氣交錯水中天河灌東井石景水母精圓光拂靈曜玄暉瑩髙明元始披重夜天人逐月生沐浴蘭池上龍負長庚瓶金童灑香花玉女流五星冠帶濯玉津錬度五仙形體香萬神降乘景登髙清長夜光明雖自靈符之度苦善功充滿猶資香水以錬精庶兹五藴之形軀獲奉重玄之教戒請法衆等各運清淨心奉為亡靈誦三元品誡沐浴蕩穢呪天氣澄清五色髙明日月吐輝濯錬身形神津內盥香湯錬精光景洞耀煥映上清氣不受塵五府納靈罪滅三塗禍消九冥身受開度升入帝庭蕩形錬質名書紫䇿之中度命返生字列玉清之上欲使魂神之澄正當令罪垢之消除請法衆等各運利益心奉為亡靈誦九真沐浴錬真呪太上髙真九靈之精使魂飛仙上登紫庭沐浴華池神身澄清精通太虛萬氣自生啓東極之尊普度生而濟死激丹華之水悉除穢以蕩隂庶永奉於正真克常行於清靜請法衆等各運廣大心奉為亡靈誦沐浴丹陽鍊度大呪龍漢蕩蕩無形無名渺渺億劫皇道開清神燈朗耀九魂吐精玉虛澄輝太霞高明元始開化諸天齊靈三元導養二象攝生巳度者度未成者成巳死即化巳枯即榮蠢動蛹飛一切𡨋靈懷胎含孕咸得受生亡靈過命魂歸三清魄受鍊度南官變形今日大吉皆得光明五帝鑒映普告萬靈天地神祇及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大聖至真尊神無極無窮普監度生地根斷絶玄都記名衆神並映一切咸聽九清玉座延上帝之恩光三洞金書演慈尊之法語夫豈塵凡之可望類非穢濁之得聞既潔身形必嚴服飾諸法衆等各運莊嚴心奉為亡靈誦三元品誡冠帶呪五濁巳清八景巳明今日受鍊罪滅福生長與五帝齊真上靈焚朝真衣等五宮六府內疏淪於群迷九竅百骸外滌除於諸垢斯可詣壇聽法謝罪除愆受禁戒以絶惡根度威光而識宿命拔出地户上生天堂奉為亡靈皈依以俟法事引靈歸位呪食儀先於靈位前設飲食淨水香供養如儀上香宣白金飯玉漿餌之者陟九清之境交梨火棗食之者離五夜之鄉非道力之攸資豈法橋之可度亡過某靈奄隨逝水俄歷流光將逢開泰之期虔備潔馨之薦敬憑淨侣式按沖科宣寶偈以加持演靈章而受記伏願魂神不昧儼若生存享此齋功克成妙道十方救苦天尊結五嶽印祝白奉為亡靈上資往生天界念玉清慧命啓諸呪稽首𡨋慧虛無尊稽首歸命重玄主裁成天地無德稱悉為衆生作恃怙慈濟五道轉輪魂哀救三魂地獄苦服命金闕天中尊皈命六度慈悲父皈命玉清無上真以離生死長綿綿出有入虛無所待能令枯朽變成仙千劫萬劫難一遇為衆廣説業因緣回骸起死永長存使其形神無變遷出玉清經太一救苦天尊衆和三聲後相同切聞酆都幽逺地獄昏𡨋亡魂谷假於薦揚寶偈宜光於讚詠今有淨酆都破地獄法言即當諷誦奉為亡靈上資往生天界念淨酆都破地獄呪茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲旙定慧青蓮花上生神永安九幽拔罪天尊既巳地獄門開酆都罷對隨所託化出離幽隂今有玉清梵唱生魂育魄法言即當諷詠奉為亡靈上資往生天界念玉清雲官梵唱生魂育魄呪靈芝無根衆化之原中凝亡魄上結三魂二十四真出入無門杳𡨋之中恍愡元精隨劫存亡逐氣而生外凝混朴內養七經五神植華三台敷榮紫闕素童返形歸嬰騰雲而升騁霧浮空中有玉真號曰神公左挾無英右衛白元玄獸遏後丹禽擁前上浮翠蓋下湧金蓮香雲凝空甘露無窮用之無盡尋源不終出王清經朱陵度命天尊此者魂魄既生必超天路錬度形質浣濯神儀來赴法筵受兹供養尚慮喉顙未通有諸障礙今有甘露通真法言即當諷誦奉為亡靈上資往生天界念甘露通真法食呪功德金色光微微開幽關華池流真香蓮蓋隨雲浮千靈重元和常居十二樓怠宣靈寶旨自在天堂逰天尊言此神呪若亡人久拘地獄未遂超生如聞此呪即得喉顙開通無有障礙自然快樂飲食甘香生回向心絶煩惱業逍遙快樂天尊元始開圖真經演教流恩有截普度無窮以能廣潤衆生故名甘露以能破除業障故曰法言今詣靈筵受霑法食慈光照燭惠露霑濡孔竅既巳開聰神識目當明了超離五苦經陟九清再仗真筌永充濟拔今有玉清三光無上法言即當諷泳奉為亡靈上資往生天界念玉清甘露法食呪稽首仰圓羅合景揖靈芒拘魂制七魄思審定中央行住禮虛無寢息宴玄房飢餐黃蘖花渴飲瓊根漿神旌命大魔合體鍊真光復照觀太無恆在空中遊圓通泯波濟真化靡中期窅眇無終始行者當明知寂𡪹忘理教應運闡宏規降道不自昭要當先所施會歸無二處隨心自合離出玉清經不可思議功德衆和三聲後同奉為亡靈上資往生天界念三光法氣法食呪以下四呪出導引三光九變經浩晶生法氣氤氲凝玄中兩曜共澄徹五緯交相通三光煥巳明寶氣盈三宫帝鄉會九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫夀無窮奉為亡靈上資往生天界念三光流精法食呪妙道分一氣氣中分隂陽凝化日月星燦然流三光九華合九道八色怡八方煥爛洞真體流精歸太茫下生淵泉宫上列無何鄉縱體復飛迹匆然都相忘七寶流精潔混沌雜華芒咽服九雲散此樂殊未央奉為亡靈上資往生天界念三光澤嬰法食呪玄絶九氣中澤嬰生太無鬱儀煥暘谷結璘曜天衢五星流寶光丰極回乾樞飛氣鬱勃散咽御方踟蹰超迹天寶階鍊芝服華敷氣布萬神備舉形升太虛奉為亡靈上資往生天界念三光陽玉法食呪陽玉正真氣妙真三景分玄和唱靈音八會敷瓊文五老宴丹宅飄飄乘景雲大聖諸天衆駕龍飲玉津三五定生籍遊戲太上賔華光朗無際携手朝帝宸奉為亡靈上資往生天界念九幽往生呪寒庭多悲苦回心禮元皇女青靈寶符中山真帝書一念升太清默誦觀太無功歸九幽下旋旋生紫虛隨願往生天尊奉為亡靈上資往生天界念離苦升天呪功德不思議行者生福報施與法飲食永生安樂道弘濟無邊天尊向來宣演靈章加持法食乃玉清祕旨甘露法言奉為亡靈追修淨界以兹善利遍悉裝嚴伏願名記丹臺罪消黑藉永罷三途之對徑登九老之鄉咽浩氣於元房飲瓊漿於丹宅慶流門閥福蔭索技上極光明下窮幽昧同臻衆妙共證無為稽首皈依無極大道回向念善右世科有五種名香六種珍果七種寶漿五種寶花四種香飯雖本玉清經然用之無謂徒為美觀夜晷有限今悉刪去無上黃籙大齋立成儀卷之二十六
