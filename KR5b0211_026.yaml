front:
  text: 无上黄籙大齋立成儀卷之二十六竹六
  hash: sha256:37a477940bb1e047e9b141d8f3a8832c3fc72c5a11b31af5fc109296f9f0e977
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_026-001a, image: hfl/0283/0283-148.png}
body:
  text: 太上執法仙士䉃叔輿修科儀門召靈儀先備香花案一隻於鬼門上以召魂旛置於案前請齋官上香道衆序立舉普獻頌法師上香啓白具法位臣某焚香上奏三清三境十極十華大道慈尊諸天大聖日官月府北斗南辰五星三台地水嶽瀆十方三界應感眞靈仗此眞香普同供養香乃玉華散景九炁凝烟香雲宻羅俓衝九天當願侍香金童傳言玉女上聞帝前令臣所啓咸賜如言臣今伏爲齋主某正薦亡親某乙普薦在會衆魂崇建无上黃籙大齋三日三夜除巳謄詞帝闕請命歸尊奏告十方關盟三界見今齋壇宿啓勝範宣流仰望慈悲俯垂開濟持頒敕命普告靈司召攝亡魂來臨法㑹領諸善果超化生方臣謹滌慮𡨋心仰祈眞應法師存變歩神虎罡召神謹召北魃玄範府神虎提魂攝魄倒生玄司玉女等雄左玉曹玄伯雌右武鸞主吏上部追魂使者中部追魂使者下部追魂使者霄輔助精大神七道功曹呼吸魂魄精光吏兵等社令城隍五道土地導善衆神仰聞今召火急到來本壇奉爲齋主某官某開建黄籙大齋正普薦亡親某乙在㑹衆魂解除業累超證生方除已奏告諸天關盟十極欲得所薦亡靈親魂正魄來詣壇所祗受齋功於今月某日時告行太一混元神虎玉札一道前去生方死所預行追攝外以今恭遵玉格修奉寳齋合要上件亡魂前赴靈壇依科開度伏請神虎二大聖三部追魂使者七玉女等火急徧詣三界十方千眞萬靈效職之所追取某魂攝赴靈旛之上叅眞聽法受化更生無或稽違有妨開度如普薦於此宣單名甲狀焚召魂大將軍符師宻呪曰靈寳符命拔度亡過某等出離地獄永辭長夜五苦三塗不得拘留逼合鬼群斷落死名急急如長生大帝律令再祝曰吾代天行化度死濟生藉汝靈通輔吾正法所是亡魂等或在人天或墮鬼趣或拘考對或繫幽隂並請依準上玄符命玉札天文追取魂神疾速赴壇昭顯儀形通接陽春用揚大教取信群生一準玄科玉律奉行不得違滯次令純陽小童執旛當職道士攝召如儀焚二大聖符師黙祝曰雄左玉曹玄伯雌右武鸞主吏我今攝召亡過某乙等魂速赴靈旛不得稽延何昌喬荀輔我身神我令所下急速奉行急急攝召時法師變身爲太一天尊自本師訣歷至二旨甲下歸上帝訣掐入亡人本命上取鬼門炁吹旛志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法會和受此黄籙開度功德歌斗章隂陽推運𠔃劫數更遷生死周流𠔃孰愚孰賢輪轉無窮𠔃上元造化未出三界𠔃拘於神變魁𩲃東斗𠔃𩳐魒西轉𩵄𩳐南斗𠔃䰢北面隂靈𠔃茫茫没没陽魂𠔃碌碌幽幽天地𡨋𠔃萬鬼潜天地動𠔃萬鬼爽隂陽運𠔃鬼神享太一召𠔃何遲遲先至後至律有常感此仿徨赴我壇賜汝靈書歸上清法師掐攝魂訣宻呪曰訣見修用祕旨門興生獨𨽻可韓功都聚魂對魂攝再祝曰魂神澄正萬炁長存不經苦惱身有光明復聚本形復全本神急急如長生大帝律令三徧取北炁吹旛上營目存到法師平讀呪曰胎光幽精爽靈三魂歸空歸眞天地正眞炁再聚汝形神此是五行造化眞無藏無避無逃形一呼速至變眞靈急急如律令當職道士再召志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂和分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法㑹和受此黃籙開度功德歌斗章陽神返汝殘隂靈逐我旛北斗天蓬敕玄武開幽關三魂無散失七魄莫傾殘乗此金符力攝汝赴靈壇願承無上道賜汝歸飛昇法師黙誦五帝眞諱呪曰襪臘墨黒靈寳紅杏磨眞急急如長生大帝勑奉行取五嶽炁吹之再黙誦度魂眞諱呪曰興生獨𨽻可韓功都聚魂對魂攝急急如長生大帝勑奉行取三塗炁吹之法師平讀曰一炁生萬物萬物分一炁吾復綂一炁再使萬物生故知一炁中不復失吾意攝召汝亡靈諦聽慈悲旨次當職道士三召志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂和分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法㑹和受此黃籙開度功德歌廽黃章太微廽簧旗無英命靈旛攝召長夜府開度受生魂和不可思議功德師行持平讀曰三官北酆明檢鬼營不得容隱金馬驛程普吿無窮萬神咸聽三界五帝列言上清師焚治病功曹符召五神混合符祝曰焚香上啓青帝護魂君白帝侍魄君赤帝養炁君黒帝通血君黄帝中主君天醫大聖六職治官尚藥仙靈二官神吏生形博士治病功曹收毒將軍敷藥靈官砭石小吏扁鵲官吏仙藥童子拘魂制魄生化大將軍一切靈司並請慈悲降臨壇所奉爲見前受度衆魂攝降眞炁醫治病苦返生魂魄整具形神一如太上律令師行五府事黙誦五帝眞諱行持法師祝曰吾今奉爲齋主某正普薦亡親某人在㑹衆魂開建无上黄籙大齋今故召攝齋主合家所薦亡魂暨九祖七玄父母妻子若兄弟若姊妹若姪孫近屬旁親内宗外戚凡名眷屬以及姻蘿負命負財負恩負德生前殁後一切𡨚讎俱届道場普受開度我以道力能令汝等懽喜自在來赴道場汝宜靜念在心勿生恐怖我此齋法名曰平等若不除三毒尚蔽六情人我𡨚親妄生分别則於平等無有是處應以男子身來者分列于左應以女子身來者分列於右各相擕率隨旛而來入浴更衣朝壇聽法清衆䖍誠隱語迎導靈書引亡魂至沐浴所一人以楊栁枝淨水沿路洒穢沐浴亡靈儀先於浴室内嚴潔辦香水浴室二所浴具所需之物一一備足仍以乾淨水桶貯淨水置在大道前法師引道衆詣於香案前上香道衆依班序立法師啓白請水具法位臣某焚香上啓三寳師尊十方大聖五老上帝三十二天帝君日月五星君東井星君黄籙合㑹應感威靈臣聞死魂受錬開明必假於眞筌穢炁紛葩蕩滌須資於法水將期濟度合具奏陳臣今奉爲齋主某崇建无上黄籙大齋正薦亡親某人普薦在會衆魂謹遵科式召集靈儀先與蕩滌形神然後叅朝壇陛懴雪罪垢超證生方願賜慈悲俯垂開度降流眞炁昭錫天光普今受度之衆魂俱沐重玄之睿澤臣無任䖍禱之至次以杓攪水自月建起大衆同聲誦隱語隨聲攪三十二轉畢師回向巍巍道德尊功行巳圓齊降身來接引師寳自相擕慈悲惠法水用以洗愚迷永度三塗岸長辭五濁泥即將向來請水無量殊因並用蕩滌亡過某靈一切罪根普令清淨為如上縁念大聖元始天尊太上大道君太上老君十方救苦天尊不可思議功德天河灌沐天尊引至浴室分所請水入男女浴室仍煎玉香湯相雜令温和得所當職道士行科三塗熱惱慿法澤以清涼五累牽纏仗靈津而澡雪故我天尊哀愍大道慈仁澇漉衆生濟度諸苦啓熏修之妙典垂灌錬之明科俾沐浴於華池獲逍遥於道岸然後形神俱妙福慶自生奉請亡靈䖍誠就浴舉東井頌衆和法師存五色雲炁滿室三十二天日月五星之炁交錯水中天河灌東井石景水母精圓光拂靈曜玄暉瑩髙明元始披重夜天人逐月生沐浴蘭池上龍負長庚瓶金童洒香花玉女流五星冠帶濯玉津錬度五仙形體香萬神降乗景登髙清長夜光明雖自靈符之度苦善功充滿猶資香水以錬精庶兹五藴之形軀獲奉重玄之教戒請法衆等各運清淨心奉爲亡靈誦三元品誡沐浴蕩穢呪天氣澄清五色髙明日月吐輝濯錬身形神津内盥香湯錬精光景洞耀煥映上清炁不受塵五府納靈罪㓕三塗禍消九㝠身受開度昇入帝庭蕩形錬質名書紫䇿之中度命返生字列玉清之上欲使魂神之澄正當令罪垢之消除請法衆等各運利益心奉爲亡靈誦九眞沐浴錬眞呪太上髙眞九靈之精使魂飛仙上登紫庭沐浴華池神身澄清精通太虚萬炁自生啓東極之尊普度生而濟死激丹華之水悉除穢以蕩隂庶永奉於正眞克常行於清靜請法衆等各運廣大心奉爲亡靈誦沐浴丹陽鍊度大呪龍漢蕩蕩無形無名𣺌𣺌億劫皇道開清神燈朗耀九魂吐精玉虚澄輝太霞高明元始開化諸天齊靈三元導養二象攝生巳度者度未成者成巳死即化巳枯即榮蠢動蛹飛一切𡨋靈懷胎含孕咸得受生亡靈過命魂歸三清魄受鍊度南官變形今日大吉皆得光明五帝鑒映普告萬靈天地神祇及諸河源五嶽四瀆及諸名山洞玄洞虚洞空洞仙無極大聖至眞尊神無極無窮普監度生地根斷絶玄都記名衆神並映一切咸聽九清玉座延上帝之恩光三洞金書演慈尊之法語夫豈塵凡之可望𩔖非穢濁之得聞旣潔身形必嚴服飾諸法衆等各運莊嚴心奉爲亡靈誦三元品誡冠帶呪五濁巳清八景巳明今日受鍊罪滅福生長與五帝齊眞上靈焚朝眞衣等五宮六府内䟽淪於群迷九竅百骸外滌除於諸垢斯可詣壇聽法謝罪除愆受禁戒以絶惡根度威光而識宿命拔出地户上生天堂奉爲亡靈皈依以俟法事引靈歸位呪食儀先於靈位前設飲食淨水香供養如儀上香宣白金飯玉漿餌之者陟九清之境交梨火棗食之者離五夜之郷非道力之攸資豈法橋之可度亡過某靈奄隨逝水俄歴流光將逢開泰之期䖍備潔馨之薦敬憑淨侣式按冲科宣寳偈以加持演靈章而受記伏願魂神不昧儼若生存享此齋功克成妙道十方救苦天尊結五嶽印祝白奉爲亡靈上資徃生天界念玉清慧命啓諸呪稽首𡨋慧虚無尊稽首歸命重玄主裁成天地無德稱悉爲衆生作恃怙慈濟五道轉輪魂哀救三魂地獄苦服命金闕天中尊皈命六度慈悲父皈命玉清無上眞以離生死長綿綿出有入虚無所待能令枯朽變成仙千劫萬劫難一遇爲衆廣説業因縁廻骸起死永長存使其形神無變遷岀玉清經太一救苦天尊衆和三聲後相同切聞酆都幽逺地獄昏𡨋亡魂谷假於薦揚寳偈宜光於讚詠今有淨酆都破地獄法言即當諷誦奉爲亡靈上資徃生天界念淨酆都破地獄呪茫茫酆都中重重金剛山靈寳無量光洞照炎池煩七祖諸幽魂身隨香雲旙定慧青蓮花上生神永安九幽拔罪天尊旣巳地獄門開酆都罷對隨所託化岀離幽隂今有玉清梵唱生魂育魄法言即當諷詠奉爲亡靈上資徃生天界念玉清雲官梵唱生魂育魄呪靈芝無根衆化之原中凝亡魄上結三魂二十四眞出入無門杳𡨋之中恍愡元精隨劫存亡逐炁而生外凝混樸内養七經五神植華三台敷榮紫闕素童返形歸嬰騰雲而升騁霧浮空中有玉眞號曰神公左挾無英右衞白元玄獸遏後丹禽擁前上浮翠盖下湧金蓮香雲凝空甘露無窮用之無盡㝷源不終岀王清經朱陵度命天尊此者魂魄旣生必超天路錬度形質浣濯神儀來赴法筵受兹供養尚慮喉顙未通有諸障礙今有甘露通眞法言即當諷誦奉爲亡靈上資徃生天界念甘露通眞法食呪功德金色光微微開幽關華池流眞香蓮蓋隨雲浮千靈重元和常居十二樓怠宣靈寳㫖自在天堂逰天尊言此神呪若亡人乆拘地獄未遂超生如聞此呪即得喉顙開通無有障礙自然快樂飲食甘香生回向心絶煩惱業逍遥快樂天尊元始開圖眞經演教流恩有截普度無窮以能廣潤衆生故名甘露以能破除業障故曰法言今詣靈筵受霑法食慈光照燭惠露霑濡孔竅旣巳開聦神識目當明了超離五苦經陟九清再仗眞筌永充濟拔今有玉清三光無上法言即當諷泳奉爲亡靈上資徃生天界念玉清甘露法食呪稽首仰圓羅合景揖靈芒拘魂制七魄思審定中央行住禮虚無寢息宴玄房飢飡黄蘖花渇飲瓊根漿神旌命大魔合體鍊眞光復照觀太無恒在空中遊圓通泯波濟眞化靡中期窅眇無終始行者當明知寂𡪹忘理教應運闡宏䂓降道不自昭要當先所施㑹歸無二處隨心自合離出玉清經不可思議功德衆和三聲後同奉爲亡靈上資徃生天界念三光法炁法食呪以下四呪出導引三光九變經浩晶生法炁氤氲凝玄中兩曜共澄徹五緯交相通三光煥巳明寳氣盈三宫帝郷㑹九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫夀無窮奉爲亡靈上資徃生天界念三光流精法食呪妙道分一炁炁中分隂陽凝化日月星燦然流三光九華合九道八色怡八方煥爛洞眞體流精歸太茫下生淵泉宫上列無何郷縱體復飛跡怱然都相忘七寳流精潔混沌雜華芒咽服九雲散此樂殊未央奉爲亡靈上資徃生天界念三光澤嬰法食呪玄絶九炁中澤嬰生太無鬱儀煥暘谷結璘曜天衢五星流寳光丰極回乾樞飛炁鬱勃散咽御方踟蹰超跡天寳階鍊芝服華敷炁布萬神備舉形升太虚奉爲亡靈上資徃生天界念三光陽玉法食呪陽玉正眞炁妙眞三景分玄和唱靈音八會敷瓊文五老宴丹宅飄飄乗景雲大聖諸天衆駕龍飲玉津三五定生籍遊戲太上賔華光朗無際携手朝帝宸奉爲亡靈上資徃生天界念九幽徃生呪寒庭多悲苦回心禮元皇女青靈寳符中山眞帝書一念昇太清默誦觀太無功歸九幽下旋旋生紫虚隨願徃生天尊奉爲亡靈上資徃生天界念離苦升天呪功德不思議行者生福報施與法飲食永生安樂道弘濟無邊天尊向來宣演靈章加持法食乃玉清祕㫖甘露法言奉爲亡靈追修淨界以兹善利遍悉裝嚴伏願名記丹臺罪消黒藉永罷三途之對徑登九老之郷咽浩炁於元房飲瓊漿於丹宅慶流門閥福䕃索技上極光明下窮幽昧同臻衆妙共證無爲稽首皈依無極大道回向念善右世科有五種名香六種珍果七種寳漿五種寳花四種香飯雖本玉清經然用之無謂徒爲美觀夜晷有限今悉刪去无上黄籙大齋立成儀卷之二十六
