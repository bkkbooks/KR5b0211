body:
  text: 太上執法仙士蔣叔與編集雜門經賫帳狀一齊壇上層方廣二丈浙尺淮尺一丈六尺中層方廣三丈二尺淮尺二丈六尺下層方廣四丈淮尺三丈二尺每層髙一尺二寸或一尺五寸為則梵氣牌八橫造各闊九寸髙五寸為則青一赤一白一黑一黃一裝綵如法門牌十四青三赤二白三黑二黃四裝綵如法門楣三十條隨壇門闊狹為則日月雲板三十片門楣上兩旁用之壇纂八十一枚長纂三十五枚長一丈短纂四十六枚長七尺蓮花頭八十一箇纂頭上用絳繩五百尺三十二天幡三十二首五方幡五首小雜色幡一百二十首開幡小花二百枝蓮花燈五十籠燈盞油心燭副之壇四圖三十六籠餘於壇外懸之蓮花燈纂六十六燈盞油心炷副之施於外壇上層十八中層二十二下層二十四門綦內之班序牌十四座依位安之上書都講監齊之類周天燈座一百六十以木車成高三寸為則燈盞油心炷副之周天燈牌八十一座木造黃紙上書燈名位三寶位御案一卓衣副之三寶牌三座上施蓋寶蓋一座結綵為之四圍皆垂小幡香爐一香合二花瓶二茶湯盞槖采盤三副湯瓶一副燭臺二十方天尊位香案十卓衣副之香爐十香盤十花瓶十茶湯盛槖果楪十副湯瓶一副燭臺十五方真文案五隻九時散花九盤髙功位駒十香案一卓衣副之燭臺二都門外香案一卓衣則之花瓶二香爐一香盤二燭臺二六幕位牌十四座香案六卓衣副之花瓶六香鱸六香盤六燭臺六燈六座茶湯盞槖果楪十四副湯瓶副之監臨所位牌五座香爐二香案二卓衣副之香盤二花瓶二燭臺二燈二座齊壇鎮信綵一百三十六尺青繒九紅繒白繒七曽丘曽繒三十二黃繒八十命繒各隨本命之色一尺公侯以紫金龍十條公候以為之士以銅塗金玉璧十片米一斛二斗或二斛四斗錢二貫四百或一貫一百公侯二十四貫或十二貫油二斗四升或一斗二升炭二十四斤或十二龍頭銀刀一柄木硯十箇墨十片筆十管紙十軸每軸十二幅投簡金龍三條玉璧三片青一圓造黃一圓造黑一六花中皆通竅徑三寸六分或二寸四分金鈕二十七隻鈕銅皆可徑一寸二分中空青絲一兩二錢以繫金鈕白槿未簡三片各長一尺二寸闊二寸四分厚二分封簡袋三枚青一黃一黑一或羅或絹或紗皆可為之靜默堂位牌三座香案一卓衣副之燭臺二茶湯盞槖果楪三副燈二座花瓶二香爐一香合一講座一座椅十四隻長案二水盆二茶湯盞槖十四副香湯逐日升壇盥潄用之最不可缺手巾二一造諸幡告盟幡黃絹造長四十九尺上垂寶蓋木老鴉幡竿繩木副之遷神旙黃絹造長四十九尺太一旙黃絹造長四十九尺命靈旙黃絹造長一丈二尺超度幡黃絹造長一丈二尺回耀旙紅絹造長九尺若寒棲之士方不及者止造告盟遷神回耀旙亦可五方旙五首五色繒夾為之長五尺法師當自備不可重費齊家三十二天小旙同此三十二天幡三十二首東青南赤西白北黑各入以繒夾之長二尺二寸或隨天色為九色九獄燈幡九首青紙造長四尺九寸破獄九天幡九首黃紙造長四尺九寸回耀燈小旙四十九首紙為之黃白相間召攝旙二首白絹十尺二寸中分為之長三尺六寸夾進正度普度各一旙一章信啓告玄穹章紙一張筆墨硯一副書刀一口金魚一杖以銀為之重半兩或三錢二錢玉鴈一隻香五兩柴五十斤炭五十斤鹽一斤䜴一斤無豉以豆代油一斗二升米一石二斗錢一貫二百文淨巾二條命信若干尺自餘每章一通米五斗錢一貫二佰文紙筆墨硯如儀餘悉免或力乏不能備師為代出魚鴈書刀止輸命信或米或錢皆可一拜章每通合用寫章劄紙二十幅副章紙十幅章函一隻柏木或梓木造長一尺二寸八分闊二寸八分浙尺正中上下闍三印用池章案一隻豹腳造長二尺四寸髙八寸柏梓楠木為之黃羅卓衣一副褁章黃羅帕子一條校章銀龍頭書刀一柄金魚玉鴈各一隻餘章通同力乏之者師為代出寫章筆一管淨墨一片襯章綵一匹入章腦子隨意寫章信錢三貫小章二貫護章香一斤降真香從章醮三十六分金錢三十六貼雲馬三十六匹茶酒果各三十九分三清三分從章三十六分青絲繫章函用黃蠟二兩封章用章爐一外造拜言功表表函一及几一隻同章式寫表黃絹一丈四尺一丈二尺寫表二尺為可漏外備青絲黃蠟封表升天法橋朱陵火府錬度水火池五苦門龍童驛吏茭龍一角青色裝金龍兩用黃色裝童子二員一青一黃驛吏二人直符東一執斧一執副獄名牌九座回耀燈牌套四十九座鋪燈細沙一石懸旙小竹一束一幽魂斛食隨力設之或七或五或三茭郭一所闍門六道前齊食六分多則尤妙香案燈燭隨冝改之六道六浴室二所盆灼巾澡豆浴具之類副之冥衣冥財駝馬經幡符簡金銀綵繒一正薦亡位符簡二面符誥籙劵黃絹二丈黃紙十幅黃綾一尺誥籙表首用之經帶青經簽浴具冥衣雲厨法食冥財駝轎金銀綵繒經旙自餘亡位及經韓等並隨齊主意一供養關發預告茶酒果子二十四分金錢二十四貼從馬二十四匹金銀錢二貼馬三匹關發正奏茶酒果子三十六分金錢三十六貼從馬三十六匹金銀錢五貼馬五匹告符命金錢十二貼馬十二匹發玉札茶酒果子十二分金錢十三貼從馬十二匹發開啓疏及六幕疏金錢十五貼從馬十五匹靜默師堂前茶湯三分果子九楪監臨所茶湯五分果子十五楪六幕茶湯十四分果子四十二楪三日正齊九時行道每朝茶湯三十二分果子九十六楪三寶三十方十六幕十四監臨五茶湯每朝一換果子每日一換關發謝恩清醮茶酒果子三十六分金錢從馬三十六分投山水簡每處茶酒各二十四分金錢從馬二十四分鍊度每次茶酒果子三十六分金錢三十六貼從馬三十六匹符命符簡以柏未為之梓木亦可符簡四面二面長九寸闍二寸四分二面長九寸闍三寸六分厚二分一黃經紙二幅書生天寶籙九龍符用青紙八幅五方真文五幅歷關諸天狀一幅左右劵二幅皆用青詞紙白熟紙三寸六分薄紙背過書玉丸用符命可漏青紙三幅玉札生天籙可漏方函黃紙一幅保舉狀黃紙四幅內一幅作可漏九獄燈旙青紙三十幅黃紙十五幅三塗五苦誥黃紙十二幅內四幅作方函可漏用書印開度符命黃紙五十幅青紙二幅寶誥長生度命籙黃絹一丈一尺黃綾一尺五寸朱砂一兩銀朱四兩一諸色旙絹等數告盟遷神太一命靈超度旙五首總用黃絹十七丈一尺如不立太一命靈超度三旙止用黃絹九丈八尺回耀旙一首緋九尺召攝旙二首白熟絹七尺二寸玉札白熟絹三尺六寸黃羅五丈章几衣及袱用黃道絹一匹表籙黃絹二丈六尺一文字紙數預告奏狀五通申狀六通牒三道關二紙引二紙錢馬單狀三紙劄子紙十三幅每一幅作可漏六箇大狀紙六幅方函用截半為之黃紙半幅貼黃及黃簽用狀紙十八幅關牒一道用紙一幅封皮可漏用紙半幅正奏奏狀二十四通申狀四十六通帳狀四通牒四十三道關劄引十道錢馬單狀三紙劄紙九十幅大狀紙三十五幅狀紙一百三十幅黃紙三幅開啓疏九通結盟三紙職狀一紙榜九道劄紙三十幅大狀紙六幅方函用之狀紙一百張榜用黃紙半幅開度滿散錬度表一通疏二通斛疏一通薦亡疏三通功德都疏一通發詞疏引進狀二通破獄關子一道神虎甲狀發劵關牒三道普召牒一道追取防送關子二道發玉札關子二道戒牒功德牒二道發青詞關子二道發詞疏關子二道劄紙二十幅大狀紙二幅狀紙二十幅投簡奏謝青詞一通引進狀一通奏狀二通申狀四通謝疏二通牒五道照劄四紙關子二紙單狀三紙青詞紙二幅劄紙十二幅大狀紙四幅方函用狀紙二十幅巳上奏申展劄共一百六十五幅預告十三幅正奏九十幅開啓六幕三十幅錬度設斛度亡二十幅投簡奏謝十二幅方函大狀紙共五十三幅預告六幅正奏三十五幅開啓六幅開度滿散二幅投簡奏謝四幅關牒狀紙共三百幅預告十八幅正奏一百三十幅開啓百幅開度滿散三十二幅投簡奏謝二十幅黃紙九十幅內上等厚黃紙二十四幅書符命簽黃用預告半幅正奏三幅開啓半幅符命二十幅又五十幅燈幡紙十六幅青詞紙四幅正齊二幅升天劵二幅福州青紙三十八幅符命八幅獄燈幡三十幅書章紙一百二十幅百幅亦可用副章紙六十幅安鎮紙一百二十幅一醮筵紙數三百六十分料大奏請狀十通奏請狀三十四通申請狀二百五十四通上請狀六十二通關子二道青詞四通引進狀一通關子一道進狀十通引進狀一通奏獻狀三十四通獻狀二百五十四通上獻狀六十二通關子二道巳上上等狀紙三十幅大狀紙五幅次等狀紙八十幅中等狀紙六百一十幅次中等狀紙一百五十幅青詞紙八幅關子紙三十幅黃紙五幅黃簽用一錬度堂神虎堂受度堂及醮筵內外除醮具錢馬有定數外自餘几案之屬量屋宇關狹設之卓子約用一百隻卓衣副之燭臺六十隻燈五十碗香爐三十隻醮器三百六十副湯瓶二十隻酒注二十隻一齊壇油燭數齊壇六幕監臨靖室每夜用燭三十條宿啓正齊通四夜合用大燭一百二十條小燭倍用召靈懴燈設斛錬度傳戒度靈共用大燭六十條周天燈一百六十盞每盞用油八文重一夜用油八斤四夜今用油三十二斤蓮花燈纂百六十盞諸幕內外二十四盞共一百四十盞一夜用油七斤四夜合用油二十八斤齊壇香數齊主有力者好香多尤妙降真香二十五斤檀香五斤箋香三斤速香沉香和香須自合者可用轉經懴燈攝召開度降真香五斤箋香一斤護章降真香五斤一醮筵香燭大燭一百二十條油五斤散花一盤降真香五斤檀香三斤箋香三斤速香一斤沉香印香須自合為淨一諸色錢馬數醮在外金錢四百七十四分金銀錢十分雲馬四百七十四匹步馬七匹預告二十六分正奏四十一分告符十二分發玉札十二分發開啓疏十五分謝恩清醮三十六分投山水簡四十八分錬度二次七十二分破獄告符三分拜章六通共二百一十六分一醮筵車輦錢馬數上帝龍車九乘鳳輦二乘后土金帝尊散位龍車三十三乘金錢三百六十分雲馬二百八十六匹步馬三十匹冥官用一齊壇內外諸色供養總計茶四十四兩棗三百一十箇酒六斗時果八百十六楪啓齊立幕茶湯二十二分果子六十六楪正齊諸幕每朝茶湯三十二分每日果子九十六楪總用細茶棗湯三百一十分果子三百五十四楪茶十六兩肥棗三百一十箇時果三百五十四楪一關發投簡供養茶酒果子二百二十八分預告二十四分正奏三十六分發玉札十二分清醮三十六分山水簡四十八分錬度七十二分茶十二兩酒三斗果子二百二十八楪拜章供養茶酒果子二百三十四分齊壇章六通每章一通供養三十九分茶十二兩酒三斗果子二百七十楪金錢二百一十六分雲馬二百一十六匹如法師或併合上章則供錢馬等件亦可從省一醮筵三百六十分料茶二十兩酒五斗果子四百八十楪總數齊壇門牌十四梵氣牌八門楣三十條日月雲版三十斤壇纂八十一枚蓮花頭八十一箇絳繩五百尺花二百朵蓮花燈五十籠蓮花燈纂六十六班序牌十四座燈座一百六十箇燈牌八十一座三寶御案一隻十方香案十隻五方真文案五隻都門香案一隻六幕監臨香案八隻卓衣二十五條香爐香盤二十具花瓶二十三隻燈八座燭臺三十隻淨水盂二口鎮信綵十三丈六天命繒一匹金龍十三條玉璧十三斤槿木簡三片金鈕二十七隻青絲一兩二錢封簡袋三箇米一斛二斗錢二貫四伯油二斗四升炭二十四斤龍頭書刀一柄木硯十箇墨十片筆十管