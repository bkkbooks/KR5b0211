front:
  text: 元上黄籙大齋立成儀卷之四十二駒二
  hash: sha256:bec25ee92e04c04c39df25ece1ec77c51733e45f910ef91567f8fd6975134437
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_042-001a, image: hfl/0287/0287-042.png}
body:
  text: 太上執法仙士蔣叔輿編集符命門玉清開通道路符太乙飛符如普度用首名某等設斛云六道四生孤䰟滯魂等靈寳召魂大將軍符凡攝召公牒及催牒並粘一道玉清七道功曹符天道功曹地道功曹人道功曹仙道功曹神道功曹鬼道功曹業道功曹靈寳召五神混合符腦符目符耳符心符肝符脾符肺符腎符隂符胞符胎符結符節符血符精符氣符神符命符太上靈寳變食符玉清眞火合同符玉清真水合同符火府隱文玉清火鍊符玉清水鍊符混元十二炁混神三景眞符十二符各注將軍姓諱於符下用之一炁六元運陽化隂大將軍符生腎符二炁七變混元三景大將軍符生心符三炁八廻合元大將軍符生肝符四炁九光會靈大將軍符生肺符五炁十合隂陽大將軍符生脾符六炁十一變靈大將軍符生膀胱符七炁十二運化大將軍符生小腸符八炁十三陽光大將軍符生膽符九炁十四運度大將軍符生大腸符十炁十五成隂變陽大將軍符生胃符十一炁十六三景混成大將軍符生三焦符十二炁十七隂陽合靈大將軍符生心胞絡符无上黃籙大齋立成儀卷之四十二
