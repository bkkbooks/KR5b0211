front:
  text: 无上黄籙大齋立成儀卷之四十一駒一
  hash: sha256:733b66f629d6bc2292a526b0df25fcee7d7b12efca1a49c2981c176c1bf33ec9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_041-001a, image: hfl/0287/0287-004.png}
body:
  text: 太上執法仙士蔣叔輿編集符命門五方眞文玉字東方眞文太上靈寳東方八天自然玉字青帝九炁天文毎一行分作八宇書南方眞文太上靈寳南方八天自然玉字赤帝三炁天文西方眞文太上靈寳西方八天自然玉字白帝七炁天文北方眞文太上靈寳北方八天自然玉字黒帝五炁天文中央眞文太上靈寳大羅之天自然玉字黄帝一炁天文昇天四保舉符元始符命歴關諸天普告三界勑制地祇右劵背文左券背文洞玄靈寳長生度命黄籙太上洞玄靈寳長生度命無上黄籙維太歳某甲子某年某月某朔某日某辰郷貫某人伏爲亡親某人同青詞語至上謝天恩仍就黄籙齋壇乞傳授太上洞玄靈寳長生度命無上黄籙一階付某乙靈魂賫執過度三界超升九天謹按經云元始天尊昔在九清妙境三元宫中與諸天聖衆敷弘至妙開化人天標記善功注名黄籙金格玉簡陳列三清一一地獄皆見十方救苦天尊入於九幽㧞度諸苦天尊普告四衆汝等若能受持金籙白簡九眞妙戒長生靈符救苦眞符當消九幽大罪標名九宫察命童子護戒威神五帝直符六宫掾吏自當随逐簡文覆護受戒弟子今當爲汝顯說九眞妙戒金籙白簡受持功德救難濟苦神力難思衆靈稽首伏聽教命天尊告曰一者敬讓孝養父毋二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損巳六者不嗔𠒋怒淩人七者不詐謟賊害善八者不驕傲忽至眞九者不二奉戒專一護戒威神察命童子救苦眞符告文元始符命金籙白簡救苦眞符告下十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵司命司録司功司殺牛頭獄卒三界大魔㧞度某乙靈魂出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乗此九眞妙戒㧞度功德上生天堂一如告命某歳某年某月某朔某日某辰於黄籙齋壇告下百二十曹官長生靈符告文元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上官長生大君韓君司馬司命司録延夀益筭度厄尊神回骸起死監生大神超度某乙亡魂上登朱宫流火之庭玉眸錬質黄華蕩形書名紫䇿受化更生乗此金籙度命功德上生天堂一如告命某歳某年某月某朔某日某辰於黄籙齋壇告下廻骸起死尊神監生大神帝君品命受度亡過某乙靈魂即日恭詣黄籙齋壇拜受太上洞玄靈寳長生度命無上黄籙一階如法受持未充濟㧞人間天上敬信奉行一如玄科律令保舉師具法位姓押監度師具法位姓押度師具法位姓押太上洞玄靈寳長生度命无上黄籙其長生度命黄籙止正度亡魂用之餘不絡造籙用黄紙朱書玉堂本用青紙金書形色繪畫人物了畢方注亡靈名謂正度靈魂某乙六字注訖方作流火亭火錬符印押了畢以青紫或黄紅之屬標背用經帶軸頭如今宗壇籙檄亭中人物即火錬符也並依散形書之右出蔡致虚黄籙儀玉堂謂之金籙不如此備紫英靈書有無上盟眞玉匱南昌上宫黄籙止有籙文及南昌官吏中間疑有缺誤處不修入上清度三塗符上元滅慾斬尸變景流光玉符中元滅慾斬尸變景流光玉符下元滅慾斬尸變景流光玉符上清度五苦符解形遂變滅度五苦流景玉符解形逐變滅度五苦流景玉符解形逐變滅度五苦流景玉符解形逐變滅度五苦流景玉符解形逐變滅度五苦流景玉符上清四季投簡符春季夏季秋季冬季无上黄籙大齋立成儀卷之四十一
