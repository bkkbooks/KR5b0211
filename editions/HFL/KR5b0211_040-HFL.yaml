front:
  text: 无上黄籙大齋立成儀卷之四十白十
  hash: sha256:251433a6a3aa380c806b52df342e1c80937f9d9c8c44efca6b06e1e4f430888e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_040-001a, image: hfl/0286/0286-120.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編集符命門救苦眞符一曰柬華青宫九龍金籙長生靈符一曰南昌上宫紫微鍊眞之籙靈寳大法告長生符簡關金龍驛吏告救苦符簡關茭龍騎吏第符形多舛訛又所傳悉無呪訣故中表形修書不暇修入然世師承用旣久恐不可廢今附見于後乃林慧靈所修正者玄都茭龍騎吏符玄都金龍驛吏符好生韓君丈人度人不死之神南極長生之君度世司馬大神太上敕赦生天寳籙太上生天寳籙唵吽吒唎上三寸書符下六寸書告文告文分五行玉清㧞幽魂符玉清破地獄眞符東極青宫九龍符青宫大九龍符青玄破酆都符破九獄符東南西方方方北方中央東北東西西南南北酆都山眞形回光符三晨慧光符太乙混元玉札陽札子寅辰午申戌六陽日告札用隂札丑卯巳未酉亥六隂日告札用神虎二大聖符雄左玄伯雌右主吏神虎三部使者符一本書姓諱於符下上部中部下部太乙返眞攝魂符大魁緫監召靈符五方衞靈符東方南方西方北方中央五方鎭壇符東方南方西方北方中央太皇黄曽天柬方八天太明玉完天清明何童天玄胎平育天元明文舉天上明七曜摩夷天虚無越衡天太極濛翳天赤明和陽天南方八天玄眀恭華天曜明宗飄天竺落皇笳天虚明堂曜天觀明端靜天玄眀恭慶天太煥極瑶天元載孔昇天西方八天太安皇崖天顯定極風天始皇孝芒天太皇翁重浮容天無思江由天上揲阮樂天無極曇誓天皓庭霄度天北方八天淵通元洞天太素秀樂禁上天太文翰寵妙成天太虚無上常融天太釋玉隆騰勝天龍變梵度天太極平育賈奕天无上黄籙大齋立成儀卷之四十
