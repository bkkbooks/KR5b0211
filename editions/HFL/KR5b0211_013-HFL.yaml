front:
  text: 无上黃籙大齋立成儀卷之十三在三
  hash: sha256:e82e4646cd881e52e02d1daba3e4a8edb3de1555b36bb2131b3893f3d9c745df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_013-001a, image: hfl/0280/0280-082.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蔣叔與編次榜牒門開經榜无上黃籙大齋壇本壇奉爲大齋主某崇建无上黃籙大齋正薦亡親某乙普薦在會衆等及六道四生一切孤魂滯魄所有回獻上聖髙眞係醮主宰侍衞威神并資悼亡靈普薦幽爽太上諸部眞經天尊𧇖號取某日爲始開函看誦具列品目于後一看誦太上洞玄靈寳无量度人上品妙經太上洞玄靈寳九天自然生神章經太上洞玄靈寳昇玄消災護命妙經巳上並用普伸回奉奏獻上三界十方上聖髙眞係醮主宰侍衞威靈一看誦太上洞玄靈寳天尊說救苦經巳上並用回奉上獻係醮𡨋官一切威靈一看誦齋主家若别看經文及禮懴等逐項添入太上洞玄靈寳无量度人上品妙經太上洞玄靈寳九天自然生神章經太上靈寳九眞妙戒金籙九幽拔罪妙經太上洞玄靈寳天尊說救苦妙經元始天尊說生天得道眞經元始靈書中篇玉皇大天尊玄穹髙上帝寳號太乙救苦天尊𧇖號九幽拔罪天尊𧇖號巳上功德並用資薦亡故某乙靈魂及係薦亡靈在會係薦一切亡靈超生仙界一看誦太上洞玄靈寳无量度人上品妙經太上洞玄靈寳九天自然生神章經太上洞玄靈寳天尊說救苦妙經元始天尊說生天得道眞經元始靈書中篇玉皇大天尊玄穹髙上帝寳號太乙救苦天尊𧇖號九幽拔罪天導𧇖號巳上功德並爲建齋弟子資薦亡靈三世負財負命負恩負德𡨚家債主之衆同獲離苦各遂逍遥一看誦太上洞玄靈寳无量度人上品妙經太上洞玄靈寳九天自然生神章經太上靈寳九眞妙戒金籙九幽拔罪妙經太上洞玄靈寳天尊說救苦妙經元始天尊說生天得道眞經元始靈書中篇玉皇大天尊玄穹髙上帝寳號太乙救苦天尊𧇖號九幽拔罪天尊𧇖號朱陵度命天尊𧇖號巳上功德並用普薦六道四生孤魂滯魄等衆各離苦趣同遂徃生右伏請臨壇道衆靜念存眞調聲正氣依文轉誦啓聖懴宣所覬飛天下觀上帝遥唱存亡受度幽顯蒙恩科禁具嚴各宜遵守故榜年月日榜具法位姓押古法十戒榜无上黃籙大齋壇夫結齋之士當拱黙幽室制伏情性閉固神關使外累不入守持十戒今俗相不起建勇猛心修十道行堅植志意不可移拔注玄味眞念念皆淨如此謂之修齋也具十事如後一香湯沐浴以清神炁使五體清潔九孔鮮明衣服悉淨内外芳馨延降上帝視接眞靈二廢棄世務斷俗因縁屏隔内外翛然無爲心形閑靜注念專精三中食絶味挫割嗜慾使盈虚得節臟腑調和神炁清夷含養玄泉四謹身正服齊整嚴肅捨離驕慢無有怠替禮拜叩摶每事肅節五閉口息語不得妄言調聲正炁誦詠經文開悟人鬼㑹感神仙六滌除心意不得邪想調伏六根盪滅三毒存神思眞通洞幽微七燒香奏煙鳴鼔召神上聞三清普宣十方八懴謝罪咎請乞求願心丹誠至慊苦懇惻九發大慈悲愍念一切災厄惱難咸願度脫生死休泰無復幽苦十進止俯仰毎盡閑雅更相開導言止於道不得離法覺有闕誤便即輸失稽顙懴悔方榜清虚靜默堂請結齋道俗各宜奉行故榜年月日榜具法位姓押告諭誓言榜无上黃籙大齋壇本壇今奉玄師道旨建立齋壇抵導天恩普福幽顯合與諸司法院天神大將元帥功曹金童玉女靈官將吏防護齋壇侍衞正神一切等衆分布誓言各宜敬聽吾行齋法命出師壇守之惟謹行之惟艱大道好生濟度無間下通地府上開天關人門衞生鬼道無殘施之惟正職本防姦符章奏告三界通頒上天下地水府名山去來時刻飛雲徃還玄壇巳正奉法宜公扶護孝義摧伏魔凶死生受度飛符駕龍齋事告畢上朝仙宗五帝紀績三官考功陞階進職名竪蒼穹儻或懈怠罪在爾躬若違吾誓天錫汝鋒勉哉勉哉受爵無終故兹告諭爾非勿聦右誓如前各宜守職故榜年月日榜具法位姓押告諭齋官榜普度用此无上黃籙大齋壇本壇恭依靈寳飛天妙書元科祕範崇建无上黃籙大齋超度幽爽福利見存謹按天尊言凡建齋行道四天帝王皆駕飛雲緑軿八景玉舉侍從眞人玉女手執華旛前導鳳歌後從天鈞獅子白鶴嘯歌邕邕燒香散花浮空而來瞻禮行道觀聽法音萬聖臨軒千眞駐蹕凡同齋之士當庠序雅歩靜心閑意坐起卧息不離儀格則天王懽恱列言上清除巳奏告諸天關聞三界結盟立誓夤奉寳齋專牒請本州城隍主者某神及集神監衞靈壇掃除厭穢祗迎寳馭濟度存亡伏請入㑹齋官士庶到壇證明拈香務竭精誠同祈靈貺其符簡功德戒牒俟錬度畢送靈度橋一處焚燎已請監壇某神專差將吏照對亡靈逐名分俵庻使齋德有歸切望入㑹信士母得攙先輙自焚燎以致錯亂有玷齋功須至諭右榜各請知悉故榜年月日榜具法位姓押知職榜无上黃籙大齋壇本壇奉爲黃籙大齋主某正薦亡親某乙普薦在會衆魂崇建无上黃籙大齋今尅取今月某日爲始開壇關行齋法至某日夜滿散修設大齋上謝洪恩所有同齋道衆各合依式分攝治職除巳徧行咨請結立盟誓尚慮臨事有闕須至逐一開具所有職事如後髙功大法師具法位姓某其職也道德内充威儀外備俯仰動止莫非法式三界所範鬼神所瞻關啓祝願通眞召靈解疑釋滯導達羣賢都講法師具法位姓某其職也才智精明閑錬法度行道時節上下食息先白法師次引衆官禮拜揖遜皆當讃喝監齋法師具法位姓某其職也司察衆過彈紏愆失秉執科憲隨事舉白必使允當不得隱濫侍經法師具法位姓某其職也營衞尊經整理中韞髙座几案四坐席地拂飭齊整不得懈怠侍香法師具法位姓某其職也料理爐器常令火然灰淨三時行道二上轉經皆預備辦不得臨用有缺侍燈法師具法位姓某其職也景臨四方備辦燈具依法安置光焰火然常使朗明若遇風雨火勢不立啓白法師宜停乃停不得怠替輙令闕廢一副職人寡則一人兼兩職或三職人多則兩人或三人共二職副都講法師具法位姓某參知鐘磬讃唱法事揖引齋官進退拜禮副監齋法師具法位姓某讃舉壇儀監眎齋獻表白詞文宣告讃祝副侍經法師具法位姓某敷設壇供進獻㸃酌讃宣經科引靈朝禮副侍香法師具法位姓某燎理爐器助添香炷主執手爐讃道行禮副侍燈法師具法位姓某備辦燈具施添油炷徹曉續明廼爲稱職右榜各請清心滌慮思神念眞關啓精明升降荼肅所冀天眞降格幽顯霑恩當使五帝考功無致三官鼔筆科簡昭示幸勿踈違故此咨聞各宜守職故榜年月日榜具法位姓押約束將吏榜无上黃籙大齋壇本壇今爲某郷貫居具官某人崇建无上黃籙大齋正薦亡親某乙普薦在㑹亡靈等及六道四生一切孤魂滯魄超生仙界以今營建齋壇關集將吏及城隍里社等神在壇守衞合行約束右榜壇所曉諭諸司法院天神將吏靈官功曹神兵騎吏本處城隍里社司命土地應干侍衞等神請知委上件事理各齊心併力營護壇場掃蕩穢氛祗迎飈馭通達詞悃宣召徃來應諸處隂官部到亡魂及河沙孤滯等衆團聚近處伺𠉀召攝即時赴壇場沐浴錬度聞經聽法受戒傳符明領殊勳超昇淨域或有𡨚家債主慿著生人盜賊惡人侵欺法物茹葷飲酒觸冒壇禁並請宻切戢伏明彰報應務令齋功圓就魔障不生家國霑恩存亡受度事畢言功遷賞以答神庥故兹曉諭各宜知悉故榜年月日榜具法位姓押約束孤魂榜无上黃籙大齋壇本壇奉爲黃籙大齋主某人崇建无上黃籙大齋今月某日夜普設無礙斛食夜齋所有召到法筵一切六道四生九州十類河沙滯魄幽夜苦魂是男是女或老或少慮有前生債主夙世𡨚仇負命負財負恩負德因時際㑹惡念頓生不以解脫爲心惟懷返報是念無由超化永墮輪廻今故約束者右榜曉諭前件召到法筵五方五姓乃文乃武儒流羽士道民僧徒女冠尼師莊農書吏軍兵將校商旅術人卜並巫覡奴僕藥藝孤獨鰥寡枉死横亡造逆刑誅不孝雷震手孿足跛目盲耳聾産乳血尸襁褓夭折𡨚家債主負命欠財附草依茅遺壇古社若男若女或老或少一切無依無主孤魂滯魄長夜囚徒神鬼等衆各宜檢束形神聽經聽法排列就位饗食承供不得縱强脅弱恃勇欺怯各要豐足務在均平仍須洗滌身心依投正道和平𡨚對懴悔罪愆承兹教戒之功憑此薦拔之果同求解脫各願徃生無縈迷途無戀鬼趣所宜恭謹祗𠉀超昇盟眞科格威禁至重各須遵奉母輙有違故榜年月日榜具法位姓押宣諭亡靈榜无上黃籙大齋壇本壇先據某官某人狀稱伏爲正薦亡親某乙普薦在㑹亡靈等乞崇建无上黃籙大齋用資超生所有今來召到在壇係薦靈魂並巳澡錬形神叅朝壇陛訖毎日依時導引朝禮聖眞恭聽法旨祗候開度外須至再行曉諭者右榜專委監齋直事功曹法院召靈神將等常切誘諭上件召到在壇預薦亡靈及𡨚家執對之衆各令發生善念捨離惡縁整束身心皈依道果自識宿命莫結𡨚讎當知禀性在三十二受形本來清淨識縁物假妄起塵情執此惡根成其障惱氣凋神逝難復本初五累牽纏三途報對永沉幽夜墮落惡源淪没妄波不能出離如斯所苦昔巳備甞今到道前求解脫法斷顚倒想起信向心回觀本來究竟空寂了眞實性罪障亦空即得妙用見前靈光不昧逍遥自在永離輪廻恭俟本壇依時導引朝禮上聖懴謝罪愆祗受戒符用憑超度非時不請輙離靈筵明眞有格威禁至重各宜遵奉無或有違故榜年月日榜具法位姓押法事節次榜无上黃籙大齋壇本壇先據具官姓某狀稱正薦亡親某乙普薦在㑹衆魂等乞就某處宫觀開建无上黃籙大齋三晝夜拜奏寳章頒宣符命廣崇妙範總助昇遷滿散拜表言功投龍進簡祗修清醮三百六十分位仰謝洪恩所有同齋道衆除巳分攝治職依科修奉外尚慮臨事闕誤須至預行開列節次于後一某日關發預告文字颺旛開轉經號一某日關發正奏文字一某日進拜天官某章依日分逐一開列一某日中分度詞啓盟立幕淨壇發玉劄落景分燈建壇宿啓說戒補職宣禁静夜禮燈餘夜同召靈沐浴朝眞呪食一某日清旦正齋行道轉經中分正齋行道如清旦儀不宣衞靈呪不出官轉經落景正齋行道如中分儀靜夜祝九獄燈發符破獄讃九幽燈懴廻耀輪燈一某日清旦正齋行道如第一日清旦儀不出官轉經中分正齋行道如第一日中分儀轉經落景正齋行道如第一日落景儀靜夜普召幽爽設斛錬度一某日清旦正齋行道如第二日清旦儀轉經中分正齋行道如第二日中分儀轉經落景正齋行道進拜天官昇度章靜夜建水火池大錬昇度亡魂一某日解壇拜表告投三簡一某日設醮巳上並照讃唱節次門逐一開列右榜各請舉唱如法讃詠恊音登降務在雍容節次無使差互庶得聖眞靈鑒幽顯蒙休壇有常規各宜守職故榜年月日榜具法位姓押關牒共七道普召牒无上黃籙大齋壇本壇先據某人狀伏爲正薦亡親某乙普薦在會衆魂乞就某處開建无上黃籙大齋三晝夜普施九泉六道清淨無礙夜齋除巳章奏上逹三天告簡敷落九地申牒地水職司㝠關主宰開明沉滯啓拔幽扃預期發放六道四生一切孤滯之衆來詣齋壇伺候攝召沐浴更衣叅眞聽法享食承供開度生方今依律召攝遍十方際盡玄空界浩劫以來至於今日一切天道一切人道一切神道一切地獄道一切餓鬼道一切畜生道一切孤魂滯魄乃至一切依草附木無主無歸之衆一切投崖赴澗自溺自沉之衆一切拘縳不得自在之衆一切𡨚家不得和釋之衆一切軍陣非橫殘傷之衆一切牢獄自遭誅戮之衆一切道路商賈流亡之衆一切邊疆守戍死害之衆一切自剌自縊投河落井之衆一切自害自傷負財負命之衆一切雷霆霹靂水火漂然之衆一切産難血腥闇死之衆一切呪詛蠱毒傷亡之衆一切覆舟墜馬魂魄飛揚之衆一切殺生害命神識縈纏之衆一切食胎食血食肉食骨食髓之衆一切食花食果食苗食草之衆一切食便食利食涎食洟之衆一切食生食香食漏食味之衆一切食毒食腥食穢食精之衆一切食灭食炭食土食灰之衆若胎生若卵生若濕生若化生巳受苦未受苦巳受報未受報展轉輪廻無有邊際不可稱說未能解脫之衆又遍十方際盡玄空界若有色若無色若非有色若非無色若有想若無想若非有想若非無想若有情若無情若非有情若非無情若有識若無識若非有識若非無識幽靈滯爽新死遠亡或女或男或老或少或在家或出家或中國或外夷有主無主令終凶終如是等衆與其眷屬無量無邊各承太上之慈光普入盟眞之法㑹須至召攝者牒請靈壇守衛威神某甲子歳德尊神本處城隍土地里域眞官五道大神六甲開導使者導善官吏神虎三部追魂使者依律放入上件六道四生孤魂滯魄三界十𩔖一切衆靈普詣黃籙靈壇躬受開度仍請衛護一切生氣無令侵尅謹牒年月日時牒可漏无上黃籙大齋壇牒靈壇守衛一切威神太歳城隍土地等神追取關无上黃籙大齋壇本壇今爲郷貫某人開度亡故某乙靈魂衆會添等字崇建黃籙大齋取今月某日夜普爲六道四生孤魂滯魄修設無礙斛食夜齋依按眞科宣行鍊度俾霑恩霈隨果超生除巳飛奏三天申聞三界備牒酆都六道都案遍行關報依科發放及專申東嶽泰山府括責孤滯等衆差委神㬰管押前來尅定是夜赴壇祗承功德今來攝召在即須至專有指揮右關神虎三部追魂使者天道地道人道仙道神道鬼道業道功曹只今前去酆都六道都案及東嶽泰山府交管發放六道四生孤魂滯魄等衆同共引領前來赴壇受度不得時刻住滯故關年月日時關可漏无上黃籙大齋壇關神虎追魂使者七道功曹九眞戒牒洞玄靈寳九眞妙戒牒給付亡故某乙靈魂謹按太上洞玄靈寳九眞妙戒金籙度命九幽拔罪妙經六若人命過應入九幽名書黒簿爲受九眞妙戒應得解脫魂昇九天因縁輪轉得爲九宫眞人今者恭對道前傳授三歸九戒所宜給付持爲身寳者三歸依第一歸依无上道寳第二歸依无上經寳第三歸依无上師寳九眞戒一者敬讓孝養父母二者克勤忠於君王三者不殺慈救衆生四者不滛正身處物五者不盜推義損巳六者不嗔兇怒凌人七者不詐諂賊害善八者不驕傲忽至眞九者不二奉戒專一牒前件三歸依九眞戒延金籙靈詮玉清祕典爲登眞之戸牗作濟死之津梁宜謹受持無或懈怠即得遷神北府度品南宫永離有漏之色身克證無爲之妙果人間天上信受奉行故牒年月日牒又九眞戒牒一給付六道四生孤魂滯魄等衆功德壇牒一无上黃籙大齋壇牒亡過某官靈魂本壇先據某郷貫入詞至福祐見存内亡靈止稱官位不著姓下文稱亡魂處收作亡靈本壇據詞難抑謹依下元黃籙簡文靈仙品格建立靈壇取今月某日爲始崇修无上黃籙大齋三晝夜九時行道恭依次第宣演眞科拜奏寳章頒宣符命遷拔罪爽開赦幽沉然燈續明請光破獄普爲九泉六道修設無礙夜齋宣召靈儀沐浴錬度傳符授戒保舉超生事畢拜表言功投龍進簡祗設清醮三百六十分位仰謝洪恩所集善功總資超度今來功德圓滿合行給付以爲遷昇之據開具如後一看誦某經逐一開列一持念某聖號逐一開列一告下元始符命救苦眞符一面元始符命長生靈符一面太上敕赦生天寳籙一道玉清寳籙拔幽魂眞符一道玉清寳籙破地獄眞符一道東極青玄救苦九龍符命一道一給付洞玄靈寳九眞妙戒牒一道中元金書九天寳誥一道靈寳長生度命黃籙一道太上昇天左右劵一備化某經苦干卷逐一開列某旛芳干首逐一開列生仙淨衣一襲𡨋財若干駞一疋檐一乗一建立告盟寳旛遷神寳旛太一寳旛命靈寳旛超度寳旛廻耀寳旛一普設六道四生孤魂滯魄清淨無礙夜齋一呪施雲𢊍甘露法食一筵牒具如前瓊都寳範落五累之苦根金簡玉符定九宫之生籍集兹善利總薦靈儀徑登品於洞陽遂棲神於太漠安閑自在快樂逍遥凡所經由執此爲據故牒年月日牒功德壇牒二无上黃籙大齋壇牒六道四生孤魂滯魄等衆本壇奉爲郷貫某人資薦亡故某乙衆會添等字崇建无上黃籙大齋普度六道四生孤魂滯魄取今月某日夜修設天地㝠陽六道四生孤魂滯魄無礙夜齋沐浴更衣叅眞聽法傳符授戒錬度超生修奉功德並巳周圓合行給付以爲遷昇之據者一看誦太上洞玄靈寳无量度人上品妙經幾卷太上洞玄靈寳九天自然生神章經幾卷太上靈寳九眞妙戒金籙九幽拔罪妙經幾卷太上洞玄靈寳天尊說救苦妙經幾卷元始靈書中篇幾徧一持念玉皇大天尊玄穹髙上帝寳號幾聲太乙救苦天尊睿號幾聲九幽拔罪天尊睿號幾聲朱陵度命天尊睿號幾聲一告下元始符命金籙白簡救苦眞符一面元始符命金籙白簡長生靈符一面太上生天寳籙一道一傳授三皈依九眞戒一普施無礙清淨夜齋一筵一備化某經無量數經旛𡨋衣㝠財等逐一開列並云無量數牒具如前夙世迷眞遂漂流於苦海今日受度克昇證於仙郷集兹最上之殊因普薦無邊之逝識徑憑妙善永絶輪廻俱登快樂之天長處光明之界故牒年月日牒可漏无上黄籙大齋壇功德牃給付六道四生孤魂滯魄等衆防送關无上黄籙大齋壇本壇奉爲郷貫某人正薦亡親某乙普薦在㑹衆魂崇建无上黄籙大齋普爲六道四生孤魂滯魄修設無礙夜齋依按眞科宣行錬度今來事畢除巳給牒執照受生外合差將吏管送前去須至指揮右關本司法院天神將吏靈官功曹丁甲吏兵黄籙闔㑹虚通召命仙吏等管送受度衆魂前去黄籙院交管計㑹直日曹吏遵依黄籙靈仙科品元始符命開度事理特與削落罪籍俾令隨果超度託化人天不得稽滯年月日關可漏无上黄籙大齋壇關本司法院神將丁甲吏兵等无上黄籙大齋立成儀卷之十三
