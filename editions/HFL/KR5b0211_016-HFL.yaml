front:
  text: 无上黃籙大齋立成儀卷之十六在六
  hash: sha256:0c71f3bf89d78cbb7e2db271b5b192089352f2fd0065f5ce9e381930f64965aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_016-001a, image: hfl/0281/0281-088.png}
body:
  text: 東晉廬山三洞法師陸修靖撰大唐清都三洞法師張萬福補正上清三洞法師李景祈集定三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿編次科儀門一古法宿啓建齋儀法師坐堂弟子九禮三伏衆官具威儀賛引髙功法師出堂上五帝三師監齋三官天師幕香畢悉詣玄師幕序立次齋官再拜上香執詞函於玄師前自述修齋意詞再拜次齋官回身捧詞函跪授法師師受詞訖齋官再拜法師退立于右次髙功三禮上香告齋杜光庭白舊儀今齋主毎日投詞如告齋之法旣初建齋時已投詞祈告若每日重疊即於禮爲煩今止一度餘日並停具法位姓某上啓三天化主玄中大法師今有大道弟子某官某乙伏爲某事就某處修建无上黃籙大齋三日三夜投詞列欵關告眞靈今爲依按典儀建齋爲始當乞虚空監察直日直時傳言侍香香官騎吏關盟三界普告十方證明功德使啓奏御達齋功成就存亡受度幽顯霑恩某及衆官等不勝激切懇禱仰望之至各三拜次監齋宣職狀狀畢告誓云登齋衆官各揚乃職務在精潔冀獲感通使家國霑恩存亡受度不共其事科有明文次唱道讃自告齋至道讃出杜廣成黄籙齋儀次華夏引髙功至外壇都門上香祝白啓壇侍經宣啓壇䟽次宣金鐘玉磬儀古儀無此不用亦可次華夏讃引髙功陞外壇至地戸外立次髙功於地戸之左宻誦入戸呪畢從地戸入升中壇髙功先入衆官次之出入户呪岀金籙簡文經次髙功從天門入陞内壇上十方香衆宫就中壇旋遶訖依次立次上御案香上香呪出洞真經次都講唱各禮師存念如法出三籙簡文經次髙功宣五方衞靈呪出真文要解次都講唱鳴法鼓二十四通次三揲香呪祝出杜廣成儀次發爐无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域眞官正神臣今正爾燒香奉爲某官某人正薦亡親某乙普薦在會衆魂等修建无上黄籙大齋三日三夜以今初夜宿啓登壇朝眞行道𥙷職宣戒關盟諸天願得太上十方正眞生炁降流臣等身中令臣所啓速達徑御太上无極大道至眞玉皇上帝御前各三禮發爐復爐出三籙簡文建齋設醮自發爐至復爐懴謝之詞皆仗仙靈傳奏故發爐末稱令臣所啓速達絶句俓御太上無極大道至眞玊皇上帝御前復爐末亦稱傳臣向來所啓絶句徑御太上無極大道至眞玉皇上帝御前今之世師不明經旨却於發爐中間添入詞意極其覦縷煩瀆天眞至於關宣之際巧求韻美虚費光景止一發爐幾一二刻其他可知求其誠慤果安在哉祝文所稱嚴裝關啓此間土地里域眞官盖以三界分司咸有主職太虚遼邈未易通傳人居地界苟有啓告須憑當處神司次第宣達方其感通故太極敷齋威儀出身中及法籙治官關啓治廬靖化四面方位嶽瀆丘沼諸廟神祇土地之主社稷將吏同爲上啓而杜廣成醮儀聖眞之外必别設日直土地之位正以關奏情詞根元本始在此故也雲光張若海鳥足語此乃指以爲悞於五代石晉天福中著之論說甚矣其無識也所稱太上无極大道至眞玉皇上帝舉六合範圍之大孰有外於道炁者至眞玉皇不知包括多少帝尊爲稱而楊傑修金籙攺爲三清上聖昊天玉皇上帝是求之於區區色相之間矣況不本經文輕以私意更易今不取餘見齋法修用門次髙功上本位香侍香引齋官左行上十方香從北方爲始次都講唱各稱法位衆官黙稱所受經籙具法位奉行黄籙大齋法事臣某等今故燒香願以是功德上爲天子王侯土地官長經籍度師山林巖栖學真道士同學之人弟子某所薦亡靈九祖父母存亡兩代眷屬親縁内外姻族天下人民飛行蠢動一切衆生今故燒香皈身皈神皈命太上十方靈寳自然至眞无上大道特乞赦除前世今世生死所行宿對重過得免離三惡之道十苦八難九厄之中身得道眞飛行虚空白日升天侍衞道君逍遥无上金闕七寳自然宫殿永與道合所啓玄感應聲上御至眞无極道前出金籙簡文次都講唱禮十方志心皈命北方無極太上靈寳天尊一拜東北方東方東南方南方西南方西方西北方上方下方次都講唱各皈命懴悔法師長跪懴臣法衆等志心皈命無極大道天尊懴悔齋主某臣衆等及一切衆生前世今世身形所犯四肢舉措動違戒律不依經典身業大罪无量无邊並乞蕩除皆願齋主某臣衆等及一切衆生身入至仙㑹道合眞稽首禮謝无上十方正眞三寳一拜臣衆等志心皈命無極大道天尊懴悔齋主某臣衆等及一切衆生前世今世心業所犯志念不專情浮意動馳騁不息心業大罪无量无邊並乞蕩除皆願齋主某臣衆等及一切衆生神合眞寂洞入自然稽首禮謝无上十方正眞三寳一拜臣衆等至心皈命無極大道天尊懴悔齋主某臣衆等及一切衆生前世今世口業所犯善惡反論綺語飾非華詞惑衆口業大罪无量无邊並乞蕩除皆願齋主某臣衆等及一切衆生性命合道玄㑹無爲稽首禮謝无上十方至眞三寳一拜次都講唱曰臣衆等志心皈命太上三尊十方衆聖禮經如法次吟三啓頌三首毎首一拜出智慈本願大戒經樂法以爲妻愛經如珠玉持戒制六情念道遣所欲澹泊正炁停蕭然神靜黙天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹緲入大乗因心立福田靡靡法輪昇七祖生天堂我身白日騰大道洞玄虚有念无不契錬質入仙眞遂成金剛體超度三界難地獄五苦解悉皈太上經靜念稽首禮次一時稽首禮三寳都講唱曰至心稽首禮太上無極大道一拜至心稽首禮至眞無上三十六部尊經眞文寳符一拜至心稽首禮太上三尊十方衆聖玄中大法師一拜次髙功左行至東方執眞文香上熏之舉亶婁阿㑹四字衆官隨聲呪曰亶婁阿㑹無惒觀音須延明首法攬菩曇稼那阿爽忽訶流吟華都曲麗鮮菩育臻答落大梵散煙慶雲飛洒玉都明魔上門無行上首回摭流玄阿陡龍羅四象吁員衆官再拜置眞文於東案以金龍鎭之玉尺壓于兩傍次高功左行至南方執眞文香上熏之舉南閻洞浮四字衆官隨聲呪曰南閻洞浮玉眸詵詵梵形落空九雲推前澤洛吾臺緑羅大千眇莽九醜韶謡縁邅雲上九都飛生自騫那育郁馥摩羅法輪霐持无鏡攬姿運容馥朗廓奕神纓自宫衆官再拜置眞文於南案以金龍鎮之次髙功左行王西方執眞文香上熏之舉刀利禪猷四字衆宫隨聲呪曰刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚簫嵎易邈無寂宛首少都阿繿郁竺華莫延由九開自辯阿那品首無量扶蓋浮羅合神玉誕長桑栢空度仙衆官再拜置眞文於西案以金龍鎮之次髙功左行至北方執眞文香上熏之舉玃无自育四字衆官隨聲呪曰攫無自育九日導乾坤母東復形攝上玄陁羅育邈眇炁合雲飛天大醜總監上天沙陁劫量龍漢衆鮮碧落浮黎空歌保珍惡变無品洞妙自眞元梵恢漠幽寂度人衆官再拜置眞文於北案以金龍鎮之次髙功左行至御前取中央眞文於香上熏之舉黃中理氣四字衆官隨聲張清都靈寳五錬生尸齊儀黄帝一炁天文黄中土炁總統衆靈鎮星吐精流錄神形與此不同富考呪曰黃中理氣統攝无窮鎮星吐輝流鍊神官衆官再拜置眞文於案上以金龍鎮之髙功再舉東方玉字亶妻阿會次南方次西方次此方次中央如初衆官同聲呪五方玉字一徧畢髙功歸位出五錬生尸經次宣十方靈官䟽次唱重稱法位具位奉行黄籙大齊法事臣某等謹上啓太上無極大道元如天尊太上道君太上老君十方巳得道大聖衆天尊至眞大帝天帝三十六部尊經玄中大法師天師君上相上宰四司五帝三界官屬一切眞靈臣等幸以宿縁生逢大化九天之劫延及今身三寳開圖三乗御運眞經演教大道垂科祕籙靈文和天安地上保國祚下濟存亡得以凡微授傳眞品而受法之日盟告三官救物度人立功爲本是宜弘宣祕妙開化未聞凡有歸投理宜關奏況奉詞㫖敢不上聞宣詞案如詞肯備極精䖍齋主某夙值良縁皈依至道義形報薦志切修崇切慮亡靈某及九玄七祖億劫種親六趣三塗無邊苦爽生世之日霏惡難稱死入地獄終天無解願祈恩霈開濟存亡懴謝玄眞披解宿對上資家國下祐羣生臣等不勝所見謹相擕率依下元黄籙簡文靈仙品格於某處靈壇之上設玄科之式四界八極法天象地以某所齊金龍繒緑安鎮十方本命紋繒苦干尺證質丹誠沐浴五體洗心靜念尅用今月某日修奉无上黄籙大齋謄詞效欵燒香轉經然燈續明照耀諸天三日三夜九時行道拔度亡靈某及弟子某家億曾萬祖囚徒死魂惡封罪苦謹依科法宿啓以聞恩惟太上三酋可十方至聖玄中大法師垂神鑒映省覽所陳乞敕勒靈寳官屬土地眞官一合同心併力營衞齊所掃蕩內外清浮壇場降伏妖魔䤋滅邪崇使臣等心安神定思念立感天清地朗啓奏御達齋功成就無有室礙臣等雖佩至眞參修大法處身五濁染跡六塵三關未調六情放誕仰頼禁戒以撿身心輙依明科說戒威儀使同齋之人咸知法訓明晨行道續更啓聞謹啓自然朝乃齋法之祖建齋之始必先行自然朝發盧稱名位禮十方懴三業三啓三禮爲自然朝因以敷露眞文讀詞説戒補職宣禁即本科所謂謹依科法宿以啓聞是也末稱明晨行道續更啓聞盖謂明旦方始正齋行道耳旣欲爲人建齋則當預告眞靈以修齋之意古科宿啓必在建齋之日子時而陸天師所撰靈寳道士自修盟眞齋儀則不宿啓止於齋日清旦說戒接續登齋行道繼以言功口表正經科止云建齋當先行自然朝初無宿啓散壇之文故也雲光張若海智識膚淺不覩經文輙以已見肆爲妄論筆之於書凡二十條大悖經教遂使後世不學之徒乗非蹈謬悉於宿啓之前說戒𥙷職且補職授簡然後升壇杜廣成先生固甞非之矣說見齋法修用門中李景祈所集齋科却於建壇之日午後先於大道前行自然朝說戒復歸玄師幕補職宣禁至夜方始依科宿啓則是於未建齋之初一日之間兩行自然朝也不幾贅乎向在竹宫鲁與留冲靖論及此留冲靖以爲止縁宿啓之夜分燈破獄召靈沐浴事緒極多若不如此則晷漏有限將百不逮事之憂然畢竟非古法今悉攺從本科倘宣行齋事不求觀美於讃詠繁文之末止依經科修奉要亦自有餘力好古之士共弘之焉次吟智慧頌三首毎一首一拜出智慧觀身經智慧起本無胡朗超十方結空峙玄霄諸天挹流芳其妙難思議虚感眞寳通有有竟不有無無无不無智慧常觀身學道之所先渺渺任玄肆自然録我神天尊常擁護魔王爲保言晃晃金剛軀超超太上前智慧生戒根眞道戒爲主三寳由是興髙仙所崇受汎此不死舟倐歘濟大有當此說戒時諸天成稽首次旋行一周法師面東立次唱禮十方衆官等各各首體投地黙禮十方方各一拜從北爲始次唱衆官平坐說戒威儀衆官西方面東坐弟子於壇前同受戒法師三捻香說戒天尊告太上道君曰今當普宣法音開悟羣生爲諸男女解災却患請福受命拔諸苦根使生者見道身脱八難死者懽樂飲食天堂早生人中轉輪聖王之家修齋求道皆當一心請奉十戒諦受勿忘專精黙念洞思自然勿得雑想撓亂形神能如是者便當靜聽第一戒者心不惡妬无生隂賊撿口謹過想念在法第二戒者守仁不殺愍濟羣生慈愛廣救潤及一切弟三戒者守正遜義不淫不盜常行善念損己濟物第四戒者不色不欲心無放蕩正潔守謹行無玷汙第五戒者口無惡言言不華綺内外中直不犯口過第六戒者斷酒節行調和氣性神不損傷無犯衆惡第七戒者不得嫉人勝已爭競功名毎事推遜退身度人第八戒者不得評論經教訾毁聖文躬心承法常如封神第九戒者不得闘亂口舌評詳四軰天人咎恨傷損神炁第十戒者舉動施爲平等一心人和神穆行常使然已上十戒能持否衆官各稱能持天尊言修奉清戒毎合天心常行大慈願爲一切普度厄世慊慊尊教不得中怠寧守善而死不爲惡而生於是不退可得拔度五道不履三惡諸天所護萬神所敬長齋奉戒自得度世天尊言道尊法妙人身亦貴故道開法遺戒經文以度人身人身旣度上與道同宜爲精行持齋奉戒夷心靜黙志念分明一意皈向專想不貳滌蕩六腑過中不味内外清虚每合自然是其齋日揲香啓願應心上徹四天司邏十部威神即下履行觀聽至音鑒映爾心如戒行道皆列功諸天禍福立彰道不負人勤行諦受勿使魔言天尊言建齋行道四天帝王皆駕飛雲緑軿八景玉輿侍從眞人玉女手執花旛前導鳳歌後從天鈞白鵠獅子嘯歌邕邕燒香散花浮空而来瞻禮行道觀聽法音天王下降萬靈朝焉如是豈可不盡其法也當先受十戒然後行道庠序雅歩靜心閉意坐起卧息不離儀格天王懽恱列名上清可謂得道在方寸之問出智慧上品大戒經元始天尊以開皇元年於西那玉國授太上道君次吟奉戒頌廵行一周歸班出仙公請問經道爲無心宗一切作福田立功無定主本願各由人虚已應衆生注心莫不均大聖弘至教亦猶雨降天髙陵靡不周常卑故成淵海爲百川王是能舎龍鱗萬劫保智用豈但在厥年奉戒不暫虧世世善結縁精思念大乗㑹當體道眞次髙功選舉官衆明日行道各典所職髙功法師經云當舉髙德玄解經義斯人也道德内充威儀外備俯仰動止莫非法式三界所範鬼神所瞻關啓祝願通眞召靈䆁疑解滯導逹羣賢法師再拜受簡畢又再拜都講經云才智精明閑練法度其任也行道時節上下食息先白法師次引衆官禮拜揖遜皆當讃唱受職者在位再拜詣髙功位跪受職簡畢歸位又再拜衆官同此監齋其職也司察衆過彈紏愆失秉執科憲隨事舉白必使允當不得隱濫侍經其職也營衞尊經整理中藴髙座几案四坐席地拂飾齊整不得懈怠侍香其職也料理爐器常令火然灰淨三時行道二上轉經皆預辦備不得臨用有關侍燈其職也景臨四方備辦燈具依法安置光焰火然常使朗明若遇風雨火勢不立啓白法師宜停乃停不得怠替輙令闕廢右詮舉六職出金籙簡文是爲登齋威儀陸天師靈寳齋說光燭戒罰祝願儀叙云先宿啓畢次授上品十戒東向平立誦智慧頌誦畢北向首體投地回心禮十方法師還東面西說戒威儀說戒畢法師依舊還署衆官長跪受簡劄明日行道各典所署選署畢東向祝復香衆官引行出治按次列坐法師更爲宣科說禁告示威儀則是說戒補職宣禁必當在宿啓後於科已有明文然禁制威儀却於復香之後方告示者非他蓋陸天師所說禁制自太極三十六條外其餘項目甚多如第一當使香油充足淨水盈餘不得乏少臨用有闕次當修治圊厠令上下蔽宻不得敞露又建齋結坐不得今散外之人參雜坐席供辦齋食毎毎簡素清淨齋日清旦下白粥菜葅塩豉日間設食菜羹菜蒸葅薑之屬竟設大餘依𢊍料狀本科無酒事有明文等法禁極爲纖悉乃是欲使齋主咸服法訓十戒不止爲六職說當與齋主同受勢凡得在復爐後說之爲合宜也先行自然朝然後說戒補職威儀由晉迄唐相沿不革自雲光張若海逞妄謬不經之說著元壇刋誤淺學者或宗其說古法始漸湮微崇眞先生固嘗深闢之矣㨿雲光云今修齋道士當日齊集至夜自玄中法師前齋主投詞法師關告後便升壇行事至大謝後即轉洞案說戒補職何倒錯之甚也又云朝眞之科與國家禋祀禮同享前七日太尉於都省集齋官戒誓未聞徹祭之後方戒齋官也今道士登齋重啓謝後說戒聽其戒辭又非齋意自說初入道披度戒文次第乖違庠序顚倒良由昔人不能刋攺按用謬科致使後來乗此誤本眞餘妄謬未易槩舉抑不思太上天尊開玄都上宫紫微玉笈出靈寳妙齋開度群品威儀之格具載經文靈者神也微妙之功出於思議之表變化無窮故謂之靈寳者一也三才所得而以清寧正者也所不可失故謂之寳人居濁世三關躁擾不能閑停身爲殺盜淫動故役之以禮拜口有惡言綺妄兩古故課之以誦經心有貪欲嗔恚故使人之以思神用此三法洗心淨行心行精至齋之義也太極眞人演經文而著齋戒威儀之訣陸天師摭經訣而撰齋謝戒罰之儀三籙九幽解考塗炭三日七日一時九時品目雖繁儀矩則一沿流窮源舍太極眞人及陸天師果何適矣雲光末識妄肆評議崇眞先生謂其任庸鄙之淺見泯賢聖之崇規賊壞玄綱非聖無法譬諸泥蠼井蛙不知滄海之大二十件之乖謬詳細䟽駁文具道藏本朝興崇玄學繹經潤文盖置使矣楊傑重定金籙乃或因之是可爲長嘆者也就雲光所言今世開建大齋齋主必預投詞法師受詞與乏關奏亦在一月之前次第進拜章書頒宣符命豈不謂之先行其事若必以爲先行事而後補職謂之顚倒又安可於未發預告正奏之前令髙功先補職邪竊詳經科垂補職之文爲明晨行道設耳宿啓散壇不與正齋相渉雲光乃總正齋言之謂爲十一朝法事宜其爲說如是紛紛也太上垂齋直懴謝之法普度天人津梁品彚罪旣可懴福亦隨臻居三界中因縁輪轉塵染業累種種成愆觸犯三光嶽瀆十方經寳積爲罪目結在九幽欲析赦拔必光使之隨方懴謝盖爲此也二十方懴文則見於黄籙簡文三元品戒經十方懴文則見於眞文要解玉匱盟眞科經豈塵世鄙夫所可擬議哉一日修奉止曰齋㑹三日以上方謂之齋戒七日或九日乆者一月具載經科行道懴謝之文則一不以重復爲嫌也自雲光謂三日道場凡有十一朝法事方懴尚占九場齋主齋官乆立行事跛倚壇席其何以堪但書懴文一讀而巳或於大謝之後宣讀三兩過尺須易換懴文不可三日内重讀舊文而後之行齋事者始務去繁就簡習爲穿鑿矣夫上清齋禮九天而九天帝即天尊也料云鬰單無量天尊是也洞神齋十方外復設中央香案則十一方也靈寳盟眞齋雖懺十方至金籙簡文自然齋禮十方之外復禮四極則十四方也黄籙三元齋謝十方外復禮三光五嶽水府經寳則二十方也禮方之位雖殊總之不離乎十蓋元始於空界分作十方諸天五億世界三千一一域中各有十方三界日月星宿天曹地府九幽地嶽天尊散景分形世間周遍隨機所感說法度人聖眞仙品髙下等級蓋非肉眼凡夫所能窺測故上清科以元始次於九天元父玄母之後不爲瀆啓靈寳經以三十二天三十二帝躋於元始上帝太上道君之上不爲䙝尊以各有所因故也自雲光謂法師先上十方香是先降十方眞炁凡對三清啓奏不兼諸天尊號者乃是瀆無再三三尊無二上今之修齋者宣詞及三上香後却禮十方或兼懴謝又更禮日月星宿五嶽水帝亦有懴文十方天尊與日月星宿於三清前猶可庶幾五嶽水府之神大不穩便而後之行齋事者始不知所適從遂有東青西素南丹北𡨋酆都大帝閻羅天子等禮悉以都懴從事矣夫爲道修齋當奉戒法廣度無極法禁微妙檢攝意態伏心就淨殃垢消㓕智慧自生拔生死難就無爲地深觀所起察其所滅因其所病療以慧藥若見色利以戒掩目若聞惡言以戒塞耳若之甘香以戒杜口若放情慾以戒挫心若趣惡事以戒折足身不犯戒超出塵羅可爲整百行建萬善者也受持清戒乃可修齋靜思反聽内視口不妄言身不妄動故無色之色爲之見無聲之聲爲之聞無味之味爲之甘不言之言爲之應神明爲之降福氣為之臻未然之福無願不獲若外不奉威儀内不守戒律行無可紀功無可著精誠不至猶豫懐疑内外不相應心口不相副性急性戾隂賊嫉傲念慮疲於外馳精神消於多慾雖修齋直終身無福以心至不存於内魂魄勞役於外和炁無主故不䏻有所感動也修齋說戒壇官齋主咸令各持安可分别自雲光不見智慧上品大戒經謂聽其戒辭非齋意自說初入道披度戒文而後之行齋事者始務立異好竒恣為誇誕遂有不得登壇之際少懈威儀入靜之時啓端喧閧等戒矣燒香行道懴罪謝愆則謂之齋延眞降聖乞恩請福則謂之醮齋醮儀不得而同今雲光乃謂齋直朝眞與國家禋𣏌禮同而香蔬肴醴有異是全不識齋法本未源流矣烏足怪哉選舉六職若依陸天師舊文本不容議自近代令都講昌補六職而又於職事之下添入上下僉議以某人充等語頗有窒礙髙功法師豈僉衆所可補充者耶今悉攺從陸天師本科庶免後來者之惑次都講唱衆官等平坐宣禁威儀三十六禁出太極威儀經法師曰夫齋法清虚威禁至重主人當洒掃屋守毎潔淨丁敕大小内外寂靜不可使香油闕乏法用有虧道士登齋各齎巾褐版履不得臨時交換彼我公事有闕勿得牽引非巳之服道士登齋起居皆當闕白監齋禮法師一拜禮香三拜而去還亦如之張萬福天師日不敢指三寳故曰禮香也若到齋堂履屨不整罸油二斤准禮二十拜受拜者願輸本色及以香油准禮者聽若坐起不庠序罰油半升准禮五拜若不正坐罰朱半兩准禮五拜若臨行法事與外人交言罰香一斤准禮二十拜若飜覆香火罰香半斤准禮十拜若講及世務罰香一斤准禮二十拜若言語戯笑罰朱一兩准禮十拜若綺言低睡罰朱半兩准禮五拜若飜覆燈油罰油五升准禮五十拜若巾褐不整罰香半斤准禮十拜若都講讃唱失儀罰香一斤准禮二十拜若執紏見過不彈私隱罰油六升准禮六十拜若侍經不整飾髙坐觸物有闕罰香半斤准禮十拜若侍香香烟中絶罰油四升准禮四十拜若侍燈燈火中滅罰香一斤准禮二十拜若齋主内外不相檢敕音聲髙厲罰油五升准禮五十拜若聽經倚㨿不執簡罰油一升准禮十拜若不注念清虚心想意倦爲衆所覺罰油三升准禮三十拜若出入齋堂不關白監齋罰油二斤准禮二十拜若垂髪馳歩罸香一斤准禮二十拜若讀經或亂請問敗句罰油三升准禮三十拜若唱念聲不齊罰油二升准禮二十拜若陞壇不洗手漱口罰油二斤准禮二十拜若坐起揖遜失儀罰油半升准禮五拜若旋行不依次第及逆行罰香半斤准禮十拜若起行來及還坐不禮經三拜徑去者罰香一斤准禮二十拜若臨燒香突行罰油一升准禮十拜若齋主供辦觸事有闕罰香一斤准禮二十拜若受關不啓上罰油三斤准禮三十拜若齋次因起居逃遁不返爲衆所紏罰香五斤准禮一百拜若犯威儀彈罰不伏者啓告三寳退出齋次若下坐衆官法事有虧從一至三依科彈罸從三巳上退出齋次執紏不彈與犯同罪若上坐法師於事有虧自取愆失送簡監齋從一至三依科彈罰從三巳上斷功三百日不得又在法坐太極法師曰凡此禁制皆玄都上宫明科舊格戒其惰慢檢其愆違建齋之時四天帝王天眞上聖親降齋所瞻禮行道察其行藏觀其誠志若有過失即敕四司五帝詔下三官隨事紏舉加其災考天尊大聖哀念世愚不欲使其因齋獲罪故開罰紏之門使其知過過而能攺罪亦消焉受罰之者責巳甘心恭敬聽命勿得飾非諠競干冒眞靈如此則弘整紀綱解消殃咎落罪名於既徃延福祝於將來得不翼冀小心䖍䖍夕惕若親奉大聖躬朝國君即眞靈感通福祥臻集登齋之士勉而戒之出靈寳料玄都律次都講唱監齋受罰簡監齋受簡三拜而起次復爐香官使者左右龍虎君侍香諸靈官當令開建黃籙齋壇之所自然生金液丹碧芝英百靈衆眞交會在此香火爐前當願齋功成就存没霑恩十方仙童玉女侍衞香烟傳臣向來所啓逕御太上無極大道至眞玉皇上帝御前次吟學仙空洞頌出壇出歩虚經空洞靈章經次出戸呪法師疾衆官出地户畢於户内向壇宻呪次叅幕至玄師前髙功三捻香小啓謝過三禮出杜廣成儀次囬向次都講唱監齋紏過監齋隨有無言之次都講唱啓齋事畢衆官復位次威儀迎師歸堂齋主弟子禮謝法師杜廣成先生曰啓齋旣畢衆官與齋主弟子禮謝法師逓相致賀弟子當䖍誠致禮不得傲誕自髙自建齋之後至散齋巳前法師昇壇轉經行道旣服朝服又冠元冠禮絶衆官是爲壇主雖衆官有拜皆不合答茅山台嶽此法乆行岷蜀之中尚未詮舉若互相交禮何表法儀今但依行庶全綱紀散壇之後一切如常可也无上黃籙大齋立成儀卷之十六
