front:
  text: 无上黄籙大齋立成儀卷之十四在四
  hash: sha256:845fae03fed57cc1d00ee7304e796698c381c9e3b076edc777b3b3025c222a37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_014-001a, image: hfl/0281/0281-004.png}
body:
  text: 三洞法師冲靖先生留用无傅授太上執法仙士蔣权與編次禮成奏謝門三簡奏具位臣姓某右臣謹𤁋丹誠上干天聽退省僣易以竢譴誅臣先據某郷貫某人㱼稱伏爲正薦亡親某乙普薦在典亡過某乙等乞就某處宫觀崇修无上黄籙大齋拜奏章詞宣行符命恭祈恩霈普濟幽沉臣㝷於某月日爲始開建寳齋至某月日罷散謹依科法就某處洞天告投天官名山洞府金龍玉簡及就建立齋壇之所吿投地宫土府金龍玉簡就某處潭洞吿拔水官水府金龍玉簡拔贖亡故某乙及在㑹預薦亡魂等罪簿謹具狀飛奏金闕三境帝師七寳玉陛下恭望道慈允臣所奏特降敕命下泰玄都省室告上元賜福天官諸天曹局洞天主宰中元赦罪地官五嶽十宫九幽地府九壘土皇土下諸司靈官主宰下元解厄水官江海河瀆泉曲溪眞水府諸司靈官主宰遵依玉簡告命拔出亡故某及在㑹預薦亡魂請㓕三惡斬絶地根解釋𡨚仇増添善果計功昇度隨品受生仰副太上好生之德冒犯天威臣誠惶誠恐稽首蝢首死罪謹録奏聞伏候敕旨貼黄奏爲某乙王官金親王簡乞降數命施行事倚黄乞降玄右萡儀山簡土簡水簡各一狀奏内解釋𡨚仇増添善果二句止山簡用之請滅三惡斬絶地根二句水土二簡俱用之今合爲一奏非惟從省亦免煩瀆三簡各日投者自依舊法内三簡奏稱某處洞天非是洞天去處則不可稱洞天止稱某山洞府可也可漏奏狀一謹謹上諸三天門下上清天樞院諸進具位臣姓某謹重封申天官具法位姓某先據某郷貫某投稱伏爲正薦亡親某乙普薦在會衆魂乞就某處崇修无上黄籙大齋拜奏章詞宣行符命恭祈恩霈普薦幽沉某㝷於某月日爲始開建寳齋至某日罷散謹依科法就某處洞天告投天官名山洞府金龍玉簡拔贖亡故某預薦亡魂等罪簿除巳飛奏上帝外須至申聞者右謹具狀申上元天官紫微大帝聖前伏望聖慈特降聖旨下上元曹局名山洞天主司一切聖衆遵依玉簡告命拔出在㑹預薦亡魂解釋𡨚仇増添善果計功昇度隨品受生仰副大道好生之德冒犯聖威某下情無任惶懼之至謹具狀申聞謹狀地官具位姓某先據同天官狀至謹依科法就某處建立齋壇之所告投地官土府金龍玉簡後同天官狀右謹具狀申中元地官清虚大帝聖前伏望聖慈特降聖旨下中元曹局九壘土下主司一切聖衆遵依玉簡吿命拔出在㑹係薦亡魂請滅三惡斬絶地根計功昇度同天官狀結水官具位姓某先據同天官狀至謹依科法就某處潭洞告投水官水府金龍玉簡同地官狀右謹具狀申下元水官洞隂大帝聖前伏望聖慈特降聖旨下下元曹局靈潜淵水下主司一切聖衆同地官狀結至謹狀可漏方函如常式天樞院引進狀裹奏狀入函發去靈寳大法司今月某日發奏狀一函重封印全爲郷貫某人崇建无上黄籙大齋正薦亡親某乙普薦在㑹衆魂滿散依法告投三官金龍玉簡乞降敕命施行事須至申聞者右謹具狀申三天門下上清天樞院伏乞徑爲通奏恭請敕命早與頒降施行謹具狀申聞伏𠉀昭報謹狀直日功曹關子靈寳大法司今發緊急申奏文字下項一奏狀一函上詣三天門下上清天樞院請進一申狀三函上詣上元天官紫微大帝聖前申上中元地官清虚大帝聖前申上下元水官洞隂大帝聖前申上巳上奏狀一函申狀三函並用重封印全須至關發者右關某日當直功曹使者請交管前去分明請進申上雲程不得稽滯時刻有所遏截攝付近獄依律施行年月日關三簡牒山簡靈寳大法司牒上某處洞天仙官主宰是洞天即稱洞天是福地即稱福地非洞天福地則稱某山靈官主宰照對今月某日爲某處某人正薦亡親某乙普薦在㑹衆魂崇建无上黄籙大齋三晝夜遷拔逝爽度上南宫以今功圓事畢解散齋壇謹依科法齎持龍簡璧鈕投送某處洞天或福地或名山標記善功刻名仙籍須至專牒者牒候到伏請照會依準玄都舊典奉行謹牒土簡土府太歳九壘土皇靈官主宰牒内文作某處靈壇土府水簡某處靈澤潭洞靈官主宰牒内文作某處靈衆水府投簡獻錢狀具齋主位姓某謹備金錢二十四分從馬二十四疋右謹獻上洞天仙官主宰土水二簡依牒文攺此一位靈壇監察香官使者三洞威神當境主司里域眞官山水川澤一切正神聖前伏惟聖慈俯賜鑒納謹狀年月日具位姓某狀三清玉帝謝狀具法位臣姓某右臣先録狀上奏爲某郷貫某人狀稱入齋意至未曾洗乞請道士一壇就某處崇建无上黄籙大齋三晝夜依按玄科宣揚祕範恭憑道力俯拔幽途滿散修設謝恩清醮三百六十分位廣崇善利總𦔳遷昇臣㝷於某月某日開啓依科修奉至某月日滿散巳訖重念臣與同齋道士某等禀質凡愚昧於科簡關行畢違戾實多仰望天恩特垂原赦臣無任瞻天望聖激切屏營之至謹具狀上奏稱謝以聞謹狀年月日具位臣姓某狀可漏三清玉帝至尊陛下具位臣姓某狀奏謹封貼黄奏爲某人乞榮无上黄籙大齋正普薦亡親在會超生巳行散事天樞院繳狀奏狀入方正内發去靈寳大法司今月某日發奏狀一函爲據黄籙大齋主某人正暜薦亡親某乙在㑹衆魂請道士一壇就某處開建无上黃籙大齋修設謝恩清醮三百六十分位巳行滿散具狀稱謝事須至申聞者右謹具狀申三天門下上清天樞院伏乞徑爲通進施行謹具狀申聞伏候昭報謹狀年月日具位姓某狀方函申狀一函謹謹上詣三天門下上清天樞院諸進具法位姓某謹重封六幕謝䟽五帝具法位臣姓某右臣先具狀奏聞爲某郷貫同三清狀至達戾實多伏望天慈特垂原赦臣下情無任膳聖望眞惶懼激切屏營之至謹具䟽上奏五方五靈五老五帝天君聖前稱謝以聞謹䟽年月日具法位臣姓某䟽三師具法位姓某右某先具狀申聞爲某郷貫同三清玉帝奏狀至逹戾寳多内稱臣處稱名不稱臣伏望師慈特垂原赦某下情無任瞻聖望眞惶懼激切屏營之至謹具䟽上奏靈寳經師眞君靈寳籍師眞君靈寳度師眞君聖前稱謝以聞謹䟽年月日具法位姓某䟽玄師與三師狀同式玄中教主上清靈寳聖師眞君聖前天師與三師狀同太上輔元體道三天大聖都天大法天師正一靜應眞君聖前監齋與三師狀同靈寳監齋大法師眞君聖前三官同前式上元賜福天官紫微大帝聖前中元赦罪地官清虚大帝聖前下元解厄水官洞隂大帝聖前方函可漏並同啓齋立幕六䟽式三官考功狀具法位姓某先據某郷貫某人狀稱伏為正普薦亡親某乙在㑹衆魂崇建无上黃籙大齋用資超度滿散修設清醮三百六十分位上謝洪恩今來齋醮圓成所有在壇攝職道士并翊衞衆神及委差神將功曹土地等神並皆奉職行事委有勞績謹按太眞之儀合行投録推賞除巳具朱表奏聞上帝外須至開列申聞者一同齋攝職道士除某外開具下項開列道士姓名巳上道士並各在壇守職一在壇翊衞傳奏衆神下項天下都大城隍主者某州城隍主者某神某侯王甞請監壇者九州社令主者五方道都大主者九幽諸地獄主者操章將軍僕射天丁都官使者功曹從事直事君符吏郎決吏驛龍吏收食吏庭令丞小吏等捧香驛龍騎吏三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官監齋功曹使者左右前後青龍白虎朱雀玄武四靈神君靈寳大法司上清天樞院北極驅邪院玉樞五雷院靈寳正一諸階法籙中神仙將吏隨法師所受法籙將吏言功嶽兵同此東嶽統兵助法神將東嶽差來守衞神將吏兵等衆某州某縣城隍司一行守衞神將吏兵等衆係國祀典廟宇差來防禦吏兵等某處土地里域眞官巳上衆神並各在壇傳奏翊衞效勤本職一差委追取錬度亡魂神將功曹土地衆神下項某本司差委同三界直符追取亡魂神虎追攝官君功曹神將等南陵樞府朱陵火府南昌上宫錬度一行官吏仙衆上清黃籙院一行官吏三界直符使者某年某月某日某時四直功曹使者某甲子日啓奏至某甲子滿散日時當直功曹使者火府齎簡童子金龍驛吏地府齎簡童子茭龍驛吏九龍使者七道功曹五嶽城隍司十方道等沿路傳送牒狀土地等神巳上衆神並各傳送通違徃來追攝錬度亡魂宣布天恩並無違闕右具如前謹具狀申上元賜福天官紫微大帝中元赦罪地官清虚大帝下元解厄水官洞隂大帝聖前伏乞聖慈特賜聖㫖下三界所屬眞司計功酬賞施行謹具申聞謹狀年月日具法位姓某狀東嶽囬兵狀具法位姓某先據某郷貫同三官考功狀至齋醮圓成所有元申請差到守衞靈壇神將吏兵并嶽府元差在本院統兵助法二大將精兵等若不曾行天心正法不用統兵助法將兵等後同並各在壇委是效勤本職除巳具朱表聞奏三天乞降敕命施行及具申三官大帝府與依格考校計功推賞外須至申聞者右前件將吏除元差在本院二大將精兵等仍舊在院外非行天心正法人除自將吏至院外十九字云右前件昨來申請云所有昨來申請差到守衞靈壇神將吏兵隨狀見到謹具狀申東嶽天齊仁聖帝聖前伏乞指揮所屬收管依舊著役聽候天庭指揮施行謹具狀申聞謹狀年月日具法位姓某狀可漏方函如常式城隍回祠牒監壇神回祠牒武同靈寳大法司當司檢㑹先據某郷貫同三官狀至齋醮圓成所有建齋之初曽邀神馭差撥將兵翊衞壇場委有勞績除巳具朱表聞奏三天乞降敕命施行及申三官大帝府與依格考校切推賞外所合牒請照㑹須至移文牒請照㑹回祠聽候天庭推恩施行謹牒日直功曹香官使者等照劄靈寳大法司當司檢㑹先據某郷貫同三官狀至齋醮圓成所有建齋之初及散壇設醮日分當直功曹三界直符監齋直事香官使者徃來傳奏翊衞壇場效勤本職並無違闕除巳具朱表聞奏三天乞降敕命施行及申三官大帝府與依格考校計功酬賞外仰各行照㑹聽候推恩施行須至指揮右劄付四直功曹香官使者等准此年月日劄嶽府將兵照劄靈寳大法司當司檢㑹先據某郷貫同三官狀至齋醮圓成所有元申嶽府關請到衞壇將㬰除巳具朱表聞奏上帝乞降敕命施行及申三官大帝府與依格考校計功酬賞外合行發回本所今有東嶽泰山府公狀一通仰齎持前去候到分明通落仍依舊著役外各行照㑹聽候推恩施行須至指揮右劄付東嶽泰山府差到衞壇將吏等准此年月日劄後二劄同城隍將吏照劄靈寳大法司當司檢㑹先據某郷貫同三官狀至齋醮圓成所有元牒城隍司關請到衞壇將吏除巳具朱表聞奏上帝乞降敕命施行及申三官大帝府與依格考校計功酬賞外合行發回本所今有城隍司公牒一封仰齎持前去候到分明通落仍依舊著役外各行照㑹聽候推恩施行須至指揮右箚付城隍司差到衞壇將吏等淮此土地等照劄靈寳大法司當司檢㑹先據某郷貫同三官狀至齋醮圓成所有當界土地等神翊衞壇場效勤本職並無違缺除巳具朱表聞奏上帝乞降敕命施行及申三官大帝府與依格考校計功酬賞外合行照㑹聽候天庭推恩施行須至指揮右劄付某處土地等神准此泰山沿路土地照引並倣此行遣内改換作所有泰山沿路土地等傳遁徃來並無違缺日直功曹關靈寳大法司今發文字下項一奏狀一函重封印全上詣三天門下上清天樞院請進一䟽六函申狀一函重卦印全上詣五方五老五帝天君聖前靈寳經籍度三師眞君聖前上清靈寳聖師眞君聖前三天大聖天師眞君聖前靈寳監齋大法師眞君聖前三元三官大帝聖前申上除巳上下並封印全須至關發者右關某日功曹使者請照㑹齎管前去疾速請進申上雲程之中母令稽滯時刻故關錢馬狀同前式錢馬單同前式无上黃籙大齋立成儀卷之十四
