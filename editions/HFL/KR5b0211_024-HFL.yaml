front:
  text: 光上黃籙大齋立成儀卷之二十四竹四
  hash: sha256:0759a4de5ccb327d20f2f1d999cd4190ef080718c91ab2d23873ab1f1015e1ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_024-001a, image: hfl/0283/0283-082.png}
body:
  text: 三洞法師冲靖先生留用光傳太上執法仙士蔣叔輿編科儀門九幽神燈儀陳設畢法師焚香存神叩齒二十四通啓白具法位某上啓黄籙㑹中無鞅仙聖九幽主宰一切眞靈咸望洪慈俯回洞鑒伏聞二儀定位三炁開光晦明分晝夜之殊幽顯辨昇沉之像十方法界九夜㝠關慿道力以潜通仗神輝而洞照今謹有黄籙大齋主某伏爲資薦某靈開建黄籙大齋乞於齋次依法然燈破暗續明祈恩請福當乞上關三景下白九幽宣達齋誠導近景貺九霄八極六趣三塗盡憑照燭之功俱遂遷昇之果稽首歸依無極大道十方靈寳天尊伏聞大道分形眞精布化奠三才而立極斡萬化以居中今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照諸天福堂之内朗徹光景輝映萬空中照中宫境域神州妖惡潜消災凶殄息下照中央普掠之獄破諸幽暗開諸光明劒樹韜鋒刀山斷刃無邊辠爽一切窮魂息苦停酸除愆滅辠俱入光明之界永離黒暗之郷清衆歸依虔誠讃詠九幽㧞罪天尊伏聞一炁洪濛二儀開闢木德號發生之府慈尊垂拯拔之科今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照東方無極諸天福堂之内陽光煥赫照徹東方中照震卦卯位三宫青帝之方清蕩凶災掃除妖翳下照東方風雷地獄破諸幽暗開諸光明息震雷霹靂之威免飄㦸飛戈之難無邊罪爽一切窮魂落黒府之罪名上青元之生籙解脫憂苦升證光明清衆歸依虔誠讃詠威光寳際天尊伏聞三炁開光五靈分化丹簡注長生之籙朱陵開冶鍊之庭今奉爲黄籙大齋王某資薦某靈謹然九幽神燈上照南方無極諸天福堂之内陽華洞朗照徹無窮中照離卦午位九宫赤帝之野消平災沴掃除妖氛下照南方火翳地獄破諸幽暗開諸光明停火城考對之威息塗炭炮灸之苦無邊罪爽一切窮魂永辭長夜之郷逕上丹靈之界常居福慶永獲善縁清衆歸依虔誠讃詠光流萬變天尊伏聞空青結字太白流精西華分太妙之都右極控浮羅之嶽今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照西方無極諸天福堂之内神光煥耀朗映太空中照兊卦酉位七宫白帝之境掃除氛穢蕩滌凶災下照西方金剛地獄破諸幽暗開諸光明停金搥鐵杖之威息穿腹塞心之苦無邊罪爽一切窮魂克超解脫之門逕入莊嚴之界寃仇和釋智慧圓通清衆歸依虔誠讃詠寳光通照天尊伏聞太茫浩劫五炁應眞敷大化於玄天配神功於黒帝今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照北方無極諸天福堂之内祥光昭灼徹照無邊中照坎卦子位一宫黑帝之野蕩除邪穢洗滌凶災下照北方溟泠地獄破諸幽暗關諸光明停氷㦸霜刃之威息長夜丘寒之苦無邊罪爽一切窮魂願乗懴拔之功逕上空眞之境永離惡趣超證仙郷清衆歸依虔誠讃詠金華廣耀天尊伏聞乾道流形艮山列位總生化於蒼元之境扇靈風於紫極之庭今奉爲黃籙大齋主某資薦某靈然九幽神燈上照東北方諸天福堂之内靈光洞朗照映虚空中照艮卦八宫丑寅之野肅清災沴摧蕩凶邪下照東北方鑊湯地獄破諸幽暗開諸光明永停煑漬之威普化清凉之境無邊罪爽一切窮魂逕登長樂之郷永離重隂之苦形神升度債業蠲消清衆歸依虔誠讃詠太微光範天尊伏聞梵炁騰精巽方並極惟妙寂莊嚴之界有好生度命之尊令奉爲黃籙大齋主某資薦某靈然九幽神燈上照東南方無極諸天福堂之内光華普照煥耀無涯中照巽卦四宫辰巳之野蠲消邪惡摧滅凶災下照東南方銅柱地獄破諸幽暗開諸光明停猛烈火熖之威息表裏焦爛之苦無邊罪爽一切窮魂來辭長夜之郷逕上耀眞之境罪根蕩滌神識清閑清衆歸依虔誠讃詠流光應現天尊伏聞眞風散景梵炁含光列厚載於坤維顯元功於乾德今舉爲黃籙大齋主某資薦某靈然㸃九幽神燈上照西南方無極諸天福堂之内流光洞徹照耀無窮中照坤卦二官申未之郷掃除隂沴清蕩凶邪下照西南方屠割地獄破諸幽暗開諸光明停倒懸割切之威息肢體零落之苦無邊罪爽一切窮魂消累劫之愆尤釋多生之罪考宿根清淨善果圎成清衆歸依虔誠讃詠通光普照天尊伏聞元精旣闢天闕肇開衆星垂拱極之文萬象體元亨之運今奉爲黃籙大齋主某資薦某靈然九幽神燈上照西北方無極諸天福堂之内光華朗徹照映太虚中照乾卦六宫戌亥之分掃清妖惡蕩滅凶災下照西北方火車地獄破諸幽暗開諸光明停刀輪運轉之威息燒灸焦爛之苦無邊罪爽一切窮魂浴流火以鍊形詣明霞而證道罪消北府名度南宫清衆歸依虔誠讃詠洞靈無上天尊向來然燈功德上明三界下煥九幽覩此光明同霑福力即使火山息熖冰池靜波吞火食炭化爲甘露金槌鐵杖變成蓮花若存若亡俱登道果九幽地獄無量罪魂或是九祖七玄或是先亡後逝或識不識若𡨚若親墮此獄中受諸罪報或先親作業或七世爲非或三業六情或十惡五逆當生之曰不悟善縁自作自爲違天負地命歿之後幽擊隂司五苦交煎衆惡備受罪終報盡方獲托生展轉三塗輪廻六趣動經億劫出離無由一失人身永乖賢路自非大道遷拔至聖垂慈長夜𡨋𡨋何時解脫因今懴悔然燈燒香願覩光明萬罪消釋乗功德力託化人天禮覲天尊聞經悟法諸惡永息衆善遵行世世生生常歸正道爲此良縁再憑稱念九幽拔罪天尊不可思議功德杜廣成先生曰上元金籙簡文眞仙品曰然燈威儀爲帝王國主上消天災正天分度下安兆庶濟抜存亡當然九幽神燈上照九天福堂下照九幽地獄人天蒙福生死荷恩夫然九幽燈者當市清淨香油不得用非義之財及濁雜葷穢之物或以諸香宿漬於其中取其燈焰芳㓗散流香炁上感諸天下蠲腥雜燈光朗徹消暗繼明即火穫功德九幽之燈當於靈壇廣殿衆聖之前分爲九樹依九位陳列樹列九盞或一樹九層層列九巵九九之數法天象地下開九夜上逹九玄濟存被亡最爲勝福或力不及者止辦九巵不必備用此儀止焚香告眞精誠㝠祝功德通感亦一揆也或隨位備漿水粥時果九分或八十一分列於九位之前尢爲精妙九獄神燈儀道衆立獄所齋官上香法師告玉清破地獄眞符具法位臣某焚香上啓三清上帝太一救苦天尊九幽拔罪天尊十方救苦天尊大慈大悲救苦眞人大慈大悲大慧眞人玄中化主三天聖師天地水官帝君北隂酆都大帝五嶽聖帝水府扶桑大帝三十六壘土皇君東方風雷地獄主者南方乆翳地獄主者西方金剛地獄主者北方溟泠地獄主者東北方鑊湯地獄主者東南方銅柱地獄主者西南方屠割地獄主者西北方火車地獄主者中央普掠地獄主者酆都十八地獄主者酆都八大地獄主者酆都三十六地獄主者酆都三官二十四地獄主者五嶽地獄四瀆地獄主者十二河源地獄主者𡨋關幽路一切㝠司地道功曹里域眞官虚空監察應感威靈願降無私同回有監以今伏爲黃籙大齋主某資薦亡親某開建无上黃籙大齋依法然懴九獄神燈一壇告行玉清寳籙破地獄眞符依準上帝符命時刻昇遷天牢地獄𡨋關幽路長夜泉扃一切𡨋司效職百靈考官掾吏敬聽上玄符命開關啓路毁鎻張門赦拔係薦亡魂及九幽十道囚獄沉魂等衆不以罪業輕重普皆釋放部衞前來制魔保舉度品南宫死魂受鍊仙化成人隨劫輪轉與天齊年永度三塗五苦八難超淩三界逍遥上清寳籙眞符謹當告下宣符命告文法師召神謹召地道功曹恭對道前承受符命告下十方依律赦罪宣關焚符舉明燈頌旋遶一匝法師化身爲太一救苦天尊行持如本儀侍燈執卷宣白一元布化髙卑分天地之形三炁開光幽顯定升沉之象聚仙聖於碧落空歌之境拘罪魂於羅酆泉曲之郷業識相因輪廻受報一淪惡趣永墮𡨋關億劫不覩於光明長夜備嬰於苦惱玉京上聖金闕玄眞大慈大悲普濟普度著回耀降光之格垂續明破暗之文俾承懴滌之功克遂超昇之願今謹有黃籙大齋主某資薦亡靈某修奉大齋超生仙界乞於齋次依法然燈伏願三境帝師十方應號尋聲救苦太一慈尊放九色之神輝破重泉之幽暗無鞅世界受苦衆生願暏燈光自識宿命思愆悔罪息苦停酸乗道力以超遷慿眞符而關濟煥明九地輝映三塗普及含靈同臻道果見前清衆同爲讃揚九幽拔罪天尊九幽之東曰風雷獄飛戈飄㦸衝突罪人今謹爲黃籙大齋主某人資薦亡靈某乞按靈寳科格然懴九獄神燈伏願東方大慈救苦玉寳皇上天尊普放祥光照破幽獄慈風廣扇咸停霹靂之威慧力靈通永息風雷之考亡靈超度罪爽遷昇入丹霍以煉神詣青華而受記見前清衆請爲讃揚玉寳皇上天尊稽首華林境玉寳皇上尊願垂大慈力拔度此亡魂出離風雷獄徃生人天道不可思議功德法師左玉清訣右執䇿杖叩齒九通於獄前呪曰九炁生煙玉寳慈尊皇上正炁流降𡨋空雷霆息威偃息迅風㦸戈摧折罪惡傾奔元始靈命昇濟魂宗十方救苦天尊就燈焚旛套於獄中法師叩齒九通黙誦關光呪執䇿杖於獄前依内鍊大旨本章行持存元始寳光照破幽獄次存黄色雲氣覆於一方餘獄同此行持九幽東南曰銅柱獄令諸罪人手抱足登今謹有黃籙大齋主某資薦亡靈某乞按靈寳科格然懴九獄神燈伏願東南方大慈救苦好生度命天尊普放慈光照破幽獄神輝洞照自除熱惱之威業債消平永斷攀縁之苦惡根斷絶屍穢沈零咸登解脫之郷逕上逍遥之路見前清衆請爲讃揚好生度命天尊稽首碧霞境好生度命尊願垂大慈力拔度此亡魂出離銅柱獄徃生人天道不可思議功德師執䇿杖行持如前呪曰生化梵陽一炁好生度命大聖普度無窮焦爛生肌熱惱散衝炎然銅柱永滅無營苦除罪考上升仙宫十方救苦天尊焚符旛破獄如前儀九幽之南曰火翳獄令諸罪人吞火食炭今謹有黃籙大齋主某資薦亡靈某乞按靈寳科格然懴九獄神燈伏願南方大慈救苦玄眞萬福天尊普放祥光照破幽獄火山息焰沐慧露於清凉業道停輪被慈雲而開泰无邊罪爽一切窮魂神登流火之庭面禮丹皇之聖見前清衆請爲讃揚玄眞萬福天尊稽首梵天境玄眞萬福尊願垂大慈力拔度此亡魂出離火翳獄徃生人天道不可思議功德法師行持如前儀呪曰三炁丹華萬福玄眞吹呼陽光拔度幽魂火翳蝢滅炎生靈風炮炙塗炭法雨慈雲慧光布化罪考消蠲一如告命群靈敬聽十方救苦天尊焚符旛破獄如前儀九幽西南曰屠割獄倒懸罪人刀劒割體今謹有黃籙大齋主某資薦亡靈某乞按靈寳科格然懴九獄神燈伏願西南方大慈救苦太靈虚皇天尊普放祥光照破幽獄眞陽下濟生劒㦸之蓮花逝魄上升覩慈尊之玉相開明本性早入慧源悟業障之本空得形神之自在見前清衆請爲讃揚太靈虚皇天尊稽首耀眞境太靈虚皇尊願垂大慈力拔度此亡魂出離屠割獄徃生人天道不可思議功德法師行持如前儀呪曰坤蠡虚皇太靈髙尊景色元輝下照幽宫風刀割切摧刃剉鋒罪魂零落肌復神冲永離荼毒隨證仙宗十方救苦天尊焚符旛破獄如前儀九幽之西曰金剛獄金槌鐵杖亂考罪人今謹有黃籙大齋主某資薦亡靈某乞按靈寳科格然懴九獄神燈伏願西方大慈救苦太妙至極天尊普放輝光照破幽獄灸炎烈火獄慈風扇而熱惱蠲重重金剛山法雨霑而憂勞息洞開劫夜超度窮魂逍遥七炁之天輪轉十華之界見前清衆諸爲讃揚太妙至極天尊稽首金光境太妙至極尊願垂大慈力拔度此亡魂出離金剛獄徃生人天道不可思議功德法師行持如前儀呪曰七炁素英太妙至極金光寳耀普度魂識鐵杖考掠永使脫離金鎚刀义應時銷摧天慈赦宥無敢有違魂升太素逍