front:
  text: 无上黃籙大齋立成儀卷之二十八竹八
  hash: sha256:e727949139802feaef279fe3ab9f090226aa1a895b7f2b2098f82787b69e279b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_028-001a, image: hfl/0284/0284-048.png}
body:
  text: 太上執法仙士蔣叔輿修科儀門靈寳大齋傳授戒符昇度亡靈儀先令齋家别靈次當職道士祝白起靈引旛至就戒所道衆序立法師詣坐上香祝香一炷道德香願徹三境路天尊大慈悲宣演祕宻語拯拔諸亡靈法橋當早度普願九幽魂同離三塗苦今日道場清淨大衆同運誠心奉爲齋官億曽萬祖受度亡靈一心皈命䖍誠奉請太上無極至眞大道玉京金闕三寳帝師十極九霄諸天大聖日月星宿璇璣玉衡三元四始四司五帝神郷幽嶽泉曲羅酆當界神祇靈官典吏三界應感一切威靈願賜慈悲俯垂降鑒證盟功德傳授戒符庶令九夜之沉魂獲證三乗之眞果舉智慧頌第三法師敷座洞玄妙戒靈寳玉符上保國祚於升平下超苦魂於浩劫威禁至重神力難思今對道前依科傳授尚慮亡靈夙迷眞道受此輪廽先當普宣法音開明王性俾今悟解得離𡨋途謹按經云三界衆生本無流轉純一道炁初無生滅覺曉聞知之性亦未甞分來無其始去無其終溟涬大梵無内無外而一切有生自從感形能知以來色相歸目聲相歸耳香相歸鼻味相歸舌悟相歸心欲相歸體飢食渴飲寒衣熱袒陷於境累溺於根塵勞於嗜好縛於執想日將月就惡根不消生死大輪未嘗暫息或生天上或在人間墮地獄中受一切苦幾經淪化未獲解脫不知大道勝縁本於何處神炁精血始於何化性命生滅竟從何來設爲天人夀億千萬不明道本不識至眞劣爾長生復當退墮以是因故髙上眞王流出清淨光明最上法寳興立大教普度天人今爲宣揚所宜諦聽擊静一聲昔我元始天尊以一法身胎養道體而後溟涬成空空乆生有故諸生命忽爾自生生本無體自空立象因象成形明識來居妄爲生想生想立巳執妄爲我背悟爲明明爲暗對明暗相持水火形見於是分爲五物假爲五形逓相凌奪互爲流轉木爲仁愛火爲明察土爲信厚金爲剛決水爲智數内化五形是爲五藏著成五見總爲六根情境支連重疊爲對遺失元始混洞赤文無上上眞一精妙道認客爲主生情害性以知亂心結愛爲根結想成業故有種種受生種種滅盡種種果報種種因縁種種天樂種種𡨋苦如是顚倒不自覺知生死去來浩劫不息擊靜一聲坐下四衆受度亡靈試觀天地之内所有世界無極邊際不可推量天左地右隨運南北如是運轉其孰主張自非至神不能遷易神無方體見於事物猶如人身中藴性命尸卧不動便如無生若起行歩音聲語言方知神化性命潜隱顯於動作諭於至神亦復如是神若不生何有性命性命之名神之異號在人身中復是何物作何體狀若認起居動作爲神則今死者應無神理而死亡之人出爲祟癘形見光影或去世積年忽爾附著所見親舊論憶徃事悉如平生端知此神長在不滅生神無生滅亦無滅與道爲一肇於變化或處天堂或入地獄苦樂二塗神無變攺假使上昇天堂受無極樂或入地獄鑊湯火然萬劫長夜受無極苦惟是受業識神罪魂尸魄受此業報於汝元神有何榮悴是故當知太上元始中黄正道分判天地制法君臣藴靈太虚神化生育太空無相不見其情中有至神獨運神化神雖無間炁則萬塗起於升降分爲暗明兩半旣成隂陽乃定隂陽合德遂立生根根茂枝繁生子爲種逓相變化各不相知欲求其知了不可得知即非道道離所知三界之内一切有生未出隂陽不斷生死生生變易極於自然以知求道去道彌逺觀此出生無量變化皆從太空神炁生化靈妙而有試觀汝身稟此元命從劫至劫舎身受身數不可計生雖萬變而所以爲汝者未嘗遷也綿綿若存自古及今其道不息故我教中令知空非頑空内陶神化生道不絶爲道根本以此養生生無窮期以此處物物無盡相擊靜一聲受戒弟子於此妙義有此悟解即識道眞離業根塵絶輪㢠道若未契此吾當爲汝授三皈依說九眞戒以爲梯櫈用作津梁今用宣傳所宜遵奉唱人各恭敬宣告亡靈第一皈依無上道寳十方上聖太上三尊億劫度人先天演教慈悲廣救普濟群生玉相金容分形變化影隨響答善應無窮此世他生常當信禮舉道寳頌稽首皈依道大羅元始尊願以是道力開度此亡魂和徃生神仙界宣告亡靈第二皈依無上經寳十方世界寳藏靈文玉字金書龍章鳳篆三十六部萬八千篇指引沉迷超登道岸消愆滅罪得道成其此世他生常當信禮舉經寳頌稽首皈依經龍章鳳篆文願以是法力解悟此亡魂和徃生神仙界宣告亡靈第三皈依無上師寳玄中上聖靈寳三師正一眞人三天教主十方世界得道神仙傳法授經開度群品是眞父母是大醫王此世他生常當信禮舉師寳頌稽首皈依師靈寳衆慈尊願以是神力拯拔此亡魂和徃生神仙界亡靈等衆皈依無上正眞三寳巳竟當爲宣說九眞妙戒消釋衆苦遷昇九天應當一心諦聽諦受慈悲說戒天尊第一戒者敬讓孝養父母第二戒者克勤忠於君主第三戒者不殺慈救衆生第四戒者不淫正身處物第五戒者不盜推義損已第六戒者不嗔兇怒淩人第七戒者不詐諂賊害善第八戒者不驕傲忽至眞第九戒者不二奉戒專一如上妙戒並是元始天尊金口演說普爲一切滅諸惡根今依玄科對聖傳授仗此九眞之力永辭五苦之殃上昇朱宫超登紫府伏願侍經玉女護戒靈童飛天神王巨天力士遍下十方無極世界九幽地獄之中二十四曹三十六府當與亡過某削名黒簿滅罪隂關開長夜之泉扃指無爲之道路九霄宫内常爲逰宴之方八極天中依作逍遥之界所有金籙白簡玉劵寳符恭對道前次第宣告告長生符彩師存天門豁開祥光瑞法眩耀心目玉京金闕三寳上帝御於寳座侍衛儼然上帝勑命金童玉女捧符簡乗金光自大門降執簡叩齒三道依法念散形呪取炁吹符訖然後宣告文訖封簡度簡頌宣九天寳誥宣長生度命金籙師祝曰當願亡靈受持之後斷地逮役受錬更生永度三塗五苦八難超淩三界逍遥上清呪畢結旛上宣昇天劵告文宣畢法師分劵爲二以右一半結旛脚以左一半封函如法召當日功曹發去發保舉狀依法召十方飛天神王存至發去祝曰伏聞長生大聖飛天神王契靈寳之内音承元始之付囑天人同㑹當始青之上方山嶽吞煙值赤明之初劫傾光廻駕監眞度生願賜慈悉同垂降鑒齎元始之符命赦北都之罪魂俾亡靈某以時刻而昇遷咸計日而受度不經地獄身有光明逍遥劫刃之臺永處福堂之界某無任䖍禱之至依次第宣保舉狀普告三界歷關諸天勑制地祇元始符命宣狀畢以金錢一就焚化師祝曰伏請飛天神王飛天使者吏兵一如昔日始青天上浮黎法㑹之中不忘元始教戒之言俯鑒齋主䖍誠之禱俾亡過某靈死魂受錬仙化成人生身受度劫劫長存福留後裔慶及家門一切有情同登道岸無量度人天尊眞經妙戒玉劵寳符乃三洞之祕筌演九天之勝範指迷超悟證道成眞尚慮無所依憑有妨昇度今爲亡靈告盟衆聖出給牃文善自齎持用爲身寳次宣功德牒宣畢祝曰當願亡靈執牒爲據地司永消罪録隂府更不拘留天上人間隨果超化舉北帝頌向來傳授戒符種種功德並巳周圓伏願亡靈受持之後書名紫䇿度品朱宫佩寳誥以朝眞禮虚皇而受記超神仙果達快樂郷以今再爲亡靈斬滅三尸飛度五户庶得形神俱妙與道合眞昇度有期各宜珍重法師行持召神謹召玊清靈寳赫奕仙曹落滅地獄惡道靈官落滅下鬼惡道靈官落滅畜生惡道靈官飛度色累户靈官飛度愛累户靈官飛度貪累户靈官飛度情累户靈官飛度欲累户靈官請詣道前祗承符命奉爲亡靈某魂一依太眞之科斬絶尸根俾三惡之消滅飛度業累獲五道之開通度越風刀超昇天府解形遂變流景上清元始玉符謹當宣告宣三塗五苦符命告文每宣一符畢即以錢紙焚符於下惡根斷絶免五道之飄沉苦累蠲消超六塵之清淨魔王監舉無拘天門再請仙童同加引導請五方童子奉請東方青靈啓道童子手執青蓮花接引此亡靈和徃生神仙界奉請南方丹靈啓道童子手執紅蓮花接引此亡靈和徃生神仙界奉請中央元靈啓道童子手執黄蓮花接引此亡靈和徃生神仙界奉請西方皓靈啓道童子手執白蓮花接引此亡靈和徃生神仙界奉請北方玄靈啓道童子手執碧蓮花接引此亡靈和徃生神仙界十極神郷旣疾除於罪簿五靈童子將不滯於仙逰逍遥碧落之天宴息清華之舘親朝元始歌謡洞章不墮輪廻永遵玄妙所宜恭肅祗謝天恩稽首歸依無極大道逍遥快樂天尊引靈至大道前法師引亡靈同謝恩有生苦相受報輪廻上聖恩光垂慈方便著威儀俯仰之格拯幽夜沉𡨋之魂亡過某靈因建齋功獲叅壇陛聞經聽法滌罪除愆巳濯質於黄華復錬形於流火傳符授戒受化更生仰勤真馭之下臨克俾死魂之受度天地大德孰報罔極之恩螻蟻微誠當識謝生之所亡靈某等仰謝天恩稽首再拜舉靈書引魂至焚燎所法師回向謝過臣肅建瑶壇宣行寳範仰祈真造開濟亡魂以今度品功圓生尸事畢懼不明於科典及有犯於威儀考對三官書愆九府敢希恩祐俯賜赦原雲車旋返於瓊都羽盖復升於絳闕馳心清漢注想層霄更乞洪私益施妙廕萬方清晏大道興行一切含靈咸登妙果臣無任瞻望聖眞謝罪乞恩之至法師三禮出至焚燎所行持召金龍驛吏讀關子發長生符法橋大度天尊引魂度橋宣升度法橋呪天尊智慧大道慈恩九光陽炁變化曲虹長蜺千丈金碧萬重下入開光上登朱陵法橋濟度普度無窮平地昇霄逕赴天門各嚴形儀歩穚登空攺洗舊志永劫無終送靈舉三清樂焚化符簡經旛𡨋財等舉焚簡頌行超度法師默呪曰魂神澄正萬炁長存不經苦惱身有光明功滿德就逍遥上清呪畢再默念化生呪興生獨隷可韓聚魂功都聚魂急急如上帝勑黙誦化牒呪火鈴炎熾上下八方萬神侍衛永斷不祥急急如丹天火鈴律令存火鈴滿地烜赫如日巨獄天地受度靈魂乗金光昇天而去宣普度薦魂呪靈寳功德無量度人元始符命釋赦罪根長生回尸九鍊生形妙戒防非三界超淩隨劫輪轉逍遥上清功圓果滿上朝帝君福流後裔慶及家門好去好去無忘道恩寳華圓滿天尊上來開度無量功德並巳周圓仰慿淨衆爲上因縁念大聖元始天尊太上大道君太上老君太一救苦天尊十方救苦天尊九幽拔罪天尊朱陵度命天尊法橋大度天尊火鍊丹界天尊金闕化身天尊轉輪聖王天尊隨願徃生天尊逍遥快樂天尊大慈大悲救苦真人大慈大悲大慧真人大慈大悲拔罪真人大慈大悲拔度真人不可思議功德奉爲齋官功圓德就集福消災念紫清降福天尊消災解厄天尊延壽益筭天尊福生無量天尊八卦護身天尊九宫捍厄天尊寳華圓滿天尊不可思議功德右世科度靈有斬三尸度五苦門儀盖本上清洞眞部元始譜録太真玉訣云夫學上法宜遣諸欲落滅惡根道自然降仙自然成當篆變景流光玉文依文施用即度三塗五苦符是上尸符青書玄素中尸符黃書白素下尸符白書白素色累門符墨書白素愛累門白書白素貪累門赤書白素華競門青書白素身累門黃書白素其斬上尸符弟子著頭上中尸心中下尸及五苦符並著兩足於三惡門下北向衘刀請一杯清水以面臨水上師於弟子後叩齒九通而呪之即世科上尸青慾中尸彭質下尸彭矯三呪是也毎度一門師取所衘刀以繞弟子頭結九過取所卷玉符埋於門下以水灌之而去五苦門一同本經無呪今宗壇受上清寳籙則爲之太上符法雖云神化無方濟生亦可度死然斬三尸呪用於亡者其間未免有窒礙處而科文又極其鄙俗今刪去所是落滅三惡飛度五户靈官自屬玉清靈寳大法隨訣召降若今宣通符命開度亡魂則於理爲可行又世科五苦獄名亦與經文不合徃徃因三塗五苦經云刀山劒樹銅柱鑊湯摙汲溟波是名五苦遷就入科也然三惡五道門及流景玉符旣出太真玉訣要當悉依經文施行方爲盡善五苦輪燈亦同无上黃籙大齋立成儀卷之二十八
