front:
  text: 无上黄籙太齋立成儀卷之八鳯八
  hash: sha256:8475a08a8703dadeaaafddcc21a04cd7fe195f0ff8e76d472a9b5cdac15a335a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_008-001a, image: hfl/0279/0279-074.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蔣叔與編次牒劄門都城隍靈寳大法司牒上天下都大城隍主者當司先據某郷貴入齋意至福佑見存當司據詞難抑巳於某月某日預告先颺寳旛上聞齋意今按下元黄籙間文靈仙品格建立靈壇崇修齋法恭依次第宣演眞科進拜天官濟度諸章頒行元始符命金籙白簡救苦眞符太上敕赦生天寳籙玉清拔幽魂破地獄眞符青宫九龍符命神虎玉劄赦拔亡故某乙在㑹係薦等魂及十方九幽囚徒苦爽出離長夜祗受齋功謹取某月某日開啓齋壇召攝亡魂赴壇受度某日清旦爲始正齋行道三日九朝某日夜普設清淨無礙夜齋鍊度六道四生孤魂滯魄某日夜水火變鍊係薦亡魂傅符授戒告行元始符命金籙白簡長生靈符給籙破劵保舉超生事畢拜表言功解壇滿散某日夜秪設三界髙眞清醮三百六十分位仰答洪恩投龍進簡除具事由備奏上帝乞降敕命及奏諸天帝尊請降𧇖旨申三界眞司牒合屬去處將所薦亡魂姓名生死年月别具帳狀申三天門下上清天樞院伺𠉀敕旨乞與頒行外須至再行專牒者牒𠉀到請詳前項事理疾速指揮移文關報諸府州縣鎮城隍祀典廟貌一切香火去處及冀兖青徐揚荆豫梁雍州社令知委修奉大齋事理上遵敕旨符命開關啓路照應直符備去姓名放令亡故某乙在㑹係薦等魂及六道四生孤魂滯魄預赴齋壇伺候召攝叅眞聽法受度超生延奉帝眞之次請赴齋壇歆受醮禮事畢言功遷賞少答神勲明眞有格威禁至重事衆遵奉不請有違謹牒州城隍靈寳大法司牒上某州城隍主者某侯王當司先據某郷貫同都城隍牒至頒行外見今壇儀將啓聖範恭宣迎奉飈輿關行齋法欲得神騎前來驅除妖穢止隔葷辛鈐束孤魂斷絶魔障須至再行專牒者牒𠉀到請檢照先牒事理疾速移文關報本州管下諸縣城隍管内係國祀典正神互相知委部集神兵預次㑹合躬親前來專一掃蕩穢氛防衞壇席祗候上帝降臨隔絶葷厭欲魔害者並請禁絶無令侵害應沿齋醮所須注用物儀專委神將常行守護不得輙令惡人盜賊及蟲畜等暗有侵犯仍請上遵敕旨符命開關啓路照應直符備去姓名故令亡故某乙在會係薦等魂及導引六道四生孤魂滯魄來臨壇下分明報應伺候引朝太上懴洗愆尤祗受齋功隨果超度不得邀阻隱匿形跡及緃令妄起𡨚心潜謀人命遇有急切呼召即時承受無輙有違齋事周圓言功遷賞延降帝眞之次同歆醮禮用答神勲牒請依準玄科玉律疾速施行故牒縣城隍靈寳大法司牒上某縣城隍主者當司先據某郷貫同州城隍牒至專牒者牒候到請移文關報當縣係國祀典正神管下郷鎮里社一切香火去處互相知委同州城隍牒九州社令九道靈寳大法司牒上冀州社令主者當司今據某郷貫同都大城隍牒至伺候敕旨頒行外今再録合要姓名差委直符神虎追魂使者前去追取外須至專牒者牒候到請詳前項備去事理遍告本州所管分野合屬幽隂去處知委今來修奉大齋事理上遵敕旨符命火急分項考對照應直符備去姓名根刷亡故某乙在會係薦等魂或有罪業深重執繫拘留未得超生之者並請釋放前來預到靈壇祗承功德其本州分野應干有主無主孤魂滯魄一切隂沉苦爽無問新乆髙下逺近聚集攅類發枚前來伺候普召盡詣壇所沐浴更衣引朝太上聞經聽法懴罪除愆咸覩光明俱沾法食無礙無隔普濟普度上明天尊大慈之化下副齋官廣救之心仍請禁戢誘諭曁以靜夜無令喧関妄起讎心干犯齋壇有墮功果明眞品格威禁至重事須遵奉無輙故違謹牒兖州社令主者青州社令主者徐州社令主者梁州社令主者揚州社令主者荆州社令主者豫州社令主者雍州社令主者右八州牒各一道並與前冀州牒相同諸獄專牒九道轉牒五道靈寳大法司牒上東方風雷地獄主者當司今據某郷貫同都大城隍牒至伺候敕旨頒行外今再録合要姓名差委直符神虎追魂使者前去追取外須至專牒者轉牒攺專字作轉字牒候到請詳前項備去事理行下管内諸嶽十方道牒攺諸獄諸道委知今來修奉大齋事理上遵敕㫖符命火急分明考對照應備去姓名根刷亡故某乙在㑹係薦等魂或有罪業深重執繫本獄諸獄牒同十方道牒攺本獄作本司未得超昇之者並請釋放交付直符并泰山神吏管領預赴齋壇祗候召請叅眞聽法受度更生齋事周圓言功遷舉明眞科格威禁至重事須遵奉不請有違謹牒南方火翳地獄主者西方金剛地獄主者北方溟泠地獄主者東北方鑊湯地獄主者東南方銅柱地獄主者西南方屠割地獄主者西北方火車地嶽主者中央普掠地獄主者酆都三十六地獄主者轉牒酆都三元二十四地獄主者轉牒酆都九幽無間諸大地獄主者轉牒五嶽地獄主者轉牒四瀆獄主者十方道東方道都大主者南方道都大主者西方道都大主者北方道都大主者東北方道都大主者東南方道都大主者西南方道都大主者西北方道都大主者上方道都大主者下方道都大主者牒文同諸獄隨方換易𡨋關幽路主者靈寳大法司轉牒𡨋關幽路主者當司今據某郷貫同都大城隍牒至伺候敕旨頒行外今再録係薦亡魂姓名差委直符將吏前去追取外尚慮幽關有阻㝠路爲艱須主轉牒者牒具如前候到請指揮火急互相關報㝠關幽路水陸橋梁關津去處並請各遵敕旨符命開度事理開通㝠路啓拔幽扃引導係薦亡魂及六道四生孤魂滯魄盡詣靈壇聞經聽法普霑開度超證生方事竟言功各當遷賞明眞科格威禁至重事須遵奉不得有違故牒五道大神溟泠大神牒式同上蒿里相公靈寳大法司牒上東嶽髙里相公五方境界水陸關津神祇當司今據某郷貫同都大城隍牒至伺候敕旨頒行外須至專牒者牒請照應上件事理遍告㝠司合屬去處土地界分水陸橋梁津度主職開張道路引導亡故某乙在㑹係薦等魂六道四生一切孤魂滯魄無問髙下逺近盡詣壇前恭聽法音開悟迷識普享法食祗受齋功明眞科格威禁至重事須遵奉不得有違故牒土地里域眞官靈寳大法司牒上某官觀土地里域真官五方境界内外侍衛正神當司今據某郷貫同都大城隍牒至伺候敕旨頒行外見今壇儀肅備法席嚴陳須至專牒者牒請照應前件修齋事理疾速整飭威儀肅清内外掃除妖氛導集佳祥祗迓帝眞錬度魂識邀迎遐邇通達徃來啓迪幽塗開明沉滯咸遵教令以扇慈風德就功圓進階遷品依準玄科玉格疾速奉行故牒六道都案靈寳大法司牒酆都六道都案當司今據某郷貫某人狀稱伏爲正薦亡親某乙普薦在㑹等魂及六道四生一切孤魂滯魂乞就某處開建無上黃籙大齋用資超度當司據詞難抑謹依下元黃籙簡文靈仙科品建立靈壇取今月某日爲始結盟立誓寅奉寳齋於某日夜普施九泉六道無礙斛食夜齋一筵說戒傳符依科開度除已備奏上帝乞降敕旨及奏諸天帝尊請降睿旨申三界眞司牒合屬去處照應外須至移文者牒伺到請詳前項事理疾速差撥六道主管官將遍行關報預期發放前來伺候普召悉詣壇所聽法聞經享食承供領請功德受錬更生不請稽遲有妨開度故牒請監壇請當處香火威靈顯著係祀典者發正奏畢齋主賫公牒詣祠下拜云靈寳大法司有公文令至殿下投放祝畢再拜就神前焚之靈寳大法司牒上某神某王侯當司今據某郷貫某人狀稱伏爲正薦亡親某乙普薦在㑹亡魂乞就某處崇修无上黃籙大齋用資起度當司據詞難仰謹按下元黃籙簡文靈仙科品建立靈壇關行齋法恭依次第宣演眞科拜奏章書頒宣符命遷拔罪爽開赦亡魂取今月某日開啓齋壇攝召係薦亡魂赴壇受度某日清旦爲始正齋行道三日九朝某日夜普施六道四生孤魂滯魄無礙夜齋某日夜錬度亡魂超昇道境事畢言功拜表解散齋壇某日夜祗修齋醮三百六十分位仰謝洪恩欲仗神威監臨壇席禁戢魔障掃蕩穢氛止隔葷辛圓成齋事須至專牒者牒伺到請詳前項事由照今來修奉日分預集神兵騎吏躬親前來專一防衞靈壇驅遣伏屍故炁止隔葷厭欲魔害者並請隔截如故意者明顯報應即時制伏無令侵害應沿齋醮所須法用儀物專委神吏常行守護不得輙令惡人盜賊雞犬猫䑕暗有侵犯仍請上遵敕㫖符命開度事理放令預薦亡魂及無邊滯爽赴壇受度承領齋功鈐束𡨚魂罪對無令妄起讎心以相報復將來焚燎經旛㝠財之次願承三寳威力攝化無窮普施衆靈務令周徧防衞火燭迎導福祥竣事言功以答神貺牒請依應施行謹牒以上牒後歳年月日牒式冕預告門三界直符神虎使者靈寳大法司牒三界直符神虎追魂使者當司今據某郷貫同城隍牒至頒行外今來修奉有期合要上件係薦等魂及洗懴弟子各人身中𡨚家債主前來崇建齋壇之所伺候召請祗受齋功除具帳狀在前所有申狀公牒通落去處開具下項一申狀五函詣地府北隂酆都大帝聖前申上水府東霞扶桑大帝聖前申上東嶽泰山天齊仁聖帝聖前申上地府九壘土皇君聖前申上地府十宫眞君聖前申上一公牒九道詣九幽地獄主者逐處通下一轉牒五道詣酆都三十六地獄主者酆都三元二十四地獄主者酆都九幽無間諸大地獄主者五嶽獄主者四瀆獄主者逐處通下一公牒十道詣十方道都大主者逐處通下一公牒九道詣九州社令逐處通下一轉牒二道詣冥關幽路主者五道溟泠大神逐處通下一公牒二道詣酆都六道都案天下都大城隍主者牒請照㑹齎管前去逐處通落如上件亡靈其内或有三世業愆拘留執對未得超生之者并洗懴弟子或有𡨚債報對酬償之魂並要請領預赴靈壇伺候召請沐浴朝眞懴謝罪愆依科開度其或隂關有阻𡨋路爲難示以公文庶爲照證其餘事理請遵元始符命施行無或稽違有干玄律故牒歳年月日時牒關劄引將吏關隨法師所傳授之法不可拘靈寳大法司當司今據某郷貫同都大城隍牒至伺候敕旨頒行外須至專有指揮右關本司仙曹執職靈官功曹金童玉女天祌將吏上清天樞院屬官功曹章奏童子丁甲吏兵玉樞五雷院元帥猛吏雷公電母風伯雨師五雷使者雷火吏兵北極驅邪院綂兵助法兵頭部伍行長神將吏兵三元五德將軍龍虎騎吏四靈神君南昌錬度仙衆神虎追攝官吏諸司法院神將吏兵功曹符使等衆仰照應前件事理同當處城隍里社司命土地近側廟貌應係香火正神一合同心併力於建壇之初掃蕩内外伏屍故炁厭穢不祥速令清潔應沿齋醮所須法用儀物常行守護不得輙令惡人盜賊雞犬猫䑕等暗有侵犯齋事屇期各各嚴裝分布左右祗迓聖眞通達誠欵當局行事共建齋功仍導引亡靈等衆沐浴錬度廵察無礙斛食鈐束𡨚魂罪對無令妄起讎心以圖報復侵損生人遇有告召即時承受所冀齋功圓就障難不生家國霑恩存亡受度解壇散席言功舉遷明其有格威禁至重事須遵奉不請有違年月日關可漏靈寳大法司關諸司法院天神將吏仙衆司命劄靈寳大法司當司今據某郷貫同將吏關至頒行外仰當處司命五道土地門丞戸尉庭中令長守宅將軍十二禁忌内外干繫香火正神及側近廟貌里社井邑地祇等神照應前件事理同本司法院大神將吏等一合同心併力於建壇之初同前将吏關至不請有違右劄付某處司命五道土地十二禁將内外干繫等神准此年月日劄下可漏靈寳大法司劄某處司命五道土地十二禁將内外等神發奏狀四直功曹關子靈寳大法司當司今爲某郷貫某人乞取今月某日就某處崇建无上黃籙大齋正薦亡親某乙普薦在㑹衆魂超昇福境今發奏狀二十四函申狀一函重封印全上詣三天門下上清天樞院請進須至關發者右關某甲子年年直功曹使者某甲子月月直功曹使者某甲子日日直功曹使者某甲子時時直功曹使者準此齎管前去分明投進申上雲程之中不請稽滯有所遏截攝赴近獄依律施行故關年月日時關發申狀功曹符使關子靈寳大法司當司今爲郷貫某人同前關今發申狀四十函並重封印全開具申發去處下項日宫太陽帝君聖前月官太隂皇君聖前東方歲星東斗七宿星君聖前南方熒惑南斗七宿星君聖前西方太白西斗七宿星君聖前九方辰星北斗七宿星君聖前中央鎮星中斗四曜星君聖前南斗六司星君聖前北斗九元星皇君聖前玊清太玄天機天樞上相天君聖前靈寳經籍度師眞君聖前玄中大法師眞君聖前三天大聖師眞君聖前三清上境天眞皇人聖前上清十華眞人聖前上清五府眞宰聖前上元天官紫微大帝聖前中元地官清虚大帝聖前下元水官洞隂大帝聖前靈寳監齋大法師眞君聖前正一女師嗣師係師眞君聖前十方無極飛天神王聖前三洞經籙符命上聖髙眞仙靈將吏聖前九天丈人儲福定命眞君聖前北極四聖元帥眞君聖前天曹太皇萬福眞君聖前三元眞君聖前黃籙院知院眞君聖前南昌上宫受錬司眞宰聖前玉府玉樞五雷院使眞君聖前五嶽上眞司命佐命儲福眞君聖前三元水府眞宰聖前蓬萊都水監眞人聖前東嶽泰山府天齊仁聖帝聖前南嶽衡山府司天昭聖帝聖前西嶽華山府金天順聖帝聖前北嶽常山府安天元聖帝聖前中嶽嵩山府中天崇聖帝聖前王屋山洞天仙官聖前龍虎君功曹金童玉女香官使者聖前某甲子太歳尊神神前巳上並逐處申上右關某年年直功曹使者某月月直功曹使者某日日直功曹使者某時時直功曹使者上界直符使者中界直符使者下界直符使者請照㑹交管前去逐一分明申上雲程之中不得稽滯時刻有所邀遏攝赴近獄依律施行故關年月日時關發牒引天下都大城隍引天下都大城隍司沿路土地傳送州城隍引某州城隍司下沿路上地傳送縣城隍引某縣城隍司下承受沿路土地傳送東嶽蒿里相公引東嶽泰山府下沿路承受土地傳退當處土地五方境界侍衞正神引當處土地傳送右引王道並同預告門式功曹直符錢馬狀將吏上地錢馬單並同前式見預告門无上黃籙大齋立成儀卷之八
