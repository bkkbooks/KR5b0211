front:
  text: 无上黄籙大齋立成儀卷之三十一白一
  hash: sha256:af7bfa087af2e736cd19b311da450d727f0282599d72d86cc7a314277d25c8a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_031-001a, image: hfl/0285/0285-004.png}
body:
  text: 太上執法仙士蔣叔與修科儀門上清南宫鍊度幽魂儀先以方器安壇之西北立牌書云南宫太隂水鍊池又以圓器安壇之東南立牌書云南宫太陽火鍊池預備黄華神水一器及柳木炭火放壇下至鍊度時法師叩齒存神黙朝乞降大上眞水眞火下降于鍊度之所三拜三捻香啓奏具法位臣某謹上啓祖師北極紫微大帝君祖師南極長生大帝君臣下愚尸穢冒叅法階佩受靈文遵承正教濟生度死以應誓言輙露丹𠂻上干天聽臣伏爲齋主某人正普薦亡親某乙在㑹衆魂開䢖无上黄籙大齋普設六道四生孤魂滯魄太上慈悲廣大乎等無遮無礙清淨斛食一筵乞按眞科宣行鍊度願承恩霈離苦超昇欲望天慈特頒睿旨告下南宮水火二司五嶽總領眞君乞降隂陽靈根眞水眞火即日今辰降下壇場鍊度衆靈使其魂神澄正萬炁俱存身相具足復有光明度品南宫超昇天府仰頼天威睿澤洞鑒臣俯伏以竢天恩昭報臣無任瞻天望聖激切待罪之至次吟法事師存元始上帝在泥丸宫中巳爲九華眞人諸司仙曹將吏嚴粧顯服赫奕下降師行火池法歩南斗火鈴罡至火池衆誦隱語師至火池羅周十二位用開放流通法念淨天地呪一遍噀水一口吹池中依法行持念建火池呪太上有敕赦罪度生六趣三塗皆覩光明建立火池次第而昇各隨果報悉獲超生急急如上帝敕存朱陵烈火流金自火池東南角流入炎炎金碧熖發取午炁三口吹池中執眞火合同符師搯降眞火訣寅勒至午黙呪曰炎神炎神朱雀飛騰神火一下上按丙丁烈火神女手把帝鍾三昧眞火速降朱陵吾奉南極長生大帝律令敕取午炁吹符焚池中宻呪曰南阎洞浮流火之庭玉眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸眞容升入福堂洞陽之宫再面東取當日太陽炁吹之次指揮掌火池使者鍊度宮童將吏日中陽精速降池中伺候引幽魂等入火池依法治鍊身形疾疾師存流火神庭方廣無邊上有朱陵府樓閣森然庭中火金碧色熖末皆有金鈴騰騰而上師行水池法歩北斗玄樞罡至水池衆詠隱語師至水池羅周十二位用開放留通法黙念淨天地呪一遍噀水一口吹池中依法行持畢念建水池呪太上有敕赦罪度生六趣三塗皆覩光明䢖立水池次第而昇各隨果報悉獲超生急急如上帝敕存天河東井之水自水池西北角流入湛然澄清取西北炁一口吹池中執眞水合同符師搯降眞水該申勒至子黙呪曰太隂太隂玄武之精神水一下上按癸壬天眞玉液上清華房元始老君好生韓君靈根眞水速降樞府吾奉北極紫微大帝律令敕取比炁吹符沉於水池中宻呪曰霐池無鏡神龍之淵運東井華以滌幽魂攬姿運容太和之津玄和玉女灌之于神魂神澄正道炁長存再面西取當日太隂眞炁吹之次指揮掌水池使者蕩形官童將吏月中黄華靈根速降池中伺𠉀引幽魂等入水池依法濯質蕩形疾疾師存天河東井方廣無邊其水清淨光明上有天府樓閣森然次法師至鍊度所法師詣座上香存變如儀返生靈香飛烟結篆諸天諸地氤氲普徧委氣聚功幽魂受鍊一切舍生俱登道岸具法位臣某焚香上啓三清三境十極十華太乙救苦天尊長生大帝三省五府眞宰朱陵火府南昌上宫靈寳鍊度合㑹聖眞仙衆三界内外應感威靈恭望瓊輪羽蓋暫出於層霄法雨慈雲下覃於幽壌俾臣得行開度普濟沉淪仰冀恩光俯垂證鑒臣無任䖍禱之至敷座存天門祥烟瑞炁雲彩霞光炫耀心日見三寳慈尊青玄上帝諸天大聖一切仙靈赫奕下臨宣引魂呪今日吉慶大道吉辰諸天降鑒萬眞齊臨三界共㑹八景合并地司執職普度幽明部衞主者拘魂壇庭引導亡爽受鍊身形各整威儀疾速來臨齊登妙果上詣朱陵師存所度幽魂億萬俱在壇下次召神謹召靈寳大法赫奕仙曹靈官功曹金童玉女鍊度仙吏執職萬神丹天左右侍衞大將軍掌水池火池使者火鈴靈童九光童子黄華玉女東井玉女度魂主吏聚魂功曹攝魄將軍鍊度使者混元十二炁化生大將軍飛元聚靈召神使者六丁六甲大將軍金童玉女受鍊司直日神將功曹黄籙院功曹火府神兵泰山五道社令城隍土地等神來詣壇所今奉道旨鍊度死魂爾等威神疾速恭依元教攝召十方盡玄虚界六道四生有主無主一切孤滯幽囚苦魂之衆並赴靈壇祗受鍊度各爲分司聚炁和合形神鍊質凝眞登仙悟道一如流火律令存前件官吏威儀整肅羅列左右受度衆魂俱在壇下三界通化天尊次火錬執眞火合同符宣降眞火呪搯午文天中之靈日月居通甲乙炁令五行旺剋八景玉音守形直符招靈致眞攝魂符使聞吾呼召速降通靈承符奉命輙莫容情急急如長生大帝敕取午炁吹符焚火池中宻呪曰南阎洞浮流火之庭玉眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸眞容升入福堂洞陽之宫取當日太陽炁吹之謹請錬度眞人九光童子火鈴靈童錬度司仙衆引幽魂赴火池受錬師存變並如初火錬丹界天尊執火府隱文宣火錬大呪風火訣南方之君赤帝之精熒惑使者丙丁將軍朱雀炎神赫赫陽精五行造化萬物發生天帝有敕使者須聽攝召隂魂鍊度眞形急急如長生大帝敕離炁吹符焚火池中執火鍊符祝曰謹請主火大將軍趙仲明掌火池使者速降眞火鍊度幽魂疾疾取南方火炁三運自巳火炁三道相交大入符焚火池中玉眸鍊質天尊執十二炁化生符祝曰謹召長生大帝君運陽化隂大將軍楊元光混景大將軍丁忠合元大將軍丁遷善㑹靈大將軍陳志元隂陽大將軍王先之變靈大將軍張同運化大將軍李淵陽光大將軍申孚運度大將軍周自然成隂變陽大將軍章脩三景混成大將軍王卓立隂陽合靈大將軍鄭明等從官將吏飛行變化奉爲幽魂攝降腎水少隂之炁心火少隂之炁肝水厥隂之炁肺金太隂之炁脾土太隂之炁膀胱太陽之炁小腸太陽之炁膽腑少陽之炁大腸陽明之炁胃腑陽明之炁三焦少陽之炁心胞絡厥隂之炁依科鍊度委氣聚形取祖炁宣符文畢焚化池中再取炁吹所度幽魂祝曰靈寳符命錬度幽魂五臓六腑胞絡根元華精徧布縣澍丹田玉音攝炁靈風聚烟三景洞徹萬神齊仙九光煥耀生化自然千和萬合上登三天急急如長生大帝敕太清靈變天尊執五帝玉司眞炁符祝曰凖上帝敕謹召青帝直符區更生赤帝直符祝昌中黄帝直符玉眞白帝直符辱曲正黒帝直符尹豐奉爲幽魂請降安寳華林青芽之炁梵寳昌陽朱丹之炁玉寳虚玄黄庭之炁七寳金門明石之炁朔單鬱絶玄滋之炁依科鍊度鍊質變仙誦五帝祕諱取五方炁吹符焚火池中叩齒五通祝曰黄中理炁元生自尊脾胃幽通保胎長生白元公子桃康保神養育朱丹長生神仙得與大帝飛昇九天急急如長生大帝敕取五方炁吹所度幽魂朱陵度命天尊執火鍊變仙符誦丹天火鍊大呪炎精二神三台流光鍊胎易質魄鍊魂更穢炁殂落乗烟飛颺隂炁消釋陽炁混康精神益壯洞入火郷混合九炁總契虚皇昊天有敕流金霐芒九玄煥落貞利無疆急急如長生大帝敕火錬成眞天尊執元君鍊身符呪曰炁化成人尸變入玄三化五鍊昇入九天九天之劫更度魂神受化更生得爲眞人急急如長生大帝敕取五方炁吹符焚火池中度人無量天尊執合形變形成形大將軍符祝曰都召訣謹召長生大帝君化靈合形大將軍淩飛運靈變形大將軍蔣眞度靈成形大將軍田師文從官符吏飛行變化𦔳吾眞靈攝降生炁爲幽魂等全形育質祖炁吹符焚火池中再呪曰磨眞襪臘紅杏墨黒靈寳急急如長生大帝敕取五方炁吹所度幽魂興生獨𨽻可韓功都聚魂急急如長生大帝敕取辰卯寅三方炁吹所度幽魂次念大梵隱語取四方炁吹度幽魂存幽魂出火池中貌如嬰兒身有陽光洞徹目前弘濟無邊天尊次水錬執眞水合同符宣降眞水呪太玄之一八景同靈五老祕諱日月運明璇璣運轉十干五行八史通靈招神致眞聞吾呼召速降威靈承符奉命輙莫容情急急如長生大帝敕取坎炁吹符焚水池中再宻呪霐池無鏡神龍之淵運東井華以滌幽魂攬姿運容太和之津玄和玉女灌之千神魂神澄正道炁長存取當日太隂眞炁吹之謹召鍊度眞人黄華玉女東井玉女鍊度司仙衆引幽魂赴水池中受鍊師存變如𥘉清淨度魂天尊執洞明丹陽鍊度符宣丹陽鍊度呪龍漢蕩蕩無形無名渺𣺌億劫黄道開明神清明耀九魂吐精玉虚澄輝太霞髙明元始開化諸天齊臨三元道養二象攝生巳度者度未成者成巳死即化巳枯即榮蠢動蜎飛一切𡨋靈懷胎含孕咸得受形幽魂過命魂歸三清魂更錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天地神祇及諸河源五嶽四瀆并諸名山洞玄洞虚洞空洞仙無極大聖至眞尊神無極無窮普監度仙地根斷絶玄都記名衆神並映一切咸聽急急如長生大帝敕坎炁吹符沉水池中執水錬符祝曰謹召主水大將軍王掌水池使者速降眞水錬度幽魂取北方氺炁五口運自巳腎炁五道相交吹入水池中黄華蕩形天尊執飛元聚靈召神符九陽眞符祝曰謹召長生大帝君飛元聚靈召神飛仙使者楊欣之飛精使者王客飛雲使者張起飛魂使者冨公弼飛魄使者丁逢飛光使者陳普直仙使者時申直眞使者黄簡直靈使者路顯等從官符吏飛行變化奉爲幽魂攝降髙上玉清天混溟𤥭瑝之炁泛華紫微之炁玉婁鳯車之炁中女辟邪之炁太皇微延之炁化眞白灝之炁絳實子光之炁天眞命仙之炁太皇寂玄之炁依科錬度錬神返生取祖炁吹符宜符文畢焚水池中再取祖炁文所度幽魂呪曰三天育胎九炁結神上化玄丹下轉變仙二象交并以成爾身六晥瓊秀九府納眞十二結節各各絶根盪除穢氣五靈敷陳玄女吐精錬化光鮮金仙翼靈玊華結篇記名青宫長保帝晨急急如長生大帝敕好生度命天尊執靈寳九錬符祝曰準上帝敕謹召疾除罪簿司斷地逮役司度上南宫司飛度五户司受錬更生司仙化成人司過度三界司飛昇太空司普度無窮司靈官仙吏奉爲幽魂請降胞命元第一天元一黄演之炁胎命元第二天洞㝠紫户之炁魂命元第三天長靈明仙之炁魄命元第四天碭尸𡨋演由之炁臓腑命元第五天五仙中靈之炁靈府命元第六天髙眞冲融之炁无府命元第七天髙仙洞笈之炁華府命元第八天眞靈化凝之炁嶽府命元第九天自然玄照之炁依科錬度度命登眞黙誦上帝秘諱取祖炁吹符焚水池中叩齒九通祝曰鬱單凝靈禪善保神梵監凝炁驕樂㑹眞寂然安藏梵寳生津化應流景髙虚曜神無結無愛列名帝篇隂陽㑹神三萬六千二炁交映内保三田克登聖品與劫同年流雲五軿來侍帝軒䇿龍駕景髙昇九天急急如長生大帝敕取祖炁吹符宣九鋉符文焚水池中再取炁吹所度幽魂九天稱慶天尊執石景水母玉精符呪曰東井黄華石景玉精飛玄水母念醴玉津滔滔源源不竭池亭九龍灌錬三光垂精仙人吐潤錬度魂靈内外朗徹表裏洞清百關九竅元炁滋榮五臓六腑萬神自生胎胞結節隨水開扄死炁斷絶惡絶沉淪我今錬化死骸生魂返故改貌玉體金容變化錬穢飛昇紫庭急急如長生大帝敕坎炁吹符沉水池中髙眞妙果天尊執神府錬身符呪曰巳枯復榮巳滅復生得生上天更禀太靈九天之劫反復胎嬰穢累蕩滅白屍返生急急如長生大帝敕取五方炁吹符焚水池中金闕化身天尊執金液錬形符呪曰金液錬形與道合眞開明三景是爲天根無幽無極無始無窮元皇九醜靈魔降宫紫雲飛天身騰六龍水上火下流入三宫神居陽明大道自通急急如長生大帝敕取玄炁吹符焚水池内轉輪聖王天尊執分形錬形大將軍符祝曰謹召長生大帝君丹靈分形大將軍孫庚上靈錬形大將軍富盛紫靈養形大將軍張告眞從官將吏飛行變化𦔳吾眞靈攝降生炁爲幽魂等受化更生祖炁吹符焚水池中再呪曰墨黒襪臘靈寳紅杏磨眞急急如長生大帝敕取五方炁吹所度幽魂興生獨𨽻可韓功都聚魂急急如長生大帝敕取寅卯辰三方炁吹所度幽魂隨願徃生天尊焚靈寳登眞度命出離生死符呪曰玉清赤書上通紫庭天慈赦宥三界冥靈十方世界九幽罪魂億曽萬祖苦爽遊精削除罪簿落滅惡根速赴生方炁識閑寧上登天堂澄質錬神超離五苦眞心洞明蕩除隂翳入道升眞急急如長生大帝敕焚符取祖炁吹水池中存幽魂身有玉光瑩然明淨形容端嚴仙衣可愛寳華圓滿天尊師黙誦度魂呪興生獨𨽻可韓功都保魂應魂攝焚召丁甲金童玉女大將軍符向來錬度功德巳周謹召六丁六甲大將軍金童玉女速押所錬幽魂各整形儀恭詣上帝御前祗謝天恩受戒傳符登眞度品法衆䖍誠請行迎導法衆諷隱語引魂朝謁次下座靈寳普度大齋傳符授戒儀法師上香祝曰謹召十方無極世界見前受度一切衆靈汝等爰從浩劫結植苦根受此輪廻無有休息瑶壇蕆事寳範宣流檄召幽明集微塵之六趣神馳冲漠祈眞馭於九清仰仗道慈普超逝爽淨供息常然之飢火法水滌罪垢之形軀陶鑄眞精錬除隂翳凡此曲垂方便之敎盡皆親屈太上之尊汝等身至道場各冝恭肅祗受符戒永作皈依疇昔過愆旣巳從於開宥今茲善果當益謹於修持常堅信奉之心以報生成之德一切鬼神等衆投誠皈命仰謝天恩稽首再拜舉靈書引衆魂至說戒所道衆序立唱人各恭敬師詣座上手爐香請祝今日道場清淨大衆同各運心奉爲見前六道衆生孤魂滯魄一切衆靈稽首奉請太虛三元七眞空境無極妙道九氣洞靈元始無量化身天尊十方大聖諸君丈人三十六天帝靈寳五師君天地靈仙日月星宿四司五帝三界威靈伏願垂慈受請應感分輝以今降臨道場證明受戒仰祈慧澤大霈天恩普及含靈俱登道果十方靈寳天尊法師敷座我今仰承道力爲汝衆等作大戒師念汝等衆無量劫来不信大道不悟眞乗或因二業生罪或因六根起過或自内心邪僻或自外境染著或從三毒生一百八煩惱業或從六情生八萬四千塵勞苦歷劫廻旋不自覺悟長淪苦趣解脫無期元始天尊大聖大慈普念一切分身散景下入九幽度身威光問諸罪惱告四衆曰汝等諦聽在心吾今爲汝顯說九眞妙戒金籙白簡受持功德㧞難濟苦神力難思衆靈稽首伏受教命今依玄科對聖傳授應當一心諦受勿忘慈悲說戒天尊一者敬讓孝養父母二者克勤忠於君主三者不殺慈救衆生四者不滛正身處物五者不盜推義損己六者不嗔兇怒淩人七者不詐謟賊害善八者不驕傲忽正眞九者不二奉戒專一元始天尊說是戒巳以慈慧力普施存亡神開悟解各生善念衆苦消釋身心泰然皆發道意住不退轉以今傳戒給籙度符惟願三寳師尊同垂證度察命童子護戒威神五帝直符六宫掾吏隨逐覆護開化升遷列字玉清標名金格徑圓成於道果永超脫於苦輪寳籙靈符謹當宣告告長生符告救苦符法師存上帝敕金童玉女捧籙簡乗金光有天門降師執簡於香上度過祝曰元始上聖五帝髙靈玉文告命濟死度生金籙妙戒極護幽𡨋白簡寳符九眞仙經解消罪咎𡨚債和平救苦眞人削除罪刑察命童子注上生名護戒威神引詣福庭超離五苦乗駕雲駢轉輪得道飛升上清告生天寳籙法師執籙香上度過祝曰元始符命時刻升遷北都寒池部衞形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超淩三界逍遥上清祝符籙當願六道四生孤魂滯魄等衆受持之後書名紫策度命朱陵消大罪於九幽拔出地户遂超陵於三界無拘天門然須再召天仙特加防送各冝珍重召防送將吏謹召諸司法院天神將吏受事功曹六丁六甲大將軍金童玉女五雷神將當職奉行科教普度沉魂聽法聞經傳符受戒今者法事粗悉管送有期特假威稜嚴加護度俾無留滯得遂超淩具載帖文當如所告宣帖命虚皇下化軫念有縁靈寳垂科度人無量遂俾幽途之逝爽咸沐大道之恩光金簡書名朱宫度品雲衢緲邈羽袂飄揚永斷輪廻好辭壇去隨願往生天尊次起身回向向來奉爲黄籙大齋主某正普薦亡親某乙在㑹衆魂普度六道四生孤魂滯魄種種功德並巳周圓當願元恩允回眞睠俾咸臻於道果終不墮於塵迷平歩法橋速登道岸三塗罷對九夜停酸法界衆生安時處順普天率土悟道修眞終願臣身永依道䕃爲如上善念玉清元始天尊上清靈寳天尊太清道德天尊太乙救苦天尊九幽㧞罪天尊朱陵度命天尊火鍊丹界天尊金闕化身天尊轉輪聖王天尊隨願徃生天尊逍遥快樂天尊寳華圓滿天尊無量不可思議功徳次徃門外化帖牒符籙舉焚簡頌法師行超度法魂神澄正萬炁長存不經苦惱身有光明功滿德就逍遥上清急急如長生大帝敕黙念化生呪興生獨𨽻可韓聚魂功都聚魂急急如上帝敕默念化牒呪火鈴炎熾上下八方萬神侍衞永斷不祥急急如丹天火鈴律令存火鈴滿地短赫如日且徹天地受度靈魂並乗金光而去寳華圓滿天尊上來開度功德悉巳周圓再憑淨衆爲上因縁念大聖元始天尊太上大道君太上老君不可思議功德靈寳放生儀道土自放生或别爲人放生轉換用文預於放生之所鋪陳几案師同道衆詣案所先撿香叩齒三通發鑪無上三天玄元始三炁太上老君石出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出關啓此間土地里域眞官正神臣今奉爲某人開建無上黄籙大齋資薦某靈巳行滿散正爾燒香放生願得太上十方正眞之炁入臣身中所啓速逹徑御太上無極大道至眞玉帝御前啓白具法位臣某上啓太上無極大道十方至眞巳得道大聖衆扶桑大帝暘谷神王洞源洞淵溟泠大神三河四海九江水帝十二淮濟河伯河侯河中二千石清河夫人水府神仙衆真靈官及此間湖地里域一切神祇臣以有幸宿世因縁九天之劫流延今身遭遇經教崇奉三寳任居大乗自省穢陋誠非所勝然受命之日約當修弘妙法讃揚仁風使太陽靈暉洞映於九㝠元如慈澤咸被於一切造化育物萬品繁興人物殊形同禀元炁生生之𩔖莫不希全而世俗道消逆惡滋彰人民貪濁噉食衆生禽獸魚鼈資以爲粮水陸羅㩋不可勝計今齋主某義形報薦建立大齋輙捐己財請贖物命將養撫卹普行完全放之清泉冀資㝠福如道士自放生當依本科添入伏按經文放生度死爲學所先臣率身恭修不敢有怠又有清信男女某甲等慈心愛物好尚善縁各以資財市買龜魚隨臣俱行來到清淵今同放之還歸生源知無人入會放生不用又有清信男女等語以隆天師科元有此文不敢刪去度脱災難免離痛惱咸沐生全永享元吉願以是功德普流一切天人七世父母帝主國王公侯兆庶如道士自放生當依本科𣸸入及臣受道法師父母同學賢者山棲道士諸官正一弟子朋友知識六親眷屬蜎飛蠕動蚑行喘息諸天獄諸地獄五嶽四瀆幽魂苦爽囚徒責役一蒙釋散度脱惡道咸登無爲之場願天髙清風和雨調日月光明星辰列布願地平正山林茂盛水澤流通五穀豐熟國主賢弘威風翼翼皇敎明違普天所瞻人民義讓敵國不爭六夷賔服袄惡不生河海滿足賢聖日生推財讓義衣食自然男則髙才女則賢貞路不拾遺道德興隆庠序濟濟更相開度損身布施廣建福田憂苦者散逮及衆生令弟子某七祖上升天堂反胞更生騰景淩空生爲種民無憂無患日月齊光令度衆難世世受度慶及子孫臣學得道眞白日升天謹啓誦思微定志經偈太極眞人頌賢者汝莫殺亦莫懹殺想衆生雖微微亦悉樂生長如何害彼命而用以自養自養今一時累取自然爽長淪三塗中辛苦還復徃善惡各有縁譬如呼有響何不攺此行慈心以自奬眞人携手遊逍遥觀浮量右一大道雖無心可以有情求佇駕空洞中廻盻翳滄流淨明三界外蕭蕭玉京遊自無玄挺運誰能悟𡨋趣落落天漢澄俯仰即虚柔七玄散幽夜反胎順沉浮𡨋期苟潜凝陽九無娛憂覩此去來會時復爲淹留外身而身存眞仙會良儔右二舋舋玄中趣湛湛清漢波代謝若旋環椿木不改柯靜心念至眞随運順離羅感應理常通神適逮自徂淡遊初無際繁想洞九遐飛根散玄葉理返非有他常能誦玉章玄音徹霄霞甲申洪災至控翮王母家永享無終紀豈知年劫多右三次放生復鑪无上黄籙大齋立成儀巻之三十一
