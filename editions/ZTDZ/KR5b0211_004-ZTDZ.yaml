front:
  text: 无上黃籙大齋立成儀卷之四鳯四
  hash: sha256:5640372828fa000a500b8e099b05c7006c4bd3768a46808c4d2706396c45ae84
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_004-090394b, image: sjb/09/090394b.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿編次天樞院繳狀靈寳太法司本司據郷貫某人狀投稱入前齋意至福佑見存本司祗按玄科修崇齋法今預行飛奏上帝告盟三界眞司牒合屬去處欲乞敕命𧇖旨頒下幽牢應干合屬去處咸使聞知崇建大齋事理將亡故某乙在㑹係薦等魂及建齋弟子家億曽萬祖歴劫種親十方九幽苦魂滯魄權停考對落㓕惡根建齋之日持與赦拔𡨚愆親朝壇陛祗承符命開度超生今發奏狀五函重封印全須至開申下項三清上帝陛下昊天玉皇上帝陛下勾陳星宫天皇大帝陛下紫微中宫北極大帝陛下東極太乙救苦天尊御前右謹具狀申三天門下上清天樞院伏乞徑爲通奏恭請敕命𧇖旨早與頒降施行謹具申聞伏侯昭報謹狀歳次某甲子其年月日具法位姓某狀申五師應奏狀稱臣處申狀並攺稱名具法位姓某今據某布政使司入前齋意至福佑見存某據詞難抑謹集法籙道士一壇依下元黃籙簡文靈仙品格建立靈壇結盟立誓寅奉寳齋先颺寳旛上聞齋意看誦太上眞經𧇖號擇日開啓齋壇恭按玄科宣揚祕範仰祈恩霈普濟存亡除具事由飛奏上帝乞降敕命及奏諸天帝尊請降睿旨申三界眞司牒合屬去處各乞照㑹崇建大齋事理將亡故某乙在㑹係薦等魂及建齋弟子家億曽萬祖歷劫種親十方九幽苦瑰罪瑰權停考對落滅惡根願假道力恩光至期親朝壇陛懴雪罪咎祗受齋功欲得三界十方預知修奉須至申聞者右某謹具狀申玄中教主上清靈寳聖師眞君三天大法天師正一靜應眞君靈寳經師眞君靈寳籍師眞君靈寳度師眞君聖前伏乞聖慈特降聖旨下三界十方合屬去處預知今來修奉大齋事特與照應施行冒犯聖威某下情無任惶悚之至謹具申聞謹狀歳次某甲子某年月日具法位姓某狀可漏靈寳五位聖師眞君聖前具法位姓某謹封方函申狀一函上詣靈寳玉位聖師門下具法位姓某謹重封三官右某謹具狀申上元天官紫微大帝中元地官清虚大帝下元水官洞隂大帝右共一狀同五師可漏三元天地水官大帝御前具法位姓某謹封方函申狀一函上詣三元都㑹府具法位姓某謹重封地府具法位姓某今據郷貫同五師狀至祗受齋功欲得嶽府羅酆𡨋關幽獄預知修奉須至申聞者右某謹具狀申北隂玄天酆都大帝聖前伏乞聖慈持降聖旨下九地幽隂十宫五嶽東嶽狀攺四嶽應干拘繫罪魂去處預知今來修奉大齋事理持與照應施行冒犯聖威某下情無任惶懼之至謹具狀申聞謹狀歳次某甲子某年月日具法位姓某狀可漏北隂玄天酆都大帝御前具法位姓其謹封方函申狀一函上詣北隂酆都宫具法位姓某謹重封東嶽具法位姓某今據某郷貫同五師狀至祗受齋功欲得嶽府羅酆㝠關幽獄預知修奉須至申聞者右某謹具狀申東嶽天齊仁聖帝御前伏乞聖慈特降聖旨下九地幽隂十宫四嶽應干拘繫罪魂去處預知今來修奉大齋事理特與照應施行冒犯聖威某下情無任惶懼之至謹具狀申聞謹狀歳次某甲子某年月日具法位姓某狀可漏東嶽天齊仁聖帝御前具法位姓某謹封方函申狀一函上詣東嶽泰山府具法位姓某謹重封水府具法位姓某今據某郷貫同五師狀至祗受齋功欲得江海河瀆水府去處預知修奉須至申聞者右某謹具狀申東霞扶桑丹林大帝御前伏乞聖慈特降聖旨下四海九江五湖四瀆三元水府十二河源應干拘繫考校去處預知今來修奉大齋事理後同地府狀結歳次某甲子某年月日具法位姓某狀可漏東霞扶桑丹林大帝御前具法位姓某謹封方函申狀一函上謂東霞扶桑宫具法位姓某謹重封牒處狀内稱名處並攺作當司都大城隍牒靈寳大法司牒上天下都大城隍主者當司今據其郷貫入前齋意至福佑見存當司據詞難抑謹集法籙道士一壇依下元黃籙簡文靈仙品格建立靈壇結盟立誓寅奉寳齋先颺寳旛上聞齋意看誦太上眞經睿號擇日開啓齋壇恭按玄科宣揚祕範仰祈恩霈普濟存亡除具事由飛奏上帝乞降敕旨及奏諸天帝尊請降𧇖旨申三界眞司牒合屬去處各乞照㑹崇建大齋事理將亡故某乙在㑹係薦等魂及建齋弟子家億曽萬祖歷劫種親十方九幽苦瑰罪魄權停考對落㓕惡根願假道力恩光至期親朝壇陛懴雪罪垢祗受齋功欲得所屬去處預知修奉須至專牒者牒𠉀到請詳前項備去事理疾速指揮移文冀兖青徐揚荆豫梁雍州社今及諸府州縣鎮城隍互相關報咸使知聞今來修奉大齋事理火急根刷管下乆滯幽隂无由度脫孤魂滯魄𡨚讎執對之衆各令分頭考對先次攅𩔖誘諭俾令捨離惡縁發生善念同𠉀建齋之期當再牒請指揮發遣赴壇濯鍊形神叅朝太上聞經聽法解負除𡨚歆受齋羞祗承功德普霑開度俱遂超生上應大道之慈悲下顯齋功之廣博牒請依應施行謹牒歳次某甲子某年月日牒批朱牒上天下都城隍主者印階法位姓某押摺角封正面謹具法位姓某押封背面靈寳大法司牒上天下都大城隍主者州城隍靈寳大法司牒上某州城隍主者當司今據某郷貫同都城隍牒至須至專牒者牒侯到請詳前備去事理疾速指揮移文諸縣城隍并管下郷鎭里社正神縣隍牒攺作移文管内郷鎭里社正應干香火去處咸使知聞今來修奉大齋事理至期放逐孤魂滯魄等衆前來歆受齋羞祗承功德更請關㑹諸處諸祠廟𣏌正神各各預集神兵伺𠉀建齋預期前來衞護靈壇掃除厭穢隔絶葷辛鈐束孤魂滯魄母令妄起𡨚心潜害人命開壇請爲監臨祗伺寳馭下臨眞游降格齋事圓成言功舉遷牒請依應施行謹牒縣城隍牒同前州城隍牒摺角封正面背面同前式神位同牒攺馬關四直功曹關子靈寳大法司當司今月曰時發緊急奏狀五函申狀一函重封印全上詣三天門下上清天樞院請進須至關發者右關某甲子年年直功曹使者某甲子月月直功曹使者某甲子日日直功曹使者某甲子時時直功曹使者准此齋管前去分明投進申上雲程之中不許稽遲有所遏截攝赴近獄依律施行故關歳次年月日時關枇朱關四直功曹印法階姓押可漏正面具法階姓押封背面靈寳大法司關四直功曹使者功曹符使關子靈寳大法司當司今月某曰某時發緊急文字下項一申狀五函重封印全上請靈寳五位聖師門下三元都㑹府北隂酆都大帝宮東霞扶桑丹林大帝宫東嶽泰山府或别引沿路土地傳選亦可巳上並請逐處申上右關某年年直功曹使者某月月直功曹使者某日曰直功曹使者某時時直功曹使者上界直符使者中界直符使者下界直符使者准此齎持前去逐處分明申上雲程之中不得時刻稽滯故關歳次年月日關引都大城隍司土地引靈寳大法司當司某月某日某時發緊急公牒一角仰齎赴天下都大城隍司投落須至指揮右引某處土地及前路應干經由地分土地准此指揮齋管上件公文火急迊傳前去分明投落在路不得住滯時刻及有揩磨損失如或稽違罪歸有處歳次某年某月日某時引具印階位押州縣城隍引又同都城隍司土地引引攺作某州縣城隍主者前通下右引某州縣城皇同下錢馬狀單功曹直符錢馬單靈寳大法司今據齋主某人備到金錢幾分從馬幾騎右謹奉上四直功曹使者三界直符使者伏維鑒納謹狀今月日當司支錢馬狀將吏錢馬單靈寳大法司今據齋主某人備到金錢幾分銀錢幾分從馬幾騎奉上靈寳大法司靈官功曹金童玉女天將天兵上清天樞院天將天兵以下隨法師所受法開列不可拘此北極驅邪院神將神兵玉樞五雷院雷將雷兵嶽府綂兵助法二大將馬步精兵等衆右請准此受領今月日當司支錢馬單土地錢馬單靈寳大法司今據齋主某人備到金銀錢幾分從馬幾騎支送天下都大城隍司下沿路土地右仰准此受領今月日當司支錢馬單州縣城隍司土地單狀同前式无上黃籙大齋立成儀卷之四
