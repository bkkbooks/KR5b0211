body:
  text: 太上執法仙士蔣叔與編集雜門經賷帳狀一齋壇上層方廣二丈浙尺淮尺一丈六尺中層方廣三丈二尺淮尺二丈六尺下層方廣四丈淮尺三丈二尺毎層髙一尺二寸或一尺五寸爲則梵炁牌八横造各闊九寸髙五寸爲則青一赤一白一黒一黄一裝綵如法門牌十四青三赤二白三黒二黄四裝綵如法門楣三十條隨壇門闊狹爲則日月雲板三十片門楣上兩旁用之壇纂八十一枚長纂三十五枚長一丈短纂四十六枚長七尺蓮花頭八十一箇纂頭上用絳繩五百尺三十二天旛三十二首五方旛五首小雜色旛一百二十首開旛小花二百枝蓮花燈五十籠燈盞油心燭副之壇四圖三十六籠餘於壇外懸之蓮花燈纂六十六燈盞油心炷副之施於外壇上層十八中層二十二下層二十四門綦内之班序牌十四座依位安之上書都講監齋之類周天燈座一百六十以木車成高三寸爲則燈盞油心炷副之周天燈牌八十一座木造黄紙上書燈名位三寳位御案一卓衣副之三寳牌三座上施蓋寳蓋一座結綵爲之四圍皆垂小旛香鑪一香合二花瓶二茶湯盞槖采盤三副湯瓶一副燭䑓二十方天尊位香案十卓衣副之香鑪十香盤十花瓶十茶湯盛槖果楪十副湯瓶一副燭䑓十五方眞文案五隻九時散花九盤髙功位駒十香案一卓衣副之燭䑓二都門外香案一卓衣則之花瓶二香鑪一香盤二燭䑓二六幕位牌十四座香案六卓衣副之花瓶六香鱸六香盤六燭䑓六燈六座茶湯盞槖果楪十四副湯瓶副之監臨所位牌五座香鑪二香案二卓衣副之香盤二花瓶二燭䑓二燈二座齋壇鎮信綵一百三十六尺青繒九紅繒白繒七曽丘曽繒三十二黄繒八十命繒各隨本命之色一尺公侯以紫金龍十條公候以爲之士以銅塗金玉璧十片米一斛二斗或二斛四斗錢二貫四百或一貫一百公侯二十四貫或十二貫油二斗四升或一斗二升炭二十四斤或十二龍頭銀刀一柄木硯十箇墨十片筆十管紙十軸毎軸十二幅投簡金龍三條玉璧三片青一圓造黄一圓造黒一六花中皆通竅徑三寸六分或二寸四分金鈕二十七隻鈕銅皆可徑一寸二分中空青絲一兩二錢以繫金鈕白槿未簡三片各長一尺二寸闊二寸四分厚二分封簡袋三枚青一黄一黑一或羅或絹或紗皆可爲之靜黙堂位牌三座香案一卓衣副之燭䑓二茶湯盞槖果楪三副燈二座花瓶二香鑪一香合一講座一座椅十四隻長案二水盆二茶湯盞槖十四副香湯逐日昇壇盥潄用之最不可缺手巾二一造諸旛告盟旛黄絹造長四十九尺上垂寳蓋木老鴉旛竿䋲木副之遷神旙黄絹造長四十九尺太一旙黄絹造長四十九尺命靈旙黄絹造長一丈二尺超度旛黄絹造長一丈二尺回耀旙紅絹造長九尺若寒棲之士方不及者止造告盟遷神回耀旙亦可五方旙五首五色繒夾爲之長五尺法師當自備不可重費齋家三十二天小旙同此三十二天旛三十二首東青南赤西白北黑各入以繒夾之長二尺二寸或隨天色爲九色九獄燈旛九首青紙造長四尺九寸破獄九天旛九首黄紙造長四尺九寸回耀燈小旙四十九首紙爲之黄白相間召攝旙二首白絹十尺二寸中分爲之長三尺六寸夾進正度普度各一旙一章信啓告玄穹章紙一張筆墨硯一副書刀一口金魚一杖以銀爲之重半兩或三錢二錢玉鴈一隻香五兩柴五十斤炭五十斤鹽一斤䜴一斤無豉以豆代油一斗二升米一石二斗錢一貫二百文淨巾二條命信若干尺自餘毎章一通米五斗錢一貫二佰文紙筆墨硯如儀餘悉免或力乏不能備師爲代出魚鴈書刀止輸命信或米或錢皆可一拜章毎通合用冩章劄紙二十幅副章紙十幅章函一隻栢木或梓木造長一尺二寸八分闊二寸八分浙尺正中上下闍三印用池章案一隻豹脚造長二尺四寸髙八寸栢梓楠木爲之黄羅卓衣一副褁章黄羅帕子一條校章銀龍頭書刀一柄金魚玉鴈各一隻餘章通同力乏之者師爲代出冩章筆一管淨墨一片襯章綵一疋入章腦子隨意寫章信錢三貫小章二貫護章香一斤降眞香從章醮三十六分金錢三十六貼雲馬三十六疋茶酒果各三十九分三清三分從章三十六分青絲繫章函用黄蠟二兩封章用章鑪一外造拜言功表表函一及几一隻同章式冩表黄絹一丈四尺一丈二尺冩表二尺爲可漏外備青絲黄蠟封表昇天法橋朱陵火府錬度水火池五苦門龍童驛吏茭龍一角青色裝金龍兩用黄色裝童子二員一青一黄驛吏二人直符東一執斧一執副獄名牌九座回耀燈牌套四十九座鋪燈細沙一石懸旙小竹一束一幽魂斛食隨力設之或七或五或三茭郭一所闍門六道前齋食六分多則尤妙香案燈燭隨冝改之六道六浴室二所盆灼巾澡豆浴具之𩔖副之冥衣冥財駞馬經旛符簡金銀綵繒一正薦亡位符簡二面符誥籙劵黄絹二丈黄紙十幅黄綾一尺誥籙表首用之經帶青經簽浴具冥衣雲厨法食冥財駝轎金銀綵繒經旙自餘亡位及經韓等並隨齋主意一供養關發預告茶酒果子二十四分金錢二十四貼從馬二十四疋金銀錢二貼馬三疋關發正奏茶酒果子三十六分金錢三十六貼從馬三十六疋金銀錢五貼馬五疋告符命金錢十二貼馬十二疋發玉札茶酒果子十二分金錢十三貼從馬十二疋發開啓䟽及六幕䟽金錢十五貼從馬十五疋靜黙師堂前茶湯三分果子九楪監臨所茶湯五分果子十五楪六幕茶湯十四分果子四十二楪三日正齋九時行道毎朝茶湯三十二分果子九十六楪三寳三十方十六幕十四監臨五茶湯毎朝一換果子每日一換關發謝恩清醮茶酒果子三十六分金錢從馬三十六分投山水簡毎處茶酒各二十四分金錢從馬二十四分鍊度毎次茶酒果子三十六分金錢三十六貼從馬三十六疋符命符簡以栢未爲之梓木亦