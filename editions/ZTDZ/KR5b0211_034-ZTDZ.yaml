front:
  text: 无上黄籙大齋立成儀卷之三十四白四
  hash: sha256:052eac9c5cf6f506d1447154971e395845b2d53a08b18df1afed04d165da8694
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_034-090578a, image: sjb/09/090578a.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿撰集齋法修用門釋出官啓事張萬福天師曰凡傳言驛行皆憑神道庶得感通所言神道仙官吏兵是也仙官吏兵須是師受即仙靈治籙三部八景三十二天玉童玉女五帝直符直事等是也道士身有此仙官始得預齋請空輸屈折罔冐真靈貽其罪考謹之發鑪畢衆官長跪法師叩齒二十四通出吏兵上啓畢各叩齒三通咽液三過右出靈寳太極敷齋威儀經仙公曰此謂初齋啓事儀日夕六時燒香惟向香鑪呪耳便禮拜也張清都曰建齋止出一官至齋訖言功不復出吏兵也釋上啓願念正齋上啓聖位及後語出靈寳盟真科乃飛天神人所說三上香願念文出下元黃籙簡文靈仙品今故燒香自歸依師尊大聖衆至與道合真等語凡齋科三上香原念之文皆然而今科上啓後亦云與道合眞蓋以黄籙簡文經中所載三捻香願念之前亦有此文不敢改易經語張清都科亦因之恐後學不知其故咯爲釋出釋二十方懴隨方依科懴謝日宫東北方月宫中嶽西南方星宫水府經法北方四嶽各隨本方右二十方懴文爲㧞度罪根威儀出靈寳下元黄籙簡文靈仙品釋各思九色圓象咽液命魔鬼功立鬼門之上都講立天門之上衆官次都講立先叩齒三通咽液三過心存曰月在巳面上從鼻孔入洞房金華宫兩眉間却入辟方一寸曰明堂宫二寸曰洞房宫三寸曰丹田宫明堂之北洞房之南向上辟方一寸曰金華宫日從鼻左孔入月從鼻右孔入光明出項後煥然作九色圓象薄入玉枕徹照十方隨我繞經而行之矣又叩齒三通嚥液三過右出太上玉經隱注宻呪并釋杜廣成先生曰此宻呪不得令耳聞違之有咎貴誠之謹之黄中策炁斬祅宗宻制強精斷邪翁太上有命太上房急召北帝詣玉宫受承威令宣魔王五炁蓊鬱與命衝祕藏玉文方就隆三天運明六天運終賢者哉右出靈寳五符人鳥經洞真八道命籍存思之法與此不同并附見于後可兼用之禮方竟還東向思神閉目叩齒五嚥液五存五神備在身中五符煥明内外五方羣魔奔走逺迸來侍衞者嚴裝羅列在眞官後良久咽液三叩齒三誦人鳥山經呪曰黃中䇿炁張萬福天師曰天尊未說經之前諸天三界應王五帝大魔皆爲萬神之尊總領鬼兵逰觀太空自號赫奕與天齊功行威縱毒病苦萬人男女禱祝煞害鼓舞以敬畏之天尊說經之後百魔伏化而神公受命普掃不祥魔無干犯鬼無妖精衆魔既伏天尊聖化便爲諸天上聖妙行眞人䇿駕前驅掃塵啓路所以衆聖將欲逰天先命諸魔前驅䇿駕也經云魔王敬受事故能朝諸天是也所以歩虚先當存思命魔右三朝命魔張清都所言盡矣趙道升修黃籙儀認爲内事止於午朝命魔蓋本政和金籙此是其所見錯處非經旨也釋歩虚旋繞張萬福天師曰玄都玉京山上冠八方即太上無極虚皇大道君之所治也髙仙之玄都焉諸天大聖髙仙真人各各持齋奉法宗太上虚皇於此矣凡遇齋日並乗飛龍八景雲輿大會太上玄都玉京燒自然旃檀返生靈香飛仙散花旋繞七寳臺三帀行誦空洞歌章也其時八風楊旛香花交散流煙蓊鬱太上稱善又飛天之神常乗碧霞之輦遊於玉隆之天一日三時引天中衆聖上朝七寳之宫七寳之臺七寳玉宫皆元始天尊所居諸天衆聖朝時皆旋行誦歌洞章即升玄歩虚章或旋空歌章大梵無量洞章之流也宻呪畢都講唱歩虚旋繞以次左行繞經三周其第一首但平立面經像作第二首即旋行至第十首須各復位竟之毎稱善各回身向中散花禮一拜法十方朝玄都也右按上元金籙簡文眞仙品曰㧞度生死建齋威儀禮十方畢次一時左轉繞香燈三周師誦歩虚之章弟子都門讃祝三周如玄臺法尊卑相次安徐雅歩調聲正氣誦詠空洞之章勿得顧盻意念不專遲速越錯更相進却要量壇席廣狹爲則如壇席狹處第二第五第八首旋繞散花餘面經像作可也歩虚空洞之章十首并釋稽首禮太上燒香歸虚無流明隨我廻法輪亦三周玄願四大興靈慶及王侯七祖生天堂煌煌䊮景敷嘯歌觀太漠天樂適我娯齊馨無上德下仙不與儔妙想朗玄覺詵詵廵虚遊旋行躡雲綱乗虚歩玄紀吟詠帝一尊百關自調理俯命八海童仰携髙仙子諸天散香花蕭然靈風起宿願定命根故致標髙擬歡樂太上前萬劫猶未始嵯峨玄都山十方宗皇一迢迢天寳臺光明爓流日煒燁五林華倩燦曜朱實常念飡玄精煉液固形質金光散紫微窈窕大乗逸俯仰存太上華景秀丹田左顧提鬱儀右盻携結璘六度冠梵行道德隨日新宿命積福應聞經若至親天挺超世才樂誦希微篇冲虚太和氣吐納流霞津胎息靜百關寥寥究三便泥丸洞明景遂成金華仙魔王敬受事故能朝諸天皆從齋戒起累功結宿縁飛行淩太虚提携髙上仙控㘘適十方旋憇玄景阿仰觀劫刃臺俯盻紫雲羅逍遥太上京相與坐蓮花積學爲眞人恬然榮衞和永享無期壽萬春奚足多大道師玄寂升仙友無英公子度靈符太一捧𣶈章舍利耀金姿龍駕歘來迎天尊盻雲轝飄飄乗虚翔香華若飛雪紛靄茂玄梁頭腦禮金闕携手遨玉京騫樹圓景園煥爛七寳林天獸三百名獅子巨萬尋飛龍蹲躅鳴神鳳應節吟靈風扇竒花清香散人襟自無髙仙才焉能耽此心嚴我九龍駕乗虚以逍遥八天如指掌六合何足遼衆仙誦洞玄太上唱清謡香花隨風散玉音成紫霄五苦一時迸八難順經寥妙哉靈寳囿興此大法橋天眞帝一宫藹藹冠曜靈流煥法輪觸旋空入無形虚皇拊雲璈衆眞誦洞經髙仙凛乎讃彌劫保利貞至眞無所待時或轡飛龍長齋㑹玄都鳴玉扣瓊鍾十華諸仙集紫煙結成宫寳蓋羅太上眞人杷芙蓉散花陳我願握節徴魔王法鼓㑹羣仙靈唱靡不同無可無不可思與希微通右出靈寳五京山歩虚經毎一首終各稱善一拜釋重稱法位大謝衆各重稱所受法位髙功北向大謝衆官人各長跪留冲靖止束向右大謝懴罪之文出黄籙簡文經及靈寳太極敷齋威儀經十念一念爲道四大合德某家七祖父母免脫憂苦上升天堂衣食自然二念帝王國主道化興崇庠序濟濟皇化恢弘威儀翼翼普天所瞻民稱太平戎夷賔服妖惡日滅賢聖日生三念法師功德大建教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和穆好尚仁義貴道賤財行爲物範六念損已布施道士及飢寒之者天下人民各得其所七念蠕動蚑行一切衆生咸蒙成就八念赦貰某家門前世生死罪對立功補過九念某家門興盛宗廟有人世生賢才十念尊受師經不敢中急平等一心廣度一切克獲上仙白日升天拜見太上永成眞人服五色雲衣與道合同一作雲車羽駕與道合同十二願并釋一願大道淡泊虚無安閑空寂澄清自居廣開法門教導頑夫皆蒙慧解精苦是修預以同學普得升虚與天相保長存無憂一切衆生咸同寧休二願諸天結氣澄清髙虚廣覆保眞固靈氣候調節四運和平國安民豐普天閑寜廣濟一切惠逮有生保劫長存億億不傾三願地土廣載無窮安平不䧟海淪不崩保鎭寧國兆民興崇飬生安死惠周十方禾稼種植滋生日豐含德厚載萬願咸從四願日月二景髙明無有勃食𧇊縮安清光照諸天洞消暗㝠保固劫運世祚和平普加潤惠澤灑衆生五願星辰與日月齊光轉燭照耀映朗十方各安其位經緯直行保鎮安國無有災殃四海寜一普天興昌六願四時隨節推遷景氣調和無有災患疫毒消滅普天平安五穀豐熟國富民懽士願浮雲結氣聚煙飛空髙澄䕃覆玄玄隱則無爲散則彌天神仙同居結友衆眞惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長爲仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含客恢廓無細不殖淵澳柔惠潤加喘息天人獲慶年同劫石十一願帝王國主曰昌四海安穆兵革不揚天人歌唱吉應來祥敷教濟濟威化洋洋兆庶稱慶長樂未夬十二願蝖飛蠕動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮右出靈寳眞文要解經回向誦向來禮懴功德轉經作轉念功德隨冝改換上資家國下及存亡同頼齋功轉經作勝因成無上道小啓謝過宻呪每日登齋出壇於玄師前宻祝之臣等令奉爲某官某乙登齋升壇行道切恐進止犯科不合儀格爲四司所紏五帝所千愆萬罪乞垂赦免使功德成就啓奏感通即仰荷玄中大法師三官五帝罔極之恩畢三禮无上黄籙大齋立成儀卷之三十四
