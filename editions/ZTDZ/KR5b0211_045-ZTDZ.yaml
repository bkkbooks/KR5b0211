body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編集符告門五方眞文太上靈寳東方八天自然玉字青帝九炁天文真文六十四字見符命門岀五鍊生尸經維某某歳次某甲子某月某朔某日甲子具官某乙伏爲正普薦某乙衆魂謹賫法信詣靈寳大法司乞請道士一壇就某處於今月某日啓建无上黃籙大齋三晝夜滿散修設謝恩清醮三百六十分位謹以本方鎮信請法施行東方八天自然玉字安鎮齋壇明露天地㧞贖罪苦開度超生一如青帝太玄女青符命餘四方真文後文並同東方隨方改換中間語内中央真文作中央大羅之天大上靈寳南方八天自然玉字赤帝三炁天文眞文六十四字太上靈寳西方八天自然玉字白帝七炁天文眞文六十四字太上靈寳北方八天自然玉字黒帝五炁真文眞文六十四字太上靈寳中央大羅之天自然玉字黄帝一炁天文眞文一十六字右五方眞文並用青紙朱書四保舉狀歷關諸天此一狀用青紙朱書泰玄都省謹奉道旨爲某郷貫某官修建无上黄籙大齋三晝夜升度亡過某乙等靈魂超升丹界謹按靈寳本科合行保舉者右歴關諸天請滅亡過某乙等三惡斬絶地根飛度五戸名列太玄魔王監舉無拘天門一如告命風火驛傳歳次某甲子某年某月某日某時告下其法位臣姓某奉行三天扶教都天大法天師普告三界泰玄都省謹奉道旨同前文右普告三界無極郷泉曲之府北都羅酆三官九署十二河源上解亡過某乙等祖考億劫種親疾除罪簿落滅惡根不得拘留通合鬼羣一如誥命風火驛傳歳年月日告下具法位臣姓某奉行三天扶教都天大法天師敕制地祇泰玄都省謹奉道旨同前文右敕制地祇侍衞送迎亡過某乙等㧞出地户五苦八難七祖升遷永離鬼官魂度朱陵受鍊更生是謂無量普度無窮一如告命風火驛傳歳年月日告下具法位臣姓某奉行三天扶教都天大法天師元始符命泰玄都省謹奉道旨同前文右元始符命時刻升遷北都寒池部衞亡過某乙等形魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年氷度三塗五苦八難超淩三界逍遥上清一如吿命風火驛傳歳年月日時告下具法位臣姓某奉行三天扶教都天大天師右三狀以黄紙墨書並髙一尺二寸連前狀同用黄紙作一封可漏四𥿄共作一封昇天保舉文狀具法位姓某謹封可漏背面昇天亡故某乙等魂昇天左右劵左劵告文靈寳昇天左劵告下三界天門守衞諸神具法位臣姓某奉行歳年月日時告下道境魂神受度更生自然一如告命風火驛傳度亡過某乙上登元始靈書玉清中篇太上撰次降自三天昇劵文見符命門背書三皇内文六十八字元始靈書玉清中篇太上撰次降自三天昇度亡過某乙上登道境魂神受度更生自然一如告命風火驛傳太歳某年某月朔日時告下具法位臣姓某奉行靈寳昇天右劵告下三界天門守衛諸神右劵告文靈寳昇天右劵告下三界天門守衛諸神具法位臣姓某奉行太歲某年某月朔日時告下道境一如告命風火驛傳人亡過某乙承兹功德上登上清無量之奥深不可詳敷落神眞普度天大魔天中之靈九和十合變化音隱韻天中空洞自然靈章天中之尊天中無色之景天帝玉眞梵行帝諱三界天名隱劵文見符命門背書三皇内文六十八字無色之景天帝玉眞梵行帝諱三界天名隱音𨼆韻天中空洞自然靈章天中之尊天中大魔天中之靈九和十合變化上清無量之奥深不可詳敷落神眞普度天人亡過某乙承兹功德上登道境一如告命風火驛傳太歳某年某月朔日時告下具法位臣姓某奉行靈寳昇天右劵告下三界天門守衞諸神右二劵並青素丹書髙九寸或一尺長一尺六寸或一尺八寸爲則度魂夜告訖正中截斷右一半函付天門吏左一半付亡人収執結旛脚上發眞劵可漏以黄紙三寸要寸具法位姓名謹封方函靈寳昇天合同眞劵告下具法位姓某謹封三界天門守衛諸神發劵牒无上黄籙大齋壇牒上三界天門守衞諸神本壇今月某日爲某處某人崇建无上黄籙大齋以某日夜昇度亡過某乙等魂超昇丹界謹按靈寳大法破昇天左右契劵除將一分付亡過某乙収執外一分入方函封印全牒上三界天門守衞諸神請行照會須至專牒者牒前件劵文隨牒見到請照會交管伺候已受亡故某乙等賫執劵文到來即與驗認合同應時超度魔王監舉無拘天門牒準靈寳大法科令奉行謹牒歳年月日牒發劵關子无上黄籙大齋壇本壇今爲齋主某開建无上黄籙大齋追薦亡親某乙等除已依科開度外今告行靈寳昇天大劵文昇度亡過某乙等魂上登道境所有合同劵文一函須至關𤼵前去者右關某日當直功曹使者請疾速賫管前去徑諸三界天門守衞諸神告下候亡過某乙執券到日依科放入天門受生施行歳年月日時關九天寳誥告文中元金書九天寳誥寳誥三十二字見符命門分四行書上帝符命宣告三官天牢地獄主司大神超度亡故某乙咸領符命部衞形魂祗受寳誥上朝帝庭罪仇和釋與道合并神登玉闕受鍊長存一如告命風火驛傳太歳某年月日時告下具法位臣姓某承誥奉行天師三天扶教輔元大法天師正一靜應眞君聖師東極宫中大慈仁者㝷聲赴感太乙救苦天尊祖師萬劫應化眞元教主太平金闕前聖虚皇大道君右寳誥丹書黄上告文墨書紙素皆可用綾錦之屬裝背如今世告敕様度魂夜宣訖給付亡靈洞玄靈寳長生度命黄籙太上洞玄靈寳長生度命黄籙惟太歳某甲子某年某月某朔某日某中子郷貫某人伏爲亡親某同青詞語至上謝天恩仍就黄籙齋壇乞傳授太上洞玄靈寳長生度命無上黄籙一階付某乙靈魂賫執過度三界超升九天謹按經云元始天尊昔在九清妙境三元宫中與諸大聖衆敷弘至妙開化人天標記善功注名黄籙金格玉簡陳列三清一一地獄皆見十方救苦天尊入於九幽㧞度諸苦天尊普告四衆汝等若能受持金籙白簡九眞妙戒長生靈符救苦眞符當消九幽大罪標名九宫察命童子䕶戒威神五帝直符六宫掾吏自當隨逐簡文覆護受戒弟子令當爲汝顯說九眞妙戒金籙白簡受持功德救難濟苦神力難思衆靈稽首伏德教命天尊告曰一者敬譲孝養父母二者克勤忠於君主三者不殺慈救衆生四者不婬正身處物五者不盜推義損己六者不嗔兇怒淩人七者不詐諂賊害善八者不驕傲忽至眞九者不二奉戒專一護戒威神像駒五察命童子像救苦眞符元始符命金籙白簡救苦眞符告下十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵司命司録司功司殺牛頭獄卒三界大魔㧞度某靈魂出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乗此九真妙戒㧞度功德上生天堂一如告命太歳某年某月朔某日某甲子於黄籙齋壇告下百二十曹像長生靈符元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益筭度厄尊神廻骸起死監生大神超度某靈魂上登朱宫流火之庭玉眸鍊質黄華蕩形書名紫䇿受化更生乗此金籙度命功德時刻昇遷一如告命太歲某年某月某朔某日某辰於黄籙齋壇告下廻骸起死尊神像帝君品命嬰兒坐三炁圓光中見符命門帝君像見符命門受度亡過某靈魂即日恭詣黄籙齋壇拜受太上洞玄靈寳長生度命无上黄籙一階如法受持永充濟㧞人間天上敬信奉行一如玄科律令太歳某年某月日某州縣宫觀黄籙齋壇給保舉師具法位姓押監度師具法位姓押度師具法位姓押太上洞玄靈寳長生度命无上黄籙右長生度命黄籙止正度亡魂用之餘不給造籙用黄紙朱書玉堂本用青紙金書彩色繪晝人物了畢方注亡靈名謂正度亡魂某乙六字注訖方作流火亭火鍊符印押了畢以青紫或黄紅之屬標背用經帶軸頭三塗誥告文玉清開光寳符符見符命門右告下落滅色根惡道靈官奉爲亡過某乙斬絶天徒界上尸道色欲門超度三界逍遥上清一如告命風火驛傳歲年月日告下具法位臣姓某承誥奉行玉清開明寳符符右告下落㓕愛根惡道靈官奉爲亡故某乙斬絶人徒界中尸道愛欲門超度三界逍遥上清一如告命風火驛傳歳年月日告下具法位臣姓某承告奉行玉清開苦寳符符右告下落滅貪根惡道靈官奉爲亡故某乙斬絶地徒界下尸道貪欲門超度三界逍遥上清一如告命風火驛傳歳年月日告下具法位臣姓某承誥奉行五苦誥文玉清流火符見符命門右告下飛度色累户靈官奉爲亡故某乙解除色累苦心門㓕度泰山地獄苦形神昇度謁帝天關福智同生叅侍龍轅一如告命風火驛傳歲年月日告下具法位臣姓某承誥奉行玉清流精寳符符見符命門右告下飛度貪累戸靈官奉爲亡故某解除貪累苦形門滅度摙山負石苦形神昇度謁帝天關福智同生叅侍龍轅一如告命風火驛傳結尾同前玉清流景寳符符見符命門右告下飛度貪界户靈官奉爲亡過某解釋貪界苦形門滅度提石負山苦形神昇度謁帝天關福智同生叅侍龍轅一如告命風火驛傳結尾同前玉清流霞寳符符見符命門右告下飛度欲累户靈官奉爲亡故某解除華競苦精門滅度填作江河苦形神昇度謁帝天關福智同生叅侍龍轅一如告命風火驛傳玉清流輝寳符符右告下飛度形累户靈官奉爲亡故某解除身累苦魂門滅度吞火食炭苦形神升度謁帝天關福智同生叅侍龍轅一如告命風火驛傳歳平月日告下具法位臣姓某承誥奉行可漏玉清某寳符超度亡靈某方函玉清某寳符告下某靈官具法位臣姓某謹封三簡告文山簡本貫某郷某處具官姓某奉爲亡親某靈於某處修建黄籙大齋三日三夜滿散祗設清醮若干分位仰答恩光齋壇解散投簡靈山伏願天官賜福地府除愆鄷山削罪幽獄停𡨚注名朱府運度自然見存得道徃逝生天繒璧効信金龍驛傳一如告命太歳某年某月某朔某日某辰具髙功位某於某處山洞府告文土簡杜儀云役於壇上天井中埋月艮之上本貫某郷某處具官姓某奉爲亡親某靈於某處修建黄籙大齋三日三夜滿散祗設清醮若干分位仰答恩光齋壇解散投簡壇中伏願地官赦罪罷對羅鄷刀山斷刃劍樹墔鋒中黄戊巳上奏蒼穹有情衆類普度南官見存得道億劫無終効信繒璧傳驛金龍一如告命太歳某年某月某朔某日某辰具髙功法位某於某處靈壇告文永簡本貫某郷某處具官姓某奉爲亡親某靈於某處修建黄籙大齋三日三夜滿散祗設清醮若干分位仰答恩光齋壇解散投簡靈淵伏願水官解厄告命重泉五湖四海十二河源疾除罪薄息苦停𡨚亡魂受錬超度南天功加一切注籍金篇繒璧効信金龍驛傳一如告命太歳某年某月某朔某日某辰具髙功法位某於某處靈泉水府告文玉清大洞玉符告文玉清大洞金玄羽章飛空秘符符見符命門右告下腦神泥九赤文混洞君目神通光君晨嬰君舌神騰陽君心神玄珠君肝神青帝君脾神紫庭君肺神皓洞君腎神太淵君隂神續命君胞神元常君胎神舍生君結神九華君節神杳浩君血神中幽君精神元徐君炁神元央君神神天生君命神五中君速降眞炁錬化正薦某乙普度在㑹衆魂九幽男女孤魂滯魄等衆委炁聚形全神復性一如玄科律令歳年月日具法位姓某奉行玉清火府隠文告文玉清火府𨼆文符見符命門玉清王府玉篆雷文關告㝠曹開泰亡爽錬度登眞火府靈官南昌典主千五百神君火帝火官把籙當前九錬死魂疾便受形玉文一下不得久停司命司馬在左司録司生奉行一如告命歳次月日具法位姓某奉行