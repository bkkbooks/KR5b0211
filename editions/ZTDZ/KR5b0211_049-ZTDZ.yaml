front:
  text: 无上黄籙大齋立成儀卷之四十九駒九
  hash: sha256:6390a5d9c54beca77ad064f96222be3c453326383e87197d271daaea594c872b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_049-090656c, image: sjb/09/090656c.png}
body:
  text: 太上執法仙士蔣叔輿編集齋直須知門修奉規格應開建大齋要在洞天福地宫觀爲上立壇須是方位端正坐北面南如宫觀元有壇處坐向方位或偏别就宇下依式立壇壇位既正屋宇坐向雖偏不妨行事應齋主建齋當竭誠恪營辦龍繒璧鈕務在精好香花油燭一一所需並要潔淨不使穢觸及臨用有缺科云修設大齋以精專爲先龍繒爲上香燭䖍潔抑又次之茍有一關亦齋之瑕玷也修奉之士所當謹守應凡建齋須是量力所及冨則備物貧則隨冝所市齋需不得用非義之財及與人爭較價直力有餘而苟且營辦力不及而勉強經營皆爲不誠難期感格如齋主係忠孝之家誠殫力乏師爲代出龍繒之屬凡事從省應干文字醮獻等以類相併務在合冝應齋官上奏有官位具官無官稱奉道弟子若父母之䘮稱孤子哀子應亭䘮在室屋宇深闊䘮在别處亦可修奉及生死厭穢未經解除者不得於家庭建立齋壇應齋儀中修用存思訣法並載齋法修用門讃唱威儀並載修奉應用門更不於本儀中詳註應文字行遣帝尊用奏狀餘並用申狀神司用公牒應奏狀並稱臣中狀稱名天樞院狀稱本司前用司額關帖牒等稱當司應奏申狀前空一掌後空兩掌𥿄高一尺四寸來許餘則用展劄𥿄爲佳醮請獻狀止用狀𥿄應奏狀内聖位並用黄簽臨時貼應奏狀前貼黄髙三寸二分闊二寸四分或髙三寸六分闊三寸爲則分單行冩貼黄後合縫處書臣名用印或依朝廷格式貼黄亦可應奏申内倚黄用小黄簽側貼太歳下應奏申狀可漏單聖位者用黄簽側貼兩位四位者稍用闊黄簽當中貼三位五位以中爲尊兩位四位以右爲尊聖中冩御前及聖前字或止冩最前一位亦可下界神祇狀用白簽應奏申方函面上並不用貼黄亦不稱臣兩頭止書名章詞表外函同此如申狀内聖位多者方函止題最前一位如東方木德與東斗東方七宿同一狀止題東方木星真君聖前之類應奏申狀上帝狀稱道慈勅㫖帝尊稱聖慈睿旨二后稱宸慈聖㫖三清四帝稱陛下二后稱殿下諸帝尊稱御前諸眞稱聖前下界神祇稱神前應帝尊並獻龍車地祇皇君獻輦應牒關劄後並批朱公牒書名押字關劄只押字牒皮正面上書謹字中印法階書名押字下書封字用三印背書司額牒上書主者用二印關劄正面印法階只押字下書封字前用一印後用二印應奏申狀並半年用印合縫者書臣名後用一印可漏下用一印方函正面上下通用三印凡牒關帖榜等押字並用印公牒并榜太歳一行用四印前用三印關劄半年用一印凡用印並從後起應符簡告文年月用一印可漏正面用二印後用一印應符文作方函發者依方函式用印應奏狀及上界申狀用三炁飛玄玉章或用都天大法主印方函兩頭一同或用通章印正面用靈寳大法司印中下界申狀用靈寳大法司印應長生符用元始一炁印救苦符用青玄救苦印玉札用玉魁司主印凡符文屬玉清者並用元始印屬東極者並用救苦印屬上清者並用三天太上印此印諸符亦可通用應章表並用九老仙都印青詞用三炁玉章外函同奏狀式用印當中用三炁玉章兩頭或用三天太上印或通章印亦可應章書毎行十七字相去二寸四分乃爲一行𥿄髙一尺二寸書表每行二十四字爲則𥿄數及行數要合竒數爲佳前空兩行後空三行依常式書應書青詞與章表同格不拘字數前空一掌後空兩掌爲則可漏用黄𥿄三寸套封外用方函應書奏申章表等並各專闢一室中設香案母令外人得入書冩人須令沐浴更衣入室凡書章表等並用𥿄遮護两頭母令以衣着上應冩奏申文字不得以人姓名爲頭鬼字爲首不得垂生露死抽破人姓名應燒香不得用竈中灰火焚燎錢幣等不得用油燭㸃發應齋饌不得用乳酪臨齋不得飲酒應髙功法師須備受三五都功籙正一盟威籙靈寳中盟五法籙靈寳十部妙經及行靈寳大法方可依科修建如止受都功盟威二籙靈寳衆經及行天樞天心追攝錬度等法亦許攝行奏申儀中稱靈寳大法司去處及齋科稱盟受三洞寳文玉字金書等處皆合隨文換易應法師止受都功職籙及昇玄陽光洞淵等籙却不受盟威籙或止受都功職籙及中盟五法籙不受盟威籙或上受都功籙及上清籙不受盟威籙或止受都功籙不受盟威籙或止受盟威籙却不受都功籙並不許開建靈寳齋科蓋出三五正一官吏二籙不備受則出官有碍皆不可行齋事應都講以下五職亦須備受三五正一靈寳陽光等籙方可使預壇席應請同齋道衆須是平時耐於拜跪甘於淡泊專修香火不貪貨財方可結立誓盟俾登壇席要與齋官各殫誠慤祈叩穹旻以招感格若只務聲音韻羙注念不專非惟枉役精神虚費財寳切恐反遭咎責勞而無功修建之法全在擇人不可不謹應執威儀道童十二人須要先習歩虚經大歩虚十首令熟正齋旋遶時隨聲讃詠應冩文字書生到局日便令沐浴浣濯衣服務在清潔方可立局下手繕冩書生并幹局人先與斷約不許歸家宿食别委一人與之供備飲食宿卧去處仍專委一人收掌𥿄札照数出給如有錯誤不許剔補並要冩換一幅則别給𥿄一幅與之却與收下誤冩之𥿄庶可稽考𥿄數結局又可見其冩字錯誤多寡應經費門所料𥿄札數乃是確定之數買𥿄札時當於數外别買数十幅以備錯誤換易无上黄籙大齋立成儀卷之四十九
