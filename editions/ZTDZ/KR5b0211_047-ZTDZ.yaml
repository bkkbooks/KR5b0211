front:
  text: 无上黄籙大齋立成儀卷之四十七駒七
  hash: sha256:479b020fafd20d3d3a7e663b8e384befe8b96d6288b4b8d5c1117af5bd2f90f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_047-090648a, image: sjb/09/090648a.png}
body:
  text: 太上執法仙士蔣叔輿編集白語次第開啓齋壇文眞法位臣姓某焚香上啟太上無極大道元始天尊太上大道君太上老君無上玄老十方尋聲救苦天尊巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金關七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師天師君上相上宰上保上傅四司五帝經籍度師三元帝君靈寳監齋大法師眞君三界官屬一切眞靈臣聞赤書御運開齋謝之門庭黄籙度生著靈仙之品格凡伸修奉合具奏陳臣今爲某處某官資薦某靈乞就某處崇建无上黄籙大齋三日三夜仰祈睿澤普濟幽明謹爲勵率法流關盟齋法恭依玄範宿啓黄壇伏願上聖回光衆眞監度俯垂降鍳同賜證盟臣無任瞻天望聖激切屏營之至啓壇文䟽謹用奏聞三曰正齋六上啓經嘆經文存思轉經之法並見升壇轉經儀止隨時換易前後白語耳第一日早上嘆經文啓經用舊文紫府玉文周十方而惠庶品玄都瓊札總百魔以濟羣生上可致飛天下觀下可使死魂受錬殊因溥博稱嘆莫窮以今奉爲具官某資薦某靈修建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻無上大羅天玉京金闕七寳紫微宫元始天尊虚皇大道君太上老君道德衆尊三洞靈文瓊章玉字十方衆聖歷劫師尊扶教眞人玄中法主齋壇合㑹一切眞靈集此勝因先用裝嚴諸天諸地日月星辰嶽瀆靈祇風雲主宰宗桃先聖帝后儲王文武官僚華戎黎庶伏願二儀長永三景著明六炁均而寒暑平八節和而兩暘若瑶圖鞏固寳曆延洪寰宇昭明兵戎戢息九圍共軌四海同文亡過某靈魂黒簿除名朱宫度品眞心不昧覺性圓明建齋弟子某厄難移遷凶災殄滅一門康泰咸躋仁夀之郷七祖升遷徑陟逍遥之境含靈受賜幽夜開光稽首皈依䖍誠讃詠右嘆經文升壇轉經儀巳載矣今復撰此正以轉經儀一卷悉是社廣成先生撰集不欲改動古儀又慮今人以爲習熟故再立此晚上啓經文元始本章植神靈而開三景諸天隱韻禳毒害以度兆民悟之者證道成眞聽之者消災滅罪巍巍大梵蕩蕩難名以今奉爲某資薦某靈崇建无上黄籙大齋謹集戈前清衆㸔誦太上洞玄靈寳無量度人上品妙經願仗眞乗消除罪垢福田増長保身眷以安寧慧澤霑濡使幽明而開泰恩均家國澤被存亡嘆經文經傳元始教闡虚皇俾拯護於羣迷用生成於萬彚恩光普被惠力難名以今奉爲具官某正薦亡親某乙普薦在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻髙皇九土四司五帝十二仙君九宫眞人洞天福地儲副正職五嶽佐命治化仙官北都羅酆内外宫洞三官九府百二十曹一切㝠司考官掾吏集此勝因先用資福四生六道十地九幽一切窮魂無邊罪魄亡過某靈齋主某家億曽萬祖歷劫種親宅舍方隅沉埋滯識伏願尅超生界咸出苦源聽法聞經徑到無爲之境叅眞悟道永離有漏之塵齋王某禄筭増延災殃殄滅金眞散結元道遏見户之根玉簡注名天機乞延生之録姻親康泰幽顯蘇榮第二日旱上啓經文赤明開圖眞文現世集諸天之隱韻成八㑹之靈章俾極護於羣迷用超淩於萬彚以今奉爲具官某正普薦亡親某乙在㑹衆魂崇修无上黄籙大齋今集見前清衆看誦太上洞玄靈寳無量度人上品妙經願仗眞猷消除業累九宮八卦不爲身命之災六趣三塗俱證眞常之果姻親康健逝爽遷升普及羣生同霑上善嘆經文至眞經寶最上福田凡所皈依隨願獲果惟度人之上品實萬道之根宗無量勝因非嘆能盡以今奉爲具官某正普薦亡親某乙在㑹衆魂修建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以兹功德回獻扶桑大帝暘谷神王三河四海九江水帝八溟四瀆十二河源川澤神祇龍神主宰集此勝因先用資福遍十方際盡玄虚界有形有象有識有情蠢動飛行胎卵濕化日月照臨之土風雲潤澤之郷一切含靈無窮品𩔖伏願飛潜遂性飲啄隨心咸出苦源同臻道果齋主某災殃不染福慶來并早入慧源悟無生之法相克成仙道斷有欲之根塵見在利安先亡超化恩流家國福被寰瀛晚上啓經文大道無名元炁潜太空之始至眞垂象靈文開大有之先有禱悉符無文不度以今泰為具官某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋今集見前清衆看誦太上洞玄靈寳無量度人上品妙經願仗眞詮普資洪福慈雲廣覆除十方世界障業之根慧露遐覃息九幽長夜焦勞之苦亡魂超化疫癘消亡普及含靈俱登壽域嘆經文寳珠懸空納十方無鞅之衆眞經洞煥作五色鬱勃之祥是爲微妙之文普度淪胥之苦以今奉爲某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻某甲子太嵗尊神九州十道廟貌神祇府縣城隍之神司命土地行年部分一切衆神集此勝因先用裝嚴弟子某家奉事香火内外衆靈太歳部下逰年神煞住居里域禁將等神伏願安鎮其方各居所部斥凶衰於四境除災沴於八方火盜消除門庭清吉齋主某疾疫不作福禄惟新虚耗潜亡精靈伏匿姻親康泰上南斗之生名逝爽遷升除北隂之鬼録含靈受賜家國蒙休第三日早上啓經文大道分光初演不言之教天尊布化漸垂有作之文結炁成章凝雲作篆總包萬法普度羣生以今伏爲某正普薦亡親某乙在㑹衆魂崇修无上黄籙大齋今集見前清衆看誦太上洞玄靈寳無量度人上品妙經願仗眞乗解除罪垢法乗接引俱消塵漏之縁聖智圓通齊契正眞之果亡靈受度率土蒙恩嘆經文元始靈書度人上品落三災度九厄理五炁混百神寳之上天不傳下世是謂玄奥難可尋詳以今奉爲某官某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻南極長生大帝日月九曜星君太一十神南辰北斗二十八宿十二宫神建齋弟子某建生星斗本命元辰眞官神將身命運限旁臨正照威星暗曜九宫八卦隂陽支干逰年太歳一切神煞集此勝因先用懴滌齋主某家先從徃劫洎受此身染着妄縁因成障難六根三業五欲十纒宿對重愆陽非隂過並祈蠲宥咸與蕩除伏願惠澤遐覃天光下燭永度水火風災之苦不逢魑魅魍魎之妖族屬平安亡靈超濟邦家受福品彚蒙恩晚上啓經文元始開圖真經設教上以和天安地下以保國寜家普度無窮故曰無量以今奉爲某官某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經願仗眞功普流洪福六塵幻妄咸除六欲之根三洞流行俱究三便之果寰區靜謐泉夜清夷上極萬天下覃九壘普承惠澤同契無爲嘆經文上品妙經諸天勝梵結三洞飛玄之炁成八㑹雲篆之章祕於玄都玉京紫微上宫授以碧落空歌大浮黎土億兆世而五譯四萬劫而一傳爲羣品之津梁作衆眞之戶牖無文不度有禱悉符如上聖功非資能盡以今奉爲某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻三洞四輔侍經眞官靈寳官屬領仙監齋諸君將吏虚空監察直符直事功曹使者金童玉女法籙治職靈官將吏四司五帝應感威靈齋壇翊衞一切神明集此勝因總爲修齋弟子某等増長善芽導迎景貺覃恩幽顯資福邦家伏願覺性圓明眞心空寂積生過咎慿慧力以蠲除未兆災殃仗勝因而消蕩𣸸齡益筭保命生根集瑞慶於門庭介休祥於姻族上冀星辰順軌風雨應時鳳曆延洪龍儀鞏固兵戈疾疫不撓於黎元水火旱蝗無侵於境邑幽途罷對夜府開光品彚霑恩含靈蒙福齊契正眞之果俱登快樂之郷請靈朝壇文亡靈沐浴畢隱語賛引執旛者至壇下南向面北立讃云業縁飄蕩覺性昏迷一墮幽途莫超生界今慿道力獲詣靈壇所冝潔己正身傾心静念皈依三寳禮謝衆眞恭届道前祗受開度讃云亡故某甲志心朝禮太上無極大道讃云亡故某甲志心朝禮無上至眞三十六部尊經讃云亡故某甲志心朝禮太上三尊十方衆聖玄中大法師畢引旛復位正齋第一日獻齋文罔極之尊物無可稱薦誠之盡敬至不文臣祗奉寳齋肅陳嘉饗聿修豺獺之報仰効蘋蘩之羞冐犯明威實深殞越某等無任俯伏待罪之至第二日獻齋文祗修玄範恭啓黄壇請命師尊祈恩光之昭格薦誠蘋藻冀肸蠁之來臨仰頼至仁俯矜微素某無任俯伏待罪之至第三日獻齋文九龍垂御煥光景之昭回三炁凝姿凛威顔於咫尺輙備潔馨之薦少殫夤奉之心禮瀆神天罪甘斧鉞某無任俯伏待罪之至請靈受度文九朝畢至度魂夜令齋官及家眷等詣靈壇前上香辭靈訖請靈法師白云生死異途生者未嘗忘死仙凡殊致仙道可以超凡惟靈渉世縁深棲眞路邈自淪幽夜未證生方今者開建黄籙宣揚紫範克除業累巳釋苦根所冝端巳靜心思眞念道恭受錬度祗伺升遷瞻三炁之寳華聽九眞之妙戒叅傳白簡超度朱宫法衆䖍誠隱語迎導送靈祝文道本強名四大當知假合身非我有六親孰謂姻蘿況夢境之虚浮有劫塵之穢濁不堪愛樂但可弃捐令則齋事巳竣朝眞在即飄揚羽袂飛歩雲衢錬魂三炁之天稽首十華之界常聞正法永侍慈尊深悟眞空無深依戀好去好去送五帝文具法位姓某上啓東方安寳華林青靈始老青帝九炁天君南方梵寳昌陽丹靈眞老赤帝三炁天君西方七寳金門皓靈皇老白帝七炁天君北方洞隂朔單鬰絶五靈玄老黒帝五炁天君中央玉寳元靈元老黄帝一炁天君太始既分五老爲生化之祖玄功莫測三天總校録之司已散寳齋難稽天歩雖舉齋謝修崇之典實罹尸穢觸冒之愆況進止之乖儀及朝奏之失節總爲罪咎乞賜矜原冀資福於存亡普覃恩於家國瑶壇徹席玉駕登輿九鳳唱而八鸞鳴萬眞㑹而諸天恱傾瞻深切攀戀無從某等不勝仰望恩光之至謹再拜奉辭送三師文具法位姓某上啓靈寳經師眞君靈寳籍師眞君靈寳度師眞君朱表奏功巳上聞於十極金龍騰景行投奠於三元仰藉師尊昭祐之恩克終齋事圓成之果幽明開泰喜慶難言荷蠁之來臨及光靈之昭格叅侍雲闕復返琅輿回仙仗以上征注丹霄而遐想更祈慈造普錫鴻恩某等無任攀戀激切之至謹稽首再拜奉辭送監齋法師文具法位姓某上啓靈寳監齋大法師眞君明眞品格昭垂抜度之文黄籙簡章俻著威儀之訣依科修奉冐禁宣行恐諸天無紀善之書則五帝有執愆之録曷超逝魄有玷殊因仰望洪慈特開大宥宣告三界關聞十天共證齋功旁流惠澤甦腐骸而更肉起枯骨以成人齋散瑶壇鑪殘寳篆回瞻風馭巳返瓊霄某等無任攀戀激切之至謹稽首再拜奉辭送三官文具法位姓某上啓上元一品賜福天官紫微大帝中元二品赦罪地官清虚大帝下元三品解厄水官洞隂大帝建梵炁之靈壇聿嚴齋謝屈三元之景馭俯賜證盟幸道典之圓成荷恩光之昭格重虞䙝瀆有犯科條録考罰於四司書愆尤於九府難迯玄憲或誤幽隂乞垂大宥之慈曲赦不蠲之咎斷地簡對絶水盟言普令法界之含靈均沐重玄之慧澤某等無任攀戀激切之至謹稽首再拜奉辭送天師文具法位姓某上啓三天扶教都天大法天師正一靜應眞君元皇設教著三籙之簡文師寳垂慈作重玄之法主啓黄壇而告誓屈丹馭以遐臨勝果克圓眞功著炳伏念某學法未俻禁戒多違冐舉洪儀攝行齋事頒行符命召役神靈存念不專修崇有怠悉爲罪目難逭冥誅願賜哀憐悉從貰宥俾闡揚於皇化益推廣於帝慈仰望層霄巳嚴眞馭莫陪景從徒切神馳某等無任攀戀激切之至謹稽首再拜奉辭送玄師文具法位姓某上啓三天化主玄中大法師眞君黄壇竣事幸粗舉於鴻儀白簡上生諒潜符於景貺迂廻霄馭證質齋盟徒殫𠂻赤之私莫答重泉之施伏念某等識不聞道體未洞眞濫佩奉於靈章乃混同於魔俗身司濟度職在宣謄不量尸穢之微軀冐舉明眞之具典頒宣符命操露章書五日告祈九朝請謝驅馳將吏勞役神靈學法未俻而戒行弗充存念不專而威儀多缺凡諸䙝瀆皆是罪縁慮從不赦之誅致墮見修之果惟希大宥普賜洪慈録齋主向道之誠宥法衆違科之咎覃恩幽顯資福邦家庶大振於慈風永恢揚於教法寳齋巳散鶴駕難留拜手天衢馳神霄極某等無任攀戀激切之至謹稽首再拜奉辭送監臨將吏文寳齋竣事壇席成儀功奏三天恩流十極請回神馭各返靈司齋官䖍誠稽首拜送設齋文道衆赴堂序立唱人各恭信三禮平坐如法初行食髙功念施食呪曰一切福田施食爲先見存快樂巳徃生天當來凈土衣食自然是故供養普獻諸天香厨妙供上獻天尊中獻眞聖下及含生普同供養福流存亡如水歸海齋畢收出生飯念施衆生文勤修大道法精心感太㝠眞降魔魅散衆妖皆滅形七祖生天堂超升飛上清福旣無不遍此食施衆生次唱爲諸來生作善因縁回向至慈善貸無願不從大道集虚有求皆應設齋功德無限勝因用祝齋官七祖父母所薦亡靈得出長夜身入光明災消福降生死升仙念大聖元始天尊太上大道君太上老君十方靈寳天尊不可思議功德旡上黄籙大齋立成儀卷之四十七
