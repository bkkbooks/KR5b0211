front:
  text: 旡上黄籙大齋立成儀卷之三十二白二
  hash: sha256:a6becb5b955cf425c41d1dd2bb60306a57224e9956db7825304c9d1a8cfb025b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_032-090568b, image: sjb/09/090568b.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿撰集齋法修用門釋龍綵下元黄籙簡文靈仙品曰拔度罪根威儀當以上金作龍十條以鎮十方㧞度罪魂十方各安一枚當齎十方紋繒之信東方青紋九十尺亦可九尺南方絳紋三十尺亦可三尺西方白紋七十尺亦可七尺北方黒紋五十尺亦可五尺四角悉用黄紋各一百二十尺亦可十二尺上方碧紋三十二尺下方黄紋三十尺隨其方色以安十方㧞度長夜之魂主人齎本命繒隨年國主王公悉門紫繒以法天象庶人則用本命所屬正方之色以置中央㧞度年命並令精妙天子信則疋數諸侯文數庶人尺數尊卑有降悉用明科飛天神人曰違者考屬天官玄都曹釋升壇凡入靖登壇皆香水潄口名曰蕩穢岀亦潄之名曰閉眞炁安施旣畢先令道衆兩人爲威儀前行賛引法師弟子升壇旋遶外壇一周至東南角師念入户呪訖率弟子以次從地户升中壇威儀止在外壇旋遶不入中壇每壇一靣常留威儀三人三同畢分四面立歩虚旋遶時亦皆旋繞至西北角師從天門升内壇左廻三上十方香一周次上御案香退西向東立弟子遶中壇一周以次序立依科行事畢弟子引師出壇弟子過師前出師在後建齋立壇法入象地内壇則自天鬥出入中壇則自地户岀入凡入壇則師率弟子自也户入師在前弟子在後凡出壇則弟子引師從地户出弟子在師前師在後華夏讃并釋勤行奉齋戒誦經制六情故得乗空飛耀景上玉清精心奉經教吐納練五神功德冠諾天轉輪成上仙右出靈寳玉匱盟眞經杜廣成先生曰今但用十八虚聲耳今亦廢矣朝入户呪法師向地户之左叩齒三通宻呪之夜八户同老子存思圖曰存見四明功曹一人通眞使者一人傳言玉女二人侍靖玉女二人共六人四明功曹通眞使者傳言玉童侍靖五女爲我通達道室正神上元生炁入我身中祝畢入户先左是入朝出户呪岀地户畢回身面壇叩齒三通祝之存玉女一人出隂入陽萬神開通關啓事畢請閉黄房侍靖玉女明備神宫祝畢出户先右足出夜入户呪老子存思圖曰存見四上功曹一人龍虎使者一人侍靖素女一人開明童子一人上玄少女一人共六人四上功曹龍虎使者正一生炁侍靖素女夜有所啓開明童子上玄少女與我俱入黄宫之裏通達所啓皆使上聞夜岀户呪出地户畢回身面壇叩齒三通祝之存少女一人𤣥上太隂八䆫開明向有所啓少女通靈事畢復位萬神譛寜右爲燒香威儀出上元金籙簡文眞仙品釋上十方香清旦日中上香先從東方起次東南方次南方次西南方次西方次西北方次北方次東北方次下方欠上方靜夜上香先從北方起次東比方次東方次東南方次南方次西南方次西方次西北方次下方次上方右登齋行香按靈寳本科日中則自東方起次南西北方以次東北東南西南西北上方下方而此且以東南方次東方者以黄籙簡文㧞度罪根威儀行香次序如此今修黄籙齋以本經爲據也清都張萬福天師齋儀升壇上香次第一同蓋㧞度罪根威儀一本黄籙簡文靈仙科品龍漢舊文不可攺也上香呪法師上十方香畢至御案前二上香宻呪之玉華散景九氣含煙香雲宻羅徑衝九天侍香金童傳言玉女上聞帝前令臣長生世爲神仙所啓所願咸乞如言右見上清大洞眞經曰上經燒香呪無侍香金童四字傳言玉女作侍香玉女所啓作所向咸乞作莫不釋禮師序念先存太上三尊在天寳臺中左有三十六部尊經右有玄中大法師十眞五帝群仙侍衞如大會朝眞之儀法師臨目存見太上三尊乗空下降左右龍虎君千乗萬騎三界尊靈羣眞侍衞羅列在坐師爲弟子奏陳齋意次思經師上清靈寳法師詹君諱齊古字稽仲行化長沙心拜三過祝曰願師得仙道我得升度次思籍師上清三洞法師田君諱居實字若虚甲寅五月初二日生長沙眞巖人行化兩浙心拜三過祝曰願師得飛仙爲我開度七祖父母早生天堂我得道眞升入無形次思度師上清三洞法師留君諱用光字道輝甲寅三月二十五日戌時生乃信州貴溪人以開橲丙寅天臈羽化于龍虎山上清宫行化荆湖江浙心拜三過祝曰願師得升度上登髙仙爲我開度五道八難名入仙籙永成眞人右按中元玉籙間文神仙品曰奉師威儀經師則經之始故冝設禮三曾之宗籍師則度師之師故冝設禮三生死籙籍所由度師則受經之師度五道之難故應設禮爲學不尊三師則三寳不降三界不敬鬼魔害身杜廣成咒生曰經者逺也二師之中經爲逺師乃耤師之師巳之祖師也籍者因也傳眞學道師資相因乃經師弟子度師之師也度者進也度我凡身進登道品從几至此莫不因師乃巳之師也所𡉄之方謂所居之万心拜存形貌諱號禮而祝之所以禮師者我所行之法開度天人因師教授方至於此凡有修奉皆先禮師不忘本也然古者經從師受故齋直燒香必禮師齋法出於神經故建齋以奉經爲本齋科所謂三師盟受三寶神經供養尊禮修行齋直是也今世經不師授齋法亦廢結齋之士苟未盟受寳經如科中所稱上清金書三洞寳等語皆當隨冝換易禮師之時存祝傳法籙三師可也清旦思青雲之炁匝滿齋堂肯龍獅子備守前後靈寳思神儀曰青龍獅子合八頭四頭在髙產南使處雨邊巳木之上四頭在北丑亥之上以中央髙座爲正青龍在内獅子在外悉東西相對兩向次思青炁從師肝中岀如雲之升青龍獅子在青炁中出覆弟子合家之身日中思赤雲之炁匝滿齋堂朱雀鳳凰悲鳴在左右靈寳思神儀曰雄曰鳯雌曰凰鳥也其雞頭形雞喙燕頷蛇頸龜背魚尾五彩龍女合八頭四在東馭兩邊寅辰之上又四頭在西亦俠兩邊戍申之上朱雀在内鳯凰在外南北相對向次思亦雲之炁從師心岀鳳凰朱雀在赤炁中岀覆弟子合家大小之身日入思白雲之炁迎滿齋堂白虎麒麟備守四方靈寳思神儀曰麟麟獸也麏身半尾馬足黄色圓蹄角頭有肉合八頭四生方二頭在子午卯酉之上白虎在内麒麟在外悉向南次思白雲從師肺中出白虎麒麟在白炁中出覆弟子合家大小之身次思仙童玉女天仙地仙飛仙日月星宿五帝兵馬各九億萬騎監齋直事三界官屬羅列左右威儀肅肅不有息懈靈寳思伸儀日仙童侍香左東立玉女侍香右西立天仙至五嶽五帝並是兵馬天仙官兵著緋衣處天門在門東地仙官兵著如軍隊之衣處地户飛仙官兵著羽衣處天門在門西也日官官兵著紅色衣處日門月官官兵著淺黄色衣處月門星宿官兵各隨方色衣處四方四季四孟之上五帝官兵馬隨方色衣各處其方中央處建王之方次閉目内思存見五藏五嶽五星五帝侍衞身中映蓋一體體作金色眞炁從肺後出項有圓光如日象使照明十方身中了然盡見内外靈寳思神儀曰五藏者先存肺紅白色有七葉如蓮花接喉嚨下騶虞覆心次存心紫赤色如油囊中長三寸上大下小中央孔在肺下次存肝紫蒼色五葉在心下次存腎有双紫黑色如杯當俠著脊次存脾混黄泥色長一尺兩頭本小曲捲太倉胃管也正在臍五嶽者存東嶽泰山南嶽衡山西嶽華山北嶽恒山各在其方中嶽嵩髙山在西南五嶽各在木域遥存見之五星有存五星煥明五方南方熒惑星在額上中央鎮星來在心前北方辰星來在兩膝間東方歲星來在左用西方大白星來在右肘五帝者存青帝立東赤帝立南白帝立西黒帝立北黄帝立中央建王之方皆著帝王之冠服隨方之色立在齋内又依上法存眞炁自肺藏後云脊中岀直上髙出頭上而岀四藏色炁次仰升紛锴冠覆身形葱鬱宻宜如濃烟之中於是身爲金色生圓光如口照明十方身中然盡見内外右爲建齋威儀出靈寳上元金籙簡文眞品凡登壇行道燒香啓祝存思並依上法衞靈呪并釋東方九炁青天明星大神煥照東郷洞映九門轉燭陽光掃穢除氛開明童子備衞我軒収魔束妖上對帝前奉承正道赤書五文九天符命攝龍驛傳普天安鎮我得飛仙南方南方丹天三炁流光熒星轉燭洞照太陽上有赤精開明靈童緫御火兵備守三宫斬邪東妖剪截魔王北帝所承風火八衝流鈴交煥敢有不從正道流行我享上功保天長存億劫無終西方七炁之天太白流精光耀金門洞照太𡨋中有素童號曰帝靈保神安鎭衛我身形斷截邪源王道正明宫殿整肅三景齊井道合自然飛升紫庭靈寳符命普惠萬生功加一切天地咸寧北方北方玄天五炁徘徊辰星煥爛光耀太微黒靈尊神飛玄羽衣備衛五門檢精捕非敢有干試豁落斬摧玉符所告神眞八威邪門閉塞正道明開映照我身三光洞輝䇿空駕浮舉形仙飛中央黄中理炁緫統玄眞鎭星吐輝流煥几天開光童子一十二人元炁陽精熖上朱煙洞照天下及臣等身百邪推落煞鬼萬千中山神呪普天使然五靈安鎭身飛上仙右出靈寳眞文要解經名曰太上靈寳自然五篇衞靈神呪釋鳴法鼔杜廣成先生曰法鼓者内正神炁外滅魔靈法事所先也左右相叩爲天鍾磬中相叩鳴法鼔也叩之以八爲節三八二十四炁也三捻上香祝上香祝之發爐第一上香祝曰願達玉清境供養妙無上帝自然元始天尊無上道寳第二上香祝曰願達上清墝供養妙有大帝虚皇玉晨大道君無上經寳第三上香祝曰願達太清境供養至眞大帝萬變混沌玄元老君無上師寳右出杜廣成先生齋儀上手鑪香呪道由心學心假香傳手執玉鑪心存九天眞靈下盻仙斾臨軒令臣關奏逕御九天右出宋朝頒降金籙儀非古法也不用亦可蓋古法髙功都講位前各有香案發鑪止就本位案前上香不用手鑪也釋發鑪無上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域真官正神臣今正爾燒香奉爲某官某乙正普薦亡親某乙在㑹衆魂等修建無上黄籙大齋三日三夜以今初夜宿啓登壇朝眞行道𥙷職宣戒關盟諸天願得太上十方正眞生炁降流臣等身中令臣所啓速達逕御太上無極大道至眞玉皇上帝御前右發鑪爲關啓眞靈之始出金籙簡文經道分三洞教亦殊科如上元五靈五老神眞云爲上清發鑪太上靈寳無上元尊云爲自然發鑪傳言玉女上奏皇君云爲洞神發鑪太上玄元五靈老君云爲正一發鑪其他難以槩舉至於靈寳盡本金籙簡文矣而黄籙簡文經所載却不同如曰香官使者左右龍虎君捧香驛龍騎吏侍香玉女五帝直符各三十六人出是也張萬福天師正齋發鑪雖依黄籙簡文經所載至宿啓解壇又用金籙簡文經祝語矣前後異同恐是正齋宗本經之文而宿啓散壇乃行自然朝法故宗金籙簡文亦或未可知也經教傳久其間抵捂者多如金籙蕳文三五功曹下無左右官使者五字却見於盟眞科經金籙簡文有侍香金童而盟眞科作玉童金籙簡文有侍香玉女而陸天師杜廣成儀作傳言玉女張清都儀又作散花玉女金籙盟眞五帝直符下無直日香官四字而陸天師張杜齋儀俱有之金籙盟眞諸經俱云至眞玉皇帝前而黄籙簡文作玉皇上帝御前要之三籙盟其諸經相參爲用故科云盟眞不可單行金籙不可獨用黄籙罪根雖卷目異名亦相通爲下典廣有所入也至於復鑪其間亦有不同處不能盡釋今姑載宿啓發鑪餘可以例推釋稱法位關啓張萬福天師曰各各自稱所受法位稱時耳𦆵自聞勿使喧聒餘皆例爾右宿啓散壇發鑪畢稱法位關啓之文出靈寳上元金籙簡文眞仙品爲朝禮衆眞威儀經科所謂自然朝法是也與正齋上啓三上香願念之法不同不啓聖位張杜宿啓儀並於稱法位後便云臣某等今故燒交願以是功德云蓋一本經文耳藏中所載靈寳諸齋宿啓儀並無添入聖位者止有一家靈寳自然齋立成儀不載何人所修其間辭語多易以今文又𣸸入行道所啓聖位近世相承不革留冲靖所傳亦因之雖曰捻香啓先當關奏上玄但行道科所啓聖位本文乃出洞玄靈寳長夜之府九幽五匱盟眞科因元始天尊在香林圍中與七干二百四十童子俱教化諸法度身威光命召十方飛天神人說罪福縁對㧞度上品本上大道君啓臼元始乞垂旨教可得修行以度一切於是命飛天神人爲著齋直之訣行道所啓聖位蓋本於此宿啓散壇乃行自然朝法旣祖金籙簡文本經無之難以攙入況中間祈哀懴罪禮謝乞願念之詞特仗仙靈謄奏齋誠耳今依古科剛去聖位尚慮後學不見經文反生疑惑故畧釋始未釋禮十方日中從東方始入夜從北方始張萬福天師曰凡禮拜始唱至心歸命東方即至心注念東方低身屈膝呼無極太上靈寳便靡靡而下令兩手俱至地呼天尊與聲齊頭面著地聽聲齊起皆不遲疾緩急得所使五體合法不得局促怠放齊上齊下毎禮訖合坐皆起立然後坐如下方例不得便坐行磬須聽唱天尊聲絶然後打之所以謂之禮拜者謂起伏拜跪威儀庠序合法故耳徧觀至心者必能禮拜禮拜者必有至心君不察其形恭何以達其心識所以謝罪請福皆以禮拜爲先也釋懴悔三業禮畢各長跪執簡叩頭懴悔張萬福天師曰自禮十方天尊至三業懴並出靈寳常朝儀三啓頌三首樂法以爲妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神静黙天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹緲入大乗因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虚有念無不啓錬質入仙眞遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮右岀洞玄靈寳消魔寳眞安志智慧本願大戒上品經亦見玉京山歩虚經謂之禮經祝毎終一首各稱善一拜眞人口訣云侍經仙童玉女聞此祝皆歡悅而祐兆身也是大經悉用此祝而禮拜矣若冥心禮經者亦心祝其文乃上仙之秘也齋法以經爲祖凡是建齋三寳之前必安神經以鎮齋壇故上元金籙簡文眞仙品曰建齋威儀旋行畢一時北向禮經三拜是也釋三禮張萬福天師曰三禮出靈寳常朝儀无上黄籙大齋立成儀卷之三十二
