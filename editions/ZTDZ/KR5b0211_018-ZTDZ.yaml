front:
  text: 无上黄籙大齋立成儀卷之十八在八
  hash: sha256:428a3fca277a1183c0669b88766c0c06825d5b29fe2e630174b3693ba37eefd2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_018-090493c, image: sjb/09/090493c.png}
body:
  text: 上清三洞法師李景祈立定三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿重修科儀門古法散壇言功儀修齋日數既畢或用其夜子府或用明日清旦衆官相率詣元師前立班次舉唱道讃次華夏賛引法師叅募昇壇念入户呪次從地户昇天門上十方香次上御案香呪次都講唱各禮帥存念如法次宣五方衞靈呪划都講唱法鳴鼓二十四通次三捻香呪次發爐无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域眞官正神臣今正爾燒香奉爲具官某修建无上黄籙大齋三日三夜九時行道事竟言功願得太上十方正眞生氣降流臣等身中令臣所啓速達逕御太上無極大道至眞玉皇上帝御前各三禮次法師與弟子上十方香次都講唱各稱法位具位奉行黄籙大齋言功法事臣某等今故燒香願以是功德上爲天子王侯土地官長經籍度師山林巖栖學眞道士同學之人弟子某所薦亡靈九祖父母存亡兩代眷屬親縁内外姻族天下人民飛行蠢動一切衆生今故捻香皈身皈神皈命太上十方靈寳自然至眞無上大道特乞赦除前世今世生死所行宿對重過得免離三惡之道十苦八難九厄之中身得道眞飛行虚空白日升天侍衞道君逍遥無上金闕七寳自然宫殿永與道合所啓玄感應聲上御至眞無極道前次都講唱禮十方至心皈命東方無極太上靈寳天尊一拜餘九方同次都講唱各皈命懴悔法師長跪懴臣衆等至心皈身無極大道天尊懴悔齋主某臣衆等及一切衆生前世今世身形所犯四肢舉措動違戒律不依經典身業大罪無量無邊並乞蕩除皆願齋主某臣衆等及一切衆生身入至仙與道合眞稽首禮謝无上十方正眞三寳一拜臣衆等至心皈神無極大道天尊懴悔齋主某臣衆等及一切衆生前世今世心業所犯志念不專情浮意馳騁不息心業大罪無量無邊並乞蕩除皆願齋主某臣衆等及一切衆生神合眞寂洞入自然稽首禮謝无上十方正眞三寳一拜臣衆等至心皈命無極大道天尊懴悔齋主某臣衆等及一切衆生前世今世口業所犯善惡反論綺言飾非華詞惑衆口業大罪無量無邊並乞蕩除皆願齋主某臣衆等及一切衆生性命合道玄㑹無爲稽首禮謝无上十方正眞三寳一拜次都講唱臣衆等至心皈命太上三尊十方衆聖禮經如法次吟三啓頌三首次都講唱三禮次旋行收五方眞文隨方讀文畢今弟子執眞文於香上熏之叩齒十二通呪之玉訣云凡所祈禳不先叩齒而呪者爲外魔所干關啓無感矣無上至眞大聖髙尊布化運氣三十二天八㑹九光自然成文安鎭天地保制劫年元始符命普告三元下敕九地上關諸天中告海嶽名山大川今日上告萬神咸聞弟子某乙修齋行道拔度幽魂三官九署削滅罪根永度三塗五苦之源世世受福記名丹篇神生天堂錬化自然生死開度億劫長存九天告命風火驛傳衆和三聲出靈寳内青玉訣呪畢置香案上拜表後隨表焚之散灰青烟之中次都講鳴法鼔二十四通髙功叩齒瞑目咽液存九炁光垂之法次都講重稱法位李景祈三禮後大淋方拜宗張清都儀非古法也具法位奉行黄籙大齋言功拜表法事臣某等謹重誠上啓太上無極大道元始天尊太上大道君太上老君無上玄老十方靈寳天尊巳得道大聖衆至眞諸君丈人三十六部尊經玄中大法師天師君上相上宰四司五帝三界官屬一切眞靈臣等無極之劫因縁至今遭遇大法眞經下世繆荷非分奉受寳文未能超絶世表匿景幽林長齋苦思以求髙蹈而浮沈世路混同魔俗身口犯違愆過積沓常恐考至負媿幽明夙夜戰兢形魂罔措誠知罪穢非念眞之人然受法之日約當罄竭愚欵表效丹誠廣宣慈風讃揚妙化普令一切咸入法門凡有皈投輙當謄奏今奉詞旨敢不上聞宣詞按如詞言在可矜憫臣等輙相擕率依黄籙簡文威儀舊典於某處靈壇之上設玄科之式法天象地以某所齎金龍繒綵安鎮十方本命之信證質丹誠沐俗五體洗心靜念以今月某日某時爲始奉修黄籙拔度大齋塗炭稽顙燒香轉經然燈續明照耀諸天三日三夜九時行道拔度亡靈某及弟子某家九祖父母億劫種親幽魂苦爽宿對罪根訖某日亥時功成事畢澤被存亡恩霑家國酬功行賞遍及靈司臣等身中所佩内外眞官君將吏兵及所請靈寳官屬監齋衞眞天仙地仙飛仙眞人神人日月星宿九宫五帝三河四海五嶽四瀆兵馬騎乗諸天監齋直事侍香金童散花玉女五帝直符直日香官傳言奏事飛龍騎吏一切官屬法籙治職官君將吏四方監察土地眞官三界神祇徃來傳奏監臨衞護宣通召命營衞齋事並有功勞謹爲拜黄繒朱表一通上詣太上三天曹解壇遷職復諸天位重明功德表在臣玉案之上請省表文次宣表取表於香上熏之即讀法位起再拜訖復長跪和聲正氣讀至弟子名皆令再拜至臣誠禮幾恐處起再拜又至年月日某處拜上又再拜展表玉案上以書刀鎮聖號之左朱筆鎭右畢髙功三捻香叩齒三通長跪遣表敕曰謹遣臣等身中五體眞官官一小吏十二書佐重敕功曹使者飛龍騎吏嚴裝顯服冠帶垂纓磨硯㸃筆簮劒理籙爲臣及時操黄素朱表一通上詣三天曹隨時進對若有謬誤文字脫漏言詞倒錯不相次比者傳言書佐習事小吏操龍頭書刀長毫利筆隨誤正定無今上官典者有所遣却閉口炁升逕上三天無極大道太上御前謹勿稽停左君歴關右吏次啓諸官君歷第以次分別當令所請者下所召者到所濟者度所宣者通所遷者達所願者應所求者得若有下官故炁邀截臣表文不使上達者收赴所在近獄依律治罪以明天憲臣退伏案前伏待報應次收表入函華夏引表下壇次法師向天門伏地存神呈進如儀次焚表於天門法師起舉焚詞頌次都講唱長跪内官如法法師三上香叩齒十二通納官臣奏表事竟建齋之始所出身中功曹使者一切眞官仙君吏兵並還臣等身中從衆妙門而入在左還左在右還右直使功曹主領檢押還復本位無令差互須召又到一如故事叩齒三通咽液三遇存三五上章官吏各復身中再拜次都講唱長跪還戒如法法師面西衆官面東臣等學法未備俯仰之格進止犯科不合儀武恐爲四司所紏五帝所執千愆萬過乞從赦貰哀原未悟不見罪罰臣等建齋之始奉請智慧上品十戒法事旣竟謁還天官謹上啓聞伏祈昭宥臣等誠惶誠恐稽首頓首再拜次還戒頌三禮出三洞科儀天尊大慈悲說戒度衆生威德被幽顯果報感神靈諸天來稽首魔王自来形過去超八難見在保千齡齋福行當息相共送䖍誠流梵逸雲唱飛香雜烟馨瓊鳯乗丹輦金龍駕緑軿生死皆快樂家國悉安寜次宣山簡叩齒九通長跪和雅讀文宣山簡畢衆官再拜令弟子執簡香烟上髙功面東叩齒九通呪曰衆官同聲呪曰玄上開明元始監眞上帝五老赤書丹文天地本始總領三元攝炁召㑹催促舉仙髙上符命普告十天日月星宿五嶽靈仙天上地下溟泠大神監生主録南上三門關領玉簡勒名丹編削落罪書上補帝臣某乙皈慿至道修齋立功拔贖九祖一切苦魂行道事竟謹依靈山請投玉簡乞削罪名皆蒙解脫無有𡨚親去離三惡魂升九天生死開度萬劫常存今日上告萬神咸聞請以龍簡關盟眞官乞如所告金龍驛傳次宣水簡如山簡之儀宣水簡畢髙功面東呪曰玄始五老上帝髙尊十方至眞太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟冷大神今日上告萬願開陳修齋行道普為存亡請贖七祖宿對罪根謹投玉簡乞得上聞記名水府過去升天生死開度萬神咸聞請以龍簡告盟水帝賜如所陳金龍驛傳次宣土簡如山簡之儀宣土簡畢髙功面東呪曰天地開張九炁分靈三元同符十方朗清五老上帝開眞領生丹書赤文元始上精普告天下九土皇靈今日上告萬仙定生修齋行道普爲存亡我願我仙請投玉名土府太皇勒除罪形奏簡上宫列簿華青早得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭今日告命萬神咸聽請以金鈕表明至情請如所告金龍驛呈右三簡呪出靈寳赤書玉訣次吟投龍簡頌次都講唱衆官納職各於三寳前禮三拜長跪授簡高功又三拜退畢次復爐香官使者左右龍虎君侍香諸靈官當令解散黃籙齋壇之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令弟子存亡受福家國霑恩十方仙童玉女侍衞香烟傳臣向來所啓逕御太上無極大道至眞玉皇上帝御前各三禮次法師上香面東立辭三寳此杜廣成儀時留巳過日影漸虧香遍虚無鴻鐘息響道還金闕經入玉函稽首皈依和無上道寳一拜香隨風散聲入泰清名掛金牌題書玉簡仙童上記玉女進文稽首皈依和無上經寳一拜道場圓滿法席周圓一切衆生登無爲岸稽首皈依和無上師寳一拜願諸衆生諸惡莫作衆善奉行常生中土不墮邊方六道蒙恩酆都罷對遍禮十方和得道眞仙一切聖衆一拜次旋行詠三塗五苦頌下榜出消魔寳眞安志智慧本願大戒經次吟解壇頌次吟學仙頌旋行出壇岀太極敷齋戒威儀經次出户呪次詣五帝三師監齋三官天師幕玄師幕謝辭次華夏引髙功歸室次衆官禮法師三拜長跪謝曰某等叨佩下風預瞻法事雖遵科戒多有違愆願垂恕亮三拜弟子率男女大小詣師九禮三伏謝曰某等千生慶㑹蒙師開度齋功成就生死荷恩不勝忝切自初迄終觸物短闕願垂開宥又三拜受福无上黃籙大齋立成儀卷之十八
