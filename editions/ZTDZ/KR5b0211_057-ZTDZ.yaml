front:
  text: 無上黄籙大齋立成儀卷之五十七食七
  hash: sha256:033bc88a9d2caed0a7b2e191869a088234388fc111784bd1e4b6c254691cbe60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_057-090727a, image: sjb/09/090727a.png}
body:
  text: 附録修書本未先君存齋先生諱叔輿字徳瞻舊字蕭諱姓蔣氏自梁普通世居永嘉曽祖諱扶祖諱敦贈中大夫父諱行簡朝議大夫知處州贈中奉大夫紹熈壬子先君以郊恩補迪功郎揚州户掾㑹計當耗斁息以清介聞中奉薨帥道侯鞏深嗟惜其去徃臨安排岸丁孫令人憂監仁和鹽場亭戸桀黠數敗事先君稱出納一繩以法咸稱其廉平畏其威而懐其惠比三歳額溢倍蓰特恩轉承直郎爲岳州軍節推乙亥旱蝗亘數路豫䟽畫荒政力賛守推行之市無貴耀野無飢民鼎民有誣李氏用人野祠者守籍其家寘諸極典獄具憲忽自疑檄先君鞠之鈎擿故牘一訊得其情悉平反之所全活者數十人淳熈末中奉鎮鼎有恵政民懐之祠于梁山及先君審李氏𡨚感泣者于路曰吾固知其爲蔣使君之子也丞吉州永新不踰年舉賢陞知信州弋陽縣縣綱壊久歳餉江淮軍月解淮東緫所樁積銀𩔖取嬴額外地墝瘠俗懻忮影寄詭挾者連阡陌下户苦役産破者相踵先君躬按版籍摘吏姦平易近民務通下情剖决滯訴以蘇洗𡨚負填解積逋以少紓督趣鋤治強梗以扶植良善士民條畫利病以告者立罷行之僻墟寂墅緌紳稚耋聚談慨嘆詠歌徳政者不絶徹于天朝社稷壇瀢蕪穢風雨師寄他所悉更新之植以所宜木黌舍廥廪樓館廢壊者葺理不倦費取諸經用之餘蓋前政所貿名以自潤者非鞠死罪獄無宿囚惸獨嫠孺有以情訴率得直𨓍不留訟志在於民絲髮不緌諸吏戴星出入亹亹忘勌竟以憂勤得疾疾巳侵視官文書如故禺中猶囑貳令母㢮縣綱夜漏上端坐而終時嘉定十年正月二十六日也享年六十有二積階承議郎以辛巳明堂恩賜五品服嗚呼痛哉先君㓜頴悟明銳靈燭古今載籍博覽不倦一二過目率成誦敬誠篤實語不妄發賦性冲寅宇量寛和人與之交邈不見其喜愠之色工唐律清苦雅淡自得其趣志不安於小成旁羅百氏天文地理運氣律倉抜俞方甘星巫學靡不研頤深造而於混元道徳之㫖尤所耽味慶元乙卯冲靖留君來括蒼先君見之煙雨樓與論古齋法趣尚玄合遂定交已未壬戍再訪冲靖竹宮極講究之冲靖嘉嘆悉以平生得於荆蜀方士隱君子者授之先君通其變而施行焉毎試輙驗緩急叩請悉無拒祛怪拯危靈異響答初冲靖謂先君曰以三洞真經爲道本以十方懴謝爲真誠精思九朝宻投三簡齋法如是而巳譎詭幻怪迷誤眩惑非也又曰度人無量萬道之宗泰定田君居實所傳止於度死消天災鎮帝王禳毒害所以度天人者缺如也盍詮考經法且増益田君所未備不亦善乎先君深惟師訓竊病時俗逐流忘返徇華滅質剽切緒餘工習聲音以爲恱依託罔象附㑹影響以爲神波流風動邪說厖亂於是比次舊聞根極原起官遊所歴竒書妙藴瓊章藥笈披閱殆遍螢䆫寒熖不倦抄述辭語之鄙淺者釐而正之作用之舛訛者辨而折之旨訣之異同者整齊之使歸一節目之殽亂者刪合之使復正爲黄籙齋儀三十六卷自然齋儀一十五卷度人修齋行香誦經儀二十四卷緫之曰靈寳玉檢合七十五卷始於嘉泰壬戍成於嘉定癸未上下二十年其扶翊大教用心勤苦如此朱遂林堯夫陳自誠趙希㞤之徒嗣其法將易簀謂焈焱等曰死生命也富貴天也吾書幸垂成而大期忽屇我若死汝等當歸吾書于宗壇庶齋法或自是流暢幽明蒙頼則吾志願畢矣士之立身惟母友不如巳者而巳言訖瞑目而逝既定容體如生嗚呼天乎痛哉處死生之際而不亂蓋先君之有得於道徳玄元之宗指者深矣焈等街哀茹苦敬遵治命再四校覆謹以遺書緘藏名山且附録其歷官大節纂述之本末於後以俾後人有考云嘉定癸未七月不孝孤焈法名冲素焱法名冲一等泣血謹識宋冲靖先生留君傳華文閣學士通奉大夫提舉江州太平興國宮奉化郡開國侯食邑一千四百戸食實封一伯戸髙文虎譔幷書冲靖先生名用光字道輝姓留氏其始河洛人也六世祖仕唐官銀青光禄大夫五代時徙家泉之晉江宋興削平四方五世祖挾雋才西游江淮間過上饒郡樂貴谿雲峯山遂結廬父發清修特立有古君子風偕其室詹氏拜籙龍虎山夜夢漢天師授以丹曰服是當有子而僊遂娠先生既誕秀異渾古端慤自持少解悟玄學受法于上清正一宮道士蔡元乆元久宣和間太素大夫凝神殿校籍王道堅三世孫也既入道抗志精堅守一淵確探𧷤索隱窮歷險艱凡金簡玉字瓊篆琅函之目十洞要訣三皇内文能盡究旨歸别條緒焉諸法書䨾一不練專以玉府五雷法正一法爲宗主宻行元錬垂三十年孝宗皇帝崇至化玩希夷懐柔九僊用毗大政三衢歳大旱郡太守沈侯作礪聞其善召風雷擇佳寮持禮屈致既至大書篆簡麾將吏呼叱鬼神奔走河嶽之勢肅如也郡縣吏農父老且嗟且愕即日天大雨四境𩃎渥守以上聞行在旱上覽奏大恱召赴闕舍太一宮趣致雨蕆法如初又刋鐵劵驅龍師有頃雨迅怒如霔西湖漕河涸不舟者立盈上遣内璫嘉論令以龍歸須㬰雲解駇日穿漏上嘉甚延見選徳殿褒勞甚渥錫牙簡金綵授右街道録居髙士齋請歸故山後一年遣使趣召途中值雨顧使者曰某之禱久矣天其孰分疆理乎甫至闕雨隨車來上曰信乎其行業清髙精誠感格矣御奎翰賜以八字既拜賜遜且謝曰聖徳動天雨且不違臣誠愚戇何力有焉冬不雪受詔舉法告于山川百神曉雪平尺上益神之徳壽宮劉貴妃薨宮中修黄籙夜有影響如見李夫人者召對便殿咨以鬼神之事對曰一隂一陽之謂道鬼神者隂陽不測之謂也聚成形散爲炁道家聚炁復神之法鬼神之情狀可窺矣上以爲然且曰法中有正一旨要文該義奥盍訓詁之書奏御詔鏤傳未幾又告歸拜主管教門公事龍虎山上清正一宮管轄光宗受禪偶違豫壽皇有憂色命以法枝禳俄現巨神被髮横劒殿下左右驚視帝躬清安兩宮相賀賜號冲靖先生固辭上即位祈雪夜拜緑章星斗猶離離曉以賀雪奏上竒之陞左街道録擢太一宮都監壬戍歳旱上諉以雨方登壇場行雨法雨聲怱如江海音上曰留君雨師也賜宸翰牙簡明年又閔雨對内殿曰臣草菅細微年年籲天上帝有譴罪在不赦黄冠祭酒臣何敢專尸焉上曰爲朕請命帝實汝嘉母辭時即得雨郊祀禮成謁謝太一宫遷左右街道録一日忽曰生有涯知無涯以有涯隨無涯殆巳士不委身霄嶺滅景雲林留連京師動煩世主吾其過歟力丐歸既歸詔趣來者數四以病辭歳旦日謁帝真與宮中士㑹拜笑且訣有問者曰何之對曰遊乎無何有之郷矣又問曰其朝白玉京歟燕蓬萊島歟對曰一念倐萌是曰妄想達人大觀孰來孰徃入室端坐而化閲七日顔色如生真所謂尸解者乎遺表聞上嗟悼降御香賜賻禮給宣葬自居竹宮時王侯諸公貴人家延見盡禮建齋露禱問道受法者皆傾誠竭力人人得其歡以符水濟人危阨無告者戸外屨如織夜繼日書篆與人無倦意不給鬻餌者資之齋醮科率沟舊文毎曰人以情扣帝閽豈無辭逹焉自爲製譔人所不能言者曲折宣揚之章詞表䟽牒檄戒誓之文累數百紙無一差江浙間建黄籙大齋㑹者萬計肹蠁感應登載充冊一日壽康皇后殿召設大醮爲星帝千有二百各陳幣巨當監護者曰先生富矣笑不荅禮既盡裒星幣同楮錢燎之推賜金新正一宫中殿藏數十楹輪奂甲江南又鈔諸部經内之藏荒臺圯觀壊橋隳路多所𥙷治恵乏周急尤切切若楊氏蘇於燼火翟氏伸於銓庭拯王益於覆舟全鄭保於非命人尤稱之子思氏言至誠能盡其性至于能盡人之性能盡物之性孟子言自可欲之善至于不可知之神觀諸業尚冲宻勤毖幽深理心事天所保惟嗇道接靈鬼仁涵死生功聞紫清名在玉籍其心主乎誠其用幾乎神未易以道家者流窺得法者郭友諒之流十餘人賛曰漢文帝召見賈生宣室夜問鬼神之事則鬼神尚矣孝宗聦明英叡非帝可及便殿所咨猶拳拳乎兹挺挺哉留君能以正對夫以三靈和同則動天地順雨暘不難於力天所不能神其用者人成之人所不能極其摯者鬼神與之迄以美利利乎民是與訪崆峒永蓬萊者異矣嗚呼孝宗仁矣夫無上黄籙大齋立成儀卷之五十七
