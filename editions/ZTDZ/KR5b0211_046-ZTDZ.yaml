front:
  text: 无上黄籙大齋立成儀卷之四十六駒六
  hash: sha256:8ec0a3e12309d44fd3708a1f880dbb4f30afaaf368d470915beb76a84837ab77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_046-090642b, image: sjb/09/090642b.png}
body:
  text: 太上執法仙士蔣叔輿編集白語次第門初受投詞祝文齋主賫狀并法信投壇拝請法師法師受請訖即引齋主詣大道前再拜上香執狀自述修齋意訖次再拜側立以投狀授法師師受狀置簡上取信香𤑔以上奏云具法位臣某謹焚香奏啓玉清上帝元始天尊上清大帝靈寳天尊太清大帝道德天尊昊天玉皇上帝紫微天皇大帝紫微北極大帝太微南極長生大帝東極太乙救苦天尊十方靈寳天尊五老上帝三十二天帝君靈寳經籍度師眞君玄中教主上清靈寳聖師眞君三天法主正一靜應眞君三元天地水官帝君北隂酆都玄天大帝五嶽聖帝水府扶桑大帝法籙治職靈官將吏虚空監察應感威靈悉伩眞香普同供養香乃玉華散景九氣凝煙香雲宻羅逕衝九天侍香金童傳言玉女上聞帝前令臣啓奏咸乞如言今據某郷貫讀至齋主投狀云醮用物儀具詞投臣乞爲修奉伏念臣幸因宿慶叨佩靈章職在宣揚理難抑絶謹當擇日建立靈壇依式告盟宣行齋事伏乞天恩昭監聖造證盟俾弟子某障難不生齋功克就先亡受度幽顯蒙休臣無任瞻天禱聖激切屏管之至謹啓以聞請牒文檄文以泰玄都省爲額者周之具法位姓某上啓三天大聖都天大法主天師正一靜應眞君伏以人炁中流受化者資於不化天眞下降無爲而入於有爲故三籙之明料開九泉之生路凡伸修奉合具敷陳今據具官某追薦某靈乞就某處開建无上黄籙大齋滿散修設謝恩清醮若干分位仰慿道力普濟幽㝠以今請命諸天告盟三界恭依元範開建靈壇伏念某性質凡微形神穢濁慮莫期於通感致有玷於齋功恭請師尊主盟法事凡書檄命悉假徽稱所冀三界萬靈恭承號召十方大聖洞逹聦聞仰瀆髙明乞垂賜可某無任祈聖俟恩之至關發文法師存變歩罡飛神黙奉關召諸司將吏自如本科次法事洒淨焚香供養某甲子年年直功曹使者某甲子月月直功曹使者某甲子日日直功曹使者某甲子時時直功曹使者上界直符使者中界直符使者下界直符使者法籙治職眞仙將吏靈官玉女上奏功曹里社城隍監察土地承受應感一切威靈伏以大道無私惟誠可格至神如在有感斯通爰伸請召之儀冀諒精䖍之𢢽以今奉爲具官某追薦某靈乞就某處修奉无上黄籙大齋今將依科崇建如律關盟匪仗神功無由傳逹用修菲供肅迓神光稽首皈依一心奉請請將吏符使四直土地一元布化萬範開張三界分司百靈受職眞官將吏符使功曹里社神祇承受土地既符所請來赴法筵願監精誠受歆獻禮初獻大梵之天上無色景重隂之府下極風輪念陟降之逈殊匪聲容之可接飛行無碍惟尔有神三境十華八𡨋九壘體茲陳祝速爲通傳不顯威靈立符彰感用掦教法以副傾祈亞獻蘋繄之薦在物雖微齋戒所將於誠爲至敬慿淨供以啓丹𠂻請遵禀於元科爲通傳於檄命乗風馭炁倒景升避上窮非想之天下極綱維之境邀迎眞馭降格壇塲全頼神庥圓成齋事終獻洞章聲闋薦獻禮周曲延竚於威靈祈奏聞於詞悃謹慿文翰以達信誠具載公文敬當宣示讀關牒焚燎如儀進章啓正一祖師文具法位某謹上啓祖師三天大法師正一静應眞君正一女師眞人正一嗣師眞人系師眞人伏以度死濟生齋箸洞玄之格宣慈𦔳化章嚴正一之科分千二百官君總二十四治炁某身充㢘察職在宣謄況奉歸投理難抑絶入詞意恭取今辰進拜天官某章上詣某宫曹治恭憑道力普㧞㝠途伏念某叨佩靈章混同序俗欲馳神於紫闕以請命於清玄非假恩光莫期感徹乞頒眞旨告召仙靈扶衛章書依文進御齋誠上達冀回洞鑒之聦天澤下臨克濟沉倫之苦某下情無任䖍祈禱𢢽之至進章醮靈官三獻文具法位姓裹焚香上啓三元唐葛周眞君上章曹治引進仙竂二十四治建節監功大將軍効功効殺驛庭令丞監功謁者從事功曹使者驛吏書佐童子官君將吏天官某章中靈官典者法籙治職仙靈眞官直曰直神從官符吏里域真官社稷將吏扶衞章書一切威靈伏以絳闕清都上極虚无之境神州赤縣下通㝠漠之郷雖陟降之逈殊念精誠之可格以今奉爲某資薦亡靈某魂恭取今辰進拜天官某章欲仗威靈進呈曹治爰陳菲供肅迓靈聰願垂降鑒之私允納精誠之禱齋官某無任仰望威光之至稽首皈依謹當奉請上香請聖初獻法事教闡玄元著拜表上章之訣科傳正一留飛神謁帝之儀仰叩玄聦俯伸丹禱今齋官某賫持法信崇建寳齋預拜章書乞超逝爽伏願三元上宰引進仙官四部監章賫呈從事羅列鹵簿關啓穹旻庶彰㫖教之宣流以顯神功之溥愽齋官某不勝䖍禱之至上香亞獻法事赤書御運黄籙垂文普拯護於幽明用超淩於品彚爰立通章之法俾殫奏事之誠非假威靈孰彰神化請者下而召者到用副傾祈濟者度而求者通宻符願望仰希仁造洞監微𠂻齋官某無任𢢽禱之至上香終獻法事禮周三獻詞巳備陳寳章行奏於三天玄澤祈頒於九地速飛神馭徑過剛風具案文書通傳情㫖散齋竣事如律奏功少駐威靈以俟遣發進章謝祖師文某濫充祭酒冐進章書念穢炁之未消慮忱誠之難格輙祈真馭降盻來臨今按玄科操伏巳畢懼不明於品則必自速於過愆恭乞慈恩特賜原赦塵寰褻瀆下土喧囂願返旌軒復還霄極某與齋官某無任慕戀之至啓告符師文具法位臣姓某上啓玉清上帝元始天尊上清大帝靈寳天尊太清大帝道德天尊東極大一救苦天尊十方大聖飛天上真靈寳五師眞君三官大帝三界應感一切威靈臣聞靈寳垂科功髙萬法眞符赦罪澤普九幽敢祈上聖之恩光用拯重泉之苦趣臣今伏爲某人資薦某靈崇建无上黄籙大齋尚慮所薦亡魂名籍幽曹罪違青律不該超度莫覩齋功是用依按典儀頒宣符命普今赦宥來赴靈壇今當宣召玄都茭龍驛吏青宫九龍符命使者地府賫簡童子地道功曹恭對道前承領符命告下幽獄開赦亡魂伏乞上聖垂光諸天洞鑒允臣奏告許以頒行庶使亡故某沐慧澤以停酸永辭長夜霑天恩而受度徑陟南宫臣無任激切俟命之至請師開壇詞文維年號某月某朔某日某甲子某郷貫某處居住奉大道弟子具位姓某同家眷等謹齋沐䖍誠稽首再拜上啓上清三洞法師某君門下竊以祖炁肇分有物咸歸於覆育道元始判承流代出於眞宗必屬至人克揚大教輙伸悃愊仰冒聦明切念某等伏爲亡過某靈夙契眞休生居人道久處六塵之妄未清三業之縁懼㝠責之難迯及人非之稔積旣淪夜壑永隔陽光非慿微妙之科曷濟湮沉之苦旁求上士式建靈壇恭惟度師眞士先生體道粹純潜心虚寂悟三洞四輔之㫖爲十方三界之師開戸牖於玄門作舟航於苦海天人仰德幽顯蒙恩伏望曲軫弘慈俯從丹禱飛神總轡冥通三境之天錫命頒符下㧞九泉之魄慶雲垂而生意無盡靈風聚而死骸發煙俾茲受對之魂證彼登眞之果更冀九玄滯識六道幽靈咸登解脫之郷共逹希夷之岸依歸至切敷述奚殫干冒威尊某下情無任𢢽禱激切之至開壇請答文齋官度詞畢監齋致詞云黄籙大齋紫清秘範功髙萬法澤普九幽伏請師慈升壇演法師答云寳齋妙重玄範幽深非洞貫於威儀莫宣楊於科典揣材非稱受請難當監齋又致詞云玉宸下化三洞宣行黄籙成儀九幽開泰豈獨一心之懇願抑惟四軰之傾瞻冀體天恩俯從人欲儻亡靈之獲度實師寳之垂慈師答云濟死度生實慿妙範代天行化必屬至人自愧凡庸敢當大請監齋又致詞云幽靈逝爽齊到玄壇色節華旛共臨法席伏望宣流法教廣濟幽沉豈惟大道之慈悲抑實羣迷之幸會齋官某等無任䖍祈懇切之至法師答云眞心易昧至道難知以六塵染着之身居五濁浮華之世業縁報對神爽沉淪非我法門無由超度過承大請敢廢關行科有彜章吾當宣演齋官同壇衆欲拜謝法師法師以手止之替引法師陞座祝香啓盟啓盟文髙功陛座法衆序立啓堂法事監齋跪讀弟了詞畢髙功捧香祝曰浮黎國内玉京山中億萬年結炁凝煙百千衆通誠逹信根盤騫木下葉滿栴檀林寳香一炷𤑔鑪中三界十方咸稽首畢以香𤑔中焚香上啓三清三境十極十華無上至眞道經師寳十方三界千眞萬靈黄籙大齋感應眞宰伏願驂龍駕鳳飛空歩虚降臨道場證盟功德次就座啓盟微妙同元蓋一眞之未布機祥有統由三炁之初分寂寂至無之宗蕩蕩自然之化生於象帝之始隱乎空洞之中元始開圖敷五文於碧落洞玄啓祕回十轉於本章生生之義難終難窮化化之原莫明莫測運兩儀之開闢使萬品以化成德本好生獨立長生之道功惟不宰孰知眞宰之筌非常道而非常名無弃人而無弃物粤自三皇之始道全乎人迄于五帝之終人逺乎道𥝠偽勝而天理滅幻境迷而覺性昏不能保命而愛神益見背眞而就僞生由是而死由是出於機而入於機汨正念於喜怒貪嗔棄眞常如夣幻泡影自取死壞離其本根人非鬼責以兼攻雪刃霜鋒之交至炎炎烈火獄峩峩丘寒池皆由一念之邪自致九幽之苦舉聲悲呌徒知宿命之非救苦化身未遇霈恩之及繄衆罪流吹不息惟太上㧞領無邊宏敷黄籙之文茂著盟眞之典控九鳯八鸞之駕㝷救十方宣九龍二虎之符開度六趣變熱惱以雲腴之醴爍火翳以靈寳之光劒樹摧鋒鑊湯息浪普召旣終而麗華得度一人無畏而北帝請陳是爲無上之縁兹實難量之果蓋以元皇敷化列聖流通經分三十六部而度人莫先齋列二十七等而黄籙爲首葛仙公授大洞之㫖張靖應校正一之文仙源流𣲖而浩浩無涯眞系傳宗而綿綿不絶弗惟功德之普博抑亦禁戒之威嚴非丹誠惟一惟精豈大範可聞可見今黄籙大齋官某歸誠十極請命三天奉先思孝而逺度億曽修善建功而普資羣爽投誠𤁋欵賫信効盟廣邀清靜之流祗建盟眞之㑹冝得上士與之宣行如某者法海陳人玄門末學濫處冠裳之列叨承師匠之傳體未洞眞豈足致形神俱妙德惟謭簿安能使天地同歸所當墮肢體而黜聦明處山林而就藪澤夫何塵跡誤辱藻詞顧惟皇灼之餘益認精䖍之至所幸寅縁有自翊替得人期共結於誓盟庶克圓於齋事況以科條具載功過悉分三官五帝之書九府四司之録毫分無失纎芥不遺弗萌簡慢之心恐墜薦修之福必也告盟天地質誓鬼神各罄丹心不生異念當使功標青簡超七祖以生天無令罪結黒書致九玄之墮地登壇之際受職之初咸秉誓言共揚大教今則齋莊旣肅盟告云周佩玉鏘鏘見十方之振響威儀濟濟仰萬聖之監觀同運誠心舉掦勝事以立清衆伏惟珎重請監臨將吏文焚香上請法籙治職靈官仙吏諸司法院官將吏兵虚空監察應感靈司直符功曹香官騎吏本府城隍大王監衛齋壇某神當境土地里域眞官一切神祇伏以天地開張萬靈受職聖眞降監百神駿奔迎奉颷輿關盟齋法今將蕆事合具告聞以今奉爲某官追薦某靈請修无上黄籙大齋將啓靈壇恭宣寳範伏請合盟布擔共建齋功掃穢除氛祗迎眞馭通傳詞悃延佇靈光冝整肅於威儀以導近於景貺各遵壇禁母紊齋盟依準玄科玉律疾速施行次宣誓言牓請玄師文具法位姓某上啓三天化主玄中大法師眞君伏以位尊三界仰師寶之隆名教演重玄頼慈光之接物四十二壇醮法七十二等齋科總爲羣生普濟諸苦凡伸修奉合具敷陳某今奉爲某人追薦某靈請修无上黄籙大齋今將依按玄科關行齋法仰祈恩霈普濟幽明恭乞祥光下臨壇席却諸魔惱鍚正炁於靈關鑒此齋恍拯沉魂於幽夜慶覃家國澤被存亡其等不勝䖍切懇禱之至稽首皈依修齋奉請請五帝文具法位姓某上啓東方安寳華林青靈始老青帝九炁天君南方梵寳昌陽丹靈眞老赤帝三炁天君西方七寳金門皓靈皇老白帝七炁天君北方洞隂𦍤單鬱絶五靈玄老黒帝五炁天君中央玉寳元靈元老黄帝一炁天君臣聞元始開圖眞文現世三元奠位五帝司方運隂陽生殺之機主人天功過之録凡伸修奉合具奏陳臣今奉爲某人追薦某靈請修无上黄籙大齋今將依按玄科關行齋法仰祈恩霈普濟幽明恭乞祥光下臨壇席降飈輪於下土如㑹浮黎憫幽夜之沉魂俾蒙道䕃普令家國均被恩休臣等不勝䖍切懇禱之至稽首皈依修齋奉請請天師文具法位姓某上啓三天法主都天大法天師正一靜應眞君伏以天道無名因文立教至神育物惟聖能成必有師資而爲規範將伸修奉敢後皈投某今奉爲某人追薦某靈請修无上黄籙大齋今將依按玄科關行齋法仰祈恩霈普濟幽明恭乞祥光下臨壇席度生死有情之苦咸沐齋功洗宇宙曠劫之辜肇新元化普令品物永享天休某等不勝䖍切懇禱之至稽首皈依修齋奉請請三師文具法位姓某上啓靈寳經師眞君靈寳籍師眞君靈寳度師眞君伏以結炁成文爰蔵重玄之妙先天立教獨隆上古之名必有眞師總茲具典將伸修奉敢後歸投某今奉爲某人追薦某靈請修无上黄籙大齋今將依按玄科關行齋法仰祈思霈普濟幽明恭乞祥光下臨壇席圓成妙果開度沉迷九夜重泉仗威神而通濟三塗六趣祈慧澤以昭融國保安寧氏躋仁夀某等不勝䖍切懇禱之至稽首皈依修齋奉請請三官文具法位姓某上啓上元一品賜福天官紫微大帝中元二品赦罪地官清虚大帝下元三品解厄水官洞隂大帝伏以玄元始青之炁開判隂陽水火考對之官分司罪福定死生於九府總圖籙於三元將啟齋修敢忘扣請某今奉爲某人追薦某靈請修旡上黄籙大齋今將依按玄科關行齋法仰祈恩霈普濟幽明恭乞祥光下臨壇席啓明證擔監眞度生落滅惡根削女青之霏簿增添善果紀南上之仙名全籍眞休克圓齋事某等不勝䖍切懇禱之至稽首皈依修齋奉請請監齋法師文具法位姓某上啓靈寳監齋大法師眞君伏以赤書御運敷靈寳之本章黄籙度生著盟眞之具典將關盟於齋法敢請命於師尊某今奉爲其追薦某靈請修无上黄籙大齋今將依按玄科關行齋法仰祈恩霈普濟幽明恭乞祥光下臨壇席證盟齋事開濟沉魂八㝠細微之中俱蒙道䕃九幽羅酆之内咸沐天休冀師寳之携提俾法輪之常轉某等不勝懇禱之至稽首皈依修齋奉請无上黄籙大齋立成儀卷之四十六
