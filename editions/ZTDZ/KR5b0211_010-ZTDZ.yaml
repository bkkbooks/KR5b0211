front:
  text: 无上黄籙大齋立成儀卷之十鳯十
  hash: sha256:793616dfb9db1d212ca0aa159dbfcb97fbf4e3bf4efd2851cd8a62a0f1a895f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_010-090430b, image: sjb/09/090430b.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蔣叔典編次上章逐月所詣宫分正月十二月上詣太上虚无丈人宫二月上詣太上九老仙都官三月四月上詣太上三天太清宫五月上詣太上重道宫六月七月上詣太上九炁文昌宫八月上詣太上天帝宫九月十月上詣太上大道宫十一月上詣太上侍中左右監諸將軍宫一作侍中左右監神諸將軍宫閏月上詣太上玄都宫一作太上九老仙都宫一作金單太歳宫赤松子章曆閏月隨前月宮逐月曹治宫分一日建玉曹治赤靈宫二日太素曹治太微宫一作建太素曹治大微宫三日太微曹治北平宫四日都正曹治太清宫作太清下宫五日正一曹治通明宫一作東明宫六日玄一曹治上明宫七日太素曹治髙靈宫八日雲集曹治紫微宫一作靈集曹九日元靈曹治侍春宫一作用靈曹治侍春宫十日太清曹治紫靈宫一作武靈宫十一日三水曹治素女宫十二日司録曹治巨野宫十三日清叙曹治西明宫十四日玄正曹治上絳宫十五日中都曹治典平宫一作典司宫一作典平宮十六日司非曹治北府宫十七日司姧曹治南伯宫一作南真宫十八日統部曹治東明宫一作統攝曹一作洞明宫十九日統録曹治西靈宫二十日監者曹治司命宫一作眀冷宫二十一日監司曹治陽明宫二十二日典考曹治太陽宫一作玄元宫二十三日司宫曹治少陽官二十四日玄元曹治太隂宫一作玄天曹二十玉日太玄曹治少隂宫二十六日都司曹治北辰宫二十七日都𠉀曹治太白宫二十八日直使曹治休明官一作司考曹二十九日司直曹治陽眀宫三十日集都曹治啓明宫一作興考曹六十甲子直神古章本無直神不用亦可甲子王文卿從官十八人符吏天季二人乙丑龍季卿從官十六人符吏天仲二人丙寅張仲卿從官十四人符吏孔光二人丁卯司馬卿從官十二人符吏天姧二人戊辰季楚卿從官一十人符吏地根二人巳巳何文昌從官十三人符吏地行二人庚午馮仲卿從官十七人符吏天元二人辛未王文章從官十五人符吏天杵二人壬申侯博卿從官十三人符吏天季二人癸酉孫仲房從官十一人符吏天定三人甲戌展子江從官十四人符吏天根二人乙玄龎明心從官十二人符吏天監二人丙子䃼孫卿從官十六人符吏天市二人丁丑趙子玉從官十四人符吏天償二人戊寅虞子張從官十二人符吏地行二人已卯石文陽從官十五人符吏天曹二人庚辰尹佳卿從官十三人符吏天閤二人辛巳揚仲公從官十一人符吏天光二人壬午馬子明從官十五人符吏天朗二人癸未吕威明從官十三人符吏天卿二人甲申扈文長從官十六人符吏天行二人乙酉孔利公從官十四人符吏天長二人丙戌車元昇從官十二人符吏天淑二人丁亥張文通從官一十人符吏天明二人戊子樂石陽從官十四人符吏地光二人巳丑范仲陽從官十七人符吏天慶二人庚寅禇進卿從官十五人符吏天行二人辛卯郭子良從官十三人符吏天剛二人壬辰武雅卿從官十一人符吏天華二人癸巳史公來從官九人符吏天處二人一作天虔甲午衞上卿從宫十八人符吏天償二人乙未杜仲陽從官十六人符吏天位二人丙申朱伯衆從官十四人符吏天榮二人丁酉臧文公從官十二人符吏天容二人戊戌范少卿從官一十人符吏天征二人巳亥鄧郁卿從官十三人符吏天豈二人庚子楊仲卿從官十七人符吏天梁二人辛丑林衞公從官十五人符吏天監二人壬寅丘孟卿從官十三人符吏天唯二人癸卯蘇他家從宫十一人符吏天曲二人甲辰孟非卿從官十四人符吏天雄二人乙巳唐文卿從官十二人符吏天公二人丙午魏文公從官十六人符吏天英二人丁未石叔通從官十四人符吏戊申范伯陽從官十二人符吏天陽二人巳酉成文長從官十五人符吏天施二人庚戌史子仁從官十三人符吏天基二人辛亥左于行從官十一人符吏天林二人子宿上卿從官十五人符吏天祥二人癸丑江漢卿從官十三人符吏天興二人甲寅明文章從官十六人符吏天望二人乙卯戴公陽從官十四人符吏天河二人丙辰霍叔英從官十二人符吏天畢二人丁巳崔巨卿從官一十人符吏天絶二人戊午從元光從官十四人符吏天令二人巳未時通卿從官十七人符吏天命二人庚申華文陽從官十五人符吏天開二人辛酉邴元玉從官十三人符吏天立二人壬戍樂進卿從官十一人符吏天宫二人癸亥左石松從官九人符吏天正二人一作石有松書章品則令曰章法前勿留牘牘者紙也便泰玄都第一泰玄都正一平炁係某治正一臣某稽首再拜第二上言謹按文書某郡縣郷里男女甲年紀户名第三恩惟太上分别求哀臣愚誠惶誠恐第四安以聞與再拜下相去一寸下窮者别牘臣姓平頭第五比牘安臣姓與太歳平頭第六比牘安泰清四十八字三寸書之第亡比牘安太歳日月時於某郡郷里中拜上第八後讓三牘三師靈讃若不滿三牘以另紙接之第九書章界紙止讓八分正書中界亦分爲法則第十書章法依如上法不妄讓牘界令曰正一道士書章威儀法則當如上件十條令不得妄開章界牘生造任意以迷惑後學品則凡違令者但是自作一法坐此正一道士五刑科論五刑者謂輸天治覆屋𦭘三千東第十一書章法以巾於下不得令紙著牀紙亦如法勿令衣拂著章可不謹之第十二書章當令紙筆硯必使潔淨不得穢汚雜用第十三書章磨墨左轉四十九廽止第十四書章筆左右轉各七廽止不得口含筆毫第十五書章法不得閑論他事第十六書章法書水當令清澄第十七書章法不得以筆㸃水滴向硯上第十八書章法當閉口不得有所食飲第十九書章法人身經穢汚不得書章第二十書章法當選手巾洗手毎令清淨第二十一書章法當不得敗字字不成若不合止第二十二書章法紙勿使破裂漏筆第二十三書章法不得令章并紙飛落地不復用第二十四書章法不得仍書飲食葷穢第二十五書章法不得仍書穢汚不淨之事令曰上件二十五條門下科令書章作法當依如科令若觸慢不依今者坐正一道士三刑科論三刑科者掃道路橋梁三十日第二十六書章法當整理衣服不得祼露第二十七書章法當匍匐恭敬不得蹲踞第二十八書章法巳成先隂讀校一遍第二十九書章法脫字皆用白墨雄黄治定之第三十書章法不得潦草書字第三十一書章法不得令他人盗讀章文第三十二書章法不得預下泰清日時臨奏却寫入第三十三書章法道士印封畢主人朿帶請章第三十四主人請章三叩頭三摶頰三起三下合九止第三十五主人對章叩頭至奏竟當自祝願隨心所道乞疾病差隨事陳述第三十六道士奏章竟主人謝竟叩頭摶頰如初請法右三十六條出正一書章品門下科令第二凡書章表先齋戒沐浴盥洗手面整理衣冠入室向天門設座焚香依式書之章紙可髙准尺九寸或小尺一尺二寸或一尺四寸爲則以綵鋪案書之古法泰京都泰字髙於上言一字上言上空八分下通走蟻毎行一十七字行闊一寸二分或二寸四分第一行書盡法位至再拜字上言獨占一行臣字不得爲頭鬼字不得居首不得懸生露死及抽破人姓名姓名各當一字雖是𩀱名亦只作一字應魂魄喪亡之字並須廽避不令上頭不得令外人覷視及雞犬等入室書章不得與外人語言閉氣書之書未了不得放下筆對章不得厲聲讀章未畢不得離坐不得令香煙中絶以聞去再拜上一寸書之下窮者别牘修真㫖要同此蔡致虚儀以聞低告報二字書之後空三行書臣姓名後空三行書太清階太清階後三行書太歳太歳與臣姓名低上言字二寸四分太歳一行隨字多少令到行末後空三行少則添紙一幅太清階緊疊據科令云太清四十八字三寸書之今太清階乃五十六字比古科多八字若修真㫖要去金闕七寳四字亦是五十二字與科不同當攷赤松子曆太清細字上度三寸五分中度四寸五分下度五寸不得過此留冲靖止作一行細楷書臣姓名太歳各只作一行匀書寫章不隔日塡陛下不隔時古法塡太清不隔時下太清細衘令齋主束帶請章法師奏章日東向夜北向朱表以匀淨黃表朱書髙下尺寸並同章法毎行二十四字行闊一寸二分或九分爲則書章之士當須明察勿使筆畫滅裂遣漏脫誤仍勿擅改章文入齋意取令理順不至斷續書章之時靈官功曹十二書佐監臨左右功過必録纎瑕無遺禁戒威嚴莫越於此謹之章信科曰凡奏章先須備信若都無信即神明不納貴子有慳鄙不捨之心又曰章無的信富者増之貧者減之富貴之家心希功德而慳惜財物只效貧者出信如此無益於事貧寒之士求請章醮師爲代出法信舊章雖各具所用大抵有之天子王公庶人尊卑不同品名各異不得淆亂而無分别科云章信之物散施貧窮宜行隂德師不可全用十分爲率師可用三分而巳天科嚴峻可不謹之繒綵天子紫色疋數王公用本命色丈數士庶用縵繒天數鎮錢天子金錢王公銀錢庶人銅錢禄米天子三石六斗王公二石四斗庶人一石二斗鎮油天子一石二斗王公六斗四升庶人二斗四升或一斗四升信香天等全斤王公半斤庶人三兩至五兩筆墨紙朱砂此給主者書章用應是諸章悉須置辦不可暫闕其餘並依本科啓告玄穹章紙一百張筆墨硯各一副書刀一口金魚一枚玉鴈一隻香五兩柴五十斤炭五十斤塩一斤䜴一斤油一斗二升米一石二斗錢一貫二伯文淨巾二條命信若干丈尺自餘每章一通米五斗錢一貫二伯文命信紙筆墨硯如本儀封章法凡宣章訖以書刀置太清陛下以金魚玉鴈置太清左右存靈官書佐考校章文及以新筆硯等置於前存畢髙功於香煙上捲軸令緊入函仍入腦子外以青絲三節緊繫之注蠟池中外以青紙函重封付烈火焚之无上黃籙大齋立成儀卷之十
