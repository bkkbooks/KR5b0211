front:
  text: 无上黃籙大齋立成儀卷之十七在七
  hash: sha256:000596a31df957e0193dc49767a705db2e55cb9c6dbf52c8b0a1f1dff486a443
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_017-090480c, image: sjb/09/090480c.png}
body:
  text: 上清三洞法師李景祈立定三洞法師冲靖先生留用光傳授太上執法仙士蔣叔興重修科儀門二古法三時行道儀法師坐堂弟子九禮三伏香花華夏引師出堂叅詣六幕如宿啓之儀法師左行自地户入壇入戸呪次華夏左旋入壇昇天門上十方香東方爲始御案香次髙功宣五方衞靈呪出眞文要解妙經東方九炁青天明星大神煥照東郷洞映九門轉燭陽光掃穢除氛開明童子備衞我軒收魔束袄上對帝君奉承正道赤書玉文九天符命攝龍驛傳普天安鎮我得飛仙南方南方丹天三炁流光熒星轉燭洞照太陽上有赤精開明靈童總御火兵備守三官斬邪束妖翦截魔凶北帝所承風火八衝流鈴交煥敢有不從正道流行我享上功保天長存億劫無終西方七炁之天太白流精光耀金門洞照太㝠中有素皇號曰帝靈保神安鎮衞我身形斷截邪源王道正明宮殿整肅三景齊并道合自然飛昇紫庭靈寳符命普惠萬生功加一切天地咸寜北方北方玄天五炁徘徊辰星煥爛光耀太微黒靈尊神飛玄羽衣備衞五門檢精捕非敢有干試豁落斬摧玉符所告神眞八威邪門閉塞正道明開映照我身三光同輝䇿空駕浮舉形仙飛中央黄中理炁總綂玄眞鎮星吐輝流煥九天開光童子一十二人元炁陽精焰上朱烟洞照天下及臣等身百邪摧落殺鬼萬千中山神呪普天使然五靈安鎮身飛上仙次都講唱鳴法鼓二十四通次髙功三揲香祝次發爐无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域眞官正神臣今正爾燒香奉爲某官某人正薦亡親某乙普薦在㑹某乙等修建黄籙大齋三日三夜以今第一日清旦中分落景随時換易昇壇行道願得太上十方正眞生炁降流臣等身中令臣所啓速逹逕御太上無極大道至眞玉皇上帝御前衆官各三禮次都講唱重鳴法鼓二十四通閱吏兵行事衆官各長跪叩齒二十四通出吏兵謹出臣等身中五體眞官功曹吏出上三天執法開化隂陽功曹度道消災散禍解厄君吏各十二人出臣身治職君吏某治中建節監功大將軍前部效功後部效殺驛廷令驛廷丞四部監功謁者出臣等身中仙靈直使正一功曹治病功曹左右官使者隂陽神決吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏等各二人出出者嚴裝顯服冠帝垂纓整其威儀直使功曹戴通天之冠衣皂紈單衣正一功曹冠朱陽之幘絳章單衣使者冠九德之冠五色綬命單衣腰帶虎符齎執玉版直使功曹住立四方正一功曹住立中央治病功曹營衞臣等身左官使者建節在前右官使者持幢在後陽神決吏立左隂神決吏立右上部功曹住立上方中部功曹住臣等身中促氣功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者匝繞臣等身即吏虎賁察姦鈎騎都官僕射天騶甲卒天丁力士收炁食炁吏收神食神吏收鬼食鬼吏收精食精吏收毒食毒吏收邪食邪吏誅符破廟吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏屯駐臣等前後左右功曹使者嚴裝事竟羅列鹵簿關啓靈寳官屬領仙監齋諸君吏天師所布下二十四治三十六靖廬七十二福地三百六十名山崑崙等上宫三萬六千神日月星宿璇璣玉衡天地五帝三界官君將吏及道上二玄三元四始四面方位風氣注氣甲十諸官君將吏考召君東九夷胡老君南八蠻越老君西六戎氏老君北五狄羗老君中央三傣傖老君五嶽四瀆丘沼君諸廟神祇所在髙山卑谷山林孟長十二溪女根源本始土地之主社稷將吏一時嚴裝與臣等身中功曹使者飛龍騎吏上啓太上無極大道太上道君太上老君太上丈人太上玄老十方無極大道道德衆聖天尊至眞大帝天帝天師君靈寳監齋大法師諸官君臣等生長魔俗沉淪季業玩樂榮華宿命因縁忽見啓拔得奉大道巳上出太極敷齋威儀經荷恩隆重喜懼交襟臣等受法之日約以奉修玄旨表效丹誠敷暢眞風廣宣惠澤慈心愛物開度天人今有某州某縣某官爲某亡靈某甲請修无上黃籙大齋謹依科法齎金龍繪綵香花油燭證質丹誠以祈所願臣等忝職玄司不勝所見謹爲沐浴五體洗心正念依下元黃籙簡文靈仙科品於某處建立皇壇奉修无上黃籙大齋三日三夜九時行道露身三光之下稽顙十極之前燒香然燈轉經念眞爲弟子某拔度亡靈某及門中祖玄靈識九幽一切長夜死魂懴罪謝愆離苦昇樂覃恩家國資福見存普及含生俱登道果謹上請三洞天仙兵馬地仙兵馬飛仙兵馬眞人兵馬神人兵馬日月星宿兵馬九宮五帝兵馬三河四海兵馬五嶽四瀆兵馬各九憶萬騎三十二天監齋直事侍香金童散花玉女五帝直符傳言奏事飛龍騎吏等各三十二人一合來下監臨齋所爲齋生某拔度亡靈某甲及九祖父母窮魂苦爽得出長夜九幽之府斷絶罪根出離三塗五苦之中身入光明上昇天堂衣食自然轉輪更生福慶之門齋主某今齋信效心歸命十方無極世界巳得道大聖衆至眞諸君丈人十方諸靈官乞所願從心身得過度三災九厄十苦八難自請官至此並出黄籙簡文衆惡之中保國寜家普及含識須行道事竟有功勤者謁還天宮功曹使者飛龍騎吏分别關啓以時上違列啓事竟各還臣等身中復於宫室須召又到一如故事各鳴法鼓三通咽液三過建齋止第一日清旦出官自餘否道士不受靈寳法不受都功盟威籙不可岀宫行齋右出官啓事按三洞科儀籙品不同眞官亦異當各隨身中所魔仙靈吏兵出之至若建靈寳齋出盟威都功治職君吏所以科儀云受盟烕都功籙者止稱攝行齋事益爲此上清齋出靈寳洞玄中盟五法官吏夫籙始於正一演於洞神貫於靈寳極於上清上清匿景韜光精思上道志期輕舉全不渉俗洞神役神神靈消伏魔癘其於遷拔巳不相干陽光敷演道德自然昇玄講究眞實法性𡨋心修鍊與道合符修身保命開度天人盖無逾於靈寳齋者受道之士先受正一盟烕三五都功修持有漸方可進受靈寳中盟上清大洞諸籙否則爲躐等僣越違太眞之格今世羽流不體太上慈悲演教之意切切然惟貨利是營上清靈寳盟威信金旣重止憑化士於宗壇受一法籙詞文便稱某籙弟子行持齋事又有止受都功昇玄等籙輙出靈寳齋科仙靈眞官者遐方僻郡習以成俗非惟有犯玄憲抑實矯誣上天杜廣成儀云其他十戒白簡道士不可補職昇壇此外竊預名號自貽隂譴建齋之主寜免負累得不戒哉行齋之士所當痛革次都講唱各稱法位具法位奉行黃籙大齋事臣某等謹同誠上啓虚无自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十二天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界官屬一切眞靈臣等夙命因縁生值大化玄眞啓拔得入信根三師盟受三寳神經法應度人九萬九千位登至眞而功微德小未能自仙志竭軀命佐國立功巳上並出靈寳王明眞拜凡所歸投理宜關奏今奉詞㫖敢不上聞次宣詞按如詞言精誠丹切願憑大道開度存亡齋主某仰慮亡靈某及九祖父母一切窮魂生世之日罪惡難稱死入地獄終天無解伏聞无上黃籙大齋功髙萬法惠覃無窮謹依玄科奉齎金龍紋繒本命之信香花油燭表效丹誠請拔九祖窮魂長夜之苦仰祈玄佑普福幽明臣等謹爲滌慮澄神㝠心靜念依黃籙簡文靈仙典格拔度科品敷建靈壇四界八極法天像地立齋行道燒香然燈懴謝存亡三世罪考奉爲亡過某及齋主家億曽萬祖囚徒死魂開諸光明解脫苦難免離惡道轉入信根今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形和與道合眞師弟子一時左回三上十方香還西面東立師祝曰臣等今爲齋主某技度亡靈某及九祖父母九幽玉匱長夜之府死魂惡對宿身罪根功德開度建齋燒香請謝十方願爲亡故某及某家九祖父母長夜死魂拔出幽一作憂苦上升天堂今故燒香歸身歸神歸命大道臣等首體投地歸命太上三尊願以是功德歸流亡靈某及某家九祖父母一切死魂乞得免離十苦八難長夜之中身見光明上升天堂衣食自然長居無爲今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形和與道合眞師弟子左廻三上十方香如上法師祝曰臣等今爲齋主某拔度亡靈某及九祖父母九幽玉匱長夜之府死魂惡對宿身罪根功德開度建齋燒尊請謝十方願爲亡故某及某家九祖父母長夜死魂拔出幽苦上昇天堂普爲帝王國主君臣吏民受道法師父母尊親同學門人隱居山林學眞諸道士賢者願各得眞道歸身歸神歸命大道臣等首體投地皈命太上三尊願以是功德歸流帝王國主君臣吏民受道法師父母尊親同學門人隱居山林學眞諸道士賢者願各得眞道安居無爲今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形和與道合眞眞師弟子左廻三上十方香如上法師祝曰臣等今爲齋主某拔度亡靈某及九祖父母九幽玉匱長夜之府死魂惡對宿身罪根功德開度建齋燒香請謝十方願爲亡故某及某家門宗室九族姻親國中吏民同學友流天下人民蝖飛蠢動蚑行蜎息巳生未生一切衆生皈身皈神皈命大道臣等首體投地皈命太上三尊願以是功德皈流弟子某身令得仙度身入無爲與四大合德天下人民蝖飛蠢動巳生未生一切並得免離十苦八難五毒水火十災萬害賊疫鬼炁刑厄之中今故燒香自皈依師尊大聖衆至眞之德得道之後升入無形和與道合眞巳上並出黃籙簡文經前後稱與道合眞者凡四皆本經文石張清都科三上香不能廵行當使侍香執爐左行亦可然不若今侍香引齋主逐方上香爲合儀也大率行道不可乆占時光劬勞甚則禮容情反無功矣太上流傳齋法本爲學道之士謝罪求仙今其更相開度故齋儀上香念願祝帝王國主之後必祝三師及受道法師同學門人而黄籙簡文正科並稱今爲同法某甲盖可見矣後世用之於他人其問詞語未免稍有遷就處然三捻香祝願帝王師資之語諸經盡然切不可攺次都講唱禮二十方懴悔東方臣衆等至心歸命東方無極太上靈寳天尊九炁天君東郷神仙諸靈官各虔誠懴悔跪懴臣等今故燒香皈身皈神皈命謹爲黃籙大齋主某仰慮亡靈某及九祖父母一切死魂生世之日所行元惡罪結九幽長夜之府魂充考撻諸痛備嬰形體毀瘁苦毒難任長淪萬劫终天無解今依盟眞玉匱女青上宫拔度科品齎青紋之繒九十尺九尺金龍一枚皈命東方無極太上靈寳天尊九炁天君東郷神仙諸靈官拔贖亡故某及齋主某家罪録開度窮魂身入光明上昇天堂衣食自然早得更生福慶之門某甲身得道眞和與神合同次東南方臣衆等至心歸命東南方無極太上靈寳天尊梵炁天君東南郷神仙諸靈官各虔誠懴悔跪懴臣等今故墝香皈身皈神皈命謹爲黃籙大齋主某仰慮亡靈某及九祖父母一切死魂生世之日所行元惡罪結九幽長夜之府魂充考撻諸痛備嬰形體毀瘁苦毒難任長淪萬劫终天無解今依盟眞玉匱女青中宫拔度科品齎黃紋之繒一百二十尺一十二尺金龍一枚皈命東南方無極太上靈寳大尊梵炁天君東南郷神仙諸靈官拔贖亡靈某及齋主某家九祖父母一切死魂惡對罪根三界司筭女青中宫削除罪録開度窮魂身入光明上昇天堂衣食自然早得更生福慶之門某甲身得道眞和與神合同次南方臣衆等至心歸命南方無極太上靈寳天尊三炁天君南郷神仙諸靈官各䖍誠懴