front:
  text: 无上黄籙大齋立成儀卷之一鳯一
  hash: sha256:6b00b2548450db713217cbd02c4f4b0e97f790ab29e878880fc76bc731ec3ac6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_SJB_001-090378a, image: sjb/09/090378a.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蒋叔輿編次儀範門序齋第一靈寳十部飛天妙書三十六卷生於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗靈圖革運玄象推遷眞文玉字元始登命太眞按筆玉妃拂筵鑄金爲簡刻玉爲篇袐於玉京七寳玄臺紫儆上宮衆眞侍衛朝慶靈文生天立地開化神明上謂之靈施鎮五嶽安國長存下謂之寳靈寳玄妙爲萬物之尊其量莫測巍巍太空舊科四萬刼一出皆傳宿有金名刻簡來生應爲仙者玉宸大道君愍兆庻之塗炭哀地獄之苦惱慇懃懇請下降世間斯實齋法之祖也和天安地保國寧家度死濟生求仙學道共弘斯經難以言宣太上大道君告髙玄大法師曰夫來入吾法門上希神仙飛騰穹蒼次願家國安寜過度萬患消災㓕禍請福求恩當先修靈寳齋上解宿世重過㧞度惡縁下解巳身積行以來所犯罪愆勤行齋直坐致飛仙此治行之本求道之原學無此法徒勞心神宿根不解聖道泯泯古聞其言今希見其人矣太極眞人曰靈寳無上齋皇老君天尊大聖常修奉不倦而況道士仙人可不翹慕之乎髙上老子曰道家所先莫近乎齋齋法甚多大同小異㓛徳重者惟靈寳齋世希能學之矣學之者皆大乗之士前世積慶所鍾去仙近也清齋誦經仙道自成何必藏山藪也昔正一眞人受命導世奉荷靈寳自以齋法㫖趣淵微法禁森嚴非愚淺始學所可明了廼妙出五稱文撰立正一齋法目爲㫖教以遺祭酒籙生靈寳之教袐而不傳仙人口口相授太極仙公始筆之書著敷齋威儀之訣陸天師後加撰次立爲成儀祝香啓奏出官請事禮謝願念罔不一本經文張杜二師繼出玄風益暢登壇俯仰之格相去雖數百年前後蓋一轍也至於痛庸師之不學憫流谷之無識非非相承其失不悟以簡便為適當以古法爲難行則自張萬福天師以来嘗病之矣今世醮法徧區宇而齋法幾於影滅跡絶間有舉行之士又復不師古始信末師而哂前哲是流俗而悖經教壇儀乖踈科式舛謬甲造乙習遂成舊章切切用力於徼影響譎詭幻怪之間以爲捨是則無以起信末俗而紫闕洪儀玄臺祕典所以度天人惠生死者竄易殆盡日就湮微可勝痛哉夫三洞諸齋莫不以神經爲本懴謝爲先登壇啓祝罔非龍漢舊文依文而行是爲齋法今將十部妙經三洞經科靈寳玄範及留冲靖所傳古齋一宗軌儀行遣叅以所受法訣攷證編次修爲成書合三十六卷以上追張杜二師之遺躅仍以齋法修用一門總其綱領訂其疑誤各釋經文之所從出隨事爲之辨正庻俾結齋之士得所遵承據文便可施用雖非親遇太上面授儀則然經文昺著足爲章程道由人弘何有不可天尊告太上道君曰吾於龍漢之中與三寳相隨逮至赤明世世出化教道三乗巳得道過去及上聖大神諸天帝王妙行眞人莫不承範威儀修行大法以成自然君今方當試教三代探索眞文宜備天儀開度羣品使有心者得成神仙靈寳三元宫中有三部威儀合二十四條上元總眞中元總神下元總仙上應二十四眞中應二十四神下應二十四氣八景三部元始之宗今悉以相授其道尊重謹勿輕傳來世運促人心破壞必生異念不信經法吾經當還三元宫中須至清炁三代交際龍精乗晨世道太平吾經復岀下世開度今眞文祕典尚留下世未還三天正使眞仙復出現世亦知不易斯文也齋法品𩔖方便多門禮祝啓願随用或别至於威儀俯仰之格相逺不能以寸大要不越諸此苟能以清虚爲體恬澹爲用安神定氣心府泰然思神念眞依儀行事以之祈眞眞必降矣十部妙經靈寳諸齋之祖建齋之時施鎮壇内供養尊禮所不可闕留冲靖有云以三洞眞經爲道本以十方懴謝爲眞誠精思九朝宻投三簡斯言盡之矣行齋之士當職叅三洞身受上法庻於齋事無所窐礙儻冐時宜行自速玄憲耳然十部妙經世亦罕備且有終身不得盻其篇目者敬開具安鎭齋壇合用神經如左儻使經教流布世間則齋法庻不泯没矣齋壇安鎭經目凡靈寳齋㑹皆可施用太上靈寳元始五老赤書玉篇眞文天書經洞玄靈寳赤書玉訣妙經洞玄靈寶運度大劫經洞玄靈寳丹水飛術運度小劫經洞玄靈寳天地運度自然妙經洞玄靈寳空洞靈章洞玄靈寳玉京山歩虚經洞玄靈寳自然九天生神章洞玄靈寳無極大道自然眞一五稱符經洞玄靈寳諸天内音自然玉字洞玄靈寳八威召龍妙經洞玄靈寳智慧上品大誡經洞玄靈寳智慧罪根上品誡經洞玄靈寳三元威儀自然眞經洞玄靈寳長夜之府九幽玉匱明眞科洞玄靈寳智慧定志通微妙經洞玄靈寳金真法輪誡業本行上品妙經洞玄靈寳玄一三眞勸誡法輪妙經洞玄靈寳無量度人上品妙經洞玄靈寳諸天靈書度命妙經洞玄靈寳滅度五錬生尸妙經洞玄靈寳三元品戒功徳輕重經洞玄靈寳宿命因縁明經洞玄靈寳仙公請問經洞玄靈寳仙人請問本行因縁衆聖難經洞玄靈寳道引三光妙經洞玄靈寳三部八景神仙二十四生圖經洞玄靈寳飛行三界通微内思妙經洞玄靈寳藥品洞玄靈寳芝品洞玄靈寳變化空洞妙經洞玄靈寳消魔寳眞安志智慧本願大戒上品妙經洞玄靈寳眞文要解經洞玄靈寳太極眞人敷靈寳經文齋戒威儀諸要經訣洞玄靈寳齋說光燭戒罰燈祝願儀建齋總式第二經曰開度七祖救㧞三塗黄録大齋最爲第一應驗開度先審其人實誠態切皈依信向在於科法甚爲宣行方可許其奉示以投狀式并齋中法信狀建壇要在洞天福地靖廬名山玄壇宫觀不經兵陣戰場屠坊刑獄生産塚墓穢惡之地仍卜三元八節五臘三㑹等日啓齋更符庚申甲子四始十直天恩天赦名曰良日若專度祖先則要在亡者七七百日大小祥逺忌之日相合齋主營辦齋中法信訖携詣師門投拜請師受狀畢即引齋官詣道前取信香焚以啓奏既承投詞嚴命同學同志同學謂上道同壇同師之友同志謂同其志普爲幽明者苟非具人和氣不生有堕功果共建齋功受詞之後師與齋官弟子冥心一意專以開度爲念修文修事悉令具足不使臨用有闕擇日建立齋壇壇心三寳位上施帳座寳盖中安神經内壇設十方香案播花燈纂鋪設如法有圖壇前左右分立六幕式中置九幽神燈或於天門上壇外四圍依法然燈有同壇之東南鋪廻耀輪燈有圖壇之東北鋪九獄燈有壇壇之左序立錬度堂供養煉魂聖位壇之右序立神虎堂供養攝魂聖位壇之東南設受度堂即齋主家九祖亡人位次遥對壇所壇之後正靣鋪設道場列上帝御座於中兩旁列醮筵聖位於道場前左别設正一師位供養天師玄師女師嗣師系師又别設從章靈官位供養寳章中仙寮靈官等未開啓齋亶前允進章奏並於道場内行事壇前向外立土地承差監臨正神位前期三十二日或二十四日更看所度亡人多寡爲則關召功曹符使土地預告三清玉帝天皇北極東極五師三官天樞院地水嶽府天下都大州縣城隍堅立寳旙告盟三界有式闢一處爲誦經室開啓轉經宣開啓䟽自此逐日精專修誦度人上品生神寳章金籙度命得道救苦諸經禮誦朝天九幽懴法稱揚玉皇寳號太乙天尊十方洞靈睿號以多爲功印造焚化功力有限自此師與齋官等入靖對齋不交外事前期十日七日亦可量事爲之正奏三清玉帝勾陳紫微后土東南二極九幽朱陵洞淵眞王十方五老九天上帝三十二天木公金母申日月二宫五星四曜五方五斗南北二斗五師三官靈寳監齋正一三師三省五府三元四聖九天天曹諸眞天眞皇人飛天神王雷霆眞宰十極眞人南昌上宫符命經籙水府都水監五嶽四瀆九江九壘地府洞天太𡻕尊神龍虎君等牒天下都大城隍州縣城隍係祀正神諸道諸獄九州社令蒿里相公水陸關津五方境界𡨋關幽路五道大神六道都案監壇正神關本司官將劄司命土地專牒三界直符神虎追魂使者賫持公文預詣地水職司根㝷係薦亡靈請領赴壇伺候開度次立遷神超度等旙有式開奏已訖法師書篆開度符籙先期七日或五四日於道場内拜奏啓告玄穹解穢寳章以次進拜酆都赦罪章告行元始符命救苦眞符玉清拔幽魂眞符破地獄眞符太上勑赦生天寳籙青宫九龍符命接續進拜開通道路沐浴錬度諸章前期兩日法師預集羽流登壇演習威儀先正齋一日臨午聲鍾壇官齋主威儀執事祗請法師入靖黙堂各先議定職次僉書職狀依班序立請法師就座齋主九禮三伏長跪座下致詞請師陞壇俟師允請賛引法師陞髙座祝香敷座啓盟畢事下座書結盟狀知職榜引法師出堂立幕齋官同師至玄師堂中上香請玄師下降㸃酌宣䟽讀結盟狀一就焚燎五帝幕請五帝下降㸃酌宣䟽讀結盟狀一就焚燎次天師幕請天師下降㸃酌宣䟽讀結盟狀䟽焚燎如上儀留結盟狀在幕次三師幕請三師下降如玄師幕之儀次三官幕請三官下降如五帝幕之儀次監齋幕請監齋下降如三師幕之儀旋至外壇戸外序立壇下法師率衆各執水盂楊枝誦淨天地呪以次陞壇灑淨畢依法禁壇至神虎堂關發玉劄落景法師陞壇分燈侍燈依式然㸃令内外周徧法師退歸靜黙堂齋官弟子具威儀祗請法師陞壇宿啓法師齋官叅謁六幕先五帝次三師監齋三官天師次玄師幕法師率衆官列班序立玄師前齋官上香捧詞函自述修齋意訖度詞法師法師受詞告齋吟道讃次讃引至都門外序立壇下法師上香啓白侍經宣啓壇䟽焚燎壇外鳴金鐘玉磬依法陞壇旋至地戸法師宻呪入戸率衆官以次陞中壇至天鬥法師獨陞内壇上香行事依科宿啓敷露眞文宣靈官䟽說戒𥙷職宣禁回幕參謝紏過依法禮燈召靈沐浴引靈朝禮送靈歸位諷經呪食第一日正齋叅謁六幕依科三時行道二上轉經每朝引靈至壇下叅期三寳懴謝罪愆𤼵盧出官畢引靈朝壇六謝畢引靈復位靜夜法師至九獄神燈前祝告王清破地獄眞符依式懴燈誦九清𣑽唱破獄呪持䇿杖發符破獄有儀或宿啓夜夲攝召先爲之尤妙禮九幽神燈懴廻耀輪燈第二日正齋行道如第一日之儀靜夜普召九泉六道全形沐浴設斛錬度施戒傳符第三日正齋行道如第二日之儀晚朝進升度亡靈寳章靜夜宣行錬度變錬亡魂傳授九真妙戒告行長生靈符給付劵誥斬滅三尸飛度五戸昇上法橋牒天門守禦諸神保舉亡靈上登天府第四日侵晨或先一日亦可關發設醮請狀奏三清上帝申三官大帝冠日進投龍簡依式次第散壇進拜言功朱表還戒納職奉辭三寳解壇下榜次辭五帝三師監齋三官天師次至玄師前回向禮謝拜送徹幕瘞簡投龍齋官弟子禮謝法師受禮至夜設醮謝恩進奉車輦錢馬功徳都䟽三清玉帝靈寳五師言功三官申東嶽回兵牒城隍回祠出給照劄付功曹土地等依格推功竣事法師歸堂弟子拜謝交賀禮成鎭信第三經曰古人淳樸懐道抱徳不貪不欲各足於身但用志誠自可通感不須財寳玄合天眞末代時澆人民矯詐唯恡財貨不識因縁賤命重財亡家破國内懐萬惡外結凶犴相繼滅亡末曾自悟念是之故令遣散之一則外賊不起内外安靜衆禍消除所以質信効心以財爲首財旣可捨心亦随之聖善明通随夫心意髙天厚地玄聖上眞非信不通非心不感通感之至在乎信焉金龍十三枚十枚鎮十方三枚随簡投之金龍各重一兩長三寸六分國家用上金公侯大臣次金士庶銀銅塗金並可通用科曰龍者上天之驛騎也傳送通感龍驛爲先負簡即騰信三官效誓即告盟十極鎮信之法以龍爲首關者考屬隂官曹鎭綵十一段十段十方一段命信東方青紋九南方絳紋三西方白紋七北方皂紋五上方碧紋三十二下方黃紋三十二四維黃紋各一十二十方合一百三十六天子匹數諸侯丈數士庻尺數本命紋繒天子諸侯紫色士庶以本命納音色匹丈尺數各隨本命外加一以表延生之信科曰紋繒者顯五行之色象十方之氣降十天致五帝通眞效信請命祈靈不可闕也闕者考屬天官玄都曹鎭十方紙墨筆硯一十副紙毎方用一十二幅科曰建齋行道或救拔億曽萬祖先後亡靈或請福祈恩消災謝過則四司五帝三界十方紀録善功校定罪名當以紙筆爲録功紀善之籍質信於十方不可闕也闕者則十天五帝不録其功九幽三官不除其過闕者考屬三官曹鎭十方香花十柈科曰香者以通感爲用隔氛去穢花者以鮮潔爲美表瑞效珍請福祈眞香花爲本香以沉水降眞花以香潔木生者無花可用五綵剪成以鎭十方不可闕也闕者考屬隂官曹鎭米二斛四㪷或一斛二斗科曰米以鎭信天官増加品禄闕者考屬天官曹鎭油二㪷四升科曰油者隂𩔖也隂中生陽以油鎭隂官續陽景闕者考屬隂官曹鎭炭二十四斤科曰炭者陽𩔖也陽中生隂以炭鎭陽官資隂氣闕者考屬陽官曹鎭錢一萬四千或二千四百或一千一百科曰金錢一萬四千以代上金之信質心三界告盟十天闕者考屬天官玄都曹槿木簡三面簡各長一尺二寸闊二寸四分厚二分科曰簡者記也告也記世之功告盟上眞上下正方天子以玉爲之玉有九德禮天地之信也餘皆槿木爲之或栢木丹界五行丹書國號年月建齋之所及法師姓名投於名山大洞靈泉龍穴及齋壇之中告天地水三官使著明齋事奏于上境闕者考屬地官九都曹鎭十方玉璧十枚投龍璧三枚十方璧各徑二寸四分厚二分圖形虚中科有正潔之德可以盟感上眞故以爲信若投龍簡當以青絲金鈕纒而副之青絲以代割髪金鈕以代歃血上告三官也投龍璧天官蒼璧圓形地官黃璧方形水官黒璧六出形闕者考屬地官九都曹投三簡金鈕二十七枚投簡之法當用金鈕以副于簡三簡用二十七鈕各徑九分圜其外如圜之刑國家用金臣庶以銀銅塗金龍簡璧鈕式詳見齋法修用門威儀第四科曰太上三尊居玄都玉京之山亡寳玄臺紫微上宫十方世界上聖髙眞一日三來旋行朝謁執符把籙建節持幢吟詠洞章燒香散花奏鈞天廣樂鸞唱鳳舞萬眞稱慶三界齊懽今之齋法登壇朝奏吟詠歩虚一象玄都玉京也威儀法式莫不備焉節一對五色絲爲之上下五層懸竿頭上金鳳㗸綬帶幢一對珠蓋珠網八角一層懸朱竿木胎左龍右虎龍虎㗸綬帶旌一對似節無龍鳳綬帶三層五色絲爲之懸竿珠旙一對珠錦玉珮金鳳㗸之懸竿五明扇一對以木雕成金彩裝上布星斗中列五嶽下繪海瀆竪以朱竿鶴羽一對以木刻成鶴翅竪以朱竿香爐几案䄄席二十副三寳一十方十髙功都講奏案各一六幕六壇外香案一此是齋壇所需之數他處所用不在此數内章函章案函槿木或栢木梓木爲之長一尺二寸八分方閣二寸八分正中上下開三印池案副之赤松子曆云章案長二尺二寸髙八寸仍須曲脚以栢楠梓木爲之違科奪筭龍頭書刀削治名籍輟惡舉善落死上生齋章之中此亦爲最可刃長六寸柄作龍形刃以古鐵爲之柄以銀六錢爲之拜表用不可闕燈燭行道禮誦燈燭爲急非惟啓奏所須抑亦消禳所用經科具有多寡要在隨力所營或止依金籙簡文所載然之照曜諸天續明破暗下道九幽地獄上暎無極福堂功德之中此最爲上或兼諸香液雜以蘭膏各令合儀自然降福其燭十方各一三寳前二奏案前一六幕等處隨力設之然燈所以續明照夜太腸巳出當令侍燈法師依法滅燈今世日中亦然燈燭所當革除无上黃籙大齋立成儀卷之一
