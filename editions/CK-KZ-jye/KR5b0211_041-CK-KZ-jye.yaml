front:
  text: 重刋道藏輯要太上執法仙士蒋叔輿編集符命門五方眞文玉字東方眞文太上靈寶東方八天自然玉字青帝九炁天文每一行分作八字書南方眞文太上靈寶南方八天自然玉字赤帝三炁天文西方眞文太上靈寶西方八天自然玉字白帝七炁天文北方眞文太上靈寶北方八天自然玉字黑帝五炁天文中央眞文太上靈寶大羅之天自然玉字黃帝一炁天文昇天四保舉符元始符命厯關諸天普告三界勅制地祇右劵背文左劵背文
