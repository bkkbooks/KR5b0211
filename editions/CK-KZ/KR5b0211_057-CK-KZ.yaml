body:
  text: 生心胞絡符五帝玉司符東方上元玄靈自然八道度仙符南方下元天靈自然八微玉眞符西方中元皇靈九玄化生八炁紫金符北方元皇靈都虛微八道金眞玉符中央三元靈微八王黃書眞符靈寶火鍊成仙符太乙元君鍊身符飛靈合炁召六甲六丁大將軍符符下注本旬將軍姓諱黃炁陽精洞明丹陽鍊度靈符飛元聚靈召神諸使者符九使者符同此各書姓名於其下依訣用之王清九陽眞炁符一陽混溟𤥭瑝之炁二陽泛華紫微之炁三陽天婁鳳車之炁四陽中女辟邪之炁五陽太皇微延之炁六陽化眞白灝之炁七陽絳實子光之炁八陽天眞命仙之炁九陽太皇寂玄之炁靈寶九天生神寶符胞命元第一天眞炁通元寶符亦曰八生自然靈飛寶符胎命元第二天眞炁通生寶符亦曰玉眞虛生混成靈符魂命元第三天眞炁通陽寶符亦曰三炁龍玉虛化生自然符魄命元第四天眞炁通陰寶符亦曰道真空玄九微素光符臟腑命元第五天眞炁通神寶符亦曰九虛玄生飛靈元精符靈府命元第六天眞炁通仙寶符亦曰王寶洞微左契理命保眞符元府命元第七天眞炁通靈寶符亦曰虛明左契神化通神符華府命元第八天眞炁通眞靈符亦曰空玄上元三炁化生自然符嶽府命元第九天眞炁長生通玄寶符亦曰九炁生身三景清微飛生符上清石景水母王精符玉清鍊身符玉清金液鍊形符靈寶登眞度命出離生死靈符元光金眞召六甲六丁金童符符下書本旬童子姓名靈華紫光召六甲六丁玉女符符下書本旬玉女姓名三簡靈符山簡符水簡符土簡符印文靈寳諸符籙世本極多訛舛今將所授秘文參以太上玉章三洞符訣稽考訂證稍合至理修行之士先須習熟呪訣詳翫符形庶幾書篆符合施用感
