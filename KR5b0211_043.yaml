front:
  text: 無上黃籙大齋立成儀卷之四十三駒三
  hash: sha256:25340d8c9e5566e8ffc951942defa00fdf0e4dc33dcccb4166acdb5decc3a4ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_043-001a, image: hfl/0287/0287-074.png}
body:
  text: 太上執法仙士蔣叔輿編集符命門五帝玉司符東方上元玄靈自然八道度仙符南方下元天靈自然八微玉真符西方中元皇靈九玄化生八氣紫金符北方元皇靈都虛微八道金真玉符中央三元靈微八王黃書真符靈寶火錬成仙符太乙元君錬身符飛靈合氣召六甲六丁大將軍符符下本將軍姓諱黃氣陽精洞明丹陽錬度靈符飛元聚靈召神諸使者符九使者符同此各書姓名於其下依訣用之王清九陽真氣符一陽混溟𤥭瑝之氣二陽泛華紫微之氣三陽天婁鳳車之氣四陽中女辟邪之氣五陽太皇微延之氣六陽化真白灝之氣七陽絳實子光之氣八陽天真命仙之氣九陽太皇寂玄之氣靈寶九天生神寶符胞命元第一天真氣通元寶符亦曰八生自然靈飛寶符胎命元第二天真氣通生寶符亦曰王真盧生混成靈符魂命元第三天真氣通陽寶符亦曰三氣龍玉虛化主自然符魄命元第四天真氣通隂寶符亦曰道真空玄九微素光符臟腑命元第五天真氣通神寶符亦曰九虛玄生飛靈無精符靈府命元第六天真氣通仙寶符亦曰王寶洞微左契理命保真符元府命元第七天真氣通靈寶符亦曰虛明左契神化通神符華府命元第八天真氣通真靈符亦曰空玄上元二氣化生自然符嶽府命元第九天真氣長生通玄寶符亦曰九氣生符三景清微飛生符上清石景水母王精符玉清錬身符玉清金液錬形符靈寶登真度命出離生死靈符元光金真召六甲六丁金童符符下書本童子姓名靈華紫光召六甲六丁玉女符符下書本玉女姓名三簡靈符山簡符水簡符土簡符印文靈寶大三氣飛法司印玄玉章通章印三天太上之印上清九老仙都之印元始一氣混沌太極之印青玄左府太一救苦骸起死之印太章大明玉主之印神虎雌印神虎雄印北極驅都天大邪院印法主印神霄玉南昌上宫文寶印受錬司印靈寶諸符籙世本極多訛舛今將所授祕文參以太上玉章三洞符訣稽考訂證稍合至理修行之士先須習熟呪訣詳玩符形庶幾書篆符合施用感通無上黃籙大齋立成儀卷之四十三
