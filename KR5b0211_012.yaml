front:
  text: 无上黃籙大齋主成儀卷之十二在二
  hash: sha256:a1b27a0130094bc73e09b98866075dbc316d51c14247a733c01929411bd54abe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_012-001a, image: hfl/0280/0280-028.png}
body:
  text: 三洞法師冲靖先生留用光傅授太上執法仙士將叔興編次䟽牘門開經䟽大明國某布政使司某府州縣居具位臣姓某普薦門云某人等後並同謹罄丹誠上干洪造臣伏爲入齋意至隳用物儀具狀投上清三洞法師某君門下乞請道士一壇就某處建立靈壇關行齋法再入齋意正薦自印仗道慈起普薦自所資功徳起並丕福住見存蒙於某月某日預告先颺寳播上聞齋意取某月某日開啓齋壇如未有定日則云㝷別擇日開啓濟壇恭按玄科宣揚祕範正齋行道三日九朝請謝十方告盟三界滿散修設謝恩清醮三百六十分位仰祈霈澤普祐沉淪所有回獻三界聖眞十方仙宰醮筵内外一切威靈并資悼亡魂普薦幽爽太上諸部眞經天尊睿號謹預於某日爲始開函看誦今先具品目敷奏如後一請道士青轉太上洞玄靈寳无量度人上品妙經幾卷太上洞玄靈寳昇玄消災護命妙經幾卷已上並用普伸回奉奏獻上三界十方聖眞仙衆醮筵主宰侍衞威靈一請道士看轉太上靈寳天尊說救苦妙經幾卷巳上並用回奉上獻係醮𡨋官主宰一切威靈一請道士看轉如别看經禮則逐一别項填入太上洞玄靈寳无量度人上品妙經幾卷太上洞玄靈寳九天自然生神章經幾卷太上靈寳九眞妙戒金籙九幽拔罪妙經幾卷太上靈寳天尊說救苦妙經幾卷元始天尊說生天得道經幾卷元始靈書中篇幾卷玉皇大天尊玄穹髙上帝寳號幾聲太乙救苦天尊睿號幾聲九幽拔罪天尊睿號幾聲十方洞靈睿號幾聲已上功徳並用資薦亡故某乙超生仙界普薦云在會係薦一切魂儀各超仙界一請道士看轉太上洞玄靈寳无量度人上品妙經幾春太上洞玄靈寳九天自然生神章經幾卷太上洞玄靈寳天尊說救苦妙經幾卷元始天尊說生天得道眞經幾卷元始靈書中篇幾遍某經某號函一子納開奀巳上功德並用資薦門巾逺化各超仙界或有附薦名位依此函一開列一請道士看誦太上洞玄靈寳无量度人上品妙經幾卷太上洞玄靈寳九天自然生神章經幾卷太上洞玄靈寳九真妙戒九幽抜罪妙經幾卷太上洞玄靈寳天尊說救苦妙經幾卷元始天尊說生天得道眞經幾卷元始靈書中篇幾遍玉皇大天尊玄穹髙上帝寳號幾聲太乙救苦天尊睿號幾聲九幽拔罪天尊睿號幾聲朱陵度命天尊睿號幾聲已上功德並用資薦六道四生孤魂滯魄各各離苦同遂生成右恭以玄科奥典寳藏靈文爲濟苦之津𥹭作抜亡之梯磴敢憑勝妙用薦沉迷切念亡親某乙如普薦則以㑹首所薦姓名爲首添入及在㑹係薦亡魂等渉世塵深歸魂地逺慮業緑之未盡致仙化之無期願仗眞乘滲漉之功普度苦海流吹之識將宣寳範先啓琅函仰布洞鑒之聦允納預聞之請臣無任瞻天望聖激㓛屏營之至謹具䟽上奏以聞謹䟽太歳某年月日具前官位臣姓名䟽外可漏黃關經文䟽上界聖真十方主事具官位臣姓名謹封六幕䟽五帝䟽具位姓某檢㑹先據某郷貫入齋意至未曽湔洗謹齎法信投靈寳大法司乞取某月日就某處開建无上黃籙大齋三書夜滿散修設謝恩清醮三百六十分位爾人齋意至臣福佑見存據詞難抑除巳謄詞帝闕請命師尊奏告十天關盟三界見今壇儀肅備法席嚴陳謹率同齋道士恭取今宵開建靈壇分光破暗列陳鎮信敷露眞文翌日清旦正齋爲始三日九朝宣揚科範遷抜幽苦懴悔罪愆仰冀恩光俯垂證度須至奏聞者右伏以道尊五老本一炁以司生德冠三才植萬靈而兼綂爲人天之信仰作生死之依憑將啓齋修敢忘祈叩恭惟五方五靈五老五帝天君御前化育羣品開張萬眞務紀録於善功毎鑒觀於齋事伏願天慈廣被聖澤遐覃放五色之光明救重隂之苦爽齋功克就生名永紀於丹臺懴謝必聞罪録盡銷於黑簿仰頼甄陶之賜庶成䕶度之功福被邦家恩霑幽顯臣下情無任惶懼激切屏營之至謹具䟽上奏以聞謹䟽太歳某年月日具位臣姓名䟽可漏五方五靈五老五帝天君聖前具位臣姓名䟽奏謹封方函䟽一函上詣五老上帝具位臣姓名謹重封三官䟽具位臣姓某檢㑹先據同五帝䟽内改稱臣處稱名奏聞者右伏以方圓奠位資玄範以開張品物流形頼神功之主宰凡歸校録悉仰生成恭惟上元賜福天官紫微大帝中元赦罪地官清虛大帝下元解厄水官洞隂大帝聖前位綂三元掌天地人神之録籍司分九府總死生善惡之樞機苟露懇祈悉䝉昭格伏願眞慈惻憫聖造矜容削罪福於水火考對之曹㧞死魂於泉酆幽隂之境圓成齋事紀録善功資福存亡覃恩家國某下情無任惶懼激切之至謹具䟽申聞謹䟽太歳某年月日具位臣姓名䟽可漏三元天地水三官大帝聖前具位臣姓名謹封方函踈一函上詣三官大帝聖前具位臣姓名謹重封玄師䟽具位姓某檢㑹先據同三官䟽右伏以道分三洞肇萬法之元綱教聞重玄作十方之師寳凡伸修奉悉荷證盟輙披露於懇誠冀俯回於靈聽恭惟玄中教主上清靈寳聖師眞君聖前道崇金闕位亞玄元散影分形證修齋於萬國垂光接物施惠利於重泉伏願聖鑒昭回眞慈覆護書愆紀過雖存紏察之司宥罪滌瑕允頼含洪之德珍消魔障成就齋功俾幽顯以霑恩普邦家而䝉福某下情無任惶懼激切之至謹具䟽申聞謹䟽可漏玄中教主上清靈寳聖師眞君聖前具位姓名謹封方函䟽一函上詣玄中教主上清靈寳聖師眞君聖前具位姓名謹重封天師具法位姓某檢㑹先據以後並同三官䟽右伏以扶教三天播慈風而濟物䟽光十界宣祕𧷤以度人肇宏正一之宗丕闡貸三之教敢伸丹禱仰叩玄聦恭惟太上輔元體道三天大聖都天大法天師正一靜應眞君聖前列位五清侍宸金闕掌玄元科法爲章醮之宗師伏願俯賜祥光下臨壇席證明齋事開度沉魂俱承拯拔之功盡脫輪廻之苦障魔殄滅詞表御聞澤普被於存亡慶均霑於家國某下情無任惶懼激切之至謹具䟽申聞謹䟽可漏太上輔元體道三天大聖都天大法天師正一靜應眞君聖前具位方函䟽一函上詣三天大法天師正一靜應眞君聖前具法位姓名謹重封三師具法位姓某檢㑹同前右伏以玄元始炁於開光於萬化之先經籍度師演教於三乗之始將期修奉敢後皈投恭惟靈寳經師眞君靈寳藉師眞君靈寳度師眞君聖前道冒重玄名標上古隨方設教弘敷齋謝之科應物流行昭示眞常之路飭黃壇而蕆事望紫闕以陳詞伏願師造鑒觀仙㳺來格提携末學錫正氣於靈關開度沉魂施祥光於法界恩流有截澤被無垠某下情無任惶懼激切之至謹具䟽申聞謹䟽可漏靈寳經籍度師眞君聖前具法位姓某謹封方函䟽函上詣靈寳經籍度師眞君聖前具法位姓某謹重封監齋具法位姓某檢㑹同前右伏以玄元闡教廣開普度之門太極垂科顯著監齋之號凡伸修奉悉仰證明恭惟靈寳監齋大法師眞君聖前弘教化初興哀劫未特流傳於齋法俾恩祐於沉淪伏願俯賜師慈特頒眞㫖下靈寳司之官屬曁黃籙院之聖眞依下元簡文靈仙品格降飛天朝衛傳奏官君紀録齋誠宣謄詞欵導迎慧澤開濟沉魂俾善果以圓成普幽明而受度恩霑見在福被邦家某下情無任惶懼激切之至謹具䟽申聞謹䟽可漏靈寳監齋大法師眞君聖前具法位姓名謹封方函䟽一函上詣靈寳監齋大法師眞君聖前具法位姓名謹重封啓壇䟽具法位臣姓某謹瀝丹誠上干洪造臣先據同五帝䟽至關盟三界恭依次第宣演眞科拜奏寳章頒行符命遷㧞罪爽開赦幽沉燒香然燈立齋行道請光破獄普施夜齋召攝亡魂沐浴錬度傳符授戒保舉超生事畢拜表言功投龍進簡祗設清醮上謝洪恩廣集善功總資昇度以今壇儀肅備同五帝䟽至奏聞君右伏以飭黃壇而蕆事恪遵夤奉之儀望紫闕以陳詞仰冀鑒觀之澤爰殫衷悃上露齋誠恭惟太上無極大道至眞元上三十六部尊經眞文寳符太上三尊十方聖衆玄中大法師御前敷落五篇開張萬範飛玄結炁自成空洞之文下元總神遂著靈仙之格保制劫運拯護幽明臣繆以師資叨傳妙訓俾依科而遵奉敢冒禁以宣行謹勵法徒虚遵品式結立盟誓共建齋功伏願三寳證明萬靈降格傾光廻駕監眞度生地水幽闇之郷仗道慈而開濟日月照臨之土霑慧力以昭融福普邦家恩覃存没臣無任瞻天望聖激切屏營之至謹具䟽上奏以聞謹䟽可漏至眞无上三十六部尊經眞文寳符太上無極大道太上三尊十方聖衆玄中大法門御前具位臣姓名䟽奏謹封方函啓壇跪奏請三天門下省請進具位姓名謹重封十方靈官䟽具法位姓某檢㑹同三官䟽至關盟三界見今壇儀肅備法席嚴陳謹率同齋道士恭取今宵開建靈壇分光破暗列陳鎭信敷露眞文翌日清旦正齋爲始宣行科範懴悔罪愆今具紙筆墨硯安鎭十方乞賜謄奏仰祈恩霈俯濟存亡須至具䟽告聞者右伏以梵炁彌羅落落九霄之境眞都𣺌莽巍巍十極之郷欲誠悃之升聞仗聖恩之垂濟恭惟十方無極世界日月星宫經寳地水十郷神仙諸靈官傳奏聖衆聖前眞常善應聖化無方毎降格於壇場爲宣通於詞欵伏願廣運慈悲之德溥施拯護之功禮謝十方遐邇俱祈於通感敷誠九奏𠎝瑕悉頼於包藏所冀情㫖上通恩光下逮淨滌有爲之業崇成無量之功庶俾幽明皆資生化某下情無任激切之至具䟽申聞謹䟽可漏十方神仙靈官傳奏聖衆聖前具位姓名䟽上謹封方函䟽上十方神仙靈官傳奏聖衆聖前具位姓名謹重封結盟共三通无上黃籙大齋結盟今奉某郷貫某處居黃籙大齋主姓某如衆㑹作黄籙大齋都㑹首某人同在㑹官僚士庶等謹備十方紋繒金龍壁鈕質信之儀請道士幾人就某州某處宫觀取某月某日宿啓齋壇修建无上黃籙大齋三晝夜滿散修設謝恩清醮三百六十分位意者上資家國下濟深沉超度先亡保安見在切以無上正法黃籙大齋和天安地保國寧家普度幽明悟人眞道謹按玄科舊典法天象地立纂舒壇信幣列於華庭詞表通於金闕肅祗如在精潔造微所以爾者全在同齋之士共契丹盟滌除玄覽夫齋者齋其心也絶視聽色身之好抑口味鼻香之貪吐氣自澄抱神以靜故我太極宗師垂留科範建齋之始先受十戒威儀罰簡憲章存念不𠎝俯仰合格焚燒黒薄昭著丹書七祖生天九幽得度有情含識無不霑恩今黄籙大齋主某人衆㑹稱某人等向我法門歸投大道奉修齋直爲國爲家開濟存亡普霑含識齎持法信乞爲關行某本乏仙材謬當遷請實懷兢愧不容避辭誓竭精誠勉力就職今與同齋之士合誓三官結盟五帝共相罄勵同建齋功儻若有違科律冒瀆天眞彈紏不悔者告下三官五帝受考風刀長扁夜壑請各簽法位作合同盟三本二本歸三官五帝一本留泰玄都省照應謹啓以盟太歳年月日時次從下列行壇道衆次列六職可漏五老上帝聖前具法位臣姓名狀奏謹封三官太帝聖前具法位姓名狀申謹封三天大法師眞君聖前具法位姓名狀申謹封方函二黄籙齋壇結盟狀奏請五老上帝聖前具法位姓名謹重封黄籙齋壇結盟狀申三官大帝府具法位姓名謹重封職狀无上黃籙大齋壇今爲某人崇建无上黄籙大齋謹集見前法衆克取今辰依科修奉擬補職事下項髙功大法師具法位姓名都講具法位姓監齋具法位姓名侍經具法位姓名侍香具法位姓名侍燈具法位姓名右具如前各宜守職謹狀年月曰具髙功法位姓名狀錬度䟽二道一䟽設斛用一䟽正度用某郷貫黄籙大齋主姓名伏爲正薦亡親某乙普薦在會衆魂崇建无上黃籙大齋三晝夜仰慿道力普濟幽沉乞按眞科宣行錬度謹備太上昇玄消災護命妙經三十六卷金錢三十六分從馬三十六騎右謹獻上錬度合㑹一切眞宰南昌上宫錬度眞仙朱陵火府錬度眞仙南陵樞府錬度眞仙水火二司錬度仙吏靈寳大法錬度仙吏靈寳仙曹官童將吏金童玉女一切吏兵諸司法院宣通召命承差將吏靈寳監察直符直事地水職司導從官吏城隍土主里域眞官靈壇翊衞應感威靈伏惟聖慈俯賜昭鑒謹䟽年月日具位姓名䟽可漏黄簽真錢馬䟽獻錬度合㑹真宰一切威靈具位姓名謹封斛䟽郷貫黄籙大齋主具官姓某今爲正薦亡親某乙普薦在會衆魂開建无上黃籙大齋取某日夜普設無礙夜齋斛食看誦太上眞經睿號焚化經旛𡨋財廣集善因總資超度開列品目如後一請道士看誦如别看經禮懴遂項添入太上洞玄靈寳无量度人上品妙經幾卷太上洞玄靈寳九天自然生神章經幾卷太上洞玄靈寳九眞妙戒拔罪妙經幾卷太上靈寶天尊說救苦妙經幾卷元始天尊說生天得道眞經幾卷元始靈書中篇幾卷一稱念玉皇大天尊玄穹髙上帝寳號幾聲太乙救苦天尊睿號幾聲九幽拔罪天尊睿號幾聲朱陵度命天尊睿號幾聲十方洞靈睿號幾聲一焚化某經無量數某旛無量數𡨋衣無量數𡨋綵無量數駝馬無量數巳上並用普薦六道四生孤魂滯魄各離苦趣同證逍遥右伏以清都演教普垂開度之科碧落傳經廣示弘慈之化前件功德普用薦資伏願眞性常明克淨多生之垢幽塗罷對遂停五道之輪徑登快樂之郷永斷淪胥之苦仰惟大道俯賜證明謹䟽年月日具位姓名䟽可漏功德䟽普薦六道四生孤魂滯魄一切衆靈具位姓名謹封薦亡䟽某親具位姓名今爲亡親某官今月某日届當某辰普薦云今爲貨薦亡親某官謹備鎮信物儀具狀投靈寳大法司乞請道士一壇就某處宫觀取某月某日開建无上黄籙大齋三晝夜滿散修設謝恩清醮三百六十分位仰慿道力開度生方所有看誦眞經睿號焚化經旛𡨋財等謹具列品目如後一請道士看誦某經幾卷某懴幾卷某號幾聲一焚化某經旛幾卷錢財幾分從馬幾疋已上並用追薦某故某官尊靈超生仙界右伏以龍章玉字鳳檢瓊文䆁萬罪於寒庭濟羣生於福境是辰功德總用薦資伏願魂度朱陵名列南宫之籍神昇碧落罪銷北府之書自在逍遥長生快樂恭惟大道俯賜證明謹䟽年月曰某親具位姓名䟽可漏功德䟽資薦亡覩某官尊靈某親具位姓名謹封薦家廟三代宗親䟽文式同前疏三代宗親之外更入本宗先逺内外姻親一位庶功德尤普右伏以紫闕髙尊演瓊科而流惠澤玄都上聖宣寳範以濟寒𡨋用集眞功普伸資薦伏願苦根散釋善果増崇身超流火之庭字録瑩金之簡福垂後裔慶被家門恭望道慈俯垂昭鑒謹䟽年月日䟽可漏功德䟽資薦三代逺化宗親諸位尊靈薦亡人四負𡨚家債主䟽文具齋主位姓某今爲同前䟽經懴𡨋財隨多寡開列巳上並用普薦亡靈三世負財負命負恩負德𡨚家債主之衆同獲離苦各遂超生右伏以金科祕典玉字寳音開業障於迷津釋𡨚憎於昧境前件功德並用薦資伏願業累蠲消𡨚愆解釋永斷仇讎之念各生和㑹之心同仗眞功俱登福境恭惟大道俯賜證明謹䟽可漏功德䟽薦具位姓某䟽封功德都䟽某郷貫居具官臣姓名謹瀝丹誠上干洪造臣伏爲入齋意至醮用㧅儀具狀投靈寳大法司乞請道士一壇就某處建立靈壇取某日爲始崇修无上黄籙大齋三晝夜九時行道預依次第宣演眞科建立華旛遷拔罪爽持誦太上眞經睿號拜奏天官濟度諸章立纂舒壇謄詞效欵列陳鎮信敷露眞文然燈續明請光破獄告行符命開赦九幽召攝魂儀沐浴錬度普施九泉六道清淨無礙夜齋受戒傳符給籙破劵依科昇度保舉超生滿散拜表言功投龍進簡取某日夜祗設清醮三百六十分位上謝洪恩供養酒果香花化貢車輦錢馬修奉普巳周圓意者仰仗道慈普超逝爽上資家國下祐見存謹具録囬奉奏獻并資薦應干眞經睿號開具品目敷奏于後一請道士某人看誦某經並逐項一一眞列依開經䟽開之右伏以玉檢靈篇道演超凌之化瓊䑓祕範功宣開度之儀仰仗眞游俯濟寒苦伏念臣亡故某乙及三代宗親等粤從遷謝罔測昇沉渉世塵深孰悟愛河之飄浪生仙路邈難逃業道之輪廻式建殊勲用資𡨋福冀假三洞眞筌之力普開九幽長夜之魂伏願昭錫恩光遷昇逝爽寒庭無間悉登快樂之郷法界有情俱入逍遥之徑臣無任祈天望聖激切屏營之至謹具䟽上奏以聞謹䟽歳次某年月日具齋官位臣姓名䟽貼黃奏爲滿散元上黄籙大齋薦亡魂某在會衆魂乞超生界進奏修奉功德品目事倚黃乞降付天功行下三界十方照應可漏正西貼黄荟與䟽後貼黄同具齋官位臣姓某䟽奏謹封方函功德䟽一函上詣三天門下諸具髙功位姓某謹重封進䟽繳狀功德䟽入函發去靈寳大法司本司今月某日伏爲修齋弟子某人正蔍云親某乙普薦在會衆魂崇建无上黃籙大齋三晝夜用資超度滿散祇設清醮三百六十分位仰謝洪恩所有弟子某進奉功德都䟽一通巳恭對太上御前宣奏訖今謹繳進前去須至申聞者右謹具狀申三天門下省伏乞逕爲通進請降敕命付天曹紀功行下三界十方照應施行謹具申聞伏候昭報謹狀歳次某年月日具髙功法位姓某狀无上黃籙大齋立成儀巷之十二
