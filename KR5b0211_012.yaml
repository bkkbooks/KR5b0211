body:
  text: 三洞法師冲靖先生留用光傅授太上執法仙士將叔興編次疏牘門開經疏大明國某布政使司某府州縣居具位臣姓某普薦門云某人等後並同謹罄丹誠上干洪造臣伏為入齊意至隳用物儀具狀投上清三洞法師某君門下乞請道士一壇就某處建立靈壇關行齊法再入齊意正薦自印仗道慈起普薦自所資功德起並丕福住見存蒙於某月某日預告先揚寶播上聞齊意取某月某日開啓齊壇如未有定日則云尋別擇日開啓濟壇恭按玄科宣揚祕範正齊行道三日九朝請謝十方告盟三界滿散修設謝恩清醮三百六十分位仰祈霈澤普祐沉淪所有回獻三界聖真十方仙宰醮筵內外一切威靈并資悼亡魂普薦幽爽太上諸部真經天尊睿號謹預於某日為始開函看誦今先具品目敷奏如後一請道士青轉太上洞玄靈寶無量度人上品妙經幾卷太上洞玄靈寶升玄消災護命妙經幾卷已上並用普伸回奉奏獻上三界十方聖真仙衆醮筵主宰侍衛威靈一請道士看轉太上靈寶天尊說救苦妙經幾卷巳上並用回奉上獻係醮𡨋官主宰一切威靈一請道士看轉如别看經禮則逐一别項填入太上洞玄靈寶無量度人上品妙經幾卷太上洞玄靈寶九天自然生神章經幾卷太上靈寶九真妙戒金籙九幽拔罪妙經幾卷太上靈寶天尊說救苦妙經幾卷元始天尊說生天得道經幾卷元始靈書中篇幾卷玉皇大天尊玄穹髙上帝寶號幾聲太乙救苦天尊睿號幾聲九幽拔罪天尊睿號幾聲十方洞靈睿號幾聲已上功德並用資薦亡故某乙超生仙界普薦云在會係薦一切魂儀各超仙界一請道士看轉太上洞玄靈寶無量度人上品妙經幾春太上洞玄靈寶九天自然生神章經幾卷太上洞玄靈寶天尊說救苦妙經幾卷元始天尊說生天得道真經幾卷元始靈書中篇幾遍某經某號函一子納開奀巳上功德並用資薦門巾逺化各超仙界或有附薦名位依此函一開列一請道士看誦太上洞玄靈寶無量度人上品妙經幾卷太上洞玄靈寶九天自然生神章經幾卷太上洞玄靈寶九真妙戒九幽拔罪妙經幾卷太上洞玄靈寶天尊說救苦妙經幾卷元始天尊說生天得道真經幾卷元始靈書中篇幾遍玉皇大天尊玄穹髙上帝寶號幾聲太乙救苦天尊睿號幾聲九幽拔罪天尊睿號幾聲朱陵度命天尊睿號幾聲已上功德並用資薦六道四生孤魂滯魄各各離苦同遂生成右恭以玄科奧典寶藏靈文為濟苦之津𥹭作拔亡之梯磴敢憑勝妙用薦沉迷切念亡親某乙如普薦則以㑹首所薦姓名為首添入及在㑹係薦亡魂等涉世塵深歸魂地逺慮業緑之未盡致仙化之無期願仗真乘滲漉之功普度苦海流吹之識將宣寶範先啓琅函仰布洞鑒之聰允納預聞之請臣無任瞻天望聖激㓛屏營之至謹具疏上奏以聞謹疏太歲某年月日具前官位臣姓名疏外可漏黃關經文疏上界聖真十方主事具官位臣姓名謹封六幕疏五帝疏具位姓某檢㑹先據某鄉貫入齊意至未曽湔洗謹齎法信投靈寶大法司乞取某月日就某處開建無上黃籙大齊三書夜滿散修設謝恩清醮三百六十分位爾人齊意至臣福佑見存據詞難抑除巳謄詞帝闕請命師尊奏告十天關盟三界見今壇儀肅備法席嚴陳謹率同齊道士恭取今宵開建靈壇分光破暗列陳鎮信敷露真文翌日清旦正齊為始三日九朝宣揚科範遷拔幽苦懴悔罪愆仰冀恩光俯垂證度須至奏聞者右伏以道尊五老本一氣以司生德冠三才植萬靈而兼統為人天之信仰作生死之依憑將啓齊修敢忘祈叩恭惟五方五靈五老五帝天君御前化育羣品開張萬真務紀録於善功每鑒觀於齊事伏願天慈廣被聖澤遐覃放五色之光明救重隂之苦爽齊功克就生名永紀於丹臺懴謝必聞罪録盡銷於黑簿仰賴甄陶之賜庶成護度之功福被邦家恩霑幽顯臣下情無任惶懼激切屏營之至謹具疏上奏以聞謹疏太歲某年月日具位臣姓名疏可漏五方五靈五老五帝天君聖前具位臣姓名疏奏謹封方函疏一函上詣五老上帝具位臣姓名謹重封三官疏具位臣姓某檢㑹先據同五帝疏內改稱臣處稱名奏聞者右伏以方圓奠位資玄範以開張品物流形賴神功之主宰凡歸校録悉仰生成恭惟上元賜福天官紫微大帝中元赦罪地官清虛大帝下元解厄水官洞隂大帝聖前位統三元掌天地人神之録籍司分九府總死生善惡之樞機苟露懇祈悉䝉昭格伏願真慈惻憫聖造矜容削罪福於水火考對之曹拔死魂於泉酆幽隂之境圓成齊事紀録善功資福存亡覃恩家國某下情無任惶懼激切之至謹具疏申聞謹疏太歲某年月日具位臣姓名疏可漏三元天地水三官大帝聖前具位臣姓名謹封方函踈一函上詣三官大帝聖前具位臣姓名謹重封玄師疏具位姓某檢㑹先據同三官疏右伏以道分三洞肇萬法之元綱教聞重玄作十方之師寶凡伸修奉悉荷證盟輒披露於懇誠冀俯回於靈聽恭惟玄中教主上清靈寶聖師真君聖前道崇金闕位亞玄元散影分形證修齊於萬國垂光接物施惠利於重泉伏願聖鑒昭回真慈覆護書愆紀過雖存紏察之司宥罪滌瑕允賴含洪之德珍消魔障成就齊功俾幽顯以霑恩普邦家而䝉福某下情無任惶懼激切之至謹具疏申聞謹疏可漏玄中教主上清靈寶聖師真君聖前具位姓名謹封方函疏一函上詣玄中教主上清靈寶聖師真君聖前具位姓名謹重封天師具法位姓某檢㑹先據以後並同三官疏右伏以扶教三天播慈風而濟物疏光十界宣祕𧷤以度人肇宏正一之宗丕闡貸三之教敢伸丹禱仰叩玄聰恭惟太上輔元體道三天大聖都天大法天師正一靜應真君聖前列位五清侍宸金闕掌玄元科法為章醮之宗師伏願俯賜祥光下臨壇席證明齊事開度沉魂俱承拯拔之功盡脫輪回之苦障魔殄滅