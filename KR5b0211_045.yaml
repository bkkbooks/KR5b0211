body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編集符告門五方真文太上靈寶東方八天自然玉字青帝九氣天文真文六十四字見符命門出五鍊生尸經維某某歲次某甲子某月某朔某日甲子具官某乙伏為正普薦某乙衆魂謹賫法信詣靈寶大法司乞請道士一壇就某處於今月某日啓建無上黃籙大齋三晝夜滿散修設謝恩清醮三百六十分位謹以本方鎮信請法施行東方八天自然玉字安鎮齋壇明露天地拔贖罪苦開度超生一如青帝太玄女青符命餘四方真文後文並同東方隨方改換中間語內中央真文作中央大羅之天大上靈寶南方八天自然玉字赤帝三氣天文真文六十四字太上靈寶西方八天自然玉字白帝七氣天文真文六十四字太上靈寶北方八天自然玉字黑帝五氣真文真文六十四字太上靈寶中央大羅之天自然玉字黃帝一氣天文真文一十六字右五方真文並用青紙朱書四保舉狀歷關諸天此一狀用青紙朱書泰玄都省謹奉道旨為某鄉貫某官修建無上黃籙大齋三晝夜升度亡過某乙等靈魂超升丹界謹按靈寶本科合行保舉者右歷關諸天請滅亡過某乙等三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門一如告命風火驛傳歲次某甲子某年某月某日某時告下其法位臣姓某奉行三天扶教都天大法天師普告三界泰玄都省謹奉道旨同前文右普告三界無極鄉泉曲之府北都羅酆三官九署十二河源上解亡過某乙等祖考億劫種親疾除罪簿落滅惡根不得拘留通合鬼羣一如誥命風火驛傳歲年月日告下具法位臣姓某奉行三天扶教都天大法天師敕制地祇泰玄都省謹奉道旨同前文右敕制地祇侍衛送迎亡過某乙等拔出地户五苦八難七祖升遷永離鬼官魂度朱陵受鍊更生是謂無量普度無窮一如告命風火驛傳歲年月日告下具法位臣姓某奉行三天扶教都天大法天師元始符命泰玄都省謹奉道旨同前文右元始符命時刻升遷北都寒池部衛亡過某乙等形魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年氷度三塗五苦八難超淩三界逍遙上清一如告命風火驛傳歲年月日時告下具法位臣姓某奉行三天扶教都天大天師右三狀以黃紙墨書並髙一尺二寸連前狀同用黃紙作一封可漏四𥿄共作一封升天保舉文狀具法位姓某謹封可漏背面升天亡故某乙等魂升天左右劵左劵告文靈寶升天左劵告下三界天門守衛諸神具法位臣姓某奉行歲年月日時告下道境魂神受度更生自然一如告命風火驛傳度亡過某乙上登元始靈書玉清中篇太上撰次降自三天升劵文見符命門背書三皇內文六十八字元始靈書玉清中篇太上撰次降自三天升度亡過某乙上登道境魂神受度更生自然一如告命風火驛傳太歲某年某月朔日時告下具法位臣姓某奉行靈寶升天右劵告下三界天門守衛諸神右劵告文靈寶升天右劵告下三界天門守衛諸神具法位臣姓某奉行太歲某年某月朔日時告下道境一如告命風火驛傳人亡過某乙承兹功德上登上清無量之奧深不可詳敷落神真普度天大魔天中之靈九和十合變化音隱韻天中空洞自然靈章天中之尊天中無色之景天帝玉真梵行帝諱三界天名隱劵文見符命門背書三皇內文六十八字無色之景天帝玉真梵行帝諱三界天名隱音隱韻天中空洞自然靈章天中之尊天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人亡過某乙承兹功德上登道境一如告命風火驛傳太歲某年某月朔日時告下具法位臣姓某奉行靈寶升天右劵告下三界天門守衛諸神右二劵並青素丹書髙九寸或一尺長一尺六寸或一尺八寸為則度魂夜告訖正中截斷右一半函付天門吏左一半付亡人收執結幡腳上發真劵可漏以黃紙三寸要寸具法位姓名謹封方函靈寶升天合同真劵告下具法位姓某謹封三界天門守衛諸神發劵牒無上黃籙大齋壇牒上三界天門守衛諸神本壇今月某日為某處某人崇建無上黃籙大齋以某日夜升度亡過某乙等魂超升丹界謹按靈寶大法破升天左右契劵除將一分付亡過某乙收執外一分入方函封印全牒上三界天門守衛諸神請行照會須至專牒者牒前件劵文隨牒見到請照會交管伺候已受亡故某乙等賫執劵文到來即與驗認合同應時超度魔王監舉無拘天門牒準靈寶大法科令奉行謹牒歲年月日牒發劵關子無上黃籙大齋壇本壇今為齋主某開建無上黃籙大齋追薦亡親某乙等除已依科開度外今告行靈寶升天大劵文升度亡過某乙等魂上登道境所有合同劵文一函須至關發前去者右關某日當直功曹使者請疾速賫管前去徑諸三界天門守衛諸神告下候亡過某乙執券到日依科放入天門受生施行歲年月日時關九天寶誥告文中元金書九天寶誥寶誥三十二字見符命門分四行書上帝符命宣告三官天牢地獄主司大神超度亡故某乙咸領符命部衛形魂祗受寶誥上朝帝庭罪仇和釋與道合并神登玉闕受鍊長存一如告命風火驛傳太歲某年月日時告下具法位臣姓某承誥奉行天師三天扶教輔元大法天師正一靜應真君聖師東極宫中大慈仁者尋聲赴感太乙救苦天尊祖師萬劫應化真元教主太平金闕前聖虛皇大道君右寶誥丹書黃上告文墨書紙素皆可用綾錦之屬裝背如今世告敕樣度魂夜宣訖給付亡靈洞玄靈寶長生度命黃籙太上洞玄靈寶長生度命黃籙惟太歲某甲子某年某月某朔某日某中子鄉貫某人伏為亡親某同青詞語至上謝天恩仍就黃籙齋壇乞傳授太上洞玄靈寶長生度命無上黃籙一階付某乙靈魂賫執過度三界超升九天謹按經云元始天尊昔在九清妙境三元宫中與諸大