更相拘礙出生入死憂難遐長神爽沉淪終天無解今故燒香皈命太上無極至真三十六部尊經寶符玉章玉童玉女乞丐原赦生死所犯功德拔度九祖罪魂得離三塗五苦之中刀山劒樹長河寒庭身出幽夜得入光明上升天堂衣食自然某身得道真和與經合同右二十方懴文自東方至水官十九方並出黃籙簡文經經中謝三寶神經懴文即大謝懴文是也經科無大謝故陸天師三元齊懴二十方畢即便復爐其以懴謝經寶之文為大謝蓋自陸天師因太極敷齊誠威儀經撰靈寶道士自修盟真齊立成儀始自後相沿用之所不可廢經寶懴文今以張清都儀修入自今故燒香皈命以後又是黃籙簡文經本文留冲靖所傳李景祈科止用靈寶自然齊十方大仰謝文出真文要解經今刪去易以黃籙簡文經二十方懴文據本科每禮一方叩頭摶頰各如其方之數謂如東方九十上方三百二十日宫三十月宫七十水宫百二十之類今建大齊儀軌不一精力有限未易行也盟真玉匱女青上宫拔度科品蓋謂長夜九幽之府中有玉匱祕藏盟真拔度之科品耳翟公巽撰黃籙醮儀乃云標名垂訓首曰玉匱盟真謂其盟普上真乃當修設緘縢玉匱斯謂祕嚴是不曽見靈寶玉匱盟真科經失其㫖矣建齊升壇或值風雨及緊急變異大暑極寒迅雷暴雨烈風晦暝及非常之事三上香畢衆官於本位端立用此十方五嶽三光都懴文水官經寶依元科非有他故切不可用此務從簡略冒犯科禁十方依本儀隨方禮訖却𦃞懴謝尤為妙善臣衆等至心皈命十方無極太上靈寶天尊十極天君十鄉神仙諸靈官各䖍誠懴悔跪懴臣等今故燒香皈身皈神皈命謹為黃籙大齊主某仰慮亡靈某及九祖父母一切死魂生世之日所行元惡罪結九幽長夜之府魂充考撻諸痛備嬰形體毀瘁苦痛難任長淪萬劫終天無解今依盟真玉匱女青上官拔度科品齊十方絞繒一百三十六尺金龍十枚皈命十方無極太上靈寶天尊十極天君十鄉神仙諸靈官拔贖亡故某及齊主某家九祖父母一切死魂惡對罪根三界司算女青上宫削除罪録開度窮魂身入光明上升天堂衣食自然早得更生福慶之門某身得道真和與神合同三光臣衆等至心皈命日月星宫至真大聖三光神仙諸靈官各䖍誠懴悔跪懴臣等皈身皈神皈命謹為黃籙大齊主某仰慮亡靈某及九祖父母一切死魂逮及某身受生所行罪結難稱死魂殃對流曵長夜九幽之中魂充考撻諸痛備嬰長淪萬劫終天無解今故燒香皈命日月星宫至真大聖三光神仙諸靈官乞丐原赦所行罪負上觸天光生死殃對拔度亡故某及齊主某九祖父母囚徒死魂開出光明上升天堂衣食自然某身得道真和與神合同五嶽臣衆等至心皈命五嶽五帝真君飛仙真人名山洞府得道神仙諸靈官各度誠懴悔跪懴臣等皈身皈神皈命謹為黃籙大齊主某仰慮亡靈某及九祖父母一切死魂生存所行元惡醜逆觸犯五嶽神仙諸靈官罪結九幽謫役五嶽地獄之中魂充考撻諸痛備嬰長淪萬劫終天無解今故燒香皈命五嶽五帝真君飛仙真人名山洞府得道神仙諸靈官乞丐原赦所行罪負上觸五嶽元惡之罪放赦囚徒身出光明上升天堂衣食自然某身得道真和與神合同水官依元科經寶依元科次都講唱各思九色圓象咽液命魔出玉經隱注次都講唱密呪出五符人鳥經先叩齒三通咽液三過心存日月在已面上從鼻孔入洞房金華宫一兩眉間却入辟方一寸曰明堂宫二寸曰洞房宫三寸曰丹田宫明堂之北洞房之南向上辟方一寸曰金華宫光明出項後煥然作九色圓象薄入玉枕徹照十方隨我繞經而行矣日從鼻左孔入月從鼻右孔入又叩齒三通咽液三過密呪曰杜廣成先生曰此密呪不得今耳聞達之有咎責謹之謹之黃中策氣斬邪宗密制强精斷邪翁太上有命太上房急召北帝詣玉宮受承威令宣魔王五氣蓊鬱與命衝祕藏玉文方就隆三天運明六天運終賢者哉次都講唱步虛旋繞次吟太上玉京山步虛之章十首終篇各唱善一禮出靈寶步虛經稽首禮太上燒香皈虛無流明隨我回法輪亦三周玄願四大興靈慶及王侯七祖生天堂煌煌耀景敷嘯歌觀太漠天樂適我娛齊馨無上德下仙不與儔妙想朗玄覺詵詵巡虛遊旋行躡雲綱乘虛步玄紀吟咏帝一尊百關自調理俯命八海童仰携髙仙子諸天散香花蕭然靈風起宿願定命根故致標髙擬歡樂太上前萬劫猷未始嵯峨玄都山十方宗皇一岧岧天寶臺光明爓流日煒燁玉林華蒨燦耀朱實常念餐元精錬液固形質金光散紫微窈窕大乘逸俯仰存太上華景秀丹田左顧提鬱儀右盻携結璘六度冠梵行道德隨日新宿命積福應聞經若至親天挺超世才樂誦希微篇冲虛太和氣吐納流霞津胎息靜百關寥寥究三便泥丸洞明景遂成金華仙魔王敬受事故能朝諸天皆從齊戒起纍功結宿緣飛行淩太虛提携髙上人控轡適十方旋憩玄景阿仰觀劫仞臺俯盻紫雲羅逍遙太上京相與坐蓮花積學為真人恬然榮衛和永享無期夀萬奚足多大道思玄寂升仙友無英公子度靈符太一捧洞章舍利耀金姿龍駕斂來迎天尊眄雲輿飄飄乘虛翔香花若飛雪紛靄茂玄梁頭腦禮金闕携手遨玉京騫樹圓景園煥爛七寶林天獸三百名獅子巨萬尋飛龍躑躅鳴神鳳應節吟靈風扇竒花清香散人襟自無髙仙才馬能耽此心嚴我九龍駕乘虛以逍遙八天如指掌六合何足遼衆仙誦洞玄太上唱清謡香花隨風散玉音成紫霄五苦一時迸八難順經寥妙哉靈寶囿興此大法橋天真帝一宫藹藹冠曜靈流煥法輪綱旋空入無形虛皇撫雲璈衆真誦洞經髙仙凛乎讃彌劫保利貞至真無所待時或轡飛龍長齊會玄都鳴玉扣瓊鍾十華諸仙集紫烟結成宫寶蓋羅太上真人把芙蓉散花陳我願握節徵魔王法鼓㑹群仙靈唱靡不同無可無不可思與希微通次都講唱臣衆等至心皈命太上三尊十方衆聖禮經如法次吟三啓頌三首終篇各唱善一拜見宿啓建壇儀次都講唱三禮至心稽首禮太上無極大道一拜至心稽首禮至真無上三十六部尊經真文寶符一拜至心稽首禮太上三尊十方衆聖玄中大法師一拜次都講唱重稱法位次髙功大謝並長跪具法位臣等謹重上啓太上無極大道元始天尊太上大道君太上老君無上玄老十方無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師天師君上相上宰四司五帝三界官屬一切真靈臣等忝以凡微獲參上法功無過積丘山誠宜束骸甘俟𡨋罰徒以受道日結誓三官敷讃玄風拯護幽顯普令一切咸入法門今齊主某仰慮亡靈某及九祖父母一切窮魂夙世今生積成罪垢業緣報對神爽沉淪非假齊功無由懴拔齎持法信證質丹誠乞度先亡得免憂苦使長夜之魂覩太陽之光孤爽還胎朽骸更肉普天率土皆沐道恩臣等職任所司敢不謄奏是用謹依下元黃籙簡文靈仙科品奉為某修建無上黃籙大齊三日三夜九時行道轉經禮懴燒香然燈普為存亡拔贖罪苦一心皈命太上大道至真衆尊特乞回大慈之澤下罔極之恩赦除亡靈某及齊主家億曽萬祖長夜死魂逮今巳身家門大小天下人民一切衆生生死所行重惡罪過或賊害君父不孝二親背師欺友廢真就僞或反上逆下殺害無辜罣誤生靈攻伐家國或傷𢦤物命陷害忠良奪人所崇離人骨肉或姦邪淫泆門族交通嫉賢妬能不欲勝已或評論道德焚竊經書穢觸三光輕慢四大或為上無道為下不忠輕侮孤窮酷虐百姓或怨怒天地訾毀正真罵詈鬼神呵忿風雨或不崇有道不敬老人助人為非𥬇人作善或心非口是形影自欺日纍月深罪障因積如齊主家别有隱惡欲懴師為撰文於此入從劫至劫捨身受身五欲十纏六情三業違天背地負誓愆盟宿對苦根纍世結固相牽流曵墮落惡源訟違存亡轉輪不絶魂充考責身謝風刀槍閉幽關備受諸苦乞今燒香行道懴謝玄真如上罪條隨事散釋仰賴天尊上聖十極天君領納弟子某金龍紋繒拔度之信即敕飛天神王齎九龍符命告下九幽酆都岱宗河源泉曲三官九署百二十曹隂陽水火考官掾吏明承符命解釋幽魂開赦亡靈某及齊主家祖玄靈識出離長夜覩見光明落滅惡根削除罪簿斷地簡對絶水盟言遷品朱陵練神丹霍應度者度應生者生若在福處增本功德暨于四生五道六趣三塗普離凡塵咸獲升化陽官拘繫罪謫囚徒仗此齊功悉䝉清脫齊契正真之果俱登快樂之鄉上願三景著明二儀交泰帝圖鞏固禾稼滋豐水火旱蝗兵戈賊疫無侵境域各保安寧齊主某眷屬親緣常承玄祐千災殄息萬善資薰所啓所祈克蒙御達所首所謝皆獲感通上明天尊大慈之澤下副臣等懴謝之誠謹啓陸天師盟真齊儀大謝懴文即經中謝經寶之文蓋祖太極敷齊威儀經耳張清都黃籙儀大謝乃自出機軸為之而詞意頗繁復故李景祈所傳乃是採取陸天師盟真儀大謝為黃籙齊大謝文其間引用張清都儀不過數語蓋陸天師而未嘗撰黃籙齊儀也經科懴罪質而不華語頗難讀今人因以為古朴慶元乙卯留冲靖來括蒼主王夕郎家齊事每讀至大謝處諸孤以為給事生前無甚罪過道録不須如此懴是未知太上立齊謝之法攝法界一切衆生罪緣因起令有悔心悔心苟形善心自著天堂地獄由是分從有入無歸之於道普天普地俱攝入一懴願法中故曰大齊夫豈止為亡者乞恩悔罪而巳哉然使建齊之主因有不滿意處則亦非太上隨機設教之義杜廣成黃籙齊為同學行道儀曽引括謝經寶之文為大謝矣今略加潤色令便順易讀然懴罪處悉反覆用經語庶使齊法流傳永劫也次都講願念次復爐香官使者左右龍虎君侍香諸靈官當令修齊之所生自然金液丹碧芝英百靈衆真交㑹在此香火爐前令齊主某存亡受福家國蒙恩十方仙童玉女侍衛香烟傳臣向來所啓徑御太上無極大道至真玉皇上帝御前次吟學仙頌出壇張萬福天科用奉戒頌次出户呪次空洞讃引至玄師前列班髙功小啓謝過三禮次回向讃次監齊紏過隨有無言之無則云壇衆奉法圖成幸免缺有則啓白法師授簡失者詣師再拜長跪受簡退於經前施拜依數止之次讃引法師歸堂無上黃籙大齊立成儀卷之十七
