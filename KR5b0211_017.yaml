front:
  text: 無上黃籙大齊立成儀卷之十七在七
  hash: sha256:5b06c3a855b1cc02c3e26105f635fd9d9b90fa3c3c837874b0cc77e8b5d0124f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_017-001a, image: hfl/0282/0282-004.png}
body:
  text: 上清三洞法師李景祈立定三洞法師冲靖先生留用光傳授太上執法仙士蔣叔興重修科儀門二古法三時行道儀法師坐堂弟子九禮三伏香花華夏引師出堂參詣六幕如宿啓之儀法師左行自地户入壇入戶呪次華夏左旋入壇升天門上十方香東方為始御案香次髙功宣五方衛靈呪出真文要解妙經東方九氣青天明星大神煥照東鄉洞映九門轉燭陽光掃穢除氛開明童子備衛我軒收魔束襖上對帝君奉承正道赤書玉文九天符命攝龍驛傳普天安鎮我得飛仙南方南方丹天三氣流光熒星轉燭洞照太陽上有赤精開明靈童總御火兵備守三官斬邪束妖翦截魔凶北帝所承風火八衝流鈴交煥敢有不從正道流行我享上功保天長存億劫無終西方七氣之天太白流精光耀金門洞照太冥中有素皇號曰帝靈保神安鎮衛我身形斷截邪源王道正明宮殿整肅三景齊并道合自然飛升紫庭靈寶符命普惠萬生功加一切天地咸寧北方北方玄天五氣徘徊辰星煥爛光耀太微黑靈尊神飛玄羽衣備衛五門檢精捕非敢有干試豁落斬摧玉符所告神真八威邪門閉塞正道明開映照我身三光同輝䇿空駕浮舉形仙飛中央黃中理氣總統玄真鎮星吐輝流煥九天開光童子一十二人元氣陽精焰上朱烟洞照天下及臣等身百邪摧落殺鬼萬千中山神呪普天使然五靈安鎮身飛上仙次都講唱鳴法鼓二十四通次髙功三揲香祝次發爐無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域真官正神臣今正爾燒香奉為某官某人正薦亡親某乙普薦在㑹某乙等修建黃籙大齊三日三夜以今第一日清旦中分落景隨時換易升壇行道願得太上十方正真生氣降流臣等身中令臣所啓速逹徑御太上無極大道至真玉皇上帝御前衆官各三禮次都講唱重鳴法鼓二十四通閲吏兵行事衆官各長跪叩齒二十四通出吏兵謹出臣等身中五體真官功曹吏出上三天執法開化隂陽功曹度道消災散禍解厄君吏各十二人出臣身治職君吏某治中建節監功大將軍前部效功後部效殺驛廷令驛廷丞四部監功謁者出臣等身中仙靈直使正一功曹治病功曹左右官使者隂陽神決吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏等各二人出出者嚴裝顯服冠帝垂纓整其威儀直使功曹戴通天之冠衣皂紈單衣正一功曹冠朱陽之幘絳章單衣使者冠九德之冠五色綬命單衣腰帶虎符齎執玉版直使功曹住立四方正一功曹住立中央治病功曹營衛臣等身左官使者建節在前右官使者持幢在後陽神決吏立左隂神決吏立右上部功曹住立上方中部功曹住臣等身中促氣功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者匝繞臣等身即吏虎賁察姦鈎騎都官僕射天騶甲卒天丁力士收氣食氣吏收神食神吏收鬼食鬼吏收精食精吏收毒食毒吏收邪食邪吏誅符破廟吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏屯駐臣等前後左右功曹使者嚴裝事竟羅列鹵簿關啓靈寶官屬領仙監齊諸君吏天師所布下二十四治三十六靖廬七十二福地三百六十名山崑崙等上宫三萬六千神日月星宿璇璣玉衡天地五帝三界官君將吏及道上二玄三元四始四面方位風氣注氣甲十諸官君將吏考召君東九夷胡老君南八蠻越老君西六戎氏老君北五狄羌老君中央三傣傖老君五嶽四瀆丘沼君諸廟神祇所在髙山卑谷山林孟長十二溪女根源本始土地之主社稷將吏一時嚴裝與臣等身中功曹使者飛龍騎吏上啓太上無極大道太上道君太上老君太上丈人太上玄老十方無極大道道德衆聖天尊至真大帝天帝天師君靈寶監齊大法師諸官君臣等生長魔俗沉淪季業玩樂榮華宿命因緣忽見啓拔得奉大道巳上出太極敷齊威儀經荷恩隆重喜懼交襟臣等受法之日約以奉修玄旨表效丹誠敷暢真風廣宣惠澤慈心愛物開度天人今有某州某縣某官為某亡靈某甲請修無上黃籙大齊謹依科法齎金龍繪綵香花油燭證質丹誠以祈所願臣等忝職玄司不勝所見謹為沐浴五體洗心正念依下元黃籙簡文靈仙科品於某處建立皇壇奉修無上黃籙大齊三日三夜九時行道露身三光之下稽顙十極之前燒香然燈轉經念真為弟子某拔度亡靈某及門中祖玄靈識九幽一切長夜死魂懴罪謝愆離苦升樂覃恩家國資福見存普及含生俱登道果謹上請三洞天仙兵馬地仙兵馬飛仙兵馬真人兵馬神人兵馬日月星宿兵馬九宮五帝兵馬三河四海兵馬五嶽四瀆兵馬各九憶萬騎三十二天監齊直事侍香金童散花玉女五帝直符傳言奏事飛龍騎吏等各三十二人一合來下監臨齊所為齊生某拔度亡靈某甲及九祖父母窮魂苦爽得出長夜九幽之府斷絶罪根出離三塗五苦之中身入光明上升天堂衣食自然轉輪更生福慶之門齊主某今齊信效心歸命十方無極世界巳得道大聖衆至真諸君丈人十方諸靈官乞所願從心身得過度三災九厄十苦八難自請官至此並出黃籙簡文衆惡之中保國寧家普及含識須行道事竟有功勤者謁還天宮功曹使者飛龍騎吏分别關啓以時上違列啓事竟各還臣等身中復於宫室須召又到一如故事各鳴法鼓三通咽液三過建齊止第一日清旦出官自餘否道士不受靈寶法不受都功盟威籙不可出宫行齊右出官啓事按三洞科儀籙品不同真官亦異當各隨身中所魔仙靈吏兵出之至若建靈寶齊出盟威都功治職君吏所以科儀云受盟滅都功籙者止稱攝行齊事益為此上清齊出靈寶洞玄中盟五法官吏夫籙始於正一演於洞神貫於靈寶極於上清上清匿景韜光精思上道志期輕舉全不涉俗洞神役神神靈消伏魔癘其於遷拔巳不相干陽光敷演道德自然升玄講究真實法性𡨋心修鍊與道合符修身保命開度天人蓋無逾於靈寶齊者受道之士先受正一盟滅三五都功修持有漸方可進受靈寶中盟上清大洞諸籙否則為躐等僣越違太真之格今世羽流不體太上慈悲演教之意切切然惟貨利是營上清靈寶盟威信金既重止憑化士於宗壇受一法籙詞文便稱某籙弟子行持齊事又有止受都功升玄等籙輒出靈寶齊科仙靈真官者遐方僻郡習以成俗非惟有犯玄憲抑實矯誣上天杜廣成儀云其他十戒白簡道士不可補職升壇此外竊預名號自貽隂譴建齊之主寧免負纍得不戒哉行齊之士所當痛革次都講唱各稱法位具法位奉行黃籙大齊事臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十二天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等夙命因緣生值大化玄真啓拔得入信根三師盟受三寶神經法應度人九萬九千位登至真而功微德小未能自仙志竭軀命佐國立功巳上並出靈寶王明真拜凡所歸投理宜關奏今奉詞㫖敢不上聞次宣詞按如詞言精誠丹切願憑大道開度存亡齊主某仰慮亡靈某及九祖父母一切窮魂生世之日罪惡難稱死入地獄終天無解伏聞無上黃籙大齊功髙萬法惠覃無窮謹依玄科奉齎金龍紋繒本命之信香花油燭表效丹誠請拔九祖窮魂長夜之苦仰祈玄佑普福幽明臣等謹為滌慮澄神冥心靜念依黃籙簡文靈仙典格拔度科品敷建靈壇四界八極法天像地立齊行道燒香然燈懴謝存亡三世罪考奉為亡過某及齊主家億曽萬祖囚徒死魂開諸光明解脫苦難免離惡道轉入信根今故燒香自皈依師尊大聖衆至真之德得道之後升入無形和與道合真師弟子一時左回三上十方香還西面東立師祝曰臣等今為齊主某技度亡靈某及九祖父母九幽玉匱長夜之府死魂惡對宿身罪根功德開度建齊燒香請謝十方願為亡故某及某家九祖父母長夜死魂拔出幽一作憂苦上升天堂今故燒香歸身歸神歸命大道臣等首體投地歸命太上三尊願以是功德歸流亡靈某及某家九祖父母一切死魂乞得免離十苦八難長夜之中身見光明上升天堂衣食自然長居無為今故燒香自皈依師尊大聖衆至真之德得道之後升入無形和與道合真師弟子左回三上十方香如上法師祝曰臣等今為齊主某拔度亡靈某及九祖父母九幽玉匱長夜之府死魂惡對宿身罪根功德開度建齊燒尊請謝十方願為亡故某及某家九祖父母長夜死魂拔出幽苦上升天堂普為帝王國主君臣吏民受道法師父母尊親同學門人隱居山林學真諸道士賢者願各得真道歸身歸神歸命大道臣等首體投地皈命太上三尊願以是功德歸流帝王國主君臣吏民受道法師父母尊親同學門人隱居山林學真諸道士賢者願各得真道安居無為今故燒香自皈依師尊大聖衆至真之德得道之後升入無形和與道合真真師弟子左回三上十方香如上法師祝曰臣等今為齊主某拔度亡靈某及九祖父母九幽玉匱長夜之府死魂惡對宿身罪根功德開度建齊燒香請謝十方願為亡故某及某家門宗室九族姻親國中吏民同學友流天下人民蝖飛蠢動蚑行蜎息巳生未生一切衆生皈身皈神皈命大道臣等首體投地皈命太上三尊願以是功德皈流弟子某身令得仙度身入無為與四大合德天下人民蝖飛蠢動巳生未生一切並得免離十苦八難五毒水火十災萬害賊疫鬼氣刑厄之中今故燒香自皈依師尊大聖衆至真之德得道之後升入無形和與道合真巳上並出黃籙簡文經前後稱與道合真者凡四皆本經文石張清都科三上香不能巡行當使侍香執爐左行亦可然不若今侍香引齊主逐方上香為合儀也大率行道不可久占時光劬勞甚則禮容情反無功矣太上流傳齊法本為學道之士謝罪求仙今其更相開度故齊儀上香念願祝帝王國主之後必祝三師及受道法師同學門人而黃籙簡文正科並稱今為同法某甲蓋可見矣後世用之於他人其問詞語未免稍有遷就處然三捻香祝願帝王師資之語諸經盡然切不可攺次都講唱禮二十方懴悔東方臣衆等至心歸命東方無極太上靈寶天尊九氣天君東鄉神仙諸靈官各虔誠懴悔跪懴臣等今故燒香皈身皈神皈命謹為黃籙大齊主某仰慮亡靈某及九祖父母一切死魂生世之日所行元惡罪結九幽長夜之府魂充考撻諸痛備嬰形體毀瘁苦毒難任長淪萬劫終天無解今依盟真玉匱女青上宫拔度科品齎青紋之繒九十尺九尺金龍一枚皈命東方無極太上靈寶天尊九氣天君東鄉神仙諸靈官拔贖亡故某及齊主某家罪録開度窮魂身入光明上升天堂衣食自然早得更生福慶之門某甲身得道真和與神合同次東南方臣衆等至心歸命東南方無極太上靈寶天尊梵氣天君東南鄉神仙諸靈官各虔誠懴悔跪懴臣等今故墝香皈身皈神皈命謹為黃籙大齊主某仰慮亡靈某及九祖父母一切死魂生世之日所行元惡罪結九幽長夜之府魂充考撻諸痛備嬰形體毀瘁苦毒難任長淪萬劫終天無解今依盟真玉匱女青中宫拔度科品齎黃紋之繒一百二十尺一十二尺金龍一枚皈命東南方無極太上靈寶大尊梵氣天君東南鄉神仙諸靈官拔贖亡靈某及齊主某家九祖父母一切死魂惡對罪根三界司算女青中宫削除罪録開度窮魂身入光明上升天堂衣食自然早得更生福慶之門某甲身得道真和與神合同次南方臣衆等至心歸命南方無極太上靈寶天尊三氣天君南鄉神仙諸靈官各䖍誠懴