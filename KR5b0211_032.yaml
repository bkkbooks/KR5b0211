front:
  text: 旡上黃籙大齊立成儀卷之三十二白二
  hash: sha256:2faad1a2ad22041c74d23363a106a78ae9f999bd10a13e1f8b5aa910c4b51a75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_032-001a, image: hfl/0285/0285-054.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿撰集齊法修用門釋龍綵下元黃籙簡文靈仙品曰拔度罪根威儀當以上金作龍十條以鎮十方拔度罪魂十方各安一枚當齎十方紋繒之信東方青紋九十尺亦可九尺南方絳紋三十尺亦可三尺西方白紋七十尺亦可七尺北方黑紋五十尺亦可五尺四角悉用黃紋各一百二十尺亦可十二尺上方碧紋三十二尺下方黃紋三十尺隨其方色以安十方拔度長夜之魂主人齎本命繒隨年國主王公悉門紫繒以法天象庶人則用本命所屬正方之色以置中央拔度年命並令精妙天子信則匹數諸侯文數庶人尺數尊卑有降悉用明科飛天神人曰違者考屬天官玄都曹釋升壇凡入靖登壇皆香水潄口名曰蕩穢出亦潄之名曰閉真氣安施既畢先令道衆兩人為威儀前行贊引法師弟子升壇旋繞外壇一周至東南角師念入户呪訖率弟子以次從地户升中壇威儀止在外壇旋繞不入中壇每壇一靣常留威儀三人三同畢分四面立步虛旋繞時亦皆旋繞至西北角師從天門升內壇左回三上十方香一周次上御案香退西向東立弟子繞中壇一周以次序立依科行事畢弟子引師出壇弟子過師前出師在後建齊立壇法入象地內壇則自天鬥出入中壇則自地户出入凡入壇則師率弟子自也户入師在前弟子在後凡出壇則弟子引師從地户出弟子在師前師在後華夏讃并釋勤行奉齊戒誦經制六情故得乘空飛耀景上玉清精心奉經教吐納練五神功德冠諾天轉輪成上仙右出靈寶玉匱盟真經杜廣成先生曰今但用十八虛聲耳今亦廢矣朝入户呪法師向地户之左叩齒三通密呪之夜八户同老子存思圖曰存見四明功曹一人通真使者一人傳言玉女二人侍靖玉女二人共六人四明功曹通真使者傳言玉童侍靖五女為我通達道室正神上元生氣入我身中祝畢入户先左是入朝出户呪出地户畢回身面壇叩齒三通祝之存玉女一人出隂入陽萬神開通關啓事畢請閉黃房侍靖玉女明備神宫祝畢出户先右足出夜入户呪老子存思圖曰存見四上功曹一人龍虎使者一人侍靖素女一人開明童子一人上玄少女一人共六人四上功曹龍虎使者正一生氣侍靖素女夜有所啓開明童子上玄少女與我俱入黃宫之裏通達所啓皆使上聞夜出户呪出地户畢回身面壇叩齒三通祝之存少女一人𤣥上太隂八窗開明向有所啓少女通靈事畢復位萬神譛寧右為燒香威儀出上元金籙簡文真仙品釋上十方香清旦日中上香先從東方起次東南方次南方次西南方次西方次西北方次北方次東北方次下方缺上方靜夜上香先從北方起次東比方次東方次東南方次南方次西南方次西方次西北方次下方次上方右登齊行香按靈寶本科日中則自東方起次南西北方以次東北東南西南西北上方下方而此且以東南方次東方者以黃籙簡文拔度罪根威儀行香次序如此今修黃籙齊以本經為據也清都張萬福天師齊儀升壇上香次第一同蓋拔度罪根威儀一本黃籙簡文靈仙科品龍漢舊文不可攺也上香呪法師上十方香畢至御案前二上香密呪之玉華散景九氣含煙香雲密羅徑衝九天侍香金童傳言玉女上聞帝前令臣長生世為神仙所啓所願咸乞如言右見上清大洞真經曰上經燒香呪無侍香金童四字傳言玉女作侍香玉女所啓作所向咸乞作莫不釋禮師序念先存太上三尊在天寶臺中左有三十六部尊經右有玄中大法師十真五帝群仙侍衛如大會朝真之儀法師臨目存見太上三尊乘空下降左右龍虎君千乘萬騎三界尊靈羣真侍衛羅列在坐師為弟子奏陳齊意次思經師上清靈寶法師詹君諱齊古字稽仲行化長沙心拜三過祝曰願師得仙道我得升度次思籍師上清三洞法師田君諱居實字若虛甲寅五月初二日生長沙真巖人行化兩浙心拜三過祝曰願師得飛仙為我開度七祖父母早生天堂我得道真升入無形次思度師上清三洞法師留君諱用光字道輝甲寅三月二十五日戌時生乃信州貴溪人以開橲丙寅天臘羽化于龍虎山上清宫行化荆湖江浙心拜三過祝曰願師得升度上登髙仙為我開度五道八難名入仙籙永成真人右按中元玉籙間文神仙品曰奉師威儀經師則經之始故冝設禮三曾之宗籍師則度師之師故冝設禮三生死籙籍所由度師則受經之師度五道之難故應設禮為學不尊三師則三寶不降三界不敬鬼魔害身杜廣成咒生曰經者逺也二師之中經為逺師乃藉師之師巳之祖師也籍者因也傳真學道師資相因乃經師弟子度師之師也度者進也度我凡身進登道品從几至此莫不因師乃巳之師也所𡉄之方謂所居之万心拜存形貌諱號禮而祝之所以禮師者我所行之法開度天人因師教授方至於此凡有修奉皆先禮師不忘本也然古者經從師受故齊直燒香必禮師齊法出於神經故建齊以奉經為本齊科所謂三師盟受三寶神經供養尊禮修行齊直是也今世經不師授齊法亦廢結齊之士苟未盟受寶經如科中所稱上清金書三洞寶等語皆當隨冝換易禮師之時存祝傳法籙三師可也清旦思青雲之氣匝滿齊堂肯龍獅子備守前後靈寶思神儀曰青龍獅子合八頭四頭在髙産南使處雨邊巳木之上四頭在北丑亥之上以中央髙座為正青龍在內獅子在外悉東西相對兩向次思青氣從師肝中出如雲之升青龍獅子在青氣中出覆弟子合家之身日中思赤雲之氣匝滿齊堂朱雀鳳凰悲鳴在左右靈寶思神儀曰雄曰鳯雌曰凰鳥也其雞頭形雞喙燕頷蛇頸龜背魚尾五彩龍女合八頭四在東馭兩邊寅辰之上又四頭在西亦俠兩邊戍申之上朱雀在內鳯凰在外南北相對向次思亦雲之氣從師心出鳳凰朱雀在赤氣中出覆弟子合家大小之身日入思白雲之氣迎滿齊堂白虎麒麟備守四方靈寶思神儀曰麟麟獸也麏身半尾馬足黃色圓蹄角頭有肉合八頭四生方二頭在子午卯酉之上白虎在內麒麟在外悉向南次思白雲從師肺中出白虎麒麟在白氣中出覆弟子合家大小之身次思仙童玉女天仙地仙飛仙日月星宿五帝兵馬各九億萬騎監齊直事三界官屬羅列左右威儀肅肅不有息懈靈寶思伸儀日仙童侍香左東立玉女侍香右西立天仙至五嶽五帝並是兵馬天仙官兵著緋衣處天門在門東地仙官兵著如軍隊之衣處地户飛仙官兵著羽衣處天門在門西也日官官兵著紅色衣處日門月官官兵著淺黃色衣處月門星宿官兵各隨方色衣處四方四季四孟之上五帝官兵馬隨方色衣各處其方中央處建王之方次閉目內思存見五藏五嶽五星五帝侍衛身中映蓋一體體作金色真氣從肺後出項有圓光如日象使照明十方身中了然盡見內外靈寶思神儀曰五藏者先存肺紅白色有七葉如蓮花接喉嚨下騶虞覆心次存心紫赤色如油囊中長三寸上大下小中央孔在肺下次存肝紫蒼色五葉在心下次存腎有雙紫黑色如杯當俠著脊次存脾混黃泥色長一尺兩頭本小曲捲太倉胃管也正在臍五嶽者存東嶽泰山南嶽衡山西嶽華山北嶽恆山各在其方中嶽嵩髙山在西南五嶽各在木域遙存見之五星有存五星煥明五方南方熒惑星在額上中央鎮星來在心前北方辰星來在兩膝間東方歲星來在左用西方大白星來在右肘五帝者存青帝立東赤帝立南白帝立西黑帝立北黃帝立中央建王之方皆著帝王之冠服隨方之色立在齊內又依上法存真氣自肺藏後云脊中出直上髙出頭上而出四藏色氣次仰升紛鍇冠覆身形葱鬱密宜如濃烟之中於是身為金色生圓光如口照明十方身中然盡見內外右為建齊威儀出靈寶上元金籙簡文真品凡登壇行道燒香啓祝存思並依上法衛靈呪并釋東方九氣青天明星大神煥照東鄉洞映九門轉燭陽光掃穢除氛開明童子備衛我軒收魔束妖上對帝前奉承正道赤書五文九天符命攝龍驛傳普天安鎮我得飛仙南方南方丹天三氣流光熒星轉燭洞照太陽上有赤精開明靈童總御火兵備守三宫斬邪東妖剪截魔王北帝所承風火八衝流鈴交煥敢有不從正道流行我享上功保天長存億劫無終西方七氣之天太白流精光耀金門洞照太𡨋中有素童號曰帝靈保神安鎮衛我身形斷截邪源王道正明宫殿整肅三景齊井道合自然飛升紫庭靈寶符命普惠萬生功加一切天地咸寧北方北方玄天五氣徘徊辰星煥爛光耀太微黑靈尊神飛玄羽衣備衛五門檢精捕非敢有干試豁落斬摧玉符所告神真八威邪門閉塞正道明開映照我身三光洞輝䇿空駕浮舉形仙飛中央黃中理氣總統玄真鎮星吐輝流煥几天開光童子一十二人元氣陽精熖上朱煙洞照天下及臣等身百邪推落煞鬼萬千中山神呪普天使然五靈安鎮身飛上仙右出靈寶真文要解經名曰太上靈寶自然五篇衛靈神呪釋鳴法鼓杜廣成先生曰法鼓者內正神氣外滅魔靈法事所先也左右相叩為天鍾磬中相叩鳴法鼓也叩之以八為節三八二十四氣也三捻上香祝上香祝之發爐第一上香祝曰願達玉清境供養妙無上帝自然元始天尊無上道寶第二上香祝曰願達上清墝供養妙有大帝虛皇玉晨大道君無上經寶第三上香祝曰願達太清境供養至真大帝萬變混沌玄元老君無上師寶右出杜廣成先生齊儀上手爐香呪道由心學心假香傳手執玉爐心存九天真靈下盻仙斾臨軒令臣關奏徑御九天右出宋朝頒降金籙儀非古法也不用亦可蓋古法髙功都講位前各有香案發爐止就本位案前上香不用手爐也釋發爐無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域真官正神臣今正爾燒香奉為某官某乙正普薦亡親某乙在㑹衆魂等修建無上黃籙大齊三日三夜以今初夜宿啓登壇朝真行道𥙷職宣戒關盟諸天願得太上十方正真生氣降流臣等身中令臣所啓速達徑御太上無極大道至真玉皇上帝御前右發爐為關啓真靈之始出金籙簡文經道分三洞教亦殊科如上元五靈五老神真云為上清發爐太上靈寶無上元尊云為自然發爐傳言玉女上奏皇君云為洞神發爐太上玄元五靈老君云為正一發爐其他難以槩舉至於靈寶盡本金籙簡文矣而黃籙簡文經所載却不同如曰香官使者左右龍虎君捧香驛龍騎吏侍香玉女五帝直符各三十六人出是也張萬福天師正齊發爐雖依黃籙簡文經所載至宿啓解壇又用金籙簡文經祝語矣前後異同恐是正齊宗本經之文而宿啓散壇乃行自然朝法故宗金籙簡文亦或未可知也經教傳久其間抵捂者多如金籙蕳文三五功曹下無左右官使者五字却見於盟真科經金籙簡文有侍香金童而盟真科作玉童金籙簡文有侍香玉女而陸天師杜廣成儀作傳言玉女張清都儀又作散花玉女金籙盟真五帝直符下無直日香官四字而陸天師張杜齊儀俱有之金籙盟真諸經俱云至真玉皇帝前而黃籙簡文作玉皇上帝御前要之三籙盟其諸經相參為用故科云盟真不可單行金籙不可獨用黃籙罪根雖卷目異名亦相通為下典廣有所入也至於復爐其間亦有不同處不能盡釋今姑載宿啓發爐餘可以例推釋稱法位關啓張萬福天師曰各各自稱所受法位稱時耳𦆵自聞勿使喧聒餘皆例爾右宿啓散壇發爐畢稱法位關啓之文出靈寶上元金籙簡文真仙品為朝禮衆真威儀經科所謂自然朝法是也與正齊上啓三上香願念之法不同不啓聖位張杜宿啓儀並於稱法位後便云臣某等今故燒交願以是功德云蓋一本經文耳藏中所載靈寶諸齊宿啓儀並無添入聖位者止有一家靈寶自然齊立成儀不載何人所修其間辭語多易以今文又𣸸入行道所啓聖位近世相承不革留冲靖所傳亦因之雖曰捻香啓先當關奏上玄但行道科所啓聖位本文乃出洞玄靈寶長夜之府九幽五匱盟真科因元始天尊在香林圍中與七干二百四十童子俱教化諸法度身威光命召十方飛天神人說罪福緣對拔度上品本上大道君啓臼元始乞垂旨教可得修行以度一切於是命飛天神人為著齊直之訣行道所啓聖位蓋本於此宿啓散壇乃行自然朝法既祖金籙簡文本經無之難以攙入況中間祈哀懴罪禮謝乞願念之詞特仗仙靈謄奏齊誠耳今依古科剛去聖位尚慮後學不見經文反生疑惑故略釋始未釋禮十方日中從東方始入夜從北方始張萬福天師曰凡禮拜始唱至心歸命東方即至心注念東方低身屈膝呼無極太上靈寶便靡靡而下令兩手俱至地呼天尊與聲齊頭面著地聽聲齊起皆不遲疾緩急得所使五體合法不得局促怠放齊上齊下每禮訖合坐皆起立然後坐如下方例不得便坐行磬須聽唱天尊聲絶然後打之所以謂之禮拜者謂起伏拜跪威儀庠序合法故耳遍觀至心者必能禮拜禮拜者必有至心君不察其形恭何以達其心識所以謝罪請福皆以禮拜為先也釋懴悔三業禮畢各長跪執簡叩頭懴悔張萬福天師曰自禮十方天尊至三業懴並出靈寶常朝儀三啓頌三首樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜默天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虛有念無不啓錬質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮右出洞玄靈寶消魔寶真安志智慧本願大戒上品經亦見玉京山步虛經謂之禮經祝每終一首各稱善一拜真人口訣云侍經仙童玉女聞此祝皆歡悅而祐兆身也是大經悉用此祝而禮拜矣若冥心禮經者亦心祝其文乃上仙之祕也齊法以經為祖凡是建齊三寶之前必安神經以鎮齊壇故上元金籙簡文真仙品曰建齊威儀旋行畢一時北向禮經三拜是也釋三禮張萬福天師曰三禮出靈寶常朝儀無上黃籙大齊立成儀卷之三十二
