front:
  text: 無上黃籙大齋立成儀卷之三十六
  hash: sha256:de9ee8383435cecd63f1be68dc3c72022c2b8ccb4cf144aa58094857dea453a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_036-001a, image: hfl/0285/0285-156.png}
body:
  text: 三洞法師沖靖光生留用光傳授太上執法仙士苻叔與重修修奉應用門建齋之始投詞頌渺渺空無象悠悠感至靈敬則承天貺泄則被魔精吉凶隨運轉否泰應緣生道不貴珠玉神惟在至誠丹愊盡勤苦懇悃竭衷情自然通大道皆得降真靈捻香陳所願稽首崇嘉貞天尊常湛寂回心禮杳冥啓堂頌學道當勤苦斂信運丹誠燒香歸太上真氣雜煙馨惟祈開大宥七祖離幽冥三皈依讃至心歸依十方道寶當願衆生起心回向一切信禮至心歸依十方經寶當願衆生心開悟解受持轉誦至心歸依十方師寶當願衆生普上法橋無有障礙聞經讃聞經巳後當願衆生萬罪永消善芽增長聞經巳後當願衆生深人法門皈依信受聞經巳後當願衆生永斷執迷常修至道道讃道場衆等人各運心皈命三寶旡上尊一切念衆官各念功德請師讃修齋行道奉請經師降臨壇所籍度玄天監齋隨文改易請玄師頌科律嚴章秦精誠享百神投詞陳懇願潔醮奉髙旻俯盻垂雲駕冥心啓上真玄師都教主奉請降凡塵請天師頌太上傳符籙初因遇鶴鳴積功超玉闕列位侍三清接引章詞奏克隨凡庶情修齋當奉請願俯鑒精誠請監齋頌寶號流塵世仙階列上清三千功德滿八百行光成禮懴修真福監齋作證盟今宵仙馭降祥祉被舍生請天官頌妙道垂真教修齋立福田結壇朝上聖建醮會髙仙注念通穹極精誠感上玄天官乘寶輦彩仗下凡筵請地官頌翼翼陳丹懇兢兢仰紫虛祈通陳下志願逹土皇君潛應垂真貺遐臨赦罪辜地官來下降旌擁五雲輿請水官頌方便開真化慈悲立聖科虔心修妙會調氣詠靈歌默念祈淵府丹誠通大羅水官龍駕降雲錦起滄波請五帝頌五帝居仙品紏彈善惡因祥光臨宇宙惠澤濟沉淪發露祈天祐冥心感聖賢存心俱快樂享福永旡垠請正一三師頌靈寶明科範三師列上清修齋虔降格功德貴精誠仰屈真仙馭回翔羽斾旌克疇垂福佑享報應凡情請經師頌入靜修黃籙嚴裝啓上仙奏章先逹御詞欵欲關宣寶籙因師度威儀太上傳經師來下降奉請列羣仙請籍師頌肅肅祈清福詵詵結寶齋登壇須此夜行道續徘徊有願仍須啓皈心道眼開籍師來下降仙仗下瑶臺請度師頌經戒丹心禱虔誠召百神捻香祈至聖持戒請仙真清詠淩朝啓精思入夜勤度師來下降保護結齋人焚詞頌人生多障難大道實矜憐救度留科戒咸今懴罪緣愆辜編地府釁結巳聞天發露祈真祐誠心仰聖賢虔恭禮三寶願得拔九玄壽長年焚詞歸上界奏名玉帝前又太虛感靈會命我生神章一唱洞九玄二誦天地通混合自相和九遍成人功大聖慶元吉散花禮太空祈神神必應請福福當弘諸天並歡恱一切稽首恭度簡頌赤明開元圖和陽通上虛元始敷靈章十部飛天書開度九幽祖萬遍道自俱玉阜秀瓊林生死福德廬自無黃籙簡苦根焉得除旋行誦靈章五靈還相扶投龍簡頌祈真登紫府山簡云紫嶽土簡水簡云紫府告命詣靈壇山簡云靈山水簡云靈泉玉女謡梵響金童奏香煙書名通九地列字上三天永享無期壽尅成髙上仙解壇頌太空包有象至道窈無形承和通妙氣應感達衷情倐忽周八極依稀降萬靈微香陳素欵委質表丹誠逺泛翔鸞蓋遐攀綺鳳旌煙宫髙鬱鬱雲閣上停停瓊駕出霄漢金龍入太清甘露泠人世景福被幽明送師頌修齋事畢仰荷玄恩志心稽首奉送某師雲輿勿住鶴駕難留後有修齋還當奉請送經師頌辭三帥讃見杜儀經法雖玄妙崇奉悉因師凡有立善者咸當願禮之氣運功易就心慢悔難追若能勤繫念朝夕自仙飛送籍師頌道以齋為重法以朝為常不修不奉者焉能遊帝鄉有骨入仙品自然開紫房玄女排雲駕但見金銀堂是故謝三師稽首禮虛皇送度師頌迢迢玉京山玄都何巍巍真人乘步虛朗朗長夜開大道由人弘心至神自歸修齋行道畢稽首辭三師送正一三師頌至道傅師旨垂光巳燭壇隂靈皆感召號令肅仙班鶴駕將臨翥鸞𩥵亦告還天邊想歸路佩玉聽珊珊送五帝頌仙仗來霄極尊臨列五方旍風吹羽節鸞輅駐清場齋事將圓徹回輿返上蒼流恩無不遍豈但感馨香送天官頌妙範修齋直明科洗罪根瞻穹崇上善歷懇致微言既納依投請蒙垂福宥恩天官還玉府寶駕入金門送地官頌淨會朝元罷齋功結果圓真恩宣五嶽誠悃奏三天徹席停虛範解壇送列仙地官回嶽府髙陟五雲軿送水官頌宣演玄音畢諸仙返上穹靈風除橫厄甘露報真功復命驪龍駕遙還暘谷宫水官歸洞府福祿賜無窮送監齋頌靈壇崇法席允賴下監臨紏過兼書善真仙亦仰欽行當驅道騎縹眇五雲深生存當有賴更復濟幽沉送天師頌齋法巳精嚴表箋奏上天至誠通感應闔門得延年幽冥昏暗獄罪苦悉皆原掌握諸天籍章詞御帝前祖宗咸升度嗣裔慶榮遷三天扶教主事畢奏功圓送玄師頌上帝命真仙修齋黃籙壇諸天來下降焚香懴罪愆九時行道畢齋事巳同圓亡魂得超度玄師上九天回曜飛光頌煌煌滿巵燈閃爍同月光反照名回曜滿空象列星流光如虹霓散艷生蓮華誤入瓊瑶洞宛在玉芝房玉女映玊珮金童照金裳萬靈登道岸衆真聚華堂龍樓十二轉晝夜輪光芒光明頌太上大道君位處無何鄉寶光真童子下理九幽房悲嗟苦魂役拔度痛哀傷二十四門戶咸令聞寶香燈明長夜照願消纍劫殃北帝頌稽首無上道歸心元始尊至真妙應主開化飛玄門妙戒怡五靈金書警萬神察命定籙籍靈符度苦魂乘雲朝玉帝齊契玄中人焚簡頌太上法微妙籙籙度天人元始告符命時刻獲升仙傳授救沉溺皆得自翛然書名全簡籙逍遙玉帝前白鶴讃太一真人氷雪容步虛來往本無蹤蓬萊要去如今去雲在窗前鶴在松白鶴千年始一歸山川依舊世人稀不因華表分明語誰識當時丁令威白鶴飛來下九天數聲嘹唳出祥煙日月相催人易老不如修道學神仙胎化靈禽唳九天雪毛丹頂兩相鮮世人不認歸華表來瑞升平億萬年散華讃玉京山上朝真會散花林十仙齊奏步虛音散滿道場天尊前供養五色彩雲隨步去散花林六銖仙服著身來滿道場天尊前供養空洞一聲來月下散花林步虛三唱入雲間滿道場天尊前供養十念一念天地交泰二念日月髙明三念隂陽順序四念國土安寧五念帝王萬壽六念宰相安正七念萬姓安樂八念百穀豐登九念幽途離苦十念大道興行十二願一願乾坤明素二願氣象清圓三願聖人萬壽四願化洽八埏五願天垂甘露六願地發祥煙七願四時順序八願萬物生全九願家行孝悌十願國冨才賢十一願酆都罷對十二願學道成仙四結願文願大道興行經法流演至心稽首正真三寶願聖化無疆明齊二景至心稽首正真三寶願師尊父母亡者生天見存安樂至心稽首正真三寶願一切舍生免離諸苦同會無為至心稽首正真三寶大道玉清經瓊臺寶光上真十願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤爽無依咸得受生五願天下太平百穀成熟六願臣忠子孝君仁父慈七願四海通同𡨚親和解八願潛胞處殼俱得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食無上黃籙大齋立成儀卷之三十六
