front:
  text: 无上黄籙大齋立成儀巻之三鳯三
  hash: sha256:6295eaf834707361e321cbd92c05d6e3e3a6c012130177b79192bc2321f6fbae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_003-001a, image: hfl/0278/0278-078.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蒋叔輿編次預告門正薦投壇狀式郷貫住居具官位姓某右某伏爲亡親某非本宗乃著姓命係某甲子某月日時生於某年月日在某處命過享年幾歳葬某處今月某日屇于某節欲爲某亡懴罪期瑟縮述平生愆過心常自愧者慮從傾逝咸滯幽𡨋願假修崇用伸薦拔兼爲合門先逺罔測升沉夙世業愆未曽湔洗乞就某處開建无上黄籙大齋三晝夜满散修設謝恩清醮三百六十分位或二百四十分位及土惡之家一百二十外别設宾官位四十分餘並同仰仗道慈俯超逝識開明苦暗普濟幽沉集此殊因上資家國利安品物福佑見存謹依科法齎備建齋法信醮用物儀具狀投上清三洞法師某君門下伏乞法慈特賜矜允擇日開建施行未敢自專伏候法旨歳次某甲子年月日具官位姓某狀可漏狀投上請三洞法師某君門下具官位姓某謹封普薦狀式謂集衆財建大㑹者郷貫住居欲充黄籙大齋㑹首具官姓某同在㑹士庶男女等右某等辛因宿慶叨際眞風欲伸追悼之誠願假薦嚴之力兼爲各門先逺同測升沉夙世業愆未曽湔洗伏聞元上黄籙大齋功髙萬法澤被十方共發䖍誠同伸修奉乞就某處開建无上黄籙大齋三晝夜滿散修設謝恩清醮三百六十分位所資功德普爲在㑹係薦衆魂及徃逝親縁囚徒罪爽解除業累開證生方仗此齋功上資家國利安品物福佑見存謹依科法齎備建齋法信醮用物儀具狀投上清三洞法師某君門下伏乞法慈特賜矜允擇日開建施行未敢自專㐲候法㫖年月日具位姓某狀可漏同前鎭信禮物狀郷貫具官位姓某今具建齋鎭信下項金龍十三條玉璧十三枚鎭綵一十段命信若干尺寸紙筆墨硯十副鎭米二石四斗鎭錢二萬四千或二千四百鎭油二斗四升玉簡三片金鈕三副青絲一兩二錢信香若干朱砂一兩二錢龍頭書刀一柄右件信儀隨狀見到應沿齋醮所須一一備足謹具狀投靈寳大法司伏候法旨年月日具官位姓某狀可漏鎭信禮物狀中三洞法師某君門下具官位姓某謹封正薦齋意如非行大法人内投靈寳大法司委有窒碍其奏狀云投臣申状云投某牒劄云當院目餘並同郷貫某路某州縣居具官某人狀稱伏爲亡親某乙命係某甲子某月日時生於何年月日在某處因患身亡享年幾歳今月某日屇于某節慮從傾逝或滯幽𡨋願假修崇用伸薦拔兼爲合門先逺罔測升沉宿世業愆未曽湔洗謹齎建齋法信醮用物儀投靈寳大法司乞就某處宫觀開建无上黄籙大齋三晝夜滿散祗設謝恩清醮三百六十分位仰仗道慈俯超逝識開明苦暗普濟幽沉集此殊因上資家國利安品物福佑見存普薦齋意欲充二字止發預告用之登預告後便除去之郷貫某路某州縣居欲充黄籙大齋㑹首具官某乙同在㑹士庶男女等如有見任官入㑹作官僚士庶等狀稱伏念某幸因宿慶叨際眞風欲伸追悼之誠願假薦嚴之力兼爲合門先逺罔測業愆未曽湔洗伏聞无上黄籙大齋功髙萬法澤被十方共發䖍誠同伸修奉謹齎建齋法信醮用物儀投靈寳大法司乞就某處宫觀開建无上黄籙大齋三晝夜滿散修設謝恩清醮三百六十分位所資功德普爲在㑹係薦等魂及徃逝親縁囚徒罪爽解除業累超證生方仗此齋功上資家國利安品物福佑見存行遣通用式諸奏申狀用匀淨展劄紙前空一掌後空兩掌關牒用狀紙諸奏狀稱臣申狀稱名天樞院用司額稱本司關牒稱當司諸帝尊並用奏狀聖位以黄簽書臨時貼其餘並用申狀諸奏三清玉帝稱道慈勑旨諸帝稱天慈睿旨后土稱宸慈聖旨諸貼黄分單行寫闊二寸四分髙三寸或闊三寸髙三寸六分爲則粘狀前背後合縫處書臣名用印諸倚黄用小黄簽側貼太歳下諸可漏並貼黃一位者用黃簽側貼兩位以上者用稍闊黄簽中貼兩位四位以右爲尊三位五位以中爲尊諸方函不拘奏狀申狀並不貼黃不稱臣兩頭止書名章表符誥同此諸奏申狀聖位合者方函題最前一位諸帝尊並獻龍車后土皇祇獻鳳輦諸公牒關劄引並批朱公牒摺角封書名押字散牒關劄用可漏押字不書名諸年辰若甲子年則云太歳甲子自乙丑年至癸亥年並同諸御位稱陛下后土稱殿下諸帝稱御前諸眞稱聖前神祇稱神前奏玉清凡状内雙注者分正薦普薦用以意續文餘同此式具法位臣姓名今據某布政使司某府縣某里社居住入前齋意至福佑見存臣據詞難抑謹集法籙道士一壇依下元黃籙簡文靈仙品格建立靈壇結盟立誓寅奉寳齋先颺寳旛上聞齋意看誦太上眞經睿號擇日開啓齋壇恭按玄科宣揚祕範仰祈恩霈普濟存亡除具事由上奏諸天尊帝請降睿旨申三界眞司牒合屬去處各乞照㑹崇建大齋事理亡靈某乙在㑹係薦亡魂及建齋弟子家億曽萬祖歷劫種親十方九幽苦魂滯魄權停考對落滅惡根願假道力恩光至期親朝壇陛懴雪罪垢祗受齋功所有元始符命寳籙眞符開度一宗靈文祕篆及建齋醮謝日分别具奏聞欲得三界十方合屬去處預使聞知普令遵奉須至奏聞者右臣謹録狀上奏玉清上帝元始天尊上清大帝靈寳天尊太清大帝道德天尊陛下恭望道慈特降勑旨頒行三界十方允臣所奏冒犯天威臣誠惶誠恐稽首頓首死罪謹具狀奏以聞謹狀歳次某甲子某年月日具法位臣姓名状貼黃奏爲某人衆會日等字後同乞崇建无上黃籙大齋正薦亡某等鲁薦在㑹衆魂及十方九幽苦魂罪魄欲得敕命頒下三界十方預行照應事伏儀敕旨倚黃乞下三界十方施行可漏如開寫奏狀三函毎可漏一箇書天尊一位上清大帝靈寳天尊玉清上帝元始天尊太清大帝道德天尊陛下具法位臣姓名狀奏謹封方函奏狀一函謹謹上詣三天門下上清天樞院呈進具法位臣姓名謹重封昊天具法位臣妵某今據某布政使司某府縣某里社居住同三清狀至普濟存亡除具事由飛奏上帝乞降勑命及奏諸天帝尊請降睿旨中三界眞司牒合屬去處各乞照㑹崇建大齋事理將亡故某乙在㑹係薦等魂及建齋弟子家億曽萬祖歷劫種親十方九幽苦魂罪魄權停考對落滅惡根願假道力恩光至期親朝壇陛懴雪罪垢祇受齋功所有元始符命寳籙眞符開度一宗靈文祕篆及建齋醮日分别具奏聞欲得三界十方合屬去處預使知聞普令遵奉須至奏聞者右臣謹録狀上奏太上開天執符御曆舍眞體道昊天玉皇上帝陛下恭望道慈後同三清狀結貼黃倚黃並同三清可漏照狀聖位僉聖位換易天皇具法位臣姓某今據某布政司某處同昊天狀至須至奏聞者右臣謹緑狀上奏勾陳星宫天皇大帝陛下恭望天慈特降𧇖旨頒下三界十方合屬眞司允臣所奏冐犯天威同三清狀結至謹狀貼黃同三清狀攺勑旨乍𧇖旨倚黃同三清北極具法位臣姓某今據某布政司某處同昊天狀至須至奏聞者右臣謹録狀上奏紫微中天北極大帝陛下恭望道慈特降睿旨頒下三界十方合屬眞司允臣所奏冐犯天威同三清狀結至謹狀貼黃同三清狀攺勑旨作𧇖旨倚黃同三清東極具法位臣姓某今據某郷貫居住月天皇狀至須至奏聞者右臣謹録狀上奏東極宫中太慈仁者㝷聲赴感太乙救苦天尊御前恭望道慈允臣所奏持降睿旨頒下三界十方咸令遵奉仍乞慧光照徹幽夜使受苦衆生出離幽暗得覩光明普詣齋壇承功超度冒犯天威後同天皇狀結巳上可漏並同前式貼黃倚黃並同天皇无上黃籙大齋立成儀卷之三
