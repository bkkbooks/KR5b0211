front:
  text: 無上黃籙大齋立成儀卷之二十三竹三
  hash: sha256:796dc6a31f7f7510508edc777c27a336e254fb0b2b5eee8c33f5d03203c0ae61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_023-001a, image: hfl/0283/0283-070.png}
body:
  text: 三洞法師沖靖先生留用光傳太上執法仙士蔣叔輿修科儀門請光分燈儀先備明燭一炬置于三寶前進衆列班齋壇請齋官上香設拜舉法事次法師同侍香侍燈詣道前請光法師啓白具法位臣某上啓玉清上帝元始天尊上清大帝靈寶天尊太清大帝道德天尊東極太一救苦天尊十方尋聲救苦天尊大慈大悲救苦真人大慈大悲大慧真人靈寶五師真君臣聞四生冥昧不離迷途六趣昏蒙長居永夜自積無明之垢莫逢有赫之恩光是以師寶垂慈帝真流化著回耀降光之格演然燈懴罪之儀上照諸天則三晨增耀下輝九夜則庶獄停酸中映十方遍資六趣神光普被妙用難明今謹有弟子某正薦亡龍某乙普薦在會衆魂開建無上黃籙大齋用資超度恭依科式敷列壇場然點神燈開明幽暗伏乞天光下濟法澤旁流放九色之明輝度重泉之苦爽十方法界九夜冥關盡憑照燭之功俱遂升遷之願稽首歸依加持燈果大聖元始天尊大聖玉宸天尊大聖玄元天尊法師以符燭置手中宣回耀神呪九陽至清三天道明日月神華星光合明三華寶耀混合羣晶三寶發華慧光發神長降飛空下燭幽冥慧光一照遍徹十方三塗寵對五苦停輪火山息熖水消雪扄刀化玉樹劒變鶱林鐵城摧毀魂升玉清臣今上請願賜關澄日月靈妃星光真人一十二貟稽首奉行分燈散輝照徹寒庭法師以符燭就三寶前請光在手宣分燈恕光呪赤明開圖運度自然開明三景億劫之先今曰大慶沉魂受錬重昏幽暗永閉寒泉欲請慧光照破冥關氷寒溫和爐炭息熖刀山劒樹永斷攀緣回光十方照耀諸天魂消五纍業除勾連三辰同暉永劫元元關光童子承恩上玄三光玉女請如斯言侍香侍燈各以紙燭就法師所執符燭分光三炬法師分輝一生二二生三三生萬物普照幽沉見前清衆請為分輝流光法界天尊侍香侍燈分點壇上燈燭衆官各執紙燭就法師手中分光然點壇席燈燭並令周遍光明朗徹輝映十方衆官序立詠回耀飛光頌法師回向向來然燈功德無量勝因用薦幽靈遷升淨界永離苦暗長處光明利及十方恩霑六道為上良緣念三清無上天尊太一救苦天尊十方救苦天尊不可思議功德金鍾玉磬儀光置金鍾玉磬於都門外香案前鍾列左磬列右次髙功上香都講宣白伏以華林隱靄環列天中之天丹闕森羅旁通象外之象矧玉匱挺愛河之筏而寶齋橫苦岸之舟廣度迷津齊登道果制器有象能事盍陳輒稽大法之鴻儀式按沖科之妙用金鍾互奏玉磬交鳴四闢六通間步虛之繚繞九和十合揚大梵之奫淪神風靜默以凝和灝氣飛騰而薦瑞鸞歌鳯舞虎嘯龍呤希聲振而三景明上徹寥陽之帝所隱韻砰而九隂闢下通鬱絶之神鄉臣等肅建靈壇祗迎寶馭仰祈肹響俯格精誠稽首歸依無極大道振金鍾二十五聲伏以九陽隱韻大音希聲象含圓極之容量廓太虛之度憑真寂以感聖冀玄和而聚仙有叩則鳴如谷答響虛凌恢漠極丹禁之華堂默感璇璣潛九空之雅觀至外無外知空不空密運玄音一新功範宣召陽神呪元範恢漠九霞映空丹靈顯著五緯交通真陽激徹韻合玄官元始徘徊羣仙敬從萬氣齊仙隱微降衷道生自然與道合真擊玉磬三十聲伏以瑶壇蠲潔玉磬琳琅六合之真宰凝神九野之隂靈稽首垂光五廕分盻三塗警悟覺昏還元返本妙有之真機感妙虛玄之逸響合虛冥合自然作成祕範宣召隂神呪髙上太虛瓊宮紫房玄壇制器玉磬琳琅霞霄振舉乾坤合張隂生梵唱流演元綱慶靈生門升度淪亡克成髙仙永處福鄉與道合真鍾磬交振三十六聲伏以飛虛掣翠遏紫電於遙空流燁垂晶散幽微於玄漠雲璈萬戰風詠千箏龍含虎氣以迎祥玊和金風而呈瑞輕綃四舉映玄壇髣佛之間薄霧九沉引法界虛無之路九和二氣十合三宫雨露恩霑風雲慶會混合二氣表隂著陽金和動瑞玉潤靜昌交感上下格于十方窈振玄宫環珮鏘揚靈符所告嚴肅壇場祕範重宣萬神關張與道合真振金鍾九聲擊玉磬六聲伏以混茫始判天地殊形澄髙清於九億萬重凝滓滯於三十六壘音通象外韻遍無方流八極深沉之端通五行造化之表龍蟠雲聚振寰海之邪蹤虎伏風平明人天之真識辟非之效禁壇之功莫盡讃揚故先遵奉今則清場初啓迎祥於太漠之鄉紫範恭宣施澤於重隂之境金鍾清徹玉磬含和召十方陽德之靈集九地隂冥之宰普臨法會共證齋功清衆同誠旋行讃詠無上黃籙大齋立成儀卷之二十三
