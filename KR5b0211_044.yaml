front:
  text: 無上黃籙大齋立成儀卷之四十四駒四
  hash: sha256:c415ab9edc288bb7e1ab46bb2022787f1daf7ca2128b2daa8ef8a139f9699418
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_044-001a, image: hfl/0287/0287-098.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編集符告門救苦符告文柄簡闊二寸四分長九寸告文四行年月一行元始符命金籙白簡救苦真符告下十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵同録同命司功同殺牛頭獄卒三界大魔拔度某乙等亡魂如善度則云拔度六道四坐孤魂滯魄出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乘此九真妙戒拔度功德上坐天堂一如告命某年某月某朔某日某簡於黃籙齋壇告下長生符告文元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益算度厄尊神回骸起死監生大神超度某乙等亡魂如普度則云超度六道四生孤魂滯魄十方九幽一切等衆上登朱宫流火之庭玉眸錬質黃華蕩形書名紫䇿受化更生乘此金籙度命功德上生天堂一如告命某年某月某朔某日某簡於黃籙齋壇告下救苦符外封青紙來書後同正面元始符命金録白簡救苦真符告下具法位姓某謹封十方無極世界背面拔度某乙亡魂等長生符外封正面元始符命金籙白簡長生靈符告下具法位姓某謹封南方丹天世界背面超度某乙靈魂等設斛夜别告符簡二面救苦符告云拔度六道四生孤魂滯魄長生符告云超度六道四生孤魂滯魄二符外封並題云告下黃籙院玉清拔幽魂符告文簡闊三寸六分厚三分告文四行年月階位二行玉清寶籙拔度幽魂真符告下十方三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解亡過某及祖考億劫種親普及六道四生孤魂滯魄十方九幽一切罪魂疾除罪簿落滅惡根不得拘留時刻升遷萬神護送徑詣人天隨品受化更生福鄉一如告命風火驛傳太歲某年某月某朔某日某時告下具法位臣姓某承誥奉行外封青紙未書玉清籙拔幽魄真符告下具法位姓某謹封三界十方𡨋曹主者玉清破地獄真符告文告下之式一如拔幽魂符玉清寶籙照耀重泉地獄摧毀鐵城開宣元始符命時刻升遷北都寒池部衛亡過某乙形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與道齊并永度三塗五苦八難超淩三界逍遙上清一如告命風火驛傳某年某歲某月某朔某日某甲子某時告下具法位臣姓某承誥奉行外封青紙朱書玉清寶籙破地獄真符告下九幽酆都天牢地獄主者真法位姓某謹封又破獄符告文用黃紙高九寸或一尺長二尺四寸或一尺八寸朱書符文墨書告文臨破地獄時告下玉清寶籙破地獄真符告下北隂酆都內外宫洞三千六獄阿鼻地獄九幽地獄十二河源泉曲水獄大小鐵圍十方獄庭長夜隂關冥司萬神咸聽符命真文煥發照耀隂冥塗炭罷對考掠俱停爽火息焰氷消雪扃刀生玉樹劒化騫林疾除罪簿落滅惡根不得拘留亡過某乙等魂及一切囚苦罪魂乘此真符救苦功德速令出離覩見光明上升南宫受化更生一如告命風火驛傳某歲某年某月某日某時黃籙齋壇告下具法位臣姓某承誥奉行可漏黃紙墨書玉清寶籙照破地獄救度苦魂具法位臣姓某謹封方函青紙朱書玉凊寶籙破地獄真符告下九幽酆都天牢地獄主者具法位臣姓某謹重封生天寶籙太上敕赦生天寶籙告下十方三界九幽主者具法師階位姓某今據某鄉貫入齋至福佑見存本司據詞難抑謹取某月某日為始就某處建立靈壇關行齋法頒宜符命開赦九幽廣集善功總資超度除巳備奏上帝乞降敕命施行及奏諸天帝尊請降睿旨申三界真司牒合屬去處根尋亡過某乙等魂至期親朝壇陛懴雪罪垢祗受齋功尚慮所薦亡魂等衆業緣報對拘留獄庭莫諸齋壇參真聽法乞宣降太上敕赦生天寶籙開宥罪愆超離苦趣今凖敕命告下者已上俱黃紙朱書此空書符籙右奉太上生天寶籙敕赦亡故某乙等魂暨六道四生孤魂滯魄冥司地獄冥曹幽扃囚苦罪爽夙世巳來至于今日元因三業六根造諸罪惡或手弒君父不孝二親或誹謗大道背真從偽或傷殘兄弟謀害師尊或六親通同淫犯骨肉或為劫賊殺害人命或屠割衆生自饒一身或以強淩弱以貴虐賤或浮好三寶執心不專或輕慢法師穢賤靈文或心懷隂賊安忍嫉妬或惡口兩舌開亂善人或殺生淫祀裸露三光或心生或口語或自作或教他作積劫以來所有諸罪並與疾除罪簿落滅惡根不得拘留時刻升遷即使亡過某乙及一切罪魂七氣成真六儀運虛五靈續絶二曜扶衰旋罡躍空飛步雲宫胚胎有始塵劫無終金城孕質玉洞凝神真氣內飬以成真人上入太虛下洞幽泉雲宫寶闕中有真魂出入福鄉周旋生門咀嚼靈芝灌漱金泉甘露川流懸澍丹田紫霞朝映三氣凝煙瓊室化仙安座金蓮真儀掩日塵劫為年一如告命風火驛傳太歲某年某月某日某時告下具法位臣姓某承誥奉行天摳使相天機內相天機上相泰玄上相東極宫中太一尋聲救苦天尊萬劫應化真元教主太上老君巳上係白紙墨書可漏青紙未書太上生天寶籙敕赦亡過魂具法位臣池某承誥奉行謹封方函青紙未書太上敕赦生天寶籙告下十方三界九幽主者具法位臣某謹重封駒四六生天寶籙告文用黃紙闊三寸長九寸上留三寸書寶録下六寸書告文告文分五行墨書度六道四生孤魂滯魂等衆用太上生天寶籙超度六道四生孤魂滯魄出離幽夜隨果往生主者恭依符命施行歲次某年某月某日具位臣姓某承誥奉行外封皮正面太上生天寶籙告下黃籙院具位姓某謹封背文超度六道四生孤魂滯魄等衆九龍符命告文高九寸黃素朱書東極青玄救苦九龍符命告下三官九署五嶽九州酆都六洞十宫九幽河源泉苦五道都府九州社令𡨋關幽扃一切主者咸領符命拔度亡過某乙等魂及十方九野病死橫亡沉魂滯魄囚苦罪魂徑出隂翳永離幽𡨋地獄消苦開泰泉扃火翳滅熖刃毒摧傾下明黑暗上生朱陵超度三塗宿對停輪一如告命風火驛傳太歲某年某月某日某時告下具法位臣姓某承誥奉行可漏黃素丹書東極青玄救苦九龍符命拔度亡魂某乙等魂具位臣姓某承誥奉行謹封方函東極青玄救苦九龍符命告下三元十方九野地司隂曹萬神具法位臣姓某謹重封茭龍驛吏關靈寶大法司當司今據鄉貫某乙乞就某處崇建無上黃籙大齋正薦亡某普薦亡某旁及六道四生苦魂罪魄遷升福境今準元始符命寶籙真符告下十方無極世界一切冥司幽獄開赦所薦亡魂等衆出離地獄者一元始符命金籙白簡救苦真符二面告下十方無極世界一玉清寶籙拔幽魂真符一道告下三界十方冥曹主者一玉清寶籙破地獄真符一道告下九幽酆都天牢地獄主者一太上敕赦生天寶籙一道告下十方三界九幽主者一東極青玄救苦九龍符命一道告下三元十方九野地司隂曹萬神右開玄都茭龍驛吏青宫九龍符命使者地府賫簡童子地道功曹請疾速賫管前去速詣十方無極世界一切冥司幽獄去處告下一依元始符命施行故關年月日時關金龍驛吏關旡上黃籙大齋壇本壇今月某日準元始符命金籙白簡長生靈符告下南方丹天世界超度亡過某乙等魂上登朱宫者右關玄都金龍驛吏火府賫簡童子請交管元始符簡若干面疾速徑詣南方丹天世界告下一依元始符命施行故關太歲某年月日時關地道功曹關無上黃籙大齋壇本壇今準玉清寶籙破地獄真符告下九幽酆都天牢地獄一切去處開赦罪魂者右關地道功曹疾速賫管前件寶籙一函徑詣九幽酆都天牢地獄主者告下一依玉清符命施行故關歲年月日時關獻驛吏功曹等錢馬狀並依常式混元玉札告文用白絹三尺六寸或七尺以白紙背過高一尺二寸朱書玉札於前墨書告文於玉札後玉札見符命門天一北祚符命太一紫元神文玄冥混元神虎玉札告下無極神鄉上元天界泉曲之府下元水界北都羅酆中元地界九州分野十方世界仙宮星府地獄𡨋司天牢幽扃追取上件亡過某乙等魂魄精神速離所部來赴黃籙靈壇朝禮上帝領受殊恩神虎奉行萬神咸聽太歲某年某月某朔某日某時告下具法位奉行神虎攝召告命臣姓某承誥奉行可漏青紙朱書神虎五札追取亡過某乙等魂具法位臣姓某承誥奉行謹封方函青紙朱書混元玉札神虎玄冥符命告下十方世界千真萬靈效職之所具法位臣姓某謹重封右書篆玉札訖墨書亡人姓名於所屬星下人數多者具甲狀粘於前止以首度一名入玉札下𣸸等字神虎關黃籙大齋神虎攝魂壇一云北魁玄範府神虎追魂局本壇據鄉貫某人狀伏為薦拔亡過某乙併合門一切先逺普及六道四生孤魂滯魄等衆乞就某處開建黃籙大齋三晝夜今取某曰夜攝召亡靈赴壇懴謝罪愆依儀升度及取某日夜普設九泉六道一切鬼魂無礙夜齋除巳章奏上達三天告簡敷落九地外再開具所薦亡魂姓名生死年月殯葬去處連粘在前今準昆元玉札告下須至關行者右關神虎提魂攝魄倒生玄司玉女蔣等七人雄左玉曹主魂吏何雌右武鸞主魄吏喬等仰同追魂三使者賫持混元玉札神虎符命一道徑往十方三界千真萬靈效職之所追取前件亡魂并及孤魂滯魄等衆至期來詣黃籙靈壇昭顯報應領受殊恩不違時刻故關歲年月日時關具法位奉行神虎攝召事姓押又神虎關黃籙大齋神虎攝魂壇本壇同前關至須至關行者右關神虎上部追魂使者侯中部追魂使者魏下部追魂使者張隨從神虎大聖玉女賫持混元玉札神虎符命一道徑往十方三界千真萬靈效職之所餘式同前關結甲狀普薦甲狀依正奏門帳狀式開具黃籙大齋神虎攝魂壇今具所薦亡人及祖先眷屬附壇追度等亡魂姓名生死年月殯葬去處下項一正薦亡故某官某乙存目享年若干歲於某年月日在某處因患命過葬某處一附薦逐一開列家廟姻親等一附壇追度亡魂無外人附薦則不用開此逐一開列右具如前仰神虎承行將吏五女等逐一子細追攝不得違慢旁及六道四生孤魂滯魄九幽長夜一切苦魂並要依時赴壇明通報應以慿依科升度施行年月曰時具無上黃籙大齋立成儀卷之四十四
