front:
  text: 無上黃籙大齋立成儀卷之一鳯一
  hash: sha256:5937a16b044150bc28556e540dc0f2d43e8437af0b5bcb42b035015ad0a74433
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_001-001a, image: hfl/0278/0278-004.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編次儀範門序齋第一靈寶十部飛天妙書三十六卷生於元始之先空洞之中天地未根日月未光幽幽冥冥無祖無宗靈圖革運玄象推遷真文玉字元始登命太真按筆玉妃拂筵鑄金為簡刻玉為篇袐於玉京七寶玄臺紫警上宮衆真侍衛朝慶靈文生天立地開化神明上謂之靈施鎮五嶽安國長存下謂之寶靈寶玄妙為萬物之尊其量莫測巍巍太空舊科四萬劫一出皆傳宿有金名刻簡來生應為仙者玉宸大道君愍兆庶之塗炭哀地獄之苦惱殷勤懇請下降世間斯實齋法之祖也和天安地保國寧家度死濟生求仙學道共弘斯經難以言宣太上大道君告髙玄大法師曰夫來入吾法門上希神仙飛騰穹蒼次願家國安寧過度萬患消災滅禍請福求恩當先修靈寶齋上解宿世重過拔度惡緣下解巳身積行以來所犯罪愆勤行齋直坐致飛仙此治行之本求道之原學無此法徒勞心神宿根不解聖道泯泯古聞其言今希見其人矣太極真人曰靈寶無上齋皇老君天尊大聖常修奉不倦而況道士仙人可不翹慕之乎髙上老子曰道家所先莫近乎齋齋法甚多大同小異㓛德重者惟靈寶齋世希能學之矣學之者皆大乘之士前世積慶所鍾去仙近也清齋誦經仙道自成何必藏山藪也昔正一真人受命導世奉荷靈寶自以齋法旨趣淵微法禁森嚴非愚淺始學所可明了乃妙出五稱文撰立正一齋法目為旨教以遺祭酒籙生靈寶之教袐而不傳仙人口口相授太極仙公始筆之書著敷齋威儀之訣陸天師後加撰次立為成儀祝香啓奏出官請事禮謝願念罔不一本經文張杜二師繼出玄風益暢登壇俯仰之格相去雖數百年前後蓋一轍也至於痛庸師之不學憫流谷之無識非非相承其失不悟以簡便為適當以古法為難行則自張萬福天師以來嘗病之矣今世醮法遍區宇而齋法幾於影滅迹絶間有舉行之士又復不師古始信末師而哂前哲是流俗而悖經教壇儀乖踈科式舛謬甲造乙習遂成舊章切切用力於徼影響譎詭幻怪之間以為捨是則無以起信末俗而紫闕洪儀玄臺祕典所以度天人惠生死者竄易殆盡日就湮微可勝痛哉夫三洞諸齋莫不以神經為本懴謝為先登壇啓祝罔非龍漢舊文依文而行是為齋法今將十部妙經三洞經科靈寶玄範及留沖靖所傳古齋一宗軌儀行遣參以所受法訣考證編次修為成書合三十六卷以上追張杜二師之遺躅仍以齋法修用一門總其綱領訂其疑誤各釋經文之所從出隨事為之辨正庶俾結齋之士得所遵承據文便可施用雖非親遇太上面授儀則然經文昺著足為章程道由人弘何有不可天尊告太上道君曰吾於龍漢之中與三寶相隨逮至赤明世世出化教道三乘巳得道過去及上聖大神諸天帝王妙行真人莫不承範威儀修行大法以成自然君今方當試教三代探索真文宜備天儀開度羣品使有心者得成神仙靈寶三元宫中有三部威儀合二十四條上元總真中元總神下元總仙上應二十四真中應二十四神下應二十四氣八景三部元始之宗今悉以相授其道尊重謹勿輕傳來世運促人心破壞必生異念不信經法吾經當還三元宫中須至清氣三代交際龍精乘晨世道太平吾經復出下世開度今真文祕典尚留下世未還三天正使真仙復出現世亦知不易斯文也齋法品類方便多門禮祝啓願隨用或别至於威儀俯仰之格相逺不能以寸大要不越諸此苟能以清虛為體恬淡為用安神定氣心府泰然思神念真依儀行事以之祈真真必降矣十部妙經靈寶諸齋之祖建齋之時施鎮壇內供養尊禮所不可闕留沖靖有云以三洞真經為道本以十方懴謝為真誠精思九朝密投三簡斯言盡之矣行齋之士當職參三洞身受上法庶於齋事無所窐礙儻冒時宜行自速玄憲耳然十部妙經世亦罕備且有終身不得盻其篇目者敬開具安鎮齋壇合用神經如左儻使經教流布世間則齋法庶不泯沒矣齋壇安鎮經目凡靈寶齋會皆可施用太上靈寶元始五老赤書玉篇真文天書經洞玄靈寶赤書玉訣妙經洞玄靈寶運度大劫經洞玄靈寶丹水飛術運度小劫經洞玄靈寶天地運度自然妙經洞玄靈寶空洞靈章洞玄靈寶玉京山步虛經洞玄靈寶自然九天生神章洞玄靈寶無極大道自然真一五稱符經洞玄靈寶諸天內音自然玉字洞玄靈寶八威召龍妙經洞玄靈寶智慧上品大誡經洞玄靈寶智慧罪根上品誡經洞玄靈寶三元威儀自然真經洞玄靈寶長夜之府九幽玉匱明真科洞玄靈寶智慧定志通微妙經洞玄靈寶金真法輪誡業本行上品妙經洞玄靈寶玄一三真勸誡法輪妙經洞玄靈寶無量度人上品妙經洞玄靈寶諸天靈書度命妙經洞玄靈寶滅度五錬生尸妙經洞玄靈寶三元品戒功德輕重經洞玄靈寶宿命因緣明經洞玄靈寶仙公請問經洞玄靈寶仙人請問本行因緣衆聖難經洞玄靈寶道引三光妙經洞玄靈寶三部八景神仙二十四生圖經洞玄靈寶飛行三界通微內思妙經洞玄靈寶藥品洞玄靈寶芝品洞玄靈寶變化空洞妙經洞玄靈寶消魔寶真安志智慧本願大戒上品妙經洞玄靈寶真文要解經洞玄靈寶太極真人敷靈寶經文齋戒威儀諸要經訣洞玄靈寶齋説光燭戒罰燈祝願儀建齋總式第二經曰開度七祖救拔三塗黃録大齋最為第一應驗開度先審其人實誠態切皈依信向在於科法甚為宣行方可許其奉示以投狀式并齋中法信狀建壇要在洞天福地靖廬名山玄壇宫觀不經兵陳戰場屠坊刑獄生産冢墓穢惡之地仍卜三元八節五臘三會等日啓齋更符庚申甲子四始十直天恩天赦名曰良日若專度祖先則要在亡者七七百日大小祥逺忌之日相合齋主營辦齋中法信訖携詣師門投拜請師受狀畢即引齋官詣道前取信香焚以啓奏既承投詞嚴命同學同志同學謂上道同壇同師之友同志謂同其志普為幽明者苟非具人和氣不生有墮功果共建齋功受詞之後師與齋官弟子冥心一意專以開度為念修文修事悉令具足不使臨用有闕擇日建立齋壇壇心三寶位上施帳座寶蓋中安神經內壇設十方香案播花燈纂鋪設如法有圖壇前左右分立六幕式中置九幽神燈或於天門上壇外四圍依法然燈有同壇之東南鋪回耀輪燈有圖壇之東北鋪九獄燈有壇壇之左序立錬度堂供養煉魂聖位壇之右序立神虎堂供養攝魂聖位壇之東南設受度堂即齋主家九祖亡人位次遙對壇所壇之後正靣鋪設道場列上帝御座於中兩旁列醮筵聖位於道場前左别設正一師位供養天師玄師女師嗣師系師又别設從章靈官位供養寶章中仙寮靈官等未開啓齋亶前允進章奏並於道場內行事壇前向外立土地承差監臨正神位前期三十二日或二十四日更看所度亡人多寡為則關召功曹符使土地預告三清玉帝天皇北極東極五師三官天樞院地水嶽府天下都大州縣城隍堅立寶旙告盟三界有式闢一處為誦經室開啓轉經宣開啓疏自此逐日精專修誦度人上品生神寶章金籙度命得道救苦諸經禮誦朝天九幽懴法稱揚玉皇寶號太乙天尊十方洞靈睿號以多為功印造焚化功力有限自此師與齋官等入靖對齋不交外事前期十日七日亦可量事為之正奏三清玉帝勾陳紫微后土東南二極九幽朱陵洞淵真王十方五老九天上帝三十二天木公金母申日月二宫五星四曜五方五斗南北二斗五師三官靈寶監齋正一三師三省五府三元四聖九天天曹諸真天真皇人飛天神王雷霆真宰十極真人南昌上宫符命經籙水府都水監五嶽四瀆九江九壘地府洞天太歲尊神龍虎君等牒天下都大城隍州縣城隍係祀正神諸道諸獄九州社令蒿里相公水陸關津五方境界𡨋關幽路五道大神六道都案監壇正神關本司官將劄司命土地專牒三界直符神虎追魂使者賫持公文預詣地水職司根尋係薦亡靈請領赴壇伺候開度次立遷神超度等旙有式開奏已訖法師書篆開度符籙先期七日或五四日於道場內拜奏啓告玄穹解穢寶章以次進拜酆都赦罪章告行元始符命救苦真符玉清拔幽魂真符破地獄真符太上勑赦生天寶籙青宫九龍符命接續進拜開通道路沐浴錬度諸章前期兩日法師預集羽流登壇演習威儀先正齋一日臨午聲鍾壇官齋主威儀執事祗請法師入靖默堂各先議定職次僉書職狀依班序立請法師就座齋主九禮三伏長跪座下致詞請師升壇俟師允請贊引法師升髙座祝香敷座啓盟畢事下座書結盟狀知職榜引法師出堂立幕齋官同師至玄師堂中上香請玄師下降點酌宣疏讀結盟狀一就焚燎五帝幕請五帝下降點酌宣疏讀結盟狀一就焚燎次天師幕請天師下降點酌宣疏讀結盟狀疏焚燎如上儀留結盟狀在幕次三師幕請三師下降如玄師幕之儀次三官幕請三官下降如五帝幕之儀次監齋幕請監齋下降如三師幕之儀旋至外壇戶外序立壇下法師率衆各執水盂楊枝誦淨天地呪以次升壇灑淨畢依法禁壇至神虎堂關發玉劄落景法師升壇分燈侍燈依式然點令內外周遍法師退歸靜默堂齋官弟子具威儀祗請法師升壇宿啓法師齋官參謁六幕先五帝次三師監齋三官天師次玄師幕法師率衆官列班序立玄師前齋官上香捧詞函自述修齋意訖度詞法師法師受詞告齋吟道讃次讃引至都門外序立壇下法師上香啓白侍經宣啓壇疏焚燎壇外鳴金鐘玉磬依法升壇旋至地戶法師密呪入戶率衆官以次升中壇至天鬥法師獨升內壇上香行事依科宿啓敷露真文宣靈官疏説戒輔職宣禁回幕參謝紏過依法禮燈召靈沐浴引靈朝禮送靈歸位諷經呪食第一日正齋參謁六幕依科三時行道二上轉經每朝引靈至壇下參期三寶懴謝罪愆發盧出官畢引靈朝壇六謝畢引靈復位靜夜法師至九獄神燈前祝告王清破地獄真符依式懴燈誦九清𣑽唱破獄呪持䇿杖發符破獄有儀或宿啓夜夲攝召先為之尤妙禮九幽神燈懴回耀輪燈第二日正齋行道如第一日之儀靜夜普召九泉六道全形沐浴設斛錬度施戒傳符第三日正齋行道如第二日之儀晚朝進升度亡靈寶章靜夜宣行錬度變錬亡魂傳授九真妙戒告行長生靈符給付劵誥斬滅三尸飛度五戶升上法橋牒天門守禦諸神保舉亡靈上登天府第四日侵晨或先一日亦可關發設醮請狀奏三清上帝申三官大帝冠日進投龍簡依式次第散壇進拜言功朱表還戒納職奉辭三寶解壇下榜次辭五帝三師監齋三官天師次至玄師前回向禮謝拜送徹幕瘞簡投龍齋官弟子禮謝法師受禮至夜設醮謝恩進奉車輦錢馬功德都疏三清玉帝靈寶五師言功三官申東嶽回兵牒城隍回祠出給照劄付功曹土地等依格推功竣事法師歸堂弟子拜謝交賀禮成鎮信第三經曰古人淳朴懷道抱德不貪不欲各足於身但用志誠自可通感不須財寶玄合天真末代時澆人民矯詐唯吝財貨不識因緣賤命重財亡家破國內懷萬惡外結凶犴相繼滅亡末曾自悟念是之故令遣散之一則外賊不起內外安靜衆禍消除所以質信效心以財為首財既可捨心亦隨之聖善明通隨夫心意髙天厚地玄聖上真非信不通非心不感通感之至在乎信焉金龍十三枚十枚鎮十方三枚隨簡投之金龍各重一兩長三寸六分國家用上金公侯大臣次金士庶銀銅塗金並可通用科曰龍者上天之驛騎也傳送通感龍驛為先負簡即騰信三官效誓即告盟十極鎮信之法以龍為首關者考屬隂官曹鎮綵十一段十段十方一段命信東方青紋九南方絳紋三西方白紋七北方皂紋五上方碧紋三十二下方黃紋三十二四維黃紋各一十二十方合一百三十六天子匹數諸侯丈數士庶尺數本命紋繒天子諸侯紫色士庶以本命納音色匹丈尺數各隨本命外加一以表延生之信科曰紋繒者顯五行之色象十方之氣降十天致五帝通真效信請命祈靈不可闕也闕者考屬天官玄都曹鎮十方紙墨筆硯一十副紙每方用一十二幅科曰建齋行道或救拔億曽萬祖先後亡靈或請福祈恩消災謝過則四司五帝三界十方紀録善功校定罪名當以紙筆為録功紀善之籍質信於十方不可闕也闕者則十天五帝不録其功九幽三官不除其過闕者考屬三官曹鎮十方香花十柈科曰香者以通感為用隔氛去穢花者以鮮潔為美表瑞效珍請福祈真香花為本香以沉水降真花以香潔木生者無花可用五綵剪成以鎮十方不可闕也闕者考屬隂官曹鎮米二斛四斗或一斛二斗科曰米以鎮信天官增加品祿闕者考屬天官曹鎮油二斗四升科曰油者隂類也隂中生陽以油鎮隂官續陽景闕者考屬隂官曹鎮炭二十四斤科曰炭者陽類也陽中生隂以炭鎮陽官資隂氣闕者考屬陽官曹鎮錢一萬四千或二千四百或一千一百科曰金錢一萬四千以代上金之信質心三界告盟十天闕者考屬天官玄都曹槿木簡三面簡各長一尺二寸闊二寸四分厚二分科曰簡者記也告也記世之功告盟上真上下正方天子以玉為之玉有九德禮天地之信也餘皆槿木為之或柏木丹界五行丹書國號年月建齋之所及法師姓名投於名山大洞靈泉龍穴及齋壇之中告天地水三官使著明齋事奏于上境闕者考屬地官九都曹鎮十方玉璧十枚投龍璧三枚十方璧各徑二寸四分厚二分圖形虛中科有正潔之德可以盟感上真故以為信若投龍簡當以青絲金鈕纒而副之青絲以代割髮金鈕以代歃血上告三官也投龍璧天官蒼璧圓形地官黃璧方形水官黑璧六出形闕者考屬地官九都曹投三簡金鈕二十七枚投簡之法當用金鈕以副于簡三簡用二十七鈕各徑九分圜其外如圜之刑國家用金臣庶以銀銅塗金龍簡璧鈕式詳見齋法修用門威儀第四科曰太上三尊居玄都玉京之山亡寶玄臺紫微上宫十方世界上聖髙真一日三來旋行朝謁執符把籙建節持幢吟詠洞章燒香散花奏鈞天廣樂鸞唱鳳舞萬真稱慶三界齊歡今之齋法登壇朝奏吟詠步虛一象玄都玉京也威儀法式莫不備焉節一對五色絲為之上下五層懸竿頭上金鳳㗸綬帶幢一對珠蓋珠網八角一層懸朱竿木胎左龍右虎龍虎㗸綬帶旌一對似節無龍鳳綬帶三層五色絲為之懸竿珠旙一對珠錦玉珮金鳳㗸之懸竿五明扇一對以木雕成金彩裝上布星斗中列五嶽下繪海瀆竪以朱竿鶴羽一對以木刻成鶴翅竪以朱竿香爐几案禋席二十副三寶一十方十髙功都講奏案各一六幕六壇外香案一此是齋壇所需之數他處所用不在此數內章函章案函槿木或柏木梓木為之長一尺二寸八分方閣二寸八分正中上下開三印池案副之赤松子曆云章案長二尺二寸髙八寸仍須曲腳以柏楠梓木為之違科奪算龍頭書刀削治名籍輟惡舉善落死上生齋章之中此亦為最可刃長六寸柄作龍形刃以古鐵為之柄以銀六錢為之拜表用不可闕燈燭行道禮誦燈燭為急非惟啓奏所須抑亦消禳所用經科具有多寡要在隨力所營或止依金籙簡文所載然之照曜諸天續明破暗下道九幽地獄上映無極福堂功德之中此最為上或兼諸香液雜以蘭膏各令合儀自然降福其燭十方各一三寶前二奏案前一六幕等處隨力設之然燈所以續明照夜太腸巳出當令侍燈法師依法滅燈今世日中亦然燈燭所當革除無上黃籙大齋立成儀卷之一
