front:
  text: 無上黃籙大齊立成儀卷之三十竹十
  hash: sha256:c53027c26362dce477b82ab5600ade3bf65e060d5effb87704425b34f64e3361
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_030-001a, image: hfl/0284/0284-116.png}
body:
  text: 太上執法仙士蔣叔與撰科儀門靈寶普度大齊加持斛食儀法師自浴室引魂入茭郭舉光明頌巡繞茭郭一周次道衆序立卧延所法師祝香此一炷香先天立本後地盤根景散十華上徹森羅之境煙凝九氣下通冥漠之鄉普被含靈遍周法界以今奉為齊官某人入齊意普為六道四生孤魂滯魄修設清淨無礙夜齊焚此寶香供養無極大道三境帝師至尊經寶諸天上聖三界真宰十鄉威靈伏願䇿景淩空盻祥雲而下鑒傾光回駕泛瑞靄以來臨見前受度衆靈凝神滌慮念道歸真頓悟宿因俾塵緣之永斷薰陶法澤知覺性之本空直須目見耳聞鼻通心解三塗五苦不離清淨之根六趣九幽盡屬光明之界永除染著俱獲逍遙稽首皈依無極大道吟普獻頌普獻無邉聖香煙散十方願成七寶臺垂光五濁世運度天人衆咸今上法橋同㑹至無為勤修不退轉法師上香存變依靈寶本章行將化身為𢧐苦天尊壇衆為敕苦真人斛莛所為三層寶臺斛中紅紫光氣上冲夭監臨將吏里社神司四方守如法次存三寶大帝太極慈尊十方救苦真人日月生真三界主宰金童玊女靈官功曹將吏一一分明然後上啓具法位臣某焚香上啓妙無上帝自然元始天尊無上道寶妙有上帝虛皇玊宸大道君無上經寶至真大帝萬變混沌玄元老君無上師寶東極太乙救苦天尊十方尋聲救苦天尊五老上帝三十二天帝君日官太陽帝君月官太隂皇君五方五德五星君北斗七元星君南斗六司星君靈寶經籍度師真君玄中大法師君三天大聖師君太極仙公真人三省五府真宰虛空監察香官使者當境土地里域真官三界應感一切威靈臣聞六道循環未難輪回之海四生飄浪難超解脫之鄉河沙十類之魂長夜九泉之魄展轉受報脫化無期嗜欲重而飢渴生神智昏而憂惱集一沉苦趣永隔陽光非慿三洞之真詮莫遂九泉之生路玄真哀憫大道垂科開夜齊普施之門度苦海流吹之識慧光照燭攝化億千注力加持遍周法界臣今奉為齊官某正普薦亡親某乙在會衆魂旁及六道四生孤魂滯魄開建無上黃籙大齊用資起度恭取今宵普設太上慈悲無遮無礙廣大平等清淨斛食一筵先用供獻十極十華三元三界飛天大聖應號慈尊日月星辰江河海嶽泉鄷土壘一切威靈共賜鑒歆同垂證度三華寶曜錫三景之明輝八㑹雲章集八天之梵氣降流壇場之內灌慨法食之中俾六道四生一切孤魂等衆享食承供六欲靜而百體豐聽法聞經一性圓而萬神集惡根滅對業道停輪咸登自在之天長處福堂之界臣無任激切懇禱之至當職道士灑淨祝曰泠汵甘露鐉法味難思議騫香流七𤤽冥冥何所疑受此法食施生天登紫微悲夫長夜苦熱惱三途中猛火入咽喉長生飢渴念一灑甘露雨如熱得清涼神魂生大羅潤及於一切自然天廚食法味難思議普濟六道中鬼神未濟者盡霑甘露味咸皆得飽滿於此妙㑹中遍及於一切生天登紫微上升清都官存天門金光道氣百千萬重綿綿而降注巳身及斛食水盂之中映徹內外太上三尊青玄上帝十方衆聖在空玄中為作澄請三寶按人各恭信法師白云希夷莫測獨居象帝之先恍愡難明肇目太初之始剖分一氣開張萬真惟大道之尊崇作衆生之恃岵以今嚴陳淨供式闡玄科冀道寶之垂慈俾幽靈之受度仰希昭鑒俯賜證盟法衆䖍誠志心奉請知職道士舉志心奉請十方道寶降臨壇所皈依無上道至真大慈尊普願諸衆生咸證無為果法師白云琅書玉字空生自然之先金簡瓊章氣結飛玄之始保制劫運普植神靈惟三洞之尊經作十方之真寶以今嚴陳淨供式闡玄科冀經寶之垂慈俾幽靈之受度仰希昭鑒俯賜證盟法衆䖍誠志心奉請知職道士舉志心奉請十方經寶降臨壇所皈依玄元始三十六部經普願諸衆生得入三乘道法師白云分身下化為生死之津梁立法度人作真仙之梯磴汲引四輩開導三乘惟億劫之真師寶人天之慈父以今嚴陳淨供式闡玄科冀師寶之垂慈俾幽靈之受度仰希昭鑒俯賜證盟法衆䖍誠志心奉諸知職道士舉志心奉請十方師寶降臨壇所皈依玄中主大慈無上師普願諸衆生常聞師寶訓願汝皈依無上道願汝皈依無上經願汝皈依無上師和不可思議功德法師啓白至心奏啓東極宫中大慈仁者尋聲赴感太一救苦天尊臣聞委氣聚功太上著度生之典尋聲赴感慈尊標救苦之名威神遍滿於十方誓願普拔於一切俾承道力得離迷塗臣今伏為齊官某正普薦亡親某乙在會衆魂開建無上黃籙大齊恭取今宵普設六道四生孤魂滯魄無遮無礙廣大平等清淨斛食夜齊一筵伏望大慈特回真馭鍚之景曜燭以威光敷慶雲以開生施祥煙而塞死還將上天之氣濟此九幽之魂寶號稱揚三塗聞知而離苦靈章誦詠六道受度以超凌仰賴至仁俯垂洞鑒再慿清衆請為讃揚太一救苦天尊四聲誦救苦經一遍存五色光明現於東方圓像如月暈之狀遍照天上地下十方世界無不洞明中有青玄上帝頂俯仰碧玉冠衣飛青翠羽離羅帔左手擎碧霞琉璃寶鍾右手執空青羽枝坐九色九頓獅子金翠蓮花之産獅子口中各吐火焰園繞身光天尊於光焰中别有九色圓像如虹霓項有圓像如日從太一八十一神左右二真人天丁力士青玄功曹黃籙童子玊女神王頂出白毫慧光鋒芒外射如千萬鎗劒之像一一分明流注斛食志心奉啓三十二天帝君臣聞元始開圖真陽布化雖資生於妙有實總氣於上元色界以還均為輪轉福緣報盡則或代終惟八㑹之真文隱諸天之大梵功超萬品澤普九幽臣今伏為齊官某正普薦亡親某乙在會衆魂開建無上黃籙六齊恭取今宵普設六道四生孤魂滯魄無遮無礙廣大平等清淨斛食夜齊一筵仰祈霄馭下鑒塵寰昭錫天光降流法食大千世界資梵氣以攝化無窮億劫沉魂仗真乘而受用充足庶俾元精之化育益增弘覆之髙明清衆運誠同聲讃詠諷隱語一遍結三塗五嶽印想道衆皆為真人同諸天帝君齊聲諷誦每一方畢存本方氣東九南三西七北五條如數從各方來灌注斛食吸吹水盂中再依前誦隱語一遍存黃氣十二自五方來日月五星之光上引三十二天之氣交映羅絡灌注斛食再誦隱語三遍存四方紅光罩壇良久混成五色虹霓下注兆身口五藏之間復混為一大圓象廣大覆蓋遍滿虛空兆身如在日宫其斛食自一生二二生三三生九九九八十一攝化無窮遍滿十方自地至天廣大無量次沉變食符水盂中誦甘露通真呪三遍師擎水盂以柏枝旋繞遍灑斛食存青玄上帝同兆真人及官君等皆誦甘露真言灑其甘露香氣馥郁遍滿充足功德金色光微微開幽關華池流真香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寶㫖自在天堂遊次誦破酆都地獄開業道呪三遍道衆旋繞法師居位凝神存東北方酆都九幽諸大地獄等一切罪魂受苦萬狀次存泥丸中玉清上帝御於寶座依大法行持同兆真人等及靈官將吏皆誦破酆都地獄開業道呪良久上帝口吐九色慶雲紫氣金光直指地獄照破重隂鐡城摧毁枷鎖解脫刀劒變為青蓮鑊湯化為春圃重𡨋九地盡為淨境所有罪魂並皆出離前詣壇下伺候開度茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲輿定慧青蓮花上生神永安上來加持法食無量勝因用薦幽魂升遷福境汝昔大患為有此身身有飢虛以食為念身今安在何以食為寒暑為苦以衣為念身非汝有何以衣為以食以衣財寶為念飢虛寒暑了不相關若財若寶亦將焉用六塵幻妄種種歸空見前衆靈色身巳滅猶有愛樂念未斷耳汝能解空見性絶妄歸真不著有無自然起脫如或塵根不斷業想未除見以飢渴為苦者即饗我無礙甘露法食十方救苦天尊靈寶普度大齊施斛宣演法語儀法師上香就坐望鬼門鋪設普告十方無極世界一切天人等衆一切飛空大力鬼神等衆一切地獄苦魂等衆一切畜生業纍等衆一切無主孤滯等衆蓋聞善惡二緣報殊苦樂死生異道隔以幽明汝等𦆵捨䕃身即淪鬼趣但和飢渴之逼孰救枯槁之餘況有受罪之苦魂根塵障礙一萌中心之食念業火熾然今者法會載陳幡花迎召化兹妙淨之供濟汝苦餒之形汝等聞命饗臻應時囖至歡言盛饌慰若平生老幼携手而扶將少長差肩而先後無譁就列既飽為期上承道法之慈悲普同供養下體齊修之願力無有遐遺當興難遇之懷勿生有限之想歸依真道度脫此身捧腹相歡如有屬饜之量省心知愧似聞歎息之音今為汝等一切鬼神設無量齊加持法事當職道士吟玉清慧命啓請法言曰師上帝訣稽首明慧虛無尊稽首皈命重元主裁成天地無德稱悉為衆生作恃怙慈濟五道轉輪魂哀救三塗地獄苦皈命金闕天中尊皈命六度慈悲父皈命玉清無上真以離生死長綿綿出有入虛無所待能令枯朽變成仙千劫萬劫難一遇為衆廣說業因緣回骸起死永長存使其形神無邊遷出玉清次施食雲廚妙膳餌之者䇿景淩虛紫府靈文聽之者成真得道今汝等錬形濯質攝氣成人既詣法筵各須霑足奉為汝等上資往生仙界念玉清甘露加持法食呪稽首仰圓羅合景挹靈芒拘魂制七魄思審定中央行往禮虛無寢息宴玄房飢飱黃碧花渴飲瓊根漿神旌命大魔合體錬真光復照觀太無常在空中遊圓通泯波濟真化靡中期窅眇無終始行者當明知寂寥忘理教應運闡弘規降道不自照要當先所施㑹歸無二處隨心自合離出王清經金聲垂教玉冊流科垂濟死之津梁作升仙之梯磴須慿慧力出離遠途俾性智以圓通得身心之清淨麕為汝等上資往生仙界念三光法氣呪浩晶生法氣氤氳凝天中兩曜共澄徹五緯相交通三光煥巳明寶氣盈三宫帝鄉會九老咽服百體豐金華照光景身與日月同念道上聖前萬劫壽無窮三光煥耀㑹九老於帝鄉五緯交羅棲萬神於真宅咽嗽玉醴咀嚼靈芽九竅既巳開通百關當遂調理奉為汝等上資往生仙界念三光流精呪妙道分一氣氣中分隂陽凝化日月星燦然流三光九華舍九道八色怡八方煥爛洞真體流精歸太茫下生淵泉宫上列無何鄉縱體復飛跡匆然都相忘七寶流精潔混沌雜華芒咽服九雲散此樂殊未央法航接引度五苦之沉淪慧露清涼蠲三塗之熱惱消除罪垢須仗真詮奉為汝等上資往生仙界念三光澤嬰呪玄絶九氣中澤嬰生太無鬱儀煥暘谷結璘曜天衢五星流寶光手極回乾樞飛氣鬱勃散咽御方踟蹰超跡天寶階錬芝服華敷氣布萬神㑹舉形升太虛元始開圖真文現世慈尊接引勝範宣流以能廣潤衆生故名甘露以能破除業障故曰法言汝等久墮苦輪不聞正道由妄緣之假合致本性之昏蒙欲超證於真常當返生於魂魄奉為汝等上資往生仙界念玉清隂生梵唱呪靈芝無根衆化之原中凝七魄上結三魂二十四真出入無門杳𡨋之中恍惚無精隨劫存亡逐氣而生外凝渾朴內養七經五神植華三台敷榮紫闕素童返形歸嬰騰雲而升逞霧浮空中有玉真號曰神公左挾無英右衛白元玄獸過後丹禽擁前上浮翠蓋下湧金蓮香雲凝空甘露無窮用之無盡尋源不終上來宣演靈音法契玉匱玄章聲聞十極恩周三界道氣隨呪下降恩光符合周流溉入法食普令清淨得享之者障業永消五藏華敷百關調理壽命無盡形同太虛功德深重不可思議各各當發大慈悲心普同一切悉皆霑足身心清涼無復熱惱身心飽滿無復飢虛身心安泰無復憂苦身心無脫無復輪回苦樂福報者轉此以食普獻諸天乃至普施一切孤窮使無障礙如是則為不負我十方天尊廣度況淪普拔幽暗之意當願施者受者俱沐道恩同臻福果今我天尊有破地獄離苦升天神呪為汝衆等一心諷誦功德不思議行者生福報施與法飲食永生安樂處上來施食巳畢更當普為汝等說真實法依慿修習用作津梁在昔空無始生三氣三氣凝結而為三天三化為九九復生三三十六天由兹分列下極九壘土水及風二十七重更相持擎亦三十六上應於天復有元氣之根包承無極兩儀既立人處其中因與天地分氣而理氣有聚散物有生死從生入死萬物常然不死長生是為真道道分三洞教闡三乘廣說因緣開悟群有天人神鬼皆可修習隨其願行各證果位積功為漸纍德為基功滿德充身超三界三界天人夀考優劣一一不同修行精祖一一有異自微至著漸契道真從凡人仙歷真成聖超此界者方入三清始登極果是為長生不滅之道也一切衆生迷於道真久習顚倒心想雜亂隨逐諸塵捨一取一無暫休止惑於所有味於所無業纍因緣以此而發招引罪垢歷世彌積輪回三界漂浪忘返流轉五道長淪弗悟嬰抱痛毒不能自知大道流形品彚雜揉氣不可極數難可窮死而復生幽而復明天地運輪如車之輪純一道氣本無生滅設為天人夀億千萬不明道本為欲所拘期盡有終復當退墮四生五道六趣三塗展轉輪回無有息處若復汝等於諸法中生有見心捨於穢土求三清樂捨衆生身求真道相欲斷煩惱而入無為求離諸見乃得寂滅如是等相我說汝等名大邪見譬如愚人畏於大地而欲走避所至之處不離大地衆生亦耳畏生死身疾捨三界有心厭離所得之身不離生死如是衆生未能見法一切衆生無明重暗真道在身莫能覩見又如愚人東西馳走求覔空色而不能知即色是空一切世間亦復如是心生馳走欲求道真不知身心即是真道我今宣示汝等令知將來三清不離煩惱今知大道不在他方但觀身心修習正道自然解脫真道相者名為不作無起無滅非有非無非常非斷非大非小非色非心若能體此名為修習真道正行如上所說並是三洞真實法語可為一切天人鬼衆修正之階今依玄科普設淨供敷弘至妙開化沉淪伏願汝等於此會中起皈依心行清淨行絶輪回道起解脫門廣積善功進登道果復慮汝等不除三業尚蔽六情未契法言難超淨境恩惟太上開濟無邊垂錬度之洪儀說九真之妙戒防非護性攝氣歸真升魂九天超神三界當依科式次第宣傅少憩靈壇以需開度次起立回向向來設斛功德無童勝因資薦衆靈成無上道為上因緣念大聖元始天尊太上大道君太上老君不可思議功德次請降真水真火錬度如儀無上黃籙大齊立成儀卷之三十
