front:
  text: 无上黃籙大齋立成儀卷之三十竹十
  hash: sha256:6452ffadbbfeaa742fb908852fe12614d08a249afb559399bbc11505575f86e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_030-001a, image: hfl/0284/0284-116.png}
body:
  text: 太上執法仙士蔣叔與撰科儀門靈寳普度大齋加持斛食儀法師自浴室引魂入茭郭舉光明頌廵遶茭郭一周次道衆序立卧延所法師祝香此一炷香先天立本後地盤根景散十華上徹森羅之境煙凝九炁下通㝠漠之郷普被含靈徧周法界以今奉爲齋官某人入齋意普爲六道四生孤魂滯魄修設清淨無礙夜齋焚此寳香供養無極大道三境帝師至尊經寳諸天上聖三界眞宰十郷威靈伏願䇿景淩空盻祥雲而下鑒傾光廻駕泛瑞靄以來臨見前受度衆靈凝神滌慮念道歸眞頓悟宿因俾塵縁之永斷薫陶法澤知覺性之本空直須目見耳聞鼻通心解三塗五苦不離清淨之根六趣九幽盡屬光明之界永除染著俱獲逍遥稽首皈依無極大道吟普獻頌普獻無邉聖香煙散十方願成七寳臺垂光五濁世運度天人衆咸今上法橋同㑹至無爲勤修不退轉法師上香存變依靈寳本章行將化身爲𢧐苦天尊壇衆爲敕苦真人斛莛所爲三層寳臺斛中紅紫光炁上冲夭監臨將吏里社神司四方守如法次存三寳大帝太極慈尊十方救苦真人日月生真三界主宰金童玊女靈官功曹將吏一一分明然後上啓具法位臣某焚香上啓妙無上帝自然元始天尊無上道寳妙有上帝虚皇玊宸大道君無上經寳至眞大帝萬變混沌玄元老君無上師寳東極太乙救苦天尊十方㝷聲救苦天尊五老上帝三十二天帝君日官太陽帝君月官太隂皇君五方五德五星君北斗七元星君南斗六司星君靈寳經籍度師眞君玄中大法師君三天大聖師君太極仙公眞人三省五府眞宰虚空監察香官使者當境土地里域眞官三界應感一切威靈臣聞六道循環未難輪廻之海四生飄浪難超解脫之郷河沙十類之魂長夜九泉之魄展轉受報脫化無期嗜慾重而飢渇生神智昏而憂惱集一沉苦趣永隔陽光非慿三洞之眞詮莫遂九泉之生路玄眞哀憫大道垂科開夜齋普施之門度苦海流吹之識慧光照燭攝化億千注力加持徧周法界臣今奉爲齋官某正普薦亡親某乙在會衆魂旁及六道四生孤魂滯魄開建无上黃籙大齊用資起度恭取今宵普設太上慈悲無遮無礙廣大平等清淨斛食一筵先用供獻十極十華三元三界飛天大聖應號慈尊日月星辰江河海嶽泉鄷土壘一切威靈共賜鑒歆同垂證度三華寳曜錫三景之明輝八㑹雲章集八天之梵炁降流壇場之内灌慨法食之中俾六道四生一切孤魂等衆享食承供六欲靜而百體豊聽法聞經一性圓而萬神集惡根滅對業道停輪咸登自在之天長處福堂之界臣無任激切懇禱之至當職道士洒淨祝曰泠汵甘露鐉法味難思議騫香流七𤤽㝠㝠何所疑受此法食施生天登紫微悲夫長夜苦熱惱三途中猛火入咽喉長生飢渴念一洒甘露雨如熱得清涼神魂生大羅潤及於一切自然天廚食法味難思議普濟六道中鬼神未濟者盡霑甘露味咸皆得飽滿於此妙㑹中遍及於一切生天登紫微上昇清都官存天門金光道炁百千萬重綿綿而降注巳身及斛食水盂之中映徹内外太上三尊青玄上帝十方衆聖在空玄中爲作澄請三寳按人各恭信法師白云希夷莫測獨居象帝之先恍愡難明肇目太初之始剖分一炁開張萬眞惟大道之尊崇作衆生之恃岵以今嚴陳淨供式闡玄科冀道寳之垂慈俾幽靈之受度仰希昭鑒俯賜證盟法衆䖍誠志心奉請知職道士舉志心奉請十方道寳降臨壇所皈依无上道至眞大慈尊普願諸衆生咸證無爲果法師白云琅書玉字空生自然之先金簡瓊章炁結飛玄之始保制劫運普植神靈惟三洞之尊經作十方之眞寳以今嚴陳淨供式闡玄科冀經寳之垂慈俾幽靈之受度仰希昭鑒俯賜證盟法衆䖍誠志心奉請知職道士舉志心奉請十方經寳降臨壇所皈依玄元始三十六部經普願諸衆生得入三乗道法師白云分身下化爲生死之津梁立法度人作眞仙之梯磴汲引四軰開導三乗惟億劫之眞師寳人天之慈父以今嚴陳淨供式闡玄科冀師寳之垂慈俾幽靈之受度仰希昭鑒俯賜證盟法衆䖍誠志心奉諸知職道士舉志心奉請十方師寳降臨壇所皈依玄中主大慈無上師普願諸衆生常聞師寳訓願汝皈依無上道願汝皈依無上經願汝皈依無上師和不可思議功德法師啓白至心奏啓東極宫中大慈仁者㝷聲赴感太一救苦天尊臣聞委炁聚功太上著度生之典㝷聲赴感慈尊標救苦之名威神遍滿於十方誓願普㧞於一切俾承道力得離迷塗臣今伏爲齋官某正普薦亡親某乙在會衆魂開建无上黃籙大齋恭取今宵普設六道四生孤魂滯魄無遮無礙廣大平等清淨斛食夜齋一筵伏望大慈特回眞馭鍚之景曜燭以威光敷慶雲以開生施祥煙而塞死還將上天之氣濟此九幽之魂寳號稱揚三塗聞知而離苦靈章誦詠六道受度以超凌仰頼至仁俯垂洞鑒再慿清衆請爲讃揚太一救苦天尊四聲誦救苦經一遍存五色光明現於東方圓像如月暈之狀徧照天上地下十方世界無不洞明中有青玄上帝頂俯仰碧玉冠衣飛青翠羽離羅帔左手擎碧霞琉璃寳鍾右手執空青羽枝坐九色九頓獅子金翠蓮花之産獅子口中各吐火燄園繞身光天尊於光燄中别有九色圓像如虹蜺項有圓像如日從太一八十一神左右二眞人天丁力士青玄功曹黄籙童子玊女神王頂出白毫慧光鋒芒外射如千萬鎗劒之像一一分明流注斛食志心奉啓三十二天帝君臣聞元始開圖眞陽布化雖資生於妙有實總炁於上元色界以還均爲輪轉福縁報盡則或代終惟八㑹之眞文隱諸天之大梵功超萬品澤普九幽臣今伏爲齋官某正普薦亡親某乙在會衆魂開建无上黃籙六齋恭取今宵普設六道四生孤魂滯魄無遮無礙廣大平等清淨斛食夜齋一筵仰祈霄馭下鑒塵寰昭錫天光降流法食大千世界資梵炁以攝化無窮億劫沉魂仗眞乗而受用𠑽足庶俾元精之化育益增弘覆之髙明清衆運誠同聲讃詠諷隱語一遍結三塗五嶽印想道衆皆爲真人同諸天帝君齊聲諷誦每一方畢存本方炁東九南三西七北五條如數從各方來灌注斛食吸吹水盂中再依前誦隱語一徧存黃炁十二自五方來日月五星之光上引三十二天之炁交映羅絡灌注斛食再誦隱語三徧存四方紅光罩壇良久混成五色虹蜺下注兆身口五藏之間復混爲一大圓象廣大覆盖徧滿虚空兆身如在日宫其斛食自一生二二生三三生九九九八十一攝化無窮徧滿十方自地至天廣大無量次沉變食符水盂中誦甘露通真呪三徧師擎水盂以栢枝旋遶徧洒斛食存青玄上帝同兆真人及官君等皆誦甘露真言洒其甘露香炁馥郁徧滿𠑽足功德金色光微微開幽關華池流眞香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寳㫖自在天堂遊次誦破酆都地獄開業道呪三徧道衆旋繞法師居位凝神存東北方酆都九幽諸大地獄等一切罪魂受苦萬狀次存泥丸中玉清上帝御於寳座依大法行持同兆真人等及靈官將吏皆誦破酆都地獄開業道呪良乆上帝口吐九色慶雲紫炁金光直指地獄照破重隂鐡城摧毁枷鎻解脫刀劒變爲青蓮鑊湯化爲春圃重𡨋九地盡爲淨境所有罪魂並皆出離前詣壇下伺候開度茫茫酆都中重重金剛山靈寳無量光洞照炎池煩七祖諸幽魂身隨香雲輿定慧青蓮花上生神永安上來加持法食無量勝因用薦幽魂昇遷福境汝昔大患爲有此身身有飢虚以食爲念身今安在何以食爲寒暑爲苦以衣爲念身非汝有何以衣爲以食以衣財寳爲念飢虚寒暑了不相關若財若寳亦將焉用六塵幻妄種種歸空見前衆靈色身巳滅猶有愛樂念未斷耳汝能解空見性絶妄歸眞不著有無自然起脫如或塵根不斷業想未除見以飢渇爲苦者即饗我無碍甘露法食十方救苦天尊靈寳普度大齋施斛宣演法語儀法師上香就坐望鬼門鋪設普告十方無極世界一切天人等衆一切飛空大力鬼神等衆一切地獄苦魂等衆一切畜生業累等衆一切無主孤滯等衆盖聞善惡二縁報殊苦樂死生異道隔以幽明汝等𦆵捨䕃身即淪鬼趣但和飢渇之逼孰捄枯槁之餘況有受罪之苦魂根塵障礙一萌中心之食念業火熾然今者法會載陳旛花迎召化兹妙淨之供濟汝苦餒之形汝等聞命饗臻應時囖至懽言盛饌慰若平生老幼携手而扶將少長差肩而先後無譁就列既飽爲期上承道法之慈悲普同供養下體齊修之願力無有遐遺當興難遇之懐勿生有限之想歸依眞道度脫此身捧腹相懽如有屬饜之量省心知愧似聞歎息之音今爲汝等一切鬼神設無量齋加持法事當職道士吟玉清慧命啓請法言曰師上帝訣稽首明慧虚無尊稽首皈命重元主裁成天地無德稱悉爲衆生作恃怙慈濟五道轉輪魂哀救三塗地獄苦皈命金闕天中尊皈命六度慈悲父皈命玉清無上眞以離生死長綿綿出有入虚無所待能令枯朽變成仙千劫萬劫難一遇爲衆廣說業因緣廻骸起死永長存使其形神無邊遷出玉清次施食雲廚妙饍餌之者䇿景淩虚紫府靈文聽之者成眞得道今汝等錬形濯質攝炁成人旣詣法筵各須霑足奉爲汝等上資徃生仙界念玉清甘露加持法食呪稽首仰圓羅合景挹靈芒拘魂制七魄思審定中央行往禮虚無寢息宴玄房飢飱黃碧花渇飲瓊根漿神旌命大魔合體錬眞光復照觀太無常在空中遊圓通泯波濟眞化靡中期窅眇無终始行者當明知寂寥忘理教應運闡弘規降道不自照要當先所施㑹歸無二處隨心自合離出王清經金聲垂教玉冊流科垂濟死之津梁作昇仙之梯磴須慿慧力出離遠途俾性智以圓通得身心之清淨麕爲汝等上資徃生仙界念三光法炁呪浩晶生法炁氤氳凝天中兩曜共澄徹五緯相交通三光煥巳明寳氣盈三宫帝郷會九老咽服百體豐金華照光景身與日月同念道上聖前萬劫壽無窮三光煥耀㑹九老於帝郷五緯交羅棲萬神於眞宅嚥嗽玉醴咀嚼靈芽九竅旣巳開通百關當遂調理奉爲汝等上資徃生仙界念三光流精呪妙道分一炁炁中分隂陽凝化日月星燦然流三光九華舍九道八色怡八方煥爛洞眞體流精歸太茫下生淵泉宫上列無何郷縱體復飛跡怱然都相忘七寳流精潔混沌雜華芒咽服九雲散此樂殊未央法航接引度五苦之沉淪慧露清涼蠲三塗之熱惱消除罪垢須仗眞詮奉爲汝等上資徃生仙界念三光澤嬰呪玄絶九炁中澤嬰生太無鬱儀煥暘谷結璘曜天衢五星流寳光手極回乾樞飛炁鬰勃散咽御方踟蹰超跡天寳階錬芝服華敷炁布萬神㑹舉形升太虚元始開圖眞文現世慈尊接引勝範宣流以能廣潤衆生故名甘露以能破除業障故曰法言汝等乆墮苦輪不聞正道由妄縁之假合致本性之昏蒙欲超證於眞常當返生於魂魄奉爲汝等上資往生仙界念玉清隂生梵唱呪靈芝無根衆化之原中凝七魄上結三魂二十四眞出入無門杳𡨋之中恍惚無精隨劫存亡逐炁而生外凝渾樸内養七經五神植華三台敷榮紫闕素童返形歸嬰騰雲而升逞霧浮空中有玉眞號曰神公左挾無英右衞白元玄獸過後丹禽擁前上浮翠盖下湧金蓮香雲凝空甘露無窮用之無盡尋源不終上來宣演靈音法契玉匱玄章聲聞十極恩周三界道炁隨呪下降恩光符合周流漑入法食普令清淨得享之者障業永消五藏華敷百關調理壽命無盡形同太虚功德深重不可思議各各當發大慈悲心普同一切悉皆霑足身心清涼無復熱惱身心飽滿無復飢虚身心安泰無復憂苦身心無脫無復輪廻苦樂福報者轉此以食普獻諸天乃至普施一切孤窮使無障礙如是則爲不負我十方天尊廣度況淪普拔幽暗之意當願施者受者俱沐道恩同臻福果今我天尊有破地獄離苦升天神呪爲汝衆等一心諷誦功德不思議行者生福報施與法飲食永生安樂處上來施食巳畢更當普爲汝等說眞實法依慿修習用作津梁在昔空無始生三炁三炁凝結而爲三天三化爲九九復生三三十六天由兹分列下極九壘土水及風二十七重更相持擎亦三十六上應於天復有元氣之根包承無極兩儀旣立人處其中因與天地分氣而理氣有聚散物有生死從生入死萬物常然不死長生是爲眞道道分三洞教闡三乗廣說因縁開悟群有天人神鬼皆可修習隨其願行各證果位積功爲漸累德爲基功滿德𠑽身超三界三界天人夀考優劣一一不同修行精祖一一有異自微至著漸契道眞從凡人仙歷眞成聖超此界者方入三清始登極果是爲長生不滅之道也一切衆生迷於道眞乆習顚倒心想雜亂隨逐諸塵捨一取一無暫休止惑於所有味於所無業累因縁以此而發招引罪垢歷世彌積輪廻三界漂浪忘返流轉五道長淪弗悟嬰抱痛毒不能自知大道流形品彚雜揉氣不可極數難可窮死而復生幽而復明天地運輪如車之輪純一道炁本無生㓕設爲天人夀億千萬不明道本爲欲所拘期盡有終復當退堕四生五道六趣三塗展轉輪廻無有息處若復汝等於諸法中生有見心捨於穢土求三清樂捨衆生身求眞道相欲斷煩惱而入無爲求離諸見乃得寂滅如是等相我說汝等名大邪見譬如愚人畏於大地而欲走避所至之處不離大地衆生亦耳畏生死身疾捨三界有心厭離所得之身不離生死如是衆生未能見法一切衆生無明重暗眞道在身莫能覩見又如愚人東西馳走求覔空色而不能知即色是空一切世間亦復如是心生馳走欲求道眞不知身心即是眞道我今宣示汝等令知將來三清不離煩惱今知大道不在他方但觀身心修習正道自然解脫眞道相者名爲不作無起無滅非有非無非常非斷非大非小非色非心若能體此名爲修習眞道正行如上所說並是三洞眞實法語可爲一切天人鬼衆修正之階今依玄科普設淨供敷弘至妙開化沉淪伏願汝等於此會中起皈依心行清淨行絶輪廻道起解脫門廣積善功進登道果復慮汝等不除三業尚蔽六情未契法言難超淨境恩惟太上開濟無邊垂錬度之洪儀說九眞之妙戒防非護性攝氣歸眞升魂九天超神三界當依科式次第宣傅少憇靈壇以需開度次起立回向向來設斛功德無童勝因資薦衆靈成無上道爲上因縁念大聖元始天尊太上大道君太上老君不可思議功德次請降眞水眞火錬度如儀无上黄籙大齋立成儀卷之三十
