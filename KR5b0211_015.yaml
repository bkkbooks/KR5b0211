front:
  text: 無上黃籙大齋立成儀卷之十五在五
  hash: sha256:cd865d8a99b4912fb2e6a946a6b3072f010a19752614a91b09f824f0409833fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_015-001a, image: hfl/0281/0281-046.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編次醮謝請獻門聖祖位序説趙彥衛雲麓漫抄云景祐元年四月仁宗謂宰臣曰近年以來隂陽不順卦氣乖舛此必應天之道有未合於天心而違於人意者宜推明咎證之本臣僚上言早歲陳彭年等定中外醮儀聖祖天尊在北極之上伏緣北極大帝總領萬物主宰中極聖祖司命真君因薦尊號驟居紫微帝君之上既定位非順自兹天下郡縣多致災傷伏望重行詳定禮院詳定當院與道衆參詳天下道觀聖祖每遇醮設於聖祖殿供獻聖祖天尊及六位仙官即與衆真各無相妨仍别用青詞奏告如無聖祖殿處即别設醮位為便從之後道士欲得聖祖雜於其間以重其教復合之自渡江朝廷作醮亦從其説叔輿竊謂本朝及唐之祀聖祖猶其祀感生帝也感生帝出於諸儒聖祖出於方士其為附會則一爾感生帝即五天帝之一也有天下者以其膺五德之運而王天下其祖感某帝之德而生故於四時迎氣時祭之外别為壇位而特祀之聖祖即諸天帝真之一也唐以李姓出於老子故祖老子本朝以趙姓出於黃帝故祖黃帝遂加尊號築景靈宫而事之州郡天慶觀率立聖祖殿其禮至嚴景祐禮院詳定天下道觀每遇醮設獨於聖祖殿供獻不與衆真參列所以尊其祖之所自出也州縣官僚為國為民祈請禳禬遇有醮設或可邀迎巳失於僣臣庶之家不宜僣及醮説有酬酢曰獻無酬酢曰醮醮者用酒於位敬以成禮也延真降靈而以醮名其古用酒於位之禮歟自漢天師流傳醮法以福羣有今見於道藏者其自尤繁杜廣成先生剛定黃籙散壇醮儀以為牲牷血食謂之祭蔬果精珍謂之醮醮者祭之别名也河圖經品三洞之中凡有四十二等咸以太上為主次以北斗為宗苟能禮物精豐心誠丹罄何善不降何患不除然名位雖不同而儀矩則相類解穢禮師衛靈呪之後即繼以發爐降神一獻上香讀詞再獻奏錢焚詞三獻送神復爐其位寡故其禮專其儀簡故其誠備鋪席設坐茶果酒饌隨力豐儉多者一百二十杯盤次或七十二或六十四或四十二或三十六或二十四按科戒云凡設醮所須飲食餅果一如齋法若須市買皆不得爭論高下及尸産竊盜之物燈當用清淨香油不得用非義之財及濁雜葷穢之物其務實而不務文也明矣未聞揭立牌位普醮三界混合天神地祇為一壇者也普醮之設其起於順天興國延壽去邪續命應物壇範之訛乎張清都黃籙儀無謝恩醮杜廣成儀始有之亦以修齋召命神靈管衛壇場宣通關告往來勞役所以言功設此醮筵用行酬賞然亦止於壇外鋪席青巾絳坐羅列果饌之屬三寶元師用香茶人參伏苓湯等三官五帝將吏用茶酒杯盞隨盤為數九祖土地日直皆用銀錢依位作狀醮訖焚之其降真醮位始則以玉京玄都紫微上宫十方大聖衆至真諸君丈人飛仙上真玉童玉女為一節次則天地靈仙諸天大聖日月帝君真人神仙玉童玉女次北極勾陳天皇大帝北斗七元南斗六星三台五星二十八宿周天分度星中神真兵馬騎乘次五方五帝君五帝真人玉童玉女兵馬騎乘次三官三元三官九府一百二十曹五嶽真神洞天治化河海永帝十二河源仙君九官真人九天司命五嶽丈人九天使者儲副正職佐命大神天地神仙兵馬騎乘次三洞四輔侍經真官仙公仙伯仙鄉大夫九天御史玄師天師嗣師系師上古三師經籍度師三寶官屬次靈寶官屬領仙監齋直待真官侍香將吏玉童玉女六甲官將六旬玉女社稷將吏一切靈司次則身甲三五功曹使者金童玉女直符香官執法開化隂陽功曹消災散禍解厄君吏等次身中所佩二十四治建節監功大將軍四部監功謁者仙靈直使正一治病促氣三部功曹等次隂陽神決吏科車赤符罡風騎置驛馬上章飛龍天仙飛仙騎吏上部中部都官使者狼吏虎貴察姦鈎騎都官僕射天丁力士天騶甲卒等收食氣神鬼邪精諸天騎吏誅符破廟騎吏等次弟子元辰大小行年本命星辰驛馬將吏等醮筵所降聖真之目總十有三項而土地里域真官則降之於西席所列之杯盤有限而所降之真靈無窮亦以皇天后土享于克誠不以其物故也蔡致虛黃籙齋醮儀設位雖三百六十而聖目合者甚多自御位用專狀外餘悉以類相從止作都疏獻送意似有見於此路時中黃籙大齋儀範正筵一百二十而𡨋官四十位在外每位一請一獻其禮備矣然謂憑此為足以感格神靈則未可蓋道集虛者也吾心苟虛即與道合齋戒沐浴巵酒可獻千真若徒泥於色相之間終有拘孿不通之處文為日盛古意寖失今時所請醮位又多有不與齋法相關者日數既逼修寫不精法師無緣過目悉舉而委之筆史之手寧免錯亂靈誤誠敬果安在哉剛除繁文旋復古法要在哲匠能弘之耳田先生齋儀云設醮古儀不載唐先生若山有之若師古之士當從晉唐舊法然謝恩設醮留沖靖固常因之矣今不敢廢具式如後請醮四等狀式第一等奏請狀內格式合換勿並注在醮進聖位卷內見聖真班次門奉醮具官位臣姓某先為正普薦亡親某乙在會亡過等魂崇建無上黃籙大齋某月某日巳行滿散謹取某月某日夜祗設清醮三百六十分位仰謝洪恩合預真狀奏請者右臣謹昧死具狀奏某位尊帝陛下恭望道慈允今奏請事理於至日夜俯降恩光鑒臨御座冒犯天威臣無任誠惶誠恐激切屏營之至謹具狀上奏以聞謹奏年月日奉醮具官位臣姓某狀奏可漏某帝尊陛一奉醮具官位臣姓某謹封方函疏謹上詣三天門一上清天樞院前進奉醮具泆位臣姓某謹重封第二等奏請狀奉醮具官位臣姓某先為同第一狀至仰謝洪恩合預具狀奏請者右謹具狀上奏伏望天慈於某日夜俯降恩光鑒臨御座冒犯天威臣無任惶懼激切屏營之至謹具狀奏聞謹狀年月日奉醮具官位臣姓某狀奏第三等申請狀奉醮具官位姓某先為同第一等狀至仰謝洪恩合預具狀申請者右謹具狀申聞伏望聖慈於至日夜降臨醮座千犯聖威某下情無任惶懼之至謹狀年月日奉醮具官位姓某狀第四等上請狀奉醮具官位姓某先為同第一狀至仰謝洪恩合預具狀上請者右謹具狀由聞伏望神慈於至日夜降臨醮座謹狀年月日奉醮具官位姓某狀天樞院繳進狀靈寶大法司本司今月某日發奏狀十函重封印全為某人正普薦亡親某乙在會衆魂崇建無上黃籙太齋某月某日巳行滿散謹取某月某日夜祗設清醮三百六十分位仰謝洪恩合預録狀奏請須至開具申聞者玉清上帝元始天尊陛下上清大帝靈寶天尊陛下太清六帝道德天尊陛下昊天至尊玉皇上帝陛下勾陳星宫天皇大帝陛下紫微中宫北極大帝陛下東極宫中大慈仁者尋聲太乙救苦天尊御前太微南極長生大帝御前十方救苦天尊御前后土皇地祇殿下右謹具狀申三天門下上清天樞院伏乞徑為通奏施行謹具狀申聞伏候昭報謹狀年月日具法位姓某狀發請狀關子日直功曹關靈寶大法司當司先為黃籙大齋主某人正普薦某乙亡魂在會衆魂崇建無上黃籙大齋今月某日巳行滿散今取某月某日夜祗設清醮三百六十分位上謝洪恩今發奏請狀一十函申狀幾函重封印全上詣三天門下上清天樞院請進須至關發者右關某日當直功曹使者請疾速齎管前去分明請進雲程不得稽滯時刻有所邀阻攝赴近獄依律施行故關年月日時關功曹符使關靈寶大法司當司先為同日直關至上謝洪恩合預録狀請諸天帝尊三界真仙係醮主宰一切威靈除巳各具專狀外開具下項欲仗神威須至關發者一奏請狀三十四通上詣某尊帝御前逐一開列巳上逐處請進一申請狀二百五十四通上詣某聖位聖前逐一問列巳上逐處申上一上請狀六十二通上詣某神位逐一開列巳上逐處投下右關某年年直功曹使者某月月直功曹使者某日日直功曹使者某時時直功曹使者上界直符使者中界直符使者下界直符使者請疾速齎管前去各照界分遍詣關庭等處通進申上所冀聖真降鑒醮事周圓無或稽違有干玄律故關年月日關青詞共三道維某年太歲某甲某月某朔某日某甲某路某鄉貫居具官位姓某謹罄哀丹誠上干天聽同齋詞至投龍進簡正薦再自仰仗道慈起至福佑見存普薦再自所資功德起至福佑見存以今功圓事竟解散齋壇謹取某月某日夜祗設清醮三百六十分位上謝洪恩臣誠惶誠恐稽首頓首再拜上奏玉清聖境虛無自然元始天尊上清真境太上道君靈寶天尊太清仙境太上老君道德天尊陛下臣伏以詞並同前詞式結謹詞玉皇一詞太上開天執符御曆含真體道昊天玉皇上帝陛下勾陳三位一詞勾陳星宫天皇大帝紫微中天北極大帝太微南極長生大帝御前東極一詞東極宫中大慈仁者太乙救苦天尊十方救苦天尊御前后土一詞承天效法厚德光大后土皇地祇殿下內封及方函式見詞疏門引進狀不青詞别作一函發靈寶大法司本司今月某日奉為黃籙大齋主某人正薦亡親某乙普薦在會亡魂崇建無上黃籙大齋巳行滿散今月某日夜祗設清醮三百六十分位上謝洪恩所有進拜青詞五通除巳恭對太上御前宣讀訖合行繳發前去須至申聞者右謹具申三天門下省伏乞引進徑為通奏施行謹具申聞謹狀年月日具髙功法位姓某狀可漏方函見詞疏門申狀狀式見正奏門詞疏關子靈寶大法司當司令月某日伏為黃籙大齋主某人滿散無上黃籙大齋祗設清醮三百六十分位上謝洪恩所有進拜青詞五函及功德疏一函各巳恭對太上御前宣讀訖并繳進狀二函並重封印全須至關發者右關某日當直功曹使者云云同齋詞關式如散醮夜深關兩日功曹發式具六卷詞疏門進獻禮物四等狀式撫易間注在醮進聖位卷內第一等獻狀奉醮具位臣姓某恭備龍車一乘右謹隨狀上進恭望天慈俯賜昭鑒冒犯天威臣誠惶誠恐稽首頓首謹具上進以聞謹進年月日奉醮具位臣姓某狀進可漏某帝尊陛下奉醮具位臣姓某狀進謹封方函進獻狀一函上詣三天門下諸進具髙功法位臣姓某謹重封地祇用鳯輦稱宸慈聖威方函后土皇地祇闕下第二等獻狀奉醮具位臣姓某恭備龍車一乘右謹隨狀上進以聞冒犯聖威臣誠惶誠恐稽首頓首謹具狀奏聞謹狀年月日奉醮具位臣姓某狀可漏同前式後同第三等獻狀奉醮具位姓某恭備太上升玄消災護命妙經金錢一分從馬一匹右謹隨狀上獻伏惟聖慈俯賜昭鑒謹具狀申聞謹狀年月日奉醮具位姓某狀第四等上獻狀奉醮具位姓某謹備太上升玄消災護命妙經𡨋官獻救苦經金錢一分從馬一匹右謹隨狀上獻伏惟神慈俯垂鑒納謹狀年月日奉醮具法位姓某狀三天門下繳狀靈寶太法司本司今月某日發進獻狀九函各封印全為某人滿散黃籙大齋修設謝恩清醮三百六十分位進獻龍車事須至申聞者右謹具狀申三天門下省伏乞徑為通進施行謹具申聞謹狀年月日具髙功法位姓某狀方函可漏同前式發進獻禮物日直功曹關靈寶大法司當司今月某日奉為黃籙大齋主某滿散無上黃籙大齋修設謝恩清醮所有進獻車輦等除巳各具專狀外須至關發者一進獻狀九函申狀一函各重封印全龍車九乘上詣三天門下請進一進獻狀一函重封印全鳳輦一乘上詣后土皇地祇殿下請進右關某日當直功曹使者請疾速齎管前去隨從車輦徑詣逐處闕庭請進不得墜違有干玄律故關年月日關三界直符關靈寶大法司當司奉為同前關至謝恩清醮三百六十分位所有貢獻三界聖真係醮主宰龍車金錢從馬除巳各具專狀外須至關發者一進獻狀若干函龍車幾乘上詣某帝御前逐項開列聖位一進獻狀若干函金錢若干分從馬若干匹上詣某聖位聖前逐項開列一上獻狀若干函銀錢若干分從馬若干匹上詣某神位逐項開列右關上界直符使者中界直符使者下界直符使者請各齋管分詣闕庭等處進獻母令差互及有墜違故關年月日時關唐武宗皇帝九天生神保命齋詞維大唐會昌五年歲次乙丑十月乙亥朔十四日戊子仁聖文武章天成功神德明道大孝皇帝臣某謹稽首再拜虔誠上啓至真無極大道元始天尊太上大道玉晨君大聖祖髙上大道金闕玄元天皇大帝太上老君玉清大有天寶君上清玄妙靈寶君太清太極神寶君三寶尊神三寶丈人玄都紫微九天大帝君東華南極西靈北真四天君三十六天帝三十二天君十方靈寶至極天尊五老上帝三景君道德衆聖三元君太極天帝天師君元洞至極明皇道君三十六部尊經玄中大法師三光衆聖八景靈君三十六地嶽瀆正神河海川澤名洞靈山諸化福地得道神仙三界應感一切真靈臣聞萬化之初總之者妙道群靈之表冠之者至真剖判玄黃裁成品彚幽明既辨主宰有倫九皇司牧以無為八帝統區而有度洎乎清源斯壅玄澤不流舜禹遺揖讓之風湯武起干戈之役禮樂隳於大朴爼豆矜其小成玉帛徒美於爭馳世道亦悲於交喪斯所謂時君忘本至理莫追悠悠含生眇然何怙是知凝旒負扆非道無以寧至理垂裳非德無以立我國家玄元鍚祐仙李標華承德眀興聖之基紹髙祖太宗之業庭除六合簷無九圍扇之以熏和沐之以渥澤治之以聲教正之以詩書惠露洽於幽隂百神咸秩仁照周於萌蘖大樂同和趙二百年一臻于道顧惟德祗嗣洪圖思弘清淨之規以兆寰瀛之福冥心丹簡屬想玄經披太上九天之文得元洞生神之皆將陳寶籙首備齋壇錦幣華繒金龍白璧普萬天而展禮極旦境而告虔所期盻蠁咸通昭彰會祉鶼林鰈水咸歸仁夀之鄉海水域中一變華胥之俗豈使燕昭臺上獨凝三素之雲漢武殿前嘗降九靈之駕蓋保綏於億兆非金慕於騫騰列聖衆真降兹伸懇謹遣道士東嶽先生修九天寶齋三日四夜稽首以聞謹詞無上黃籙大齋立成儀卷之十五
