front:
  text: 無上黃籙大齋立成儀卷之二十在十
  hash: sha256:1f29f3bb5db4556c16cebe2fa3f494e114e3b03126bb3e425c3a26abc80d387a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_020-001a, image: hfl/0282/0282-134.png}
body:
  text: 廣成先生杜光庭集科儀門投龍璧儀詣洞天於門外選平地或船中或石上並須掃淨精潔以設醮位淨席五領醮巾兩條青布緋布並可酒茶湯隨盤數五果餅饌隨時所有國家六十分臣庶二十四盤香四爐巾案四副正面三寶位左洞府神仙位右日直土地監察位及法師關奏位陳設訖以香水灑壇之外以蕩氛穢禁敕如常儀師徒弟子並須澡潄嚴潔以虔恭為先不得因循喧聒不恭於事考罰尤深次唱各禮師存念如法次思三尊經寶玄師五星五帝五嶽五藏五靈經籍度師三色雲氣當處洞府真仙靈司監察官屬日直土地儼然在坐羅列分明如齋法訖依科行事投山簡法先於洞府門外鋪設醮位訖禮師存神如本法各禮師存念如法次衛靈呪次鳴法鼓二十四通發爐無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處上地里域真官正神臣今正爾燒香奉為某官為某事乞修設無上黃籙大齋功圓事畢投簡靈山水簡作靈泉土簡作靈壇願得太上十方正真之氣降流臣等身中令臣所啓速達徑御太上無極大道崑崙五嶽靈山洞府前各三禮水簡太上無極太道暘谷神王九江水府水帝前土簡太上無極大道九土皇靈土府大神前次各稱法位具法位奉行黃籙投龍法事臣某謹奏請大羅玉清無極無上至真大道元始天尊太上道君太上老君三十六部尊經玄中大法師三寶聖衆一切尊靈恭望感應分輝垂慈下降稽首再拜謹奉請某洞府神仙洞天官屬得道真人伏望真慈垂光下降謹上請當境主司虛空監察香官使者三洞神威里域真官翊衛將吏山水川澤一切正神伏望聖慈具官來降次三捻香上茶酒次長跪啓白臣謹上請太上無極大道太上三尊十方巳得道大聖衆至真諸君丈人東華南極西靈北真三十六部尊經玄中大法師太極真人玄一三真人諸天日月星宿崑崙上宫諸神仙西靈金母五嶽真君靈山正職潛霍儲君青城丈人廬山使者鍾山鬱絶西玄墉臺丘嶽大神三官北部六宫幽司天下地上𡨋靈衆神監生主録南上三門至神至靈一切群仙臣胎誕塵濁瞽暗無知萬劫善緣依承道化奉宣慈訓佑國立功濟物度人引導讃法奉為某官某乙修設黃籙大齊正薦某乙普薦某魂普及存亡懴罪乞恩解消罪咎法事都畢投簡靈山金龍驛傳乞落除罪簿記名玉曆願神願仙解釋九玄七祖九族種親先亡後化拔贖惡根免脫酆都岱宗二十四獄五嶽之府九幽之中刀山劒樹苦惱之鄉魂覩光明永蒙開度轉輪受化逍遙福門安穩墳墓注訟不典舉家蒙福一切荷恩妖精殄滅善瑞日生修道參真永偕仙品蒙如所啓仰荷玄恩臣某誠惶誠恐稽首頓首再拜謹啓起立捧簡文香上熏之次讀簡文竟青紙封之青絲纏龍鈕璧畢弟子執之於香上法師呪曰玄上開明元始監真上帝五老赤書丹文天地本始揔領三元攝氣召會摧促舉仙髙上符命普告十天日月星宿五嶽靈山天上地下溟汵大神監生主録南上三門關頌玉簡勒名丹編削落罪書上輔帝臣某皈慿至道修齋立功拔贖九祖一切苦魂行道事竟謹依靈山請投玉簡乞削罪名皆蒙解脫無有𡨚親去離三惡魂升九天生死開度萬劫常存今日上告萬神咸聞請以龍簡王訣及投龍簡訓並作金鈕關盟真官乞如所告金龍驛傳呪畢衆官再拜次投簡於洞中次投龍簡頌次三禮次三捻香次復爐次學仙讃次徹饌投水簡法禮師存念衛靈呪鳴法鼓發爐稱法位降真上茶酒次長跪啓白臣謹上啓太上無極大道太上三尊十方巳得道大聖衆至真諸君文人東華南極西靈北真三十六部尊經玄中大法師太極真人日月五星北斗七元五嶽四方日窟常暘洞谷洞隂神仙大王扶桑大帝九老仙都君三河四海九江淮澤三官九署十二水源九府水帝溟泠大神水府衆仙一切拜靈臣誕形下土稟筫凡微宿以道因遭逢聖運靈寶垂化大法度人佐國立功奉弘慈訓今為某官某修設無上黃籙大齋薦拔亡靈某普兼存殁祈恩謝罪請福消災解䆁𡨚仇增延命祿法事都畢投簡靈泉金龍驛傳乞削死籍落罪注生願神願仙賜以自新九祖七玄解拔苦根去離暘谷幽夜寒鄉沐浴錬度超升天堂塜墓安吉殃注永泯舉家受福神氣休寧學識開朗智慧圓明揚闡正法消伏姦凶三界證度功滿行充帝王安鎮國祚興昌謹以啓聞乞如所陳臣某誠惶誠恐稽首頓首再拜謹啓啓畢長跪叩齒三通讀簡文畢青紙封簡青絲纏龍璧鈕等今弟子執於香上呪曰元始五老上帝髙尊十方至真太華靈仙赤文告命無幽不關上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟泠大神今日上告萬願開陳某修齋行道普為存亡請贖七祖宿對罪根謹投土簡乞得上聞記名水府過去升天生死開度萬神咸聞請以龍簡玉訣作金鈕告盟水帝王訣作關盟水官賜如所陳玉訣賜作請金龍驛傳呪畢衆官再拜次投簡於水中次投龍簡頌次三禮次三捻香次復爐次學仙讃次徹饌散如常法投土簡法禮師存念衛靈呪鳴法鼓發爐次稱法位降真上茶酒次長跪啓白臣謹上啓太上無極大道太上三尊十方巳得道大聖衆至真諸君文人東華南極西靈北真五老上帝三十六部尊經玄中大法師太極真人玄一三真人酆都大帝君九州之宫泉曲主司無極世界髙皇九土皇靈季帝髙真中皇九土戊己黃神土府五帝三界官屬土地里域真官正神及此宅觀一切靈祇臣稟氣凡愚叨因宿運會遇真法與善因緣值靈寶開光赤書宣化許以庸穢參奉正真佐國為時立功行教奉為某官某修設黃籙大齋薦拔亡靈某普兼存殁消殃謝罪請福祈恩行道事訖投簡靈壇金龍驛傳乞削除地禍除其罪名願度願生保濟形神九老仙都玉曆注名九祖父母胞元種親先亡後逝咸享福緣去離九幽之下八門之鄉地獄之內楚掠之中殃愆消釋家宅清寧惡根斷絶上生福堂某學業圓就功行盛明生死同福未保無傾帝王受福天下和平謹以啓聞乞垂感悟臣某誠惶誠恐稽首頓首再拜謹啓啓畢長跪叩齒十二通讀簡文次黃紙封簡素絲纏龍鈕璧令弟子執於香上呪曰天地開張九氣分靈三元同符十方朗清五老上帝開真領生丹書赤文元始上精普告天下天一作元九土皇靈今曰上告萬仙定生某修齊行道普為存亡我願我仙請投玉名土府大皇勒除罪形奏簡上宫列簿華青早得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭今曰告命萬神咸聽聽作寧捉龍面寧作聽請以金鈕表明至情請如所告金龍驛呈呪畢衆官再拜次投簡壇心地中次投龍簡頌次三禮次三捻香次復爐次學仙讃次徹饌散如常儀右土簡言功之夜宣讀呪讃巳畢至明便可埋於壇中不俟别更關告今以張承先法師儀內有三簡啓奏真位不同故再録於此若修齋土簡只以言功醮時呪告便投可也其山水二簡雖言功之時宣呪巳畢若至洞所設醮當須依此次第一一宣讀封呪然後投之斯為周備不可以壇中巳告至山直爾便投所在真靈恐不關領善功不達所失尤多切宜詳謹也所以壇中告此山水二簡者蓋恐齋主弟子公私所係不得親詣洞天故於壇中對共宣告爾若齋主弟子不憚山水之遠登涉之勞自與衆官躬詣洞府者即言功之際但拜表後告土簡了留山水二簡就行法事更為允當切在詳而行之不可執三簡之時當為所在土地燒錢一二百紙極佳矣庶文不為滯也唐道士張承先曰登壇受靈寶中盟畢依自然金科投金鈕十口放龍清泉為求仙之道重登壇受五老赤書二録䇿杖思微定志等依明真科文重投三龍三十七鈕以山水宅三處為學仙之引信然後依玉訣别以九龍二十七鈕以八節日投山水宅求除罪薄言名上天又黃籙齋竟亦投龍簡只依三元簡文無别啓告立成口訣群愚相承施用蒙昧余昔遇師陸君通神入妙言事當理無不感應稟妙在心而文無儀軌若依經本文謾書投之則山水宅神將非可識録幽顯漫浪甚乖玄宗故撰此三處關啓文各指告其仙司又别出三簡立成訣今按分明常時必蒙克書削罪記名九玄即拔家門荷榮學業尊茂生死獲仙開示門人尊祕之焉杜光庭曰大道以一氣化生三才陶鈞萬有故分三元之曹以主張罪福即天地水三官實司於三元也人之生死夀天罪善吉凶莫不係焉三籙簡文格亦三元之典格也修齋之法當投三簡以告三元故山簡投諸洞天洞府奏天官上元也水簡投靈泉水府告水官下元也土簡投於壇宅告地官中元也詳簡文之中真靈位號事理顯然近代以來只投山水簡二淮浙江表有三簡之儀行之己久今檢尋本末得張承先法師所述之文奏告三元頗為明當則三簡投莫信無惑焉固可遵行以為永式不獨受經即投三簡修齋遷拔全係三元若三簡俱行即詮舉善功皆逹三官之府矣修奉之士幸無致疑也右禁壇禮燈投龍璧儀並出杜光庭黃籙齋儀無上黃籙大齋立成儀卷之二十
