front:
  text: 無上黃籙大齊立成儀卷之二十一竹二
  hash: sha256:f0afbeca7a8593a663c36bd6912b9e090bdb159abda9b0151a3c173c4893d5ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_021-001a, image: hfl/0283/0283-004.png}
body:
  text: 廣成先生杜光庭集太上執法仙士蔣叔輿修科儀門升壇轉經儀夫修黃籙靈寶諸齊每曰三時行道轉經晝夜六時為弟子關奏誦念以祈福祉其行道消息移時仍别升壇轉經讃道宣行法事一如金籙簡文登壇上座誦經威儀如式風雨不常及别有法事即行道與轉經相續可矣升壇轉經法師冠元始之冠黃裙紫褐五色雲霞之帔是名法服衆官如常服先衆官具威儀迎法師詣玄師前立班法師上香次唱道讃次華夏讃引升壇如式次法師升天門上御案香念上香呪次法師都講各上本位香次唱三皈依至心歸依十方道寶當願衆生起心回向一切信禮至心歸依十方經寶當願衆生心開悟解受持念誦至心歸依十方師寶當願衆生普上法橋無有障礙次唱道場衆等執簡當心平坐如法次唱讃詠如法次唱宿命讃宿命有信然弱喪謂之無皆由眼前見過目即言悠大賢明道教𢡖戚憫頑夫依依念子苦勤勤令我憂次都講啓經雲篆太虛浩劫之初乍遐乍邇或沉或浮五方徘徊一丈之餘天真皇人按筆乃書以演洞章次書靈符元始下降真文誕敷昭昭其有冥冥其無沉痾能白痊塵勞溺可浮幽冥將有賴由是升仙都以今奉為齊主某開建無上黃籙大齊正薦亡親某乙曽薦在會衆魂超升福境謹集見前清衆升壇看誦太上洞玄靈寶無量度人上品妙經度人上品萬道之宗修奉大齊所宜轉誦三日正齊莫終十法十回之數如更能别誦生神章諸經尤妙也回獻三寶上帝十極髙真地水職司冥關主宰三界官屬應感真靈資薦亡靈某等魂普及九幽囚徒罪爽超離苦趣各證生方伏願飛天下觀上帝遙唱靈音一轉九幽之地獄停間隱韻十回五道之沉魂息對恩流亡殁澤被見存普及含靈同臻道果為上因緣稱念大聖元始天尊太上道君太上老君太上靈寶天尊尋聲救苦天尊九幽拔罪天尊朱陵度命天尊法橋大度天尊十方救苦天尊上清左玄真人上清右玄真人玄中大法師不可思議功德次唱靜念如法各思身坐青黃白三色雲氣之中左青龍右白虎前朱雀後玄武曰月五星照映左右侍經仙官羅列壇內巳有圓光如日之象都畢咽液三過叩齒三通密念開經玄藴呪凡轉靈寶衆經皆當依此存思經文行持不同者别依本法寂寂至無宗虛峙劫仭阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界途慈心解世羅真人無上德世世為仙家次吟啓經頌稽首虛皇天尊前次唱請轉法輪轉度人經如儀至密呪處依文行持各目想三十二天九色雲氣交沓之中有宫殿樓觀天帝衣天色衣冤服一一分明叩存神自太皇天為始先叩齒一通心拜一過訖次第二太明天三十二過畢即閉目靜思三丹田出玄元始青黃白三色雲氣如絲漸漸離身雲氣濃厚先交絡一身次纒映坐所及几案經席無不周遍蓊鬱旋繞一壇然後出外圜布一方良久冥合天地次存青龍出肝立左白虎出肺立右朱雀出心立前玄武出腎立後獅子出脾下丹田十二隻列於左右白鶴自泥丸出九隻圍列四向方寸眉後六合宫中有日月出自二目去面九寸光照壇內洞徹煥明方始密呪心密言之勿令耳聞無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言臣等奉為具官某正薦亡親某乙普薦在會亡魂修建無上黃籙大齊以今升壇轉經用資超度願所啓上徹徑御無上三十二天元始上帝至尊几前畢鼻引東方八天青氣八過入肝南方八天赤氣八過入心西方八天白氣八過入肺北方八天玄氣八過入腎然後誦經誦經畢次吟解座贊為諸來生作善因緣如蒙開悟仰荷玄恩贊畢衆官起立都講嘆經詳夫三洞寶經乃萬天勝範結飛玄之氣成雲籙之章義冠無生文垂永劫故天地得之以分判日月因之以運行鬼神敬之以變通人倫奉之以開度是以詠之者則形陟絳霄聞之者則神生碧落莫不人天仰賴生死依憑為羣品之津梁作衆真之戶牖巍巍大範讃嘆莫窮今弟子某開建黃籙大齊九時行道六上轉經願仗真乘超凌亡爽上資家國下祐見存爾者開函演奧即響徹三天執卷吟玄乃聲聞五億當願侍香金媛結香字於天中典經玉郎進經文於簡上即使愆消昔劫福降今辰存亡荷開泰之恩動植恱生成之德以茲勝善遍悉裝嚴三途罷楚毒之勞九夜絶酸辛之苦洎乎悠悠庶品蠢蠢含生俱乘六度之舟並達三清之岸次唱三聞經聞經巳後當願羣生萬罪蕩除善芽增長聞經巳後當願羣生深入法門歸依信受聞經巳後當願羣生永斷執迷常修至道法師叩齒三通咽液三過存三素元君在金華宫如嬰兒之狀次旋行誦太上智慧經讃太上玄虛宗弘道尊其經俯仰以得仙歷劫無數齡巍巍太真德寂寂因無生霄景結空構乘虛自然征日月為炳灼安和樂未央學仙絶華念念念相因積去來亂我神神躁靡不歷滅念停虛間蕭蕭入空寂請經若饑渴持志如金石保子飛玄路五靈度符籍濟我六度行故能解三羅清齊禮太素吐納養雲芽逍遙金闕內玉京為余家自然生七寶人人坐蓮花仰嚼玄都奈俯酣空洞瓜容顔曜十曰奚計年劫多法鼓㑹天仙鳴鍾徴大魔靈風扇香花燦爛開繁襟太真撫雲璈衆仙彈靈琴雅歌三天上散慧玉華林七祖升福堂由此步玄音前世德未足斯書邈難尋信道情不盡圖飛乃反沉太上無為道弘之在兆心學道由丹信奉師如至親挹景偶清虛孽孽隨日新衆人未得度終不度我身大願有重報玄德必信然隂惡罪至深對來若轉輪學道亦甚苦晨夜建福田種德猶植樹積簣而成山子能耽玄尚飄爾升青天修是無為道當與善結緣太上至隱書名曰智慧篇拔苦由大才超俗以得仙靈姿世所恃曄若淵中蓮人行各有本皆由宿世功立德務及時發願莫不從善惡俱待對倚伏理難窮賢士奉法言道亦在默忘解是大智慧上為太極公寶蓋連玉輿命駕御九龍金華擎洞經捧香悉仙童嘯歌徹玄都鳴玉扣瑶鍾竦身凌太清超景逸紫霄保無持法綱遊玄極逍遙萬劫猶昨夜千春如晨朝巍峩䕃雲華手攀寶林條香烟自然生玄階興扶搖靈幡順風散繁想應時銷滅智弘大混無為為清謡次吟學仙頌出堂至玄師前回向太極左仙公曰真頌八篇皆太上太極真人之辭衆仙所耽誦不宣泄於下世祕藏金闕玉房之內冝傳至人修靈寶齊也不可示浮華之徒謹之哉謹之哉太極真人曰侍經仙童玉女聞此禮經讃詠之音皆歡恱而祐兆身也是大經悉當用此讃而禮拜矣若𡨋心誦經者亦詠之乃上仙之辭修真之妙㫖也出靈寶玄都玉京南經天尊曰經者吾遺教導引愚迷能發衆生無量道意意從悟起因悟成真衆聖修行皆登道果故元始以一氣生化三氣分為三天一曰始氣為清微天號玉清境天寶君所化吾以龍漢之初號無形天尊於此天中出洞真寶經十二部以教天中九聖或號萬天玄師無上法王經九萬九千九百九十九億歲二曰元氣為禹餘天號上清境靈寶君所化吾以延康之初號無名天尊於此天中出洞玄寶經十二部以教天中九真或號三界醫王太上真尊經八萬八千八百八十八億萬歲三曰玄氣為大赤天號太清境神寶君所化吾以赤明之初號𣑽形天尊亦稱觀世真人出洞神寶經十二部以教天中九仙或號十方導師至極另尊經七萬七千七百七十七億萬歲開皇改號吾號虛皇理元陽中敷揚三洞下化人間號太上道君經六萬六千六百六十六億萬嵗逮至上皇吾總號元始理紫微宫中廣布經戒救度羣生三洞經寶凡三十六部亦曰三乘洞真寶經謂之大乘洞玄靈寶經謂之中乘洞神寶經謂之小乘結飛玄之氣自然成章玉字金書龍章鳯篆大方一丈八角垂芒教化諸天流通世界始終歷劫常轉法輪或實或㩲有廣有略因機取悟隨世修行雖天地運終而三洞不滅開度羣品導引人天三界十方俱受利益其後每劫之初洞真下化人懷道德共處無為悉奉至真長生得道次則洞玄下化人物漸漓朴散澆浮失道叛德未則洞神下化人物轉更澆浮不奉正真年命短促自是之後人心破壞三洞不行智慧日興人鬼交雜運度促急不滿百年念念無常死生不絶吾故重出宣行三洞布化人間隨代機緣敷弘經教或大或小順物所冝故元始本文未盡下教其三清上境四𣑽天中真聖修行具足山川洞府海嶽仙宫雖有所修亦不具足謂隨方所修之經三洞不得備足也故命老子託化人間救度衆生演出科戒或夷或夏或聖或凡周遍十方悉今開度三洞妙法散在人間勸誘男女使勤修習凡夫積罪業纍沉迷於道無緣不能信奉唯從僞法諸雜邪神徒竭身心終歸地獄其信行三洞悉入福堂或白日升舉尸解遁形隱迹洞宫遊行世界長生變號永劫長存練氣易形轉神入道人莫能識無量無邊吾過去後魔教轉興天下同遵人民夭折兵戈水火疾病死傷國破家亡朝夕相繼竭其府庫以奉妖邪僞亂日興澆訛時扇饑寒苦惱父子流移天下愚迷永無悟矣吾念爾輩積劫沉淪說是要言以示聾瞽然三洞妙法法有一種一者真法二者化法真法者離諸虛妄永劫長存化法者文字流通隨時變滅化法之中凡有五種一者結飛玄之氣雲篆成章離合自然變見不測在三清上境常住鎮經億劫長存聖真持護二者靈書一丈八角煥明在三界十方諸天五億隨劫升降應感流轉三者諸天宫殿樓閣臺房門戶之間書題詠誦制伏人物出入修行四者花又葉字玉札瓊編方丈蓬萊閬風玄圃乍隱乍顯隨劫存亡教習神仙伏諸魔鬼五者紙墨縑素竹木漆書散在人間流傳誦詠劫初即下劫未還升保國安人開度羣品經者元始之言教化衆生使識根源本始宿命因緣罪福報對善惡吉凶生化門户方便所由改惡從善保安性命長生無為歸之於道永劫軌模保之者福降修之者神仙矣出業皈因緣經太上道君謂三天法師曰天尊教戒三洞妙文天書玉字雲篆龍章雖復無邊總括條疏唯十二事部類分别隨根不同一者自然本文二者神符三者寶訣四者靈圖五者譜籙六者戒律七者威儀八者方法九者術數十者記傳十一者讃誦十二者章表自然本文天書八㑹鳯篆龍章是為天地萬物之本開化人神成立諸法主召九天神仙上帝校定圖籙調正璇璣攝制酆都降伏魔鬼勑命水帝召龍上雲天地劫期聖真名諱所治城臺衆真境界廣宣分别種種降差服御元積化形之法神符者雲篆之文神真之信召攝衆魔威制神鬼總元御運保命流年寶訣者天真上聖述釋天書八會之字以為正音開示大道靈圖者衆聖化迹應見無方圖寫變通令總悟解譜籙者衆聖記述仙真名諱宗本胄㣧神宫位緒戒律者條制勑約防非檢過詮量罪福分别重輕威儀者具示齊戒進退楷模俯仰節度式容止方法者衆聖著述丹藥祕要神草靈芝柔金水玉修養之道術數者明辨思神存真念道心齊坐忘遊空飛步餐吸六氣導引三光鍊質化形仙度之法記傳者是諸衆聖載述學業得道成真通玄入妙修因方所證果時節讃詠者衆真大聖功飾法言稱揚正道令總信樂發起回向生尊重心章表者師資傳授妙寶竒文登壇告盟啓誓傳度悔謝請福關告之辭此十二辭紞統衆法一切意趣無不備周化引三乘入一乘道出本際三洞真經帙品目洞真寶經十二部凡二十三萬三百八十卷太上部第一妙林部第二太清部第三徹視部第四上清部第五開元部第六元陽部第七妙真部第八開山部第九十仙部第十玉林部第十一黃老部第十二洞玄寶經十二部凡八十萬四千卷靈和部第一靈寶部第二通神部第三無量部第四集仙部第五內袐部第六真志部第七集善部第八鍊精部第九生尸部第十官圖部第十一鍊摩部第十二洞神寶經十二部凡八十四萬二千卷太真部一至德部第二黃庭部第三鍊氣部第四道德部第五元神部第六大劫部第七內簡部第八神呪部第九三皇部第十按摩部第十一小劫部第十二右三洞三十六部共一百七十八萬六千三百八十卷歷代聖人神仙所受經玄中大經上三皇太素經中三皇開元經中三皇金闕祕經下三皇攝提本經稷三皇元陽經伏羲元精經神衆安神經祝融道德經黃帝微言經顓帝天元經天老黃庭經帝譽玄德經帝堯政事離合經帝堯德戒經夏禹長生經般湯赤精經文王虛無經武王八天隱文經昭王出塞經以下六經並尹喜受西升經元陽經道德經內解經九室經衛生經南榮六甲經宗王鬼林經始皇太平經干吉王訣九千篇以下四品張天師受符圖七千章神呪四十首科律教戒一千二百卷新科一百二十卷冠之右諸經並老君授三一經黃帝龍蹻經黃帝右二經天真皇人授上清經四十六卷漢武帝右西王母授上清經三十二卷魏夫人右王君授上清經七卷仙人李順興右三真人授上清經四卷仙人右三茅真君授靈寶經十六卷葛仙翁右三真人授靈寶經十四卷抱朴子右太極真人授道德章句二卷漢武帝右河上公授粵自三古巳降迄于巨唐寶軸靈文或隱或見出於史䇿或著在别傳至宋朝簡寂先生校讎之際述珠囊經目萬八千卷其後江表干戈秦中兵革真經祕䇿流散者多後周武帝立通玄觀收集衆經猶及萬卷洎隋火版蕩唐土龍興翦掃氛妖砥定寰宇至開元之歲經訣方興玄宗著瓊綱經目几七千三百卷復有玉諱别目記傳疏論相兼九千餘卷尋至二胡猾夏正教凌遲兩京祕藏多遇焚燒上元年中所收經籙六千餘卷至大曆年申甫先生海內搜訪京師繕寫又及七千卷長慶之後咸通之間兩街所寫才五千三百卷近屬巨寇凌犯大駕南巡兩都烟煤六合榛𣗥真宮道宇所在凋零玉笈琅函十無三二余屬兹艱㑹漂寓成都扈蹕還京淹留未幾再為搜訪備涉艱難新舊經誥僅三千卷未獲編涎又屬省方所得之經尋亦亡墜重遊三蜀更欲搜訪纍阻兵鋒未就前志時大順二年辛亥八月初三日庚辰成都玉局化閲省科教聊紀云爾社光庭述無上黃籙大齊立成儀卷之二十一
