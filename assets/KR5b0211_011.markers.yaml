  - {type: variant, offset: 1436, length: 1346, content: 可漏方函並同章法亦以黃絹爲之發表不用關子錬度表具法位臣姓某誠惶誠恐稽首頓首再拜右臣謹瀝丹誠上干天聽臣謹據入齋音至未曽湔洗乞取某月日就某處開建无上黃籙大齋三晝夜滿散修設謝恩清醮三百六十分位願憑道力俯拔亡魂乞按眞科宣行錬度返形易質受化更生臣以凡微獲叅上法濫司濟度職在宣謄旣奉皈投理難抑絶謹具表上奏祖師北極紫微大帝祖師南極長生大帝陛下恭望天慈特賜睿㫖頒告水火二司五嶽總領眞君乞降隂陽靈根眞水眞火即日今時下降壇場錬度亡過某乙等使其神魂澄正萬炁俱存身有光明魔無干犯遷神北府度品南宫仰頼威光曲垂洞鑒臣謹俯伏以俟天恩昭報冒犯天威臣誠惶誠恐稽首頓首死罪謹具表上奏以聞謹奏太歳某甲子年月日具位臣姓某表奏可漏祖師北極紫微大帝祖師南極長生大帝陛下具位臣姓某表奏謹封方函表一謹奏請三天門下滿具位姓某謹重封日直功曹關子无上黄籙大齋壇本壇今發奏表一函重封印全上詣三天門下請進須至關發者右關某日當直功曹使者請分明交管前去依時請進雲程之中不許住滯時刻有所遏截攝赴近獄依律施行太歲某年月日時關錢馬狀依常式詞青詞維大明國某年歳次甲子某月某朔某甲子某府州縣居具官位臣姓名謹罄哀丹誠上干天聽各入齋意正薦自臣伏爲亡親起普薦自臣等幸因宿起並至未曾湔流謹齎法信投靈寳大法司乞請道士一壇就某處官觀取某月日爲始開建无上黄籙大齋三日三夜九時行道預依次第宣演眞科拜奏寳章頒行符命遷拔罪爽開赦幽沉然燈續明諸光破獄普施無礙斛食攝召預薦亡魂沐浴更衣朝眞聽法傅符授戒錬度超生滿散拜表言功投龍進簡祇設清醮三百六十分位上謝洪恩各再入齋意正廌自仰仗道慈起普薦自所資功德起並至福佑見存誠惶誠恐稽首頓首再拜上啓太上無極大道至眞無上三十六部尊經眞文寳符太上三尊十方衆聖玄中大法師指前臣伏以入詞文臣下情無任瞻天望聖激切屏營之至謹詞内封用黄纸三寸腰封臣某係法師名謄奏謹封引進狀狀纸依青詞纸髙低以狀裹青詞入方函内發无上黃籙大齋壇本壇今月某日爲黄籙大齋主某人正薦亡親某乙普薦在㑹衆魂崇建黄籙大齋所有進拜青詞一通巳恭對太上御前宣讀訖合行申發前去須至申聞者右謹具狀申三天門下省伏乞引進徑爲通奏施行謹具申聞伏候昭報謹狀太歲某年月日具法位姓名狀外方函謹上詣三天門下請進具法位姓名謹重封發詞關如在亥府發則關兩日當直功曹同朱表焚於天門上无上黃籙大齋壇本壇今月某日奉爲黄籙大齋主某人正薦亡故某乙普薦在㑹衆魂崇建无上黃籙大齋所有進拜青詞一通巳對太上御前宣讀訖本壇用重封印全須至關發者右關某日當直功曹使者請疾速齎捧上諸三天門下省投進雲程不得稽滯時刻有所遏截攝付天一北獄依律治罪以明天憲故關歳次某年月日時關書詞格式應青詞須用上等青紙勿令稍有㸃汚穿破如纸薄即將兩幅背之髙一尺二寸只許用一幅通前後不過十七行行宻無妨當令後空纸半幅自維字之後平頭寫之上空八分下通走蟻逐行不拘字數但眞謹小楷爲妙如啓聖後下文不得過十六句當直指其事務在簡而不華實而不蕪切不可眩丈瞻飾繁藻惟質朴爲上書詞纸不得令飛落床席及地上仍不得今衣袖等沾拂詞文凡書詞之時當入靜室几案敷淨巾朱筆朱盞勿用曽經殗穢之物口舍妙香閉氣書之不得以口氣衝文寫未乖不得落筆及與他人言語仍不許隔日書下臣字不得在行頭行内不得拆破人姓名此爲書詞之格或稍有違不惟不達反招釁爾右出任仲昇齋儀黃壇節目頗多文亦難省添數行盖亦無妨但要後令空纸多爾无上黄籙大齋立成儀卷之十一, CK-KZ: ''}
