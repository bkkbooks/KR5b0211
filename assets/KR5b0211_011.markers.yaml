  - {type: variant, offset: 0, length: 1450, content: 无上黃籙大齋立成儀卷之十一在一三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿編次表詞門表黃素朱表具法位臣某誠惶誠恐稽首頓首再拜上言太上無極人道至眞自然金闕下臣等猥以下愚繆叅上法功無塵露過積丘山俯仰慚惶形謝罔寘臣誠惶誠恐稽首頓首臣實以凡微幸藉前福叨逢妙化欣荷玄恩旣忝眞司職當齊度雖禀性庸瞽誓罄丹𠂻追尋慈風服膺妙訓見義思勇日夜在心因縁所值敢不以聞今有某郷貫入齋意至未曽湔洗伏聞無上正法黃籙大齋解除生死洗身心口意罪上資帝祚下及羣生保國寜家禳災却害超拔九玄七祖一切幽爽濟度存殁慧澤普加謹齎十方金龍鎮信本命紋繒香火油燭齋醮物儀奉詞投臣乞就某處開建无上黃籙大齋三晝夜滿散祗設謝恩清醮三百六十分位所資功德總用追薦亡親某乙等普爲在會係薦等魂洎門中先逺眷屬親縁旁及十方九幽囚徒罪爽解除業累超證生方仗此殊内上資家國利安品物福佑無存臣據詞懇切不敢抑違除巳奏吿十天關盟三界謹率法籙道士某等若干人依下元黃籙簡文靈仙品格設玄科之式法天像地建立靈壇以某所齋金龍繒綵施鎮十方祈天則地救存拔亡共相罄勵洗心淨念塗炭稽顙歸命至眞以祈所願三日三夜九朝行道預依次第宣演眞科拜奏天官濟度諸章持誦太上眞經睿號頒宣符命開赦九幽然燈續明請光破獄普施無礙斛食攝召預薦亡魂沐浴朝壇聞經聽法傳符授戒錬度超生廣集善功總資超度以今月某日啓齋爲始訖某日某時事畢謹即言功解壇投龍於山水丹書槿劄以奏言於靈壇伏地拜黃素朱表一通上聞九天伏惟太上無極大道元始天尊太上道君太上老君太上丈人无上玄老十方自然靈寳天尊巳得道大聖衆至眞諸君丈人大帝天帝天師君玄中大法師曲映所奏垂愍丹心如蒙上御乞赦典者宣告十方五老上帝五嶽眞仙三官九府十界眞靈拔度亡故某乙在㑹係薦等魂及建齋弟子家億曽萬祖歷劫種親六道四生苦魂罪魄有緑無縁𡨚親平等並令開度得出長夜九幽之中昇入南宮冠帶枯骨返骸生華輪轉漏盡化生福門所在土地營衞尸形須神返舊與景冥合弟子某家前世今生一切罪咎並乞蕩除解滅刑害度厄消災延生保命存亡開泰眷屬安寧上願七曜髙明二儀永固隂陽調和五榖歳稔國富民安天下太平六合清淨帝祚延長疫毒消殄善瑞曰臻克保元吉永衘道恩謹遷所請天仙兵馬地仙兵馬飛仙兵馬眞人兵馬神人兵馬日月星辰兵馬九宫玉帝兵馬三河四海兵馬五嶽四瀆兵馬各九億萬騎三十二天監齋直事侍香金童散花玉女五帝直符傳言奏事飛龍騎吏臣等身中所佩受法籙内外眞仙靈寳官屬三寳威神表都金龍驛吏九龍使者察命童子䕶法威神龍虎騎吏三元將軍南昌鍊度官君神虎追攝將吏城隍社令此間土地里域眞官三界神祇監壇某神係當庭香火威靈顯著曽請監壇者諸係監臨䕶衞宣通君命營衛齋事有功勤者一切嚴裝隨臣今表上詣玄都列受功賞謁言眞宫進品上仙加爵帝秩隨品署眞髙下等級皆令崇達一如太眞之儀臣等學法未備俯仰失格進止犯科不合儀式恐爲四司所紏五帝所執千愆萬罪並蒙赦宥哀原未悟不見罪罰臣等身中五體眞官受功事訖各還宫府使臣等學道得道求仙得仙永爲眞人齊三光朗曜與五氣長存恩惟太上衆尊分别哀原臣愚謹因三官飛仙直使正一功曹左右官使者隂陽神決吏科車直符吏剛風騎置吏驛馬上章吏飛龍騎吏天仙騎吏各二十四人操臣謹爲某官其乙啓建黃籙大齋露請事訖解壇遷職復諸天位重明功德拜黃素朱表一通上詣太上某曹伏須告報臣某誠惶誠恐稽首頓首再拜以聞空三行臣姓某某州某甚宫觀焚修空三行杜儀云此聖號臨時法師自書二寸四分取盡如不能止作一行細書空三行空三行朱表用黃絹一丈二尺輕黄紙背過裁髙一尺二寸書之毎行二十四字若依古法二寸四分爲一行恐寫不過量詞多寡爲行數可也表稱黃素則當用生黃絹田先生用之第柔軟不堪操露不如用薄紙背過爲妙聖號二十四字無三字見靈寳真一自然經, CK-KZ: ''}
