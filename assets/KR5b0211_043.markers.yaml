  - {type: variant, offset: 19, length: 701, content: 東方上元玄靈自然八道度仙符南方下元天靈自然八微玉眞符西方中元皇靈九玄化生八炁紫金符北方元皇靈都虚微八道金眞玉符中央三元靈微八王黄書眞符靈寳火錬成仙符太乙元君錬身符飛靈合炁召六甲六丁大將軍符符下本將軍姓諱黄炁陽精洞明丹陽錬度靈符飛元聚靈召神諸使者符九使者符同此各書姓名於其下依訣用之王清九陽眞炁符一陽混溟𤥭瑝之炁二陽泛華紫微之炁三陽天婁鳳車之炁四陽中女辟邪之炁五陽太皇㣲延之炁六陽化眞白灝之炁七陽絳實子光之炁八陽天眞命仙之炁九陽太皇寂玄之炁靈寳九天生神寳符胞命元第一天眞炁通元寳符亦曰八生自然靈飛寳符胎命元第二天眞炁通生寳符亦曰王眞盧生混成靈符魂命元第三天眞炁通陽寳符亦曰三炁龍玉虚化主自然符魄命元第四天眞炁通隂寳符亦曰道真空玄九微素光符臟腑命元第五天眞炁通神寳符亦曰九虚玄生飛靈无精符靈府命元第六天眞炁通仙寳符亦曰王寳洞微左契理命保眞符元府命元第七天眞炁通靈寳符亦曰虚明左契神化通神符華府命元第八天眞炁通眞靈符亦曰空玄上元二炁化生自然符嶽府命元第九天眞炁長生通玄寳符亦曰九炁生符三景清微飛生符上清石景水母王精符玉清錬身符玉清金液錬形符靈寳登眞度命出離生死靈符元光金眞召六甲六丁金童符符下書本童子姓名靈華紫光召六甲六丁玉女符符下書本玉女姓名三簡靈符山簡符水簡符土簡符印文靈寳大三炁飛法司印玄玉章通章印三天太上之印上清九老仙都之印元始一炁混沌太極之印青玄左府太一救苦骸起死之印太章大明玉主之印神虎雌印神虎雄印北極驅都天大邪院印法主印神霄玉南昌上宫文寳印受錬司印靈寳諸符籙世本極多訛舛今將所授秘文叅以太上玉章三洞符訣稽考訂證稍合至理修行之士先須習熟呪訣詳翫符形庶幾書篆符合施用感通无上黄籙大齋立成儀卷之四十三, CK-KZ: ''}
