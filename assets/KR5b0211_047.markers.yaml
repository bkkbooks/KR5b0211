  - {type: variant, offset: 142, length: 4461, content: 帝經籍度師三元帝君靈寳監齋大法師眞君三界官屬一切眞靈臣聞赤書御運開齋謝之門庭黄籙度生著靈仙之品格凡伸修奉合具奏陳臣今爲某處某官資薦某靈乞就某處崇建无上黄籙大齋三日三夜仰祈睿澤普濟幽明謹爲勵率法流關盟齋法恭依玄範宿啓黄壇伏願上聖回光衆眞監度俯垂降鍳同賜證盟臣無任瞻天望聖激切屏營之至啓壇文䟽謹用奏聞三曰正齋六上啓經嘆經文存思轉經之法並見升壇轉經儀止隨時換易前後白語耳第一日早上嘆經文啓經用舊文紫府玉文周十方而惠庶品玄都瓊札總百魔以濟羣生上可致飛天下觀下可使死魂受錬殊因溥博稱嘆莫窮以今奉爲具官某資薦某靈修建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻無上大羅天玉京金闕七寳紫微宫元始天尊虚皇大道君太上老君道德衆尊三洞靈文瓊章玉字十方衆聖歷劫師尊扶教眞人玄中法主齋壇合㑹一切眞靈集此勝因先用裝嚴諸天諸地日月星辰嶽瀆靈祇風雲主宰宗桃先聖帝后儲王文武官僚華戎黎庶伏願二儀長永三景著明六炁均而寒暑平八節和而兩暘若瑶圖鞏固寳曆延洪寰宇昭明兵戎戢息九圍共軌四海同文亡過某靈魂黒簿除名朱宫度品眞心不昧覺性圓明建齋弟子某厄難移遷凶災殄滅一門康泰咸躋仁夀之郷七祖升遷徑陟逍遥之境含靈受賜幽夜開光稽首皈依䖍誠讃詠右嘆經文升壇轉經儀巳載矣今復撰此正以轉經儀一卷悉是社廣成先生撰集不欲改動古儀又慮今人以爲習熟故再立此晚上啓經文元始本章植神靈而開三景諸天隱韻禳毒害以度兆民悟之者證道成眞聽之者消災滅罪巍巍大梵蕩蕩難名以今奉爲某資薦某靈崇建无上黄籙大齋謹集戈前清衆㸔誦太上洞玄靈寳無量度人上品妙經願仗眞乗消除罪垢福田増長保身眷以安寧慧澤霑濡使幽明而開泰恩均家國澤被存亡嘆經文經傳元始教闡虚皇俾拯護於羣迷用生成於萬彚恩光普被惠力難名以今奉爲具官某正薦亡親某乙普薦在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻髙皇九土四司五帝十二仙君九宫眞人洞天福地儲副正職五嶽佐命治化仙官北都羅酆内外宫洞三官九府百二十曹一切㝠司考官掾吏集此勝因先用資福四生六道十地九幽一切窮魂無邊罪魄亡過某靈齋主某家億曽萬祖歷劫種親宅舍方隅沉埋滯識伏願尅超生界咸出苦源聽法聞經徑到無爲之境叅眞悟道永離有漏之塵齋王某禄筭増延災殃殄滅金眞散結元道遏見户之根玉簡注名天機乞延生之録姻親康泰幽顯蘇榮第二日旱上啓經文赤明開圖眞文現世集諸天之隱韻成八㑹之靈章俾極護於羣迷用超淩於萬彚以今奉爲具官某正普薦亡親某乙在㑹衆魂崇修无上黄籙大齋今集見前清衆看誦太上洞玄靈寳無量度人上品妙經願仗眞猷消除業累九宮八卦不爲身命之災六趣三塗俱證眞常之果姻親康健逝爽遷升普及羣生同霑上善嘆經文至眞經寶最上福田凡所皈依隨願獲果惟度人之上品實萬道之根宗無量勝因非嘆能盡以今奉爲具官某正普薦亡親某乙在㑹衆魂修建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以兹功德回獻扶桑大帝暘谷神王三河四海九江水帝八溟四瀆十二河源川澤神祇龍神主宰集此勝因先用資福遍十方際盡玄虚界有形有象有識有情蠢動飛行胎卵濕化日月照臨之土風雲潤澤之郷一切含靈無窮品𩔖伏願飛潜遂性飲啄隨心咸出苦源同臻道果齋主某災殃不染福慶來并早入慧源悟無生之法相克成仙道斷有欲之根塵見在利安先亡超化恩流家國福被寰瀛晚上啓經文大道無名元炁潜太空之始至眞垂象靈文開大有之先有禱悉符無文不度以今泰為具官某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋今集見前清衆看誦太上洞玄靈寳無量度人上品妙經願仗眞詮普資洪福慈雲廣覆除十方世界障業之根慧露遐覃息九幽長夜焦勞之苦亡魂超化疫癘消亡普及含靈俱登壽域嘆經文寳珠懸空納十方無鞅之衆眞經洞煥作五色鬱勃之祥是爲微妙之文普度淪胥之苦以今奉爲某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻某甲子太嵗尊神九州十道廟貌神祇府縣城隍之神司命土地行年部分一切衆神集此勝因先用裝嚴弟子某家奉事香火内外衆靈太歳部下逰年神煞住居里域禁將等神伏願安鎮其方各居所部斥凶衰於四境除災沴於八方火盜消除門庭清吉齋主某疾疫不作福禄惟新虚耗潜亡精靈伏匿姻親康泰上南斗之生名逝爽遷升除北隂之鬼録含靈受賜家國蒙休第三日早上啓經文大道分光初演不言之教天尊布化漸垂有作之文結炁成章凝雲作篆總包萬法普度羣生以今伏爲某正普薦亡親某乙在㑹衆魂崇修无上黄籙大齋今集見前清衆看誦太上洞玄靈寳無量度人上品妙經願仗眞乗解除罪垢法乗接引俱消塵漏之縁聖智圓通齊契正眞之果亡靈受度率土蒙恩嘆經文元始靈書度人上品落三災度九厄理五炁混百神寳之上天不傳下世是謂玄奥難可尋詳以今奉爲某官某正普薦亡親某乙在㑹衆魂崇建无上黄籙大齋謹集見前清衆看誦太上洞玄靈寳無量度人上品妙經各一過並巳周圓以茲功德回獻南極長生大帝