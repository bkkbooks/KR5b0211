  - {type: variant, offset: 14, length: 2448, content: 上執法仙士苻叔與重修修奉應用門建齋之始投詞頌渺渺空無象悠悠感至靈敬則承天貺泄則被魔精吉凶隨運轉否泰應縁生道不貴珠玉神惟在至誠丹愊盡勤苦懇悃竭衷情自然通大道皆得降眞靈捻香陳所願稽首崇嘉貞天尊常湛寂回心禮杳㝠啓堂頌學道當勤苦歛信運丹誠燒香歸太上眞炁雜煙馨惟祈開大宥七祖離幽㝠三皈依讃至心歸依十方道寳當願衆生起心回向一切信禮至心歸依十方經寳當願衆生心開悟解受持轉誦至心歸依十方師寳當願衆生普上法橋無有障礙聞經讃聞經巳後當願衆生萬罪永消善芽増長聞經巳後當願衆生深人法門皈依信受聞經巳後當願衆生永斷執迷常修至道道讃道場衆等人各運心皈命三寳旡上尊一切念衆官各念功德請師讃修齋行道奉請經師降臨壇所籍度玄天監齋隨文改易請玄師頌科律嚴章秦精誠享百神投詞陳懇願潔醮奉髙旻俯盻垂雲駕㝠心啓上眞玄師都教主奉請降凡塵請天師頌太上傳符籙初因遇鶴鳴積功超玉闕列位侍三清接引章詞奏克隨凡庶情修齋當奉請願俯鑒精誠請監齋頌寳號流塵世仙階列上清三千功德滿八百行光成禮懴修眞福監齋作證盟今宵仙馭降祥祉被舍生請天官頌妙道垂眞教修齋立福田結壇朝上聖建醮㑹髙仙注念通穹極精誠感上玄天官乗寳輦彩仗下凡筵請地官頌翼翼陳丹懇兢兢仰紫虚祈通陳下志願逹土皇君潜應垂眞貺遐臨赦罪辜地官來下降旌擁五雲轝請水官頌方便開眞化慈悲立聖科䖍心修妙會調炁詠靈歌黙念祈淵府丹誠通大羅水官龍駕降雲錦起滄波請五帝頌五帝居仙品紏彈善惡因祥光臨宇宙惠澤濟沉淪發露祈天祐㝠心感聖賢存心俱快樂享福永旡垠請正一三師頌靈寳明科範三師列上清修齋䖍降格功德貴精誠仰屈眞仙馭廻翔羽斾旌克疇垂福佑享報應凡情請經師頌入静修黄籙嚴裝啓上仙奏章先逹御詞欵欲關宣寳籙因師度威儀太上傳經師來下降奉請列羣仙請籍師頌肅肅祈清福詵詵結寳齋登壇須此夜行道續徘徊有願仍須啓皈心道眼開籍師來下降仙仗下瑶臺請度師頌經戒丹心禱䖍誠召百神捻香祈至聖持戒請仙眞清詠淩朝啓精思入夜勤度師來下降保護結齋人焚詞頌人生多障難大道實矜憐救度留科戒咸今懴罪縁愆辜編地府釁結巳聞天發露祈眞祐誠心仰聖賢䖍恭禮三寳願得㧞九玄壽長年焚詞歸上界奏名玉帝前又太虚感靈㑹命我生神章一唱洞九玄二誦天地通混合自相和九徧成人功大聖慶元吉散花禮太空祈神神必應請福福當弘諸天並歡恱一切稽首恭度簡頌赤明開元圖和陽通上虚元始敷靈章十部飛天書開度九幽祖萬徧道自俱玉阜秀瓊林生死福德廬自無黄籙簡苦根焉得除旋行誦靈章五靈還相扶投龍簡頌祈眞登紫府山簡云紫嶽土簡水簡云紫府告命詣靈壇山簡云靈山水簡云靈泉玉女謡梵響金童奏香烟書名通九地列字上三天永享無期壽尅成髙上仙解壇頌太空包有象至道窈无形承和通妙炁應感達衷情倐忽周八極依稀降萬靈微香陳素欵委質表丹誠逺泛翔鸞蓋遐攀綺鳳旌烟宫髙鬱鬱雲閣上停停瓊駕出霄漢金龍入太清甘露泠人世景福被幽明送師頌修齋事畢仰荷玄恩志心稽首奉送某師雲輿勿住鶴駕難留後有修齋還當奉請送經師頌辭三帥讃見杜儀經法雖玄妙崇奉悉因師凡有立善者咸當願禮之氣運功易就心慢悔難追若能勤繫念朝夕自仙飛送籍師頌道以齋爲重法以朝爲常不修不奉者焉能遊帝郷有骨入仙品自然開紫房玄女排雲駕但見金銀堂是故謝三師稽首禮虚皇送度師頌迢迢玉京山玄都何巍巍眞人乗歩虚朗朗長夜開大道由人弘心至神自歸修齋行道畢稽首辭三師送正一三師頌至道傅師旨垂光巳燭壇隂靈皆感召號令肅仙班鶴駕將臨翥鸞𩥵亦告還天邊想歸路佩玉聽珊珊送五帝頌仙仗來霄極尊臨列五方旍風吹羽節鸞輅駐清場齋事將圓徹廻輿返上蒼流恩無不徧豈但感馨香送天官頌妙範修齋直明科洗罪根瞻穹崇上善歴懇致微言既納依投請蒙垂福宥恩天官還玉府寳駕入金門送地官頌淨㑹朝元罷齋功結果圓眞恩宣五嶽誠悃奏三天徹席停虚範解壇送列仙地官廻嶽府髙陟五雲軿送水官頌宣演玄音畢諸仙返上穹靈風除横厄甘露報眞功復命驪龍駕遥還暘谷宫水官歸洞府福禄賜無窮送監齋頌靈壇崇法席允頼下監臨紏過兼書善眞仙亦仰欽行當驅道騎縹緲五雲深生存當有頼更復濟幽沉送天師頌齋法巳精嚴表牋奏上天至誠通感應闔門得延年幽㝠昏暗獄罪苦悉皆原掌握諸天籍章詞御帝前祖宗咸升度嗣裔慶榮遷三天扶教主事畢奏功圓送玄師頌上帝命眞仙修齋黄籙壇諸天來下降焚香懴罪愆九時行道畢齋事巳同圓亡魂得超度玄師上九天回曜飛光頌煌煌滿巵燈閃爍同月光反照名回曜滿空象列星流光如虹蜺散艷生蓮華誤入瓊瑶洞宛在玉芝房玉女映玊珮金童照金裳萬靈登道岸衆眞聚華堂龍樓十二轉晝夜輪光芒光明頌太上大道君位處無何郷寳光眞童子下理九幽房悲嗟苦魂役㧞度痛哀傷二十四門戸咸令聞寳香燈明長夜照願消累劫殃北帝頌稽首無上道歸心元始尊至眞妙應主開化飛玄門妙戒怡五靈金書警萬神察命定籙籍靈符度苦魂乗雲朝玉帝齊契玄中人焚簡頌太上法微妙籙籙度天人元始告符命時刻獲升仙傳授救沉溺皆得自翛然書名全簡籙逍遥玉帝前白鶴讃太一眞人氷雪容歩虚來徃本無蹤蓬萊要去如今去雲在䆫前鶴在松白鶴千年始一