崇建无上黃籙大齋三晝夜仰慿道力普濟幽沉乞按眞科宣行錬度謹備太上昇玄消災護命妙經三十六卷金錢三十六分從馬三十六騎右謹獻上錬度合㑹一切眞宰南昌上宫錬度眞仙朱陵火府錬度眞仙南陵樞府錬度眞仙水火二司錬度仙吏靈寳大法錬度仙吏靈寳仙曹官童將吏金童玉女一切吏兵諸司法院宣通召命承差將吏靈寳監察直符直事地水職司導從官吏城隍土主里域眞官靈壇翊衞應感威靈伏惟聖慈俯賜昭鑒謹䟽年月日具位姓名䟽可漏黄簽真錢馬䟽獻錬度合㑹真宰一切威靈具位姓名謹封斛䟽郷貫黄籙大齋主具官姓某今爲正薦亡親某乙普薦在會衆魂開建无上黃籙大齋取某日夜普設無礙夜齋斛食看誦太上眞經睿號焚化經旛𡨋財廣集善因總資超度開列品目如後一請道士看誦如别看經禮懴遂項添入太上洞玄靈寳无量度人上品妙經幾卷太上洞玄靈寳九天自然生神章經幾卷太上洞玄靈寳九眞妙戒拔罪妙經幾卷太上靈寶天尊說救苦妙經幾卷元始天尊說生天得道眞經幾卷元始靈書中篇幾卷一稱念玉皇大天尊玄穹髙上帝寳號幾聲太乙救苦天尊睿號幾聲九幽拔罪天尊睿號幾聲朱陵度命天尊睿號幾聲十方洞靈睿號幾聲一焚化某經無量數某旛無量數𡨋衣無量數𡨋綵無量數駝馬無量數巳上並用普薦六道四生孤魂滯魄各離苦趣同證逍遥右伏以清都演教普垂開度之科碧落傳經廣示弘慈之化前件功德普用薦資伏願眞性常明克淨多生之垢幽塗罷對遂停五道之輪徑登快樂之郷永斷淪胥之苦仰惟大道俯賜證明謹䟽年月日具位姓名䟽可漏功德䟽普薦六道四生孤魂滯魄一切衆靈具位姓名謹封薦亡䟽某親具位姓名今爲亡親某官今月某日届當某辰普薦云今爲貨薦亡親某官謹備鎮信物儀具狀投靈寳大法司乞請道士一壇就某處宫觀取某月某日開建无上黄籙大齋三晝夜滿散修設謝恩清醮三百六十分位仰慿道力開度生方所有看誦眞經睿號焚化經旛𡨋財等謹具列品目如後一請道士看誦某經幾卷某懴幾卷某號幾聲一焚化某經旛幾卷錢財幾分從馬幾疋已上並用追薦某故某官尊靈超生仙界右伏以龍章玉字鳳檢瓊文䆁萬罪於寒庭濟羣生於福境是辰功德總用薦資伏願魂度朱陵名列南宫之籍神昇碧落罪銷北府之書自在逍遥長生快樂恭惟大道俯賜證明謹䟽年月曰某親具位姓名䟽可漏功德䟽資薦亡覩某官尊靈某親具位姓名謹封薦家廟三代宗親䟽文式同前疏三代宗親之外更入本宗先逺内外姻親一位庶功德尤普右伏以紫闕髙尊演瓊科而流惠澤玄都上聖宣寳範以濟寒𡨋用集眞功普伸資薦伏願苦根散釋善果増崇身超流火之庭字録瑩金之簡福垂後裔慶被家門恭望道慈俯垂昭鑒謹䟽年月日䟽可漏功德䟽資薦三代逺化宗親諸位尊靈薦亡人四負𡨚家債主䟽文具齋主位姓某今爲同前䟽經懴𡨋財隨多寡開列巳上並用普薦亡靈三世負財負命負恩負德𡨚家債主之衆同獲離苦各遂超生右伏以金科祕典玉字寳音開業障於迷津釋𡨚憎於昧境前件功德並用薦資伏願業累蠲消𡨚愆解釋永斷仇讎之念各生和㑹之心同仗眞功俱登福境恭惟大道俯賜證明謹䟽可漏功德䟽薦具位姓某䟽封功德都䟽某郷貫居具官臣姓名謹瀝丹誠上干洪造臣伏爲入齋意至醮用㧅儀具狀投靈寳大法司乞請道士一壇就某處建立靈壇取某日爲始崇修无上黄籙大齋三晝夜九時行道預依次第宣演眞科建立華旛遷拔罪爽持誦太上眞經睿號拜奏天官濟度諸章立纂舒壇謄詞效欵列陳鎮信敷露眞文然燈續明請光破獄告行符命開赦九幽召攝魂儀沐浴錬度普施九泉六道清淨無礙夜齋受戒傳符給籙破劵依科昇度保舉超生滿散拜表言功投龍進簡取某日夜祗設清醮三百六十分位上謝洪恩供養酒果香花化貢車輦錢馬修奉普巳周圓意者仰仗道慈普超逝爽上資家國下祐見存謹具録囬奉奏獻并資薦應干眞經睿號開具品目敷奏于後一請道士某人看誦某經並逐項一一眞列依開經䟽開之右伏以玉檢靈篇道演超凌之化瓊䑓祕範功宣開度之儀仰仗眞游俯濟寒苦伏念臣亡故某乙及三代宗親等粤從遷謝罔測昇沉渉世塵深孰悟愛河之飄浪生仙路邈難逃業道之輪廻式建殊勲用資𡨋福冀假三洞眞筌之力普開九幽長夜之魂伏願昭錫恩光遷昇逝爽寒庭無間悉登快樂之郷法界有情俱入逍遥之徑臣無任祈天望聖激切屏營之至謹具䟽上奏以聞謹䟽歳次某年月日具齋官位臣姓名䟽貼黃奏爲滿散元上黄籙大齋薦亡魂某在會衆魂乞超生界進奏修奉功德品目事倚黃乞降付天功行下三界十方照應可漏正西貼黄荟與䟽後貼黄同具齋官位臣姓某䟽奏謹封方函功德䟽一函上詣三天門下諸具髙功位姓某謹重封進䟽繳狀功德䟽入函發去靈寳大法司本司今月某日伏爲修齋弟子某人正蔍云親某乙普薦在會衆魂崇建无上黃籙大齋三晝夜用資超度滿散祇設清醮三百六十分位仰謝洪恩所有弟子某進奉功德都䟽一通巳恭對太上御前宣奏訖今謹繳進前去須至申聞者右謹具狀申三天門下省伏乞逕爲通進請降敕命付天曹紀功行下三界十方照應施行謹具申聞伏候昭報謹狀歳次某年月日具髙功法位姓某狀无上黃籙大齋立成儀巷之十二, YP-C: 呪}
