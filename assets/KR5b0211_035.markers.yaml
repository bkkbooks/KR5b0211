  - {type: variant, offset: 2, length: 3365, content: 黄籙大齋立成儀卷之三十五白五三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿撰集齋法修用門釋言功拜表杜廣成先生曰表文以黄素五尺朱界朱書毎行二十四字生字不在下死字不在上第一行盡書法位至頓首字上言獨占一行太上無極大道居第二行表後以聞去臣姓三行聖號去臣姓三行年月去聖號三行一如章法不得塗攺注乙譴責尤重謹之讀表時取表於香上熏之即讀法位起再拜託復長跪和聲正炁讀之至弟子名皆令再拜至誠惶誠恐處起再拜至年月日時某處拜上又再拜都畢展於玉案上證對御前以龍頭書刀鎮聖號之左朱筆鎮右訖次三捻上香長跪叩齒三通遣表勑表畢法師於案後臨目向天門曲身中存三五吏兵及三亢將軍功曹騎乗羅列前後身乗翠羽車龍馭在紫炁中冉冉而升上詣三天門下先謁三天法師入玄都宫門之左呈表訖已捧表函徑入三天門齎章呈章等從事一十二人表候上省覽畢即出三天門御羽車與騎乗而廻所經歴天宫道路次第一如三五拜章訣次叩齒十二通内官畢再叩齒三通咽液三過存三五上章官吏各復身中再拜次卷表於詞文之前内函中封印訖并眞文通於小桉上同案捧之監齋押之幢節前引弟子隨之至天門上焚之法師於本位向天門存眞官捧眞文表等隨香烟朱熖上升天門右言功表亦謂之言功章章表同法皆本正一古者籙生祭酒領户化民進拜章書止是依法操露存思遣官齎呈以俟玄報所以本科遣章云若有謬誤顚倒長毫利筆隨誤正定等語楊傑金籙却以巳見刪去比三十八字蓋是未究古法操伏既畢章書止留治中至三无日依斷章法方一併焚去至上元後所拜章書至中元日斷中元後所拜章書至下元日斷蓋古者法籙全備傳授有宗三五吏兵呼吸相應不專委心於文書也杜廣成納官後方收表入函焚於天門上蓋是古法後世傳授失眞自度非慿文翰莫期感通故於遣官後即卷表入函法師依法存伏隨即焚燎蓋少變古法矣至趙道昇則又自以聞後令法師從後讀至前仍以圭三熨聖號蓋天一法也靈寳五錬生尸經有黄繒章法乃是表式建齋之初必出官啓事事畢拜表與之言功令其隨表上詣玄都列受功賞𥘉未嘗再出官也楊傑被旨剛修科文却於散壇三禮後重稱法位再出官而後拜表自後相㳂不革蓋是不曽深考經文非古法也釋納官衆官長跪法師叩齒十二通納官畢再叩齒三通咽液三過存三五官吏各復身中釋納職各依位相次於三寳前禮一拜長跪受簡於髙功訖起三禮退就西立並訖髙功三拜行就本位釋宣簡先三捻香執山簡文叩齒九通讀之香熏三過乃讀讀訖衆官再拜令弟子執簡横於香烟上法師叩齒九通面東呪之呪時衆官隨聲言之畢衆官再拜簡文并呪金龍驛傳四字皆三度言之呪訖封題如法水土二簡一同還戒頌天尊大慈悲說戒度衆生威德被幽顯果報感神靈諸天來稽首羣魔自束形過去超八難見在保千齡齋福行當息相共送䖍誠流梵逸雲唱飛香雜烟馨瓊鳯乗丹輦金龍駕緑軿生死皆快樂家國悉安寧太極頌并釋道以齋爲先勤行登金闕改設大法橋普度諸人物宿世恩德報道心超然發身飛升玄都七祖咸解脫右出太極敷齋威儀經學仙頌大學仙頌見轉經儀學仙行爲急奉戒制清心虚夷正炁居仙聖自相尋若不信法言胡爲棲山林空洞頌出靈寳空同靈章經元始開圖敷落玉篇髙唱空洞飛歩入玄神王度命乗虚駕烟禮誦靈章與劫同年三塗五苦頌三才及萬物倚伏各有齡終始大劫數福盡天地傾徃反於五道苦哉更死生展轉三塗中去來與禍并大賢慎茲戒忍世念割情愚夫不信法罪痛常自嬰吾念世無巳今古重告明若欲度斯禍皈命太上經罪福不由他諒自發爾身大賢故閑口欲絶諸惡縁滅念皈兼忘倚伏待長泯弘道以安世終當見正眞淫嫉爲禍首滅身之至患貪養如斯禍恐必致夭殘知惡而不革豈是道所安懷毒日齋直今我發長嘆宿命有信然弱䘮謂之無皆欲服前見過目即言悠大賢明道教𢡖戚憫頑夫依依念子苦勤勤令我憂人命易消盡亦猶膏中火四大暫相遇五物權時假盛年當勤學趣求存吾我福盡身神散㝠㝠地獄下上聖畏是故尋道度斯禍學仙行爲急奉戒制清心虚夷正炁居仙聖自相㝷若不信法言胡爲棲山林大賢樂經戒受之爲身寳就學常苦晚治身恨不早比當披幽𧷤倐忽年己老執卷吸爾極將更死痛惱吾故及弱齡棄世以學道右太極真人作出靈寳本願大戒經釋然燈下元黄籙簡文靈仙品曰㧞度罪根威儀十方各安九燈火合九十燈在都門之外太歳行年大小墓本命俠門然燈隨主人所安多少毎令光明徹照竟夕勿使中滅右黄籙簡文然燈雖有定數要須量力及壇席闊狹施之勿使妨礙行事及勿汙人衣冠為佳上元金籙簡文眞仙品曰然燈威儀功德至重上照諸天下照諸地八方九地並見光明全在侍燈之官勤爲同意毎令燈光明徹竟夕不得中滅及丰暗半明令人絶世冝常謹之飛天神人曰學士不明然燈燒香七祖不得開度長夜之府九幽之中身無光明考屬太隂曹杜廣成先生曰禮燈之法出金籙簡文凡修齋行道以燒香然燈最爲急務香者傳香達信上感眞靈燈者破暗燭幽下開泉夜所以科云燒香然燈上照諸天福堂下照長夜地獄苦魂滯魄乗此光明方得解脫既然燈須各有法象春九夏三秋七冬五四季十二皆隨五行本數設之更有諸天諸地八卦九幽諸燈之位隨金籙簡文中方位羅列燒香禮祝福德立降災咎自消或以啓齋之夜或三日七日之中如法然燈落景行道畢出壇至地戸以讃詠幢節庠序雅歩