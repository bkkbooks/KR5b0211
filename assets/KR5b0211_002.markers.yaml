  - {type: variant, offset: 2494, length: 2197, content: 籙之所中列天眞皇人黃籙院眞宰符籙中典籙靈官等供養如法普度堂外設茭郭中安斛食立六道位餚饌供養如法近水際爲之尤佳誦經堂中設三清三寳之位香花供養如法𦆵開啓畢即集道衆於此轉誦訖事具䟽宣懴請師第六科曰開度天人救護群品非師不度非師不仙況建齋請福濟度存亡必得其人庶獲通感在於備受圖籙閑練齋科知俯仰之儀明進退之格思神念眞若面奉金闕關啓敷奏若躬朝玉皇庠序得宜閑雅無失注心丹至精誠通感乃可謂之師矣若法師佩三洞衆官叅洞玄者可著之闕人之處可洞玄爲法師紫虚正一爲衆官齋法出於靈寳屬洞玄以此行之理亦爲當其他十戒白簡道士不可著職升壇此外竊預名號自貽𡨋譴登齋衆官要在契心恊志共建齋功一或異同有傷和氣隳墮功果蓋以皇天厚土幽府重泉十方無極之鄕三界難量之際非得至人謄詞啓告依式關宣則何以和同天人蒙福幽顯如是末學下士泛泛之流道行旣不素充齋法又非閑習惟務財利冒昧宣行非惟徒役精神虚費財寳將見學法未備俯仰之格進止有犯太眞之科擿埴𡨋行自速玄憲建齋之主豈免負累乎結齋之士雖不厭多然德行難全恭勤者少大凡以七人已上至十四人爲率如乏人之處無身佩眞文上法者則不必廣延濫備名數今世道教陵夷互相宿習凡受籙者止就宗壇請籙詞及法服帖爲據儼然自稱某籙弟子冠裳楚楚殊似可觀欺天罔道無甚於此所宜痛㢤不使登壇縱壇官闕處亦須備受都功盟威籙者方可著之衆官法服品位第七科曰服者所以旌禮也登壇朝眞不容紊亂經圖備職籙髙卑用以彰明各在法度始於正一終於講師髙下之儀一如定制正一法師玄冠絳褐黃裙絳帔二十四條丹火玉珮斬邪之劍長二尺四寸紫虚法師玄冠黃裙黃褐黃帔二十八條青玉珮紫虚陽光之劍二尺八寸又五帝召靈之劍明玉佩洞神法師玄冠黃裳青褐黃帔三十二條白玉珮太一三元之劍三尺又三皇太乙之劍青玉珮洞玄法師芙蓉冠黃裳紫褐紫帔三十二條明光玉珮八景揮靈之劍三尺六寸又五帝威靈禦邪劍素玉之佩洞眞法師元始冠青裙紫褐紫帔青裏表三十九條珠玉綉履震靈之座玉簡瑶笏震靈之劍左右垂玉珮珠璫前後通眞召靈之符或仙衲雲霞之帔大洞法師元始冠黃裙紫褐五色雲霞帔劍珮如洞眞法三洞講師元始冠黃裙紫褐九色雲霞之帔無劍珮如上品職髙卑皆爲朝眞法服陞壇以朝眞交靈也寳海云劍者辟邪制非威神伏魔珮者進止動靜以中律度各有第級也夫天眞上聖法式威儀萬品千名變化無極至於樓臺宫闕結氣凝雲恍愡有無不常厥所或飛臺行舘空裏轉移或金闕玉樓虚空化出或大包宇宙或細入毫芒其於羽衣雲衫霞衣玉珮珠幢寳節飛印瓊冠瑶笏霓旌鳳輿龍轂日旂月斾鶴駕鸞𩥵雖資變化之神亦有等差之秩所以朝眞法服劒珮冠衣取象上眞垂儀下士若其清齋端黙靜室凝神合炁虚無遊心澹漠宻朝大帝隱叩玄關無煩服飾之殊自㑹感通之要尊卑品秩一切泯然其如行教表儀立䂓定體各循階序此可爲常按而行之亦玄門之盛羙也弘法之士其勉之焉齋饌第八凡營齋饌飯食隨時餅果蔬菜並須清淨安置如法勿使小兒禽畜汚犯其酥乳酪並不得登齋厨齋後茶湯方可通炁而巳正齋之日上三寳前及監齋法師監壇正神獻齋聊以表誠不在多品仍於三寳十方及諸幕前備時果供養獻細茶棗湯三寳三十方十六幕十四監臨量力獻之毎朝發爐後茶大謝時獻湯諸幕叅謁時即便獻茶湯也沐浴第九登齋入靜以潔爲先內以法水洗心外以香湯洗垢心靜則塵念自息垢除則眞氣流行學道之人常宜澄心定慮沐浴薰香可以通達神明感降眞聖矣毎修齋之前當煑五香之水以浴青木荆芥零陵蘭香眞檀如無五香之處可依紫虚元君沐浴解穢法以竹葉十兩桃白皮十兩以水二斗煑一兩沸通寒温先飲一盞以此沐浴諸穢自散凡入靖行香水漱口謂之除穢出靖亦如此謂之閉眞炁日辰第十崇建大齋要揮節㑹開壇謂宿啓日及正齋第一日散日更傎艮日尤佳雖得吉辰仍避丙寅丁卯丙申丁酉戊辰戊戍及受死龍虎日爲善惟三㑹無避忌若啓齋巳得吉日而以後日分或值當避之日則不須忌拜章却忌六戊日以天門不開故也關發文字避截路空亡時值大吉小吉傳送功曹爲美三㑹日正月七日天曹舉遷賞㑹七月七日地府慶生中㑹十月五日水府慶生大會三元日正月十五日上元七月十五日中元十月十五日下元八節日立春春分立夏夏至立秋秋分立冬冬至出玉清經五臘日正月一日天臘五月五日地臘七月七日道德臘十月一日民歳臘十二月王侯臘逢臘日是王眞人投趙眞人小三㑹日庚申日尸神白人罪過甲子日方一蕳闕神祇本命日百神朝身四始日正月一日四月一日七月一日十月一日十天逐月下降日明眞科拔度死魂罪對上品常以六陽月每月合十日及八節甲子庚申日依威儀具法開啓一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日節㑹日甲午天節甲申地節甲子人節甲辰四時會甲戌五行㑹丙午天㑹壬午地會壬子人㑹庚午日會庚申月㑹丁卯眞仙㑹辛酉星辰㑹月三日辰㑹本命日萬神㑹岀女青律受死日正月戌二月辰三月亥四月巳五月子六月午七月丑八月未九月寅十月申十一月卯十二月酉龍虎日正月巳二月亥三月午四月子五月未六月丑七月申八月寅九月酉十月卯十一月戌十二月辰聖忌日丙寅丁卯道父忌丙申丁酉道母忌壬辰壬戌北帝忌戊辰戊