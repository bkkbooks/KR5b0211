  - {type: variant, offset: 0, length: 2507, content: 无上黃籙大齋立成儀卷之二鳯二三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿編次壇幕第五科曰禮天地通眞靈當建壇以申至敬三洞齋儀䂓範不同各見本法靈寳黃籙齋壇具式如左内壇十門用長纂十八枚短纂十枚合二十八枚以絳繩或青繩三度欄之第一度自長纂花頭下連門通欄之第二度目短纂花頭下欄之第三度去第二度二尺來許欄之要與第一度絳繩髙低相似其第二度第三度絳繩止欄空處勿欄門也又於長纂頭十字交加綳繩懸掛小旛及弔枝花之屬十門之外各依方位掛三十二天旛三十二首毎兩纂之間施一燈纂遇夜然燈中外級壇亦施燈纂長七尺並自壇面量起爲則纂上花頭之屬不在數内壇三級各髙一尺五寸或一尺二寸或九寸爲則中壇四門用長纂八枚短纂二十枚合二十八枚開四門餘悉用絳繩或青繩欄之旛花相間並如内壇法應登齋行道止自地户出入餘三門不可徃來常叮嚀臨壇執事等軰六職之外或添副職叅賛行事當次侍燈下立班今世知磬掌儀即古都講之職表白即古監齋之職㸃酌直壇即古侍經之職手爐即古侍香之職直燈燭即古侍燈之職壇官各不舉職而六職之外始多冗名矣外壇止於離宫開一門出入用長纂九枚短纂十六枚合二十五枚除離宫外餘悉欄之旛花燈纂相間如上法執威儀者毎壇一面分定三人遇歩虚旋繞依次而行常令一面有三人執威儀旋繞不可今踈宻不均也壇外然燈總十有六合一百五十九燈太歳燈隨年建本命行年大小墓燈隨齋主生屬安之本命行年燈隨十二支轉大小墓燈以五姓納音推十方九宫二十八宿五嶽燈並於逐方然之七祖九幽燈本法然於中庭恐妨行事可於西南然七祖燈於鬼戸然九幽燈田先生齋壇圖又有六甲十直諸燈無所經據金籙簡文亦無禮祝之法今刪去壇席狹處不可鋪燈可於别處安之依儀禮祝此廣成先生之意也道戸燈二本命燈三隨生年行年燈七男一歳起寅女一歳起申太歳燈一隨本年大墓燈三宫羽辰商丑角未徵戌小墓燈五宫羽戌商未角丑徵辰七祖燈七東北九幽燈九分八方中央寄西南立脾云東方風當獄澄之類夾門燈二與道户燈相對列於門之左右二十四炁燈二十四東南八卦燈八分八方各各立牌子九宫燈九分八方安中宫寄神名立牌書某宫燈十方燈十立牌二十八宿燈二十八匀布四方起角之軫各立牌名云某宿燈三十六天燈三十六天門五嶽燈五分四方安中嶽寄西南各立牌右於各燈下立一牌書燈名云道户燈角宿燈之𩔖内壇十門黄籙簡文靈仙品曰十門榜廣三寸三分長二寸四分隨方色東方青華元陽門朱書青榜卯地南方洞陽太光門黃書赤榜午地西方通隂金闕門黑書白榜酉地北方隂生廣靈門青書黑榜子地東北靈通禁上門白書黃榜寅地東南始陽生炁門白書黃榜辰地西南元黃髙晨門白書黃榜申地西北九仙𣑽行門白書黃榜戊地上方大羅飛𣑽門青書白榜亥地下方九靈皇眞門黃書青榜巳地中壇四門張清都儀與此不同天門黑書黃地地戶赤書黃地日門赤書朱地月鬥白書黑地天門青書黑榜亥地地户黃書赤榜巳地日門黃書青榜寅地月門黃書白榜申地外壇八卦纂中開一門震宫洞青之炁青書黃榜正東卯地離宫洞陽之炁朱書曰榜正南午地兊宫少隂之炁白書青榜正西酉地坎宫洞隂之炁黑書赤榜正北子地巽宫𣑽行之炁黃書黑榜東南巽地坤宫𣑽隂之炁黃書黑榜西南坤地乾宫𣑽通之炁黃書黑榜西北乾地艮宫𣑽元之炁黃書黑榜東北艮地八卦纂之外周廻依法然燈以花柱欄之壇纂八十一枚張萬福天師科法用六十四枚蓋壇止兩層外止列八卦纂耳長纂三十五枚枚長一丈九尺出土短纂四十六枚枚長七尺六寸六寸入土壇纂三重務在精好雕木漆畫作蓮花火珠之形上級中門用長纂十八枚短纂一十枚中級四門用長纂八枚短纂十六枚外級於離宫開一門出入用長纂九枚短纂二十枚以絳繩五百尺作三度欄之門兩旁各刻鏤日月瑞雲之形又於三級之外立花柱各髙三尺或五尺以青繩縻之護淨隔凡正中開一門出入而巳右按下元黃籙簡文靈仙品曰拔度罪根威儀當於中庭開壇四面四角上方下方合十門中央縱廣二丈四尺四面標纂牓題門位上下整飭又曰安中門畢於十門外開天門地户日門月門四角合作四門縱廣合長三丈二尺名四界都門安八卦標榜經中止云兩級蓋法天象地之義今依廣成先生儀範建壇三級如或地形窄狹不可依科營建立止上中二級外級就平地爲之務在變通不可膠柱外級止闊三尺亦可但中級拜跪不可狹也如上級二丈四尺中級當三文二尺上級一丈八尺中級當二丈四尺杜廣成先生曰常情所見皆以露壇爲宜殊不知誠之所感則九天非遥志所不通則跬歩爲隔若丹襟動於眞聖注念合於神明豈屋宇之能蔽乎且敕壇之後尚不可壇内逆行及外人干犯忤眞違禁科式甚嚴況風雨不常晴景難乆苟或關奏之際雨澤驟來失雍容庠序之䂓有匆遽奔馳之亂首尾旣紊誠敬全虧故儒家沾服失容不祭蓋虞於此耳以此論之則壇在宇下終始周旋固无失於禮容自可期於通感右立壇要取方位端正坐北面南如宫觀屋宇基址坐向不同當以方位東西南北定壇之坐向或背或偏却所不拘切可遷就壇位坐向取屋宇端正也玄師幕居壇之東一次壇之南靈寳玄師爲三天化主乃闡教之師應宣行齋事當先關啓證盟齋功張帳幕設聖像凡案供養如法五帝幕居壇之西一次壇之南五老上帝主人天功過之録證質齋功古齋在五方案上杜儀令就