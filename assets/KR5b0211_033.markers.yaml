中江表荆楚之間皆以都講執磬讃道行禮夫先鳴法鼓者鍾磬之謂也欲令羣官整肅儀制森然須先擊磬齊衆而後讃唱升壇亦都講之職也但以近年或都講年德稍髙不欲一一勞之即於衆官之内差一人執磬唱禮蓋事出一時元非古制詳其職簡頗謂曠官更有後學生情妄爲臆斷於六職之外置一人侍磬殊無經據訛謬亦深又髙功法師職在敷奏進止俯仰居衆之先或昏耄不任自可求退豈容假手飜類冗員今蜀地髙功止於發鑪復鑪兩稱名位其他宣讀皆委他人雖云先唱後隨何異龍吟鼈應此蓋不懼𡨋譴自掇罪尤人事尚且未容天道如何通感後之法主深可戒焉無蹈利於目前更増罪於身後監齋秉掌科憲繩愆紏違務在無𥝠共弘典法若有虧犯預須授簡告之受罰之人亦須甘心伏罪所冀外能合禮以全溥濟之儀内不欺心以免抱冲之恨不得使彈紏之際彼此喧然秉法者進退有詞負罪者譸張拒命不惟犯干玄聖實且取𥬇衆人其次侍經整飾壇場主張法席經科几案供養供皿施列敷張皆須檢校況舊法於齋堂之内置兩髙座三時誦讀故簡文云三時講唱是也又職簡云衛師子之兩座罰簡云聴經倚據不執簡又云請問敗句此皆明行道旣畢法師衆官三時講誦矣近代相承秪於壇場之内三時行道三時轉經無講唱之事亦無兩座之設然轉經之時衆官旣坐一人行淨水侍香行香侍經行經轉誦既了侍經收經安置本座及整拂壇席主持供飬無使外人淩冐輙踐法壇此乃侍經職務也不得虚參職任倚傲不恭使几案縱横壇場汙雜薦獻之物使僮僕入壇輕冐神眞淩犯禁戒且禁壇之後尚不許逆行而僕使庖夫容易出入例多此事切冝禁之苟或未除皆侍經獲其殃責也侍香所職具在簡詞之中近者因循多不勤恪豈獨香𤇆中絶徃徃火滅灰寒兼有髙功尚未升壇壇中擅𣸸香𤇆炷此例違失率皆有之省閱科儀亦冝戒謹侍燈惟在勤勵興廢合儀徹曙續明即爲稱職近有不經之士淺識之人不使侍經整飾壇筵别置直壇之號六職之外頗有冗名明鑒法師所冝共弃無履僞跡取笑後賢又按金科古儀及黄籙舊法宿啓之夜及言功之時皆先作自然朝後行齋事故啓齋儀云衆官相率先行自然朝至三禮後即告齋署職說戒宣科明旦晨曉依法行道此法自天師陸先生寇天師張清都相傳至今頗歷年代皆以齋法出於靈寳自然朝爲齋之祖宗故先行自然朝示不忘本也近有庸愚道士不達古賢之情先於玄師之前𥙷署六職宣科受簡然後升壇仍云簡寂先生齋法謬誤飾非謗說詞理紛然寡識無知一至於此尚有其黨相倣行之不唯獲亂法之愆實亦受謗賢之罪達教君子冝用斥之舊法之中有相傳錯誤者唯啓齋言功之時自然朝㑹合禮靈寳天尊而相傳禮玉寳皇上等號此稍失自然朝之本旨恐是年代綿逺書傳舛訛今於儀中巳爲改正非敢臆度惟理所歸時彦後賢共弘之矣右靈寳齋法具載十部飛天妙書其啓祝願念懴謝之詞威儀俯仰登降之格皆龍漢舊文不可改易法師職叅三洞備受經籙諳練儀軌方可宜行故張清都修建之儀止拜啓元章及牒里域神司此外别無關奏正以齋法玄微仙靈吏兵隨詞謄御不假驛傳文書而後期感通也自靈寳大法降世於是玉符金簡之文寳籙眞劵之目神虎攝召之訣南昌錬度之科五仙沐浴之儀回耀降光之格䇿杖破獄之法輪燈懴謝之門其修用有訣其施行有序遷升罪爽普度幽明視古法始加詳焉古法惟齋直講誦而不務它營故事體簡徑今世因崇建大齋而叅施衆法故節目䌓多今古異冝各有攸當須尋根蒂方識指歸夫正齋請謝宿啓散壇本之經文頒宣符命攝召鍊度本之靈寳法拜奏書遷㧞罪爽本之正一若洞究本末則施爲岡不合之士擇同志之人尋卜勝地建立壇場止依經文修建不叅衆法吾知道眼監觀功德巍巍未易淺近量也然非通貫三洞上學之士亦未足以進此釋宣禁右科云三十六禁出太極敷齋威儀經當用牙骨竹木爲之合三十六枚廣八分髙九寸刻書其文與簡相類張清都云行道之日置威儀案杜廣成云絳囊盛之毎升壇監齋執而行之有犯者授簡而罰之二者皆通張清都曰夫惡逆之身犯莫大之罪猶使齋戒請贖消散釁負尋齋之所修尊乎禮拜而況髙尚之士但儀軌之失愚謂以禮拜代之亦在乎通其拜數多少隨事輕重執事之官臨時詳判此陸簡寂之意也又三十六禁亦見太極玄都律以香油書罰止三十條而云三十六禁恐以主人當掃洒屋宇道士各齎巾褐版履關白監齋及有犯威儀下座上座於事有𧇊等合前後禁文爲三十六耳然外六條雖有禁文而無香油之罰似不可作簡今張清都云以竹木牙骨作簡三十六枚自髙功以下并科禁各一一書之要是合六職簡爲數也釋復鑪關啓事畢東向上香呪祝出靈寳三籙簡文威儀自然經无上黃籙大齋立成儀卷之三十三, CK-KZ-jye: ''}
