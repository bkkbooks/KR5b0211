  - {type: variant, offset: 46, length: 3629, content: 出靈寳滅度五練生尸經亦曰練度五仙安靈鎭神法專度亡魂齋壇安鎭所當遵用法用青紙朱書以鎭五方宿啓夜讀文訖以金龍鎭之散壇時讀文訖弟子捧文於香煙上法師叩齒十二通呪曰無上至眞大聖髙尊布化運炁三十二天八㑹九光自然成文安鎭天地保制劫年元始符命普告三元下勑九地上關諸天中告海嶽名山大川今日上告萬神咸聞弟子某乙修齋行道㧞度幽將三官九署削滅罪根永度三塗五苦之源世世受褔記名丹篇神生天堂錬化自然生死開度億劫長存九天誥命風火驛傳衆和三聲岀靈寳内音玉訣呪畢隨表函焚之外有五老赤書要文施用之法不一具載赤書玉訣杜廣成之序附見於左黃籙齋拯救幽靈遷㧞飛爽開度長夜升濟窮泉固其大旨也然祛災致福謝罪希恩人天普修家國兼利功無不被矣所鎭靈寳五老赤書眞文詳其所爲祗通四種一則求仙受道自東方九炁下二十四字二則禳制星辰自歲星輔肝下三十二字三則摧伏魔鬼自東山神呪下三十二字四則蠲消水害自下制東河下三十二字五篇之用於斯畢矣西京清都觀張萬福天師儀範云諸天隱語八㑹玉文元始天尊於香林園中爲上智童子所說下㧞五苦通濟九幽於遷神儀中刻石行用今則黄籙遷㧞冝用此文凶吉合儀銓量允當庶幾永劫可以通行呪祝焚燒與眞文同耳具有成法共弘之焉天復元年辛酉十月十五日癸未天姥峯羽衣杜光庭聖賔序智慧頌三首并釋智慧起本無朗朗超十方結空峙玄霄諸天挹流芳其妙難思議虚感眞實通有有竟不有無無無不容智慧常觀身學道之所先𣺌𣺌任玄肆自然録我神天尊常擁䕶魔王爲保言晃晃金剛軀超超太上仙智慧生戒根眞道戒爲主三寳由是興髙仙所崇受汎此不死舟倐歘濟大有當此說戒時諸天來稽首右出靈寳智慧觀身大戒經毎終一首各稱一拜釋說戒法師西向衆官東向天尊吿太上道君曰今當普宣法音開悟羣生爲諸男女解災却患請福度命㧞諸苦根使生者見道身脫八難死者歡樂飲食天堂早生人中轉輪聖王之家修齋求道皆當一心請奉十戒諦受勿忘專精黙念洞思自然勿得雜想撓亂形神能如是者便當靜聽第一戒者心不惡妬無生隂賊檢口謹過想念在法第二戒者守仁不煞愍濟羣生慈愛廣救潤及一切第三戒者守正遜義不婬不盜常行善念損已濟物第四戒者不色不欲心無放蕩正潔守謹行無玷汙第五戒者口無惡言言不華綺內外中直不犯口過第六戒者斷酒節行調和氣性神不損傷無犯衆惡第七戒者不得嫉人勝已爭競功名毎事推遜退身度人第八戒者不得評論經敎訾毀聖文躬心承法常如對神第九戒者不得闘亂口舌評詳四軰天人咎恨傷損神炁第十戒者舉動施爲平等一心人和神穆行常使然天尊言修奉清戒毎合天心常行大慈願爲一切普度厄世慊慊尊敎不得中怠寧守善而死不爲惡而生於是不退可得㧞度五道不履三惡諸天所䕶萬神所敬長齋奉戒自得度世天尊言道尊法妙人身亦貴故道開法遺戒經文以度人身人身既度上與道同冝爲精行持齋奉戒夷心靜黙志念分明一心歸向專想不二滌蕩六府過中不味内外清虚每合自然是其齋日揲皆啓願應心上徹四天司邏十部威神即下履行觀聽至音鑒映爾心如戒行道皆列功諸天禍福立彰道不負人勤竹諦受勿使魔言天尊言建齋行道四天帝王皆駕飛龍緑軿八景玉轝侍從真人玉女手執花旛前導鳯歌後從天鈞白鶴獅子嘯歌邕邕燒香散花浮空而來瞻禮行道觀聽法音天王下降萬靈朝焉如是豈可不盡其法也當先受十戒然後行道庠序雅歩靜心閉意坐起卧息不離儀格天王懽恱列名上清可謂得道在万寸之間奉戒頌并釋道爲無心宗一切作福田立功無定主本願各由人虚巳應衆生注心莫不均大聖弘至教亦由雨降天髙陵靡不周常卑故成淵海爲百川王是能舍龍鱗萬劫保智用豈但在厥年奉戒不暫𧇊世世善結縁精思念大乗會當體道眞右太極眞人作出靈寳仙公請問經說戒畢旋行吟之釋𥙷職謹按上元金籙簡文眞仙品曰登齋威儀當宿昔舉髙功法師都講法師監齋一人侍經一人侍香一人侍燈一人明日行道各典所署黄籙簡文所載止請同法四人一人監齋一人直事一人侍香一人侍燈於都門隨師旋行爲主人叩頭祈請㧞罪更相開度則自六職之外别無他名張清都科雖云齋官以六人巳上至十八人爲率然亦别不著所掌之職切意登齋行道止具六職其餘衆官並各分攝六職共舉齋事故金籙簡文曰登齋上下皆以職事爲上職事同者以年尊爲上年同者以人德爲上六職尊卑巳有定序若止一人則不立職事同者以年尊爲上之文於此㮣可見矣又太玄經曰夫欲傳授道法而對齋者法限三十八人小不可減六人齋法九日七日五日三日若減一日者此是㑹而非齋所謂三十八人者一曰三師一人爲正師二人爲護師即法師也二曰五保五人即都講也三曰六明六人即監齋也四曰七證七人即侍經也五曰八度八人即侍師也六曰九成九人即侍燈也是以藏中所載九層壇行道儀分𥙷六職不止一人意本於此近世自髙功之外其餘衆職各披法服具員充位别創知鍾侍磬表白直壇等目代舉衆官之職六職之外頗有冗名亦豈知登齋著褐誦經著帔科有明文齋直以精誠爲先懴謝爲本務在䖍切以期感通豈務求爲觀美耶杜廣成論此蓋詳矣今附于左杜廣成先生曰經科皆云齋官之內以道德尊髙者爲法師明練法度者爲都講又都講職詞云先鳴法鼓次引朋衆風則儀敬慿讃說即譛唱導引皆都講之務也呉中江表荆楚之間皆以都講執磬讃道行禮夫先鳴法鼓者鍾磬之謂也欲令羣官整肅儀制森然須先擊磬齊衆而後讃唱升壇亦都講之職也但以近年或都講年德稍髙不欲一一勞之即於衆官之内差一人執磬唱禮蓋事出一時元非古制詳其職簡頗謂曠官更有後學生情妄爲臆斷於六職之外置一人侍磬殊無經據訛謬亦深又髙功法師職在敷奏進止俯仰居衆之先或昏耄不任自可求退豈容假手飜類冗員今蜀地髙功止於發鑪復鑪兩稱名位其他宣讀皆委他人雖云先唱後隨何異龍吟鼈應此蓋不懼𡨋譴自掇罪尤人事尚且未容天道如何通感後之法主深可戒焉無蹈利於目前更増罪於身後監齋秉掌科憲繩愆紏違務在無𥝠共弘典法若有虧犯預須授簡告之受罰之人亦須甘心伏罪所冀外能合禮以全溥濟之儀内不欺心以免抱冲之恨不得使彈紏之際彼此喧然秉法者進退有詞負罪者譸張拒命不惟犯干玄聖實且取𥬇衆人其次侍經整飾壇場主張法席經科几案供養供皿施列敷張皆須檢校況舊法於齋堂之内置兩髙座三時誦讀故簡文云三時講唱是也又職簡云衛師子之兩座罰簡云聴經倚據不執簡又云請問敗句此皆明行道旣畢法師衆官三時講誦矣近代相承秪於壇場之内三時行道三時轉經無講唱之事亦無兩座之設然轉經之時衆官旣坐一人行淨水侍香行香侍經行經轉誦既了侍經收經安置本座及整拂壇席主持供飬無使外人淩冐輙踐法壇此乃侍經職務也不得虚參職任倚傲不恭使几案縱横壇場汙雜薦獻之物使僮僕入壇輕冐神眞淩犯禁戒且禁壇之後尚不許逆行而僕使庖夫容易出入例多此事切冝禁之苟或未除皆侍經獲其殃責也侍香所職具在簡詞之中近者因循多不勤恪豈獨香𤇆中絶徃徃火滅灰寒兼有髙功尚未升壇壇中擅𣸸香𤇆炷此例違失率皆有之省閱科儀亦冝戒謹侍燈惟在勤勵興廢合儀徹曙續明即爲稱職近有不經之士淺識之人不使侍經整飾壇筵别置直壇之號六職之外頗有冗名明鑒法師所冝共弃無履僞跡取笑後賢又按金科古儀及黄籙舊法宿啓之夜及言功之時皆先作自然朝後行齋事故啓齋儀云衆官相率先行自然朝至三禮後即告齋署職說戒宣科明旦晨曉依法行道此法自天師陸先生寇天師張清都相傳至今頗歷年代皆以齋法出於靈寳自然朝爲齋之祖宗故先行自然朝示不忘本也近有庸愚道士不達古賢之情先於玄師之前𥙷署六職宣科受簡然後升壇仍云簡寂先生齋法謬誤飾非謗說詞理紛然寡識無知一至於此尚有其黨相倣行之不唯獲亂法之愆實亦受謗賢之罪達教君子冝用斥之舊法之中有相傳錯誤者唯啓齋言功之時自然朝㑹合禮靈寳天尊而相傳禮玉寳皇上等號此稍失自然朝之本旨恐是年代綿逺書傳舛訛今於儀中巳爲改正非敢臆度惟理所歸時彦後賢共弘之矣右靈寳齋法具載十部飛天妙書其啓祝願念懴謝之詞威儀俯仰登降之格皆龍漢舊文不可改易法師職叅三洞備受經籙諳練儀軌方可宜行故張清都修建之儀止拜啓元章及牒里域神司此外别無關奏正以齋法玄微仙靈吏兵隨詞謄御不假驛傳文書而後期感通也自靈寳大法降世於是玉符金簡之文寳籙眞劵之目神虎攝召之訣南昌錬度之科五仙沐浴之儀回耀降光之格䇿杖破獄之法輪燈懴謝之門其修用有訣其施行有序遷升罪爽普度幽明視古法始加詳焉古法惟齋直講誦而不務它營故事體簡徑今世因崇建大齋而叅施衆法故節目䌓多今古異冝各有攸當須尋根蒂方識指歸夫正齋請謝宿啓散壇本之經文頒宣符命攝召鍊度本之靈寳法拜奏書遷㧞罪爽本之正一若洞究本末則施爲岡不合之士擇同志之人尋卜勝地建立壇場止依經文修建不叅衆法吾知道眼監觀功德巍巍未易淺近量也然非通貫三洞上學之士亦未足以進此釋宣禁右科云三十六禁出太極敷齋威儀經當用牙骨竹木爲之合三十六枚廣八分髙九寸刻書其文與簡相類張清都云行道之日置威儀案杜廣成云絳囊盛之毎升壇監齋執而行之有犯者授簡而罰之二者皆通張清都曰夫惡逆之身犯莫大之罪猶使齋戒請贖消散釁負尋齋之所修尊乎禮拜而況髙尚之士但儀軌之失愚謂以禮拜代之亦在乎通其拜數多少隨事輕重執事之官臨時詳判此陸簡寂之意也又三十六禁亦見太極玄都律以香油書罰止三十條而云三十六禁恐以主人當掃洒屋宇道士各齎巾褐版履關白監齋及有犯威儀下座上座於事有𧇊等合前後禁文爲三十六耳然外六條雖有禁文而無香油之罰似不可作簡今張清都云以竹木牙骨作簡三十六枚自髙功以下并科禁各一一書之要是合六職簡爲數也釋復鑪關啓事畢東向上香呪祝出靈寳三籙簡文威儀自然經无上黃籙大齋立成儀卷之三十三, CK-KZ: ''}
