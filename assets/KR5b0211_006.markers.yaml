  - {type: variant, offset: 0, length: 1580, content: 无上黃籙大齋立成儀卷之六鳯六三洞法師冲靖先生留用光傳授太上執法仙士蔣叔與編次奏洞淵具法位臣姓某今據某郷貫入齋意至臣福佑見存據詞難抑巳於某月某日預告先颺寳旛上聞齋意今按下元黃籙簡文靈仙品格建立靈壇崇修齋法恭依次第宣演眞科進拜天官濟度諸章頒行元始符命金籙白簡救苦眞符太上敕赦生天寳籙玉清拔幽魂破地獄眞符青宫九龍符命神虎玉劄赦拔亡故某乙在會係薦等魂及十方九幽囚徒苦爽出離長夜祗受齋功謹取某月某日開啓齋壇召攝亡魂赴壇受度某日清旦爲始正齋行道三日九朝某日夜普設清淨無礙斛食夜齋錬度六道四生孤魂滯魄某日夜水火變錬係薦亡魂傳授九眞妙戒告行元始符命金籙白簡長生靈符給籙破劵保舉超昇事畢拜表言功解壇滿散某日夜祗設三界髙眞清醮三百六十分位仰答洪恩投龍進簡除具由備奏上帝乞降敕命及奏諸天帝尊請降睿㫖申三界眞司牒今屬去處將所薦亡魂生死年月别具帳狀申三天門下上清天樞院伺候敕旨頒行外臣尚慮朔獄幽途泉酆土壘拘繫罪魂去處未即放釋前來有妨開度須至奏聞者右臣謹録狀上奏洞淵三昧無量上上太乙天君三洞天尊御前恭望天慈特降睿旨下三界十方重泉九壘風梵剛維之境朔單鬰絶之郷一切隂司㝠曹幽獄開明罪爽赦拔亡魂普及幽沉俱蒙超濟齋功成就存殁霑恩冒犯天威臣誠惶誠恐稽首頓首死罪謹具狀上奏以聞謹狀太歳某年月日具法位臣姓某狀貼黄奏爲某乙崇違无上黄籙太齋正薦亡故某乙薦在㑹衆魂今欲開壇依科修奉九朝懴謝首露愆欲仗靈官謄奏齋誠原赦超度乞降旨頒下三界十方施行事眞王具法位臣姓某今據某布政司同洞淵狀至同候敕旨頒行外臣尚慮所薦一切亡魂宿纒障業拘繫幽途欲得赦拔𡨚愆超離苦趣全神復本顯露形儀須仗恩光俯垂濟度須至奏聞者右臣謹録狀上奏九天採訪應元保運南極眞王朱陵大帝御前恭望天慈允臣所奏特降睿旨下三界十方合屬眞司九地幽隂一切去處照應赦拔亡魂開明罪爽更乞分靈降監採納啓祈成就齋功殄消魔障降流睿澤超度亡魂苦爽無依普資昇濟臨壇翊衞傳奏仙曹均與賞功進加品爵覃恩家國資福存亡上應大道之好生下副微臣之懇禱冒犯天威同前洞淵狀結至謹狀九天上帝具法位臣姓某今據某布政司某處某郷居同洞淵狀同候敕旨頒行臣外尚慮所薦一切亡魂宿世今生迷眞逐妄業縁報對神爽沉淪欲得和合隂陽反生魂魄結形九炁育質三元全頼恩光俯垂開度須至奏聞者右臣謹録狀上奏靈寳自然九天生神上帝御前恭望天慈允臣所奏特降睿旨下三界十方及九天錬度生化眞司地水冥曹一切去處照應赦拔亡魂開明罪爽仍乞俯賜恩光證明錬度降九天之神炁發九地之朽骸俾係薦亡魂幽魂苦爽廽骸起死聚氣凝神落滅惡根超昇福境更祈殊貺利佑見存普及邦家均霑景福冒犯天威同洞淵狀結至謹狀貼黄妻爲某人乞崇違无上黄籙大齋某今欲頒行符命追攝赴壇依科開度乞降睿旨下三界十方及九天錬度生死真曰施行事三十二天帝君具法位臣姓某今據某布政司某郷某處同洞淵狀至伺候敕旨施行事臣尚慮所薦亡魂神爽沉滯尸魄流蕩必資梵炁完聚形神及建齋之日欲得諸天金童玊女直符騎吏下臨壇所上奏齋誠須至奏聞者右臣謹録狀上奏三十二天帝君御前恭望天慈允臣所奏特降睿旨下三界十方一切去處照應俯賜恩光照燭梵炁流通俾亡故某乙在會係薦等魂及十方九幽苦魂罪魄俱離幽夜悉詣齋壇陶沐陽精灌漑胞命聚神返本受化更生仍乞降旨諸天監齋直事侍香金童散花玉女五帝直符直日香官傳言奏事飛龍騎吏等如期下降監衞齋壇庻得啓奏感通齋功御達存亡受度家國霑恩冒犯天威同洞淵狀結至謹狀貼黄奏爲某人乞崇違无上黄籙大齋正薦某乙口薦衆魂今欲頒行符命請降官吏追攝赴壇依科開度乞降聖旨頒下三界十方施行事木公金母具法位臣姓某今據某布政司某郷某處同洞淵狀至伺候敕旨頒行外臣尚慮在㑹係薦亡魂業縁報對神爽沉淪欲得生炁結形陶魂鑄魄必資祖炁變錬形神須至奏聞者右臣謹録狀上奏東華木公上相青童道君九靈太妙白玉龜臺夜光金眞萬炁祖母元君聖前恭望聖慈俯賜恩光監臨錬度降二儀之祖炁發九地之朽骸特與在㑹係薦等魂錬胎返本委炁聚形受化更生隨果超度更資慧澤普及幽沉俱承變錬之功並脫輪廽之苦, CK-KZ: ''}
