形大將軍田師文從官將吏飛行變化助吾眞靈攝降生炁奉爲亡靈全形育質祖炁吹符焚火池中再呪曰磨眞櫗臘紅杏墨黒靈寳急急如長生大帝勑取五方炁吹所度亡魂興生獨𨽻可韓功都聚魂急急如長生大帝勑取辰夘寅三方炁吹所度亡魂次依寳經行持念大梵隱語取四方炁吹所度亡魂存亡魂出火池中貌如嬰兒身有陽光洞徹目前火池使者將軍承行官吏速押所錬亡魂赴水錬壇所隨縁赴感天尊三聲次水錬執眞水合同符宣降眞水呪太玄之一八景同靈五老祕諱日月運明璇璣運轉十干五行八史通靈招神召眞聞吾呼召速降威靈承符奉命輙莫容情急急如長生大帝勑取坎炁吹符焚水池中再宻呪曰霐池無鏡神龍之淵運東井華以滌幽魂攬慈迎容太和之津玄和玉女灌之于神魂神澄正道炁長存取當日太隂之炁吹之謹召錬度眞人黃華玉女東井玉女錬度司仙衆引某靈魂赴水池受錬存變如法清淨度魂天尊執洞明丹陽錬度符宣丹陽錬度大呪蕩形訣龍漢簜蕩無形無名渺渺億劫皇道開清神燈朗耀九魂吐精玉虚澄輝太霞髙明元始開化諸天齊臨三元導養二象攝生巳度者度未成者成巳死即化巳枯即榮蠢動蛹飛一切㝠靈懷胎含孕咸得受形亡者命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天地神祇及諸河源五嶽四瀆幷諸名山洞玄洞虚洞空洞仙無極大聖至眞尊神無極無窮普監度生地根斷絶玄都記名衆神並映一切咸聽急急如長生大帝勑坎炁吹符沉水池中執水錬符祝曰謹請主水大將軍王掌水池使者速降眞水錬度亡魂取北方水炁五口運自巳腎炁五道相交吹入水池黄華蕩形天尊取飛元聚靈召神符九陽眞炁符祝曰謹召長生大帝君飛元聚靈召神飛仙使者楊欣之飛精使者王容飛雲使者張起飛魂使者富公弼飛魄使者丁逢飛光使者陳普直仙使者時申直眞使者黃簡直靈使者路顯等從官符吏飛行變化奉爲亡魂攝降髙上玉清天混溟璉瑝之炁泛華紫微之炁玉婁鳳車之炁中女辟邪之炁太皇微延之炁化眞白之炁絳寳子光之炁天眞命仙之炁太皇寂玄之炁依科錬度返魂生神取祖炁吹符宣符文畢焚水池中祝曰三天育胎九炁結神上化玄丹下轉變仙二象交降以成爾身六脘瓊秀九府納眞十二結節各各絶根盪除穢炁五靈敷陳玄女吐精錬化光鮮金仙翼靈玉華結篇記名青宫長保帝宸急怠如長生大帝勑好生度命天尊執靈寳九錬符祝曰准上帝勑謹召疾除罪簿司斷地逮役司度上南宫司飛空五户司受錬更生司仙化成人司過度三界司飛昇太空司普度無窮司靈官仙吏奉爲幽魂請降胞命元第一天元一黃演之炁胎命元第二天洞𡨋紫戸之炁魂命元第三天長靈明仙之炁魄命元第四天碭尸𡨋演由之炁臓腑命元第五天五仙中靈之炁靈府命元第六天髙眞冲融之炁元府命元第七天髙仙洞笈之炁華府命元第八天眞靈化凝之炁嶽府命元第九天自然玄照之炁依科錬度度命登眞黙誦上帝祕諱取祖炁吹符焚水池中叩齒九通祝曰鬱單凝靈禪善保神梵監凝炁驕樂㑹眞寂然安藏梵寳生津化應流景髙虚曜神無結無愛列名帝篇隂陽㑹神三萬六千二炁交映内保三田克登聖品與劫同年流雲玉輧來侍帝軒䇿龍景髙昇九天急急如長生大帝勑取祖炁吹符宣九鍊符文焚水池中取祖炁吹所度亡魂九天稱慶天尊執石景水母玉精符誦東井大呪曰東井黃華石景玉精飛玄水母金體玉津滔滔源源不竭池亭九龍灌錬三光垂精仙人吐潤錬度魂靈内外朗徹表裏洞清百關九竅元炁滋榮五臟六腑萬神自生胎胞結節隨水開扃死炁斷絶惡根沉淪我今錬化死骸生魂反故攺貌玉體金容變化錬穢飛昇紫庭急急如長生火帝勑取坎炁吹符沉水池中髙眞妙果天尊執神府錬身符呪曰巳枯復榮巳滅復生得生上天更禀太靈九天之劫反復胎嬰穢累湯滅白屍反生急急如長生大帝勑取五太炁吹符焚水池中金闕化身天尊執金液錬形符呪曰金液錬形與道合眞開明三景是謂天根無幽無極無始無窮元皇九醜靈魔降宫紫雲飛天身衆六龍火上水下流入三宫神居陽明大道自通急急如長生大帝勑取玄炁吹符焚水地中轉輪聖王天尊執分形錬形養形大將軍符祝曰謹召長生大帝君丹靈分形大將軍孫庚上靈錬形大將軍富盛紫靈養形大將軍張告真從官符吏飛行變化眞靈攝降生炁奉爲亡魂受化更生祖炁吹符焚水池中再呪曰墨黒襪臘靈寳紅杏磨眞急急如長生大帝勑取五方炁吹所度亡魂興生獨𨽻可韓功都聚魂急急如長生大帝勑取寅卯辰三方炁吹所度亡魂隨願徃生天尊焚靈寳登眞度命出離生死符呪曰玉清赤書上通紫庭天慈赦宥三界𡨋靈十方世界九幽罪魂億曽萬祖苦爽遊精削除罪簿落滅惡根速赴生方炁識閑寧上登天堂澄質錬神超離五苦眞心洞明蕩除隂翳入道昇眞急急如長生大帝勑焚符取祖炁吹池中存亡魂身有玉光瑩然明淨形容端儼仙衣可愛寳華圓滿天尊師黙誦度魂呪興生獨𨽻可韓功都保魂應魂攝次法師焚召丁甲金童玉女大將軍符向來錬度功德巳周謹召六丁六甲大將軍金童玉女速押所錬亡魂各整形儀恭詣上帝御前祗謝天恩受戒傳符登眞度品法衆䖍誠請行迎導次法衆諷隱語引魂朝謁次下座无上黃籙大齋立成儀卷之二十七, YP-C: 考}
