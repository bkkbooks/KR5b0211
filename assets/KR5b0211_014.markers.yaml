  - {type: variant, offset: 0, length: 4021, content: 无上黄籙大齋立成儀卷之十四在四三洞法師冲靖先生留用无傅授太上執法仙士蔣权與編次禮成奏謝門三簡奏具位臣姓某右臣謹𤁋丹誠上干天聽退省僣易以竢譴誅臣先據某郷貫某人㱼稱伏爲正薦亡親某乙普薦在典亡過某乙等乞就某處宫觀崇修无上黄籙大齋拜奏章詞宣行符命恭祈恩霈普濟幽沉臣㝷於某月日爲始開建寳齋至某月日罷散謹依科法就某處洞天告投天官名山洞府金龍玉簡及就建立齋壇之所吿投地宫土府金龍玉簡就某處潭洞吿拔水官水府金龍玉簡拔贖亡故某乙及在㑹預薦亡魂等罪簿謹具狀飛奏金闕三境帝師七寳玉陛下恭望道慈允臣所奏特降敕命下泰玄都省室告上元賜福天官諸天曹局洞天主宰中元赦罪地官五嶽十宫九幽地府九壘土皇土下諸司靈官主宰下元解厄水官江海河瀆泉曲溪眞水府諸司靈官主宰遵依玉簡告命拔出亡故某及在㑹預薦亡魂請㓕三惡斬絶地根解釋𡨚仇増添善果計功昇度隨品受生仰副太上好生之德冒犯天威臣誠惶誠恐稽首蝢首死罪謹録奏聞伏候敕旨貼黄奏爲某乙王官金親王簡乞降數命施行事倚黄乞降玄右萡儀山簡土簡水簡各一狀奏内解釋𡨚仇増添善果二句止山簡用之請滅三惡斬絶地根二句水土二簡俱用之今合爲一奏非惟從省亦免煩瀆三簡各日投者自依舊法内三簡奏稱某處洞天非是洞天去處則不可稱洞天止稱某山洞府可也可漏奏狀一謹謹上諸三天門下上清天樞院諸進具位臣姓某謹重封申天官具法位姓某先據某郷貫某投稱伏爲正薦亡親某乙普薦在會衆魂乞就某處崇修无上黄籙大齋拜奏章詞宣行符命恭祈恩霈普薦幽沉某㝷於某月日爲始開建寳齋至某日罷散謹依科法就某處洞天告投天官名山洞府金龍玉簡拔贖亡故某預薦亡魂等罪簿除巳飛奏上帝外須至申聞者右謹具狀申上元天官紫微大帝聖前伏望聖慈特降聖旨下上元曹局名山洞天主司一切聖衆遵依玉簡告命拔出在㑹預薦亡魂解釋𡨚仇増添善果計功昇度隨品受生仰副大道好生之德冒犯聖威某下情無任惶懼之至謹具狀申聞謹狀地官具位姓某先據同天官狀至謹依科法就某處建立齋壇之所告投地官土府金龍玉簡後同天官狀右謹具狀申中元地官清虚大帝聖前伏望聖慈特降聖旨下中元曹局九壘土下主司一切聖衆遵依玉簡吿命拔出在㑹係薦亡魂請滅三惡斬絶地根計功昇度同天官狀結水官具位姓某先據同天官狀至謹依科法就某處潭洞告投水官水府金龍玉簡同地官狀右謹具狀申下元水官洞隂大帝聖前伏望聖慈特降聖旨下下元曹局靈潜淵水下主司一切聖衆同地官狀結至謹狀可漏方函如常式天樞院引進狀裹奏狀入函發去靈寳大法司今月某日發奏狀一函重封印全爲郷貫某人崇建无上黄籙大齋正薦亡親某乙普薦在㑹衆魂滿散依法告投三官金龍玉簡乞降敕命施行事須至申聞者右謹具狀申三天門下上清天樞院伏乞徑爲通奏恭請敕命早與頒降施行謹具狀申聞伏𠉀昭報謹狀直日功曹關子靈寳大法司今發緊急申奏文字下項一奏狀一函上詣三天門下上清天樞院請進一申狀三函上詣上元天官紫微大帝聖前申上中元地官清虚大帝聖前申上下元水官洞隂大帝聖前申上巳上奏狀一函申狀三函並用重封印全須至關發者右關某日當直功曹使者請交管前去分明請進申上雲程不得稽滯時刻有所遏截攝付近獄依律施行年月日關三簡牒山簡靈寳大法司牒上某處洞天仙官主宰是洞天即稱洞天是福地即稱福地非洞天福地則稱某山靈官主宰照對今月某日爲某處某人正薦亡親某乙普薦在㑹衆魂崇建无上黄籙大齋三晝夜遷拔逝爽度上南宫以今功圓事畢解散齋壇謹依科法齎持龍簡璧鈕投送某處洞天或福地或名山標記善功刻名仙籍須至專牒者牒候到伏請照會依準玄都舊典奉行謹牒土簡土府太歳九壘土皇靈官主宰牒内文作某處靈壇土府水簡某處靈澤潭洞靈官主宰牒内文作某處靈衆水府投簡獻錢狀具齋主位姓某謹備金錢二十四分從馬二十四疋右謹獻上洞天仙官主宰土水二簡依牒文攺此一位靈壇監察香官使者三洞威神當境主司里域眞官山水川澤一切正神聖前伏惟聖慈俯賜鑒納謹狀年月日具位姓某狀三清玉帝謝狀具法位臣姓某右臣先録狀上奏爲某郷貫某人狀稱入齋意至未曾洗乞請道士一壇就某處崇建无上黄籙大齋三晝夜依按玄科宣揚祕範恭憑道力俯拔幽途滿散修設謝恩清醮三百六十分位廣崇善利總𦔳遷昇臣㝷於某月某日開啓依科修奉至某月日滿散巳訖重念臣與同齋道士某等禀質凡愚昧於科簡關行畢違戾實多仰望天恩特垂原赦臣無任瞻天望聖激切屏營之至謹具狀上奏稱謝以聞謹狀年月日具位臣姓某狀可漏三清玉帝至尊陛下具位臣姓某狀奏謹封貼黄奏爲某人乞榮无上黄籙大齋正普薦亡親在會超生巳行散事天樞院繳狀奏狀入方正内發去靈寳大法司今月某日發奏狀一函爲據黄籙大齋主某人正暜薦亡親某乙在㑹衆魂請道士一壇就某處開建无上黃籙大齋修設謝恩清醮三百六十分位巳行滿散具狀稱謝事須至申聞者右謹具狀申三天門下上清天樞院伏乞徑爲通進施行謹具狀申聞伏候昭報謹狀年月日具位姓某狀方函申狀一函謹謹上詣三天門下上清天樞院諸進具法位姓某謹重封六幕謝䟽五帝具法位臣姓某右臣先具狀奏聞爲某郷貫同三清狀至達戾實多伏望天慈特垂原赦臣下情無任膳聖望眞惶懼