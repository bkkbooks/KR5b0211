謂自然朝法是也與正齋上啓三上香願念之法不同不啓聖位張杜宿啓儀並於稱法位後便云臣某等今故燒交願以是功德云蓋一本經文耳藏中所載靈寳諸齋宿啓儀並無添入聖位者止有一家靈寳自然齋立成儀不載何人所修其間辭語多易以今文又𣸸入行道所啓聖位近世相承不革留冲靖所傳亦因之雖曰捻香啓先當關奏上玄但行道科所啓聖位本文乃出洞玄靈寳長夜之府九幽五匱盟眞科因元始天尊在香林圍中與七干二百四十童子俱教化諸法度身威光命召十方飛天神人說罪福縁對㧞度上品本上大道君啓臼元始乞垂旨教可得修行以度一切於是命飛天神人爲著齋直之訣行道所啓聖位蓋本於此宿啓散壇乃行自然朝法旣祖金籙簡文本經無之難以攙入況中間祈哀懴罪禮謝乞願念之詞特仗仙靈謄奏齋誠耳今依古科剛去聖位尚慮後學不見經文反生疑惑故畧釋始未釋禮十方日中從東方始入夜從北方始張萬福天師曰凡禮拜始唱至心歸命東方即至心注念東方低身屈膝呼無極太上靈寳便靡靡而下令兩手俱至地呼天尊與聲齊頭面著地聽聲齊起皆不遲疾緩急得所使五體合法不得局促怠放齊上齊下毎禮訖合坐皆起立然後坐如下方例不得便坐行磬須聽唱天尊聲絶然後打之所以謂之禮拜者謂起伏拜跪威儀庠序合法故耳徧觀至心者必能禮拜禮拜者必有至心君不察其形恭何以達其心識所以謝罪請福皆以禮拜爲先也釋懴悔三業禮畢各長跪執簡叩頭懴悔張萬福天師曰自禮十方天尊至三業懴並出靈寳常朝儀三啓頌三首樂法以爲妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神静黙天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹緲入大乗因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虚有念無不啓錬質入仙眞遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮右岀洞玄靈寳消魔寳眞安志智慧本願大戒上品經亦見玉京山歩虚經謂之禮經祝毎終一首各稱善一拜眞人口訣云侍經仙童玉女聞此祝皆歡悅而祐兆身也是大經悉用此祝而禮拜矣若冥心禮經者亦心祝其文乃上仙之秘也齋法以經爲祖凡是建齋三寳之前必安神經以鎮齋壇故上元金籙簡文眞仙品曰建齋威儀旋行畢一時北向禮經三拜是也釋三禮張萬福天師曰三禮出靈寳常朝儀无上黄籙大齋立成儀卷之三十二, YP-C: ''}
