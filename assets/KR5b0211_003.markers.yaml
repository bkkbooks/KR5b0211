  - {type: variant, offset: 1706, length: 851, content: 及建齋醮謝日分别具奏聞欲得三界十方合屬去處預使聞知普令遵奉須至奏聞者右臣謹録狀上奏玉清上帝元始天尊上清大帝靈寳天尊太清大帝道德天尊陛下恭望道慈特降勑旨頒行三界十方允臣所奏冒犯天威臣誠惶誠恐稽首頓首死罪謹具狀奏以聞謹狀歳次某甲子某年月日具法位臣姓名状貼黃奏爲某人衆會日等字後同乞崇建无上黃籙大齋正薦亡某等鲁薦在㑹衆魂及十方九幽苦魂罪魄欲得敕命頒下三界十方預行照應事伏儀敕旨倚黃乞下三界十方施行可漏如開寫奏狀三函毎可漏一箇書天尊一位上清大帝靈寳天尊玉清上帝元始天尊太清大帝道德天尊陛下具法位臣姓名狀奏謹封方函奏狀一函謹謹上詣三天門下上清天樞院呈進具法位臣姓名謹重封昊天具法位臣妵某今據某布政使司某府縣某里社居住同三清狀至普濟存亡除具事由飛奏上帝乞降勑命及奏諸天帝尊請降睿旨中三界眞司牒合屬去處各乞照㑹崇建大齋事理將亡故某乙在㑹係薦等魂及建齋弟子家億曽萬祖歷劫種親十方九幽苦魂罪魄權停考對落滅惡根願假道力恩光至期親朝壇陛懴雪罪垢祇受齋功所有元始符命寳籙眞符開度一宗靈文祕篆及建齋醮日分别具奏聞欲得三界十方合屬去處預使知聞普令遵奉須至奏聞者右臣謹録狀上奏太上開天執符御曆舍眞體道昊天玉皇上帝陛下恭望道慈後同三清狀結貼黃倚黃並同三清可漏照狀聖位僉聖位換易天皇具法位臣姓某今據某布政司某處同昊天狀至須至奏聞者右臣謹緑狀上奏勾陳星宫天皇大帝陛下恭望天慈特降𧇖旨頒下三界十方合屬眞司允臣所奏冐犯天威同三清狀結至謹狀貼黃同三清狀攺勑旨乍𧇖旨倚黃同三清北極具法位臣姓某今據某布政司某處同昊天狀至須至奏聞者右臣謹録狀上奏紫微中天北極大帝陛下恭望道慈特降睿旨頒下三界十方合屬眞司允臣所奏冐犯天威同三清狀結至謹狀貼黃同三清狀攺勑旨作𧇖旨倚黃同三清東極具法位臣姓某今據某郷貫居住月天皇狀至須至奏聞者右臣謹録狀上奏東極宫中太慈仁者㝷聲赴感太乙救苦天尊御前恭望道慈允臣所奏持降睿旨頒下三界十方咸令遵奉仍乞慧光照徹幽夜使受苦衆生出離幽暗得覩光明普詣齋壇承功超度冒犯天威後同天皇狀結巳上可漏並同前式貼黃倚黃並同天皇无上黃籙大齋立成儀卷之三, CK-KZ: ''}
