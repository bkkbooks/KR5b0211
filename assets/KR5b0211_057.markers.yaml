  - {type: variant, offset: 1610, length: 179, content: 簡麾將吏呼叱鬼神奔走河嶽之勢肅如也郡縣吏農父老且嗟且愕即日天大雨四境𩃎渥守以上聞行在旱上覽奏大恱召赴闕舍太一宮趣致雨蕆法如初又刋鐵劵驅龍師有頃雨迅怒如霔西湖漕河涸不舟者立盈上遣内璫嘉論令以龍歸須㬰雲解駇日穿漏上嘉甚延見選徳殿褒勞甚渥錫牙簡金綵授右街道録居髙士齋請歸故山後一年遣使趣召途中值雨顧使者曰某之禱久矣天其孰分疆理乎甫至闕雨隨車來上曰信乎其行業清髙精誠, CK-KZ: 符合施用}
