  - {type: variant, offset: 1790, length: 995, content: 格矣御奎翰賜以八字既拜賜遜且謝曰聖徳動天雨且不違臣誠愚戇何力有焉冬不雪受詔舉法告于山川百神曉雪平尺上益神之徳壽宮劉貴妃薨宮中修黄籙夜有影響如見李夫人者召對便殿咨以鬼神之事對曰一隂一陽之謂道鬼神者隂陽不測之謂也聚成形散爲炁道家聚炁復神之法鬼神之情狀可窺矣上以爲然且曰法中有正一旨要文該義奥盍訓詁之書奏御詔鏤傳未幾又告歸拜主管教門公事龍虎山上清正一宮管轄光宗受禪偶違豫壽皇有憂色命以法枝禳俄現巨神被髮横劒殿下左右驚視帝躬清安兩宮相賀賜號冲靖先生固辭上即位祈雪夜拜緑章星斗猶離離曉以賀雪奏上竒之陞左街道録擢太一宮都監壬戍歳旱上諉以雨方登壇場行雨法雨聲怱如江海音上曰留君雨師也賜宸翰牙簡明年又閔雨對内殿曰臣草菅細微年年籲天上帝有譴罪在不赦黄冠祭酒臣何敢專尸焉上曰爲朕請命帝實汝嘉母辭時即得雨郊祀禮成謁謝太一宫遷左右街道録一日忽曰生有涯知無涯以有涯隨無涯殆巳士不委身霄嶺滅景雲林留連京師動煩世主吾其過歟力丐歸既歸詔趣來者數四以病辭歳旦日謁帝真與宮中士㑹拜笑且訣有問者曰何之對曰遊乎無何有之郷矣又問曰其朝白玉京歟燕蓬萊島歟對曰一念倐萌是曰妄想達人大觀孰來孰徃入室端坐而化閲七日顔色如生真所謂尸解者乎遺表聞上嗟悼降御香賜賻禮給宣葬自居竹宮時王侯諸公貴人家延見盡禮建齋露禱問道受法者皆傾誠竭力人人得其歡以符水濟人危阨無告者戸外屨如織夜繼日書篆與人無倦意不給鬻餌者資之齋醮科率沟舊文毎曰人以情扣帝閽豈無辭逹焉自爲製譔人所不能言者曲折宣揚之章詞表䟽牒檄戒誓之文累數百紙無一差江浙間建黄籙大齋㑹者萬計肹蠁感應登載充冊一日壽康皇后殿召設大醮爲星帝千有二百各陳幣巨當監護者曰先生富矣笑不荅禮既盡裒星幣同楮錢燎之推賜金新正一宫中殿藏數十楹輪奂甲江南又鈔諸部經内之藏荒臺圯觀壊橋隳路多所𥙷治恵乏周急尤切切若楊氏蘇於燼火翟氏伸於銓庭拯王益於覆舟全鄭保於非命人尤稱之子思氏言至誠能盡其性至于能盡人之性能盡物之性孟子言自可欲之善至于不可知之神觀諸業尚冲宻勤毖幽深理心事天所保惟嗇道接靈鬼仁涵死生功聞紫清名在玉籍其心主乎誠其用幾乎神未易以道家者流窺得法者郭友諒之流十餘人賛曰漢文帝召見賈生宣室夜問鬼神之事則鬼神尚矣孝宗聦明英叡非帝可及便殿所咨猶拳拳乎兹挺挺哉留君能以正對夫以三靈和同則動天地順雨暘不難於力天所不能神其用者人成之人所不能極其摯者鬼神與之迄以美利利乎民是與訪崆峒永蓬萊者異矣嗚呼孝宗仁矣夫無上黄籙大齋立成儀卷之五十七, CK-KZ: ''}
