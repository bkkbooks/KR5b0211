  - {type: variant, offset: 1135, length: 473, content: 齋法或自是流暢幽明蒙頼則吾志願畢矣士之立身惟母友不如巳者而巳言訖瞑目而逝既定容體如生嗚呼天乎痛哉處死生之際而不亂蓋先君之有得於道徳玄元之宗指者深矣焈等街哀茹苦敬遵治命再四校覆謹以遺書緘藏名山且附録其歷官大節纂述之本末於後以俾後人有考云嘉定癸未七月不孝孤焈法名冲素焱法名冲一等泣血謹識宋冲靖先生留君傳華文閣學士通奉大夫提舉江州太平興國宮奉化郡開國侯食邑一千四百戸食實封一伯戸髙文虎譔幷書冲靖先生名用光字道輝姓留氏其始河洛人也六世祖仕唐官銀青光禄大夫五代時徙家泉之晉江宋興削平四方五世祖挾雋才西游江淮間過上饒郡樂貴谿雲峯山遂結廬父發清修特立有古君子風偕其室詹氏拜籙龍虎山夜夢漢天師授以丹曰服是當有子而僊遂娠先生既誕秀異渾古端慤自持少解悟玄學受法于上清正一宮道士蔡元乆元久宣和間太素大夫凝神殿校籍王道堅三世孫也既入道抗志精堅守一淵確探𧷤索隱窮歷險艱凡金簡玉字瓊篆琅函之目十洞要訣三皇内文能盡究旨歸别條緒焉諸法書䨾一不練專以玉府五雷法正一法爲宗主宻行元錬垂三十年孝宗皇帝崇至化玩希夷懐柔九僊用毗大政三衢歳大旱郡太守沈侯作礪聞其善召風雷擇佳寮持禮屈致既至大, CK-KZ: 幾}
