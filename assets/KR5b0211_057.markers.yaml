  - {type: variant, offset: 214, length: 693, content: 君鞠之鈎擿故牘一訊得其情悉平反之所全活者數十人淳熈末中奉鎮鼎有恵政民懐之祠于梁山及先君審李氏𡨚感泣者于路曰吾固知其爲蔣使君之子也丞吉州永新不踰年舉賢陞知信州弋陽縣縣綱壊久歳餉江淮軍月解淮東緫所樁積銀𩔖取嬴額外地墝瘠俗懻忮影寄詭挾者連阡陌下户苦役産破者相踵先君躬按版籍摘吏姦平易近民務通下情剖决滯訴以蘇洗𡨚負填解積逋以少紓督趣鋤治強梗以扶植良善士民條畫利病以告者立罷行之僻墟寂墅緌紳稚耋聚談慨嘆詠歌徳政者不絶徹于天朝社稷壇瀢蕪穢風雨師寄他所悉更新之植以所宜木黌舍廥廪樓館廢壊者葺理不倦費取諸經用之餘蓋前政所貿名以自潤者非鞠死罪獄無宿囚惸獨嫠孺有以情訴率得直𨓍不留訟志在於民絲髮不緌諸吏戴星出入亹亹忘勌竟以憂勤得疾疾巳侵視官文書如故禺中猶囑貳令母㢮縣綱夜漏上端坐而終時嘉定十年正月二十六日也享年六十有二積階承議郎以辛巳明堂恩賜五品服嗚呼痛哉先君㓜頴悟明銳靈燭古今載籍博覽不倦一二過目率成誦敬誠篤實語不妄發賦性冲寅宇量寛和人與之交邈不見其喜愠之色工唐律清苦雅淡自得其趣志不安於小成旁羅百氏天文地理運氣律倉抜俞方甘星巫學靡不研頤深造而於混元道徳之㫖尤所耽味慶元乙卯冲靖留君來括蒼先君見之煙雨樓與論古齋法趣尚玄合遂定交已未壬戍再訪冲靖竹宮極講究之冲靖嘉嘆悉以平生得於荆蜀方士隱君子者授之先君通其變而施行焉毎試輙驗緩急叩請悉無拒祛怪拯危靈異響答初冲靖謂先君曰以三洞真經爲道本以十方懴謝爲真誠精思九朝宻投三簡齋法如是而巳譎詭幻怪迷誤眩惑非也又曰度人無量萬道之宗泰定田君居實所傳止於度死消天災鎮帝王禳毒害所以度天人者缺如也盍詮考經法且増益田君所未備不亦善乎先君深惟師訓竊病時俗逐流忘返徇華滅質剽切緒餘工, CK-KZ: 須}
