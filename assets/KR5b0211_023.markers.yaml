  - {type: variant, offset: 374, length: 1161, content: 明三華寳耀混合羣晶三寳發華慧光發神長降飛空下燭幽㝠慧光一照徧徹十方三塗𠖥對五苦停輪火山息熖水消雪扄刀化玉樹劒變鶱林鐵城摧毀魂升玉清臣今上請願賜關澄日月靈妃星光眞人一十二貟稽首奉行分燈散輝照徹寒庭法師以符燭就三寳前請光在手宣分燈恕光呪赤明開圖運度自然開明三景億劫之先今曰大慶沉魂受錬重昏幽暗永閉寒泉欲請慧光照破㝠關氷寒温和爐炭息熖刀山劒樹永斷攀縁回光十方照耀諸天魂消五累業除勾連三辰同暉永劫元元關光童子承恩上玄三光玉女請如斯言侍香侍燈各以紙燭就法師所執符燭分光三炬法師分輝一生二二生三三生萬物普照幽沉見前清衆請爲分輝流光法界天尊侍香侍燈分㸃壇上燈燭衆官各執紙燭就法師手中分光然㸃壇席燈燭並令周徧光明朗徹輝映十方衆官序立詠廻耀飛光頌法師回向向來然燈功德無量勝因用薦幽靈遷昇淨界永離苦暗長處光明利及十方恩霑六道爲上良縁念三清無上天尊太一救苦天尊十方救苦天尊不可思議功德金鍾玉磬儀光置金鍾玉磬於都門外香案前鍾列左磬列右次髙功上香都講宣白伏以華林隱靄環列天中之天丹闕森羅旁通象外之象矧玉匱挺愛河之筏而寳齋横苦岸之舟廣度迷津齊登道果制噐有象能事盍陳輙稽大法之鴻儀式按冲科之妙用金鍾互奏玉磬交鳴四闢六通間歩虚之繚繞九和十合揚大梵之奫淪神風靜黙以凝和灝炁飛騰而薦瑞鸞歌鳯舞虎嘯龍呤希聲振而三景明上徹寥陽之帝所隱韻砰而九隂闢下通鬱絶之神郷臣等肅建靈壇祗迎寳馭仰祈肹響俯格精誠稽首歸依無極大道振金鍾二十五聲伏以九陽隱韻大音希聲象含圓極之容量廓太虚之度憑眞寂以感聖冀玄和而聚仙有叩則鳴如谷答響虚凌恢漠極丹禁之華堂黙感璇璣潜九空之雅觀至外無外知空不空密運玄音一新功範宣召陽神呪元範恢漠九霞映空丹靈顯著五緯交通眞陽激徹韻合玄官元始徘徊羣仙敬從萬炁齊仙隱微降衷道生自然與道合眞擊玉磬三十聲伏以瑶壇蠲潔玉磬琳琅六合之眞宰凝神九野之隂靈稽首垂光五廕分盻三塗警悟覺昏還元返本妙有之眞機感妙虚玄之逸響合虚㝠合自然作成祕範宣召隂神呪髙上太虚瓊宮紫房玄壇制噐玉磬琳琅霞霄振舉乾坤合張隂生梵唱流演元綱慶靈生門昇度淪亡克成髙仙永處福郷與道合眞鍾磬交振三十六聲伏以飛虚掣翠遏紫電於遥空流燁垂晶散幽微於玄漠雲璈萬戰風詠千箏龍含虎炁以迎祥玊和金風而呈瑞輕綃四舉映玄壇髣髴之間薄霧九沉引法界虚無之路九和二炁十合三宫雨露恩霑風雲慶㑹混合二炁表隂著陽金和動瑞玉潤靜昌交感上下格于十方窈振玄宫環珮鏘敭靈符所告嚴肅壇塲祕範重宣萬神關張與道合眞振金鍾九聲擊玉磬六聲伏以混茫始判天地殊形澄髙清於九億萬重凝滓滯於三十六壘音通象外韻徧無方流八極深沉之端通五行造化之表龍蟠雲聚振寰海之邪蹤虎伏風平明人天之眞識辟非之效禁壇之功莫盡讃揚故先遵奉今則清塲初啓迎祥於太漠之郷紫範恭宣施澤於重隂之境金鍾清徹玉磬含和召十方陽德之靈集九地隂㝠之宰普臨法㑹共證齋功清衆同誠旋行讃詠无上黄籙大齋立成儀卷之二十三, CK-KZ: ''}
