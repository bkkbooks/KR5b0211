  - {type: variant, offset: 0, length: 374, content: 无上黄籙大齋立成儀卷之二十在十廣成先生杜光庭集科儀門投龍璧儀詣洞天於門外選平地或船中或石上並須掃淨精潔以設醮位淨席五領醮巾兩條青布緋布並可酒茶湯隨盤數五果餅饌隨時所有國家六十分臣庶二十四盤香四爐巾案四副正面三寳位左洞府神仙位右日直土地監察位及法師關奏位陳設訖以香水洒壇之外以盪氛穢禁敕如常儀師徒弟子並須澡潄嚴潔以虔恭爲先不得因循喧聒不恭於事考罰尤深次唱各禮師存念如法次思三尊經寳玄師五星五帝五嶽五蔵五靈經籍度師三色雲炁當處洞府眞仙靈司監察官屬日直土地儼然在坐羅列分明如齋法訖依科行事投山簡法先於洞府門外鋪設醮位訖禮師存神如本法各禮師存念如法次衞靈呪次鳴法鼓二十四通發爐无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處上地里域眞官正神臣今正爾燒香奉爲某官爲某事乞, CK-KZ: ''}
