  - {type: variant, offset: 0, length: 333, content: 无上黄籙大齋立成儀卷之三十一白一太上執法仙士蔣叔與修科儀門上清南宫鍊度幽魂儀先以方器安壇之西北立牌書云南宫太隂水鍊池又以圓器安壇之東南立牌書云南宫太陽火鍊池預備黄華神水一器及柳木炭火放壇下至鍊度時法師叩齒存神黙朝乞降大上眞水眞火下降于鍊度之所三拜三捻香啓奏具法位臣某謹上啓祖師北極紫微大帝君祖師南極長生大帝君臣下愚尸穢冒叅法階佩受靈文遵承正教濟生度死以應誓言輙露丹𠂻上干天聽臣伏爲齋主某人正普薦亡親某乙在㑹衆魂開䢖无上黄籙大齋普設六道四生孤魂滯魄太上慈悲廣大乎等無遮無礙清淨斛食一筵乞按眞科宣行鍊度願承恩霈離苦超昇欲望天慈特頒睿旨告下南宮水火二司五嶽總領眞君乞降隂陽靈根眞水眞火即日今辰降下壇場鍊度衆靈使其魂神澄正萬炁俱存身相具足復有光明度品南宫超昇天府仰頼天威睿澤, CK-KZ: ''}
