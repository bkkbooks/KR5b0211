  - {type: variant, offset: 1999, length: 2788, content: 難窮賢士奉法言道亦在嘿忘解是大智慧上爲太極公寳蓋連玉輿命駕御九龍金華擎洞經捧香悉仙童嘯歌徹玄都鳴玉扣瑶鍾竦身凌太清超景逸紫霄保無持法綱遊玄極逍遥萬劫猶昨夜千春如晨朝巍峩䕃雲華手攀寳林條香烟自然生玄階興扶揺靈旛順風散繁想應時銷滅智弘大混無爲爲清謡次吟學仙頌出堂至玄師前回向太極左仙公曰眞頌八篇皆太上太極眞人之辭衆仙所耽誦不宣泄於下世祕藏金闕玉房之內冝傳至人修靈寳齋也不可示浮華之徒謹之哉謹之哉太極眞人曰侍經仙童玉女聞此禮經讃詠之音皆懽恱而祐兆身也是大經悉當用此讃而禮拜矣若𡨋心誦經者亦詠之乃上仙之辭修眞之妙㫖也出靈寳玄都玉京南經天尊曰經者吾遺教導引愚迷能發衆生無量道意意從悟起因悟成眞衆聖修行皆登道果故元始以一炁生化三炁分爲三天一曰始炁爲清微天號玉清境天寳君所化吾以龍漢之初號無形天尊於此天中出洞眞寳經十二部以教天中九聖或號萬天玄師無上法王經九萬九千九百九十九億歲二曰元炁爲禹餘天號上清境靈寳君所化吾以延康之初號無名天尊於此天中出洞玄寳經十二部以教天中九眞或號三界醫王太上眞尊經八萬八千八百八十八億萬歳三曰玄炁爲大赤天號太清境神寳君所化吾以赤明之初號𣑽形天尊亦稱觀世眞人出洞神寳經十二部以教天中九仙或號十方導師至極另尊經七萬七千七百七十七億萬歳開皇改號吾號虚皇理元陽中敷揚三洞下化人間號太上道君經六萬六千六百六十六億萬嵗逮至上皇吾總號元始理紫微宫中廣布經戒救度羣生三洞經寳凡三十六部亦曰三乗洞眞寳經謂之大乗洞玄靈寳經謂之中乗洞神寳經謂之小乗結飛玄之炁自然成章玉字金書龍章鳯篆大方一丈八角垂芒教化諸天流通世界始終歷劫常轉法輪或實或㩲有廣有畧因機取悟隨世修行雖天地運終而三洞不滅開度羣品導引人天三界十方俱受利益其後毎劫之初洞眞下化人懷道德共處無爲悉奉至眞長生得道次則洞玄下化人物漸漓朴散澆浮失道叛德未則洞神下化人物轉更澆浮不奉正眞年命短促自是之後人心破壞三洞不行智慧日興人鬼交雜運度促急不滿百年念念無常死生不絶吾故重出宣行三洞布化人間隨代機縁敷弘經教或大或小順物所冝故元始本文未盡下教其三清上境四𣑽天中眞聖修行具足山川洞府海嶽仙宫雖有所修亦不具足謂隨方所修之經三洞不得備足也故命老子託化人間救度衆生演出科戒或夷或夏或聖或凡周遍十方悉今開度三洞妙法散在人間勸誘男女使勤修習凡夫積罪業累沉迷於道無縁不能信奉唯從僞法諸雜邪神徒竭身心終歸地獄其信行三洞悉入福堂或白日升舉尸解遁形隱迹洞宫遊行世界長生變號永劫長存練氣易形轉神入道人莫能識無量無邊吾過去後魔教轉興天下同遵人民夭折兵戈水火疾病死傷國破家亡朝夕相繼竭其府庫以奉妖邪僞亂日興澆訛時扇饑寒苦惱父子流移天下愚迷永無悟矣吾念爾軰積劫沉淪說是要言以示聾瞽然三洞妙法法有一種一者眞法二者化法眞法者離諸虚妄永劫長存化法者文字流通隨時變滅化法之中凡有五種一者結飛玄之炁雲篆成章離合自然變見不測在三清上境常住鎭經億劫長存聖眞持護二者靈書一丈八角煥明在三界十方諸天五億隨劫升降應感流轉三者諸天宫殿樓閣臺房門戸之間書題詠誦制伏人物出入修行四者花又葉字玉札瓊編方丈蓬萊閬風玄圃乍隱乍顯隨劫存亡教習神仙伏諸魔鬼五者紙墨縑素竹木漆書散在人間流傳誦詠劫初即下劫未還升保國安人開度羣品經者元始之言教化衆生使識根源本始宿命因縁罪福報對善惡吉凶生化門户方便所由改惡從善保安性命長生無爲歸之於道永劫軌模保之者福降修之者神仙矣出業皈因縁經太上道君謂三天法師曰天尊教戒三洞妙文天書玉字雲篆龍章雖復無邊總括條䟽唯十二事部類分别隨根不同一者自然本文二者神符三者寳訣四者靈圖五者譜籙六者戒律七者威儀八者方法九者術數十者記傳十一者讃誦十二者章表自然本文天書八㑹鳯篆龍章是爲天地萬物之本開化人神成立諸法主召九天神仙上帝校定圖籙調正璇璣攝制酆都降伏魔鬼勑命水帝召龍上雲天地劫期聖眞名諱所治城臺衆眞境界廣宣分别種種降差服御元積化形之法神符者雲篆之文神眞之信召攝衆魔威制神鬼總元御運保命流年寳訣者天眞上聖述釋天書八會之字以爲正音開示大道靈圖者衆聖化迹應見無方圖寫變通令總悟解譜籙者衆聖記述仙眞名諱宗本冑㣧神宫位緒戒律者條制勑約防非檢過詮量罪福分别重輕威儀者具示齋戒進退楷模俯仰節度式容止方法者衆聖著述丹藥祕要神草靈芝柔金水玉修養之道術數者明辯思神存眞念道心齋坐忘遊空飛歩餐吸六炁導引三光鍊質化形仙度之法記傳者是諸衆聖載述學業得道成眞通玄入妙修因方所證果時節讃詠者衆眞大聖功飾法言稱揚正道令總信樂發起回向生尊重心章表者師資傳授妙寳竒文登壇告盟啓誓傳度悔謝請福關告之辭此十二辭紞統衆法一切意趣無不備周化引三乗入一乗道出本際三洞眞經帙品目洞眞寳經十二部凡二十三萬三百八十巻太上部第一妙林部第二太清部第三徹視部第四上清部第五開元部第六元陽部第七妙眞部第八開山部第九十仙部第十玉林部第十一黄老部第十二洞玄寳經十