  - {type: variant, offset: 0, length: 2014, content: 无上黃籙大齋立成儀卷之二十一竹二廣成先生杜光庭集太上執法仙士蔣叔輿修科儀門陞壇轉經儀夫修黃籙靈寳諸齋每曰三時行道轉經晝夜六時爲弟子關奏誦念以祈福祉其行道消息移時仍别升壇轉經讃道宣行法事一如金籙簡文登壇上座誦經威儀如式風雨不常及别有法事即行道與轉經相續可矣陞壇轉經法師冠元始之冠黃裙紫褐五色雲霞之帔是名法服衆官如常服先衆官具威儀迎法師詣玄師前立班法師上香次唱道讃次華夏讃引升壇如式次法師升天門上御案香念上香呪次法師都講各上本位香次唱三皈依至心歸依十方道寳當願衆生起心回向一切信禮至心歸依十方經寳當願衆生心開悟解受持念誦至心歸依十方師寳當願衆生普上法橋無有障礙次唱道塲衆等執簡當心平坐如法次唱讃詠如法次唱宿命讃宿命有信然弱喪謂之無皆由眼前見過目即言悠大賢明道教𢡖戚憫頑夫依依念子苦勤勤令我憂次都講啓經雲篆太虚浩劫之初乍遐乍邇或沉或浮五方徘徊一丈之餘天眞皇人按筆乃書以演洞章次書靈符元始下降眞文誕敷昭昭其有冥冥其無沉痾能白痊塵勞溺可浮幽冥將有頼由是升仙都以今奉爲齋主某開建無上黃籙大齋正薦亡親某乙曽薦在會衆魂超昇福境謹集見前清衆升壇看誦太上洞玄靈寳無量度人上品妙經度人上品萬道之宗修奉大齋所宜轉誦三日正齋莫終十法十廻之數如更能别誦生神章諸經尤妙也回獻三寳上帝十極髙眞地水職司冥關主宰三界官屬應感眞靈資薦亡靈某等魂普及九幽囚徒罪爽超離苦趣各證生方伏願飛天下觀上帝遥唱靈音一轉九幽之地獄停閑隱韻十廻五道之沉魂息對恩流亡殁澤被見存普及含靈同臻道果爲上因縁稱念大聖元始天尊太上道君太上老君太上靈寳天尊尋聲救苦天尊九幽拔罪天尊朱陵度命天尊法橋大度天尊十方救苦天尊上清左玄眞人上清右玄眞人玄中大法師不可思議功德次唱靜念如法各思身坐青黃白三色雲氣之中左青龍右白虎前朱雀後玄武曰月五星照映左右侍經仙官羅列壇内巳有圓光如日之象都畢咽液三過叩齒三通宻念開經玄藴呪凡轉靈寳衆經皆當依此存思經文行持不同者别依本法寂寂至無宗虛峙劫仭阿豁落洞玄文誰測此幽遐一入大乗路孰計年劫多不生亦不滅欲生因蓮花超凌三界途慈心解世羅眞人無上德世世爲仙家次吟啓經頌稽首虚皇天尊前次唱請轉法輪轉度人經如儀至宻呪處依文行持各目想三十二天九色雲氣交沓之中有宫殿樓觀天帝衣天色衣冤服一一分明叩存神自太皇天爲始先叩齒一通心拜一過訖次第二太明天三十二過畢即閉目靜思三丹田出玄元始青黃白三色雲氣如絲漸漸離身雲氣濃厚先交絡一身次纒映坐所及几案經席無不周遍蓊鬱旋遶一壇然後出外圜布一方良久冥合天地次存青龍出肝立左白虎出肺立右朱雀出心立前玄武出腎立後獅子出脾下丹田十二隻列於左右白鶴自泥丸出九隻圍列四向方寸眉後六合宫中有日月出自二目去面九寸光照壇内洞徹煥明方始宻呪心宻言之勿令耳聞無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言臣等奉爲具官某正薦亡親某乙普薦在會亡魂修建無上黃籙大齋以今陞壇轉經用資超度願所啓上徹逕御無上三十二天元始上帝至尊几前畢鼻引東方八天青炁八過入肝南方八天赤炁八過入心西方八天白炁八過入肺北方八天玄炁八過入腎然後誦經誦經畢次吟解座賛爲諸來生作善因縁如蒙開悟仰荷玄恩賛畢衆官起立都講嘆經詳夫三洞寳經乃萬天勝範結飛玄之炁成雲箓之章義冠無生文垂永劫故天地得之以分判日月因之以運行鬼神敬之以變通人倫奉之以開度是以詠之者則形陟絳霄聞之者則神生碧落莫不人天仰賴生死依憑爲羣品之津梁作衆眞之戸牖巍巍大範讃嘆莫窮今弟子某開建黄籙大齋九時行道六上轉經願仗眞乗超凌亡爽上資家國下祐見存爾者開函演奥即響徹三天執卷吟玄乃聲聞五億當願侍香金媛結香字於天中典經玉郎進經文於簡上即使愆消昔劫福降今辰存亡荷開泰之恩動植恱生成之德以茲勝善徧悉裝嚴三途罷楚毒之勞九夜絶酸辛之苦洎乎悠悠庶品蠢蠢含生俱乗六度之舟並達三清之岸次唱三聞經聞經巳後當願羣生萬罪蕩除善芽增長聞經巳後當願羣生深入法門歸依信受聞經巳後當願羣生永斷執迷常修至道法師叩齒三通咽液三過存三素元君在金華宫如嬰兒之狀次旋行誦太上智慧經讃太上玄虚宗弘道尊其經俯仰以得仙歴劫無數齡巍巍太眞德寂寂因無生霄景結空構乗虚自然征日月爲炳灼安和樂未央學仙絶華念念念相因積去來亂我神神躁靡不歷滅念停虚閑蕭蕭入空寂請經若饑渇持志如金石保子飛玄路五靈度符籍濟我六度行故能解三羅清齋禮太素吐納養雲芽逍遥金闕内玉京爲余家自然生七寳人人坐蓮花仰嚼玄都柰俯酣空洞𤓰容顔曜十曰奚計年劫多法鼓㑹天仙鳴鍾徴大魔靈風扇香花燦爛開繁衿太眞撫雲璈衆仙彈靈琴雅歌三天上散慧玉華林七祖昇福堂由此歩玄音前世德未足斯書邈難㝷信道情不盡圖飛乃反沉太上無爲道弘之在兆心學道由丹信奉師如至親挹景偶清虚孽孽隨日新衆人未得度終不度我身大願有重報玄德必信然隂惡罪至深對來若轉輪學道亦甚苦晨夜建福田種德猶植樹積簣而成山子能耽玄尚飄爾昇青天修是無爲道當與善結縁太上至隱書名曰智慧篇拔苦由大才超俗以得仙靈姿世所恃曄若淵中蓮人行各有本皆由宿世功立德務及時發願莫不從善惡俱待對倚伏, CK-KZ: ''}
