  - {type: variant, offset: 0, length: 749, content: 无上黄籙大齋立成儀卷之十五在五三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿編次醮謝請獻門聖祖位序説趙彦衞雲麓漫抄云景祐元年四月仁宗謂宰臣曰近年以來隂陽不順卦氣乖舛此必應天之道有未合於天心而違於人意者宜推明咎證之本臣僚上言早歳陳彭年等定中外醮儀聖祖天尊在北極之上伏縁北極大帝總領萬物主宰中極聖祖司命眞君因薦尊號驟居紫微帝君之上旣定位非順自兹天下郡縣多致災傷伏望重行詳定禮院詳定當院與道衆參詳天下道觀聖祖毎遇醮設於聖祖殿供獻聖祖天尊及六位仙官即與衆眞各無相妨仍别用青詞奏告如無聖祖殿處即别設醮位爲便從之後道士欲得聖祖雜於其間以重其教復合之自渡江朝廷作醮亦從其說叔輿竊謂本朝及唐之祀聖祖猶其祀感生帝也感生帝出於諸儒聖祖出於方士其爲附㑹則一爾感生帝即五天帝之一也有天下者以其膺五德之運而王天下其祖感某帝之德而生故於四時迎氣時祭之外别爲壇位而特祀之聖祖即諸天帝眞之一也唐以李姓出於老子故祖老子本朝以趙姓出於黃帝故祖黃帝遂加尊號築景靈宫而事之州郡天慶觀率立聖祖殿其禮至嚴景祐禮院詳定天下道觀每遇醮設獨於聖祖殿供獻不與衆眞參列所以尊其祖之所自出也州縣官僚爲國爲民祈請禳禬遇有醮設或可邀迎巳失於僣臣庶之家不宜僣及醮說有酬酢曰獻無酬酢曰醮醮者用酒於位敬以成禮也延眞降靈而以醮名其古用酒於位之禮歟自漢天師流傳醮法以福羣有今見於道藏者其自尤繁杜廣成先生剛定黄籙散壇醮儀以爲牲牷血食謂之祭蔬果精珍謂之醮醮者祭之别名也河圖經品三洞之中凡有四十二等咸以太上爲主次以北斗爲宗苟能禮物精豐心誠丹罄何善不降何患不除然名位雖不同而儀矩則相𩔖解穢禮師衞靈呪之後即繼以發爐降神一獻上香讀詞再獻奏錢焚詞三獻送神復爐其位寡故其禮專其儀簡故其誠備鋪席設坐茶果酒饌隨力豐儉多者一百二十杯盤次或七十二或六十四或四十二或三十六或二十四按科戒云凡設醮所, CK-KZ: ''}
