  - {type: variant, offset: 735, length: 4003, content: 飲食餅果一如齋法若須市買皆不得爭論高下及尸産竊盜之物燈當用清淨香油不得用非義之財及濁雜葷穢之物其務實而不務文也明矣未聞掲立牌位普醮三界混合天神地祇爲一壇者也普醮之設其起於順天興國延壽去邪續命應物壇範之訛乎張清都黄籙儀無謝恩醮杜廣成儀始有之亦以修齋召命神靈管衞壇場宣通關告徃來勞役所以言功設此醮筵用行酬賞然亦止於壇外鋪席青巾絳坐羅列果饌之屬三寳元師用香茶人參伏苓湯等三官五帝將吏用茶酒杯盞隨盤爲數九祖土地日直皆用銀錢依位作狀醮訖焚之其降眞醮位始則以玉京玄都紫微上宫十方大聖衆至眞諸君丈人飛仙上眞玉童玉女爲一節次則天地靈仙諸天大聖日月帝君眞人神仙玉童玉女次北極勾陳天皇大帝北斗七元南斗六星三台五星二十八宿周天分度星中神眞兵馬騎乗次五方五帝君五帝眞人玉童玉女兵馬騎乗次三官三元三官九府一百二十曹五嶽眞神洞天治化河海永帝十二河源仙君九官眞人九天司命五嶽丈人九天使者儲副正職佐命大神天地神仙兵馬騎乗次三洞四輔侍經眞官仙公仙伯仙郷大夫九天御史玄師天師嗣師系師上古三師經籍度師三寳官屬次靈寳官屬領仙監齋直待眞官侍香將吏玉童玉女六甲官將六旬玉女社稷將吏一切靈司次則身甲三五功曹使者金童玉女直符香官執法開化隂陽功曹消災散禍解厄君吏等次身中所佩二十四治建節監功大將軍四部監功謁者仙靈直使正一治病促氣三部功曹等次隂陽神決吏科車赤符罡風騎置驛馬上章飛龍天仙飛仙騎吏上部中部都官使者狼吏虎貴察奸鈎騎都官僕射天丁力士天騶甲卒等收食氣神鬼邪精諸天騎吏誅符破廟騎吏等次弟子元辰大小行年本命星辰驛馬將吏等醮筵所降聖眞之目總十有三項而土地里域眞官則降之於西席所列之杯盤有限而所降之眞靈無窮亦以皇天后土享于克誠不以其物故也蔡致虚黃籙齋醮儀設位雖三百六十而聖目合者甚多自御位用專狀外餘悉以𩔖相從止作都䟽獻送意似有見於此路時中黃籙大齋儀範正筵一百二十而𡨋官四十位在外毎位一請一獻其禮備矣然謂憑此爲足以感格神靈則未可盖道集虚者也吾心苟虚即與道合齋戒沐浴巵酒可獻千眞若徒泥於色相之間終有拘孿不通之處文爲日盛古意寖失今時所請醮位又多有不與齋法相關者日數旣逼修寫不精法師無縁過目悉舉而委之筆史之手寧免錯亂靈誤誠敬果安在哉剛除繁文旋復古法要在哲匠能弘之耳田先生齋儀云設醮古儀不載唐先生若山有之若師古之士當從晉唐舊法然謝恩設醮留冲靖固常因之矣今不敢廢具式如後請醮四等狀式第一等奏請狀内格式合換勿並注在醮進聖位卷内見聖眞班次門奉醮具官位臣姓某先爲正普薦亡親某乙在會亡過等魂崇建无上黃籙大齋某月某日巳行滿散謹取某月某日夜祗設清醮三百六十分位仰謝洪恩合預眞狀奏請者右臣謹昧死具狀奏某位尊帝陛下恭望道慈允今奏請事理於至日夜俯降恩光鑒臨御座冒犯天威臣無任誠惶誠恐激切屏營之至謹具狀上奏以聞謹奏年月日奉醮具官位臣姓某狀奏可漏某帝尊陛一奉醮具官位臣姓某謹封方函䟽謹上詣三天門一上清天樞院前進奉醮具泆位臣姓某謹重封第二等奏請狀奉醮具官位臣姓某先爲同第一狀至仰謝洪恩合預具狀奏請者右謹具狀上奏伏望天慈於某日夜俯降恩光鑒臨御座冒犯天威臣無任惶懼激切屏營之至謹具狀奏聞謹狀年月日奉醮具官位臣姓某狀奏第三等申請狀奉醮具官位姓某先爲同第一等狀至仰謝洪恩合預具狀申請者右謹具狀申聞伏望聖慈於至日夜降臨醮座千犯聖威某下情無任惶懼之至謹狀年月日奉醮具官位姓某狀第四等上請狀奉醮具官位姓某先爲同第一狀至仰謝洪恩合預具狀上請者右謹具狀由聞伏望神慈於至日夜降臨醮座謹狀年月日奉醮具官位姓某狀天樞院繳進狀靈寳大法司本司今月某日發奏狀十函重封印全爲某人正普薦亡親某乙在會衆魂崇建无上黃籙太齋某月某日巳行滿散謹取某月某日夜祗設清醮三百六十分位仰謝洪恩合預録狀奏請須至開具申聞者玉清上帝元始天尊陛下上清大帝靈寳天尊陛下太清六帝道德天尊陛下昊天至尊玉皇上帝陛下勾陳星宫天皇大帝陛下紫微中宫北極大帝陛下東極宫中大慈仁者㝷聲太乙救苦天尊御前太微南極長生大帝御前十方救苦天尊御前后土皇地祇殿下右謹具狀申三天門下上清天樞院伏乞徑爲通奏施行謹具狀申聞伏候昭報謹狀年月日具法位姓某狀發請狀關子日直功曹關靈寳大法司當司先爲黄籙大齋主某人正普薦某乙亡魂在㑹衆魂崇建无上黄籙大齋今月某日巳行滿散今取某月某日夜祗設清醮三百六十分位上謝洪恩今發奏請狀一十函申狀幾函重封印全上詣三天門下上清天樞院請進須至關發者右關某日當直功曹使者請疾速齎管前去分明請進雲程不得稽滯時刻有所邀阻攝赴近獄依律施行故關年月日時關功曹符使關靈寳大法司當司先爲同日直關至上謝洪恩合預録狀請諸天帝尊三界眞仙係醮主宰一切威靈除巳各具專狀外開具下項欲仗神威須至關發者一奏請狀三十四通上詣某尊帝御前逐一開列巳上逐處請進一申請狀二百五十四通上詣某聖位聖前逐一問列巳上逐處申上一上請狀六十二通上詣某神位逐一開列巳上逐處投下右關某年年直功曹使者某月月直功