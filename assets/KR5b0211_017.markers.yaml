  - {type: variant, offset: 30, length: 11465, content: 蔣叔興重修科儀門二古法三時行道儀法師坐堂弟子九禮三伏香花華夏引師出堂叅詣六幕如宿啓之儀法師左行自地户入壇入戸呪次華夏左旋入壇昇天門上十方香東方爲始御案香次髙功宣五方衞靈呪出眞文要解妙經東方九炁青天明星大神煥照東郷洞映九門轉燭陽光掃穢除氛開明童子備衞我軒收魔束袄上對帝君奉承正道赤書玉文九天符命攝龍驛傳普天安鎮我得飛仙南方南方丹天三炁流光熒星轉燭洞照太陽上有赤精開明靈童總御火兵備守三官斬邪束妖翦截魔凶北帝所承風火八衝流鈴交煥敢有不從正道流行我享上功保天長存億劫無終西方七炁之天太白流精光耀金門洞照太㝠中有素皇號曰帝靈保神安鎮衞我身形斷截邪源王道正明宮殿整肅三景齊并道合自然飛昇紫庭靈寳符命普惠萬生功加一切天地咸寜北方北方玄天五炁徘徊辰星煥爛光耀太微黒靈尊神飛玄羽衣備衞五門檢精捕非敢有干試豁落斬摧玉符所告神眞八威邪門閉塞正道明開映照我身三光同輝䇿空駕浮舉形仙飛中央黄中理炁總綂玄眞鎮星吐輝流煥九天開光童子一十二人元炁陽精焰上朱烟洞照天下及臣等身百邪摧落殺鬼萬千中山神呪普天使然五靈安鎮身飛上仙次都講唱鳴法鼓二十四通次髙功三揲香祝次發爐无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域眞官正神臣今正爾燒香奉爲某官某人正薦亡親某乙普薦在㑹某乙等修建黄籙大齋三日三夜以今第一日清旦中分落景随時換易昇壇行道願得太上十方正眞生炁降流臣等身中令臣所啓速逹逕御太上無極大道至眞玉皇上帝御前衆官各三禮次都講唱重鳴法鼓二十四通閱吏兵行事衆官各長跪叩齒二十四通出吏兵謹出臣等身中五體眞官功曹吏出上三天執法開化隂陽功曹度道消災散禍解厄君吏各十二人出臣身治職君吏某治中建節監功大將軍前部效功後部效殺驛廷令驛廷丞四部監功謁者出臣等身中仙靈直使正一功曹治病功曹左右官使者隂陽神決吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏等各二人出出者嚴裝顯服冠帝垂纓整其威儀直使功曹戴通天之冠衣皂紈單衣正一功曹冠朱陽之幘絳章單衣使者冠九德之冠五色綬命單衣腰帶虎符齎執玉版直使功曹住立四方正一功曹住立中央治病功曹營衞臣等身左官使者建節在前右官使者持幢在後陽神決吏立左隂神決吏立右上部功曹住立上方中部功曹住臣等身中促氣功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者匝繞臣等身即吏虎賁察姦鈎騎都官僕射天騶甲卒天丁力士收炁食炁吏收神食神吏收鬼食鬼吏收精食精吏收毒食毒吏收邪食邪吏誅符破廟吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏屯駐臣等前後左右功曹使者嚴裝事竟羅列鹵簿關啓靈寳官屬領仙監齋諸君吏天師所布下二十四治三十六靖廬七十二福地三百六十名山崑崙等上宫三萬六千神日月星宿璇璣玉衡天地五帝三界官君將吏及道上二玄三元四始四面方位風氣注氣甲十諸官君將吏考召君東九夷胡老君南八蠻越老君西六戎氏老君北五狄羗老君中央三傣傖老君五嶽四瀆丘沼君諸廟神祇所在髙山卑谷山林孟長十二溪女根源本始土地之主社稷將吏一時嚴裝與臣等身中功曹使者飛龍騎吏上啓太上無極大道太上道君太上老君太上丈人太上玄老十方無極大道道德衆聖天尊至眞大帝天帝天師君靈寳監齋大法師諸官君臣等生長魔俗沉淪季業玩樂榮華宿命因縁忽見啓拔得奉大道巳上出太極敷齋威儀經荷恩隆重喜懼交襟臣等受法之日約以奉修玄旨表效丹誠敷暢眞風廣宣惠澤慈心愛物開度天人今有某州某縣某官爲某亡靈某甲請修无上黃籙大齋謹依科法齎金龍繪綵香花油燭證質丹誠以祈所願臣等忝職玄司不勝所見謹爲沐浴五體洗心正念依下元黃籙簡文靈仙科品於某處建立皇壇奉修无上黃籙大齋三日三夜九時行道露身三光之下稽顙十極之前燒香然燈轉經念眞爲弟子某拔度亡靈某及門中祖玄靈識九幽一切長夜死魂懴罪謝愆離苦昇樂覃恩家國資福見存普及含生俱登道果謹上請三洞天仙兵馬地仙兵馬飛仙兵馬眞人兵馬神人兵馬日月星宿兵馬九宮五帝兵馬三河四海兵馬五嶽四瀆兵馬各九憶萬騎三十二天監齋直事侍香金童散花玉女五帝直符傳言奏事飛龍騎吏等各三十二人一合來下監臨齋所爲齋生某拔度亡靈某甲及九祖父母窮魂苦爽得出長夜九幽之府斷絶罪根出離三塗五苦之中身入光明上昇天堂衣食自然轉輪更生福慶之門齋主某今齋信效心歸命十方無極世界巳得道大聖衆至眞諸君丈人十方諸靈官乞所願從心身得過度三災九厄十苦八難自請官至此並出黄籙簡文衆惡之中保國寜家普及含識須行道事竟有功勤者謁還天宮功曹使者飛龍騎吏分别關啓以時上違列啓事竟各還臣等身中復於宫室須召又到一如故事各鳴法鼓三通咽液三過建齋止第一日清旦出官自餘否道士不受靈寳法不受都功盟威籙不可岀宫行齋右出官啓事按三洞科儀籙品不同眞官亦異當各隨身中所魔仙靈吏兵出之至若建靈寳齋出盟威都功治職君吏所以科儀云受盟烕都功籙者止稱攝行齋事益爲此上清齋出靈寳洞玄中盟五法官吏夫籙始於正一演於洞神