  - {type: variant, offset: 0, length: 1953, content: 无上黄籙大齋立成儀卷之二十九竹九太上執法仙士蔣叔輿撰科儀門鍊度幽魂醮獻儀先於鍊度所或大道前請設醮筵三十六分位或二十四分位周備畢道衆齋官請法師行事蕩穢上香燒香頌法師對聖啓白具法位臣某焚香上啓大羅玉清無極無上至眞大道元始天尊太上大道君太上老君北極紫微大帝南極長生大帝朱陵大帝太一救苦天尊九天生神大帝三十二天帝君東華木公西靈金毋護魂侍魄養炁通血中主五帝眞君日君月君北斗七元君南斗六司君靈寳五師君三省五府眞宰南昌上宫長生大君韓君司馬廻骸起死君無量度人君度命成僊眞君南極九華眞人玉清元始法師太極左仙公五嶽總領眞君南陵樞府朱陵火府南昌上宫黄籙眞宰靈寳仙曹追攝鍊度官君將吏北隂酆都大帝五嶽聖帝水府扶桑大帝歳德尊神社令城隍五道土地三界應感一切威靈臣聞教闡紫清開八門而拯度經傳碧落宣九鍊以返生普爲沉淪濟諸苦惱滌除罪垢錬化生方臣謬以下愚叨傳上法身濫司於濟度職敢怠於宣謄今據齋壬某正薦亡親某人普薦在會衆魂開建无上黃籙大齋三晝夜普設九泉六道清淨無礙夜齋護度靈儀遷升道境爰備蘋蘩之薦少殫豺獺之誠伏乞眞聖監觀仙靈降格迂廻景馭大沛天恩俯賜威光監臨錬度臣與齋官某等無任䖍請仰望恩光之至謹稽首再拜上香降眞具法位臣某誠惶誠恐稽首再拜奉請无上至眞三寳上帝北極紫微大帝南極長生大帝朱陵大帝太一救苦天尊恭望天慈應感分輝垂慈降鑒謹上請九天自然生神上帝五老五帝君三十二天帝君木公金毋日君月君北斗七元星君南斗六司星君靈寳五師眞君四聖眞君三省五府眞君元始法師太極仙公南昌上宫長生大君南上朱陵火府君南宫度命君韓君司馬鍊度成仙眞君南極九華眞人廻骸起死監生大神飛天神仙五嶽總領眞君南陵樞府朱陵火府南昌上宫黄籙院眞宰北隂玄天酆都大帝五嶽聖帝水府扶桑大帝伏望聖慈垂光下降謹上請靈寳自然至眞無量度人眞君仙吏丹天左右侍衞大將軍靈寳赫奕仙曹天將大神九鍊眞司靈官仙吏混元十二炁化生大將軍南昌掌水池火池使者主水主火大將軍飛元聚靈諸使者六甲六丁諸大將軍金童玉女火鈴靈童九光童子黄華玉女東井玉女錬度眞人錬度使者錬度神將鍊度功曹鍊度合㑹主執官君神虎大聖玉女三部追魂使者追攝吏兵天醫大聖六職治官將吏功曹主者法籙治職眞官從官歳德尊神三界直符七道功曹社今城隍五道土地啓道童子禁將神君地水職司導善官吏虚室監察一切威靈伏望聖慈具官來降上香初獻臣謹上啓三清上帝太一慈尊三界十方衆聖伏聞一炁肇分隂陽定位三元導養品物流形凡居覆育之間咸頼生成之德習因異果業報殊塗未除滅於妄塵遂轉輪於苦道非修觀行難出化機上聖髙靈垂慈接物說微妙法開方便門蕩隂穢於黄華鍊陽精於流火俾資道妙永固生根今齋主某崇修齋法遷拔亡靈普爲幽沉宣行錬度伏乞天光下濟惠澤旁流勑勒眞靈遵依符命分形降炁鍊景攝生俾受度靈魂無邊滯爽五神混合絶五累之苦根一性長存證一乗之眞果克造無爲之岸永清有漏之縁臣等無任懇禱之至上香亞獻上啓靈寳鍊度官君將吏合㑹應感一切威靈伏聞元始開圖分身下化虚皇御運立法度人用恩祐於沉淪俾津梁於生死直符守吏典侍靈文法局仙曹佐揚勝範宜共恢於妙化以丕闡於皇猷衘命宣恩依儀行事上遵道旨下濟沉魂成鍊胎返本之功著監眞度生之德惡縁斷絶永辭長夜寒池之郷眞炁充盈徑上丹英火鈴之界惟神克享用副精祈神虎三部追魂使者天人地仙神鬼業道功曹請屇道前承受文檄上香終獻宣關子獻䟽上來誠悃巳具敷陳竊揆具聦諒垂洞鑒塵寰穢雜薦獻乖踈不罪凡微乞從昭宥鍊度仙吏追攝官君太歳尊神城隍里域各遵大教廣扇慈風啓闢𡨋關召集幽爽請伺本壇普召之時部衞衆魂依儀受度立俟昭報火急奉行回向焚燎如儀上清五府攝召幽魂全形昇度還神復性儀先望鬼門排列香案次法事法師行破暗開通道路法焚香正立誦淨天地呪一遍吹四方存九鳳破穢真官一人朱衣皂幘跨丹鳳九首吐火於前炎炎燒身次歩九鳳破穢罡旋身三臣存身於炎焰中變爲九華眞人其火亘徹天地光照十方良乆想元始天尊引十方無極天真大聖上聖髙眞坐圓光中心拜九遇密呪曰元始登引天眞大神上聖髙尊妙行眞人傾光廻駕監眞度生心拜三遇法師祝香具位臣某謹焚香上奏三清三境金闕至尊東極宫中尋聲赴感太一救苦天尊十方靈寳天尊三界眞司十方主宰臣謬藉宿因叨傳上法功虧毫露釁積丘山履地戰驚仰天兢悸冀弘宣於妙訓俾普濟於幽沉旣奉歸投敢忘關告以今伏爲齋主某正普薦亡親某乙在會衆魂開建无上黃籙大齋旁及六道四生孤魂滯魄依按眞科宣行鍊度除巳奏陳齋意關告眞司召集靈儀來臨法㑹尚慮幽明異道自取沉淪難覩光明莫霑開度欲乞特頒道旨告下南方丹天火府主令照燭陽光開通道路破除隂翳令詣玄壇臣敢不滌慮澄心仰祈報應法師叩齒三通心拜三過執開通道路符宻呪曰元始登引天眞大神上聖髙尊妙行眞人十方無極至眞大神傾光廻駕監眞度生諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天普告三界無極神郷泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻昇遷急急如長生大帝律令三遍取天門