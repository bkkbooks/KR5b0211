  - {type: variant, offset: 0, length: 549, content: 无上黃籙大齋立成儀卷之二十五竹五太上執法仙士蔣叔輿修科儀門颺旛儀先於颺旛處故立香案一隻法師同齊官上香祝曰具法位臣某上啓太上無極大道至眞無上三十六部尊經眞文寳符太上三尊十方衆聖東極天宫長樂舍内大慈仁者㝷聲赴感太一救苦天尊東方玉寳皇上天尊南方玄眞萬福天尊西方太妙至極天尊北方玄上玉晨天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虚皇天尊西北方無量太華天尊上方玉虚明皇天尊下方眞皇洞神天尊朱陵度命天尊轉輪聖王天尊超度化界天尊大慈大悲救苦眞人大慈大悲大惠眞人大慈大悲拔罪眞人大慈大悲拔度眞人太陽鬱儀帝君太隂結璘皇君中央北斗九皇君玄中大法師三界官屬一切威靈臣聞元皇設教俯爲一切之含生黃籙垂科普度九幽之苦趣建齋實修崇之本颺旛乃資悼之先將啓靈壇宜騰寳號今謹有某官某正薦亡故某靈普薦在㑹衆魂開建无上黃籙大齋用資超度肇崇寳刹祗掲華旛企眞馭之遐臨乞恩光之降鑒願迴景耀燭以靈輝稱號一開三塗隨聲而離苦垂斿所指八紘被䕃以遷昇臣等修敬以時歸誠如在懼人寰之溷濁勤天歩之逶遲仰頼至仁俯矜微素今有靈旛赦罪神呪謹爲宣揚黃籙開度三界十方四生六道同到道場生神遷魄萬劫不忘旛之爲體隨風飛颺風之所被各從其方重隂之府九夜之郷地獄餓鬼旁生無鞅皆得解脫上昇天堂急急如太上度生律令次掲旛舉靈旛赦罪天尊上來掲旛功德無量殊因並用回施十方三界六道四生共, CK-KZ: ''}
