  - {type: variant, offset: 534, length: 1770, content: 玄功同成道果爲上因縁念大聖元始天尊太上大道君太上老君太一救苦天尊十方救苦天尊不可思議功德開啓轉經儀道衆齊集經所面三寳上帝前序立舉啓堂頌法師上香啓白具法位臣某焚香上啓妙無上帝自然元始天尊無上道寳妙有上帝虚皇玉宸大道君無上經寳至眞大帝萬變混沌玄元老君無上師寳昊天玉皇上帝紫微天皇大帝紫微北極大帝太微南極長生大帝東極太一救苦天尊十方㝷聲救苦天尊玉京玄都紫微上宫十方大聖飛天上真九天上帝五老上帝三十二天帝君曰宫太陽帝君月宫太隂皇君五星五德眞君南斗六司星君北斗七元星君二十人宿周天分度星君九天天曹諸司眞宰三官大帝五師眞君三十六部尊經三洞威神三寳官屬天眞皇人妙行眞人十方無極飛天神王長生大聖無量度人三洞四輔侍經眞官玉童玉女北隂玄天酆都大帝十宫眞人扶桑大帝暘谷神王三河四海九江水帝洞天福地治化仙官五嶽聖帝里社靈司虚空監察直符直事三界應感一切威靈普同供養香乃玉華散景九炁凝烟香雲宻羅逕衝九天當願侍香金童傳言玉女傳臣啓奏上聞帝前令臣所啓咸乞如言臣聞玉字金書道闡重玄之化瓊章寳範丈生空洞之先保鎮邦家超淩品彚神功靡測奥義難窮以今奉爲齋官某正薦亡親某乙普薦在㑹衆魂崇建无上黃籙大齋用祈昇濟預取今辰轉誦太上諸部眞經琅函睿號恭憑道力普濟幽沉仰冀恩光俯垂證鑒臣下情無任䖍懇皈依之至開經文䟽謹用表宣宣開經䟽宣畢就焚之衆官各就位舉三皈依讃舉道場衆等執簡當心平坐如法舉讃詠如法舉宿命讃行香水淨手敷經文唱靜念如法法師念玄蘊呪啓經雲篆太虚浩劫之初乍遐乍邇咸沉或浮五方徘徊一丈之餘天眞皇人按筆乃書以演洞章次書靈符元始降下眞丈誕敷昭昭具有𡨋𡨋其無沉痾能自痊塵勞溺可浮幽𡨋將有頼由是升仙都以今奉爲郷貫某處黃籙大齋主具官某伏爲亡親正薦某至福佑晃存普薦隨齋意攺易巳於今月某曰預告三天關謄三界謹集見前清衆開啓轉誦太上洞玄靈寳諸品眞經回獻三寳上帝十極髙眞三元三界嶽地水府齋壇合㑹係醮威靈并資倬亡靈十方罪爽眞經寳號功德圓滿别具表宣若乞聖鑒昭回帝慈孚佑斬地根於死户業對停閑錬隂魄於生門形神昇度八方清泰九夜煥明普今有識之含靈皆證無爲之妙果爲上因縁念大聖元始天尊太上大道君太上老君太一救苦天尊九幽拔罪天尊朱陵度命天尊法橋大度天尊火錬丹界天尊轉輪聖王天尊隨願徃生天尊逍遥快樂天尊髙眞妙果天尊十方靈寳天尊不可思議功德啓讃譛轉念如儀存思之法並見并壇轉經儀神虎告玉札儀先排辦淨茶酒果供養道衆依次序立法師存變如儀祝香精誠所感萬聖遐臨丹懇上通千眞畢集仗神靈而達悃假寳炷以傳心恭焚寳香供養三清上聖十極髙眞北斗七元星君北斗玄𡨋太一夫人天一北𧙓神虎大聖太一紫元玉札夫人雄左玉曹玄伯雌右武鸞主吏三部追魂使者直印三神七元玉女追魂攝魄官君吏兵五道大神土地里域眞官虚空監察應感威靈仗此眞香普同供養香乃玉華散景九炁凝烟香雲宻羅俓衝九天侍香金童傳言玉女上聞帝前令臣所啓咸賜如言今據入齋意伏以陽生隂殺明善惡以無私地濁天清定升沉而有自北魁宜追攝之局南昌存錬度之司可謂至道大慈明眞普度以今某人乞修齋直普福幽明謹按金科宣行玉札庶使九泉開度六道蒙恩一切有情咸臻妙果當職清衆淨壇如儀洒淨再祝死者不可復生故太上有返魂之法道者無爲而化在元眞垂普度之科欲使滯爽更生必先呼君魂識以我至定合彼有靈庶散積鬱隂氛弗忤冲和陽炁伏願神虎大聖追攝官君不忘元始教戒之言俯鑒齋主䖍誠之懇㝷聲赴感應念垂慈道衆䖍誠一心奉請請神虎衆聖法師握訣召神臨目宻呪玄天玉札神虎符文混元合炁太一玄𡨋追魂攝魄開陽啓隂萬神敬聽敢不奉迎神虎玉女神虎大聖追魂使者攝魄吏兵一召速至不得稽停稟受符命宣告寒庭追魂攝魄現影現形來臨法㑹功奏玉宸焚符存至上香獻茶酒三獻法事如儀祝白頒符度籙咸遵太上之科攝魄召魂並按元師之旨願飛雲馭遍達泉扄導引魂儀來臨法㑹具有壇檄謹用披宣宣玉札檄文向來壇檄巳具敷宣伏請神虎二大聖三部使者七玉女等齎持玄𡨋隱書混元玉札上入九清下入九壘以至十方三界北隂酆都九幽諸獄洞府仙宫開關啓路追取上件亡過某魂及九州分野六道四生孤魂滯魄等衆速離所部來赴玄壇叅朝太上臨接陽眷無所不徃無所不達依准玄科玉律奉行幸勿稽延有妨開度焚符檄如式法師歩斗入斗口執水劒靣東南立呪曰太一紫元君天一北祚敕神虎㦸飛運招揺一統隨玉札所至處十方精光都一吸急急如律令法師取東南炁入水中噀水一口呪曰何喬二神將三部追魂使者速徃生方死所追取亡過某人魂魄速赴法會領受靈寳昇度功德存將吏前去追取亡魂念善散如儀无上黃籙大齋立成儀卷之二十五, CK-KZ: ''}
