  - {type: variant, offset: 0, length: 6642, content: 光上黃籙大齋立成儀卷之二十四竹四三洞法師冲靖先生留用光傳太上執法仙士蔣叔輿編科儀門九幽神燈儀陳設畢法師焚香存神叩齒二十四通啓白具法位某上啓黄籙㑹中無鞅仙聖九幽主宰一切眞靈咸望洪慈俯回洞鑒伏聞二儀定位三炁開光晦明分晝夜之殊幽顯辨昇沉之像十方法界九夜㝠關慿道力以潜通仗神輝而洞照今謹有黄籙大齋主某伏爲資薦某靈開建黄籙大齋乞於齋次依法然燈破暗續明祈恩請福當乞上關三景下白九幽宣達齋誠導近景貺九霄八極六趣三塗盡憑照燭之功俱遂遷昇之果稽首歸依無極大道十方靈寳天尊伏聞大道分形眞精布化奠三才而立極斡萬化以居中今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照諸天福堂之内朗徹光景輝映萬空中照中宫境域神州妖惡潜消災凶殄息下照中央普掠之獄破諸幽暗開諸光明劒樹韜鋒刀山斷刃無邊辠爽一切窮魂息苦停酸除愆滅辠俱入光明之界永離黒暗之郷清衆歸依虔誠讃詠九幽㧞罪天尊伏聞一炁洪濛二儀開闢木德號發生之府慈尊垂拯拔之科今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照東方無極諸天福堂之内陽光煥赫照徹東方中照震卦卯位三宫青帝之方清蕩凶災掃除妖翳下照東方風雷地獄破諸幽暗開諸光明息震雷霹靂之威免飄㦸飛戈之難無邊罪爽一切窮魂落黒府之罪名上青元之生籙解脫憂苦升證光明清衆歸依虔誠讃詠威光寳際天尊伏聞三炁開光五靈分化丹簡注長生之籙朱陵開冶鍊之庭今奉爲黄籙大齋王某資薦某靈謹然九幽神燈上照南方無極諸天福堂之内陽華洞朗照徹無窮中照離卦午位九宫赤帝之野消平災沴掃除妖氛下照南方火翳地獄破諸幽暗開諸光明停火城考對之威息塗炭炮灸之苦無邊罪爽一切窮魂永辭長夜之郷逕上丹靈之界常居福慶永獲善縁清衆歸依虔誠讃詠光流萬變天尊伏聞空青結字太白流精西華分太妙之都右極控浮羅之嶽今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照西方無極諸天福堂之内神光煥耀朗映太空中照兊卦酉位七宫白帝之境掃除氛穢蕩滌凶災下照西方金剛地獄破諸幽暗開諸光明停金搥鐵杖之威息穿腹塞心之苦無邊罪爽一切窮魂克超解脫之門逕入莊嚴之界寃仇和釋智慧圓通清衆歸依虔誠讃詠寳光通照天尊伏聞太茫浩劫五炁應眞敷大化於玄天配神功於黒帝今奉爲黄籙大齋主某資薦某靈謹然九幽神燈上照北方無極諸天福堂之内祥光昭灼徹照無邊中照坎卦子位一宫黑帝之野蕩除邪穢洗滌凶災下照北方溟泠地獄破諸幽暗關諸光明停氷㦸霜刃之威息長夜丘寒之苦無邊罪爽一切窮魂願乗懴拔之功逕上空眞之境永離惡趣超證仙郷清衆歸依虔誠讃詠金華廣耀天尊伏聞乾道流形艮山列位總生化於蒼元之境扇靈風於紫極之庭今奉爲黃籙大齋主某資薦某靈然九幽神燈上照東北方諸天福堂之内靈光洞朗照映虚空中照艮卦八宫丑寅之野肅清災沴摧蕩凶邪下照東北方鑊湯地獄破諸幽暗開諸光明永停煑漬之威普化清凉之境無邊罪爽一切窮魂逕登長樂之郷永離重隂之苦形神升度債業蠲消清衆歸依虔誠讃詠太微光範天尊伏聞梵炁騰精巽方並極惟妙寂莊嚴之界有好生度命之尊令奉爲黃籙大齋主某資薦某靈然九幽神燈上照東南方無極諸天福堂之内光華普照煥耀無涯中照巽卦四宫辰巳之野蠲消邪惡摧滅凶災下照東南方銅柱地獄破諸幽暗開諸光明停猛烈火熖之威息表裏焦爛之苦無邊罪爽一切窮魂來辭長夜之郷逕上耀眞之境罪根蕩滌神識清閑清衆歸依虔誠讃詠流光應現天尊伏聞眞風散景梵炁含光列厚載於坤維顯元功於乾德今舉爲黃籙大齋主某資薦某靈然㸃九幽神燈上照西南方無極諸天福堂之内流光洞徹照耀無窮中照坤卦二官申未之郷掃除隂沴清蕩凶邪下照西南方屠割地獄破諸幽暗開諸光明停倒懸割切之威息肢體零落之苦無邊罪爽一切窮魂消累劫之愆尤釋多生之罪考宿根清淨善果圎成清衆歸依虔誠讃詠通光普照天尊伏聞元精旣闢天闕肇開衆星垂拱極之文萬象體元亨之運今奉爲黃籙大齋主某資薦某靈然九幽神燈上照西北方無極諸天福堂之内光華朗徹照映太虚中照乾卦六宫戌亥之分掃清妖惡蕩滅凶災下照西北方火車地獄破諸幽暗開諸光明停刀輪運轉之威息燒灸焦爛之苦無邊罪爽一切窮魂浴流火以鍊形詣明霞而證道罪消北府名度南宫清衆歸依虔誠讃詠洞靈無上天尊向來然燈功德上明三界下煥九幽覩此光明同霑福力即使火山息熖冰池靜波吞火食炭化爲甘露金槌鐵杖變成蓮花若存若亡俱登道果九幽地獄無量罪魂或是九祖七玄或是先亡後逝或識不識若𡨚若親墮此獄中受諸罪報或先親作業或七世爲非或三業六情或十惡五逆當生之曰不悟善縁自作自爲違天負地命歿之後幽擊隂司五苦交煎衆惡備受罪終報盡方獲托生展轉三塗輪廻六趣動經億劫出離無由一失人身永乖賢路自非大道遷拔至聖垂慈長夜𡨋𡨋何時解脫因今懴悔然燈燒香願覩光明萬罪消釋乗功德力託化人天禮覲天尊聞經悟法諸惡永息衆善遵行世世生生常歸正道爲此良縁再憑稱念九幽拔罪天尊不可思議功德杜廣成先生曰上元金籙簡文眞仙品曰然燈威儀爲帝王國主上消天災正天分度下安兆庶濟抜存亡當然九幽神燈上照九天福堂下照九幽地獄人天蒙福生死荷恩夫然九幽燈者當市清淨香油不得用非義之財及濁