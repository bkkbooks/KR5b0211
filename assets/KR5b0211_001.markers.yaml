  - {type: variant, offset: 3729, length: 1523, content: 天眞末代時澆人民矯詐唯恡財貨不識因縁賤命重財亡家破國内懐萬惡外結凶犴相繼滅亡末曾自悟念是之故令遣散之一則外賊不起内外安靜衆禍消除所以質信効心以財爲首財旣可捨心亦随之聖善明通随夫心意髙天厚地玄聖上眞非信不通非心不感通感之至在乎信焉金龍十三枚十枚鎮十方三枚随簡投之金龍各重一兩長三寸六分國家用上金公侯大臣次金士庶銀銅塗金並可通用科曰龍者上天之驛騎也傳送通感龍驛爲先負簡即騰信三官效誓即告盟十極鎮信之法以龍爲首關者考屬隂官曹鎭綵十一段十段十方一段命信東方青紋九南方絳紋三西方白紋七北方皂紋五上方碧紋三十二下方黃紋三十二四維黃紋各一十二十方合一百三十六天子匹數諸侯丈數士庻尺數本命紋繒天子諸侯紫色士庶以本命納音色匹丈尺數各隨本命外加一以表延生之信科曰紋繒者顯五行之色象十方之氣降十天致五帝通眞效信請命祈靈不可闕也闕者考屬天官玄都曹鎭十方紙墨筆硯一十副紙毎方用一十二幅科曰建齋行道或救拔億曽萬祖先後亡靈或請福祈恩消災謝過則四司五帝三界十方紀録善功校定罪名當以紙筆爲録功紀善之籍質信於十方不可闕也闕者則十天五帝不録其功九幽三官不除其過闕者考屬三官曹鎭十方香花十柈科曰香者以通感爲用隔氛去穢花者以鮮潔爲美表瑞效珍請福祈眞香花爲本香以沉水降眞花以香潔木生者無花可用五綵剪成以鎭十方不可闕也闕者考屬隂官曹鎭米二斛四㪷或一斛二斗科曰米以鎭信天官増加品禄闕者考屬天官曹鎭油二㪷四升科曰油者隂𩔖也隂中生陽以油鎭隂官續陽景闕者考屬隂官曹鎭炭二十四斤科曰炭者陽𩔖也陽中生隂以炭鎭陽官資隂氣闕者考屬陽官曹鎭錢一萬四千或二千四百或一千一百科曰金錢一萬四千以代上金之信質心三界告盟十天闕者考屬天官玄都曹槿木簡三面簡各長一尺二寸闊二寸四分厚二分科曰簡者記也告也記世之功告盟上眞上下正方天子以玉爲之玉有九德禮天地之信也餘皆槿木爲之或栢木丹界五行丹書國號年月建齋之所及法師姓名投於名山大洞靈泉龍穴及齋壇之中告天地水三官使著明齋事奏于上境闕者考屬地官九都曹鎭十方玉璧十枚投龍璧三枚十方璧各徑二寸四分厚二分圖形虚中科有正潔之德可以盟感上眞故以爲信若投龍簡當以青絲金鈕纒而副之青絲以代割髪金鈕以代歃血上告三官也投龍璧天官蒼璧圓形地官黃璧方形水官黒璧六出形闕者考屬地官九都曹投三簡金鈕二十七枚投簡之法當用金鈕以副于簡三簡用二十七鈕各徑九分圜其外如圜之刑國家用金臣庶以銀銅塗金龍簡璧鈕式詳見齋法修用門威儀第四科曰太上三尊居玄都玉京之山亡寳玄臺紫微上宫十方世界上聖髙眞一日三來旋行朝謁執符把籙建節持幢吟詠洞章燒香散花奏鈞天廣樂鸞唱鳳舞萬眞稱慶三界齊懽今之齋法登壇朝奏吟詠歩虚一象玄都玉京也威儀法式莫不備焉節一對五色絲爲之上下五層懸竿頭上金鳳㗸綬帶幢一對珠蓋珠網八角一層懸朱竿木胎左龍右虎龍虎㗸綬帶旌一對似節無龍鳳綬帶三層五色絲爲之懸竿珠旙一對珠錦玉珮金鳳㗸之懸竿五明扇一對以木雕成金彩裝上布星斗中列五嶽下繪海瀆竪以朱竿鶴羽一對以木刻成鶴翅竪以朱竿香爐几案䄄席二十副三寳一十方十髙功都講奏案各一六幕六壇外香案一此是齋壇所需之數他處所用不在此數内章函章案函槿木或栢木梓木爲之長一尺二寸八分方閣二寸八分正中上下開三印池案副之赤松子曆云章案長二尺二寸髙八寸仍須曲脚以栢楠梓木爲之違科奪筭龍頭書刀削治名籍輟惡舉善落死上生齋章之中此亦爲最可刃長六寸柄作龍形刃以古鐵爲之柄以銀六錢爲之拜表用不可闕燈燭行道禮誦燈燭爲急非惟啓奏所須抑亦消禳所用經科具有多寡要在隨力所營或止依金籙簡文所載然之照曜諸天續明破暗下道九幽地獄上暎無極福堂功德之中此最爲上或兼諸香液雜以蘭膏各令合儀自然降福其燭十方各一三寳前二奏案前一六幕等處隨力設之然燈所以續明照夜太腸巳出當令侍燈法師依法滅燈今世日中亦然燈燭所當革除无上黃籙大齋立成儀卷之一, CK-KZ: ''}
