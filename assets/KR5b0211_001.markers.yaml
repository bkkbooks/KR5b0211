  - {type: variant, offset: 1925, length: 808, content: 庚申甲子四始十直天恩天赦名曰良日若專度祖先則要在亡者七七百日大小祥逺忌之日相合齋主營辦齋中法信訖携詣師門投拜請師受狀畢即引齋官詣道前取信香焚以啓奏既承投詞嚴命同學同志同學謂上道同壇同師之友同志謂同其志普爲幽明者苟非具人和氣不生有堕功果共建齋功受詞之後師與齋官弟子冥心一意專以開度爲念修文修事悉令具足不使臨用有闕擇日建立齋壇壇心三寳位上施帳座寳盖中安神經内壇設十方香案播花燈纂鋪設如法有圖壇前左右分立六幕式中置九幽神燈或於天門上壇外四圍依法然燈有同壇之東南鋪廻耀輪燈有圖壇之東北鋪九獄燈有壇壇之左序立錬度堂供養煉魂聖位壇之右序立神虎堂供養攝魂聖位壇之東南設受度堂即齋主家九祖亡人位次遥對壇所壇之後正靣鋪設道場列上帝御座於中兩旁列醮筵聖位於道場前左别設正一師位供養天師玄師女師嗣師系師又别設從章靈官位供養寳章中仙寮靈官等未開啓齋亶前允進章奏並於道場内行事壇前向外立土地承差監臨正神位前期三十二日或二十四日更看所度亡人多寡爲則關召功曹符使土地預告三清玉帝天皇北極東極五師三官天樞院地水嶽府天下都大州縣城隍堅立寳旙告盟三界有式闢一處爲誦經室開啓轉經宣開啓䟽自此逐日精專修誦度人上品生神寳章金籙度命得道救苦諸經禮誦朝天九幽懴法稱揚玉皇寳號太乙天尊十方洞靈睿號以多爲功印造焚化功力有限自此師與齋官等入靖對齋不交外事前期十日七日亦可量事爲之正奏三清玉帝勾陳紫微后土東南二極九幽朱陵洞淵眞王十方五老九天上帝三十二天木公金母申日月二宫五星四曜五方五斗南北二斗五師三官靈寳監齋正一三師三省五府三元四聖九天天曹諸眞天眞皇人飛天神王雷霆眞宰十極眞人南昌上宫符命經籙水府都水監五嶽四瀆九江九壘地府洞天太𡻕尊神龍虎君等牒天下都大城隍州縣城隍係祀正神諸道諸獄九州社令蒿里相公水陸關津五方境界𡨋關幽路五道大神六道都案監壇正神關本司官將劄司命土地專牒三界直符神虎追魂使者賫持公文預詣地水職司根㝷係薦亡靈請領赴壇伺候開度次立遷神超度等旙有式開奏已訖法師, CK-KZ: 形庶幾}
