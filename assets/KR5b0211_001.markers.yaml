  - {type: variant, offset: 1412, length: 0, content: '', CK-KZ-jye: 長生度命無上黃籙維太歳某甲子某年某月某朔某日某辰鄕貫某人伏爲亡親某人同青詞語至上謝天恩仍就黃籙齋壇乞傳授太上洞玄靈寶長生度命無上黃籙一階付某乙靈魂賫執過度三界超升九天謹按經云元始天尊昔在九清妙境三元宮中與諸天聖眾敷弘至妙開化人天標記善功注名黃籙金格玉簡陳列三清一一地獄皆見十方救苦天尊入於九幽拔度諸苦天尊普告四眾汝等若能受持金籙白簡九眞妙戒長生靈符救苦眞符當消九幽大罪標名九宮察命童子護戒威神五帝直符六宮掾吏自當隨逐簡文覆護受戒弟子今當爲汝顯說九眞妙戒金籙白簡受持功德救難濟苦神力難思眾靈稽首伏聽教命天尊告曰一者敬讓孝養父母二者克勤忠於君主三者不殺慈救眾生四者不淫正身處物五者不盜推義損己六者不嗔𠒋怒凌人七者不詐諂賊害善八者不驕傲忽至眞九者不二奉戒專一護戒威神察命童子救苦眞符告文元始符命金籙白簡救苦眞符告下十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵司命司錄司功司殺牛頭獄卒三界大魔拔度某乙靈魂出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乘此九眞妙戒拔度功德上生天堂一如告命某歳某年某月某朔某日某辰於黃籙齋壇告下長生靈符告文元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上官長生大君韓君司馬司命司錄延夀益筭度厄尊神回骸起死監生大神超度某乙亡魂上登朱宮流火之庭玉眸鍊質黃華蕩形書名紫策受化更生乘此金籙度命功德上生天堂一如告命某歳某年某月某朔某日某辰於黃籙齋壇告下迴骸起死尊神監生大神帝君品命受度亡過某乙靈魂即日恭詣黃籙齋壇拜受太上洞玄靈寶長生度命無上黃籙一階如法受持求充濟拔人間天上敬信奉行一如玄科律令某嵗某年某月某日某州縣宮觀黃籙齋壇給保舉師具法位姓押監度師具法位姓押度師具法位姓押太上洞玄靈寶長生度命无上黃籙其長生度命黃籙止正度亡魂用之餘不給造籙用黃紙朱書玉堂本用青紙金書彩色繪畫人物了畢方注亡靈名謂正度靈魂某乙六字注訖方作流火亭火鍊符印押了畢以青紫或黃紅之屬標背用經帶軸頭如今宗壇籙檄亭中人物即火鍊符也並依散形書之右出蔡致虛黃籙儀玉堂謂之金籙不如此備紫英靈書有無上盟眞玉匱南昌上宮黃籙止有籙文及南昌官吏中間疑有缺誤處不修入上清度三塗符上元滅慾斬尸變景流光玉符中元滅慾斬尸變景流光玉符下元滅慾斬尸變景流光玉符上清度五苦符解形遂變滅度五苦流景玉符解形逐變滅度五苦流景玉符解形逐變滅度五苦流景玉符解形逐變滅度五苦流景玉符解形逐變滅度五苦流景玉符上清四季投簡符春季夏季秋季冬季玉清開通道路符太乙飛符如普度用首名某等設斛云六道四生孤魂滯魄等靈寶召魂大將軍符凡攝召公牒及催牒並粘一道玉清七道功曹符天道功曹地道功曹人道功曹仙道功曹神道功曹鬼道功曹業道功曹靈寶召五神混合符腦符目符耳符心符肝符脾符肺符腎符陰符胞符胎符結符節符血符精符氣符神符命符太上靈寶變食符玉清眞火合同符玉清眞水合同符火府隱文玉清火鍊符玉清水鍊符混元十二炁混神三景眞符十二符各注將軍姓諱於符下用之一炁六元運陽化陰大將軍符生腎符二炁七變混元三景大將軍符生心符三炁八迴合元大將軍符生肝符四炁九光會靈大將軍符生肺符五炁十合陰陽大將軍符生脾符六炁十一變靈大將軍符生膀胱符七炁十二運化大將軍符生小腸符八炁十三陽光大將軍符生膽符九炁十四}
