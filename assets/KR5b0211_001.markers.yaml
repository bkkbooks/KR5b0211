  - {type: variant, offset: 996, length: 385, content: 宜備天儀開度羣品使有心者得成神仙靈寳三元宫中有三部威儀合二十四條上元總眞中元總神下元總仙上應二十四眞中應二十四神下應二十四氣八景三部元始之宗今悉以相授其道尊重謹勿輕傳來世運促人心破壞必生異念不信經法吾經當還三元宫中須至清炁三代交際龍精乗晨世道太平吾經復岀下世開度今眞文祕典尚留下世未還三天正使眞仙復出現世亦知不易斯文也齋法品𩔖方便多門禮祝啓願随用或别至於威儀俯仰之格相逺不能以寸大要不越諸此苟能以清虚爲體恬澹爲用安神定氣心府泰然思神念眞依儀行事以之祈眞眞必降矣十部妙經靈寳諸齋之祖建齋之時施鎮壇内供養尊禮所不可闕留冲靖有云以三洞眞經爲道本以十方懴謝爲眞誠精思九朝宻投三簡斯言盡之矣行齋之士當職叅三洞身受上法庻於齋事無所窐礙儻冐時宜行自速玄憲耳然十部妙經世亦罕備且有終身不得盻其篇目者敬開具安鎭齋壇合用神經如左儻使經教流布世間則齋法庻不泯没矣齋壇安鎭經目凡靈寳齋㑹皆可施用, CK-KZ: ''}
