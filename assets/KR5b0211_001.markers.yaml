  - {type: variant, offset: 81, length: 905, content: 元始登命太眞按筆玉妃拂筵鑄金爲簡刻玉爲篇袐於玉京七寳玄臺紫儆上宮衆眞侍衛朝慶靈文生天立地開化神明上謂之靈施鎮五嶽安國長存下謂之寳靈寳玄妙爲萬物之尊其量莫測巍巍太空舊科四萬刼一出皆傳宿有金名刻簡來生應爲仙者玉宸大道君愍兆庻之塗炭哀地獄之苦惱慇懃懇請下降世間斯實齋法之祖也和天安地保國寧家度死濟生求仙學道共弘斯經難以言宣太上大道君告髙玄大法師曰夫來入吾法門上希神仙飛騰穹蒼次願家國安寜過度萬患消災㓕禍請福求恩當先修靈寳齋上解宿世重過㧞度惡縁下解巳身積行以來所犯罪愆勤行齋直坐致飛仙此治行之本求道之原學無此法徒勞心神宿根不解聖道泯泯古聞其言今希見其人矣太極眞人曰靈寳無上齋皇老君天尊大聖常修奉不倦而況道士仙人可不翹慕之乎髙上老子曰道家所先莫近乎齋齋法甚多大同小異㓛徳重者惟靈寳齋世希能學之矣學之者皆大乗之士前世積慶所鍾去仙近也清齋誦經仙道自成何必藏山藪也昔正一眞人受命導世奉荷靈寳自以齋法㫖趣淵微法禁森嚴非愚淺始學所可明了廼妙出五稱文撰立正一齋法目爲㫖教以遺祭酒籙生靈寳之教袐而不傳仙人口口相授太極仙公始筆之書著敷齋威儀之訣陸天師後加撰次立爲成儀祝香啓奏出官請事禮謝願念罔不一本經文張杜二師繼出玄風益暢登壇俯仰之格相去雖數百年前後蓋一轍也至於痛庸師之不學憫流谷之無識非非相承其失不悟以簡便為適當以古法爲難行則自張萬福天師以来嘗病之矣今世醮法徧區宇而齋法幾於影滅跡絶間有舉行之士又復不師古始信末師而哂前哲是流俗而悖經教壇儀乖踈科式舛謬甲造乙習遂成舊章切切用力於徼影響譎詭幻怪之間以爲捨是則無以起信末俗而紫闕洪儀玄臺祕典所以度天人惠生死者竄易殆盡日就湮微可勝痛哉夫三洞諸齋莫不以神經爲本懴謝爲先登壇啓祝罔非龍漢舊文依文而行是爲齋法今將十部妙經三洞經科靈寳玄範及留冲靖所傳古齋一宗軌儀行遣叅以所受法訣攷證編次修爲成書合三十六卷以上追張杜二師之遺躅仍以齋法修用一門總其綱領訂其疑誤各釋經文之所從出隨事爲之辨正庻俾結齋之士得所遵承據文便可施用雖非親遇太上面授儀則然經文昺著足爲章程道由人弘何有不可天尊告太上道君曰吾於龍漢之中與三寳相隨逮至赤明世世出化教道三乗巳得道過去及上聖大神諸天帝王妙行眞人莫不承範威儀修行大法以成自然君今, CK-KZ: 東}
