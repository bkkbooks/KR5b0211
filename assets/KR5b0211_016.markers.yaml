爭競功名毎事推遜退身度人第八戒者不得評論經教訾毁聖文躬心承法常如封神第九戒者不得闘亂口舌評詳四軰天人咎恨傷損神炁第十戒者舉動施爲平等一心人和神穆行常使然已上十戒能持否衆官各稱能持天尊言修奉清戒毎合天心常行大慈願爲一切普度厄世慊慊尊教不得中怠寧守善而死不爲惡而生於是不退可得拔度五道不履三惡諸天所護萬神所敬長齋奉戒自得度世天尊言道尊法妙人身亦貴故道開法遺戒經文以度人身人身旣度上與道同宜爲精行持齋奉戒夷心靜黙志念分明一意皈向專想不貳滌蕩六腑過中不味内外清虚每合自然是其齋日揲香啓願應心上徹四天司邏十部威神即下履行觀聽至音鑒映爾心如戒行道皆列功諸天禍福立彰道不負人勤行諦受勿使魔言天尊言建齋行道四天帝王皆駕飛雲緑軿八景玉輿侍從眞人玉女手執花旛前導鳳歌後從天鈞白鵠獅子嘯歌邕邕燒香散花浮空而来瞻禮行道觀聽法音天王下降萬靈朝焉如是豈可不盡其法也當先受十戒然後行道庠序雅歩靜心閉意坐起卧息不離儀格天王懽恱列名上清可謂得道在方寸之問出智慧上品大戒經元始天尊以開皇元年於西那玉國授太上道君次吟奉戒頌廵行一周歸班出仙公請問經道爲無心宗一切作福田立功無定主本願各由人虚已應衆生注心莫不均大聖弘至教亦猶雨降天髙陵靡不周常卑故成淵海爲百川王是能舎龍鱗萬劫保智用豈但在厥年奉戒不暫虧世世善結縁精思念大乗㑹當體道眞次髙功選舉官衆明日行道各典所職髙功法師經云當舉髙德玄解經義斯人也道德内充威儀外備俯仰動止莫非法式三界所範鬼神所瞻關啓祝願通眞召靈䆁疑解滯導逹羣賢法師再拜受簡畢又再拜都講經云才智精明閑練法度其任也行道時節上下食息先白法師次引衆官禮拜揖遜皆當讃唱受職者在位再拜詣髙功位跪受職簡畢歸位又再拜衆官同此監齋其職也司察衆過彈紏愆失秉執科憲隨事舉白必使允當不得隱濫侍經其職也營衞尊經整理中藴髙座几案四坐席地拂飾齊整不得懈怠侍香其職也料理爐器常令火然灰淨三時行道二上轉經皆預辦備不得臨用有關侍燈其職也景臨四方備辦燈具依法安置光焰火然常使朗明若遇風雨火勢不立啓白法師宜停乃停不得怠替輙令闕廢右詮舉六職出金籙簡文是爲登齋威儀陸天師靈寳齋說光燭戒罰祝願儀叙云先宿啓畢次授上品十戒東向平立誦智慧頌誦畢北向首體投地回心禮十方法師還東面西說戒威儀說戒畢法師依舊還署衆官長跪受簡劄明日行道各典所署選署畢東向祝復香衆官引行出治按次列坐法師更爲宣科說禁告示威儀則是說戒補職宣禁必當在宿啓後於科已有明文然禁制威儀却於復香之後方告示者非他蓋陸天師所說禁制自太極三十六條外其餘項目甚多如第一當使香油充足淨水盈餘不得乏少臨用有闕次當修治圊厠令上下蔽宻不得敞露又建齋結坐不得今散外之人參雜坐席供辦齋食毎毎簡素清淨齋日清旦下白粥菜葅塩豉日間設食菜羹菜蒸葅薑之屬竟設大餘依𢊍料狀本科無酒事有明文等法禁極爲纖悉乃是欲使齋主咸服法訓十戒不止爲六職說當與齋主同受勢凡得在復爐後說之爲合宜也先行自然朝然後說戒補職威儀由晉迄唐相沿不革自雲光張若海逞妄謬不經之說著元壇刋誤淺學者或宗其說古法始漸湮微崇眞先生固嘗深闢之矣㨿雲光云今修齋道士當日齊集至夜自玄中法師前齋主投詞法師關告後便升壇行事至大謝後即轉洞案說戒補職何倒錯之甚也又云朝眞之科與國家禋祀禮同享前七日太尉於都省集齋官戒誓未聞徹祭之後方戒齋官也今道士登齋重啓謝後說戒聽其戒辭又非齋意自說初入道披度戒文次第乖違庠序顚倒良由昔人不能刋攺按用謬科致使後來乗此誤本眞餘妄謬未易槩舉抑不思太上天尊開玄都上宫紫微玉笈出靈寳妙齋開度群品威儀之格具載經文靈者神也微妙之功出於思議之表變化無窮故謂之靈寳者一也三才所得而以清寧正者也所不可失故謂之寳人居濁世三關躁擾不能閑停身爲殺盜淫動故役之以禮拜口有惡言綺妄兩古故課之以誦經心有貪欲嗔恚故使人之以思神用此三法洗心淨行心行精至齋之義也太極眞人演經文而著齋戒威儀之訣陸天師摭經訣而撰齋謝戒罰之儀三籙九幽解考塗炭三日七日一時九時品目雖繁儀矩則一沿流窮源舍太極眞人及陸天師果何適矣雲光末識妄肆評議崇眞先生謂其任庸鄙之淺見泯賢聖之崇規賊壞玄綱非聖無法譬諸泥蠼井蛙不知滄海之大二十件之乖謬詳細䟽駁文具道藏本朝興崇玄學繹經潤文盖置使矣楊傑重定金籙乃或因之是可爲長嘆者也就雲光所言今世開建大齋齋主必預投詞法師受詞與乏關奏亦在一月之前次第進拜章書頒宣符命豈不謂之先行其事若必以爲先行事而後補職謂之顚倒又安可於未發預告正奏之前令髙功先補職邪竊詳經科垂補職之文爲明晨行道設耳宿啓散壇不與正齋相渉雲光乃總正齋言之謂爲十一朝法事宜其爲說如是紛紛也太上垂齋直懴謝之法普度天人津梁品彚罪旣可懴福亦隨臻居三界中因縁輪轉塵染業累種種成愆觸犯三光嶽瀆十方經寳積爲罪目結在九幽欲析赦拔必光使之隨方懴謝盖爲此也二十方懴文則見於黄籙簡文三元品戒經十方懴文則見於眞文要解玉匱盟眞科經豈塵世鄙夫所可擬議哉一日修奉止曰齋㑹三日以上方謂之齋戒七日或九日乆者一月具載經科行道懴謝之文則一不以重復爲嫌也自雲光謂三日道場凡有十一朝法事方懴尚占九場齋主齋官乆立行事跛倚壇席其何以堪但書懴文一讀而巳或於大謝之後宣讀三兩過尺須易換懴文不可三日内重讀舊文而後之行齋事者始務去繁就簡習爲穿鑿矣夫上清齋禮九天而九天帝即天尊也料云鬰單無量天尊是也洞神齋十方外復設中央香案則十一方也靈寳盟眞齋雖懺十方至金籙簡文自然齋禮十方之外復禮四極則十四方也黄籙三元齋謝十方外復禮三光五嶽水府經寳則二十方也禮方之位雖殊總之不離乎十蓋元始於空界分作十方諸天五億世界三千一一域中各有十方三界日月星宿天曹地府九幽地嶽天尊散景分形世間周遍隨機所感說法度人聖眞仙品髙下等級蓋非肉眼凡夫所能窺測故上清科以元始次於九天元父玄母之後不爲瀆啓靈寳經以三十二天三十二帝躋於元始上帝太上道君之上不爲䙝尊以各有所因故也自雲光謂法師先上十方香是先降十方眞炁凡對三清啓奏不兼諸天尊號者乃是瀆無再三三尊無二上今之修齋者宣詞及三上香後却禮十方或兼懴謝又更禮日月星宿五嶽水帝亦有懴文十方天尊與日月星宿於三清前猶可庶幾五嶽水府之神大不穩便而後之行齋事者始不知所適從遂有東青西素南丹北𡨋酆都大帝閻羅天子等禮悉以都懴從事矣夫爲道修齋當奉戒法廣度無極法禁微妙檢攝意態伏心就淨殃垢消㓕智慧自生拔生死難就無爲地深觀所起察其所滅因其所病療以慧藥若見色利以戒掩目若聞惡言以戒塞耳若之甘香以戒杜口若放情慾以戒挫心若趣惡事以戒折足身不犯戒超出塵羅可爲整百行建萬善者也受持清戒乃可修齋靜思反聽内視口不妄言身不妄動故無色之色爲之見無聲之聲爲之聞無味之味爲之甘不言之言爲之應神明爲之降福氣為之臻未然之福無願不獲若外不奉威儀内不守戒律行無可紀功無可著精誠不至猶豫懐疑内外不相應心口不相副性急性戾隂賊嫉傲念慮疲於外馳精神消於多慾雖修齋直終身無福以心至不存於内魂魄勞役於外和炁無主故不䏻有所感動也修齋說戒壇官齋主咸令各持安可分别自雲光不見智慧上品大戒經謂聽其戒辭非齋意自說初入道披度戒文而後之行齋事者始務立異好竒恣為誇誕遂有不得登壇之際少懈威儀入靜之時啓端喧閧等戒矣燒香行道懴罪謝愆則謂之齋延眞降聖乞恩請福則謂之醮齋醮儀不得而同今雲光乃謂齋直朝眞與國家禋𣏌禮同而香蔬肴醴有異是全不識齋法本未源流矣烏足怪哉選舉六職若依陸天師舊文本不容議自近代令都講昌補六職而又於職事之下添入上下僉議以某人充等語頗有窒礙髙功法師豈僉衆所可補充者耶今悉攺從陸天師本科庶免後來者之惑次都講唱衆官等平坐宣禁威儀三十六禁出太極威儀經法師曰夫齋法清虚威禁至重主人當洒掃屋守毎潔淨丁敕大小内外寂靜不可使香油闕乏法用有虧道士登齋各齎巾褐版履不得臨時交換彼我公事有闕勿得牽引非巳之服道士登齋起居皆當闕白監齋禮法師一拜禮香三拜而去還亦如之張萬福天師日不敢指三寳故曰禮香也若到齋堂履屨不整罸油二斤准禮二十拜受拜者願輸本色及以香油准禮者聽若坐起不庠序罰油半升准禮五拜若不正坐罰朱半兩准禮五拜若臨行法事與外人交言罰香一斤准禮二十拜若飜覆香火罰香半斤准禮十拜若講及世務罰香一斤准禮二十拜若言語戯笑罰朱一兩准禮十拜若綺言低睡罰朱半兩准禮五拜若飜覆燈油罰油五升准禮五十拜若巾褐不整罰香半斤准禮十拜若都講讃唱失儀罰香一斤准禮二十拜若執紏見過不彈私隱罰油六升准禮六十拜若侍經不整飾髙坐觸物有闕罰香半斤准禮十拜若侍香香烟中絶罰油四升准禮四十拜若侍燈燈火中滅罰香一斤准禮二十拜若齋主内外不相檢敕音聲髙厲罰油五升准禮五十拜若聽經倚㨿不執簡罰油一升准禮十拜若不注念清虚心想意倦爲衆所覺罰油三升准禮三十拜若出入齋堂不關白監齋罰油二斤准禮二十拜若垂髪馳歩罸香一斤准禮二十拜若讀經或亂請問敗句罰油三升准禮三十拜若唱念聲不齊罰油二升准禮二十拜若陞壇不洗手漱口罰油二斤准禮二十拜若坐起揖遜失儀罰油半升准禮五拜若旋行不依次第及逆行罰香半斤准禮十拜若起行來及還坐不禮經三拜徑去者罰香一斤准禮二十拜若臨燒香突行罰油一升准禮十拜若齋主供辦觸事有闕罰香一斤准禮二十拜若受關不啓上罰油三斤准禮三十拜若齋次因起居逃遁不返爲衆所紏罰香五斤准禮一百拜若犯威儀彈罰不伏者啓告三寳退出齋次若下坐衆官法事有虧從一至三依科彈罸從三巳上退出齋次執紏不彈與犯同罪若上坐法師於事有虧自取愆失送簡監齋從一至三依科彈罰從三巳上斷功三百日不得又在法坐太極法師曰凡此禁制皆玄都上宫明科舊格戒其惰慢檢其愆違建齋之時四天帝王天眞上聖親降齋所瞻禮行道察其行藏觀其誠志若有過失即敕四司五帝詔下三官隨事紏舉加其災考天尊大聖哀念世愚不欲使其因齋獲罪故開罰紏之門使其知過過而能攺罪亦消焉受罰之者責巳甘心恭敬聽命勿得飾非諠競干冒眞靈如此則弘整紀綱解消殃咎落罪名於既徃延福祝於將來得不翼冀小心䖍䖍夕惕若親奉大聖躬朝國君即眞靈感通福祥臻集登齋之士勉而戒之出靈寳料玄都律次都講唱監齋受罰簡監齋受簡三拜而起次復爐香官使者左右龍虎君侍香諸靈官當令開建黃籙齋壇之所自然生金液丹碧芝英百靈衆眞交會在此香火爐前當願齋功成就存没霑恩十方仙童玉女侍衞香烟傳臣向來所啓逕御太上無極大道至眞