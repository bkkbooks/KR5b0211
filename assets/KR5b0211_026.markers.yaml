  - {type: variant, offset: 0, length: 4652, content: 无上黄籙大齋立成儀卷之二十六竹六太上執法仙士䉃叔輿修科儀門召靈儀先備香花案一隻於鬼門上以召魂旛置於案前請齋官上香道衆序立舉普獻頌法師上香啓白具法位臣某焚香上奏三清三境十極十華大道慈尊諸天大聖日官月府北斗南辰五星三台地水嶽瀆十方三界應感眞靈仗此眞香普同供養香乃玉華散景九炁凝烟香雲宻羅俓衝九天當願侍香金童傳言玉女上聞帝前令臣所啓咸賜如言臣今伏爲齋主某正薦亡親某乙普薦在會衆魂崇建无上黃籙大齋三日三夜除巳謄詞帝闕請命歸尊奏告十方關盟三界見今齋壇宿啓勝範宣流仰望慈悲俯垂開濟持頒敕命普告靈司召攝亡魂來臨法㑹領諸善果超化生方臣謹滌慮𡨋心仰祈眞應法師存變歩神虎罡召神謹召北魃玄範府神虎提魂攝魄倒生玄司玉女等雄左玉曹玄伯雌右武鸞主吏上部追魂使者中部追魂使者下部追魂使者霄輔助精大神七道功曹呼吸魂魄精光吏兵等社令城隍五道土地導善衆神仰聞今召火急到來本壇奉爲齋主某官某開建黄籙大齋正普薦亡親某乙在㑹衆魂解除業累超證生方除已奏告諸天關盟十極欲得所薦亡靈親魂正魄來詣壇所祗受齋功於今月某日時告行太一混元神虎玉札一道前去生方死所預行追攝外以今恭遵玉格修奉寳齋合要上件亡魂前赴靈壇依科開度伏請神虎二大聖三部追魂使者七玉女等火急徧詣三界十方千眞萬靈效職之所追取某魂攝赴靈旛之上叅眞聽法受化更生無或稽違有妨開度如普薦於此宣單名甲狀焚召魂大將軍符師宻呪曰靈寳符命拔度亡過某等出離地獄永辭長夜五苦三塗不得拘留逼合鬼群斷落死名急急如長生大帝律令再祝曰吾代天行化度死濟生藉汝靈通輔吾正法所是亡魂等或在人天或墮鬼趣或拘考對或繫幽隂並請依準上玄符命玉札天文追取魂神疾速赴壇昭顯儀形通接陽春用揚大教取信群生一準玄科玉律奉行不得違滯次令純陽小童執旛當職道士攝召如儀焚二大聖符師黙祝曰雄左玉曹玄伯雌右武鸞主吏我今攝召亡過某乙等魂速赴靈旛不得稽延何昌喬荀輔我身神我令所下急速奉行急急攝召時法師變身爲太一天尊自本師訣歷至二旨甲下歸上帝訣掐入亡人本命上取鬼門炁吹旛志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法會和受此黄籙開度功德歌斗章隂陽推運𠔃劫數更遷生死周流𠔃孰愚孰賢輪轉無窮𠔃上元造化未出三界𠔃拘於神變魁𩲃東斗𠔃𩳐魒西轉𩵄𩳐南斗𠔃䰢北面隂靈𠔃茫茫没没陽魂𠔃碌碌幽幽天地𡨋𠔃萬鬼潜天地動𠔃萬鬼爽隂陽運𠔃鬼神享太一召𠔃何遲遲先至後至律有常感此仿徨赴我壇賜汝靈書歸上清法師掐攝魂訣宻呪曰訣見修用祕旨門興生獨𨽻可韓功都聚魂對魂攝再祝曰魂神澄正萬炁長存不經苦惱身有光明復聚本形復全本神急急如長生大帝律令三徧取北炁吹旛上營目存到法師平讀呪曰胎光幽精爽靈三魂歸空歸眞天地正眞炁再聚汝形神此是五行造化眞無藏無避無逃形一呼速至變眞靈急急如律令當職道士再召志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂和分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法㑹和受此黃籙開度功德歌斗章陽神返汝殘隂靈逐我旛北斗天蓬敕玄武開幽關三魂無散失七魄莫傾殘乗此金符力攝汝赴靈壇願承無上道賜汝歸飛昇法師黙誦五帝眞諱呪曰襪臘墨黒靈寳紅杏磨眞急急如長生大帝勑奉行取五嶽炁吹之再黙誦度魂眞諱呪曰興生獨𨽻可韓功都聚魂對魂攝急急如長生大帝勑奉行取三塗炁吹之法師平讀曰一炁生萬物萬物分一炁吾復綂一炁再使萬物生故知一炁中不復失吾意攝召汝亡靈諦聽慈悲旨次當職道士三召志心告召三元直事神虎將軍攝魄官君追魂使者伏願應時下降速到齋壇引領亡魂和分明報應志心召請亡過某乙靈魂惟願神魂不昧儼若生存今夜今時來臨法㑹和受此黃籙開度功德歌廽黃章太微廽簧旗無英命靈旛攝召長夜府開度受生魂和不可思議功德師行持平讀曰三官北酆明檢鬼營不得容隱金馬驛程普吿無窮萬神咸聽三界五帝列言上清師焚治病功曹符召五神混合符祝曰焚香上啓青帝護魂君白帝侍魄君赤帝養炁君黒帝通血君黄帝中主君天醫大聖六職治官尚藥仙靈二官神吏生形博士治病功曹收毒將軍敷藥靈官砭石小吏扁鵲官吏仙藥童子拘魂制魄生化大將軍一切靈司並請慈悲降臨壇所奉爲見前受度衆魂攝降眞炁醫治病苦返生魂魄整具形神一如太上律令師行五府事黙誦五帝眞諱行持法師祝曰吾今奉爲齋主某正普薦亡親某人在㑹衆魂開建无上黄籙大齋今故召攝齋主合家所薦亡魂暨九祖七玄父母妻子若兄弟若姊妹若姪孫近屬旁親内宗外戚凡名眷屬以及姻蘿負命負財負恩負德生前殁後一切𡨚讎俱届道場普受開度我以道力能令汝等懽喜自在來赴道場汝宜靜念在心勿生恐怖我此齋法名曰平等若不除三毒尚蔽六情人我𡨚親妄生分别則於平等無有是處應以男子身來者分列于左應以女子身來者分列於右各相擕率隨旛而來入浴更衣朝壇聽法清衆䖍誠隱語迎導靈書引亡魂至沐浴所一人以楊栁枝淨水沿路洒穢沐浴亡靈儀先於浴室内嚴潔辦香水浴室二所浴具所需之物一一備足仍以