front:
  text: 无上黃籙大齋立成儀卷之二十七竹七
  hash: sha256:6386ad5c9c616374107b4dff829e2ecab9386eb33084ba0e8b4135330c666ffb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_027-001a, image: hfl/0284/0284-004.png}
body:
  text: 太上執法仙士蔣权與修科儀門鍊度亡靈請降水火醮獻儀先以一方器安壇之西北以牌書云南宫太隂水鍊池又以一圓器安壇之東南以牌書云南官太陽火鍊池預備黄華神水一器柳木炭大於壇下至鍊度時舖設醮筵三十六分位或二十四分位整辧如法訖道衆引法師齋官序立請齋官上香蕩穢燒香頌法師上香祝香啓白具法位臣某上啓妙無上帝自然元始天尊妙有大帝虚皇玉宸大道君至眞大帝萬變混沌玄元老君紫微中天北極大帝太微南極長生大帝太一救苦天尊丹天朱陵大帝九天自然生神上帝五靈五老上帝三十二天帝君東華木公青童道君西靈金母元君度人不死尊神道君南昌上官長生大帝度世司馬大神好生韓君文人南上司命司録延壽益筭度厄上生眞君廻骸起死監生大神度命成仙眞君靈寳五師君三官大帝君南極九華眞人五嶽揔領眞君南陵摳府未陵火府南昌上宫受鍊司眞宰朱陵火府眞宰黃籙院眞宰黃籙鍊度三界應感合會威靈伏以洞玄下化演八門度命之儀靈寳垂科著九錬返生之訣超凌逝爽拯護幽明惠覃十方恩周三界臣今奉爲齊主某正普薦亡親某乙在會衆魂崇建无上黄籙太齋三日三夜恭祈惠澤普拔幽途鍊度亡靈遷昇福境式陳罪醮祗格眞斿冀殫螻蟻之誠少效蘋繁之薦仰惟慈造曲鑒精䖍俯賜恩光監臨鍊度臣與齋官某無任懇禱仰望恩光之至謹稽首再拜上香諸聖鍊慶堂聖位請初獻散花法事臣謹上啓十方正眞三寳無上師尊北極紫微大帝南極長生大帝太一救苦天尊南昌上官朱陵火府鍊度上聖髙眞三界感應一切威靈伏聞太極混淪莫分於宗祖眞文煥發普植於神靈奠位三元總司萬化得生人道濯形太陽離其本眞自取死壞五行散落億劫飄沉大聖大慈普濟普度津梁群品方便多門開洞陽冶鍊之庭超慾海流吹之識鍊胎返本證品昇僊今按典儀宣行鍊度伏乞迂回景曜昭錫天光勑三界之眞靈暨大法之官將化形降炁領職分司輔助微臣頒宣符命庶使係薦一切亡魂濯質黃華鍊形流火惡根斷絶息苦道之輪廽道炁充盈臻福堂之清淨臣等無任虔禱之至鍊度表文謹當宣奏宣表上香亞獻上啓靈寳鍊度官君將吏合會應感一切威靈伏聞元始開圖眞風逺暢虚皇演教大法興行玉字金書靈符祕篆拔死魂於黒府瑩生魄於朱宫巍巍髙尊落落大範俾令遵奉用拯幽𡨋法局官曹仙靈將吏咸分主宰具按威儀宜共賛於玄風速昭彰於神化恪遵道㫖開度亡魂六趣三塗落隂曹之死録三化九鍊上天府之生名禮姑寓誠儀不及物惟神克享用副精祈無任䖍禱之至上香終獻宣䟽上來誠悃巳具敷陳竊揆眞聦諒垂昭鑒塵寰囂雜薦獻乖踈不揣凡微乞從矜宥尚祈慈造大霈天恩證度亡魂圓成善果上廣大道好生之德下副弟子皈命之誠謹啓焚錢馬同表文化之回向念善次建立水火池道衆法事引法師至水火池請降眞水眞火師行火池法步南斗火鈴罡至火池衆誦隱語師至火池羅周十二位用開放流通法念淨天地呪一遍噀水一口吹池中依法行持畢念建火池呪太上有勑赦罪度生六趣三塗皆覩光明建立火池次第而昇各隨果報悉獲超生急急如上帝勑存朱陵烈火流金自火池東南角流入炎炎金碧焰發取午炁三口吹入池中執眞火合同符掐降眞火訣寅勒至午黙呪曰炎神炎神朱雀飛騰神火一下上按丙丁烈火神女手把帝鐘三昧眞火速降朱陵吾奉南極長生大帝律令勑取午炁吹符焚於火池中再宻呪曰南閻洞浮流火之庭玉眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸眞容升入福堂洞陽之宫師再面東取當日太陽眞炁吹之次指揮掌火池使者錬度官童將吏日中陽精速降池中伺候引亡魂等入火池依法冶錬身形疾疾存流火神庭方廣無邊上有朱陵火府樓閣森然庭中火金碧色焰末皆有火鈴師行水池法歩北斗𤣥樞罡至水池衆誦隱語師至水池羅周十二位用開放流通法黙念淨天地呪一遍噀水一口吹池中依法行持畢念建水池呪太上有勑赦罪度生六趣三塗皆覩光明建立水池次第而升各隨果報悉獲超生急急如上帝勑存天河東并之水自水池西北角流入湛然澄清取西北炁一口吹池中執眞水合同符掐降眞水訣申至子黙呪曰太隂太隂玄武之精神水一下上按癸壬天眞玉液上清華房元始老君好生韓君靈根眞水速降樞府吾奉北極紫微大帝律令勑取北炁吹符沉水池中再宻呪曰潔池無鏡神龍之淵運東井華以滌幽魂攬兹運容太和之津玄和玉女灌之于神魂神澄正道炁長存師面西取當日太隂眞炁吹之次指揮掌水池使者蕩形官童將吏月中黃華靈根邊降池中伺候引亡魂等入水池依法濯質蕩形疾疾存天河東井方廣無邊其水清淨光明上有天府樓閣森然次法事至錬度所上清南宫水火冶鍊度命儀道衆序立錬度所法師詣坐祝香返生靈香飛烟結篆諸天諸地氤氲普徧委氣聚功亡魂受錬一切舍生俱登道岸具法位臣某焚香上啓三清三境十極十華太一救苦天尊九天生神上帝三省五府眞宰南陵樞府朱陵火府南昌上宫靈寳錬度合㑹聖眞仙衆三界内外應感威靈臣聞大道流形肇分於一炁眞陽開化普植於萬靈澤溥幽明惠均生死惟業縁之報對致神爽之沉淪匪仗眞功莫超生界瓊宫大聖金闕玄尊開冶錬之門庭著遷神之品格俾令遵奉拯濟沉迷臣今伏爲某官某正普薦亡親某乙在會衆魂崇建无上黃籙大齋乞按冲科宣行錬度伏願霄興降監天仗迂臨號召靈司宣通符命廻骸起死監眞度生普令受錬之死魂咸沐重玄之慧澤臣無任虔禱之至次吟法事敷座法師凝神存想天門祥煙炁雲彩霞光炫心目三寳慈尊青玄上帝諸天上聖錬度眞衆赫與下臨法師召神謹召靈寳大法局中執職靈官功曹金童玉女錬度眞官仙吏掌水池火池使者丹天左右侍衛大將軍火鈴靈童九光童子黃華玉女東井玉女度魂主吏聚魂功曹攝魄將軍錬度使者混元十二炁化生大將軍飛元聚靈召神諸使者六丁六甲諸大將軍金童玉女受錬司直日神將功曹黃籙院功曹火府神兵泰山五道社令城隍土地等神來詣壇所今奉道㫖鍊度死魂爾等威神疾速恭依元教攝召正普薦亡親某乙在會衆魂並赴靈壇恭受錬度各爲分司聚炁和合形神錬質凝眞登仙悟道一如流火律存前件官吏威儀嚴整羅列左右受度衆魂俱在壇下三界通化天尊次火錬執眞火合同符宣降眞火呪掐午文天中之靈日月居通甲乙炁令五行旺剋八景玉音守形直符招靈致眞攝魂符使聞吾呼召速降通靈承符奉令輙莫容情急急如長生大帝勑取午炁吹符焚火池中再宻呪曰南閻洞浮流火之庭王眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸眞容升八福庭洞陽之宫取當日太傷炁吹之謹請鍊度眞人九光童子火鈴靈童鍊度司仙衆引某人靈魂赴火池受鍊存變並如初火錬丹界天尊執火府隱文宣火錬大呪風火決南方之君赤帝之精熒惑使者丙丁將軍朱雀炎神赫赫陽精五行造化萬物發生天帝有勑使者須聽攝召亡魂或言姓名鍊度眞形急急如長生大帝勑離火吹符宣符文畢焚火池中執火錬符祝曰謹請主火大將軍趙仲明掌火池使者速降眞火錬度幽魂疾疾取南方火炁三口運自已火炁三道相交吹入符焚火池中玉眸鍊質天尊次法師爲亡魂攝召化生十二炁執召一炁大將軍符祝曰謹召長生大帝君一炁六元運陽化隂大將軍楊元光從官符吏等爲亡魂攝降腎水少隂之炁焚符存至吹所慶之魂中次執生腎符祝曰謹請腎神玄𡨋君字育嬰攝黑子文北炁吹符焚之吹所度亡魂執召二炁大將軍符祝曰謹召長生大帝君二炁七變混景大將軍丁忠從官符吏等爲亡魂攝降心火少隂之炁焚符存至行持如前次執生心符祝曰謹召心神丹元君字守靈攝赤午文南炁吹符焚之執召三炁大將軍符祝曰謹召長生大帝君三炁八廻合元大將軍丁遷善從官符吏等爲亡魂攝降肝木厥隂之炁次執生肝符祝曰謹召肝神龍煙君字舍明攝青卯文震炁吹符焚之執召四炁大將軍符祝曰謹召長生大帝君四炁九光㑹靈大將軍陳志元從官符吏等爲亡魂攝降肺金太隂之炁次執生肺符祝曰謹召肺神皓華君字虛成攝白酉之兌炁吹符焚之執召五炁大將軍符祝曰謹召長生大帝君五炁十合隂陽大將軍王先之從官符吏等爲亡魂攝降脾土太隂之炁次執生脾符祝曰謹召脾神常在君字魂停攝黄中指中文上方炁吹符焚之執召六炁大將軍符祝曰謹召長生大帝君六炁十一變靈大將軍張同從官符吏等爲亡魂攝降膀胱太陽之炁次執生膀胱符祝曰謹召膀胱神太虚君字傳送攝蒼艮文東北炁吹符焚之執召七炁大將軍符祝曰謹召長生大帝君七炁十二運化大將軍李淵從官符吏等爲亡魂攝降小腸太陽之炁次執生小腸符祝曰謹召小腸神太虚君字水谷攝陵紅坤文西南炁吹符焚之執召八炁大將軍符祝曰謹召長生大帝君八炁十三陽光大將軍申孚從官符吏等爲亡魂攝降膽腑少陽之炁次執生膽腑符祝曰謹召膽神龍曜君字威明攝碧巽文東南炁吹符焚之執召九炁大將軍符祝曰謹召長生大帝君九炁十四運度大將軍周自然從官符吏等爲亡魂攝降大腸陽明之炁次執生大腸符祝曰謹召大腸神太冲君字治和攝縁乾文西北炁吹符焚之執召十炁大將軍符祝曰謹召長生大帝君十炁十五成隂變陽大將軍章脩從官符吏等爲亡魂攝降胃腑陽明之炁次執生胃符祝曰謹召胃神靈元君字太倉攝紫中指中文上方炁吹符焚之執召十一炁大將軍符祝曰謹召長生大帝君十一炁十六三景混成大將軍王卓立從官符吏等為亡魂攝降三焦少陽之炁次執生三焦符祝曰謹召三焦神羅列君字玄液攝白艮文東北炁吹符焚之執十二炁大將軍符祝曰謹召長生大帝君十二炁十七隂陽合靈大將軍鄭明從官符吏等爲亡魂攝降心胞胳厥隂之炁次執生心胞胳符祝曰謹召胞胳神赤珠君字靈運攝緑卯文震炁文符焚之次祝曰靈寳符命錬化亡魂五臓六腑胞胳根源華精徧布懸澍丹田玉音攝炁靈風聚煙三景洞徹萬神齊仙九光煥耀注化自然千和萬合上登玉天急急如長生大帝勑太清靈變天尊執五帝玉司眞炁符祝曰准上帝勑謹召青帝直符區更生赤帝直符祝昌中黃帝直符玉眞白帝直符辱曲正黒帝直符尹豐奉寪亡魂請降安寳華林青牙之炁梵寳昌陽朱丹之炁玉寳虚玄黃庭之炁七寳金門明石之炁朔畢鬱絶玄滋之炁依科錬度錬質變仙黙誦五帝祕諱取五方炁吹符焚火池中叩齒五通祝曰黃中理炁元生自尊胄腑幽通保胎長存白元公子桃康保神養育朱丹長生神仙得與大帝飛昇九天急急如長生大帝勑取五方炁吹所度亡魂朱陵度命天尊執火錬變仙符誦丹天火錬大呪炎精二神三台流光錬胎易質魄錬魂更穢炁殂落乗煙飛颺隂炁消釋陽炁混康精神益壯洞入火郷混合九炁總炁虚皇昊天有勑流金霐芒九玄煥落貞利無疆急急如長生大帝勑火錬成眞天尊執元君錬身符呪曰炁化成人尸變入玄三化五錬升入九天九天之劫更度魂神受化更生得爲眞人急急如長生大帝勑原五方炁吹符焚火池中度人無量天尊執合形變形成形大將軍符祝曰掐都召訣謹召長生大帝君化靈合形大將軍凌飛運靈變形大將軍蔣眞度靈成形大將軍田師文從官將吏飛行變化助吾眞靈攝降生炁奉爲亡靈全形育質祖炁吹符焚火池中再呪曰磨眞櫗臘紅杏墨黒靈寳急急如長生大帝勑取五方炁吹所度亡魂興生獨𨽻可韓功都聚魂急急如長生大帝勑取辰夘寅三方炁吹所度亡魂次依寳經行持念大梵隱語取四方炁吹所度亡魂存亡魂出火池中貌如嬰兒身有陽光洞徹目前火池使者將軍承行官吏速押所錬亡魂赴水錬壇所隨縁赴感天尊三聲次水錬執眞水合同符宣降眞水呪太玄之一八景同靈五老祕諱日月運明璇璣運轉十干五行八史通靈招神召眞聞吾呼召速降威靈承符奉命輙莫容情急急如長生大帝勑取坎炁吹符焚水池中再宻呪曰霐池無鏡神龍之淵運東井華以滌幽魂攬慈迎容太和之津玄和玉女灌之于神魂神澄正道炁長存取當日太隂之炁吹之謹召錬度眞人黃華玉女東井玉女錬度司仙衆引某靈魂赴水池受錬存變如法清淨度魂天尊執洞明丹陽錬度符宣丹陽錬度大呪蕩形訣龍漢簜蕩無形無名渺渺億劫皇道開清神燈朗耀九魂吐精玉虚澄輝太霞髙明元始開化諸天齊臨三元導養二象攝生巳度者度未成者成巳死即化巳枯即榮蠢動蛹飛一切㝠靈懷胎含孕咸得受形亡者命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天地神祇及諸河源五嶽四瀆幷諸名山洞玄洞虚洞空洞仙無極大聖至眞尊神無極無窮普監度生地根斷絶玄都記名衆神並映一切咸聽急急如長生大帝勑坎炁吹符沉水池中執水錬符祝曰謹請主水大將軍王掌水池使者速降眞水錬度亡魂取北方水炁五口運自巳腎炁五道相交吹入水池黄華蕩形天尊取飛元聚靈召神符九陽眞炁符祝曰謹召長生大帝君飛元聚靈召神飛仙使者楊欣之飛精使者王容飛雲使者張起飛魂使者富公弼飛魄使者丁逢飛光使者陳普直仙使者時申直眞使者黃簡直靈使者路顯等從官符吏飛行變化奉爲亡魂攝降髙上玉清天混溟璉瑝之炁泛華紫微之炁玉婁鳳車之炁中女辟邪之炁太皇微延之炁化眞白之炁絳寳子光之炁天眞命仙之炁太皇寂玄之炁依科錬度返魂生神取祖炁吹符宣符文畢焚水池中祝曰三天育胎九炁結神上化玄丹下轉變仙二象交降以成爾身六脘瓊秀九府納眞十二結節各各絶根盪除穢炁五靈敷陳玄女吐精錬化光鮮金仙翼靈玉華結篇記名青宫長保帝宸急怠如長生大帝勑好生度命天尊執靈寳九錬符祝曰准上帝勑謹召疾除罪簿司斷地逮役司度上南宫司飛空五户司受錬更生司仙化成人司過度三界司飛昇太空司普度無窮司靈官仙吏奉爲幽魂請降胞命元第一天元一黃演之炁胎命元第二天洞𡨋紫戸之炁魂命元第三天長靈明仙之炁魄命元第四天碭尸𡨋演由之炁臓腑命元第五天五仙中靈之炁靈府命元第六天髙眞冲融之炁元府命元第七天髙仙洞笈之炁華府命元第八天眞靈化凝之炁嶽府命元第九天自然玄照之炁依科錬度度命登眞黙誦上帝祕諱取祖炁吹符焚水池中叩齒九通祝曰鬱單凝靈禪善保神梵監凝炁驕樂㑹眞寂然安藏梵寳生津化應流景髙虚曜神無結無愛列名帝篇隂陽㑹神三萬六千二炁交映内保三田克登聖品與劫同年流雲玉輧來侍帝軒䇿龍景髙昇九天急急如長生大帝勑取祖炁吹符宣九鍊符文焚水池中取祖炁吹所度亡魂九天稱慶天尊執石景水母玉精符誦東井大呪曰東井黃華石景玉精飛玄水母金體玉津滔滔源源不竭池亭九龍灌錬三光垂精仙人吐潤錬度魂靈内外朗徹表裏洞清百關九竅元炁滋榮五臟六腑萬神自生胎胞結節隨水開扃死炁斷絶惡根沉淪我今錬化死骸生魂反故攺貌玉體金容變化錬穢飛昇紫庭急急如長生火帝勑取坎炁吹符沉水池中髙眞妙果天尊執神府錬身符呪曰巳枯復榮巳滅復生得生上天更禀太靈九天之劫反復胎嬰穢累湯滅白屍反生急急如長生大帝勑取五太炁吹符焚水池中金闕化身天尊執金液錬形符呪曰金液錬形與道合眞開明三景是謂天根無幽無極無始無窮元皇九醜靈魔降宫紫雲飛天身衆六龍火上水下流入三宫神居陽明大道自通急急如長生大帝勑取玄炁吹符焚水地中轉輪聖王天尊執分形錬形養形大將軍符祝曰謹召長生大帝君丹靈分形大將軍孫庚上靈錬形大將軍富盛紫靈養形大將軍張告真從官符吏飛行變化眞靈攝降生炁奉爲亡魂受化更生祖炁吹符焚水池中再呪曰墨黒襪臘靈寳紅杏磨眞急急如長生大帝勑取五方炁吹所度亡魂興生獨𨽻可韓功都聚魂急急如長生大帝勑取寅卯辰三方炁吹所度亡魂隨願徃生天尊焚靈寳登眞度命出離生死符呪曰玉清赤書上通紫庭天慈赦宥三界𡨋靈十方世界九幽罪魂億曽萬祖苦爽遊精削除罪簿落滅惡根速赴生方炁識閑寧上登天堂澄質錬神超離五苦眞心洞明蕩除隂翳入道昇眞急急如長生大帝勑焚符取祖炁吹池中存亡魂身有玉光瑩然明淨形容端儼仙衣可愛寳華圓滿天尊師黙誦度魂呪興生獨𨽻可韓功都保魂應魂攝次法師焚召丁甲金童玉女大將軍符向來錬度功德巳周謹召六丁六甲大將軍金童玉女速押所錬亡魂各整形儀恭詣上帝御前祗謝天恩受戒傳符登眞度品法衆䖍誠請行迎導次法衆諷隱語引魂朝謁次下座无上黃籙大齋立成儀卷之二十七
