front:
  text: 無上黃籙大齋立成儀卷之二十七竹七
  hash: sha256:7692e0abc830a0750fe8d133c540afa7c8a34154e5eb34f7184bdcbfce94ab52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_027-001a, image: hfl/0284/0284-004.png}
body:
  text: 太上執法仙士蔣權與修科儀門鍊度亡靈請降水火醮獻儀先以一方器安壇之西北以牌書云南宫太隂水鍊池又以一圓器安壇之東南以牌書云南官太陽火鍊池預備黃華神水一器柳木炭大於壇下至鍊度時鋪設醮筵三十六分位或二十四分位整辧如法訖道衆引法師齋官序立請齋官上香蕩穢燒香頌法師上香祝香啓白具法位臣某上啓妙無上帝自然元始天尊妙有大帝虛皇玉宸大道君至真大帝萬變混沌玄元老君紫微中天北極大帝太微南極長生大帝太一救苦天尊丹天朱陵大帝九天自然生神上帝五靈五老上帝三十二天帝君東華木公青童道君西靈金母元君度人不死尊神道君南昌上官長生大帝度世司馬大神好生韓君文人南上司命司録延壽益算度厄上生真君回骸起死監生大神度命成仙真君靈寶五師君三官大帝君南極九華真人五嶽揔領真君南陵摳府未陵火府南昌上宫受鍊司真宰朱陵火府真宰黃籙院真宰黃籙鍊度三界應感合會威靈伏以洞玄下化演八門度命之儀靈寶垂科著九錬返生之訣超凌逝爽拯護幽明惠覃十方恩周三界臣今奉為齊主某正普薦亡親某乙在會衆魂崇建無上黃籙太齋三日三夜恭祈惠澤普拔幽途鍊度亡靈遷升福境式陳罪醮祗格真斿冀殫螻蟻之誠少效蘋繁之薦仰惟慈造曲鑒精虔俯賜恩光監臨鍊度臣與齋官某無任懇禱仰望恩光之至謹稽首再拜上香諸聖鍊慶堂聖位請初獻散花法事臣謹上啓十方正真三寶無上師尊北極紫微大帝南極長生大帝太一救苦天尊南昌上官朱陵火府鍊度上聖髙真三界感應一切威靈伏聞太極混淪莫分於宗祖真文煥發普植於神靈奠位三元總司萬化得生人道濯形太陽離其本真自取死壞五行散落億劫飄沉大聖大慈普濟普度津梁群品方便多門開洞陽冶鍊之庭超欲海流吹之識鍊胎返本證品升仙今按典儀宣行鍊度伏乞迂回景曜昭錫天光勑三界之真靈暨大法之官將化形降氣領職分司輔助微臣頒宣符命庶使係薦一切亡魂濯質黃華鍊形流火惡根斷絶息苦道之輪廽道氣充盈臻福堂之清淨臣等無任虔禱之至鍊度表文謹當宣奏宣表上香亞獻上啓靈寶鍊度官君將吏合會應感一切威靈伏聞元始開圖真風逺暢虛皇演教大法興行玉字金書靈符祕篆拔死魂於黑府瑩生魄於朱宫巍巍髙尊落落大範俾令遵奉用拯幽𡨋法局官曹仙靈將吏咸分主宰具按威儀宜共贊於玄風速昭彰於神化恪遵道旨開度亡魂六趣三塗落隂曹之死録三化九鍊上天府之生名禮姑寓誠儀不及物惟神克享用副精祈無任虔禱之至上香終獻宣疏上來誠悃巳具敷陳竊揆真聰諒垂昭鑒塵寰囂雜薦獻乖踈不揣凡微乞從矜宥尚祈慈造大霈天恩證度亡魂圓成善果上廣大道好生之德下副弟子皈命之誠謹啓焚錢馬同表文化之回向念善次建立水火池道衆法事引法師至水火池請降真水真火師行火池法步南斗火鈴罡至火池衆誦隱語師至火池羅周十二位用開放流通法念淨天地呪一遍噀水一口吹池中依法行持畢念建火池呪太上有勑赦罪度生六趣三塗皆覩光明建立火池次第而升各隨果報悉獲超生急急如上帝勑存朱陵烈火流金自火池東南角流入炎炎金碧焰發取午氣三口吹入池中執真火合同符掐降真火訣寅勒至午默呪曰炎神炎神朱雀飛騰神火一下上按丙丁烈火神女手把帝鐘三昧真火速降朱陵吾奉南極長生大帝律令勑取午氣吹符焚於火池中再密呪曰南閻洞浮流火之庭玉眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸真容升入福堂洞陽之宫師再面東取當日太陽真氣吹之次指揮掌火池使者錬度官童將吏日中陽精速降池中伺候引亡魂等入火池依法冶錬身形疾疾存流火神庭方廣無邊上有朱陵火府樓閣森然庭中火金碧色焰末皆有火鈴師行水池法步北斗玄樞罡至水池衆誦隱語師至水池羅周十二位用開放流通法默念淨天地呪一遍噀水一口吹池中依法行持畢念建水池呪太上有勑赦罪度生六趣三塗皆覩光明建立水池次第而升各隨果報悉獲超生急急如上帝勑存天河東并之水自水池西北角流入湛然澄清取西北氣一口吹池中執真水合同符掐降真水訣申至子默呪曰太隂太隂玄武之精神水一下上按癸壬天真玉液上清華房元始老君好生韓君靈根真水速降樞府吾奉北極紫微大帝律令勑取北氣吹符沉水池中再密呪曰潔池無鏡神龍之淵運東井華以滌幽魂攬兹運容太和之津玄和玉女灌之于神魂神澄正道氣長存師面西取當日太隂真氣吹之次指揮掌水池使者蕩形官童將吏月中黃華靈根邊降池中伺候引亡魂等入水池依法濯質蕩形疾疾存天河東井方廣無邊其水清淨光明上有天府樓閣森然次法事至錬度所上清南宫水火冶鍊度命儀道衆序立錬度所法師詣坐祝香返生靈香飛煙結篆諸天諸地氤氲普遍委氣聚功亡魂受錬一切舍生俱登道岸具法位臣某焚香上啓三清三境十極十華太一救苦天尊九天生神上帝三省五府真宰南陵樞府朱陵火府南昌上宫靈寶錬度合會聖真仙衆三界內外應感威靈臣聞大道流形肇分於一氣真陽開化普植於萬靈澤溥幽明惠均生死惟業緣之報對致神爽之沉淪匪仗真功莫超生界瓊宫大聖金闕玄尊開冶錬之門庭著遷神之品格俾令遵奉拯濟沉迷臣今伏為某官某正普薦亡親某乙在會衆魂崇建無上黃籙大齋乞按沖科宣行錬度伏願霄興降監天仗迂臨號召靈司宣通符命回骸起死監真度生普令受錬之死魂咸沐重玄之慧澤臣無任虔禱之至次吟法事敷座法師凝神存想天門祥煙氣雲彩霞光炫心目三寶慈尊青玄上帝諸天上聖錬度真衆赫與下臨法師召神謹召靈寶大法局中執職靈官功曹金童玉女錬度真官仙吏掌水池火池使者丹天左右侍衛大將軍火鈴靈童九光童子黃華玉女東井玉女度魂主吏聚魂功曹攝魄將軍錬度使者混元十二氣化生大將軍飛元聚靈召神諸使者六丁六甲諸大將軍金童玉女受錬司直日神將功曹黃籙院功曹火府神兵泰山五道社令城隍土地等神來詣壇所今奉道旨鍊度死魂爾等威神疾速恭依元教攝召正普薦亡親某乙在會衆魂並赴靈壇恭受錬度各為分司聚氣和合形神錬質凝真登仙悟道一如流火律存前件官吏威儀嚴整羅列左右受度衆魂俱在壇下三界通化天尊次火錬執真火合同符宣降真火呪掐午文天中之靈日月居通甲乙氣令五行旺剋八景玉音守形直符招靈致真攝魂符使聞吾呼召速降通靈承符奉令輒莫容情急急如長生大帝勑取午氣吹符焚火池中再密呪曰南閻洞浮流火之庭王眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸真容升八福庭洞陽之宫取當日太傷氣吹之謹請鍊度真人九光童子火鈴靈童鍊度司仙衆引某人靈魂赴火池受鍊存變並如初火錬丹界天尊執火府隱文宣火錬大呪風火決南方之君赤帝之精熒惑使者丙丁將軍朱雀炎神赫赫陽精五行造化萬物發生天帝有勑使者須聽攝召亡魂或言姓名鍊度真形急急如長生大帝勑離火吹符宣符文畢焚火池中執火錬符祝曰謹請主火大將軍趙仲明掌火池使者速降真火錬度幽魂疾疾取南方火氣三口運自已火氣三道相交吹入符焚火池中玉眸鍊質天尊次法師為亡魂攝召化生十二氣執召一氣大將軍符祝曰謹召長生大帝君一氣六元運陽化隂大將軍楊元光從官符吏等為亡魂攝降腎水少隂之氣焚符存至吹所慶之魂中次執生腎符祝曰謹請腎神玄𡨋君字育嬰攝黑子文北氣吹符焚之吹所度亡魂執召二氣大將軍符祝曰謹召長生大帝君二氣七變混景大將軍丁忠從官符吏等為亡魂攝降心火少隂之氣焚符存至行持如前次執生心符祝曰謹召心神丹元君字守靈攝赤午文南氣吹符焚之執召三氣大將軍符祝曰謹召長生大帝君三氣八回合元大將軍丁遷善從官符吏等為亡魂攝降肝木厥隂之氣次執生肝符祝曰謹召肝神龍煙君字舍明攝青卯文震氣吹符焚之執召四氣大將軍符祝曰謹召長生大帝君四氣九光會靈大將軍陳志元從官符吏等為亡魂攝降肺金太隂之氣次執生肺符祝曰謹召肺神皓華君字虛成攝白酉之兌氣吹符焚之執召五氣大將軍符祝曰謹召長生大帝君五氣十合隂陽大將軍王先之從官符吏等為亡魂攝降脾土太隂之氣次執生脾符祝曰謹召脾神常在君字魂停攝黃中指中文上方氣吹符焚之執召六氣大將軍符祝曰謹召長生大帝君六氣十一變靈大將軍張同從官符吏等為亡魂攝降膀胱太陽之氣次執生膀胱符祝曰謹召膀胱神太虛君字傳送攝蒼艮文東北氣吹符焚之執召七氣大將軍符祝曰謹召長生大帝君七氣十二運化大將軍李淵從官符吏等為亡魂攝降小腸太陽之氣次執生小腸符祝曰謹召小腸神太虛君字水谷攝陵紅坤文西南氣吹符焚之執召八氣大將軍符祝曰謹召長生大帝君八氣十三陽光大將軍申孚從官符吏等為亡魂攝降膽腑少陽之氣次執生膽腑符祝曰謹召膽神龍曜君字威明攝碧巽文東南氣吹符焚之執召九氣大將軍符祝曰謹召長生大帝君九氣十四運度大將軍周自然從官符吏等為亡魂攝降大腸陽明之氣次執生大腸符祝曰謹召大腸神太沖君字治和攝緣乾文西北氣吹符焚之執召十氣大將軍符祝曰謹召長生大帝君十氣十五成隂變陽大將軍章修從官符吏等為亡魂攝降胃腑陽明之氣次執生胃符祝曰謹召胃神靈元君字太倉攝紫中指中文上方氣吹符焚之執召十一氣大將軍符祝曰謹召長生大帝君十一氣十六三景混成大將軍王卓立從官符吏等為亡魂攝降三焦少陽之氣次執生三焦符祝曰謹召三焦神羅列君字玄液攝白艮文東北氣吹符焚之執十二氣大將軍符祝曰謹召長生大帝君十二氣十七隂陽合靈大將軍鄭明從官符吏等為亡魂攝降心胞胳厥隂之氣次執生心胞胳符祝曰謹召胞胳神赤珠君字靈運攝緑卯文震氣文符焚之次祝曰靈寶符命錬化亡魂五臟六腑胞胳根源華精遍布懸澍丹田玉音攝氣靈風聚煙三景洞徹萬神齊仙九光煥耀注化自然千和萬合上登玉天急急如長生大帝勑太清靈變天尊執五帝玉司真氣符祝曰準上帝勑謹召青帝直符區更生赤帝直符祝昌中黃帝直符玉真白帝直符辱曲正黑帝直符尹豐奉寪亡魂請降安寶華林青牙之氣梵寶昌陽朱丹之氣玉寶虛玄黃庭之氣七寶金門明石之氣朔畢鬱絶玄滋之氣依科錬度錬質變仙默誦五帝祕諱取五方氣吹符焚火池中叩齒五通祝曰黃中理氣元生自尊胄腑幽通保胎長存白元公子桃康保神養育朱丹長生神仙得與大帝飛升九天急急如長生大帝勑取五方氣吹所度亡魂朱陵度命天尊執火錬變仙符誦丹天火錬大呪炎精二神三台流光錬胎易質魄錬魂更穢氣殂落乘煙飛揚隂氣消釋陽氣混康精神益壯洞入火鄉混合九氣總氣虛皇昊天有勑流金霐芒九玄煥落貞利無疆急急如長生大帝勑火錬成真天尊執元君錬身符呪曰氣化成人尸變入玄三化五錬升入九天九天之劫更度魂神受化更生得為真人急急如長生大帝勑原五方氣吹符焚火池中度人無量天尊執合形變形成形大將軍符祝曰掐都召訣謹召長生大帝君化靈合形大將軍凌飛運靈變形大將軍蔣真度靈成形大將軍田師文從官將吏飛行變化助吾真靈攝降生氣奉為亡靈全形育質祖氣吹符焚火池中再呪曰磨真櫗臘紅杏墨黑靈寶急急如長生大帝勑取五