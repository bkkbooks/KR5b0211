front:
  text: 無上黃籙大齊立成儀卷之三十五白五
  hash: sha256:799a0680fdf799206de852d4a5eb6af10f53b987b197d2e6cbb1fa51324d140d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_035-001a, image: hfl/0285/0285-134.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿撰集齊法修用門釋言功拜表杜廣成先生曰表文以黃素五尺朱界朱書每行二十四字生字不在下死字不在上第一行盡書法位至頓首字上言獨占一行太上無極大道居第二行表後以聞去臣姓三行聖號去臣姓三行年月去聖號三行一如章法不得塗攺注乙譴責尤重謹之讀表時取表於香上熏之即讀法位起再拜託復長跪和聲正氣讀之至弟子名皆令再拜至誠惶誠恐處起再拜至年月日時某處拜上又再拜都畢展於玉案上證對御前以龍頭書刀鎮聖號之左朱筆鎮右訖次三捻上香長跪叩齒三通遣表勑表畢法師於案後臨目向天門曲身中存三五吏兵及三亢將軍功曹騎乘羅列前後身乘翠羽車龍馭在紫氣中冉冉而升上詣三天門下先謁三天法師入玄都宫門之左呈表訖已捧表函徑入三天門齎章呈章等從事一十二人表候上省覽畢即出三天門御羽車與騎乘而回所經歷天宫道路次第一如三五拜章訣次叩齒十二通內官畢再叩齒三通咽液三過存三五上章官吏各復身中再拜次卷表於詞文之前內函中封印訖并真文通於小桉上同案捧之監齊押之幢節前引弟子隨之至天門上焚之法師於本位向天門存真官捧真文表等隨香烟朱熖上升天門右言功表亦謂之言功章章表同法皆本正一古者籙生祭酒領户化民進拜章書止是依法操露存思遣官齎呈以俟玄報所以本科遣章云若有謬誤顚倒長毫利筆隨誤正定等語楊傑金籙却以巳見刪去比三十八字蓋是未究古法操伏既畢章書止留治中至三無日依斷章法方一併焚去至上元後所拜章書至中元日斷中元後所拜章書至下元日斷蓋古者法籙全備傳授有宗三五吏兵呼吸相應不專委心於文書也杜廣成納官後方收表入函焚於天門上蓋是古法後世傳授失真自度非慿文翰莫期感通故於遣官後即卷表入函法師依法存伏隨即焚燎蓋少變古法矣至趙道升則又自以聞後令法師從後讀至前仍以圭三尉聖號蓋天一法也靈寶五錬生尸經有黃繒章法乃是表式建齊之初必出官啓事事畢拜表與之言功令其隨表上詣玄都列受功賞𥘉未嘗再出官也楊傑被旨剛修科文却於散壇三禮後重稱法位再出官而後拜表自後相㳂不革蓋是不曽深考經文非古法也釋納官衆官長跪法師叩齒十二通納官畢再叩齒三通咽液三過存三五官吏各復身中釋納職各依位相次於三寶前禮一拜長跪受簡於髙功訖起三禮退就西立並訖髙功三拜行就本位釋宣簡先三捻香執山簡文叩齒九通讀之香熏三過乃讀讀訖衆官再拜令弟子執簡橫於香烟上法師叩齒九通面東呪之呪時衆官隨聲言之畢衆官再拜簡文并呪金龍驛傳四字皆三度言之呪訖封題如法水土二簡一同還戒頌天尊大慈悲說戒度衆生威德被幽顯果報感神靈諸天來稽首羣魔自束形過去超八難見在保千齡齊福行當息相共送䖍誠流梵逸雲唱飛香雜烟馨瓊鳯乘丹輦金龍駕緑軿生死皆快樂家國悉安寧太極頌并釋道以齊為先勤行登金闕改設大法橋普度諸人物宿世恩德報道心超然發身飛升玄都七祖咸解脫右出太極敷齊威儀經學仙頌大學仙頌見轉經儀學仙行為急奉戒制清心虛夷正氣居仙聖自相尋若不信法言胡為棲山林空洞頌出靈寶空同靈章經元始開圖敷落玉篇髙唱空洞飛步入玄神王度命乘虛駕烟禮誦靈章與劫同年三塗五苦頌三才及萬物倚伏各有齡終始大劫數福盡天地傾往反於五道苦哉更死生展轉三塗中去來與禍并大賢慎茲戒忍世念割情愚夫不信法罪痛常自嬰吾念世無巳今古重告明若欲度斯禍皈命太上經罪福不由他諒自發爾身大賢故間口欲絶諸惡緣滅念皈兼忘倚伏待長泯弘道以安世終當見正真淫嫉為禍首滅身之至患貪養如斯禍恐必致夭殘知惡而不革豈是道所安懷毒日齊直今我發長嘆宿命有信然弱喪謂之無皆欲服前見過目即言悠大賢明道教𢡖戚憫頑夫依依念子苦勤勤令我憂人命易消盡亦猶膏中火四大暫相遇五物權時假盛年當勤學趣求存吾我福盡身神散冥冥地獄下上聖畏是故尋道度斯禍學仙行為急奉戒制清心虛夷正氣居仙聖自相尋若不信法言胡為棲山林大賢樂經戒受之為身寶就學常苦晚治身恨不早比當披幽𧷤倐忽年己老執卷吸爾極將更死痛惱吾故及弱齡棄世以學道右太極真人作出靈寶本願大戒經釋然燈下元黃籙簡文靈仙品曰拔度罪根威儀十方各安九燈火合九十燈在都門之外太歲行年大小墓本命俠門然燈隨主人所安多少每令光明徹照竟夕勿使中滅右黃籙簡文然燈雖有定數要須量力及壇席闊狹施之勿使妨礙行事及勿汙人衣冠為佳上元金籙簡文真仙品曰然燈威儀功德至重上照諸天下照諸地八方九地並見光明全在侍燈之官勤為同意每令燈光明徹竟夕不得中滅及丰暗半明令人絶世冝常謹之飛天神人曰學士不明然燈燒香七祖不得開度長夜之府九幽之中身無光明考屬太隂曹杜廣成先生曰禮燈之法出金籙簡文凡修齊行道以燒香然燈最為急務香者傳香達信上感真靈燈者破暗燭幽下開泉夜所以科云燒香然燈上照諸天福堂下照長夜地獄苦魂滯魄乘此光明方得解脫既然燈須各有法象春九夏三秋七冬五四季十二皆隨五行本數設之更有諸天諸地八卦九幽諸燈之位隨金籙簡文中方位羅列燒香禮祝福德立降災咎自消或以啓齊之夜或三日七日之中如法然燈落景行道畢出壇至地戶以讃詠幢節庠序雅步導引衆官弟子等旋繞燈下依位祝之每祝畢衆官弟子皆禮禮遍復以空洞聲引歸玄師前散如常儀只於地戶列班禮祝亦合其法又曰凡修黃籙當依真文玉訣四時然燈外别然金籙諸燈依法拜祝訖或三日之內併行之或拜祝一夕皆獲福利幽顯沾恩矣或不因齊壇特然此燈依法拜祝功以等矣崇善之士其弘之馬明燈頌王一陽光炎上朱烟開光童子一十二人洞照天下及臣等身百邪摧落却鬼萬千光明朗徹通真逹靈升入無形輿道自然右出靈寶上元金籙簡文真仙品無燈威儀明燈讃三首太上散十方華燈通精誠諸天亦皆然諸地悉玄明我身亦光徹五臟生華榮炎景昭太元遐想繁玉清丹精寄太旡玄陽空中響合形滅苦根幽妙至真想垂華不現實因緣示光象我身亦如之乘化託流景夜光表丹陽迢迢照靈室諸天普光顯諸隂即日滅我神亦聰明常玩智與慧逍遙適道運遷謝任天勢舉形躡空洞夜燭焕流萃右出洞真觀身大戒見陸天師然燈禮祝威儀滅燈頌玄隂間光長燈續明太陽巳朗八幽開清燈還太隂光附景生曰月二真與我合并右出上元金籙簡文真仙品然燈威儀釋投龍簡下元黃籙簡文靈仙品曰拔度罪根威儀修齊都畢當依玉訣投金龍一枚丹書玉札青絲纏之以關靈山升度之信掛於絶巖之中一依具法又曰關水帝滅儀當丹書玉札金龍一枚青絲纒之以簡況之三江以關水帝升度之信一依玉訣具文又曰關水帝畢即以玉札金龍金鈕九枚青絲纒之埋於壇所以告盟地官一如科文玉簡盟真科曰修黃籙寶齊當以上金三兩鑄金龍龍各一兩國家用上金公侯大臣次金士庶銀銅塗金並可通用副以簡文即玉圠也題修齊所為及國號太歲月日法師姓名投奠方所投於名山大洞靈泉龍冗及齊壇或在之中以告盟天地水三府使監證齊功闕者考屬地官九都曹科曰龍者乘雲氣御隂陽合則成體散則成章變化不測入地升天故三十六天極陽之境可以驛傳信命通逹玄靈者其龍乎龍者陽畜也夫天用真如龍地用莫如龜人用莫如馬是以天上以龍驛騎往來人間矣金者五金之最堅剛不渝天地所寶通靈合神故以上金鑄之取法龍形投之洞府盟三元也洞府真官所司寮屬告龍信簡文録其善功以奏言於上聖感應之報猶影之隨形修尚之士不可闕也簡者告也紀也札也紀世之善告於上真法長一尺二寸象十二辰廣二寸四分法二十四真氣厚二分法二儀上下正方法日之方景正真通逹無所避讓國家以玉為之玉有九德可以為禮大地神祇之信故用玉焉公侯臣庶通用槿木以其潔白纎緻可比玉矣明尊卑之殊也璧者禮天地山川之寶也以玉為之投山簡用圓璧一其色蒼徑二寸虛其中山簡關九天之信故用蒼璧以法天地投水簡用六出之璧其色黑徑三寸虛其中水簡為九海水宫之信故用玄璧水之色六出水之數也投土簡用黃璧正方徑二寸虛其中土簡為九地之信黃者土之色也方者地之形也璧與龍副於簡封之外以青絲纒之投三簡之法當用金鈕九隻三簡用二十七鈕金鈕代歃血青絲代割髮告盟逹誠最為重也故以青絲纒鈕璧以附於簡及龍而後放之也鈕法國家用金臣以銀銅塗金可也鈕徑九分圓其外如環之形也修齊畢别卜良日或潔齊之辰備醮饌法師衆官及齊主弟子或泛舟以詣水洞或梯陸以登山門各於洞之外剃草掃灑潔淨敷列醮席酒果肴饌當鹿脯湯茶等國家六十分臣庶二十四分如嚴醮之儀乃盛服澡漱朝謁法事備如科式所在地司靈官監察將吏當為子關啓洞中仙曹通逹告齊之簡如此福善立感不得都無關啓直爾投於洞中不逹真靈反獲罪考矣若山水之洞稍遠師衆不可俱行難於登泛者當選壇內法職一二人與弟子齎簡以詣洞所設醮關告投奠一如本儀若國家投龍五嶽諸山具有金籙科式與此常禮繁省不同矣齊官或公私所拘不得躬詣洞府者可精選謹䖍恪信奉恭勤者一人代往行禮無可代者師為關告之又不得藏匿簡文因循持久既闕告盟之信所在地司録奏獲罪非細切冝謹之旡上黃籙大齊立成儀卷之三十五
