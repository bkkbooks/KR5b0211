body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿編次正申門申靈寶三師具法位姓某先據某布政司某縣某處入齊意至福佑見存某據詞難抑巳於某月日預告先揚寶幡上聞齋意今按下元黃籙簡文靈仙品格建立靈壇崇修齋法恭依次第宣演真科進拜天官濟度諸章頒行元始符命金籙白簡救苦真符太上敕赦生天寶籙玉清拔幽魂破地獄真符青宫九龍符命神虎玉劄赦拔亡故某乙在會係薦等魂及十方九幽囚徒苦爽出離長夜祇受齋功謹取某月某日開啓齋壇召攝亡魂赴壇受度某日清旦為始正齋行道三日九朝某日夜普設清淨無礙斛食香齋錬度六道四生孤魂滯魄某日夜水火變鍊係薦亡魂傳授九真妙戒告行元始符命金籙白簡長生靈符給籙破劵保舉超升事畢拜表言功解壇滿散某日夜祗設三界髙真清醮三百六十分位仰答洪恩投龍進簡除具事由備奏上帝乞降敕命及奏諸天帝尊請降睿旨申三界真司牒合屬去處將所薦亡魂姓名生死年月别具帳狀申三天門下上清天樞院伺候敕旨乞與頒行外三日正齋建散壇席宣行科範欲得恩光下燭濟度存亡須至申聞者右某謹具狀申靈寶經師真君靈寶籍師真君靈寶度師真君聖前恭望師慈特降聖旨下三界十方地水冥曹一切去處照應依準黃籙靈仙科品元始符命開度事理根刷亡故某乙在會係薦等魂及十方九幽苦魂罪魄不以罪業輕重拘留執對特與赦除𡨚業解釋苦根俾離重冥普受開度建齋設醮之日願賜祥光鑒盟壇席庶使善功圓就障難不生家國霑恩幽明蒙福干冒聖威某下情無任惶懼之至謹具申聞謹狀太歲某甲子某年月日具位姓某狀可漏同前式見預告門玄中教主上清靈寶聖師真君三天扶教輔元大法天師正一靜應真君右二狀並同上三官具法位姓某先據某布政司某縣某處同五師狀右某謹具狀申上元天官紫微大帝聖前恭望聖慈特降聖旨下三界十方一切去處及三元宫府諸司曹局隂陽風刀水火考官北隂酆都內外官洞冥關幽治長夜泉扃嶽瀆河源九幽諸獄效職主司考官掾吏照應依準黃籙靈仙科品元始符命開度事理根刷亡故某乙在會係薦等魂及十方九幽苦魂罪魄不以罪業輕重拘留執對特與赦除𡨚業解釋苦根俾離幽冥普受開度建齋之日願賜祥光監臨壇席庶使善功圓就障難不生家國霑恩幽明蒙福干冒聖威同前五師狀結至謹狀方函申狀一函上詣上元天官紫微大帝聖前具法位姓某謹重封中元地官清虛大帝下元水官洞隂大帝聖前右此二狀與天官狀並同日宫具法位姓某今據某鄉貫同三師狀至同侯敕旨頒行外尚慮所薦一切亡魂生世之日所行罪犯上觸天光釁結日宫大明之府月宮狀攺作月官太隂之府三塗考對萬劫沉淪非假恩光無由開濟及錬度之夕欲望流光委氣變錬亡魂須至申聞者右某謹具狀申日宫炎光鬱明太陽帝君聖前伏望聖慈特降聖旨下三界所屬真司九地幽隂一切去處照應依準黃籙靈仙科品元始符命開度事理赦拔係薦亡魂及十方幽途苦爽積劫以來觸犯諸罪俾離長夜覩見光明更乞降法分光開明幽暗灌溉甘露法食委注水火華池俾係薦等魂陶沐陽精月宫攺作隂精蕩除隂穢聚神返本受化更生福普邦家恩霑見在所有錬度一行仙靈童女併乞如期下降顯助宣行冒犯聖威同前三官狀結至謹狀月宫月宫黃華素矅元精聖后太隂皇君聖前右此一狀與日宫起結相同五星四曜五斗具法位姓某今據某鄉貫同三師狀至伺敕旨頒行外尚慮所薦一切亡魂生世之日所行罪犯上觸天光釁結星宫三元之府三塗考對萬劫沉淪非假恩光無由開濟須至申聞者右某謹具狀申東方木德歲星真君東斗主算星君東方七宿星君聖前恭望聖慈特降聖旨下三界所屬真司照應檢會亡故某乙在會係薦等魂及十方九幽苦魂罪魄所有積劫以來觸犯諸罪並令原赦覩見光明更乞降氣分光照燭幽夜灌溉甘露法食委注水火華池俾係薦一切亡魂蕩除隂穢落滅惡根受化更生普蒙開濟恩均見在福被邦家干冒聖威同前日宫狀結至謹狀方函申狀函上詣東方木德歲星真君聖前具法位姓某謹重封南方火德熒惑星君南斗上生真君南方七宿星君右三位共一狀起結與東方同西方金德太白星君西斗記名星君西方七宿星君右三位共一狀起結與東方同北方水德伺辰星君北斗落死星君北方七宿星君右三位共起狀起結與東方同中央土德鎮星星君中斗大魁星君神首羅㬋星君神尾計都星君天一紫氣星君太一月孛星君右六位共一狀起結輿東方同南斗具法位姓某今據某鄉貫同三師狀至同侯敕旨頒行外尚慮所薦一切亡魂久淪幽夜迷失本真必假陽精陶形易質除巳建立水火華池依科鍊度欲得南昌上宫一行官將應期感挌輔助行持須至申聞者右某謹具狀申南斗六司星君南上朱陵火府君聖前恭望聖慈特降聖旨下三界十方一切去處照應依準黃籙靈仙科品元始符命開度事理赦拔亡魂開明罪爽仍乞頒下丹天世界朱陵火府南昌上宫水火二司差撥錬度一行官吏如期下降輔助宣撫鍊度在會亡魂無邊罪爽俱承拯濟永脫輪廽普及含靈均霑景福冒犯聖威同前日宫狀結至謹狀方函南斗六司真君聖前具法位姓某謹重封北斗具法位姓某今據某鄉貫同三司狀至伺候敕旨頒行外所有神虎一行官吏欲冀下臨輔助追攝及有玄冥隱書混元玉劄一宗符命未敢擅便告行須至申聞者右某謹具狀申大聖北斗九元星君北斗九皇夫人北斗玄冥太一夫人聖前恭望聖慈特降聖旨下三界所屬真司地水冥曹一切去處照應俯賜九光神燭七氣靈暉照破重泉開明幽暗特與亡故某乙在會係薦等魂及十方九幽囚