front:
  text: 无上黄籙大齋立成儀卷之七鳳七
  hash: sha256:8a3632691569ae286b1e968a454c3f78424c3036097e9ead4ddf8098ca928903
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_007-001a, image: hfl/0279/0279-004.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿編次正申門申靈寳三師具法位姓某先據某布政司某縣某處入齊意至福佑見存某據詞難抑巳於某月日預告先颺寳旛上聞齋意今按下元黄籙簡文靈仙品格建立靈壇崇修齋法恭依次第宣演眞科進拜天官濟度諸章頒行元始符命金籙白簡救苦眞符太上敕赦生天寳籙玉清拔幽魂破地獄眞符青宫九龍符命神虎玉劄赦拔亡故某乙在會係薦等魂及十方九幽囚徒苦爽出離長夜祇受齋功謹取某月某日開啓齋壇召攝亡魂赴壇受度某日清旦爲始正齋行道三日九朝某日夜普設清淨無礙斛食香齋錬度六道四生孤魂滯魄某日夜水火變鍊係薦亡魂傳授九真妙戒告行元始符命金籙白簡長生靈符給籙破劵保舉超升事畢拜表言功解壇滿散某日夜祗設三界髙眞清醮三百六十分位仰答洪恩投龍進簡除具事由備奏上帝乞降敕命及奏諸天帝尊請降睿㫖申三界眞司牒合屬去處將所薦亡魂姓名生死年月别具帳狀申三天門下上清天樞院伺候敕㫖乞與頒行外三日正齋建散壇席宣行科範欲得恩光下燭濟度存亡須至申聞者右某謹具狀申靈寳經師眞君靈寳籍師眞君靈寳度師眞君聖前恭望師慈特降聖旨下三界十方地水㝠曹一切去處照應依準黄籙靈仙科品元始符命開度事理根刷亡故某乙在㑹係薦等魂及十方九幽苦魂罪魄不以罪業輕重拘留執對特與赦除𡨚業解釋苦根俾離重㝠普受開度建齋設醮之日願賜祥光鑒盟壇席庶使善功圓就障難不生家國霑恩幽明䝉福干冒聖威某下情無任惶懼之至謹具申聞謹狀太歳某甲子某年月日具位姓某狀可漏同前式見預告門玄中教主上清靈寳聖師眞君三天扶教輔元大法天師正一靜應眞君右二狀並同上三官具法位姓某先據某布政司某縣某處同五師狀右某謹具狀申上元天官紫微大帝聖前恭望聖慈特降聖㫖下三界十方一切去處及三元宫府諸司曹局隂陽風刀水火考官北隂酆都内外官洞㝠關幽治長夜泉扃嶽瀆河源九幽諸獄効職主司考官掾吏照應依準黄籙靈仙科品元始符命開度事理根刷亡故某乙在㑹係薦等魂及十方九幽苦魂罪魄不以罪業輕重拘留執對特與赦除𡨚業解釋苦根俾離幽㝠普受開度建齋之日願賜祥光監臨壇席庶使善功圓就障難不生家國霑恩幽明蒙福干冒聖威同前五師狀結至謹狀方函申狀一函上詣上元天官紫微大帝聖前具法位姓某謹重封中元地官清虚大帝下元水官洞隂大帝聖前右此二狀與天官狀並同日宫具法位姓某今據某郷貫同三師狀至同侯敕旨頒行外尚慮所薦一切亡魂生世之日所行罪犯上觸天光釁結日宫大明之府月宮狀攺作月官太隂之府三塗考對萬劫沉淪非假恩光無由開濟及錬度之夕欲望流光委炁變錬亡魂須至申聞者右某謹具狀申日宫炎光鬱明太陽帝君聖前伏望聖慈特降聖㫖下三界所屬眞司九地幽隂一切去處照應依準黄籙靈仙科品元始符命開度事理赦拔係薦亡魂及十方幽途苦爽積劫以來觸犯諸罪俾離長夜覩見光明更乞降法分光開明幽暗灌漑甘露法食委注水火華池俾係薦等魂陶沐陽精月宫攺作隂精蕩除隂穢聚神返本受化更生福普邦家恩霑見在所有錬度一行仙靈童女併乞如期下降顯助宣行冒犯聖威同前三官狀結至謹狀月宫月宫黄華素矅元精聖后太隂皇君聖前右此一狀與日宫起結相同五星四曜五斗具法位姓某今據某鄉貫同三師狀至伺敕旨頒行外尚慮所薦一切亡魂生世之日所行罪犯上觸天光釁結星宫三元之府三塗考對萬劫沉淪非假恩光無由開濟須至申聞者右某謹具狀申東方木德歳星眞君東斗主筭星君東方七宿星君聖前恭望聖慈特降聖㫖下三界所屬眞司照應檢㑹亡故某乙在㑹係薦等魂及十方九幽苦魂罪魄所有積劫以來觸犯諸罪並令原赦覩見光明更乞降炁分光照燭幽夜灌漑甘露法食委注水火華池俾係薦一切亡魂蕩除隂穢落滅惡根受化更生普蒙開濟恩均見在福被邦家干冒聖威同前日宫狀結至謹狀方函申狀函上詣東方木德𡻕星眞君聖前具法位姓某謹重封南方火德熒惑星君南斗上生眞君南方七宿星君右三位共一狀起結與東方同西方金德太白星君西斗記名星君西方七宿星君右三位共一狀起結與東方同北方水德伺辰星君北斗落死星君北方七宿星君右三位共起狀起結與東方同中央土德鎭星星君中斗大魁星君神首羅㬋星君神尾計都星君天一紫炁星君太一月孛星君右六位共一狀起結輿東方同南斗具法位姓某今據某郷貫同三師狀至同侯敕㫖頒行外尚慮所薦一切亡魂乆淪幽夜迷失本眞必假陽精陶形易質除巳建立水火華池依科鍊度欲得南昌上宫一行官將應期感挌輔助行持須至申聞者右某謹具狀申南斗六司星君南上朱陵火府君聖前恭望聖慈特降聖旨下三界十方一切去處照應依準黄籙靈仙科品元始符命開度事理赦拔亡魂開明罪爽仍乞頒下丹天世界朱陵火府南昌上宫水火二司差撥錬度一行官吏如期下降輔助宣撫鍊度在㑹亡魂無邊罪爽俱承拯濟永脫輪廽普及含靈均霑景福冒犯聖威同前日宫狀結至謹狀方函南斗六司眞君聖前具法位姓某謹重封北斗具法位姓某今據某郷貫同三司狀至伺候敕㫖頒行外所有神虎一行官吏欲冀下臨輔助追攝及有玄㝠隱書混元玉劄一宗符命未敢擅便告行須至申聞者右某謹具狀申大聖北斗九元星君北斗九皇夫人北斗玄㝠太一夫人聖前恭望聖慈特降聖旨下三界所屬眞司地水㝠曹一切去處照應俯賜九光神燭七炁靈暉照破重泉開明幽暗特與亡故某乙在㑹係薦等魂及十方九幽囚徒苦爽削除罪簿落㓕惡根頒行玄㝠隱書混元玉箚神虎符命差降提魂攝魄倒生玄司玉女雄左雌右玄伯主吏三部使者追魂一行神吏預赴齋壇遵領符命追攝在會係薦等魂普及六道四生孤魂滯魄俱承恩霈出離幽關覩見光明叅朝壇陛儀形昭顯報應分明受錬更生隨果超度更祈聖造恩佑邦家普及含靈均霑景福冒犯聖威同南斗狀結至謹狀方函北斗九元星寸聖前具法位姓某謹重封黃籙院具法位姓某今據某郷貫同三師狀至頒行外今將依按典儀崇修齋直頒行符命追攝煉度須至申聞者右某謹具狀申黃籙院知院眞君黃籙院眞宰聖前伏望聖慈特降聖㫖下三界十方合屬去處照應依準黄籙靈仙科品元始符命開度事理根刷亡故某乙在㑹係薦等魂十方九幽苦魂罪魄特與削除罪籍解釋𡨚愆俾赴齋壇獲霑開度更乞差撥合屬功曹將吏錬度官君翊衞齋壇祗迎寳馭宣行錬度開濟窮魂六道四生孤魂滯魄受度事畢管押到院之日與將三世罪籍速行考較普令次第隨品受生所覬齋事周圓存亡受度冒犯聖威同前北斗狀結至謹狀正一三師具法位姓某今據某郷貫同三師狀至伺候敕旨頒行外須至申聞者右某謹具狀申正一女師眞人正一玄師嗣師眞人正一眞師系師眞人聖前伏望聖慈允兹所懇敷誠上帝鑒察啓祈拯濟亡魂起昇滯爽俾章表之徑御冀恩霈之溥加庶線道力無邊齋功博洽存亡受福幽顯蒙休冒犯聖威同前黄籙院狀結至謹狀方函正一女師嗣師系師眞人聖前具法位姓某謹封四相具法位姓某今據某郷貫同三師狀工伺候敕旨頒外須至申聞者右某謹具狀申玉清上相泰玄上相天機上相天樞上相聖前伏望聖慈特降聖旨下三界十方地水㝠曹一切去處照應依準黃籙靈仙科品元始符命開度事理根刷亡故某乙在㑹係薦等魂及十方九幽苦魂罪魄不以罪業輕重拘留執對特與赦除𡨚業落滅惡根俾離重㝠普受開度更希恩造圓就齋功所請所祈悉蒙昭格所濟所度俱遂遷昇使幽顯蒙休存亡受福冒犯聖威同正一三師狀結至謹狀可漏玉清泰玄三省諸相眞君具法位姓某謹封方函玉清泰玄天機天樞上相眞君聖前具法位姓某謹重封四聖具法位姓某今據某郷貫同三師狀至伺候敕旨頒行外欲得諸府神兵下臨壇所周旋營衞輔助宣行須至申聞者右某謹具狀申天蓬都元帥眞君天猷副元帥眞君翊聖保德儲福眞君佑聖眞武靈應眞君聖前伏望聖慈特降聖㫖下所屬眞司差撥一行將吏預期下降以助宣行更冀恩光下臨壇席證明修奉濟度存亡殄滅妖氛驅除魔障所冀齋功圓就幽顯蒙恩冒犯聖威同四相狀結至謹狀監齋具法位姓某今據某郷貫同三師狀至頒行外欲得飛天翊衞直事功曹傳奏官君靈寳官屬上聞齋意降格飈轝三日正齋建散壇席恭願分光降鑒濟度存亡須至申聞者右某謹具狀申靈寳監齋大法師眞君聖前恭望師慈允令所懇俯降齋壇證明修奉特賜聖旨關告靈寳官屬黃籙院聖衆監臨翊衞導達齋誠俾詞悃之上通獲恩光之下逮圓成齋事證度亡魂六道含靈九幽罪爽咸希拯濟俱頼超昇澤被存亡恩霑家國冒犯聖威同四聖狀結至謹狀九天具法位姓某今據某郷貫岡三師狀至敕旨頒行外須至申聞者右某謹具狀申九天丈人儲福定命眞君九天髙明大使神功妙濟眞君九天司命眞君九天度世司馬大神九天好生韓君丈人九天諸位眞君聖前伏望聖慈特降聖旨下諸天曹府三界十方洞天幽治考校靈司一切去處照應依準黄籙靈仙科品元始符命開度事理赦拔亡魂開明罪爽仰頼分靈降世應化垂慈俾係薦等魂無邊滯爽均霑眞澤普被陽元受炁生身聚神返本更祈殊貺利佑邦家普及含生俱霑景福冒犯聖威同監齋狀結至謹狀方函九天儲福定命真君具法位姓某謹重封天曹具法位姓某今據某郷貫同三師狀至敕旨頒行外須至申聞者右某謹具狀申天曹太皇萬福眞君天曹諸位眞君聖前恭望聖慈特降聖旨下諸天曹府三界十方九地幽隂㝠曹去處照應依準黄籙靈仙科品元始符命開度事理根刷亡故某乙在㑹係薦等魂及十方九幽苦魂罪魄其或前生今世宿對深愆執繫拘留未該起度特與赦除罪對俾離㝠途親詣齋壇獲承開濟叅眞聽法受錬更生更冀障難消除休祥畢集齋功成就家國霑恩冒犯聖威同九天狀結至謹狀方函天曹太皇萬福眞君聖前具法位姓某謹封三洞經籙符命靈官將吏具法位姓某今據某郷貫同三師狀至伺候敕旨頒行外尚慮所薦一切亡魂元因三業積習衆非穢慢靈文破違經戒沉淪幽夜墮落惡源必假太上眞經靈符祕篆宣流委炁下濟沉魂須至申聞者右某謹具狀申三洞寳經九等法籙上聖髙眞侍衞羣仙元始符命靈篆天章一切眞仙靈官將吏聖前伏乞聖慈特降聖旨三清祕藏十方正法典守侍衞一切玄司啓藴開函分光降炁庶得誦詠合玄眞之奥書篆符按筆之䂓使係薦亡魂幽途苦爽乗兹慧力出離㝠途解䆁𡨚愆閉封業債了知宿命克證眞常俱承委炁之功永脫輪廽之苦恩霑見在福被邦家冒犯聖威同九天狀結至謹狀方函三洞四輔經籙符命上聖髙真仙將吏具法位姓某謹重封天眞皇人具法位姓某今據某郷貫同三師狀至伺候敕旨頒行外所有元始符命雲篆天章開度一宗眞符寳籙今將書篆依式宣行尚慮凢軀濁質體未洞眞不能合炁虚无有差按筆須至申聞者右某謹具狀申三清上境天眞皇人聖前伏乞聖慈特降慧源一炁灌注内腑丹元令某書篆天符克獲靈應脗合發揮之妙黙符按筆之規庶俾係薦亡魂等衆祗承符命受度更生全頼恩休圓成喜果冒犯聖威同經籙狀結至謹狀三元眞君具法位姓某今據某郷貫同三師狀至伺候敕旨頒行外所有章詞表奏陳請事件經