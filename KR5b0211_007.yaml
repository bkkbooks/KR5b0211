聖旨下本嶽合屬曹局及四嶽十宫九地幽隂㝠曹去處照應逓相關報依準黄籙靈仙科品元始符命開度事理赦拔幽扃開明滯爽根刷亡故某乙在會係薦等魂曁建齋弟子家億曽萬祖歷劫種親或有前生今世宿債深愆拘留執繫㝠司之者不以罪業輕重並體指揮放釋差委神將二員部領馬歩精兵各帯隨身器械同三界直符神虎追魂使者召靈官將管領預期前來崇建齋壇之所聽候召請沐浴朝眞懴悔愆尤乞賜超度其乆滯幽隂囚徒滯爽併祈𩔖聚原放前來俱承拯濟之功並脫輪廽之苦所差神將吏兵一就防衞靈壇鈴束孤魂無令妄起𡨚心謀害人命及隔截葷厭免致觸犯有玷齋功致妨上帝迂臨髙眞下鑒所有前件事理乞賜俞允早與施行冒犯聖威同地府狀結至謹狀四嶽具法位姓某今據某鄕貫同三師狀至同候敕旨頒行外今具細帳專委三界直符神虎追魂使者前去請領仍申東岱嶽府乞賜聖旨行下照應外須至申聞者右某謹具狀申南嶽司天昭聖帝聖前伏乞聖慈特降聖旨下本嶽曹局及十宫九地一切幽隂合屬𡨋曹去處照應逓相關報依準黄籙靈仙科品元始符命開度事理啓拔幽扃開明滯爽照應直符備去姓名根刷前項係薦亡魂等衆或有宿債深愆尚係㝠司之者不以罪業輕重伏乞指揮放釋預賜差委將吏管領前去東嶽泰山府𩔖聚發遣前來崇建齋壇之所祗承功德受度超生六道幽儀十方滯爽併祈原赦普受齋功伏乞俞允施行冒犯聖威同東嶽狀結至謹狀西嶽金天順聖帝北嶽安天元聖帝中嶽中天崇聖帝右三狀並與南嶽狀起結相同五嶽儲副具法位姓某今據某郷貫同三師狀至伺候敕旨頒行外仍申五嶽聖帝乞賜聖旨照應施行外須至申聞者右某謹具狀申東嶽上卿司命佐命儲副眞君南嶽上眞司命佐命儲副眞君西嶽上眞司命佐命儲副眞君北嶽上眞司命佐命儲副眞君中嶽上眞司命佐命儲副眞君聖前伏乞聖慈特降聖旨下五嶽十宫九地幽隂㝠曹去處照應依準黄籙靈仙科品元始符命開度事理赦拔幽扃開明罪爽照應直符備去姓名根刷前項亡魂及六道幽儀十方滯爽或有前生今世宿債深愆尚繫㝠司之者不以罪業輕重特與釋放預期𩔖聚東岱嶽府差委將吏管領發遣前來崇建齋壇之所祗領功德受度超生望賜俞允施行冒犯聖威同前狀結至謹狀可漏五嶽上眞司命佐命儲副眞君聖前具位姓某謹封洞天具法位姓某今據某郷貫同三師狀至頒行外尚慮洞天幽治考校靈司末知今來修奉事理拘繫亡魂及諸滯爽不與放釋普受齋功須至申聞者右某謹具狀申王屋山小有清虚洞天仙官聖前伏乞聖慈特賜聖旨下九大洞天三十六小洞天七十二福地三百六十名山靖廬福地去處照應或有主持香火居處飬生未離五行積成三業葷辛厭穢觸犯眞靈盜竊資財焚修有怠皆爲罪業淪没拘囚並請上體黄籙靈仙科品元始符命開度事理放釋前來聽法聞經開明本性還形返質度品南宫庶得滯爽昇遷福庭清淨冒犯聖威同五嶽儲副狀結至謹狀九壘具法位姓某今據某郷貫同三師狀至頒行外須至申聞者右某謹具狀申地府九壘土皇君聖前伏望聖慈特降聖旨下風梵剛維之所朔單鬱絶之郷厚地重隂㝠曹幽獄欲得咸遵敕命開道𡨋關濟拔亡魂昇遷滯爽全依聖造成就齋功冒犯聖威同洞天狀結至謹狀龍虎君具法位姓某今據某郷貫同三師狀至頒行外某月某日爲如開建靈壇崇修齋直乞恩懴罪露簡宣詞欲仗接侍香烟通傳誠欵須至申聞者右某謹具狀申左右龍虎君三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官聖前恭望聖慈鑒兹情悃應凡關告立降靈壇使香信潜通齋誠達御衆眞交㑹萬聖遐臨自生丹碧之英大闡慈悲之化功加一切澤灑重泉普及邦家均霑景福冒犯聖威同九壘狀結至謹狀可漏左右龍虎君功曹使者金童玉女直符香官具位某封太歳尊神具法位姓某令據某郷貫同三師狀至敕眞頒行外所有拜上章表關𤼵奏申事係六十甲子官君捧持扶衞方得上達須至申聞者右某謹具狀申某甲子年太歳官君神前伏乞聖慈特爲關吿一周太歳五十九位官君聖衆照應今來修奉事理如係黃籙齋壇發遣應干章奏公文當承受官君依時上御無使稽延庶得齋事圓成存亡開泰冒犯神威同龍虎君狀結至謹狀以上歳年月日具位姓名狀式見預告門无上黃籙大齋立成儀卷之七
