front:
  text: 無上黃籙大齋立成儀卷之五鳯五
  hash: sha256:14518828620aaf86326f564b08b70f242fa6117eac855eb7adafa39746ca237e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_005-001a, image: hfl/0278/0278-128.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔興編次正奏門奏三清具位臣姓某先據某鄉貫入齋意至福佑見存臣據詞難抑巳於某月某日預告先揚寶旙上聞齋意今按下元黃籙簡文靈仙品格建立靈壇崇修齋法恭依次第宣演真科進拜天官濟度諸章頒行元始符命金籙白簡救苦真符太上敕赦生天寶籙玉清拔幽魂破地獄真符青宫九龍符命神虎玉劄赦拔亡故某乙在會係薦等魂及十方九幽囚徒苦爽出離長夜祇受齋功謹取某月某日開啓齋壇乃攝亡魂赴壇受度某日清旦為始正齋行道三日九朝某日夜普設清淨無礙斛食夜齋鍊度六道四生孤魂滯魄某日夜水火變鍊係薦亡魂傳授九真妙戒告行元始符命金籙白簡長生靈符給籙破劵保舉超升事畢拜表言功解壇滿散某日夜祗設三界髙真清醮三百六十分位仰答洪恩投龍進簡除具事由備奏諸天帝尊請降睿旨申三界真司牒合屬去處將所薦亡魂姓名生死年月别具帳狀申三天門下上清天樞院伺候敕旨乞與頒行外臣尚慮所薦一切亡魂宿纒業垢永閉幽途非假天恩無由濟拔及有元始符命寶籙真符開度一宗靈文袐篆并監衛齋壇靈寶官屬宣通召命諸司將吏所合請降依式宣行須至奏聞者右臣謹録狀上奏玉清上帝元始天尊降下恭望道慈允臣所奏頒降符命付臣奉行特賜敕旨普告諸天日月星宫璇璣玉衡四司五帝司命司録韓君主録南昌上宮諸地諸水五嶽靈山三官九署十二河源長夜之府九幽之中無極世界一切神靈各令照應赦拔亡故某乙在會係薦等魂暨修齋弟孑家億曽萬祖歷劫種親十方九幽苦魂罪魄深愆重過宿對惡根咸與惟新悉從開宥得出幽夜來詣齋壇沐浴形神參真聽法懴除罪業受鍊更生更乞頒下南北兩宫陽精隂魄主者十方神王典者靈官玉女上章曹治玄都蛟龍驛吏察命童子護法威神龍虎騎吏三元將軍監衛齋壇靈寶官屬南昌鍊度官君神虎追攝將吏各令知委應臣請召分形降氣顯助宣行俾魔障不生齋功成就先亡超化見在利安家國霑恩幽明蒙福建齋之日伏願三光朗耀四氣和平俯賜恩光證明修奉冒犯天威臣誠惶誠恐稽首頓首死罪謹具狀上奏以聞謹狀歲次某甲子某年月曰具法位臣姓某狀貼黃奏為某人乞崇違無上黃籙大齋正薦亡親若乙普薦在會衆魂及十方九幽苦魂罪魄今欲頌行符命謮降宮將追攝赴壇依科開度乞降教命頒下三界十方施行事伏候敕旨倚黃乞降付三界真司施行可漏方函益同預告門上清上清大帝靈寶天尊太清太清大帝道德天尊此二但各一奏狀並與玉清狀起結相同昊天具法位臣姓某先據某鄉貫同三瀆狀至投龍進簡除具事由備奏上帝乞降敕命及奏諸天帝尊請降睿旨申三界真司牒合屬去處後同三濤狀至奏聞者右臣謹録狀上奏太上開天執符御曆含真體道昊天玉皇上帝陛下恭望道慈同三清狀至幽蒙冒犯天威臣誠惶誠恐稽首頓首死罪謹具狀上奏以聞謹狀年月貼黃倚黃並與三清狀同天皇具法位臣姓某先據某鄉貫同三清狀至投龍進簡除具事由備奏上帝乞降敕命及奏諸天帝尊請降睿旨申三界真司牒合屬去處將所薦亡魂生死年月别具帳狀申三天門下上清天樞院伺候敕旨頒行外臣尚慮所薦亡魂及十方九幽囚徒罪爽宿纒業垢永閉幽途非假恩光無由濟拔及有開度一宗符命并南北兩宫合屬官吏欲得頒降依式宣行須至奏聞者右臣謹録狀上奏勾陳星宫天皇大帝陛下恭望天慈允臣所奏特降睿旨下三界十方九幽一隂冥曹幽獄一切去處各令照應赦拔亡故某乙在會係薦等魂暨廷齋弟子家億曾萬祖歷劫種親十方九幽苦魂罪魄特與消除罪録落滅惡根令詣齋壇普受開度參真聽法受錬更生仍乞頒下南北兩宮陽精隂魄水火二司主者監衛齋壇靈寶官屬南昌錬度官君神虎追攝將吏咸令知委應臣請召分形降氣顯助宣行俾魔障不生齋功圓就先亡超化見在利安家國霑恩幽顯蒙福冒犯天威臣誠惶誠恐同三清狀式結至謹狀貼黃同三清至依科開度乞降睿旨頒下三界十方施行倚黃同三清狀后土至三十二天木公金母諸狀貼黃倚黃並相同北極此一狀起結與天皇狀並相同紫微中天北極大帝后土具法位臣姓某今據某鄉貫同天車狀至伺候敕旨頒行外須至奏聞者右臣謹録狀上奏承天效法厚德光大后土皇地祇殿下恭望宸慈允臣所奏特降睿旨下三界十方九幽重隂冥曹幽獄合屬去處各令照應特與係薦亡魂幽途滯爽解除罪對赦拔𡨚愆得覩光明普承開濟參真聽法受化更生上願國祚綿長寰區靜謐雨暘時若災沴潛消普及舍生同臻道果冒犯宸威臣誠惶誠恐同天皇狀結至謹狀貼黃奏為某人乞崇建無上黃籙大齋正薦亡魂某乙普薦在會衆魂及十方九幽苦魂罪魄今欲開壇依科修奉乞降睿旨頒下三界十方施行事太乙具法位臣姓某先據某鄉貫同昊天狀至伺侯敕旨頒行外臣尚慮羅鄷幽逺泉曲重深不假慧光無由通濟所薦亡魂無邊罪爽業緣報對神識沉淪欲得救拔𡨚愆返生魂魄及有開度生化一宗符命未敢擅便告行須至奏聞者右臣謹録狀上奏東極宫中大慈仁者尋聲赴感太乙救苦天尊御前恭望道慈允臣所奏特降睿旨宣告救苦真人九光童子奉青宫符命秉威神慧光照燭三途開明五道北都泉府出受苦之衆生南極朱宫下鍊魂之仙衆特與亡故某乙在會係薦等魂及十方九幽苦魂罪魄除愆宥過解結滌瑕水注隂符火飛陽候起朽骸而復秀使枯骨以成人昭顯形儀庶彰道法參朝太上度品南宫永處福齡閉封債業九朝啓奏五日告盟恭乞證明濟蘇亡殁庶使沈沈五道普霑生育之私寂寂九幽咸沐慈悲之化全依洪造成就齋功冒犯天威同昊天狀結至謹狀貼黃奏為某人乞崇建無上黃籙大齋正薦亡親某乙等甘在會衆魂及十方九幽苦魂罪魄今欲頒行符命追攝﨣壇依科關乞降睿旨頒下三界十方施行事九幽具法位臣姓某今據某鄉貫同昊天狀至伺臣候敕旨施行外尚慮朔獄幽途泉酆土壘拘繫罪魂去處未即放釋前來有妨開度須至奏聞者右臣謹録狀上奏九幽拔罪天尊御前恭望天慈特降恩命下三官九署五嶽九州北隂酆都內外宫洞冥關幽治長夜泉扃十方九幽一切諸獄效職主司考官掾吏各令照應特與亡故某乙在會係薦等魂及九幽一切苦魂罪魄勾消生前歷劫罪考之名削除殁後無窮𡨚報之目焚燒業簿落滅惡根俾離幽間獲霑齋法更乞慈光下燭照破重泉使受苦衆生永離惡趣無邊滯爽咸沐善緑幽夜開光羅酆罷對冒犯天威臣誠惶誠恐稽首頓首同昊天狀結至以聞謹狀貼黃同太乙南極具法位臣姓某今據某鄉貫同昊天狀至伺臣候敕旨頒行外尚慮所薦亡魂久淪幽夜迷失本真必假陽精陶形易質除巳建立水火華池依科鍊度欲得南昌一行官吏如期下臨及有錬度生化一宗符命未敢擅便告行須至奏聞者右臣謹録狀上奏南極長生大帝御前恭望天慈特降睿旨下三界十方合屬去處照應赦拔亡魂開明罪爽仍乞頒下丹天世界南宮水火二司朱陵火府南昌上宫洞陽之館流火之庭一切真司錬度官將至期下降顯助行持俾在會係薦等魂受化更生隨果超度四生六道滯爽窮魂俱承變鍊之功永離沉淪之苦齋功成就幽顯蒙恩冒犯天威同昊天狀結至謹狀朱陵此一狀起結並與南極狀相同朱陵度命天尊貼黃二狀並與天皇狀同十方天尊具法位臣姓某今據某鄉貫同天皇狀至伺臣候敕旨頒行外尚慮所薦亡魂無邊罪爽有多生之業障及積世之愆尤萬劫沉淪終天無解恭依上聖垂科九朝懴謝求哀悔首釋負除𡨚欲得諸天神仙靈官聖衆隨詞謄奏恩許原除須至奏聞者右臣謹録狀上奏東方無極太上靈寶天尊御前恭望天慈允臣所奏特降睿旨下十方無極世界地水冥司一切去處照應赦宥亡魂開明罪爽更乞威神慧力散影分形遍十極之中徹九幽之內無邊地獄悉覩天容拔度亡故某乙在會係薦等魂暨修齋弟子家億曽萬祖歷劫種親十方九幽苦魂罪魄出離幽夜落滅惡根獲詣齋壇普受開度建齋之日仍乞敕勒十方神仙靈官聖衆下臨壇席上奏齋誠俯賜恩光證盟修奉俾建齋弟子永處福齡各安正命陽間有識隂界無依俱承懴悔之功並脫輪廽之苦恩覃家國滭及存亡冒犯天威臣誠惶誠恐稽首頓首死罪謹具狀上奏以聞謹狀太歲某年月日具法位臣姓某狀貼黃奏為某乙乞崇建無上黃籙大齋正薦亡故某乙普薦在會衆魂今欲開壇依科修奉九朝懴謝首露愆欲仗靈官奏齋誠原赦超度乞降睿旨頒下三界十方施行事南方無極太上靈寶天尊西方無極太上靈寶天尊北方無極太上靈寶天尊東北方無極太上靈寶天尊東南方無極太上靈寶天尊西南方無極太上靈寶天尊西北方無極太上靈寶天尊上方無極太上靈寶天尊下方無極太上靈寶天尊右九位天尊各一奏狀起結並與東方天尊相同五老東方青靈始老青帝九氣天君南方丹靈真老赤帝三氣天君西方皓靈皇老白帝七氣天君北方五靈玄老黑帝五氣天君中央元靈元老黃帝一氣天君右五位帝君各一奏狀起結並與十方天尊相同無上黃籙大齋立成儀卷之五
