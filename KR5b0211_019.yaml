front:
  text: 無上黃籙大齋立成儀卷之十九在九
  hash: sha256:23b61ad90293903d9bff0f53022d4421d0e2ed4fbc4a016815ab576bd0df94b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_019-001a, image: hfl/0282/0282-106.png}
body:
  text: 廣成先生杜光庭集科儀門禁壇儀諸師下降單華夏讃引一周至地户法師正立存如本儀别選正一法師一人玄冠絳褐行禁壇法事如高功自行亦可泰玄都正一平氣係天師某治祭酒赤天三五步罡元命真人臣某上言臣聞運隂陽者莫過乎百靈濟存亡家國者豈逾於大道故碧落有災祥之變令人測之黃籙有拯拔之科令人修之臣雖至愚切慕玄化濫佩大法叨稱治官所歷壇場敢忘報效以今某年太歲某甲某月某日奉為某官某處宫觀為某事崇修無上黃籙大齋若干日夜行道轉經依科關奏臣等澡形鍊氣捿心靜神剋期奉行敢不上啓伏惟太上布惟新之令開覆育之恩敕下真官分司降監使煙雲暫息於三界風雨無施於四溟懴謝必聞啓傳無間臣不勝仰望之至精思念真伏待報應畢暝目思青龍朱雀白虎玄武次頭戴斗五星日月煥然四方垂手握固呪曰東方青龍角亢之精吐雲鬱氣喊雷發聲飛翔八極周遊四溟來侍吾左西方白虎上應觜參英英素質肅肅清音威攝衆獸嘯動山林來立吾右南方朱雀衆禽之長丹穴化生碧霄流響竒綵五色神儀六像來導吾前北方玄武太隂化生虛危表質龜蛇合形盤遊九地統攝萬靈來從吾後吾召四靈四靈既集即當遊帶日挾月巡行九州十六神將為吾使天官地官水官同其休次丁罡三步進前右手取劒執而呪之曰五行所運火木水土金我佩剛劒禁敕鬼神二十八宿隨吾指陳北斗七星挾輔靈真周遊萬方百福同臻次取水碗左手執之呪曰江河淮海非常水五龍吐出清天地大帝服之三萬年今日吾將淨妖氣次劒水相向呪曰東方青龍㗸符降真氣入吾水中南方赤龍㗸符降真氣入吾水中西方白龍㗸符降真氣入吾水中北方黑龍銜㗸降真氣入吾水中中央黃龍㗸符降真氣入吾水中吾水非常之水五龍五星真氣之水吾劒非常之劒九錬堅剛七星挾旁踏躡北斗跨踞魁罡太一生水周流萬方清無過水濁無過穢以清蕩濁以水治穢急急如律令重救東方青帝木官解穢君吏九人南方赤帝火官解穢君吏三人西方白帝金官解穢君吏七人北方黑帝水官解穢君吏五人中央黃帝土官解穢君吏一十二人上請天上解穢吏地下解穢吏今歲直符解穢吏今月直符解穢吏今日直待解穢吏今時直符解穢吏解穢將軍吏兵真人童子一合真官降下屇此齋壇之所解除天穢地穢人穢鬼穢牛馬六畜禽蟲之穢破穢鳳凰從前至後自東及西以次解穢立遣清淨即使天穢還天地穢還地人穢還人鬼穢還鬼一切邪穢速去萬里不得留止急急如律令次西行至乾上呪曰此名步呪乾尊耀靈坤順內榮二儀交泰六合利貞配哭享地永寧肅清應感玄黃上衣下裳震離坎兊翼贊扶將乾坤艮巽虎步龍驤天門地戶人鬼璣衡衛我者誰旻天旻蒼今日禹步上應天罡鬼神賔伏下辟不祥所啓所陳應時靈光次禹步三步九迹自西北至東北面南呪曰上請東方青帝青童君從官兵士九千萬人乘歲星真氣浮空而來降臨壇所臣從東北角結界至東南角行神布氣搜索邪精祛除鬼賊有罪無赦次三步九迹自東北至東南面西呪曰上請南方赤帝赤童君從官兵士三千萬人乘熒惑星真氣浮空而來降臨壇所臣從東南角結界至西南角行神布氣搜索邪精焚燒鬼賊有罪無赦次三步九迹自東南至西南面北呪曰上請西方白帝白童君從官兵士七千萬人乘太白星真氣浮空而來降臨壇所臣從西南角結界至西北角行神布氣搜索邪精誅斬鬼賊有罪無赦次三步九迹自西南至西北面東呪曰上請北方黑帝黑童君從官兵士五千萬人乘辰星真氣浮空而來降臨壇所臣從西北角結界至于中央行神布氣搜索邪精漂蕩鬼賊有罪無赦次三步九迹從東南面壇心呪曰上請中央黃帝黃童君領黃衣兵士十二萬人乘鎮星真氣浮空而來降臨壇所臣從上方結界至于壇中行神布氣搜索邪精埋藏鬼賊有罪不赦次順行至東北面北呪曰臣今奉為某官某乙修建黃籙大齋依科行道上請天仙兵馬九憶萬騎地仙兵馬九億萬騎飛仙兵馬九億萬騎真人兵馬九憶萬騎神人兵馬九億萬騎日月星宿兵馬各九億萬騎九宫五帝兵馬各九億萬騎三河四海兵馬各九憶萬騎五嶽四瀆兵馬各九憶萬騎並各嚴裝絡繹風震雷舉雨沸雲騰一合來下降臨壇所繞壇三匝蓋壇三重上張天羅下布地網九土齊功兵馬列陳於壇場內外四面八方所有土木精邪伏尸故氣一切凶穢於道不順者收付魁罡之下入地萬丈無動無作急急如太上老君律令畢於地戶上書鬼字卓劒於鬼心中噀水垂手握固向鬼門呪曰九天有命普告萬靈促召天真俱會帝庭太一下降雙星翊精監察禦邪理氣攝生若有不祥干試神明請帝之道敕整神兵七神秉鉞天鋒右征揮劒前驅煥擲火鈴檄命甲騶虎卒天丁風火齊戰伐邪狡精上威六天下攝魔靈既威既攝萬凶滅形神戈雷掃姦妖無生仙皇達節有命敢停拒節違命是誅汝形各警各慎保兹黃寧九天告命萬神敬聽次華夏贊引法師自地户旋行升壇禮燈儀先學仙頌贊引法師出堂吹吟明燈頌引法師旋繞明燈一於地户上立班禮祝太極太虛真人曰隂陽立象天地分形晝夜既殊晦明有異所以清浮表質諸天為仙聖之都濁厚流形諸地為鬼神之府九天之上隂氣俱消九地之下陽光永隔是則幽𡨋之界無復光明當晝景之時猶如重霧及昏暝之後更甚隂霾長夜罪魂無由開朗衆生或無善業夙有罪根殁世以來沉淪地嶽受諸惡報幽閉酆都不覩三光動經憶劫我天尊大慈悲愍弘濟多門垂然燈之文以續明照夜靈光所及罪惱皆除更乘懴拔之緣便遂往生之願若有善男子善女人發無上道心依按科格來詣齋所齋備香油為國主帝王君臣父子三塗九夜若幽若明依法然燈照燭內外上映諸天之上福堂之中下照九地之下地獄之內使苦魂超度幽爽開光九祖生天三塗罷暗福霑一切功德無窮當知此人積劫善緣必得成道今有某乙修建黃籙大齋依按簡文然燈供養當願帝王享福二景著明七祖生天三塗朗晏見世神明敬祐真聖護持福祚巍巍永登仙界弟子再拜上元金籙簡文真仙品曰然燈威儀於道户上然二燈以照齋主住宅為弟子消災度厄安鎮宅神弟子於燈下禮三禮法師呪曰正一陽光炎上朱煙開光童子一十二人洞照一宅及得我身百邪摧落却鬼萬千光明朗徹通真逺靈升入無形與道自然上元金籙簡丈其仙品曰然燈威儀於本命上然三燈以照三魂為弟子制邪度厄拘守三魂弟子於燈下三禮呪曰陽光洞明三魂自生總録萬神長附我形日月齊景永保無傾上元金籙簡文真仙品曰然燈威儀於行年上然七燈以照七魄為弟子安神却禍制魄除邪弟子於燈下三禮呪曰明燈攝光逰精不飛七魄安守萬神歸日中齊景長處光輝上元金籙簡文真仙品曰然燈威儀於太歲上然一燈以照太歲之神為弟子除一年災害福慶來殝弟子於燈下三禮呪曰太陽流暉光焰四方洞照我身七緯九重內朗外明洞達太空上元金籙簡文真仙品曰然燈威儀於大墓上然三燈以照齋主代世塜墓為弟子拔度先世亡魂託生淨域斷絶注訟解復連之災弟子於燈下向大墓三禮宫羽辰商丑角未戌呪曰太陽𡨋𡨋萬劫無期陽光洞煥下照朽骸魂受光明景更反胎得生王門歡樂怡怡上元金籙簡文真仙品曰然燈威儀於小墓上然五燈以照齋主近代塜墓拔度神爽得生天堂利祐見在福祚興昌弟子於燈下向小墓三禮宫戍商未角丑微辰呪曰長夜幽𡨋萬劫無開景潛太隂七魄蕩飛朱靈童子太陽洞輝照明魄戶神爽同歸上元金籙簡文真仙品曰然燈威儀於中庭然七燈以照七祖父母幽魂苦爽得生天堂弟子於燈下向地户三禮呪曰天地回轉代謝相推九幽無光七祖不開太陽開度死魂應歸明燈續夜朽骸生輝上元金籙簡文真仙品曰然燈威儀於中庭然九幽之燈以照九幽長夜之府拔度九幽之中弟子先亡魂爽覩見光明弟子於燈下向戍巳西南方三禮呪曰九幽𡨋𡨋萬劫無光長夜閉魂元始未通華燈續明下照土皇開度七玄上升南宮洞照一宅世為仙王上元金籙簡文真仙品曰然燈威儀於夾門然二燈以照宫宅為弟子祛邪捕惡保護闔門弟子於燈下向南三禮呪曰陽光開朗朱煙爛輝太炎童子備守玄屝洞照宫宅四窗八開驅鬼捕邪萬精斬摧三界敬護世世不衰衆真交會日月齊輝上元金籙簡文真仙品曰然燈威儀於地户上然二十四燈以照二十四生氣為弟子延生益氣增福安神注上生名削除死籍弟子於燈下向地户三禮呪曰三部八景合成我身二十四氣以成我神明燈自然上開泰玄身度水火與氣自然八景齊光願得神仙上元金籙簡文真仙品曰然燈威儀於八方然八燈以照八卦為弟子照耀八達開聰九宫八神密衛八方開通弟子於燈下向王三禮呪曰三景煥明八卦聞窗天氣靜閉太隂隱光華燈照𡨋萬願開通身入光華永享無窮上元金籙簡文真仙品曰然燈威儀於四面中央然九燈以照九官為弟子度九宫災厄上九宫仙名弟子於燈下向正三禮呪曰九五分位天地開張玄光潛伏太隂太陽明我華燈上照九宫玄夜開明我願吉昌上元金籙簡文真仙品曰然燈威儀於十方然十燈以照十方為弟子照明十極招真降靈解釋災厄名書十天弟子於燈下向天門三禮呪曰天開地閉玄隂不明爓土朱煙為我通𡨋十方尊神玄鑒我形魂魄同輝自然光精上元金籙簡文真仙品曰然燈威儀於四面然二十八燈以照二十八宿為弟子削除死録益上生名北斗落死南斗延生弟子於燈下向東南三禮呪曰明星大煥光流十門玄精下映九幽不宣我然華燈乘光上聞願得清蓋照我形魂上元金籙簡文真仙品曰然燈威儀於天門上然三十六燈以照三十六天為弟子開度上祖父母升入天堂弟子於燈下向天門三禮呪曰龍漢蕩蕩三氣乘玄梵行渺渺彌羅大千悠悠長魂仰望綿綿今日明燈我願我仙與我七祖同升諸天上元金籙簡文真仙品曰然燈威儀於五方然五燈以照五方為弟子上名仙籙保鎮身形弟子於燈下向五方三禮呪曰五嶽靈山安鎮五方五帝尊神神仙之宗今日然燈上照天王記我命籍度入仙宫七祖解脫同升太空上元金籙簡文真仙品曰然燈威儀功德至重上照諸天下明諸地八方九夜並見光明見此燈者皆得罪滅福生然燈之主其福甚深九祖父母上生天堂去離憂苦永出九幽逍遙上元仙宫之中見在安泰子孫興昌門户清肅萬災不干存亡開度生死荷恩功德無量所向從心於家於國咸獲利貞九夜三塗並登真道右然燈呪法出上元金籙簡文經杜廣成儀落景行道畢導引衆官弟子等旋繞燈下依位呪之每呪畢衆官弟子皆禮留沖靖祝燈在宿啓前似不如宿啓後合宜也每夜一禮祝為佳法師心力不逮遣侍經侍燈禮祝之亦可弟子止於都門外拜禮也次念善次以學仙讃引歸元師前散如常儀上元金籙簡文真仙品曰然燈威儀侍燈之官勤為用意每令燈光明徹竟外不得中滅半暗半明令人絶世常宜謹之上元金籙簡文真仙品曰然燈威儀明旦滅燈法師呪曰玄隂開光長燈續明太陽巳朗八幽開清燈還太隂光附景生日月二真與我合并呪畢便滅燈無上黃籙大齋立成儀卷之十九
