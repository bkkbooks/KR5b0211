front:
  text: 无上黄籙大齋立成儀卷之三十九白九
  hash: sha256:18556592080543d7dab82f2450ebc747edd840582fddd299b7dc595735e8dba0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_039-001a, image: hfl/0286/0286-084.png}
body:
  text: 三洞法師沖靖先生留用光傳授太上執法仙士蔣叔輿重修圖式門告盟寳旙以黄大絹造旙一首長四十九尺旙頂墨書臣謹謹上奏五字旙身書太上无極大道至眞无上三十六部尊經眞文寳符太上三尊十方衆聖玄中大法師三界官屬一切威靈伏望恩光鑒臨齋事四十九字旙手足分書上清三洞弟子某位臣姓某今據郷貫入齋意至福祐見存臣據詞難抑謹集法籙道士一壇依下元黄籙簡文靈仙品格建立靈壇擇日崇修无上黄籙大齋三白三夜九時行道預依次第宣演眞科拜奏章書頒行符命遷㧞罪爽開赦幽況然燈續明請光破獄普施無碍斛食攝召預薦亡魂沐浴更衣朝眞聽法傳符授戒錬度超生滿散拜表言功投龍進簡祇設清醮三伯六十分位上謝洪恩所集善功總資升濟仰祈恩霈普濟存亡謹露齋誠遍伸奏吿旙式如左遷神寳旙以大黄繒造旙一首長四十九尺旙項墨書遷神寳旙四字旙身書東極宫中大慈仁者發弘誓願普救衆生尋聲赴感應念垂慈太一救苦天尊空數字上帝垂文寳旛遷神亡靈受度仙化成人雨手足分書東方玉寳皇上天尊南方玄眞萬福天尊西方太妙至極天尊北方玄上玉晨天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虚皇天尊西北方無量太華天尊上方玉虛明皇天尊下方眞皇洞神天尊大慈大悲救苦眞人大慈大悲㧞罪眞人大慈大悲㧞度眞人左足書破酆都呪右足書甘露神呪太乙寳旛以黄絹造長旛四丈九尺旙身書九龍符兩手足分書太乙寳誥符見符命門不能書大九龍符止書小九龍符亦可命靈旛以黄絹造旛長一文二尺或二文四尺正身墨書朱陵度命天尊空三字太微廻黄旗無英命靈旛攝召長夜府開度受生魂兩脚分書超度亡過某乙神識徃生天界超度寳旛以黄絹造旛長一丈二尺或二丈四尺身書超度化升天尊空三字太上垂慈样光下覆九幽停刑衆魂俱度兩脚分書追薦亡過某乙神識徃生天界回耀靈旛以絳絹造旛長九尺旛首揉金泥書中斗之形旛身用墨大篆回耀靈旛四字空三字書轉輪聖王天尊左手彩畫日形書太陽鬱儀帝君六字右手彩畫月形書太隂結璘皇君六字兩足分書回耀頌回耀紫微宫曲映九幽戸峩峩丘寒池回照廓氷浦炎炎烈火獄霈然洒法兩㧞度長夜魂上登朱陸府如單栖寒士則以紙造九獄燈旛用青紙造旛九首各長九尺九寸頂書破獄救苦眞符見符命門旛身書本方救苦天尊號兩手分書符呪誥文兩足分書上清寳籙眞符告下某方某獄每獄用黄泥墩子一箇以青竹植旛一首復用黄紙造旛九首篆九天生神符見符命門破獄時焚青旛訖却換黄旛標之東方風雷地獄旛身書玉寳皇上天尊告文九炁青華光耀風雷玉寳慈尊推毀戈㦸扶晨通照魂升太微神識受錬享福無期一如告命風火驛傳南方火翳地獄旛身書玄眞萬福天尊告文三炁丹華光徹火翳萬福慈尊蠲消火池化成青團甘涼瑩肌苦魂承恩逍遥無爲一如告命風火驊傳西方金剛地獄旛身書太妙至極天尊告文七炁素華照徹金剛太妙慈尊推鋒㓕亡刀化騫林劒變栢桑魂魄受度與日同光一如告命風火驛傳北方溟泠地獄旛身書玄上玉晨天尊告文五炁蒼華光徹溟泠玉晨慈尊氷消雪城温生寒廓毒汗澄清魂獲妙果飛升香林一如告命風火驛傳東北方鑊湯地獄旛身書度仙上聖天尊告文梵炁晨華徹照鑊湯度仙上聖威感無方沸湧澄息化甘泉漿亡爽生神遥升天堂一如告命風火驛傳東南方銅柱地獄旛身書好生度命天尊告文生炁之華下照東南銅柱推落炎熖息閑好生度命普濟無間苦魂解脫升度玉壇一如告命風火驛傳西南方屠割地獄旛身書太靈虚皇天尊告文黄華月輝透降坤維鐡城推毀屠割停威虛皇慈尊保度浮黎罪魂登甦劫刃携持一如告命風火驛傳西北方火車地獄旛身書無量太華天尊告文天光景色祥華敷光無量慈尊除釋鋒鋩火車摧毀塗炭消亡焦骨爛皮再生清凉一如告命風火驛傳中央普掠地獄旛身書眞皇洞神天尊告文三晨玄景洞照普掠眞皇慈尊除落考掠金鎚鐵杖應時消變百苦停酸魂獲快樂一如告命風火驛傳召攝旛白姢七尺二寸中分爲二作夾旛二首各長三尺六寸以新竹爲竿長五尺五寸繫旛於竿稍面朱書太乙返眞攝魂符兩足分書攝召亡故某乙在㑹係薦一切亡魂三魂俱赴七魄俱來急速奉行背書大魁緫監召靈符下兩足分書台光延生爽靈益禄幽精絶死尸狗伏矢雀隂吞賊非毒除穢臭肺左手書碓左大力追鬼統制百節三魂符吏衆機玉曹玄伯何魈右手書雌右武鸞提魂攝魄倒生玄司飛符五札主吏喬如是普召旛下書云攝召六道四生孤魂滯魄十方九幽一切罪魂正面背面召幽魂旛正面背面五方旛各以本方繒爲之長五尺旛正面書五方衞靈符背面書五帝鎮壇符三十二天旛東青旛八南絳旛八西白旛八北皂旛八各長三尺二寸或二尺四寸或依度人經法以黄緑青赤蒼累碧紫白九色相間爲之亦可太黄皇曽天用黄太明玉完天用緑以次相間終於賈奕天用蒼面書天名背書三十二天符符出靈寳大劫經諸靈寳齋壇席能以此拘定四方依儀行事即是壇場不可闕也三十二天符又見洞眞上宫太眞科元洞九天生神寳命齋儀各不同九獄燈圖玄師曰法天象地方圓爲式九幽隂曹主罪憲職羅酆東南是其所也按太一聖真科以土石作壇九所方面二尺九壇自方六尺以法地之隂極二六之象毎壇作四圍三曲如獄之形一壇明燈三炬九壇共然二十七燈又於九壇之中心立牌並面書玉清破地獄眞符背書獄名傍立青竹九竿各長九尺各掛小旛一首書十方靈寳天尊聖號於旛首書酆都符俟破獄之時侍燈法師宣破獄儀逐方用度法師執靈寳䇿杖詠破獄呪衆和十方救苦天尊即就燈化符於獄上法帥以䇿杖破獄燒却青旛了復掛黄旛如此則地獄開光亡爽登眞九幽燈圖洞玄靈寳元始天尊說三塗五苦㧞度妙經曰濟度㧞亡然燈爲上五方八極地獄幽牢在極隂之郷長夜之境死魂囚閉不見三光㝠闇之間經諸考掠冝造一燈樹然九巵燈自初終亡至于七七燈光相續下照九幽覩此光明即當解脫今可中樹一竿然九燈次第相續爲九九八十一燈以普照重昏開度苦爽回耀輪燈圖玄師曰盟真之科有回耀降光之格懴除五累苦門開生死之業道破黒暗之罪庭法用梓木作輪如車軸之象上一層燈一十二埦中一層燈一十六埦下一層燈二十一埦共四十九埦中央五累苦門友立牌書寫諸獄名自依回耀燈儀仍造四十九首小旛黄白之色相間上書諸天尊琅函睿號於旛首朱書破酆都符侍燈法師宣懴燈儀大法師持䇿杖隨懴儀至毎獄立卓杖念太梵隱語以柳枝淨水洒之就燈焚化小繒旛如此諸獄罪魂乗陽光應時解脫諸苦斷除五累煩惱逕離塵勞之業根右按本科如此今世久廢不用冝倣蔡致虚路時中儀以沙爲之外方内圓徑九尺凡三重如車輪様第一外圍二十四輻苐二中圍十五輻第三内圍九輻當中立回耀靈旛一首然燈一盞内圍九輻安燈九盞於燈後立三惡門三尸道三徒界標榜中圍十五輻然燈十五盞於燈後立五累五道五苦門標榜外圍二十四輻然燈二十四盞於燈後立二十四獄標榜又以黄白相間造小旛四十九首隨燈布之懴燈畢悉於燈上焚化旛榜内圍旛榜九色欲門元靈隱耀天尊上尸道威德寳際天尊天徒界普照幽明天尊愛欲門隨機赴感天尊中尸道虚皇普濟天尊人徒界大慈救苦天尊貪欲門慈悲救度天尊下尸道無邊普度天尊人道元洞玉晨天尊色累苦心門普光弘濟天尊太山地獄苦道弘慈廣濟天尊神道通光普照天尊愛累苦神門法輪開化天尊風刀地獄苦道靈源普潤天尊鬼道慈悲惠愛天尊貪累苦形門神光廣被天尊摙山負石苦道玄上玉華天尊地獄道寳光通照天尊華競苦精門玉清玄上天尊作江河苦道慈恩萬善天尊傍生門金華慈慧天尊身累苦魂門玄明梵行天尊吞火食炭苦道玉眞隱韻天尊地徒界法力超升天尊外圍旛榜二十四監天地獄廣常慈愛天尊玄沙地獄普垂妙澤天尊無上地獄開度無量天尊太眞地獄光明寳華天尊虚無地獄隨劫救苦天尊火庭地獄㝷聲救苦天尊毒刃地獄無邊普濟天尊寒夜地獄九幽㧞苦天尊律令地獄妙化無邊天尊風刀地獄廣常覆護天尊九幽地獄金華廣耀天尊刑正地獄聖力無邊天尊太平地獄廣大慈悲天尊清沼地獄无極快樂天尊玄隂地獄輪轉萬變天尊天玄地獄廣度沉淪天尊天一北獄髙皇玉晨天尊三十六天獄髙靈最妙天尊元正地獄慈教廣度天尊河伯地獄普垂惠澤天尊禁罰地獄廣大無邊天尊黄天地獄大弘普濟天尊累劫地獄隨念徃生天尊女青地獄開度宿障天尊右五苦地獄名與世科不同說見度靈儀无上黃籙大齋立成儀卷之三十九
