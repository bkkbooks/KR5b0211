願得太上十方正真之氣入臣身中所啓速逹徑御太上無極大道至真玉帝御前啓白具法位臣某上啓太上無極大道十方至真巳得道大聖衆扶桑大帝暘谷神王洞源洞淵溟泠大神三河四海九江水帝十二淮濟河伯河侯河中二千石清河夫人水府神仙衆真靈官及此間湖地里域一切神祇臣以有幸宿世因緣九天之劫流延今身遭遇經教崇奉三寶任居大乘自省穢陋誠非所勝然受命之日約當修弘妙法讃揚仁風使太陽靈暉洞映於九冥元如慈澤咸被於一切造化育物萬品繁興人物殊形同禀元氣生生之類莫不希全而世俗道消逆惡滋彰人民貪濁噉食衆生禽獸魚鱉資以為糧水陸羅㩋不可勝計今齊主某義形報薦建立大齊輒捐己財請贖物命將養撫恤普行完全放之清泉冀資冥福如道士自放生當依本科添入伏按經文放生度死為學所先臣率身恭修不敢有怠又有清信男女某甲等慈心愛物好尚善緣各以資財市買龜魚隨臣俱行來到清淵今同放之還歸生源知無人入會放生不用又有清信男女等語以隆天師科元有此文不敢刪去度脫災難免離痛惱咸沐生全永享元吉願以是功德普流一切天人七世父母帝主國王公侯兆庶如道士自放生當依本科𣸸入及臣受道法師父母同學賢者山棲道士諸官正一弟子朋友知識六親眷屬蜎飛蠕動蚑行喘息諸天獄諸地獄五嶽四瀆幽魂苦爽囚徒責役一蒙釋散度脫惡道咸登無為之場願天髙清風和雨調日月光明星辰列布願地平正山林茂盛水澤流通五穀豐熟國主賢弘威風翼翼皇教明違普天所瞻人民義讓敵國不爭六夷賔服襖惡不生河海滿足賢聖日生推財讓義衣食自然男則髙才女則賢貞路不拾遺道德興隆庠序濟濟更相開度損身布施廣建福田憂苦者散逮及衆生令弟子某七祖上升天堂反胞更生騰景淩空生為種民無憂無患日月齊光令度衆難世世受度慶及子孫臣學得道真白日升天謹啓誦思微定志經偈太極真人頌賢者汝莫殺亦莫懹殺想衆生雖微微亦悉樂生長如何害彼命而用以自養自養今一時纍取自然爽長淪三塗中辛苦還復往善惡各有緣譬如呼有響何不攺此行慈心以自奬真人携手遊逍遙觀浮量右一大道雖無心可以有情求佇駕空洞中回盻翳滄流淨明三界外蕭蕭玉京遊自無玄挺運誰能悟𡨋趣落落天漢澄俯仰即虛柔七玄散幽夜反胎順沉浮𡨋期苟潜凝陽九無娛憂覩此去來會時復為淹留外身而身存真仙會良儔右二舋舋玄中趣湛湛清漢波代謝若旋環椿木不改柯靜心念至真隨運順離羅感應理常通神適逮自徂淡遊初無際繁想洞九遐飛根散玄葉理返非有他常能誦玉章玄音徹霄霞甲申洪災至控翮王母家永享無終紀豈知年劫多右三次放生復爐無上黃籙大齊立成儀卷之三十一
