body:
  text: 太上執法仙士蔣叔與修科儀門上清南宫鍊度幽魂儀先以方器安壇之西北立牌書云南宫太隂水鍊池又以圓器安壇之東南立牌書云南宫太陽火鍊池預備黃華神水一器及柳木炭火放壇下至鍊度時法師叩齒存神默朝乞降大上真水真火下降于鍊度之所三拜三捻香啓奏具法位臣某謹上啓祖師北極紫微大帝君祖師南極長生大帝君臣下愚尸穢冒參法階佩受靈文遵承正教濟生度死以應誓言輒露丹𠂻上干天聽臣伏為齊主某人正普薦亡親某乙在㑹衆魂開䢖無上黃籙大齊普設六道四生孤魂滯魄太上慈悲廣大乎等無遮無礙清淨斛食一筵乞按真科宣行鍊度願承恩霈離苦超升欲望天慈特頒睿旨告下南宮水火二司五嶽總領真君乞降隂陽靈根真水真火即日今辰降下壇場鍊度衆靈使其魂神澄正萬氣俱存身相具足復有光明度品南宫超升天府仰賴天威睿澤洞鑒臣俯伏以俟天恩昭報臣無任瞻天望聖激切待罪之至次吟法事師存元始上帝在泥丸宫中巳為九華真人諸司仙曹將吏嚴粧顯服赫奕下降師行火池法步南斗火鈴罡至火池衆誦隱語師至火池羅周十二位用開放流通法念淨天地呪一遍噀水一口吹池中依法行持念建火池呪太上有敕赦罪度生六趣三塗皆覩光明建立火池次第而升各隨果報悉獲超生急急如上帝敕存朱陵烈火流金自火池東南角流入炎炎金碧熖發取午氣三口吹池中執真火合同符師搯降真火訣寅勒至午默呪曰炎神炎神朱雀飛騰神火一下上按丙丁烈火神女手把帝鍾三昧真火速降朱陵吾奉南極長生大帝律令敕取午氣吹符焚池中密呪曰南閻洞浮流火之庭玉眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸真容升入福堂洞陽之宫再面東取當日太陽氣吹之次指揮掌火池使者鍊度宮童將吏日中陽精速降池中伺候引幽魂等入火池依法治鍊身形疾疾師存流火神庭方廣無邊上有朱陵府樓閣森然庭中火金碧色熖末皆有金鈴騰騰而上師行水池法步北斗玄樞罡至水池衆詠隱語師至水池羅周十二位用開放留通法默念淨天地呪一遍噀水一口吹池中依法行持畢念建水池呪太上有敕赦罪度生六趣三塗皆覩光明䢖立水池次第而升各隨果報悉獲超生急急如上帝敕存天河東井之水自水池西北角流入湛然澄清取西北氣一口吹池中執真水合同符師搯降真水該申勒至子默呪曰太隂太隂玄武之精神水一下上按癸壬天真玉液上清華房元始老君好生韓君靈根真水速降樞府吾奉北極紫微大帝律令敕取比氣吹符沉於水池中密呪曰霐池無鏡神龍之淵運東井華以滌幽魂攬姿運容太和之津玄和玉女灌之于神魂神澄正道氣長存再面西取當日太隂真氣吹之次指揮掌水池使者蕩形官童將吏月中黃華靈根速降池中伺候引幽魂等入水池依法濯質蕩形疾疾師存天河東井方廣無邊其水清淨光明上有天府樓閣森然次法師至鍊度所法師詣座上香存變如儀返生靈香飛烟結篆諸天諸地氤氲普遍委氣聚功幽魂受鍊一切舍生俱登道岸具法位臣某焚香上啓三清三境十極十華太乙救苦天尊長生大帝三省五府真宰朱陵火府南昌上宫靈寶鍊度合㑹聖真仙衆三界內外應感威靈恭望瓊輪羽蓋暫出於層霄法雨慈雲下覃於幽壤俾臣得行開度普濟沉淪仰冀恩光俯垂證鑒臣無任䖍禱之至敷座存天門祥烟瑞氣雲彩霞光炫耀心日見三寶慈尊青玄上帝諸天大聖一切仙靈赫奕下臨宣引魂呪今日吉慶大道吉辰諸天降鑒萬真齊臨三界共㑹八景合并地司執職普度幽明部衛主者拘魂壇庭引導亡爽受鍊身形各整威儀疾速來臨齊登妙果上詣朱陵師存所度幽魂億萬俱在壇下次召神謹召靈寶大法赫奕仙曹靈官功曹金童玉女鍊度仙吏執職萬神丹天左右侍衛大將軍掌水池火池使者火鈴靈童九光童子黃華玉女東井玉女度魂主吏聚魂功曹攝魄將軍鍊度使者混元十二氣化生大將軍飛元聚靈召神使者六丁六甲大將軍金童玉女受鍊司直日神將功曹黃籙院功曹火府神兵泰山五道社令城隍土地等神來詣壇所今奉道旨鍊度死魂爾等威神疾速恭依元教攝召十方盡玄虛界六道四生有主無主一切孤滯幽囚苦魂之衆並赴靈壇祗受鍊度各為分司聚氣和合形神鍊質凝真登仙悟道一如流火律令存前件官吏威儀整肅羅列左右受度衆魂俱在壇下三界通化天尊次火錬執真火合同符宣降真火呪搯午文天中之靈日月居通甲乙氣令五行旺剋八景玉音守形直符招靈致真攝魂符使聞吾呼召速降通靈承符奉命輒莫容情急急如長生大帝敕取午氣吹符焚火池中密呪曰南閻洞浮流火之庭玉眸詵詵流火之膏刀利禪猷婆泥靈童流火之質玉眸真容升入福堂洞陽之宫取當日太陽氣吹之謹請錬度真人九光童子火鈴靈童錬度司仙衆引幽魂赴火池受錬師存變並如初火錬丹界天尊執火府隱文宣火錬大呪風火訣南方之君赤帝之精熒惑使者丙丁將軍朱雀炎神赫赫陽精五行造化萬物發生天帝有敕使者須聽攝召隂魂鍊度真形急急如長生大帝敕離氣吹符焚火池中執火鍊符祝曰謹請主火大將軍趙仲明掌火池使者速降真火鍊度幽魂疾疾取南方火氣三運自巳火氣三道相交大入符焚火池中玉眸鍊質天尊執十二氣化生符祝曰謹召長生大帝君運陽化隂大將軍楊元光混景大將軍丁忠合元大將軍丁遷善㑹靈大將軍陳志元隂陽大將軍王先之變靈大將軍張同運化大將軍李淵陽光大將軍申孚運度大將軍周自然成隂變陽大將軍章修三景混成大將軍王卓立隂陽合靈大將軍鄭明等從官將吏飛行變化奉為幽魂攝降腎水少隂之氣心火少隂之氣肝水厥隂之氣肺金