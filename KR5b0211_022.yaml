front:
  text: 无上黄籙大齋立成儀卷之二十二竹二
  hash: sha256:50453028d37883b0bb124a8d337d836e0b70e5eadc0594bd29c90245c5db94ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_022-001a, image: hfl/0283/0283-038.png}
body:
  text: 三洞法師冲靖先生留用光傳太上執法仙士蔣叔輿修科儀門正一飛章謁帝儀先華夏賛引髙功祖師道前及從章靈琤前上香洒琤訖法師啓白請聖醮獻次入戸呪四明功曹通眞使者上元生炁入臣身中令所奏章關逹上聞華夏旋香一周次上御案香各禮師存念如法右以章置簡上兩手捧當心正立曲身存思本師位西立心禮三拜次存東方諸君文人心禮三拜次存南方道德天尊心禮三拜次存西方三師心禮三拜次存北方太上老君心禮三拜次存左日右月去西各九寸七星在頭上青炁從肝中出布滿一室清光過乎日月次存唐將軍從左賢中出立左葛將軍從右腎中出立右周將軍從心中出立前兵士各三千萬衆悉朱衣赫然次存五德將軍乃五神也列位四方次存天騶甲卒臍間出天丁力士額間出狼吏虎賁兩眉間出剛風騎置吏兩膝間出收炁食炁鼻間出次存傳章玉童玉女各立左右直使功曹朱衣黑幘正立前畢然後行科神仙之道恍愡之間斯須則至存念不宜久時供常起有在心一念一起則了然矣次衛靈呪鳴法鼔二十四通發爐太上玄元五靈老君當召功曹使者左右龍虎君捧香使者三炁正神急上關啓三天玄元太上道君臣今正爾燒香奉爲齋主某伏爲正薦亡親某乙普薦在會衆魂等取某曰修建無上黃籙大齋用資超度謹依科格前期拜奏天官某章若干通上詣某宫曹治某宫願得八方正眞生炁來降臣身中令臣所啓速達逕御至眞無極大道玉皇尊帝御前各稱法位具章奏法位臣姓某謹上啓虚無自然元始天尊無極大道太上道君太上老君髙上玉皇十方巳得道大聖衆天尊至眞大帝天帝玄中大法師三天大法師正一靜應眞君正一女師眞人正一嗣師系師眞人三元唐葛周眞君三天門下諸司眞宰上章曹治通進仙僚天官某章中靈官典者法籙治職仙靈將吏某歲德尊神三界内外應感威靈臣胎肉微生泥塵賤品繆因宿慶忝胃法階佩服符圖遵行教法普令一切咸入法門凡有歸投理宜關告今弟子某義形報薦志切修崇願建齋功廣資㝠福乞按科格拜奏章書祈慧力之普加俾幽途之開泰臣濫充祭酒職在宣謄謹爲請命三天投誠衆聖仰希感格俯賜鑒觀俾天澤下臨章書上御請祈遂志幽顯蒙恩永恢正一之風普被大慈之化臣無任誠惶誠恐稽首再拜謹啓以聞次詣三清御位上香降聖酌獻法事如儀三清御座前毎位各香一爐太清前烈火豐香不可使香烟中絶此留冲靖之也次叩齒二十四通長跪出官衆官皆長晚謹出臣身中五體眞官功曹吏出上仙上靈直使正一功曹治病功曹官各二人出左右官使者隂陽神决吏科車赤符吏驛馬上章吏官各二人出出者嚴裝顯服冠帶垂纓整其威儀直使功曹戴通天之冠皂紈單衣正一功曹冠朱陽之幘絳章單衣腰帶龍頭之劒操持謁簿使者弁玄隂之幘冠九德之冠五色綬命單衣腰帶虎符齎執玉版直使功曹住立四方正一功曹住立中央治病功曹營衛臣身左官使者建節在前右官使者持幢在後陽神决吏立左隂神决吏立右狼吏虎賁察奸鈎騎三官僕射天騶甲卒天丁力士治正執正吏收炁食炁吏收神食神吏收鬼食鬼吏收毒食毒吏收邪食邪吏收精食精吏收温食温吏誅符破廟吏剛風騎置吏飛龍騎吏等官各二人出並皆羅列住立臣前後左右咸受臣口中詞語分别臣所奏上天官某章關啓里中眞官注炁監察考召里邑君左右都平君四靣方位諸君將吏天師所布下道上二玄三元四始十二時辰皇天大帝甲子諸官君丙子仁君五七赤陽君二十五官君考召諸君將吏等臣所受某治男官女官二十四官男炁女炁二十四炁男職女職二十四職治中左右隂陽二十四炁建節監功大將軍髙下治中眞炁前部效功後部效煞驛亭令驛亭丞四部監章從事按章從事呈章從事録章從事通章從事禦章從事定章從事較章從事齋章從事五百印章從事東九夷南八蠻西六戎北五狄中央三秦玄元始三萬六千餘神山川溪谷社稷將吏同誠上啓太清玄元無上三天無極大道太上老君太上丈人天帝君天帝丈人九老仙都君九炁丈人百千萬重道炁千二百官君太清金闕七寳玉陛下天師女師嗣師系師君夫人大道門下上官典者幹佐小吏奉行文書事臣以質觸事暗昧職當申謄咸宣師命救濟民物今時謹有某拜奏某章在臣素案之上函藴之中臣伏地宣章如法功曹使者對共科理特蒙逕御謹開玉函伏讀章文次上手爐香以龍頭書刀啓章函叩齒三通祝曰四明功曹開函小吏手執書刀開發函章文上奏開通道理亡者生天存者蒙庇急急如律令次從函中出章於香上度過叩齒三通祝曰五色之烟衝章上天五色之炁衝章逹帝下官故炁不得妄干急急如律令次法師以章付侍經侍經跪受章書同侍香呈金魚置右玉鴈置左次宣章法師望天門再拜長跪至請官處皆再拜存伏如儀宣章畢置案上以書刀鎭左筆鎭右師再拜歸位慰章如儀次法師以章置御案香上熏之次叩齒二通遣章謹遣臣身中五體眞官官一小吏十二書佐冠帶垂纓磨硯㸃筆爲臣及時操臣謹爲某拜上天官某章上詣某宫曹治臣愚謬忝叅治籙耳目閉塞檢校不聰所上章文恐有錯誤行列不端文字不整脫漏顚倒音句不屬將前作後以左爲右事任隂陽神决吏傳言書佐習事小吏隨章進對龍頭書刀尋文削治長毫利筆依儀證定無令上官典者有所遣却閉炁昇章逕御太上老君御前左吏歷關右吏歷啓諸官君歷第以次分别關啓當令臣所請者下所召者到所濟者度所奏者達若有下官故炁邀截臣章文不使上逹者録付所在近獄依律治罪以明天憲臣伏在案左恭待聖恩報應封章入函侍經捧章益齋押之威儀華夏讃引至焚燎所侍經讀章䟽關焚章頌法師伏地呈進如儀候典舉送聖頌長跪納官臣上章事訖所出臣身中功曹使者一切靈官君吏各從臣衆妙之門而入在左還左在右還右直使功曹主領檢押復於宫室無令差互後召又到一如故事叩三通咽三過復爐香官使者左右龍虎君侍香諸靈官當令臣奏章之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前當願弟子某合家受福幽顯蒙恩十方仙童玉女侍衛香烟傳奏臣所言并所上章文徑御至眞無極大道玉皇尊帝御前出堂頌天師前禮謝雲輿送師向來念善請恩設醮儀古儀不載唐先生有之今隨有屬若師古之士當從晉唐舊法先嚴㓗排辦香燈茶酒果醮獻之具一一如法供養次敕水淨穢華夏升壇入戸呪遶醮筵行香一周道衆依序立班各禮師存念如法衛靈呪鳴法鼔二十四通無上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓此間土地里域眞官正神臣今正爾燒香奉爲某開建无上黃籙大齋行道事竟謹設清醮一座幾分位仰謝洪恩願得太上十方正眞生炁降流臣等身中令臣所啓速逹逕御太上無極大道至眞玉皇上帝御前次長跪出官叩齒咽液如法納官周謹出臣身中五體眞官功曹吏出上三天執法開化隂陽功曹度道消災散禍解厄君吏各一十二人出臣等身中治職君吏某治中建節監功大將軍前部效功後部效殺驛庭今驛庭丞四部監功謁者上仙上靈真使功曹左右官使者隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏等官各二人出出者嚴裝顯服冠帶垂纓整其威儀功曹弁朱陽之幘冠通天之冠衣皂紈單衣腰帶龍頭之劒捧持謁簿使者弁玄隂之幘冠九德之冠衣絳章單衣腰帶虎符齎執玉版直使功曹住立四方正一功曹住立中央治病功曹營衛臣身左官使者建節在前右官使者持幢在後陽神决吏立左隂神决吏立右上部功曹住立上方中部功曹住立身中促氣功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者繞帀臣身狼吏虎賁察奸鈎騎都官僕射天騶甲卒天丁力士治正執正吏收神食神吏收鬼食鬼吏收炁食炁吏收毒食毒吏收精食精吏收邪食邪吏誅符破廟吏剛風騎置吏驛馬上章吏飛龍騎吏等並皆屯駐臣左右前後受臣詞語分别關啓此間土地里域眞官監察考召左右都平君天師所布下二十八治三十六靖廬七十二福地三百六十名山崑崙等上官洞天海嶽三元四始二十四炁十二司神太歲太隂甲子諸官君玄元始炁三萬六千神在時受命章中從事東夷南蠻西戎北狄中央三秦五老神君山川溪谷靈官將吏同誠上啓太上無極大道元始天尊太上大道君太上老君太上丈人無上玄老君十方無極大道道德衆聖天尊至眞大帝天帝三十六部尊經玄中大法師天師君靈寳衆眞三界威靈臣等夙命因縁叨傳教法告盟之日約以行持誓願蕆揚眞風廣化一切今爲弟子某虔遵科簡修奉寳齋巳散瑶壇載陳清醮仰酬洪造用表丹衷伏乞功曹使者飛龍騎史爲臣傳奏速令上逹所冀三清大帝十極髙眞普錫洪慈分輝降鑒流恩下土施澤窮泉福被存亡慶均家國臣誠惶誠恐稽首頓首激切之至謹啓以聞各稱法位具法位奉行黃籙言功大醮法事臣某與臨壇衆官等謹同誠上啓虚无自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十二天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳瓊臺紫微上宫靈寳至眞明皇道君玄中大法師天師君上相上宰四司五帝三界官屬一切眞靈臣謹爲弟子某恭修無上黃籙大齋功圎事竟謹㳙吉夕虔備醮修延降諸天聖眞靈寳官屬三界職司一切主宰願垂降駕鑒察丹衷臣等無任瞻天望聖激切屏營之至謹稽首再拜奏請次降聖上香進茶獻酒法事遶醮筵行香一周至洞案前立舉長吟法事各稱法位具法位臣某與弟子某臨壇官衆等謹重誠上啓三清上聖十極髙眞天地靈仙日月星宿四司五帝嶽瀆眞官靈寳仙曹三界官屬醮筵感降一切眞靈臣等夙承餘慶得際眞風叨佩靈文稟修玄教功輕塵露過重丘山誠宜束身以自收檢而法許開度佐國立功凡有皈投理難抑絶况奉詞旨敢不上聞宣詞按如詞㫖備極精誠齋主某虔奉道眞齎持法信依按科簡恭設皇壇修無上之齋竭事天之實叩頭十極歸仰三光懴積罪於神經謝宿愆於嶽瀆隨方鎭綵至潔至嚴列位香燈無虧無絶青詞朱表上逹玄都玉篆金書下頒幽壤諒齋功之成就祈善願以周圎幽顯均休存亡獲慶今者法事巳悉仙範旣终眞馭返於上玄法流分於下界經收寳軸道還玉京卸梵炁之牌倒碧蓮之纂共惟三界一切眞靈侍經威神直壇將吏爰從啓告逮至散壇依按典儀九時朝奏監臨翊衛通達徃來勞役眞官驅馳將吏敬陳醮禮恭謝靈恩伏願蹔駐雲軿少留寳馭享兹清潔察此精誠賜景福於家門降祺祥於眷屬幽㝠開泰生死荷恩臣等無任虔切之至謹稽首再拜上香酒伸亞獻次法事遶醮筵行香一周至洞案前序立舉長吟法事具位臣某與弟子某等謹重誠上啓太上三尊十方衆聖三界官屬一切眞靈臣聞大道無爲神功不測生成天地孕育萬靈惠濟幽明利霑品物凡伸析告必獲感通今弟子某宿植良縁歸依正教荷恩深厚展敬虧違寳齋巳散於良宵清醮再陳於吉夕答天地生成之德謝眞靈衛護之恩洗積世之愆尢解百生之𡨚結遷升徃逝保佑親姻伏乞上聖垂慈至眞錫祐三官注善五帝記名功德克周善縁成就福流無極利及有情先願宗桃先聖杜稷尊靈長保丕圖克昌厥後皇帝天基惟永睿筭無疆四夷咸賔五兵銷偃隂陽叶序風雨應時歲有豐登物無疵癘次願弟子某等億曽萬祖苦爽幽魂俱承妙善之功咸獲超生之路死魂受錬永拋有漏之縁眞性長存頓悟無爲之果次乞臣等己身眷屬舉族姻親體合元和神融妙道金眞玉瑩増福祉於隆昌鏡朗塵清延壽齡於綿逺災隨霧散善逐雲臻動植飛沉寰中象外俱霑巨福咸沐玄恩然願享祀神祇此間土地同承齋力進品仙階鎭宅寧家安人護物三途五苦六道四生兵死陣亡沉魂滯魄各蒙道力溥受殊勲速離幽關早超眞界仰希眞應克副所所稽首虔恭酒陳終獻醮壇禮狀恭對敷宣次奏獻車輦錢馬宣功德部䟽法事遶醮筵行香一周至洞案前序立臣謹重誠上啓至眞大聖無極髙尊三界眞靈一切官屬臣等祗奉仙科慶成道典禮旣周於三獻善斯降於百祥所願從心所求遂志功霑水陸善及存亡一切有情悉蒙玄澤尚慮臣等學法未備進止犯科弟子某薦獻乖儀修營有缺願垂原赦普降洪恩塵世凡微不敢稽滯仰瞻眞馭己在雲霄升車之恩不違祈請臣等下情無任攀戀望恩之至謹稽首再拜奉送回軿頌長跪納官臣奏啓事畢向者所出功曹使者並還臣身中從衆妙門而入在左還左在右還右直使功曹主領檢押各復本位無令差互須召又到一如故事復爐香官使者左右龍虎君侍香諸靈官當令設醮之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前當令存亡受福家國霑恩十方金童玉女侍衛香烟傳臣向來所啓之誠逕御太上無極大道至眞玉皇上帝御前吟焚詞頌至燎所回向念善唱設醮事畢衆官復位无上黃籙大齋立成儀卷之二十二
