  text: 無上黃籙大齊立成儀卷之九鳯九
  hash: sha256:a1ee994581e9bdd6f6fff2ae4341e0c1a2eb458692f63fbbcf8c1061e0d28a03
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_009-001a, image: hfl/0279/0279-110.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蔣叔與編次章奏門章共五通啓告玄穹解穢章太上三五某籙弟子係天師某治某氣云云章奏臣某誠惶誠恐稽首頓首百拜上言臣謹按玄科今據入齊意至福佑見存臣據詞難抑巳於某月某日預告先揚寶旙上聞齊意今按下元黃籙簡文靈仙品格建立靈壇崇修齊法恭依次第宣演真科進拜天官濟度諸章頒行元始符命金籙白簡救苦真符太上敕赦生天寶籙玉清拔幽魂破地獄真符青宫九龍符命神虎玉劄赦拔亡故某乙在會係薦等魂及十方九幽囚徒苦爽出離長夜祗受齊功謹取某月某日開啓齊壇召攝亡魂赴壇受度某日清旦為始正齊行道三日九朝某日夜普設清淨無礙斛食夜供錬度六道四生孤魂滯魄某日夜水火變錬係薦亡魂傳授九真妙戒告行元始符命金籙白簡長生靈符給籙破劵保舉超升事畢拜表言功解壇滿散某日夜祗設三界髙真清醮三百六十分位仰答洪恩投龍進簡外齎鎮信錢米命素紋繒香油柴炭鹽䜴筆墨法用物儀投臣乞為進拜天官拔贖濟度諸章仰祈道力俯拔亡魂如普蔫大會內有生身受度者攺作俯濟存亡臣切慮建設壇場之所灰劫之前四面方隅一切厭穢往來人物隱顯葷辛濁氣混凝氛埃閉塞昏霾六合障翳八紘不能降格飈輿駐停真馭恐妨開濟拯度幽明匪仗道慈莫遂清肅臣今章奏先祈上通宸極旁及邇遐敷露懇誠導迎慧澤掃除氛穢蕩滌邪妖臣以凡愚未盡教法念臣叨奉真宗夙參治籙名濫充於祭酒職敢廢於關謄既奉皈投理難抑塞謹為伏地拜章一通上聞三天伏惟太上無極大道太上師尊上官典者垂慈省理臣謹為上請五方五帝解諸厭穢君各一人官將各一百二十人下洗浣肉人解諸厭穢玉女使者官將一百二十人齎真精之水五和之香盥洗靈壇及製造無礙斛筵所供齊食燈燭香花井竄內外立遣清淨千厭萬穢應時消散上請仙花玊女一千二百人九鳳破穢籙中收穢大將軍滅穢大將軍運穢大將軍除穢大將軍各一人官將各一百二十人與五方五龍主水使者各持真精之水洗浣黃籙齊壇并齊主某一家內外長幼臨壇執事祗奉法流往來人物有諸厭穢一切解散使各人心神內養體力外和注念精通舒誠感格齊功成就庶事無魔全仗洪恩普資清淨謹上請靈寶十戒威儀九真妙戒元始符命金籙白簡長生靈符救苦真符太上生天敕赦寶籙玉清拔幽魂破地獄真符東極青宫九龍符命神虎玉劄玄都蛟龍驛吏金龍驛吏九龍符命使者三元龍虎騎吏神虎追攝官君錬度諸司聖衆靈寶官屬等一合下降宣通召命監衛齊壇升擢所薦咸開滯爽使懴謝必聞啓傳無間衆真俯鑒列聖遐臨幽顯霑恩含靈蒙福所請天官騎吏靈寶官屬一切聖衆俟於散壇拜表言功各乞遷賞以為效信恩惟太上分別求哀臣愚謹因二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏等官各二人出又因甲申日直神扈文長從官十六人符吏天光二人直神從官符史隨日辰易舉此為例操臣謹為黃籙大齊主普薦攺云黃籙大齊都㑹酋某乙同在㑹官寮庶士等後同拜上天官啓告玄穹解蕩厭穢寶章一函上詣太上虛無丈人宫都司曹治北辰宫曹治隨日月侯舉此為例伏須告報臣某誠惶誠恐稽首蝢首再拜以聞空三行臣某屬某宫焚修空三行空三行空三行可漏用全紙一幅為之具章奏法位臣姓某上奏謹內方函上大上丈人會濟具章奏法位臣姓謹封外方函謹上三天門下進具章奏法位臣姓某謹重封右按正一書章律寫章不隔日填太清不隔時章中太清聖位科云臨時細書長三寸六分或五寸朱表後聖位科云臨時法師自書二寸四分內取盡恐難措寫止臨時細書作一行為佳張萬福天師科亦載之矣若能依科楷書尤妙又陛下二字雖云細注然玉陛下辭意本是一義不可分拆獨細書陛下兩字頗似未穩且五錬生尸經黃繒章法及張杜二儀亦不說細注下兩字以理推之作一行細書恐可通行亦留冲靖之意也酆都赦罪章具章奏法位臣某誠惶誠恐稽首頓首再拜上言臣謹按玄科今據同啓告玄穹章至投龍進簡除巳備奏諸天帝尊申三界真司牒合屬去處外齎鎮信法用物儀投臣乞為進拜天官拔贖濟度諸章俯拔亡魂出離幽夜伏念臣夙奉真宗獲參治籙名濫充於祭酒職敢廢於關謄謹開具係薦亡魂姓名隨章進呈普及六道四生孤魂滯魄願承恩命出離𡨋途受領齊功超升淨界臣尚慮亡故某乙在會係薦等魂及建齊弟子家億曽萬祖囚徒苦魂纍劫以來有諸愆業拘留報對未脫幽𡨋非憑赦罪之章難出重隂之境全依道力曲賜生成臣謹為上請太清降真召靈符吏降真召靈童子各一人特為亡故某乙在㑹係薦等魂恭請太極真符告下東極青宫長樂天內大慈仁者尋聲赴感太乙救苦天尊乞降威神慧光普照十方世界北隂酆都九幽諸獄天牢水獄考掠𡨋司一切諸獄承兹慧光照耀應時普得開解鐡城摧毁枷鎖解脫赦宥亡故某乙在㑹係薦等魂及囚徒苦爽咸覩光明出離幽暗仰賴天尊上聖依黃籙簡文靈仙品格召十方飛天神王救苦真人救苦童子青玄玉女遍下幽獄灑甘露之寶漿降慈悲之法雨威神感應慧力靈通所指所到炎火息焰氷雪生春刀化玉樹劒變騫林銅柱鐵牀成寶座之具鑊湯爐炭為清涼之燈鐵丸金汁無熱惱之威鋸解屠割摧鋒芒之利銅蛇鐵狗永斷惡緣獄卒牛頭俱發善念魔王束首掾吏歸誠曹屬除罪籍之名司案焚業緣之字𡨚仇和睦債訟消平至于四生六道普離凡塵甲介昆蟲俱獲生化擔砂負石之衆漣汲溟波之魂驅雷役電之魄天圓轉匝之神運風掃山之鬼穿地引水之龍斷地逮役度上南宫永離五苦逺抑三途即使亡故某乙在㑹係薦等魂及弟子某家祖玄靈識佩服天儀冠帶朱紱飈乘碧落羽駕太清緣運不絶法應更生侯王之門修行衆善超神仙果達快樂鄉俱如臣言不違懇欵恩惟太上分別求哀臣愚謹因同前章只易直神操臣謹為黃籙大齊主某拜上天官酆都開業道赦罪寶章一函上詣太上某宫曹治並同前章式玉曆照帳狀姓名寫朱書帳狀見正奏門今開具係薦亡魂姓名下項普薦攺作今開具在㑹係薦亡魂姓名下項正薦某人只寫姓名附薦某人逐一開列姓名今月日具髙功法位臣姓某具右玉曆若是普薦不立正薦附薦項目便將亡人姓名從頭具去量所度亡魂多少及紙髙低為則一行可寫數名要得磊落見單數寫須做格寫令真措行列端正衷在章書圓封外入第二方函內發去開通道路章具章奏法位臣某誠惶誠恐稽首頓首再拜上言臣謹按玄科今據同啓告玄穹章至投龍進簡除巳備奏諸天帝尊申三界真司牒合屬去處外齎鎮信法用物儀投臣乞為進拜天官拔贖濟度諸章以祈升濟切念臣幼慕玄風早參治籙名濫充於祭酒職敢廢於申謄除巳具按典儀崇修齊法臣尚慮幽關杳邈𡨋路迢遙水陸不通方隅隔絶亡故某乙在㑹係薦等魂及十方九幽囚徒苦爽須資赦罪之章期出重隂之境非憑道力莫闢關津克詣齊壇普受開度謹為拜章一通上聞三天開清氛穢道啓黃雲四闢六通無有障礙上請太上直符使者三界直符使者各一人齎持太上符籙太清符命告下三宫九府百二十曹五帝考官主吏北隂酆都內外宫洞五嶽九幽四方三十六獄大鐵圍山無間地獄泉曲河源三元水府五道都府九州社令十方道主者丘丞墓伯河伯河侯蒿里丈人上下二千石官九壘二皇君地下土府神官洞天幽治考校曹局泰山主職諸曹地獄山林孟長廟社神祇溟泠大神某甲子太歲尊神天下城隍社令當處土地正神善惡二部長吏一百二十位官府神祇七十二禁忌神將天牢地獄冥關幽治長夜泉扃一切主者敬聽太上符命開關啓路毁鎖張門釋放亡故某乙在會係薦等魂及六道四生孤魂滯魄悉詣玄壇參朝三寶傳符授戒聽法聞經領諸善果使幽途無險阻之程𡨋關開逍遙之徑功圓果滿進品仙階違滯之者𡨋曹降職恩惟太上衆真分別求哀臣愚謹因同前章只易直神操臣謹為黃籙大齊主某乙拜上天官開通道路寶章一通上詣太上某官曹治同前章式鍊度沐浴章具章奏法位臣某誠惶誠恐稽首頓首再拜上言臣謹按玄科今據同啓告玄穹寶章至投龍進簡外齎鎮信法用物儀投臣乞為進拜天官拔贖濟度諸章恭祈道力俯拔亡魂切念臣幼慕玄風早參治籙名濫充於祭酒職敢廢於關謄尚慮亡故某乙在會係薦等魂及六道四生孤魂滯魄宿纆業垢墮落惡源未盥沐於身形難參朝於壇陛克諧錬度各遂超升仰仗道慈俯垂開濟臣謹為上請五方五靈童子各五人解穢官君將吏各一百二十人浣濯夫人黃華玉女各一人應時下降請取黃華神水錬尸素漿雲腴玉醴甘露金津灌注香湯之中沐浴上件亡魂無邊苦爽蕩除隂翳洗滌塵勞絶表裏𡨚債之根淨內外熱惱之垢即令五方童子上請東方青靈始老真氣哺飴以九氣之青津南方丹靈真老真氣哺飴以三氣之丹華西方皓靈皇老真氣哺飴以七氣之素漿北方五靈玄老真氣哺飴以五氣之玄泉中央元靈元老真氣哺飴以一氣之黃華即使所薦靈魂承哺飴之恩安鎮魂魄自生五臟又請金剛百錬千和玉液太白流光元皇散液解除鬱結去蕩滓穢灌錬身心智慧洞明又請天醫神吏尚藥靈官治病三五功曹太醫博士主者砭石小吏敷藥靈官請取太上五色神藥布散亡魂臟腑之中救療生前榮衛之病針砭心腹積滯摩按氣血瘇瘡斷筋傷骨者續形返生零落肢體者易質復故生肌長肉一一完全骨體康强神魂磊落憂惱消釋飢渴滅除結節開通胞元散滯形神端正相貌莊嚴火請天元真水真火南昌上宫主鍊九華真人九光童子火陵靈童東井玉女錬度大神五府真宰受錬司主宰錬度神將官吏回骸起死反形度生應干真衆各持法器下降玄壇奉為亡故某乙并赦罪章中備奏所薦男女等魂普及六道四生孤魂滯魄豐加冶錬令逐玄微承兹殊貺上度仙鄉恩惟太上分別求哀臣愚謹因同前章只換直神操臣謹為亡故某乙等拜上天官沐浴錬度寶章一函上詣太上某宮曹治同前章式升度亡靈章係於黃籙第三日落景於齊醮壇拜上具章奏法位臣某誠惶誠恐稽首頓首再拜上言臣謹按玄科今據同啓告玄穹寶章至投龍進簡外齎法信投臣乞為進拜天官濟度諸章仰祈道力俯拔亡靈切念臣幼慕玄風早參治籙名濫充於祭酒職敢廢於關謄除巳勵率法流依科修奉九時懴謝三日告盟建齊弟子某乙志竭誠殫儀陳事畢詞旨遍聞於三界恩先普被於重泉所薦亡魂蒙原愆業道將還於金闕經宜入於琅函澤被存亡功加一切謹為上請南昌上宫司命君司録君延夀君益算君度厄君上生君各一人升度所薦亡故某乙靈魂及酆都章中備去係薦男女等魂普及六道四生孤魂滯魄上生南宫定算玉簡注名金文又為上請司馬大神監生大神衛房靈姥洞陽童子錬度亡過某乙及係薦等魂一切孤滯等衆入流火神庭之內黃華寶池之中蕩形易質返骸更生隨朱宫品格託化人天重立玄功徑登道果恩惟太上分别求哀臣愚謹因同前寶章只換直神操臣謹為亡過某乙等拜上天官升度寶章一函上詣太上某宫曹治餘同前章式從章疏某布政使司某府某縣某處居黃籙大齊主姓某伏為正薦亡親某乙崇普薦在㑹衆魂修無上黃籙大齊今辰進拜天官寶章欲憑真造即為進呈謹備太上洞玄靈寶升玄消災護命妙經三十六卷金錢三十六分從馬三十六匹右謹隨疏獻上三元唐葛周真君三天門下引進真君三天門下呈章從事録章從事通章從事齎章從事校章從事禦章從事剌章從事印章從事直使功曹正一功曹左右官使者隂陽神決吏稱車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏二緋衣使者小吏十二書佐金先童子直日直時從官符吏某章中諸位靈官典者一切聖衆聖前伏惟聖慈俯賜昭鑒某下情無任激切之至謹疏歲次某甲子年月日具位姓某疏可漏某章中諸位從官靈官典者一切聖衆聖前具齊主位某疏獻謹封章關泰玄都省今奉為修建黃籙大齊主某人正薦某乙普薦衆魂崇建無上黃籙大齊今來進拜天官某章巳恭對太上御前宣讀訖用方函上下封印全須至關發者右關呈章録章通章定章齎章校章禦章剌章印章從事二官直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏諸位靈官使者童子章中千乘萬騎一切聖衆准此同加嚴衛齎捧徑詣三天門下依文請進所過剛風浩氣等神不得遏截事須遵禀毋輒滯違故關歲次某甲子年月日時關具法位某押三天大聖都天大法天師正一靜應真君張無上黃籙大齊立成儀卷之九
