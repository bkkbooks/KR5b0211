front:
  text: 無上黃籙大齋立成儀卷之四十九駒九
  hash: sha256:e3e89fd04f34b83a5e0139a60258e71f94ceccf75a9d8347ec346f0233c015f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_049-001a, image: hfl/0288/0288-090.png}
body:
  text: 太上執法仙士蔣叔輿編集齋直須知門修奉規格應開建大齋要在洞天福地宫觀為上立壇須是方位端正坐北面南如宫觀元有壇處坐向方位或偏别就宇下依式立壇壇位既正屋宇坐向雖偏不妨行事應齋主建齋當竭誠恪營辦龍繒璧鈕務在精好香花油燭一一所需並要潔淨不使穢觸及臨用有缺科云修設大齋以精專為先龍繒為上香燭虔潔抑又次之茍有一關亦齋之瑕玷也修奉之士所當謹守應凡建齋須是量力所及冨則備物貧則隨冝所市齋需不得用非義之財及與人爭較價直力有餘而苟且營辦力不及而勉強經營皆為不誠難期感格如齋主係忠孝之家誠殫力乏師為代出龍繒之屬凡事從省應干文字醮獻等以類相併務在合冝應齋官上奏有官位具官無官稱奉道弟子若父母之喪稱孤子哀子應亭喪在室屋宇深闊喪在别處亦可修奉及生死厭穢未經解除者不得於家庭建立齋壇應齋儀中修用存思訣法並載齋法修用門讃唱威儀並載修奉應用門更不於本儀中詳注應文字行遣帝尊用奏狀餘並用申狀神司用公牒應奏狀並稱臣中狀稱名天樞院狀稱本司前用司額關帖牒等稱當司應奏申狀前空一掌後空兩掌𥿄高一尺四寸來許餘則用展劄𥿄為佳醮請獻狀止用狀𥿄應奏狀內聖位並用黃簽臨時貼應奏狀前貼黃髙三寸二分闊二寸四分或髙三寸六分闊三寸為則分單行寫貼黃後合縫處書臣名用印或依朝廷格式貼黃亦可應奏申內倚黃用小黃簽側貼太歲下應奏申狀可漏單聖位者用黃簽側貼兩位四位者稍用闊黃簽當中貼三位五位以中為尊兩位四位以右為尊聖中寫御前及聖前字或止寫最前一位亦可下界神祇狀用白簽應奏申方函面上並不用貼黃亦不稱臣兩頭止書名章詞表外函同此如申狀內聖位多者方函止題最前一位如東方木德與東斗東方七宿同一狀止題東方木星真君聖前之類應奏申狀上帝狀稱道慈敕旨帝尊稱聖慈睿旨二后稱宸慈聖旨三清四帝稱陛下二后稱殿下諸帝尊稱御前諸真稱聖前下界神祇稱神前應帝尊並獻龍車地祇皇君獻輦應牒關劄後並批朱公牒書名押字關劄只押字牒皮正面上書謹字中印法階書名押字下書封字用三印背書司額牒上書主者用二印關劄正面印法階只押字下書封字前用一印後用二印應奏申狀並半年用印合縫者書臣名後用一印可漏下用一印方函正面上下通用三印凡牒關帖榜等押字並用印公牒并榜太歲一行用四印前用三印關劄半年用一印凡用印並從後起應符簡告文年月用一印可漏正面用二印後用一印應符文作方函發者依方函式用印應奏狀及上界申狀用三氣飛玄玉章或用都天大法主印方函兩頭一同或用通章印正面用靈寶大法司印中下界申狀用靈寶大法司印應長生符用元始一氣印救苦符用青玄救苦印玉札用玉魁司主印凡符文屬玉清者並用元始印屬東極者並用救苦印屬上清者並用三天太上印此印諸符亦可通用應章表並用九老仙都印青詞用三氣玉章外函同奏狀式用印當中用三氣玉章兩頭或用三天太上印或通章印亦可應章書每行十七字相去二寸四分乃為一行𥿄髙一尺二寸書表每行二十四字為則𥿄數及行數要合竒數為佳前空兩行後空三行依常式書應書青詞與章表同格不拘字數前空一掌後空兩掌為則可漏用黃𥿄三寸套封外用方函應書奏申章表等並各專闢一室中設香案母令外人得入書寫人須令沐浴更衣入室凡書章表等並用𥿄遮護兩頭母令以衣著上應寫奏申文字不得以人姓名為頭鬼字為首不得垂生露死抽破人姓名應燒香不得用竈中灰火焚燎錢幣等不得用油燭點發應齋饌不得用乳酪臨齋不得飲酒應髙功法師須備受三五都功籙正一盟威籙靈寶中盟五法籙靈寶十部妙經及行靈寶大法方可依科修建如止受都功盟威二籙靈寶衆經及行天樞天心追攝錬度等法亦許攝行奏申儀中稱靈寶大法司去處及齋科稱盟受三洞寶文玉字金書等處皆合隨文換易應法師止受都功職籙及升玄陽光洞淵等籙却不受盟威籙或止受都功職籙及中盟五法籙不受盟威籙或上受都功籙及上清籙不受盟威籙或止受都功籙不受盟威籙或止受盟威籙却不受都功籙並不許開建靈寶齋科蓋出三五正一官吏二籙不備受則出官有礙皆不可行齋事應都講以下五職亦須備受三五正一靈寶陽光等籙方可使預壇席應請同齋道衆須是平時耐於拜跪甘於淡泊專修香火不貪貨財方可結立誓盟俾登壇席要與齋官各殫誠慤祈叩穹旻以招感格若只務聲音韻美注念不專非惟枉役精神虛費財寶切恐反遭咎責勞而無功修建之法全在擇人不可不謹應執威儀道童十二人須要先習步虛經大步虛十首令熟正齋旋繞時隨聲讃詠應寫文字書生到局日便令沐浴浣濯衣服務在清潔方可立局下手繕寫書生并幹局人先與斷約不許歸家宿食别委一人與之供備飲食宿卧去處仍專委一人收掌𥿄札照數出給如有錯誤不許剔補並要寫換一幅則别給𥿄一幅與之却與收下誤寫之𥿄庶可稽考𥿄數結局又可見其寫字錯誤多寡應經費門所料𥿄札數乃是確定之數買𥿄札時當於數外别買數十幅以備錯誤換易無上黃籙大齋立成儀卷之四十九
