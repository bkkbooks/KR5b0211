front:
  text: 無上黃籙大齊立成儀卷之六鳯六
  hash: sha256:63df0e36fbbd556820593f8cabfbda18bfad3953dfa73b900d00cfb22bd64cf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_006-001a, image: hfl/0278/0278-154.png}
body:
  text: 三洞法師冲靖先生留用光傳授太上執法仙士蔣叔與編次奏洞淵具法位臣姓某今據某鄉貫入齊意至臣福佑見存據詞難抑巳於某月某日預告先揚寶幡上聞齊意今按下元黃籙簡文靈仙品格建立靈壇崇修齊法恭依次第宣演真科進拜天官濟度諸章頒行元始符命金籙白簡救苦真符太上敕赦生天寶籙玉清拔幽魂破地獄真符青宫九龍符命神虎玉劄赦拔亡故某乙在會係薦等魂及十方九幽囚徒苦爽出離長夜祗受齊功謹取某月某日開啓齊壇召攝亡魂赴壇受度某日清旦為始正齊行道三日九朝某日夜普設清淨無礙斛食夜齊錬度六道四生孤魂滯魄某日夜水火變錬係薦亡魂傳授九真妙戒告行元始符命金籙白簡長生靈符給籙破劵保舉超升事畢拜表言功解壇滿散某日夜祗設三界髙真清醮三百六十分位仰答洪恩投龍進簡除具由備奏上帝乞降敕命及奏諸天帝尊請降睿㫖申三界真司牒今屬去處將所薦亡魂生死年月别具帳狀申三天門下上清天樞院伺候敕旨頒行外臣尚慮朔獄幽途泉酆土壘拘繫罪魂去處未即放釋前來有妨開度須至奏聞者右臣謹録狀上奏洞淵三昧無量上上太乙天君三洞天尊御前恭望天慈特降睿旨下三界十方重泉九壘風梵剛維之境朔單鬱絶之鄉一切隂司冥曹幽獄開明罪爽赦拔亡魂普及幽沉俱蒙超濟齊功成就存殁霑恩冒犯天威臣誠惶誠恐稽首頓首死罪謹具狀上奏以聞謹狀太歲某年月日具法位臣姓某狀貼黃奏為某乙崇違無上黃籙太齊正薦亡故某乙薦在㑹衆魂今欲開壇依科修奉九朝懴謝首露愆欲仗靈官謄奏齊誠原赦超度乞降旨頒下三界十方施行事真王具法位臣姓某今據某布政司同洞淵狀至同候敕旨頒行外臣尚慮所薦一切亡魂宿纒障業拘繫幽途欲得赦拔𡨚愆超離苦趣全神復本顯露形儀須仗恩光俯垂濟度須至奏聞者右臣謹録狀上奏九天採訪應元保運南極真王朱陵大帝御前恭望天慈允臣所奏特降睿旨下三界十方合屬真司九地幽隂一切去處照應赦拔亡魂開明罪爽更乞分靈降監採納啓祈成就齊功殄消魔障降流睿澤超度亡魂苦爽無依普資升濟臨壇翊衛傳奏仙曹均與賞功進加品爵覃恩家國資福存亡上應大道之好生下副微臣之懇禱冒犯天威同前洞淵狀結至謹狀九天上帝具法位臣姓某今據某布政司某處某鄉居同洞淵狀同候敕旨頒行臣外尚慮所薦一切亡魂宿世今生迷真逐妄業緣報對神爽沉淪欲得和合隂陽反生魂魄結形九氣育質三元全賴恩光俯垂開度須至奏聞者右臣謹録狀上奏靈寶自然九天生神上帝御前恭望天慈允臣所奏特降睿旨下三界十方及九天錬度生化真司地水冥曹一切去處照應赦拔亡魂開明罪爽仍乞俯賜恩光證明錬度降九天之神氣發九地之朽骸俾係薦亡魂幽魂苦爽廽骸起死聚氣凝神落滅惡根超升福境更祈殊貺利佑見存普及邦家均霑景福冒犯天威同洞淵狀結至謹狀貼黃妻為某人乞崇違無上黃籙大齊某今欲頒行符命追攝赴壇依科開度乞降睿旨下三界十方及九天錬度生死真曰施行事三十二天帝君具法位臣姓某今據某布政司某鄉某處同洞淵狀至伺候敕旨施行事臣尚慮所薦亡魂神爽沉滯尸魄流蕩必資梵氣完聚形神及建齊之日欲得諸天金童玊女直符騎吏下臨壇所上奏齊誠須至奏聞者右臣謹録狀上奏三十二天帝君御前恭望天慈允臣所奏特降睿旨下三界十方一切去處照應俯賜恩光照燭梵氣流通俾亡故某乙在會係薦等魂及十方九幽苦魂罪魄俱離幽夜悉詣齊壇陶沐陽精灌溉胞命聚神返本受化更生仍乞降旨諸天監齊直事侍香金童散花玉女五帝直符直日香官傳言奏事飛龍騎吏等如期下降監衛齊壇庶得啓奏感通齊功御達存亡受度家國霑恩冒犯天威同洞淵狀結至謹狀貼黃奏為某人乞崇違無上黃籙大齊正薦某乙口薦衆魂今欲頒行符命請降官吏追攝赴壇依科開度乞降聖旨頒下三界十方施行事木公金母具法位臣姓某今據某布政司某鄉某處同洞淵狀至伺候敕旨頒行外臣尚慮在㑹係薦亡魂業緣報對神爽沉淪欲得生氣結形陶魂鑄魄必資祖氣變錬形神須至奏聞者右臣謹録狀上奏東華木公上相青童道君九靈太妙白玉龜臺夜光金真萬氣祖母元君聖前恭望聖慈俯賜恩光監臨錬度降二儀之祖氣發九地之朽骸特與在㑹係薦等魂錬胎返本委氣聚形受化更生隨果超度更資慧澤普及幽沉俱承變錬之功並脫輪廽之苦庶俾三塗罷對五道開光冒犯聖威同洞淵狀結至謹狀巳上狀末式並與三清狀同天樞院狀連粘狀在前如普慶大㑹亡魂姓名多者各函申發復同靈寶大法司本司先據某布政司某縣某處入意至福佑見存本司據詞難抑巳於某月某日預告先揚寶幡上聞齊意今按下元黃籙簡文靈格建立靈壇崇修齊法恭依次第宣演真科進拜天官濟度諸章頒行元始符命金籙白簡救苦真符太上敕赦生天寶籙玉清拔幽魂破地獄真符青宮九龍符命神虎玊劄赦拔亡故某乙在㑹係薦等魂及十方九幽囚徒苦爽出離長夜祗受齊功謹取某月某日開啓齊壇召攝亡魂赴壇受度某日清旦為始正齊行道三日九朝某日夜普設清淨無礙斛食夜齊錬度六道四生孤魂滯魄某日夜水火變錬係薦亡魂傳授九真妙戒告行元始符命金籙白簡長生靈符給籙破劵保舉超升事畢拜表言功解壇滿散某日夜祗設三界髙真清醮三百六十分位仰答洪恩投龍進簡除具事由備奏上帝乞降敕命及奏諸天帝尊請降睿旨申三界真司牒合屬去處所有係薦亡魂姓名生死年月開具帳狀前去今發奏狀二十七函並重封印完乞為依時投進請降敕命睿旨施行須至開申者玉清上帝陛下上清大帝陛下太清大帝陛下昊天至尊玊皇上帝陛下勾陳星宮天皇大帝陛下紫微中天北極大帝陛下東極太乙救苦天尊御前南極長生大帝御前后土皇地祗殿下九幽拔罪天尊御前朱陵度命天尊御前東方無極太上靈寶天尊御前南方無極太上靈寶天尊御前西方無極太上靈寶天尊御前北方無極太上靈寶天尊御前東北方無極太上靈寶天尊御前東南方無極太上靈寶天尊御前西南方無極太上靈寶天尊御前西北方無極太上靈寶天尊御前上方無極太上靈寶天尊御前下方無極太上靈寶天尊御前洞淵三昧無量上上太乙天君三洞天尊御前九天採訪應元保運南極真王朱陵大帝御前靈寶自然九天生神上帝御前三十二天帝君御前五靈五老五帝天君御前木公尊神金母元君道前右謹具狀申三天門下上清天樞院伏乞將上件奏狀遍為通奏恭請敕旨符命睿旨頒行三界十方依本司今來所乞逐一施行謹具申聞伏候昭報謹狀太歲某年月日具法位姓某狀正薦帳狀靈寶大法司今具係薦亡魂姓名生死年月去處下項一正薦亡故某乙係某甲子命某年月日在某處命過享年幾歲一附薦此一項係家廟姻親依前逐一開列附壇追度亡魂如無附壇之人不列項依前逐一開列右具如前歲次某年月日具法位姓某狀普薦帳狀靈寶大法司今具在㑹係薦亡魂姓名生死年月去處下項一㑹首具官姓某薦亡親某乙係某甲子命存日享年幾歲於某年月日在某處命過依前式逐一開列一在㑹具鄉貫姓某薦亡親某乙係某甲子命享年幾歲於某年月日在某處命過依前式逐一開列後同正薦申狀結無上黃籙六齊立成儀卷之六
