front:
  text: 無上黃籙大齊立成儀卷之二十九竹九
  hash: sha256:8132774b1be04b063a8f2027ffa6ea8ccda2ec5fffbdfc4e4d47a68473984a82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_029-001a, image: hfl/0284/0284-078.png}
body:
  text: 太上執法仙士蔣叔輿撰科儀門鍊度幽魂醮獻儀先於鍊度所或大道前請設醮筵三十六分位或二十四分位周備畢道衆齊官請法師行事蕩穢上香燒香頌法師對聖啓白具法位臣某焚香上啓大羅玉清無極無上至真大道元始天尊太上大道君太上老君北極紫微大帝南極長生大帝朱陵大帝太一救苦天尊九天生神大帝三十二天帝君東華木公西靈金毋護魂侍魄養氣通血中主五帝真君日君月君北斗七元君南斗六司君靈寶五師君三省五府真宰南昌上宫長生大君韓君司馬回骸起死君無量度人君度命成仙真君南極九華真人玉清元始法師太極左仙公五嶽總領真君南陵樞府朱陵火府南昌上宫黃籙真宰靈寶仙曹追攝鍊度官君將吏北隂酆都大帝五嶽聖帝水府扶桑大帝歲德尊神社令城隍五道土地三界應感一切威靈臣聞教闡紫清開八門而拯度經傳碧落宣九鍊以返生普為沉淪濟諸苦惱滌除罪垢錬化生方臣謬以下愚叨傳上法身濫司於濟度職敢怠於宣謄今據齊壬某正薦亡親某人普薦在會衆魂開建無上黃籙大齊三晝夜普設九泉六道清淨無礙夜齊護度靈儀遷升道境爰備蘋蘩之薦少殫豺獺之誠伏乞真聖監觀仙靈降格迂回景馭大沛天恩俯賜威光監臨錬度臣與齊官某等無任䖍請仰望恩光之至謹稽首再拜上香降真具法位臣某誠惶誠恐稽首再拜奉請無上至真三寶上帝北極紫微大帝南極長生大帝朱陵大帝太一救苦天尊恭望天慈應感分輝垂慈降鑒謹上請九天自然生神上帝五老五帝君三十二天帝君木公金毋日君月君北斗七元星君南斗六司星君靈寶五師真君四聖真君三省五府真君元始法師太極仙公南昌上宫長生大君南上朱陵火府君南宫度命君韓君司馬鍊度成仙真君南極九華真人回骸起死監生大神飛天神仙五嶽總領真君南陵樞府朱陵火府南昌上宫黃籙院真宰北隂玄天酆都大帝五嶽聖帝水府扶桑大帝伏望聖慈垂光下降謹上請靈寶自然至真無量度人真君仙吏丹天左右侍衛大將軍靈寶赫奕仙曹天將大神九鍊真司靈官仙吏混元十二氣化生大將軍南昌掌水池火池使者主水主火大將軍飛元聚靈諸使者六甲六丁諸大將軍金童玉女火鈴靈童九光童子黃華玉女東井玉女錬度真人錬度使者錬度神將鍊度功曹鍊度合㑹主執官君神虎大聖玉女三部追魂使者追攝吏兵天醫大聖六職治官將吏功曹主者法籙治職真官從官歲德尊神三界直符七道功曹社今城隍五道土地啓道童子禁將神君地水職司導善官吏虛室監察一切威靈伏望聖慈具官來降上香初獻臣謹上啓三清上帝太一慈尊三界十方衆聖伏聞一氣肇分隂陽定位三元導養品物流形凡居覆育之間咸賴生成之德習因異果業報殊塗未除滅於妄塵遂轉輪於苦道非修觀行難出化機上聖髙靈垂慈接物說微妙法開方便門蕩隂穢於黃華鍊陽精於流火俾資道妙永固生根今齊主某崇修齊法遷拔亡靈普為幽沉宣行錬度伏乞天光下濟惠澤旁流勑勒真靈遵依符命分形降氣鍊景攝生俾受度靈魂無邊滯爽五神混合絶五纍之苦根一性長存證一乘之真果克造無為之岸永清有漏之緣臣等無任懇禱之至上香亞獻上啓靈寶鍊度官君將吏合㑹應感一切威靈伏聞元始開圖分身下化虛皇御運立法度人用恩祐於沉淪俾津梁於生死直符守吏典侍靈文法局仙曹佐揚勝範宜共恢於妙化以丕闡於皇猷銜命宣恩依儀行事上遵道旨下濟沉魂成鍊胎返本之功著監真度生之德惡緣斷絶永辭長夜寒池之鄉真氣充盈徑上丹英火鈴之界惟神克享用副精祈神虎三部追魂使者天人地仙神鬼業道功曹請屇道前承受文檄上香終獻宣關子獻疏上來誠悃巳具敷陳竊揆具聰諒垂洞鑒塵寰穢雜薦獻乖踈不罪凡微乞從昭宥鍊度仙吏追攝官君太歲尊神城隍里域各遵大教廣扇慈風啓闢𡨋關召集幽爽請伺本壇普召之時部衛衆魂依儀受度立俟昭報火急奉行回向焚燎如儀上清五府攝召幽魂全形升度還神復性儀先望鬼門排列香案次法事法師行破暗開通道路法焚香正立誦淨天地呪一遍吹四方存九鳳破穢真官一人朱衣皂幘跨丹鳳九首吐火於前炎炎燒身次步九鳳破穢罡旋身三臣存身於炎焰中變為九華真人其火亘徹天地光照十方良久想元始天尊引十方無極天真大聖上聖髙真坐圓光中心拜九遇密呪曰元始登引天真大神上聖髙尊妙行真人傾光回駕監真度生心拜三遇法師祝香具位臣某謹焚香上奏三清三境金闕至尊東極宫中尋聲赴感太一救苦天尊十方靈寶天尊三界真司十方主宰臣謬藉宿因叨傳上法功虧毫露釁積丘山履地戰驚仰天兢悸冀弘宣於妙訓俾普濟於幽沉既奉歸投敢忘關告以今伏為齊主某正普薦亡親某乙在會衆魂開建無上黃籙大齊旁及六道四生孤魂滯魄依按真科宣行鍊度除巳奏陳齊意關告真司召集靈儀來臨法㑹尚慮幽明異道自取沉淪難覩光明莫霑開度欲乞特頒道旨告下南方丹天火府主令照燭陽光開通道路破除隂翳令詣玄壇臣敢不滌慮澄心仰祈報應法師叩齒三通心拜三過執開通道路符密呪曰元始登引天真大神上聖髙尊妙行真人十方無極至真大神傾光回駕監真度生諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻升遷急急如長生大帝律令三遍取天門氣一口吹符上彈訣再掐訣燒開通道路符於鬼門上又呪曰元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超淩三界逍遙上清法師上香再祝曰以今焚香上請可韓府獨隸府興生府功都府聚魂府司命司録司功司殺一切神君吾今奉行符命錬度六道四生孤魂滯魄除巳關告真司克取今時攝召前來赴壇受度切慮冥途滯塞未能洞達准上帝勑召南斗火鈴大將軍急飛火鈴照徹無方洞達杳冥一如告命步火鈴罡發火鈴訣存火鈴六枚飛起焚太一飛符祝曰妙道之先混然無物三號分而令生九氣一元判而肇有三才髙澄凝滓天地位焉纎悉散殊萬物備矣氣元無象人為最靈善惡始運於一心報對遂淪於六趣或生天道或在人中或居神道之間或受地獄之苦或招餓鬼之報或處畜獸之中一墮輪回未易出離以至盡玄空界積夜寒鄉絶無祭祀之孤魂莫遂超升之滯魄常炎飢火永隔陽光未落滅於惡根徒流吹於苦海洪惟太上重軫哀矜謂一切有情俱元始之祖氣故無邊弘濟植大德之好生廣宣要法作人舟船普度衆生作法梯凳垂百千相好開十二願門爰敷度死之科用闢登真之路俾死魂之受錬獲仙化以成人削罪除愆拔難濟苦集諸善利不可思議以今恭啓瓊科宣揚寶範敷陳法食空歌洞章祥開五戶以遷神重請衆真而監度仰乘道力來赴靈壇領諸勝妙之因永脫輪回之苦巳夙慿於官將悉牒告於攸司無滯幽沉來從引導伏請神虎使者追魂攝魄官將三元將軍歲德尊神七道功曹六甲使者依律召集攝赴靈壇具有檄文謹當宣示宣普召牒焚之法師行持焚召魂大將軍符密呪曰靈寶符命拔度六道四生孤魂滯魄出離地獄水辭長夜五苦三塗不得拘留逼合鬼群斷落死名急急如長生大帝律令取天門氣吹符焚之召追攝將吏謹召靈寶大法司南昌上宮南陵樞府朱陵火府錬度仙吏天將神君神虎三部追魂使者天神地仙人鬼業道功曹地水主司城隍社令承差部衛幽魂主吏仰聞令召疾速管押六道四生孤魂滯魄赴壇交割仍仰禁止狂魂猖魄整肅形神善臨壇所不得因時報復讎怨侵犯生人玄憲昭垂各宜遵守儻或有違罪難赦汝當職道士執幡召攝志心召請遍十方界盡玄虛際無邊苦爽一切幽沉六道四生孤魂滯魄惟願乘三寶力今夜今時來臨法㑹和受兹開度功德歌回黃章太微回黃旗無英命靈幡攝召長夜府開度受生魂和不可思議功德師掐攝召訣誦真諱呪隨諱掐訣行持師平讀祝曰胎光幽精爽靈三魂歸空歸真天地正真氣再聚汝形神此是五行造化真無藏無避無逃形急急如上帝律令勑又祝曰三官北酆明檢鬼營不得容隱金馬驛呈普告無窮萬神咸聽三界五帝列言上清急急如上帝勑師取東北氣吹幡左營目三存億萬鬼魂齊集壇下次呪曰魂神澄正萬氣長存不經苦惱身有光明復聚本形復全本神急急如長生六帝律令默誦三遍取東氣吹之法師升座道衆吟中篇導幽魂詣座下參禮法師祝曰今仰承無上道力無上經力無上法力一切天道一切人道一切神道一切地獄道一切餓鬼道一切畜生道一切孤魂滯魄既巳雲集道場尚慮汝等生世之日或因雷霆水火刑殺刀兵瘖跛聾盲厭呪蠱毒胎産攧隊蟲獸傷殘非命橫亡抱疾枉死魂魄蕩散神識飄沉形相不完肢體未具陽間所患隂境亦竹為九然雖詣法筵尚縈苦趣今當遵依教典告召靈司奉行大法攝召真氣為汝等衆醫治疾病解䆁苦根返質全形還神復性然後蕩除穢濁錬化超升各生恭肅之心勿墮崇修之果次上香祝曰謹焚香上啓青帝護魂君白帝侍魄君赤帝養氣君黑帝通血君黃帝中主君朱陵火府真君南昌上宫真君錬度成仙真君靈寶天醫神吏治病功曹錬度真人靈官仙衆一切威靈願賜慈悲降流真氣普為男女衆魂醫治病苦完復形神一如太上律令廣度沉淪天尊師存上件官吏下降羅列左右前後衛護次祝曰玉清元始尊敕下天醫神完全枯朽骨普濟度天人急急如元始無量度人律令次行五府事默誦五帝真諱呪曰墨黑子襪臘午靈寶中紅杏卯磨真酉急急如長生大帝勑奉行取五嶽氣吹之執治病功曹符默祝曰四生六道十類有情萬化所苦一切成章天光一攝符命得昌急急如長生大帝律令取祖氣吹符焚之默誦度魂真諱呪興生辰獨隸卯可韓寅功都大指甲下聚魂對魂攝急急如長生大帝勑奉行取三塗五嶽氣吹所度幽魂法師就座祝曰回骸起死巳返於本初攝氣全形當資於生化庶得魂神澄正身相光明惟大洞之玉符乃上清之寶諱依科施用錬汝飛升執大洞十八玉符祝曰准上帝勑太乙元君命謹召腦神泥丸赤文混洞噓噓君酉左目神通光玄真君離右目神晨嬰隂精君離舌神騰陽正生君辰心神玄珠玄玄君辰肝神青帝孟光君三指一節脾神紫庭延年君子肺神皓洞季成君戌腎神太淵求都君四指一節隂神續命伯强君坤胞神元常秋夫君卯胎神含生寅和君卯結神九華彥遐君卯節神杳浩空猷君卯血神中幽良弼君辰精神元徐祝祝君坤氣神元英毳毳君亥神神天生靈父君辰命神正中幽田君坤急急速降奉為幽魂委氣聚形還神復性取祖氣吹符宣符文畢就焚之梵氣普生天尊執召五神混合符祝曰准上帝勑太乙元君命謹召混洞太無天寶之氣赤混太無靈寶之氣冥寂玄通神寶之氣五方靈寶自然至真之氣天帝玉真無色之境梵行之氣三元九真四梵四極之氣髮神蒼華太元之氣腦神精根泥丸之氣眼神明上英玄之氣耳神空間幽田之氣鼻神玉瓏靈堅之氣口神玉池太和之氣齒神鍔鋒羅千之氣舌神通命正倫之氣重樓十二太一真君之氣心神丹元守靈之氣脾神龍煙含明之氣膽神龍曜威明之氣肺神皓華虛成之氣脾神常在魂停之氣腎神玄冥育嬰之氣左青龍甲乙之氣右白虎庚辛之氣前朱雀丙丁之氣後玄武壬癸之氣急急速降正真生氣流入所錬幽魂身中取祖氣吹符焚之妙化無邊天尊又祝曰准上帝勑太乙元君命謹召六丁金童六丁玉女六甲金童六甲玉女精藏神水藏神八萬四千毛竅神三萬六千出入神二萬四千息氣神一萬二千精光神一千二百形影神三百六十骨節神玉童君玉女君白元君丹田君三十六師子君師父君師母君桃康君合延君上和君中和君下和君上元君中元君下元君急急速降正真之神各守所錬幽魂形中取五方氣吹幽魂中億劫化形天尊次祝曰准上帝勑太乙元君命謹召三魂神台光爽靈幽精謹召七魄神尸狗伏矢雀隂吞賊非毒除穢臭肺各守本位不得妄違自然長生將所結三塗五苦印取三塗五苦氣連印吹所度幽魂中超真解脫天尊師誦玉清生魂育魄保神內呪曰七氣成真六儀運虛五靈續絶二曜扶裝旋綱躍空飛步雲宫胚胎有始塵劫無終金城孕質玉洞凝神真氣內養以成聖人上入六虛下洞幽泉雲官寶闕中有真魂出入福鄉周旋生門咀嚼靈芝灌漱金泉甘露川流懸澍丹田紫霞朝映三氣凝煙瓊室化仙安坐金蓮真儀掩日塵劫為年金容出世天尊次以水灑之存億萬幽魂形相端好齊集壇下俟候度再祝曰汝等幻身易滅心病難除地水火風之形往日巳散飢渴疾苦之念曠劫未忘今故為汝生魂育魄復性還神形體不具者從此完全病苦未痊者自今痊愈疾除罪薄落滅惡根隂府不得拘留人天將行託化各宜整肅以俟升遷靈源普潤天尊汝等苦根散釋真性昭明宜沐浴於蘭湯終蕩除於業障庶得形神俱妙與道合真清衆慈悲請行引導靈寶普度大齊沐浴幽魂儀依法潔排辦洛室二所桶貯香水各沉洞明丹陽沐浴錬度符於水中法師於案前祝曰具法位臣某上啓五老上帝三十二天帝君日月五星真君東井星君臣聞仙真窈邈居不染塵至道玄虛法無待物惟衆生之昏昧致業垢之牽纏開明須假於真詮蕩滌必資於慧澤臣今伏為某正普薦亡親某乙在㑹衆魂開建黃籙大齊普度六道四生孤魂滯魄加持法水沐浴衆魂願賜慈悲俯垂䦕度降流正真之氣灌注香湯之中俾蠲熱惱之憂克超清淨之果見前清衆請為讃揚師存日月混合六合宫赤光黃精二氣交映五色雲氣滿室三十二大黃緑青赤蒼黑碧紫白日月五星之氣交錯水中衆詠東井頌天河灌東井石景水母精圓光拂靈曜玄暉瑩髙明元始披重夜天人逐月生沐浴蘭池上龍負長庚瓶金童灑香花玊女流五星冠帶濯玉津鍊度五仙形體香萬神降乘景登髙清當職道士行科先世迷真遂漂流於苦海今日受度得盥沐於華池非仗殊因莫超淨境奉為汝等上資往生天界念三元品戒沐浴蕩穢呪天澄氣清五色髙明日月吐輝濯錬身形神津內盥香湯錬精光景流曜煥映上清氣不受邪五腑納靈罪滅三塗禍消九冥惡根斷絶福慶目生今日大願一切告明普受開度升入帝庭玊虛澄輝巳蕩除於隂穢金房度命再灌沐於靈津庶永奉於真宗克常行於清淨奉為汝等上資往生天界念金房度命呪天靈節榮九孔肅清五宫六府神華鮮眀三元鎮固萬氣充盈金房度命緑字返生三錬九化升入太清三景同輝天地齊并飛行玄虛遊宴紫庭蕩黃華之水速致清虛歌緑字之篇能令飛化俾惡根之永謝保道氣以長存奉為汝等上資往生天界念緑字回年內真呪天地同清洗穢除塵錬化九道返形太真百關納靈節節受新清虛鑒映內外敷陳日吉時良度命回齡玉童玉女為汝執巾玄雲紫蓋冠帶汝身使汝長生天地同根洗心滌慮消纍劫之𡨚愆攝氣成形脫五隂之舍宅遂使凡塵不染真境常明逺解情迷無縈垢纍奉為汝等上資往生天界念澡錬超升呪天朗氣清爾身巳精塵穢消除九孔受靈使爾變易還返童形幽魂超度皆得飛升激濁揚清備臻於蠲潔登真離苦必假於莊嚴今則金房度命玊女致靈空歌洞室之章畢齊霓裳之盛奉為汝等上資往生天界念三元品戒冠帶呪五濁巳清八景巳明今曰受道罪滅福生長與五帝齊真上靈次化衣天河灌沐天尊俠化衣畢方止存幽魂身相光明仙衣然衆魂歡悅可愛汝等沐浴既周衣冠悉具畢蠲穢濁頓獲清虛然須整飾魂儀來臨法㑹當使永除業垢解釋三世之愆頓生陽輝升入九天之路各宜祗齊以待升遷次法師回向即將向來沐浴功德無量無邊並用蕩滌一切衆生結節根塵普令清淨為如上緣念大聖元始天尊太上大道君太上老君不可思議功德無上黃籙大齊立成儀卷之二十九
