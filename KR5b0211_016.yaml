front:
  text: 無上黃籙大齊立成儀卷之十六在六
  hash: sha256:3405e87037e735a81fdd15be33daca7bd39439c4429d03215a2d5c060242c03d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0211_HFL_016-001a, image: hfl/0281/0281-088.png}
body:
  text: 東晉廬山三洞法師陸修靖撰大唐清都三洞法師張萬福補正上清三洞法師李景祈集定三洞法師冲靖先生留用光傳授太上執法仙士蔣叔輿編次科儀門一古法宿啓建齊儀法師坐堂弟子九禮三伏衆官具威儀贊引髙功法師出堂上五帝三師監齊三官天師幕香畢悉詣玄師幕序立次齊官再拜上香執詞函於玄師前自述修齊意詞再拜次齊官回身捧詞函跪授法師師受詞訖齊官再拜法師退立于右次髙功三禮上香告齊杜光庭白舊儀今齊主每日投詞如告齊之法既初建齊時已投詞祈告若每日重疊即於禮為煩今止一度餘日並停具法位姓某上啓三天化主玄中大法師今有大道弟子某官某乙伏為某事就某處修建無上黃籙大齊三日三夜投詞列欵關告真靈今為依按典儀建齊為始當乞虛空監察直日直時傳言侍香香官騎吏關盟三界普告十方證明功德使啓奏御達齊功成就存亡受度幽顯霑恩某及衆官等不勝激切懇禱仰望之至各三拜次監齊宣職狀狀畢告誓云登齊衆官各揚乃職務在精潔冀獲感通使家國霑恩存亡受度不共其事科有明文次唱道讃自告齊至道讃出杜廣成黃籙齊儀次華夏引髙功至外壇都門上香祝白啓壇侍經宣啓壇疏次宣金鐘玉磬儀古儀無此不用亦可次華夏讃引髙功升外壇至地戶外立次髙功於地戶之左密誦入戶呪畢從地戶入升中壇髙功先入衆官次之出入户呪出金籙簡文經次髙功從天門入升內壇上十方香衆宫就中壇旋繞訖依次立次上御案香上香呪出洞真經次都講唱各禮師存念如法出三籙簡文經次髙功宣五方衛靈呪出真文要解次都講唱鳴法鼓二十四通次三揲香呪祝出杜廣成儀次發爐無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓某處土地里域真官正神臣今正爾燒香奉為某官某人正薦亡親某乙普薦在會衆魂等修建無上黃籙大齊三日三夜以今初夜宿啓登壇朝真行道𥙷職宣戒關盟諸天願得太上十方正真生氣降流臣等身中令臣所啓速達徑御太上無極大道至真玉皇上帝御前各三禮發爐復爐出三籙簡文建齊設醮自發爐至復爐懴謝之詞皆仗仙靈傳奏故發爐末稱令臣所啓速達絶句徑御太上無極大道至真玊皇上帝御前復爐末亦稱傳臣向來所啓絶句徑御太上無極大道至真玉皇上帝御前今之世師不明經旨却於發爐中間添入詞意極其覦縷煩瀆天真至於關宣之際巧求韻美虛費光景止一發爐幾一二刻其他可知求其誠慤果安在哉祝文所稱嚴裝關啓此間土地里域真官蓋以三界分司咸有主職太虛遼邈未易通傳人居地界苟有啓告須憑當處神司次第宣達方其感通故太極敷齊威儀出身中及法籙治官關啓治廬靖化四面方位嶽瀆丘沼諸廟神祇土地之主社稷將吏同為上啓而杜廣成醮儀聖真之外必别設日直土地之位正以關奏情詞根元本始在此故也雲光張若海鳥足語此乃指以為誤於五代石晉天福中著之論說甚矣其無識也所稱太上無極大道至真玉皇上帝舉六合範圍之大孰有外於道氣者至真玉皇不知包括多少帝尊為稱而楊傑修金籙攺為三清上聖昊天玉皇上帝是求之於區區色相之間矣況不本經文輕以私意更易今不取餘見齊法修用門次髙功上本位香侍香引齊官左行上十方香從北方為始次都講唱各稱法位衆官默稱所受經籙具法位奉行黃籙大齊法事臣某等今故燒香願以是功德上為天子王侯土地官長經籍度師山林巖栖學真道士同學之人弟子某所薦亡靈九祖父母存亡兩代眷屬親緣內外姻族天下人民飛行蠢動一切衆生今故燒香皈身皈神皈命太上十方靈寶自然至真無上大道特乞赦除前世今世生死所行宿對重過得免離三惡之道十苦八難九厄之中身得道真飛行虛空白日升天侍衛道君逍遙無上金闕七寶自然宫殿永與道合所啓玄感應聲上御至真無極道前出金籙簡文次都講唱禮十方志心皈命北方無極太上靈寶天尊一拜東北方東方東南方南方西南方西方西北方上方下方次都講唱各皈命懴悔法師長跪懴臣法衆等志心皈命無極大道天尊懴悔齊主某臣衆等及一切衆生前世今世身形所犯四肢舉措動違戒律不依經典身業大罪無量無邊並乞蕩除皆願齊主某臣衆等及一切衆生身入至仙㑹道合真稽首禮謝無上十方正真三寶一拜臣衆等志心皈命無極大道天尊懴悔齊主某臣衆等及一切衆生前世今世心業所犯志念不專情浮意動馳騁不息心業大罪無量無邊並乞蕩除皆願齊主某臣衆等及一切衆生神合真寂洞入自然稽首禮謝無上十方正真三寶一拜臣衆等至心皈命無極大道天尊懴悔齊主某臣衆等及一切衆生前世今世口業所犯善惡反論綺語飾非華詞惑衆口業大罪無量無邊並乞蕩除皆願齊主某臣衆等及一切衆生性命合道玄㑹無為稽首禮謝無上十方至真三寶一拜次都講唱曰臣衆等志心皈命太上三尊十方衆聖禮經如法次吟三啓頌三首每首一拜出智慈本願大戒經樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜默天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虛有念無不契錬質入仙真遂成金剛體超度三界難地獄五苦解悉皈太上經靜念稽首禮次一時稽首禮三寶都講唱曰至心稽首禮太上無極大道一拜至心稽首禮至真無上三十六部尊經真文寶符一拜至心稽首禮太上三尊十方衆聖玄中大法師一拜次髙功左行至東方執真文香上熏之舉亶婁阿㑹四字衆官隨聲呪曰亶婁阿㑹無惒觀音須延明首法攬菩曇稼那阿爽忽訶流吟華都曲麗鮮菩育臻答落大梵散煙慶雲飛灑玉都明魔上門無行上首回托流玄阿陡龍羅四象吁員衆官再拜置真文於東案以金龍鎮之玉尺壓于兩傍次高功左行至南方執真文香上熏之舉南閻洞浮四字衆官隨聲呪曰南閻洞浮玉眸詵詵梵形落空九雲推前澤洛吾臺緑羅大千眇莽九醜韶謡緣邅雲上九都飛生自騫那育郁馥摩羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫衆官再拜置真文於南案以金龍鎮之次髙功左行王西方執真文香上熏之舉刀利禪猷四字衆宫隨聲呪曰刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚簫嵎易邈無寂宛首少都阿繿郁竺華莫延由九開自辨阿那品首無量扶蓋浮羅合神玉誕長桑柏空度仙衆官再拜置真文於西案以金龍鎮之次髙功左行至北方執真文香上熏之舉玃無自育四字衆官隨聲呪曰攫無自育九日導乾坤母東復形攝上玄陀羅育邈眇氣合雲飛天大醜總監上天沙陀劫量龍漢衆鮮碧落浮黎空歌保珍惡變無品洞妙自真元梵恢漠幽寂度人衆官再拜置真文於北案以金龍鎮之次髙功左行至御前取中央真文於香上熏之舉黃中理氣四字衆官隨聲張清都靈寶五錬生尸齊儀黃帝一氣天文黃中土氣總統衆靈鎮星吐精流録神形與此不同富考呪曰黃中理氣統攝無窮鎮星吐輝流鍊神官衆官再拜置真文於案上以金龍鎮之髙功再舉東方玉字亶妻阿會次南方次西方次此方次中央如初衆官同聲呪五方玉字一遍畢髙功歸位出五錬生尸經次宣十方靈官疏次唱重稱法位具位奉行黃籙大齊法事臣某等謹上啓太上無極大道元如天尊太上道君太上老君十方巳得道大聖衆天尊至真大帝天帝三十六部尊經玄中大法師天師君上相上宰四司五帝三界官屬一切真靈臣等幸以宿緣生逢大化九天之劫延及今身三寶開圖三乘御運真經演教大道垂科祕籙靈文和天安地上保國祚下濟存亡得以凡微授傳真品而受法之日盟告三官救物度人立功為本是宜弘宣祕妙開化未聞凡有歸投理宜關奏況奉詞㫖敢不上聞宣詞案如詞肯備極精䖍齊主某夙值良緣皈依至道義形報薦志切修崇切慮亡靈某及九玄七祖億劫種親六趣三塗無邊苦爽生世之日霏惡難稱死入地獄終天無解願祈恩霈開濟存亡懴謝玄真披解宿對上資家國下祐羣生臣等不勝所見謹相擕率依下元黃籙簡文靈仙品格於某處靈壇之上設玄科之式四界八極法天象地以某所齊金龍繒緑安鎮十方本命紋繒苦干尺證質丹誠沐浴五體洗心靜念尅用今月某日修奉無上黃籙大齊謄詞效欵燒香轉經然燈續明照耀諸天三日三夜九時行道拔度亡靈某及弟子某家億曾萬祖囚徒死魂惡封罪苦謹依科法宿啓以聞恩惟太上三酋可十方至聖玄中大法師垂神鑒映省覽所陳乞敕勒靈寶官屬土地真官一合同心併力營衛齊所掃蕩內外清浮壇場降伏妖魔䤋滅邪崇使臣等心安神定思念立感天清地朗啓奏御達齊功成就無有室礙臣等雖佩至真參修大法處身五濁染跡六塵三關未調六情放誕仰賴禁戒以撿身心輒依明科說戒威儀使同齊之人咸知法訓明晨行道續更啓聞謹啓自然朝乃齊法之祖建齊之始必先行自然朝發盧稱名位禮十方懴三業三啓三禮為自然朝因以敷露真文讀詞說戒補職宣禁即本科所謂謹依科法宿以啓聞是也末稱明晨行道續更啓聞蓋謂明旦方始正齊行道耳既欲為人建齊則當預告真靈以修齊之意古科宿啓必在建齊之日子時而陸天師所撰靈寶道士自修盟真齊儀則不宿啓止於齊日清旦說戒接續登齊行道繼以言功口表正經科止云建齊當先行自然朝初無宿啓散壇之文故也雲光張若海智識膚淺不覩經文輒以已見肆為妄論筆之於書凡二十條大悖經教遂使後世不學之徒乘非蹈謬悉於宿啓之前說戒𥙷職且補職授簡然後升壇杜廣成先生固嘗非之矣說見齊法修用門中李景祈所集齊科却於建壇之日午後先於大道前行自然朝說戒復歸玄師幕補職宣禁至夜方始依科宿啓則是於未建齊之初一日之間兩行自然朝也不幾贅乎向在竹宫魯與留冲靖論及此留冲靖以為止緣宿啓之夜分燈破獄召靈沐浴事緒極多若不如此則晷漏有限將百不逮事之憂然畢竟非古法今悉攺從本科倘宣行齊事不求觀美於讃詠繁文之末止依經科修奉要亦自有餘力好古之士共弘之焉次吟智慧頌三首每一首一拜出智慧觀身經智慧起本無胡朗超十方結空峙玄霄諸天挹流芳其妙難思議虛感真寶通有有竟不有無無無不無智慧常觀身學道之所先渺渺任玄肆自然録我神天尊常擁護魔王為保言晃晃金剛軀超超太上前智慧生戒根真道戒為主三寶由是興髙仙所崇受泛此不死舟倐歘濟大有當此說戒時諸天成稽首次旋行一周法師面東立次唱禮十方衆官等各各首體投地默禮十方方各一拜從北為始次唱衆官平坐說戒威儀衆官西方面東坐弟子於壇前同受戒法師三捻香說戒天尊告太上道君曰今當普宣法音開悟羣生為諸男女解災却患請福受命拔諸苦根使生者見道身脫八難死者歡樂飲食天堂早生人中轉輪聖王之家修齊求道皆當一心請奉十戒諦受勿忘專精默念洞思自然勿得雜想撓亂形神能如是者便當靜聽第一戒者心不惡妬無生隂賊撿口謹過想念在法第二戒者守仁不殺愍濟羣生慈愛廣救潤及一切弟三戒者守正遜義不淫不盜常行善念損己濟物第四戒者不色不欲心無放蕩正潔守謹行無玷汙第五戒者口無惡言言不華綺內外中直不犯口過第六戒者斷酒節行調和氣性神不損傷無犯衆惡第七戒者不得嫉人勝已爭競功名每事推遜退身度人第八戒者不得評論經教訾毁聖文躬心承法常如封神第九戒者不得鬪亂口舌評詳四輩天人咎恨傷損神氣第十戒者舉動施為平等一心人和神穆行常使然已上十戒能持否衆官各稱能持天尊言修奉清戒每合天心常行大慈願為一切普度厄世慊慊尊教不得中怠寧守善而死不為惡而生於是不退可得拔度五道不履三惡諸天所護萬神所敬長齊奉戒自得度世天尊言道尊法妙人身亦貴故道開法遺戒經文以度人身人身既度上與道同宜為精行持齊奉戒夷心靜默志念分明一意皈向專想不二滌蕩六腑過中不味內外清虛每合自然是其齊日揲香啓願應心上徹四天司邏十部威神即下履行觀聽至音鑒映爾心如戒行道皆列功諸天禍福立彰道不負人勤行諦受勿使魔言天尊言建齊行道四天帝王皆駕飛雲緑軿八景玉輿侍從真人玉女手執花幡前導鳳歌後從天鈞白鵠獅子嘯歌雍雍燒香散花浮空而來瞻禮行道觀聽法音天王下降萬靈朝焉如是豈可不盡其法也當先受十戒然後行道庠序雅步靜心閉意坐起卧息不離儀格天王歡恱列名上清可謂得道在方寸之問出智慧上品大戒經元始天尊以開皇元年於西那玉國授太上道君次吟奉戒頌巡行一周歸班出仙公請問經道為無心宗一切作福田立功無定主本願各由人虛已應衆生注心莫不均大聖弘至教亦猶雨降天髙陵靡不周常卑故成淵海為百川王是能舍龍鱗萬劫保智用豈但在厥年奉戒不暫虧世世善結緣精思念大乘㑹當體道真次髙功選舉官衆明日行道各典所職髙功法師經云當舉髙德玄解經義斯人也道德內充威儀外備俯仰動止莫非法式三界所範鬼神所瞻關啓祝願通真召靈䆁疑解滯導逹羣賢法師再拜受簡畢又再拜都講經云才智精明間練法度其任也行道時節上下食息先白法師次引衆官禮拜揖遜皆當讃唱受職者在位再拜詣髙功位跪受職簡畢歸位又再拜衆官同此監齊其職也司察衆過彈紏愆失秉執科憲隨事舉白必使允當不得隱濫侍經其職也營衛尊經整理中藴髙座几案四坐席地拂飾齊整不得懈怠侍香其職也料理爐器常令火然灰淨三時行道二上轉經皆預辦備不得臨用有關侍燈其職也景臨四方備辦燈具依法安置光焰火然常使朗明若遇風雨火勢不立啓白法師宜停乃停不得怠替輒令闕廢右詮舉六職出金籙簡文是為登齊威儀陸天師靈寶齊說光燭戒罰祝願儀叙云先宿啓畢次授上品十戒東向平立誦智慧頌誦畢北向首體投地回心禮十方法師還東面西說戒威儀說戒畢法師依舊還署衆官長跪受簡劄明日行道各典所署選署畢東向祝復香衆官引行出治按次列坐法師更為宣科說禁告示威儀則是說戒補職宣禁必當在宿啓後於科已有明文然禁制威儀却於復香之後方告示者非他蓋陸天師所說禁制自太極三十六條外其餘項目甚多如第一當使香油充足淨水盈餘不得乏少臨用有闕次當修治圊厠令上下蔽密不得敞露又建齊結坐不得今散外之人參雜坐席供辦齊食每每簡素清淨齊日清旦下白粥菜葅鹽豉日間設食菜羹菜蒸葅薑之屬竟設大餘依廚料狀本科無酒事有明文等法禁極為纖悉乃是欲使齊主咸服法訓十戒不止為六職說當與齊主同受勢凡得在復爐後說之為合宜也先行自然朝然後說戒補職威儀由晉迄唐相沿不革自雲光張若海逞妄謬不經之說著元壇刋誤淺學者或宗其說古法始漸湮微崇真先生固嘗深闢之矣據雲光云今修齊道士當日齊集至夜自玄中法師前齊主投詞法師關告後便升壇行事至大謝後即轉洞案說戒補職何倒錯之甚也又云朝真之科與國家禋祀禮同享前七日太尉於都省集齊官戒誓未聞徹祭之後方戒齊官也今道士登齊重啓謝後說戒聽其戒辭又非齊意自說初入道披度戒文次第乖違庠序顚倒良由昔人不能刋攺按用謬科致使後來乘此誤本真餘妄謬未易槩舉抑不思太上天尊開玄都上宫紫微玉笈出靈寶妙齊開度群品威儀之格具載經文靈者神也微妙之功出於思議之表變化無窮故謂之靈寶者一也三才所得而以清寧正者也所不可失故謂之寶人居濁世三關躁擾不能間停身為殺盜淫動故役之以禮拜口有惡言綺妄兩古故課之以誦經心有貪欲嗔恚故使人之以思神用此三法洗心淨行心行精至齊之義也太極真人演經文而著齊戒威儀之訣陸天師托經訣而撰齊謝戒罰之儀三籙九幽解考塗炭三日七日一時九時品目雖繁儀矩則一沿流窮源舍太極真人及陸天師果何適矣雲光末識妄肆評議崇真先生謂其任庸鄙之淺見泯賢聖之崇規賊壞玄綱非聖無法譬諸泥蠼井蛙不知滄海之大二十件之乖謬詳細疏駁文具道藏本朝興崇玄學繹經潤文蓋置使矣楊傑重定金籙乃或因之是可為長嘆者也就雲光所言今世開建大齊齊主必預投詞法師受詞與乏關奏亦在一月之前次第進拜章書頒宣符命豈不謂之先行其事若必以為先行事而後補職謂之顚倒又安可於未發預告正奏之前令髙功先補職邪竊詳經科垂補職之文為明晨行道設耳宿啓散壇不與正齊相涉雲光乃總正齊言之謂為十一朝法事宜其為說如是紛紛也太上垂齊直懴謝之法普度天人津梁品彚罪既可懴福亦隨臻居三界中因緣輪轉塵染業纍種種成愆觸犯三光嶽瀆十方經寶積為罪目結在九幽欲析赦拔必光使之隨方懴謝蓋為此也二十方懴文則見於黃籙簡文三元品戒經十方懴文則見於真文要解玉匱盟真科經豈塵世鄙夫所可擬議哉一日修奉止曰齊㑹三日以上方謂之齊戒七日或九日久者一月具載經科行道懴謝之文則一不以重復為嫌也自雲光謂三日道場凡有十一朝法事方懴尚占九場齊主齊官久立行事跛倚壇席其何以堪但書懴文一讀而巳或於大謝之後宣讀三兩過尺須易換懴文不可三日內重讀舊文而後之行齊事者始務去繁就簡習為穿鑿矣夫上清齊禮九天而九天帝即天尊也料云鬱單無量天尊是也洞神齊十方外復設中央香案則十一方也靈寶盟真齊雖懺十方至金籙簡文自然齊禮十方之外復禮四極則十四方也黃籙三元齊謝十方外復禮三光五嶽水府經寶則二十方也禮方之位雖殊總之不離乎十蓋元始於空界分作十方諸天五億世界三千一一域中各有十方三界日月星宿天曹地府九幽地嶽天尊散景分形世間周遍隨機所感說法度人聖真仙品髙下等級蓋非肉眼凡夫所能窺測故上清科以元始次於九天元父玄母之後不為瀆啓靈寶經以三十二天三十二帝躋於元始上帝太上道君之上不為䙝尊以各有所因故也自雲光謂法師先上十方香是先降十方真氣凡對三清啓奏不兼諸天尊號者乃是瀆無再三三尊無二上今之修齊者宣詞及三上香後却禮十方或兼懴謝又更禮日月星宿五嶽水帝亦有懴文十方天尊與日月星宿於三清前猶可庶幾五嶽水府之神大不穩便而後之行齊事者始不知所適從遂有東青西素南丹北𡨋酆都大帝閻羅天子等禮悉以都懴從事矣夫為道修齊當奉戒法廣度無極法禁微妙檢攝意態伏心就淨殃垢消滅智慧自生拔生死難就無為地深觀所起察其所滅因其所病療以慧藥若見色利以戒掩目若聞惡言以戒塞耳若之甘香以戒杜口若放情欲以戒挫心若趣惡事以戒折足身不犯戒超出塵羅可為整百行建萬善者也受持清戒乃可修齊靜思反聽內視口不妄言身不妄動故無色之色為之見無聲之聲為之聞無味之味為之甘不言之言為之應神明為之降福氣為之臻未然之福無願不獲若外不奉威儀內不守戒律行無可紀功無可著精誠不至猶豫懷疑內外不相應心口不相副性急性戾隂賊嫉傲念慮疲於外馳精神消於多欲雖修齊直終身無福以心至不存於內魂魄勞役於外和氣無主故不䏻有所感動也修齊說戒壇官齊主咸令各持安可分别自雲光不見智慧上品大戒經謂聽其戒辭非齊意自說初入道披度戒文而後之行齊事者始務立異好竒恣為誇誕遂有不得登壇之際少懈威儀入靜之時啓端喧閧等戒矣燒香行道懴罪謝愆則謂之齊延真降聖乞恩請福則謂之醮齊醮儀不得而同今雲光乃謂齊直朝真與國家禋𣏌禮同而香蔬肴醴有異是全不識齊法本未源流矣烏足怪哉選舉六職若依陸天師舊文本不容議自近代令都講昌補六職而又於職事之下添入上下僉議以某人充等語頗有窒礙髙功法師豈僉衆所可補充者耶今悉攺從陸天師本科庶免後來者之惑次都講唱衆官等平坐宣禁威儀三十六禁出太極威儀經法師曰夫齊法清虛威禁至重主人當灑掃屋守每潔淨丁敕大小內外寂靜不可使香油闕乏法用有虧道士登齊各齎巾褐版履不得臨時交換彼我公事有闕勿得牽引非巳之服道士登齊起居皆當闕白監齊禮法師一拜禮香三拜而去還亦如之張萬福天師日不敢指三寶故曰禮香也若到齊堂履屨不整罰油二斤准禮二十拜受拜者願輸本色及以香油准禮者聽若坐起不庠序罰油半升准禮五拜若不正坐罰朱半兩准禮五拜若臨行法事與外人交言罰香一斤准禮二十拜若翻覆香火罰香半斤准禮十拜若講及世務罰香一斤准禮二十拜若言語戲笑罰朱一兩准禮十拜若綺言低睡罰朱半兩准禮五拜若翻覆燈油罰油五升准禮五十拜若巾褐不整罰香半斤准禮十拜若都講讃唱失儀罰香一斤准禮二十拜若執紏見過不彈私隱罰油六升准禮六十拜若侍經不整飾髙坐觸物有闕罰香半斤准禮十拜若侍香香烟中絶罰油四升准禮四十拜若侍燈燈火中滅罰香一斤准禮二十拜若齊主內外不相檢敕音聲髙厲罰油五升准禮五十拜若聽經倚據不執簡罰油一升准禮十拜若不注念清虛心想意倦為衆所覺罰油三升准禮三十拜若出入齊堂不關白監齊罰油二斤准禮二十拜若垂髮馳步罰香一斤准禮二十拜若讀經或亂請問敗句罰油三升准禮三十拜若唱念聲不齊罰油二升准禮二十拜若升壇不洗手漱口罰油二斤准禮二十拜若坐起揖遜失儀罰油半升准禮五拜若旋行不依次第及逆行罰香半斤准禮十拜若起行來及還坐不禮經三拜徑去者罰香一斤准禮二十拜若臨燒香突行罰油一升准禮十拜若齊主供辦觸事有闕罰香一斤准禮二十拜若受關不啓上罰油三斤准禮三十拜若齊次因起居逃遁不返為衆所紏罰香五斤准禮一百拜若犯威儀彈罰不伏者啓告三寶退出齊次若下坐衆官法事有虧從一至三依科彈罰從三巳上退出齊次執紏不彈與犯同罪若上坐法師於事有虧自取愆失送簡監齊從一至三依科彈罰從三巳上斷功三百日不得又在法坐太極法師曰凡此禁制皆玄都上宫明科舊格戒其惰慢檢其愆違建齊之時四天帝王天真上聖親降齊所瞻禮行道察其行藏觀其誠志若有過失即敕四司五帝詔下三官隨事紏舉加其災考天尊大聖哀念世愚不欲使其因齊獲罪故開罰紏之門使其知過過而能攺罪亦消焉受罰之者責巳甘心恭敬聽命勿得飾非喧競干冒真靈如此則弘整紀綱解消殃咎落罪名於既往延福祝於將來得不翼冀小心䖍䖍夕惕若親奉大聖躬朝國君即真靈感通福祥臻集登齊之士勉而戒之出靈寶料玄都律次都講唱監齊受罰簡監齊受簡三拜而起次復爐香官使者左右龍虎君侍香諸靈官當令開建黃籙齊壇之所自然生金液丹碧芝英百靈衆真交會在此香火爐前當願齊功成就存沒霑恩十方仙童玉女侍衛香烟傳臣向來所啓徑御太上無極大道至真玉皇上帝御前次吟學仙空洞頌出壇出步虛經空洞靈章經次出戶呪法師疾衆官出地户畢於户內向壇密呪次參幕至玄師前髙功三捻香小啓謝過三禮出杜廣成儀次回向次都講唱監齊紏過監齊隨有無言之次都講唱啓齊事畢衆官復位次威儀迎師歸堂齊主弟子禮謝法師杜廣成先生曰啓齊既畢衆官與齊主弟子禮謝法師遞相致賀弟子當䖍誠致禮不得傲誕自髙自建齊之後至散齊巳前法師升壇轉經行道既服朝服又冠元冠禮絶衆官是為壇主雖衆官有拜皆不合答茅山台嶽此法久行岷蜀之中尚未詮舉若互相交禮何表法儀今但依行庶全綱紀散壇之後一切如常可也無上黃籙大齊立成儀卷之十六
